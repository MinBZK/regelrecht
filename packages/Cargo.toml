[workspace]
resolver = "2"
members = [
    "admin",
    "auth",
    "corpus",
    "editor-api",
    "engine",
    "harvester",
    "pipeline",
    "shared",
    "tui",
]

[workspace.lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"

# Common dependencies. Crates inherit with `dep.workspace = true`, optionally
# adding `features = [...]` for crate-specific features.
[workspace.dependencies]
async-trait = "0.1"
axum = "0.8"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
openidconnect = "4.0"
regex = "1.11"
# Note: reqwest is intentionally not workspace-hoisted. admin/auth/editor-api
# require reqwest 0.12 to satisfy openidconnect/oauth2's pinned dependency,
# while corpus/harvester/pipeline use 0.13. Aligning them would require
# upgrading openidconnect, which is out of scope for this cleanup.
roxmltree = "0.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml_ng = "0.10"
sha2 = "0.10"
sqlx = "0.8"
strum = { version = "0.28", features = ["derive"] }
subtle = "2"
thiserror = "2.0"
time = "0.3"
tokio = "1"
tower-http = "0.6"
tower-sessions = "0.14"
tower-sessions-sqlx-store = { version = "0.15", features = ["postgres"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
urlencoding = "2"
uuid = { version = "1", features = ["serde"] }
walkdir = "2"

# Test/dev deps.
http-body-util = "0.1"
pretty_assertions = "1.4"
rsa = "0.9"
tempfile = "3"
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["postgres"] }
tower = "0.5"
tower-sessions-memory-store = "0.14"
wiremock = "0.6"

[profile.bench]
opt-level = 3
lto = false

# Patch testcontainers to pick up astral-tokio-tar 0.6.0 (fixes RUSTSEC-2026-0066).
# Remove once testcontainers releases a version with astral-tokio-tar >= 0.6.0.
[patch.crates-io]
testcontainers = { git = "https://github.com/testcontainers/testcontainers-rs", rev = "0f5ee81c18683cf2882fb5a23461cf41fa5e3768" }

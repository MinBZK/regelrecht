[package]
name = "regelrecht-tui"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht TUI dashboard for law execution, testing, and monitoring"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[[bin]]
name = "rrtui"
path = "src/main.rs"

[dependencies]
# TUI framework
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }

# Async runtime
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "process", "fs", "io-util", "time"] }

# Workspace crates
regelrecht-engine = { path = "../engine" }

# File system
walkdir.workspace = true

# Error handling
anyhow = "1"

# Date handling
chrono.workspace = true

# Logging
tracing.workspace = true

[lints]
workspace = true

---
apiVersion: 1

contactPoints:
  - orgId: 1
    name: mattermost
    receivers:
      - uid: mattermost-webhook
        type: webhook
        settings:
          url: ${MATTERMOST_WEBHOOK_URL}
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: mattermost
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

groups:
  - orgId: 1
    name: regelrecht
    folder: Regelrecht
    interval: 1m
    rules:
      - uid: failed-jobs
        title: Failed jobs detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_jobs{status="failed"}
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Failed jobs detected: {{ $value }} jobs in failed state'

      - uid: slow-jobs
        title: Jobs running slow
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_job_duration_avg_seconds
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 300
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: >-
            Average job duration is {{ $value }}s (threshold: 300s)

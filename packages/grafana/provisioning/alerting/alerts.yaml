---
apiVersion: 1

# Remove the stale mattermost contact point provisioned by an earlier image.
deleteContactPoints:
  - orgId: 1
    uid: mattermost-webhook

contactPoints:
  - orgId: 1
    name: mattermost
    receivers:
      - uid: mattermost-digilab
        type: slack
        settings:
          # Mattermost implements the Slack-compatible webhook API.
          url: ${MATTERMOST_WEBHOOK_URL}
          icon_emoji: ':scales:'
          username: Regelrecht
          title: ':bar_chart: Dagelijkse Regelrecht Update'
          text: |
            {{ range .Alerts -}}
            {{ if eq .Labels.alertname "Dagelijkse Regelrecht Update" -}}
            | | |
            |:---|:---|
            | :seedling: **Geharvest** | {{ index .Values "A" }} wetten |
            | :sparkles: **Verrijkt** | {{ index .Values "B" }} wetten |
            {{ else if eq .Labels.alertname "Nieuwe mislukte jobs" -}}
            :warning: **{{ .Annotations.summary }}**
            {{ end -}}
            {{ end }}
        disableResolveMessage: true

policies:
  - orgId: 1
    receiver: mattermost
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 24h
    repeat_interval: 24h

groups:
  - orgId: 1
    name: regelrecht
    folder: Regelrecht
    interval: 10m
    rules:
      - uid: daily-summary
        title: Dagelijkse Regelrecht Update
        # Always-fire condition: law counts are >= 0, so > -1 is always true.
        # This makes the alert act as a daily summary via repeat_interval: 24h.
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max(regelrecht_laws{status="harvested"})
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max(regelrecht_laws{status="enriched"})
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - -1
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 0s
        labels:
          severity: info
        annotations:
          summary: >-
            Geharvest: {{ index $values "A" }} wetten,
            Verrijkt: {{ index $values "B" }} wetten

      - uid: failed-jobs
        title: Nieuwe mislukte jobs
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # Detect NEW failures in the last hour, not cumulative total.
              expr: sum(increase(regelrecht_jobs{status="failed"}[1h]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: >-
            {{ $value }} nieuwe mislukte jobs in het afgelopen uur

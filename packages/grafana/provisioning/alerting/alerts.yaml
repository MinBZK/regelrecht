---
apiVersion: 1

# Remove the stale mattermost contact point provisioned by an earlier image.
deleteContactPoints:
  - orgId: 1
    uid: mattermost-webhook

contactPoints:
  - orgId: 1
    name: mattermost
    receivers:
      - uid: mattermost-digilab
        type: slack
        settings:
          # Mattermost implements the Slack-compatible webhook API.
          url: ${MATTERMOST_WEBHOOK_URL}
          icon_emoji: ':scales:'
          username: Regelrecht
          title: ':bar_chart: Dagelijkse Regelrecht Update'
          text: |
            {{ range .Alerts -}}
            | | |
            |:---|:---|
            | :seedling: **Geharvest** | {{ index $values "A" }} wetten |
            | :sparkles: **Verrijkt** | {{ index $values "B" }} wetten |
            {{ end }}
        disableResolveMessage: true

policies:
  - orgId: 1
    receiver: mattermost
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 24h
    repeat_interval: 24h

groups:
  - orgId: 1
    name: regelrecht
    folder: Regelrecht
    interval: 1h
    rules:
      - uid: daily-summary
        title: Dagelijkse Regelrecht Update
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_laws{status="harvested"}
              refId: A
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_laws{status="enriched"}
              refId: B
          - refId: C
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - -1
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: OK
        execErrState: OK
        for: 0s
        labels:
          severity: info
        annotations:
          summary: >-
            Geharvest: {{ index $values "A" }} wetten,
            Verrijkt: {{ index $values "B" }} wetten

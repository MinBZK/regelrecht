---
apiVersion: 1

# Remove the mattermost contact point provisioned by an earlier image.
deleteContactPoints:
  - orgId: 1
    uid: mattermost-webhook

# Contact points and notification policies are configured via the Grafana UI
# once external webhook URLs (e.g. Mattermost) are available.
# Note: resetPolicies is intentionally omitted — it runs on every restart
# and would wipe any alert routing configured via the UI.

groups:
  - orgId: 1
    name: regelrecht
    folder: Regelrecht
    interval: 1m
    rules:
      - uid: failed-jobs
        title: New failed jobs detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_jobs{status="failed"}
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: >-
            {{ $value }} failed jobs detected

      - uid: slow-jobs
        title: Jobs running slow
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_job_duration_avg_seconds
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 300
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: >-
            Average job duration is {{ $value }}s (threshold: 300s)

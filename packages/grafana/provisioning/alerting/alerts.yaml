---
apiVersion: 1

# Remove the stale mattermost contact point provisioned by an earlier image.
deleteContactPoints:
  - orgId: 1
    uid: mattermost-webhook

contactPoints:
  - orgId: 1
    name: mattermost
    receivers:
      - uid: mattermost-digilab
        type: slack
        settings:
          # Mattermost implements the Slack-compatible webhook API.
          url: ${MATTERMOST_WEBHOOK_URL}
          text: |
            {{ range .Alerts }}
            **[{{ .Status | toUpper }}] {{ .Labels.alertname }}**
            {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: mattermost
    group_by:
      - grafana_folder
      - alertname
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 1h

groups:
  - orgId: 1
    name: regelrecht
    folder: Regelrecht
    interval: 1m
    rules:
      - uid: failed-jobs
        title: New failed jobs detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_jobs{status="failed"}
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: >-
            {{ $value }} failed jobs detected

      - uid: slow-jobs
        title: Jobs running slow
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: regelrecht_job_duration_avg_seconds
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 300
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        noDataState: NoData
        execErrState: Alerting
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: >-
            Average job duration is {{ $value }}s (threshold: 300s)

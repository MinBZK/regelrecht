[package]
name = "regelrecht-demo-api"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "Minimale LLM-uitlegproxy voor de burger-demo (RFC-016). Exposes POST /api/explain, ANTHROPIC_API_KEY via env."
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
publish = false

[[bin]]
name = "regelrecht-demo-api"
path = "src/main.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
tower_governor = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2.0"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "test-util"] }

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"

[package]
name = "regelrecht-auth"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht shared OIDC/SSO authentication"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[dependencies]
axum = "0.8"
openidconnect = "4.0"
tower-sessions = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
urlencoding = "2"
base64 = "0.22"
subtle = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tower-http = { version = "0.6", features = ["fs"] }
url = "2"

[dev-dependencies]
tower = "0.5"
tower-sessions-memory-store = "0.14"
wiremock = "0.6"
rsa = "0.9"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
http-body-util = "0.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"

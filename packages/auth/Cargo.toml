[package]
name = "regelrecht-auth"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht shared OIDC/SSO authentication"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[dependencies]
axum.workspace = true
openidconnect.workspace = true
tower-sessions.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
urlencoding.workspace = true
base64.workspace = true
subtle.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tower-http = { workspace = true, features = ["fs"] }
url.workspace = true
tower = { workspace = true, optional = true }
tower-sessions-memory-store = { workspace = true, optional = true }

[features]
# Exposes regelrecht_auth::test_utils with router/session seeding helpers used
# by downstream crates' middleware tests (e.g. admin).
test-utils = ["dep:tower", "dep:tower-sessions-memory-store"]

[dev-dependencies]
tower.workspace = true
tower-sessions-memory-store.workspace = true
wiremock.workspace = true
rsa.workspace = true
sha2.workspace = true
uuid = { workspace = true, features = ["v4"] }
chrono.workspace = true
http-body-util.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true

[package]
name = "regelrecht-harvester"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht law harvester - Download Dutch legislation from BWB repository"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
homepage = "https://github.com/MinBZK/regelrecht"
keywords = ["law", "legal", "dutch", "harvester", "bwb"]
categories = ["command-line-utilities", "parsing"]

[[bin]]
name = "regelrecht-harvester"
path = "src/main.rs"

[lib]
name = "regelrecht_harvester"
path = "src/lib.rs"

[dependencies]
regelrecht-shared = { path = "../shared" }
serde.workspace = true
serde_yaml_ng.workspace = true
thiserror.workspace = true
chrono.workspace = true
regex.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
reqwest = "0.13"
async-trait.workspace = true
tokio = { workspace = true, features = ["time", "rt-multi-thread", "macros"] }
roxmltree.workspace = true
clap = { version = "4.6", features = ["derive"] }
indicatif = "0.18"
console = "0.16"
textwrap = "0.16"
unicode-normalization = "0.1"

[dev-dependencies]
regelrecht-law-model = { path = "../law-model" }
tempfile.workspace = true
serde_json.workspace = true

[lints]
workspace = true

[package]
name = "regelrecht-pipeline"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht pipeline - Job queue and law status tracking for the processing pipeline"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
homepage = "https://github.com/MinBZK/regelrecht"
keywords = ["law", "legal", "pipeline", "dutch", "regelrecht"]
categories = ["database"]

[[bin]]
name = "regelrecht-harvest-worker"
path = "src/bin/harvest_worker.rs"

[[bin]]
name = "regelrecht-enrich-worker"
path = "src/bin/enrich_worker.rs"

[[bin]]
name = "regelrecht-pipeline-api"
path = "src/bin/pipeline_api.rs"

[dependencies]
regelrecht-corpus = { path = "../corpus" }
regelrecht-harvester = { path = "../harvester" }
regelrecht-shared = { path = "../shared", features = ["telemetry"] }
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono", "json", "migrate"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "process", "time", "fs", "net", "io-util"] }
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
thiserror.workspace = true
chrono.workspace = true
uuid = { workspace = true, features = ["v4"] }
strum.workspace = true
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
sha2.workspace = true
tokio-util = "0.7"
async-trait.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
axum.workspace = true
tower-http = { workspace = true, features = ["trace"] }
roxmltree.workspace = true
url.workspace = true
testcontainers = { workspace = true, optional = true }
testcontainers-modules = { workspace = true, optional = true }

[features]
# Exposes regelrecht_pipeline::test_utils with helpers (e.g. TestDb) used by
# integration tests in this crate and downstream crates (admin).
test-utils = ["dep:testcontainers", "dep:testcontainers-modules"]

[dev-dependencies]
regelrecht-pipeline = { path = ".", features = ["test-utils"] }
pretty_assertions.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "process", "time", "fs"] }
tempfile.workspace = true

[lints]
workspace = true

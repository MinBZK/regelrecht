[package]
name = "regelrecht-engine"
version = "0.2.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht law execution engine - Machine-readable Dutch law execution"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
homepage = "https://github.com/MinBZK/regelrecht"
keywords = ["law", "legal", "wasm", "dutch", "regelrecht"]
categories = ["wasm", "parsing"]

[package.metadata.regelrecht]
supported-schemas = ["v0.2.0", "v0.3.0", "v0.3.1", "v0.3.2", "v0.4.0", "v0.5.0", "v0.5.1", "v0.5.2"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
regelrecht-shared = { path = "../shared" }
serde.workspace = true
serde_yaml_ng.workspace = true
serde_json.workspace = true
thiserror.workspace = true
chrono.workspace = true
sha2.workspace = true
hex = "0.4"
strsim = "0.11"
tracing.workspace = true

[dependencies.jsonschema]
version = "0.46"
optional = true

[dependencies.wasm-bindgen]
version = "0.2"
optional = true

[dependencies.serde-wasm-bindgen]
version = "0.6"
optional = true

[[bin]]
name = "validate"
path = "src/bin/validate.rs"
required-features = ["validate"]

[[bin]]
name = "validate-annotations"
path = "src/bin/validate_annotations.rs"
required-features = ["validate"]

[[bin]]
name = "evaluate"
path = "src/bin/evaluate.rs"

[[test]]
name = "bdd"
harness = false

[features]
wasm = ["dep:wasm-bindgen", "dep:serde-wasm-bindgen"]
validate = ["dep:jsonschema"]
otel = ["dep:tracing-opentelemetry", "dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:tracing-subscriber"]

[dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter", "fmt", "registry"]
optional = true

[dependencies.tracing-opentelemetry]
version = "0.32"
optional = true

[dependencies.opentelemetry]
version = "0.32"
optional = true

[dependencies.opentelemetry_sdk]
version = "0.31"
optional = true

[dependencies.opentelemetry-otlp]
version = "0.31"
optional = true

[dev-dependencies]
cucumber = "0.23"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
walkdir.workspace = true
tracing-subscriber.workspace = true
criterion = { version = "0.8", features = ["html_reports"] }

[[bench]]
name = "uri_parsing"
harness = false

[[bench]]
name = "variable_resolution"
harness = false

[[bench]]
name = "operations"
harness = false

[[bench]]
name = "article_evaluation"
harness = false

[[bench]]
name = "law_loading"
harness = false

[[bench]]
name = "priority"
harness = false

[[bench]]
name = "service_e2e"
harness = false

[profile.release]
lto = true
opt-level = "z"


[lints]
workspace = true

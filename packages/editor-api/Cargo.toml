[package]
name = "regelrecht-editor-api"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht editor API — lightweight Axum server for the law editor frontend"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[lib]
name = "regelrecht_editor_api"
path = "src/lib.rs"

[[bin]]
name = "regelrecht-editor-api"
path = "src/main.rs"

[dependencies]
axum = { workspace = true, features = ["multipart"] }
regelrecht-auth = { path = "../auth" }
regelrecht-shared = { path = "../shared", features = ["telemetry"] }
regelrecht-corpus = { path = "../corpus", features = ["github", "annotation-validation"] }
regelrecht-github = { path = "../github" }
regelrecht-pipeline = { path = "../pipeline" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower-http = { workspace = true, features = ["fs", "trace"] }
tower-sessions.workspace = true
tower-sessions-sqlx-store.workspace = true
tower-sessions-memory-store.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono", "json"] }
chrono.workspace = true
uuid = { workspace = true, features = ["v4"] }
base64.workspace = true
chacha20poly1305.workspace = true
subtle.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
sha2.workspace = true
time.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
regelrecht-pipeline = { path = "../pipeline", features = ["test-utils"] }
async-trait.workspace = true
pretty_assertions.workspace = true
tempfile.workspace = true
wiremock.workspace = true

[lints]
workspace = true

[package]
name = "regelrecht-editor-api"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht editor API — lightweight Axum server for the law editor frontend"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[[bin]]
name = "regelrecht-editor-api"
path = "src/main.rs"

[dependencies]
axum = "0.8"
regelrecht-corpus = { path = "../corpus", features = ["github"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["fs", "trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# OIDC / SSO
openidconnect = "4.0"
tower-sessions = "0.14"
tower-sessions-sqlx-store = { version = "0.15", features = ["postgres"] }
tower-sessions-memory-store = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
urlencoding = "2"
base64 = "0.22"
time = "0.3"
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres"] }

[dev-dependencies]
tower = "0.5"
http-body-util = "0.1"
wiremock = "0.6"
rsa = "0.9"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"

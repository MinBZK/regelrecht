[package]
name = "regelrecht-corpus"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht corpus client - Git integration for the regelrecht-corpus repository"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
homepage = "https://github.com/MinBZK/regelrecht"
keywords = ["law", "legal", "corpus", "dutch", "regelrecht"]
categories = ["development-tools"]

[dependencies]
async-trait.workspace = true
tokio = { workspace = true, features = ["process", "fs"] }
tracing.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_yaml_ng.workspace = true
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"], optional = true }
walkdir.workspace = true

[features]
default = ["github"]
github = ["dep:reqwest"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "process", "fs"] }
tempfile.workspace = true
regelrecht-engine = { path = "../engine" }

[lints]
workspace = true

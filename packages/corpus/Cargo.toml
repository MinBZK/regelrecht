[package]
name = "regelrecht-corpus"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht corpus client - Git integration for the regelrecht-corpus repository"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
homepage = "https://github.com/MinBZK/regelrecht"
keywords = ["law", "legal", "corpus", "dutch", "regelrecht"]
categories = ["development-tools"]

[dependencies]
async-trait.workspace = true
tokio = { workspace = true, features = ["process", "fs"] }
tracing.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_yaml_ng.workspace = true
regelrecht-law-model = { path = "../law-model" }
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"], optional = true }
serde_json = { workspace = true, optional = true }
jsonschema = { version = "0.46", optional = true }
base64 = { workspace = true, optional = true }
flate2 = { version = "1", optional = true }
tar = { version = "0.4", optional = true }
walkdir.workspace = true

[features]
default = ["github"]
# The GitHub API backend (write path through Contents/Refs API) needs
# JSON bodies and base64-encoded file contents, so `github` pulls both
# in alongside reqwest. The implements-index bulk read downloads the repo
# archive (tarball) in one request, so it also needs gzip + tar.
github = ["dep:reqwest", "dep:serde_json", "dep:base64", "dep:flate2", "dep:tar"]
# Schema validation for note (annotation) YAML. Pulls in jsonschema; only
# the editor-api write path needs it, so it stays optional.
annotation-validation = ["dep:jsonschema", "dep:serde_json"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "process", "fs"] }
tempfile.workspace = true
regelrecht-engine = { path = "../engine" }
wiremock.workspace = true
serde_json.workspace = true

[lints]
workspace = true

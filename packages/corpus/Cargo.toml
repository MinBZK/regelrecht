[package]
name = "regelrecht-corpus"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht corpus client - Git integration for the regelrecht-corpus repository"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"
homepage = "https://github.com/MinBZK/regelrecht"
keywords = ["law", "legal", "corpus", "dutch", "regelrecht"]
categories = ["development-tools"]

[dependencies]
async-trait.workspace = true
tokio = { workspace = true, features = ["process", "fs"] }
tracing.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_yaml_ng.workspace = true
regelrecht-law-model = { path = "../law-model" }
# All GitHub REST talks through the shared regelrecht-github crate now; corpus
# keeps only the domain layer (source enumeration, archive extraction). No
# direct reqwest dependency any more.
regelrecht-github = { path = "../github", optional = true }
serde_json = { workspace = true, optional = true }
jsonschema = { version = "0.47", optional = true }
flate2 = { version = "1", optional = true }
tar = { version = "0.4", optional = true }
walkdir.workspace = true

[features]
default = ["github"]
# The GitHub domain layer talks to the shared `regelrecht-github` client.
# The implements-index bulk read downloads the repo archive (tarball) in one
# request and extracts it here, so it needs gzip + tar. serde_json is used by
# the feature's tests.
github = ["dep:regelrecht-github", "dep:serde_json", "dep:flate2", "dep:tar"]
# Schema validation for note (annotation) YAML. Pulls in jsonschema; only
# the editor-api write path needs it, so it stays optional.
annotation-validation = ["dep:jsonschema", "dep:serde_json"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "process", "fs"] }
tempfile.workspace = true
regelrecht-engine = { path = "../engine" }
wiremock.workspace = true
serde_json.workspace = true
# base64 is only used by the GitHub-backend integration tests (to build
# Contents-API bodies); the runtime encode/decode moved into regelrecht-github.
base64.workspace = true

[lints]
workspace = true

[package]
name = "regelrecht-admin"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht admin UI for viewing pipeline database"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[lib]
name = "regelrecht_admin"
path = "src/lib.rs"

[[bin]]
name = "regelrecht-admin"
path = "src/main.rs"

[dependencies]
axum.workspace = true
regelrecht-auth = { path = "../auth" }
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono"] }
regelrecht-corpus = { path = "../corpus", default-features = false }
regelrecht-harvester = { path = "../harvester" }
regelrecht-pipeline = { path = "../pipeline" }
chrono.workspace = true
uuid = { workspace = true, features = ["v4"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower-http = { workspace = true, features = ["fs", "trace"] }
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
openidconnect.workspace = true
tower-sessions.workspace = true
tower-sessions-sqlx-store.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
url.workspace = true
urlencoding.workspace = true
base64.workspace = true
time.workspace = true
prometheus-client = "0.24"
strum.workspace = true
subtle.workspace = true
sha2.workspace = true

[dev-dependencies]
tower.workspace = true
tower-sessions-memory-store.workspace = true
wiremock.workspace = true
rsa.workspace = true
testcontainers.workspace = true
testcontainers-modules.workspace = true
http-body-util.workspace = true
pretty_assertions.workspace = true

[lints]
workspace = true

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RegelRecht - Admin</title>
  <script src="./redirect.js"></script>
  <link rel="stylesheet" href="css/admin.css">
  <script type="module" src="./main.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <div class="app">
    <!-- Top Navigation Bar -->
    <rr-top-navigation-bar
      title="RegelRecht admin"
      no-logo
      no-menu
      utility-no-language-switch
      utility-account-label="Admin"
    >
    </rr-top-navigation-bar>

    <!-- Tab Bar -->
    <nav id="tabs" class="tabs">
      <!-- Rendered by app.js -->
    </nav>

    <!-- Main Content -->
    <main class="app__content">
      <!-- Toolbar: filters + pagination -->
      <div class="toolbar">
        <div id="filters" class="toolbar__filters">
          <!-- Rendered by app.js -->
        </div>

        <form id="harvest-form" class="harvest-form" style="display:none">
          <input
            id="harvest-bwb-id"
            class="harvest-form__input"
            type="text"
            placeholder="BWB ID (e.g. BWBR0018451)"
            required
            pattern="BWBR\d{7}"
            title="BWB ID format: BWBR0018451"
          >
          <button type="submit" class="harvest-form__btn">
            Harvest
          </button>
          <button id="reset-jobs-btn" type="button" class="toolbar__btn--danger" style="margin-left: 8px">
            Reset Jobs
          </button>
        </form>

        <div class="pagination">
          <button id="pagination-prev" class="pagination__btn" title="Previous page" disabled>
            <svg viewBox="0 0 16 16"><path d="M10 4l-4 4 4 4"/></svg>
          </button>
          <span id="pagination-info" class="pagination__info">1 / 1 (0 results)</span>
          <button id="pagination-next" class="pagination__btn" title="Next page" disabled>
            <svg viewBox="0 0 16 16"><path d="M6 4l4 4-4 4"/></svg>
          </button>
        </div>
      </div>

      <!-- Data Table -->
      <div class="table-container">
        <table class="data-table">
          <thead id="table-head">
            <!-- Rendered by app.js -->
          </thead>
          <tbody id="table-body">
            <!-- Rendered by app.js -->
          </tbody>
        </table>
      </div>
    </main>

    <!-- Job Detail Panel (slide-in from right) -->
    <div id="detail-backdrop" class="detail-backdrop" hidden></div>
    <aside id="detail-panel" class="detail-panel" hidden>
      <div class="detail-panel__header">
        <h2 class="detail-panel__title">Job Details</h2>
        <button id="detail-close" class="detail-panel__close" title="Close">&times;</button>
      </div>
      <div id="detail-body" class="detail-panel__body">
        <!-- Rendered by app.js -->
      </div>
    </aside>
  </div>
</body>
</html>

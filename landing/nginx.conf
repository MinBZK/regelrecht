# The landing page has moved into the docs site (one site, one style).
# regelrecht.rijks.app now 301-redirects to docs.regelrecht.rijks.app.
# This container is the safe interim until regelrecht.rijks.app is repointed
# as a DNS/ZAD alias to the docs service (ops action).
server {
    listen 8000;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health check stays local so ZAD readiness probes keep passing.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # Old signup deep link → Dutch signup route on docs.
    location = /aanmelden/ {
        return 301 https://docs.regelrecht.rijks.app/aanmelden;
    }
    location = /aanmelden {
        return 301 https://docs.regelrecht.rijks.app/aanmelden;
    }

    # Old home and everything else → Dutch landing (docs root).
    location / {
        return 301 https://docs.regelrecht.rijks.app/;
    }
}

server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Keep any nginx-issued redirect relative to the request host instead
    # of rebuilding it with the internal listen port (8000), which would
    # send clients to a port they cannot reach behind the ingress.
    absolute_redirect off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://digilab.overheid.nl; frame-ancestors 'none'" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Astro builds with `build.format: 'directory'`: every page is
    # `<route>/index.html`. Internal links (navLinks.ts, sidebar.ts,
    # rfcs.ts) are slash-less (`/guide/what-is-regelrecht`). Probing
    # `$uri/index.html` BEFORE `$uri/` serves that file directly: `$uri/`
    # alone makes nginx 301 to add the trailing slash first (a wasted hop
    # on every internal link). Index routes (`/`, `/en/`, `/rfcs/`)
    # resolve via the same `$uri/index.html`. Unknown URLs fall to `=404`
    # → the `error_page` below returns the static 404 page with a real
    # 404 status (not the soft-404 homepage the old SPA fallback gave).
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://digilab.overheid.nl; frame-ancestors 'none'" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }
}

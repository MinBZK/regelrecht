server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Keep any nginx-issued redirect relative to the request host instead
    # of rebuilding it with the internal listen port (8000), which would
    # send clients to a port they cannot reach behind the ingress.
    absolute_redirect off;

    # Security headers
    #
    # CSP keeps 'unsafe-inline' on script-src and style-src; closing those is
    # a separate effort that we intentionally do NOT do here:
    #
    # - script-src 'unsafe-inline': Base.astro emits two inline scripts that a
    #   CSP hash could cover in principle — the pre-paint theme bootstrap
    #   (`<script is:inline>`) and the Pagefind search wiring (`<script
    #   define:vars>`). The Pagefind script's content varies per page because
    #   `define:vars` inlines i18n strings, so a single nginx-level CSP cannot
    #   carry a stable hash without per-route header injection or Astro's
    #   experimental `<meta>` CSP. Tracked as a follow-up.
    # - style-src 'unsafe-inline': required for Mermaid's inline-svg output
    #   (rehype-mermaid emits hundreds of `style="..."` attributes per
    #   diagram). Removing the option means losing Mermaid in docs.
    #
    # base-uri 'none' and form-action 'self' close internet.nl recommendations
    # #2 and #5: no <base> tag is used; the signup form posts via fetch, not
    # an HTML <form action="...">.
    #
    # HSTS includes `preload` so the domain is eligible for browser preload
    # lists once submitted to hstspreload.org.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://digilab.overheid.nl; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Astro builds with `build.format: 'directory'`: every page is
    # `<route>/index.html`. Internal links (navLinks.ts, sidebar.ts,
    # rfcs.ts) are slash-less (`/guide/what-is-regelrecht`). Probing
    # `$uri/index.html` BEFORE `$uri/` serves that file directly: `$uri/`
    # alone makes nginx 301 to add the trailing slash first (a wasted hop
    # on every internal link). Index routes (`/`, `/en/`, `/rfcs/`)
    # resolve via the same `$uri/index.html`. Unknown URLs fall to `=404`
    # → the `error_page` below returns the static 404 page with a real
    # 404 status (not the soft-404 homepage the old SPA fallback gave).
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # security.txt — redirect to the central NCSC file per the Rijksoverheid
    # CVD policy (https://www.ncsc.nl/.well-known/security.txt). RFC 9116 says
    # the file MUST live at /.well-known/security.txt; /security.txt is a
    # legacy fallback we also handle so old scanners pointed there still
    # resolve. 302 is what the policy prescribes.
    location = /.well-known/security.txt {
        return 302 https://www.ncsc.nl/.well-known/security.txt;
    }
    location = /security.txt {
        return 302 https://www.ncsc.nl/.well-known/security.txt;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://digilab.overheid.nl; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }
}

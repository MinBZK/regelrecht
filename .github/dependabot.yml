---
version: 2
updates:
  - package-ecosystem: cargo
    directory: /packages
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    groups:
      opentelemetry:
        patterns:
          - opentelemetry
          - opentelemetry-*
          - opentelemetry_*
          - tracing-opentelemetry
        update-types:
          - minor
          - patch
          - major
      rust-minor-patch:
        update-types:
          - minor
          - patch


  # Single entry for the root npm workspace. frontend, frontend-lawmaking and
  # packages/frontend-shared are workspace members sharing one root
  # package-lock.json (since #860). Dependabot must target the root directory so
  # it updates the member package.json *and* the root lockfile in sync;
  # targeting a member directory bumps only its package.json and leaves the root
  # lockfile out of sync, breaking `npm ci`. (/docs keeps its own lockfile and
  # has its own entry below.)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Our own design package — bump manually, not via Dependabot
      - dependency-name: '@nldd/design-system'

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: node
        versions:
          - '23'
          - '25'
          - '27'
          - '29'
          - '31'
      # The Rust image version must match rust-toolchain.toml (source of
      # truth); bump it manually together with the toolchain.
      - dependency-name: rust
        update-types:
          - version-update:semver-major
          - version-update:semver-minor


  - package-ecosystem: docker
    directory: /packages/admin
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: node
        versions:
          - '23'
          - '25'
          - '27'
          - '29'
          - '31'
      # The Rust image version must match rust-toolchain.toml (source of
      # truth); bump it manually together with the toolchain.
      - dependency-name: rust
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  - package-ecosystem: docker
    directory: /packages/pipeline
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - docker
    ignore:
      # The Rust image version must match rust-toolchain.toml (source of
      # truth); bump it manually together with the toolchain.
      - dependency-name: rust
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Our own design package — bump manually, not via Dependabot
      - dependency-name: '@nldd/design-system'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

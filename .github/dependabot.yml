---
version: 2
updates:
  - package-ecosystem: cargo
    directory: /packages
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    groups:
      opentelemetry:
        patterns:
          - opentelemetry
          - opentelemetry-*
          - opentelemetry_*
          - tracing-opentelemetry
        update-types:
          - minor
          - patch
          - major
      rust-minor-patch:
        update-types:
          - minor
          - patch


  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Our own design package — bump manually, not via Dependabot
      - dependency-name: '@nldd/design-system'

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: node
        versions:
          - '23'
          - '25'
          - '27'
          - '29'
          - '31'
      # The Rust image version must match rust-toolchain.toml (source of
      # truth); bump it manually together with the toolchain.
      - dependency-name: rust
        update-types:
          - version-update:semver-major
          - version-update:semver-minor


  - package-ecosystem: npm
    directory: /packages/admin/frontend-src
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Our own design package — bump manually, not via Dependabot
      - dependency-name: '@nldd/design-system'

  - package-ecosystem: docker
    directory: /packages/admin
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: node
        versions:
          - '23'
          - '25'
          - '27'
          - '29'
          - '31'
      # The Rust image version must match rust-toolchain.toml (source of
      # truth); bump it manually together with the toolchain.
      - dependency-name: rust
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Our own design package — bump manually, not via Dependabot
      - dependency-name: '@nldd/design-system'

  - package-ecosystem: npm
    directory: /frontend-lawmaking
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Our own design package — bump manually, not via Dependabot
      - dependency-name: '@nldd/design-system'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

    article: '26'
articles:
  - number: '10'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel10
    text: |
      1. Deze afdeling heeft betrekking op kwijtschelding van inkomstenbelasting verschuldigd door natuurlijke personen die
      geen bedrijf of niet zelfstandig een beroep uitoefenen, van loonbelasting verschuldigd door werknemers alsmede van door
      natuurlijke personen verschuldigd successierecht, schenkingsrecht, recht van overgang en verschuldigde belastingen van
      rechtsverkeer.

      2. Deze afdeling heeft voorts, in afwijking in zoverre van artikel 20 betrekking op kwijtschelding van
      inkomstenbelasting verschuldigd door natuurlijke personen die een uitkering genieten ingevolge de Wet
      inkomensvoorziening kunstenaars.
  - number: '11'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel11
    text: |
      Kwijtschelding wordt verleend voor:

      a. het gehele op de belastingaanslag openstaande bedrag indien geen vermogen en geen betalingscapaciteit aanwezig is;

      b. het openstaande bedrag van de belastingaanslag dat resteert nadat:

      1°. het aanwezige vermogen is aangewend ter voldoening van de belastingaanslag;

      2°. ten minste 80 percent van de betalingscapaciteit is aangewend;

      een en ander onverminderd het bepaalde in artikel 8, artikel 17 en artikel 18.
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: bsn
            type: string
            required: true
          - name: waterschap_code
            type: string
            required: false
          - name: gemeente_code
            type: string
            required: false
          - name: netto_besteedbaar_inkomen_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: netto_besteedbaar_inkomen_partner_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: huishoudtype
            type: string
            required: true
          - name: is_pensioengerechtigd
            type: boolean
            required: true
          - name: vermogen
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: extra_uitgaven_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
          - name: aanslagbedrag
            type: amount
            type_spec:
              unit: eurocent
            required: true
        input:
          - name: betalingscapaciteit
            type: amount
            type_spec:
              unit: eurocent
            source:
              output: betalingscapaciteit
              parameters:
                bsn: $bsn
                waterschap_code: $waterschap_code
                gemeente_code: $gemeente_code
                netto_besteedbaar_inkomen_maand: $netto_besteedbaar_inkomen_maand
                netto_besteedbaar_inkomen_partner_maand: $netto_besteedbaar_inkomen_partner_maand
                huishoudtype: $huishoudtype
                is_pensioengerechtigd: $is_pensioengerechtigd
                extra_uitgaven_maand: $extra_uitgaven_maand
        output:
          - name: aanwendbare_betalingscapaciteit
            type: amount
            type_spec:
              unit: eurocent
          - name: hoogte_kwijtschelding
            type: amount
            type_spec:
              unit: eurocent
          - name: kan_kwijtschelding_worden_verleend
            type: boolean
        actions:
          - output: aanwendbare_betalingscapaciteit
            value:
              operation: MULTIPLY
              values:
                - 0.8
                - $betalingscapaciteit

                        - $vermogen
                    - $aanwendbare_betalingscapaciteit
          - output: kan_kwijtschelding_worden_verleend
            value:
              operation: GREATER_THAN
              subject: $hoogte_kwijtschelding
              value: 0
  - number: '12'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel12
    text: |
      1. Onder vermogen als bedoeld in artikel 11 wordt verstaan de waarde in het economische verkeer van de bezittingen van
      de belastingschuldige en van zijn echtgenoot, bedoeld in artikel 3 van de Algemene bijstandswet, verminderd met de
      schulden van de belastingschuldige en deze persoon die hoger bevoorrecht zijn dan de rijksbelastingen.

      2. Onder bezittingen wordt niet begrepen:

      a. de inboedel voor zover de waarde hiervan niet meer bedraagt dan € 2269;

      b. rechten op kapitaalsuitkeringen of prestaties uit levensverzekering, uitsluitend bestaande uit een kapitaaluitkering
      bij overlijden van de belastingschuldige of zijn echtgenoot, mits deze kapitaaluitkering is bestemd voor de verzorging
      van de uitvaart van de belastingschuldige of zijn echtgenoot, dan wel op prestaties in natura ter zake van de
      verzorging van een uitvaart van de belastingschuldige of zijn echtgenoot;

      c. een auto die op het moment van het verzoek een waarde heeft van € 2269 of minder; een auto met een waarde van meer
      dan € 2269 wordt niet als vermogen beschouwd indien jegens de ontvanger aannemelijk kan worden gemaakt dat die auto
      absoluut onmisbaar is voor de uitoefening van een beroep dan wel absoluut onmisbaar is in verband met invaliditeit;

      d. het totale bedrag aan financiële middelen, andere dan de onder f bedoelde, voor zover dat bedrag de ingevolge
      artikel 16 in aanmerking te nemen kosten van bestaan vermeerderd met een bedrag ter grootte van het per maand
      gemiddelde bedrag van de uitgaven bedoeld in artikel 15, onderdelen b en c, niet te boven gaat;

      e. het bedrag op een bank- of girorekening dat in het kader van de Wet studiefinanciering 2000 of de Wet tegemoetkoming
      studiekosten is verkregen in de vorm van leningen of dat is verkregen in het kader van een regeling voor
      persoonsgebonden budget, welke regeling is gegrond op artikel 1p, eerste lid, onderdeel d, van de Ziekenfondswet;

      f. een bedrag van € 2269 aan financiële middelen per persoon voor personen die op 31 december 1999 de leeftijd van 65
      jaar hebben bereikt.

      3. Onder waarde, bedoeld in het tweede lid, onderdeel c, wordt verstaan de prijs die de autohandel bereid is te betalen
      bij inkoop zonder gelijktijdige verkoop van een andere auto.

      4. Indien de uitgaven, bedoeld in artikel 15, onderdelen b en c, verschuldigd zijn over een termijn van langer dan een
      maand wordt in plaats van het per maand gemiddelde bedrag in aanmerking genomen het deel van het termijnbedrag voor
      zover dat, gelet op de vervaldatum van de termijnbetaling, op het moment van het verzoek om kwijtschelding
      redelijkerwijs kan worden aangemerkt als reservering voor die termijnbetaling.
    machine_readable:
      definitions:
        drempelwaarde_inboedel_auto:
          description: Drempelwaarde (eurocent) waarboven de inboedel of een auto als vermogen wordt beschouwd,
            artikel 12 tweede lid onderdelen a en c. Origineel vastgesteld op f 5000 (1990) en nooit geindexeerd;
            actuele waarde 226900 eurocent (= EUR 2269).
          value: 226900
      open_terms:
        - id: verhoging_financiele_middelen_vrijstelling
          description: Verhoging (eurocent) van de vrijstelling voor financiele middelen bovenop kostennorm en
            gemiddelde maand-uitgaven. Per artikel 4 Regeling kwijtschelding belastingen medeoverheden mag een
            verordening deze verhogen; HHNK art 4 stelt deze op 200000 (echtgenoten), 180000 (alleenstaande ouder)
            en 150000 (alleenstaande) eurocent.
          type: amount
          required: false
          delegated_to: provincie, gemeente of waterschap
          delegation_type: WATERSCHAPS_VERORDENING
          legal_basis: artikel 4 Regeling kwijtschelding belastingen medeoverheden
          default:
            actions:
              - output: verhoging_financiele_middelen_vrijstelling
                value: 0
      execution:
        parameters:
          - name: bsn
            type: string
            required: true
          - name: waterschap_code
            type: string
            required: false
          - name: gemeente_code
            type: string
            required: false
          - name: huishoudtype
            type: string
            required: true
          - name: is_pensioengerechtigd
            type: boolean
            required: true
          - name: inboedel_waarde
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: auto_waarde
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: auto_onmisbaar
            type: boolean
            required: true
          - name: onroerend_goed_waarde
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: andere_bezittingen
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: hoger_bevoorrechte_schulden
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: liquide_middelen
            type: amount
            type_spec:
              unit: eurocent
            required: true
        input:
          - name: kostennorm_bedrag
            type: amount
            type_spec:
              unit: eurocent
            source:
              output: kostennorm_bedrag
              parameters:
                bsn: $bsn
                waterschap_code: $waterschap_code
                gemeente_code: $gemeente_code
                huishoudtype: $huishoudtype
                is_pensioengerechtigd: $is_pensioengerechtigd
        output:
          - name: inboedel_als_vermogen
            type: amount
            type_spec:
              unit: eurocent
          - name: auto_als_vermogen
            type: amount
            type_spec:
              unit: eurocent
          - name: financiele_middelen_vrijstelling
            type: amount
            type_spec:
              unit: eurocent
          - name: liquide_als_vermogen
            type: amount
            type_spec:
              unit: eurocent
          - name: totaal_bezittingen
            type: amount
            type_spec:
              unit: eurocent
          - name: vermogen_bedrag
            type: amount
            type_spec:
              unit: eurocent
        actions:
          - output: inboedel_als_vermogen
            value:
              operation: IF
              cases:
                - when:
                    operation: GREATER_THAN
                    subject: $inboedel_waarde
                    value: $drempelwaarde_inboedel_auto
                  then: $inboedel_waarde
              default: 0
          - output: auto_als_vermogen
            value:
              operation: IF
              cases:
                - when:
                    operation: AND
                    conditions:
                      - operation: GREATER_THAN
                        subject: $auto_waarde
                        value: $drempelwaarde_inboedel_auto
                      - operation: EQUALS
                        subject: $auto_onmisbaar
                        value: false
                  then: $auto_waarde
              default: 0
          - output: financiele_middelen_vrijstelling
            value:
              operation: ADD
              values:
                - $kostennorm_bedrag
                - $verhoging_financiele_middelen_vrijstelling
          - output: liquide_als_vermogen
            value:
              operation: MAX
              values:
                - 0
                - operation: SUBTRACT
                  values:
                    - $liquide_middelen
                    - $financiele_middelen_vrijstelling
          - output: totaal_bezittingen
            value:
              operation: ADD
              values:
                - $inboedel_als_vermogen
                - operation: ADD
                  values:
                    - $auto_als_vermogen
                    - operation: ADD
                      values:
                        - $onroerend_goed_waarde
                        - operation: ADD
                          values:
                            - $liquide_als_vermogen
                            - $andere_bezittingen
          - output: vermogen_bedrag
            value:
              operation: MAX
              values:
                - 0
                - operation: SUBTRACT
                  values:
                    - $totaal_bezittingen
                    - $hoger_bevoorrechte_schulden
  - number: '13'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel13
    text: |
      1. Onder betalingscapaciteit, bedoeld in artikel 11, wordt verstaan het positieve verschil in de periode van 12 maanden
      vanaf de datum waarop het verzoek om kwijtschelding is ingediend van het gemiddeld per maand te verwachten
      netto-besteedbare inkomen van de belastingschuldige in die periode en de gemiddeld per maand te verwachten kosten van
      bestaan in die periode.

      2. Het netto-besteedbare inkomen van de belastingschuldige, bedoeld in het eerste lid, wordt vermeerderd met het
      gemiddeld per maand te verwachten netto-besteedbare inkomen in de periode van twaalf maanden vanaf de datum waarop het
      verzoek om kwijtschelding is ingediend van zijn echtgenoot, bedoeld in artikel 3 van de Algemene bijstandswet.
    machine_readable:
      execution:
        parameters:
          - name: bsn
            type: string
            required: true
          - name: waterschap_code
            type: string
            required: false
          - name: gemeente_code
            type: string
            required: false
          - name: netto_besteedbaar_inkomen_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: netto_besteedbaar_inkomen_partner_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
          - name: huishoudtype
            type: string
            required: true
          - name: is_pensioengerechtigd
            type: boolean
            required: true
          - name: extra_uitgaven_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Aanvullende maandelijkse uitgaven die niet al zijn verwerkt in netto_besteedbaar_inkomen,
              maar wel op grond van artikel 15 (eventueel via een verordening zoals artikel 3 van HHNK
              Kwijtscheldingsregeling + artikel 28 lid 3 URI 1990 voor netto kinderopvangkosten) in aanmerking worden
              genomen. Verlaagt betalingscapaciteit. Default 0.
        input:
          - name: kostennorm_bedrag
            type: amount
            type_spec:
              unit: eurocent
            source:
              output: kostennorm_bedrag
              parameters:
                bsn: $bsn
                waterschap_code: $waterschap_code
                gemeente_code: $gemeente_code
                huishoudtype: $huishoudtype
                is_pensioengerechtigd: $is_pensioengerechtigd
        output:
          - name: betalingscapaciteit
            type: amount
            type_spec:
              unit: eurocent
        actions:
          - output: betalingscapaciteit
            value:
              operation: MAX
              values:
                - 0
                - operation: MULTIPLY
                  values:
                    - 12
                    - operation: SUBTRACT
                      values:
                        - operation: SUBTRACT
                          values:
                            - operation: ADD
                              values:
                                - $netto_besteedbaar_inkomen_maand
                                - $netto_besteedbaar_inkomen_partner_maand
                            - $extra_uitgaven_maand
                        - $kostennorm_bedrag
  - number: '14'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel14
    text: |
      1. Onder het netto-besteedbare inkomen, bedoeld in artikel 13, wordt verstaan het met de in artikel 15 vermelde
      uitgaven verminderde gezamenlijke bedrag van:

      a. de aan inhouding van loonbelasting/premie voor de volksverzekeringen onderworpen inkomsten verminderd met de
      wettelijke inhoudingen en de ingehouden pensioenpremies en premies ziektekostenverzekering;

      b. uitkeringen voor levensonderhoud ingevolge de artikelen 157, 158 of 404 van Boek 1 van het Burgerlijk Wetboek;

      c. overige inkomsten met uitzondering van de uitkeringen ingevolge de Algemene Kinderbijslagwet, de artikelen 229d,
      tweede lid, en 255a van de Gemeentewet en een regeling voor persoonsgebonden budget, welke regeling is gegrond op
      artikel 1p, eerste lid, onderdeel d, van de Ziekenfondswet, alsmede inkomsten als bedoeld in artikel 43, tweede lid,
      onderdelen i, j, m en n, van de Algemene bijstandswet en, tot ten hoogste het bedrag genoemd in artikel 43, tweede lid,
      onderdeel p, van de Algemene bijstandswet, de subsidies, bedoeld in artikel 3, eerste lid, van de Wet inschakeling
      werkzoekenden, voorzover deze subsidies niet kunnen worden aangemerkt als premies als bedoeld in artikel 43, tweede
      lid, onderdelen i en j, van de Algemene bijstandswet.

      2. Tot de inkomsten, bedoeld in het eerste lid, onderdeel c, wordt ook gerekend de voorlopige teruggaaf, bedoeld in
      artikel 13, tweede lid, van de Algemene wet inzake rijksbelastingen, daaronder begrepen de aanspraak op een zodanige
      teruggaaf, met uitzondering van de daarin begrepen kinderkorting, aanvullende kinderkorting of toetrederskorting,
      bedoeld in hoofdstuk 8 van de Wet inkomstenbelasting 2001.

      3. Indien bij de vaststelling van de voorlopige teruggaaf rekening is gehouden met kinderkorting, aanvullende
      kinderkorting of toetrederskorting wordt voor de toepassing van het tweede lid het bedrag van de voorlopige teruggaaf
      zoveel mogelijk geacht betrekking te hebben op die kortingen.

      4. Voor de belastingschuldige, bedoeld in artikel 10, tweede lid, die in het kalenderjaar voorafgaande aan het verzoek
      om kwijtschelding een uitkering heeft genoten ingevolge de Wet inkomensvoorziening kunstenaars worden tot de inkomsten,
      bedoeld in het eerste lid, onderdeel c, ook gerekend de inkomsten uit de beroepsuitoefening. Deze inkomsten worden in
      aanmerking genomen voor het bedrag dat blijkt uit de opgave van de in het kalenderjaar genoten inkomsten die de
      belastingschuldige aan het college van burgemeester en wethouders moet verstrekken ten behoeve van de definitieve
      vaststelling van de hoogte van de uitkering, bedoeld in artikel 10 van de Wet inkomensvoorziening kunstenaars.

      5. Voor de belastingschuldige, bedoeld in artikel 10, tweede lid, die in het kalenderjaar voorafgaande aan het verzoek
      om kwijtschelding geen uitkering heeft genoten ingevolge de Wet inkomensvoorziening kunstenaars worden de inkomsten,
      bedoeld in het eerste lid, gesteld op de op hem van toepassing zijnde bijstandsnorm ingevolge hoofdstuk IV, afdeling 1,
      van de Algemene bijstandswet.
    machine_readable:
      execution:
        parameters:
          - name: loonbelastingplichtig_inkomen_netto_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
            description: Netto inkomen onderworpen aan loonbelasting/premie volksverzekeringen (lid 1
              onder a), dus bruto minus wettelijke inhoudingen, pensioenpremies en premies
              ziektekostenverzekering.
          - name: alimentatie_levensonderhoud_ontvangen_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Ontvangen uitkeringen voor levensonderhoud op grond van artikel 157, 158 of 404
              Boek 1 BW (lid 1 onder b). Default 0.
          - name: overige_inkomsten_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: |
              Overige inkomsten (lid 1 onder c) na aftrek van de uitzonderingen:
              - uitkeringen Algemene Kinderbijslagwet,
              - uitkeringen art 229d tweede lid en 255a Gemeentewet,
              - persoonsgebonden budget (art 1p eerste lid onder d Ziekenfondswet),
              - bijstand-specifieke subsidies uit art 43 tweede lid onderdelen i, j, m, n en
                tot max onderdeel p Algemene bijstandswet (= art 31 Participatiewet).
              Caller dient reeds deze uitzonderingen af te trekken. Default 0.
          - name: voorlopige_teruggaaf_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Voorlopige teruggaaf IB (lid 2), minus kinderkorting/aanvullende kinderkorting/
              toetrederskorting (lid 3). Gemiddeld per maand. Default 0.
          - name: inkomen_kunstenaars_beroepsuitoefening_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Aanvullende inkomsten uit beroepsuitoefening voor een kunstenaar (art 10 tweede
              lid, lid 4). Default 0.
        input:
          - name: uitgaven_totaal_maand
            type: amount
            type_spec:
              unit: eurocent
            source:
              output: uitgaven_totaal_maand
              parameters:
                netto_woonlasten_maand: $netto_woonlasten_maand
                premies_ziektekosten_maand: $premies_ziektekosten_maand
                betaalde_alimentatie_maand: $betaalde_alimentatie_maand
                aflossingen_belastingschulden_maand: $aflossingen_belastingschulden_maand
                kostgangerskosten_maand: $kostgangerskosten_maand
            description: Uitgaven per artikel 15 (in aanmerking te nemen uitgaven). Caller levert
              achterliggende bedragen; art 15 berekent het totaal (met netto-woonlastencap).
          - name: netto_woonlasten_maand
            type: amount
            type_spec:
              unit: eurocent
            source:
              parameters: {}
            description: Wordt door de caller van art 14 doorgegeven aan art 15. Placeholder om de
              parameter via source-forwarding beschikbaar te maken.
        output:
          - name: totaal_inkomen_maand
            type: amount
            type_spec:
              unit: eurocent
            description: Gezamenlijk inkomen (lid 1 onder a+b+c plus lid 2/4 aanvullingen), voor aftrek
              van uitgaven uit artikel 15.
          - name: netto_besteedbaar_inkomen_maand
            type: amount
            type_spec:
              unit: eurocent
            description: |
              Netto-besteedbaar inkomen per maand = totaal inkomen minus uitgaven (artikel 15). Dit is
              de input voor artikel 13 (betalingscapaciteit). Als de caller deze waarde reeds berekend
              aanlevert aan art 13, fungeert dit artikel als documentatie van de formule.
        actions:
          - output: totaal_inkomen_maand
            value:
              operation: ADD
              values:
                - $loonbelastingplichtig_inkomen_netto_maand
                - operation: ADD
                  values:
                    - $alimentatie_levensonderhoud_ontvangen_maand
                    - operation: ADD
                      values:
                        - $overige_inkomsten_maand
                        - operation: ADD
                          values:
                            - $voorlopige_teruggaaf_maand
                            - $inkomen_kunstenaars_beroepsuitoefening_maand
          - output: netto_besteedbaar_inkomen_maand
            value:
              operation: MAX
              values:
                - 0
                - operation: SUBTRACT
                  values:
                    - $totaal_inkomen_maand
                    - $uitgaven_totaal_maand
      untranslatables:
        - construct: lid 5 - inkomen gelijkstellen aan bijstandsnorm voor kunstenaars zonder uitkering
          reason: |
            Lid 5 schrijft voor dat voor de belastingschuldige bedoeld in artikel 10 lid 2 die geen
            kunstenaars-uitkering heeft genoten, het inkomen moet worden gesteld op "de op hem van
            toepassing zijnde bijstandsnorm ingevolge hoofdstuk IV, afdeling 1, van de Algemene
            bijstandswet". Dit vraagt een case-analyse (wie valt onder art 10 lid 2, welke norm is op
            hem van toepassing) die niet zonder verlies in een formule te vangen is.
          legal_text_excerpt: |
            Voor de belastingschuldige, bedoeld in artikel 10, tweede lid, die (...) geen uitkering
            heeft genoten (...) worden de inkomsten gesteld op de op hem van toepassing zijnde
            bijstandsnorm ingevolge hoofdstuk IV, afdeling 1, van de Algemene bijstandswet.
        - construct: verordeningsoptie AOW-netto als kostennorm-basis voor pensioengerechtigden
          reason: |
            Artikel 3 Regeling kwijtschelding belastingen medeoverheden staat toe dat een verordening
            voor pensioengerechtigden het netto-ouderdomspensioen in plaats van de bijstandsnorm
            hanteert; URI art 16 heeft hiervoor de alternatieve definities (netto_ouderdomspensioen_*)
            maar de keuze welk pad te nemen ligt bij de verordening. Deze configuratie per verordening
            is niet in het huidige engine-operation-set te representeren zonder dynamic dispatch per
            waterschap/gemeente/provincie.
  - number: '15'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel15
    text: |
      Als uitgaven als bedoeld in artikel 14, eerste lid, worden in aanmerking genomen:

      a. betalingen op belastingschulden, met uitzondering van die genoemd in artikel 8, tweede lid;

      b. het bedrag van de voor rekening van de belastingschuldige komende netto-woonlasten tot maximaal het bedrag, genoemd
      in artikel 13, eerste lid, onderdeel a, van de Huursubsidiewet, voorzover dit meer is dan het bedrag, genoemd in
      artikel 17, tweede lid, van die wet. Onder netto-woonlasten wordt verstaan: de op de belastingschuldige drukkende
      huurprijs, bedoeld in artikel 5, eerste lid, van genoemde wet, dan wel hypotheekrente en erfpachtcanon ter zake van een
      door hem bewoonde woning voorzover deze hem voor gebruik ter beschikking staat, verminderd met de ontvangen
      huursubsidie en bijzondere bijdrage in de huurlasten op grond van artikel 26b van genoemde wet of met de ontvangen
      woonkostentoeslag, andere dan die in de vorm van de verhogingen, genoemd in artikel 21, eerste lid, onderdeel d, van
      genoemde wet, onderscheidenlijk een daarmee overeenkomende verhoging ingevolge hoofdstuk IV, afdeling 2, van de
      Algemene bijstandswet;

      c. de niet door de werkgever ingehouden premies ziektekostenverzekering en de nominale premies ingevolge de
      Ziekenfondswet en de Algemene Wet Bijzondere Ziektekosten;

      d. betaalde uitkeringen voor levensonderhoud ingevolge de artikelen 157, 158 of 404 van Boek 1 van het Burgerlijk
      Wetboek;

      e. aflossingen op leningen voor zover die zijn aangewend voor de betaling van belastingschulden, met uitzondering van
      die genoemd in artikel 8, tweede lid;

      f. de met het houden van kostgangers verbonden kosten tot het totaal van:

      - het bedrag, genoemd in artikel 32, eerste lid, van de Uitvoeringsregeling loonbelasting 2001, voor een ontbijt en
      voor een warme maaltijd, en

      - het bedrag per dag, genoemd in artikel 34, eerste lid, onderdelen a, b, d en e, van de Uitvoeringsregeling
      loonbelasting 2001,

      doch ten hoogste de met het houden van kostgangers genoten inkomsten. Bij de bepaling van het aantal dagen wordt een
      volle maand op 30 dagen gesteld.
    machine_readable:
      definitions:
        woonlasten_maximum_maand:
          description: |
            Bovengrens voor in aanmerking te nemen netto-woonlasten per maand (eurocent). Verwijst
            naar artikel 13, eerste lid, onder a, Huursubsidiewet; sinds 2020 is dat feitelijk
            vervangen door artikel 13 Wet op de huurtoeslag. Waarde 2026: de rekenhuur-maxima zoals
            jaarlijks vastgesteld door de minister van BZK (per 1 januari 2026: EUR 879.66 = 87966
            eurocent).
          value: 87966
        woonlasten_drempel_maand:
          description: |
            Ondergrens voor in aanmerking te nemen netto-woonlasten per maand (eurocent). Verwijst
            naar artikel 17, tweede lid, Huursubsidiewet (feitelijk vervangen door art 17 lid 2 Wet
            op de huurtoeslag). Alleen het deel boven deze drempel telt mee. Waarde 2026: EUR 258.15
            = 25815 eurocent.
          value: 25815
      execution:
        parameters:
          - name: betalingen_belastingschulden_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Betalingen op belastingschulden (onder a), m.u.v. de aanslag waarvoor
              kwijtschelding wordt gevraagd (art 8 tweede lid). Default 0.
          - name: bruto_woonlasten_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Op belastingschuldige drukkende huurprijs (art 5 Huursubsidiewet) of
              hypotheekrente + erfpachtcanon. Default 0.
          - name: huursubsidie_ontvangen_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Ontvangen huursubsidie/huurtoeslag en bijzondere bijdrage in huurlasten
              (art 26b Huursubsidiewet) of woonkostentoeslag. Default 0.
          - name: premies_ziektekosten_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Niet door werkgever ingehouden premies ziektekostenverzekering en nominale
              premies Zvw/AWBZ (onder c). Default 0.
          - name: betaalde_alimentatie_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Betaalde uitkeringen voor levensonderhoud (art 157, 158 of 404 Boek 1 BW,
              onder d). Default 0.
          - name: aflossingen_belastingschulden_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Aflossingen op leningen aangewend voor betaling van belastingschulden (onder
              e), m.u.v. de aanslag waarvoor kwijtschelding wordt gevraagd. Default 0.
          - name: kostgangerskosten_maand
            type: amount
            type_spec:
              unit: eurocent
            required: false
            description: Met het houden van kostgangers verbonden kosten (onder f), reeds gecapped
              aan de bedragen van art 32/34 Uitvoeringsregeling loonbelasting 2001 en de kostgangers-
              inkomsten. Default 0.
        output:
          - name: netto_woonlasten_maand
            type: amount
            type_spec:
              unit: eurocent
            description: Netto-woonlasten = bruto-woonlasten − huursubsidie. Basis voor cap-berekening.
          - name: woonlasten_in_aanmerking_maand
            type: amount
            type_spec:
              unit: eurocent
            description: |
              In aanmerking te nemen woonlasten per maand, na toepassing cap: alleen het deel boven
              de drempel (art 17 lid 2 Huursubsidiewet) en tot maximaal het bedrag van art 13 lid 1
              onder a Huursubsidiewet. Niet-negatief.
          - name: uitgaven_totaal_maand
            type: amount
            type_spec:
              unit: eurocent
            description: Totaal van in aanmerking te nemen uitgaven (som a t/m f), input voor art 14.
        actions:
          - output: netto_woonlasten_maand
            value:
              operation: MAX
              values:
                - 0
                - operation: SUBTRACT
                  values:
                    - $bruto_woonlasten_maand
                    - $huursubsidie_ontvangen_maand
          - output: woonlasten_in_aanmerking_maand
            value:
              operation: MAX
              values:
                - 0
                - operation: SUBTRACT
                  values:
                    - operation: MIN
                      values:
                        - $netto_woonlasten_maand
                        - $woonlasten_maximum_maand
                    - $woonlasten_drempel_maand
          - output: uitgaven_totaal_maand
            value:
              operation: ADD
              values:
                - $betalingen_belastingschulden_maand
                - operation: ADD
                  values:
                    - $woonlasten_in_aanmerking_maand
                    - operation: ADD
                      values:
                        - $premies_ziektekosten_maand
                        - operation: ADD
                          values:
                            - $betaalde_alimentatie_maand
                            - operation: ADD
                              values:
                                - $aflossingen_belastingschulden_maand
                                - $kostgangerskosten_maand
  - number: '16'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel16
    text: |
      1. De kosten van bestaan, bedoeld in artikel 13, eerste lid, bedragen voor belastingschuldigen die worden aangemerkt
      als:

      a. echtgenoten als bedoeld in artikel 3 van de Algemene bijstandswet: 90 percent van het gezamenlijke bedrag, bedoeld
      in artikel 14, eerste lid, doch ten minste 90 percent van de bijstandsnorm, genoemd in artikel 30, eerste lid,
      onderdeel c, van de Algemene bijstandswet nadat deze is verminderd met het bedrag, genoemd in artikel 33, tweede lid,
      van die wet, en ten hoogste 90 percent van de bijstandsnorm, genoemd in artikel 30, eerste lid, onderdeel c, van die
      wet;

      b. een alleenstaande en een alleenstaande ouder als bedoeld in artikel 4, onderdeel a, onderscheidenlijk onderdeel b,
      van de Algemene bijstandswet: 90 percent van het gezamenlijke bedrag, bedoeld in artikel 14, eerste lid, doch ten
      minste 90 percent van de bijstandsnorm, genoemd in artikel 30, eerste lid, onderdeel a, onderscheidenlijk onderdeel b,
      van de Algemene bijstandswet, en ten hoogste 90 percent van die bijstandsnorm nadat deze is verhoogd met het bedrag,
      genoemd in artikel 33, tweede lid, van die wet.

      2. De kosten van bestaan, bedoeld in artikel 13, eerste lid, bedragen, in afwijking van het eerste lid, voor
      belastingschuldigen die worden aangemerkt als:

      a. echtgenoten als bedoeld in artikel 3 van de Algemene bijstandswet die 65 jaar of ouder zijn, onderscheidenlijk
      waarvan een echtgenoot 65 jaar of ouder is: 90 percent van de bijstandsnorm, genoemd in artikel 30, tweede lid,
      onderdeel c, onderscheidenlijk onderdeel d, van de Algemene bijstandswet;

      b. een alleenstaande en een alleenstaande ouder als bedoeld in artikel 4, onderdeel a, onderscheidenlijk onderdeel b,
      van de Algemene bijstandswet die 65 jaar of ouder zijn: 90 percent van de bijstandsnorm, genoemd in artikel 30, tweede
      lid, onderdeel a, onderscheidenlijk onderdeel b, van de Algemene bijstandswet.

      3. De kosten van bestaan, bedoeld in artikel 13, eerste lid, bedragen, in afwijking van de vorige leden, voor de
      belastingschuldige die ter verzorging of verpleging in een daartoe bestemde inrichting is opgenomen: de prijs die is
      verschuldigd voor verzorging dan wel verpleging, verhoogd met twee derden van de op hem van toepassing zijnde
      bijstandsnorm, genoemd in artikel 31 van de Algemene bijstandswet.
    machine_readable:
      definitions:
        bijstandsnorm_alleenstaand:
          description: Bijstandsnorm (eurocent per maand) voor een alleenstaande van 21 jaar of ouder en jonger dan de
            pensioengerechtigde leeftijd, artikel 21 onderdeel a Participatiewet. Bedrag per 1 januari 2026 inclusief 5%
            vakantie-uitkering.
          value: 140150
        bijstandsnorm_alleenstaande_ouder:
          description: Bijstandsnorm (eurocent per maand) voor een alleenstaande ouder. Sinds de Participatiewet-
            hervorming per 1 januari 2015 is de afzonderlijke alleenstaande-ouder-norm afgeschaft; de aanvullende
            bijstand voor alleenstaande ouders is vervangen door het kindgebonden budget. De norm is daarom gelijk aan
            die van de alleenstaande (artikel 21 onderdeel a Participatiewet). Bedrag per 1 januari 2026 inclusief 5%
            vakantie-uitkering.
          value: 140150
        bijstandsnorm_echtgenoten:
          description: Bijstandsnorm (eurocent per maand) voor gehuwden/samenwonenden waarvan beide echtgenoten 21 jaar of
            ouder zijn en jonger dan de pensioengerechtigde leeftijd, artikel 21 onderdeel b Participatiewet. Bedrag per
            1 januari 2026 inclusief 5% vakantie-uitkering.
          value: 200213
        bijstandsnorm_aow_alleenstaand:
          description: Bijstandsnorm (eurocent per maand) voor een alleenstaande die de pensioengerechtigde leeftijd heeft
            bereikt, artikel 22 onderdeel a Participatiewet. Bedrag per 1 januari 2026 inclusief 5% vakantie-uitkering.
          value: 156469
        bijstandsnorm_aow_echtgenoten:
          description: Bijstandsnorm (eurocent per maand) voor gehuwden/samenwonenden waarvan ten minste een echtgenoot de
            pensioengerechtigde leeftijd heeft bereikt, artikel 22 onderdeel b Participatiewet. Bedrag per 1 januari 2026
            inclusief 5% vakantie-uitkering.
          value: 214416
        netto_ouderdomspensioen_alleenstaand:
          description: Netto-ouderdomspensioen (eurocent per maand) voor een ongehuwde pensioengerechtigde, artikel 9 lid 1
            onderdeel a Algemene Ouderdomswet, na aftrek loonbelasting + premies volksverzekeringen + inkomensafhankelijke
            bijdrage Zvw (artikel 41 Zvw). Conform artikel 3 lid 3 Regeling kwijtschelding belastingen medeoverheden.
            Bruto-bedrag 2026 per SVB-publicatie Staatscourant 2025 inclusief 5% vakantie-uitkering; netto-omrekening op
            basis van tarieven eerste schijf loonbelasting 2026.
          value: 155815
        netto_ouderdomspensioen_echtgenoten:
          description: Netto-ouderdomspensioen (eurocent per maand, gezamenlijk) voor twee gehuwde pensioengerechtigden
            (tweemaal het netto-AOW-bedrag voor een gehuwde pensioengerechtigde per artikel 9 lid 1 onderdeel b AOW).
            Conform artikel 3 lid 2 onderdeel a Regeling kwijtschelding belastingen medeoverheden. Bedrag per 1 januari 2026
            per SVB-publicatie inclusief 5% vakantie-uitkering.
          value: 213540
      open_terms:
        - id: kostennorm_percentage
          description: Percentage van de bijstandsnorm dat als kosten van bestaan geldt. Bij ministeriele regeling (Regeling
            kwijtschelding belastingen medeoverheden, artikel 2) kan een verordening van een medeoverheid dit verhogen tot
            maximaal 100 procent.
          type: number
          required: false
          delegated_to: provincie, gemeente of waterschap
          delegation_type: WATERSCHAPS_VERORDENING
          legal_basis: artikel 2 Regeling kwijtschelding belastingen medeoverheden
          default:
            actions:
              - output: kostennorm_percentage
                value: 0.9
      execution:
        parameters:
          - name: bsn
            type: string
            required: true
          - name: waterschap_code
            type: string
            required: false
          - name: gemeente_code
            type: string
            required: false
          - name: huishoudtype
            type: string
            required: true
          - name: is_pensioengerechtigd
            type: boolean
            required: true
        output:
          - name: kostennorm_bedrag
            type: amount
            type_spec:
              unit: eurocent
        actions:
          - output: kostennorm_bedrag
            value:
              operation: MULTIPLY
              values:
                - $kostennorm_percentage
                - operation: IF
                  cases:
                    - when:
                        operation: EQUALS
                        subject: $is_pensioengerechtigd
                        value: true
                      then:
                        operation: IF
                        cases:
                          - when:
                              operation: EQUALS
                              subject: $huishoudtype
                              value: echtgenoten
                            then: $netto_ouderdomspensioen_echtgenoten
                        default: $netto_ouderdomspensioen_alleenstaand
                  default:
                    operation: IF
                    cases:
                      - when:
                          operation: EQUALS
                          subject: $huishoudtype
                          value: echtgenoten
                        then: $bijstandsnorm_echtgenoten
                      - when:
                          operation: EQUALS
                          subject: $huishoudtype
                          value: alleenstaande_ouder
                        then: $bijstandsnorm_alleenstaande_ouder
                    default: $bijstandsnorm_alleenstaand
  - number: '17'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel17
    text: |
      Indien geen betalingscapaciteit aanwezig is of wel betalingscapaciteit aanwezig is doch die betalingscapaciteit niet
      voldoende is om de belastingaanslagen waarvoor kwijtschelding is verzocht te voldoen, wordt ingeval sprake is van
      aflossingen op schulden, andere dan die waarmee bij de berekening van de betalingscapaciteit rekening is gehouden en
      die aflossingen meer dan € 136 per maand bedragen, slechts in zeer bijzondere omstandigheden kwijtschelding verleend.
    machine_readable:
      definitions:
        drempel_aflossingen_andere_schulden_maand:
          description: >-
            Drempelwaarde (eurocent) waarboven aflossingen op andere schulden (niet reeds
            verwerkt in betalingscapaciteit) leiden tot het vereiste van "zeer bijzondere
            omstandigheden". Artikel 17 URI, EUR 136 per maand, is 13600 eurocent.
          value: 13600
      execution:
        parameters:
          - name: aflossingen_andere_schulden_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
            description: Aflossingen op schulden die niet reeds in de betalingscapaciteit-berekening
              zijn meegenomen (bv. niet onder art 15 onder e vallen omdat ze niet voor
              belastingschulden zijn aangewend).
          - name: zeer_bijzondere_omstandigheden
            type: boolean
            required: false
            description: Beoordeling door de ontvanger of sprake is van "zeer bijzondere omstandigheden".
              Default false.
          - name: betalingscapaciteit_toereikend
            type: boolean
            required: true
            description: True indien betalingscapaciteit toereikend is om de aanslag(en) te voldoen
              (dan is art 17 niet van toepassing).
        output:
          - name: drempel_overschreden
            type: boolean
            description: True als de aflossingen op andere schulden de drempel van EUR 136/maand
              overschrijden.
          - name: bijzondere_omstandigheden_vereist
            type: boolean
            description: True als op grond van artikel 17 uitsluitend kwijtschelding kan worden
              verleend indien zeer bijzondere omstandigheden bestaan.
          - name: kwijtschelding_blokkade_art_17
            type: boolean
            description: |
              True als artikel 17 kwijtschelding blokkeert: drempel overschreden EN geen zeer
              bijzondere omstandigheden. False als art 17 niet van toepassing is of de uitzondering
              ("zeer bijzondere omstandigheden") geldt.
        actions:
          - output: drempel_overschreden
            value:
              operation: GREATER_THAN
              subject: $aflossingen_andere_schulden_maand
              value: $drempel_aflossingen_andere_schulden_maand
          - output: bijzondere_omstandigheden_vereist
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $drempel_overschreden
                  value: true
                - operation: EQUALS
                  subject: $betalingscapaciteit_toereikend
                  value: false
          - output: kwijtschelding_blokkade_art_17
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $bijzondere_omstandigheden_vereist
                  value: true
                - operation: EQUALS
                  subject: $zeer_bijzondere_omstandigheden
                  value: false
  - number: '27'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel27
    text: |
      Deze afdeling heeft betrekking op:

      a. provinciale belastingen als bedoeld in hoofdstuk XV, paragraaf 2, van de Provinciewet alsmede belastingen waarvan de
      heffing krachtens andere wetten door de provincie geschiedt;

      b. gemeentelijke belastingen als bedoeld in hoofdstuk XV, paragraaf 2 en 3, van de Gemeentewet alsmede belastingen
      waarvan de heffing krachtens andere wetten door de gemeente geschiedt;

      c. waterschapsbelastingen als bedoeld in hoofdstuk XVI van de Waterschapswet alsmede belastingen waarvan de heffing
      krachtens bijzondere wetten door het waterschap geschiedt;

      d. de beveiligingsheffing ingevolge artikel 37j van de Luchtvaartwet;

      e. de geluidsheffing burgerluchtvaart ingevolge artikel 77 van de Luchtvaartwet;

      f. de heffingen ingevolge hoofdstuk IV van de Meststoffenwet;

      g. de heffing ingevolge artikel 91a van de Gezondheids- en welzijnswet voor dieren, alsmede bij algemene maatregel van
      bestuur ingevolge artikel 91h of artikel 92 van die wet ingevoerde heffingen;

      h. de verontreinigingsheffing rijkswateren ingevolge artikel 23 van de Wet verontreiniging oppervlaktewateren.
  - number: '28'
    url: https://wetten.overheid.nl/BWBR0004766/2026-01-01#Artikel28
    text: |
      1. Met betrekking tot een verzoek om kwijtschelding van de in artikel 27 genoemde belastingen en heffingen verschuldigd
      door:

      a. een natuurlijk persoon die geen bedrijf of niet zelfstandig een beroep uitoefent, zijn de afdelingen 1, 2 en 5 van
      overeenkomstige toepassing;

      b. een natuurlijk persoon die een bedrijf of zelfstandig een beroep uitoefent, zijn de afdelingen 1, 3, 4 en 5 van
      overeenkomstige toepassing;

      c. een rechtspersoon zijn de afdelingen 1, 3 en 5 van overeenkomstige toepassing;

      d. een natuurlijk persoon die een uitkering geniet ingevolge de Wet inkomensvoorziening kunstenaars zijn de artikelen
      10, tweede lid, en 14, vierde en vijfde lid, van overeenkomstige toepassing.

      2. Waar in artikel 9, tweede lid, en in afdeling 5 sprake is van directeur wordt voor:

      a. provinciale belastingen gelezen: gedeputeerde staten;

      b. gemeentelijke belastingen gelezen: het college van burgemeester en wethouders;

      c. waterschapsbelastingen gelezen: het dagelijks bestuur;

      d. de beveiligingsheffing gelezen: het hoofd van de Directie Politie van het Ministerie van Justitie;

      e. de geluidsheffing burgerluchtvaart gelezen: de directeur-hoofdinspecteur van de divisie Luchtvaart van de Inspectie
      Verkeer en Waterstaat;

      f. de heffingen ingevolge hoofdstuk IV van de Meststoffenwet, de heffing ingevolge artikel 91a van de Gezondheids- en
      welzijnswet voor dieren, alsmede bij algemene maatregel van bestuur ingevolge artikel 91h of artikel 92 van die wet
      ingevoerde heffingen gelezen: de directeur Financiële en Economische Zaken van het Ministerie van Landbouw,
      Natuurbeheer en Visserij.

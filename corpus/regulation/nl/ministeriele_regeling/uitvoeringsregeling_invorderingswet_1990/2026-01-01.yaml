$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/tags/schema-v0.5.2/schema/v0.5.2/schema.json
$id: uitvoeringsregeling_invorderingswet_1990
regulatory_layer: MINISTERIELE_REGELING
publication_date: '2025-07-11'
valid_from: '2026-01-01'
bwb_id: BWBR0004766
url: https://wetten.overheid.nl/BWBR0004766/2026-01-01
name: Uitvoeringsregeling Invorderingswet 1990
competent_authority:
  name: Minister van Financiën
legal_basis:

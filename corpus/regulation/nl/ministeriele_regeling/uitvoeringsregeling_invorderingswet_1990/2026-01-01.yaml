    text: |
      1. Met betrekking tot een verzoek om kwijtschelding van de in artikel 27 genoemde belastingen en heffingen verschuldigd
      door:

      a. een natuurlijk persoon die geen bedrijf of niet zelfstandig een beroep uitoefent, zijn de afdelingen 1, 2 en 5 van
      overeenkomstige toepassing;

      b. een natuurlijk persoon die een bedrijf of zelfstandig een beroep uitoefent, zijn de afdelingen 1, 3, 4 en 5 van
      overeenkomstige toepassing;

      c. een rechtspersoon zijn de afdelingen 1, 3 en 5 van overeenkomstige toepassing;

      d. een natuurlijk persoon die een uitkering geniet ingevolge de Wet inkomensvoorziening kunstenaars zijn de artikelen
      10, tweede lid, en 14, vierde en vijfde lid, van overeenkomstige toepassing.

      2. Waar in artikel 9, tweede lid, en in afdeling 5 sprake is van directeur wordt voor:

      a. provinciale belastingen gelezen: gedeputeerde staten;

      b. gemeentelijke belastingen gelezen: het college van burgemeester en wethouders;

      c. waterschapsbelastingen gelezen: het dagelijks bestuur;

      d. de beveiligingsheffing gelezen: het hoofd van de Directie Politie van het Ministerie van Justitie;

      e. de geluidsheffing burgerluchtvaart gelezen: de directeur-hoofdinspecteur van de divisie Luchtvaart van de Inspectie
      Verkeer en Waterstaat;

      f. de heffingen ingevolge hoofdstuk IV van de Meststoffenwet, de heffing ingevolge artikel 91a van de Gezondheids- en
      welzijnswet voor dieren, alsmede bij algemene maatregel van bestuur ingevolge artikel 91h of artikel 92 van die wet
      ingevoerde heffingen gelezen: de directeur Financiële en Economische Zaken van het Ministerie van Landbouw,
      Natuurbeheer en Visserij.

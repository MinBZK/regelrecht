  - number: '2.1'
    text: |-
      1 De Minister kan op aanvraag subsidie verstrekken aan een leverancier voor het in 2023 toepassen van
      een prijsplafond overeenkomstig deze regeling bij het leveren van elektriciteit, gas of warmte aan
      kleinverbruikaansluitingen.

      2 Bij toepassing van het prijsplafond hanteert de subsidieontvanger in 2023 het plafondtarief voor gas,
      elektriciteit of warmte in plaats van het contractuele leveringstarief bij de levering van elektriciteit, gas of
      warmte aan kleinverbruikaansluitingen tot het bijbehorende volumeplafond.

      3 De leverancier kan de toepassing van het prijsplafond op de levering van gas, elektriciteit of warmte aan een
      kleinverbruikaansluiting achterwege laten, indien de betreffende kleinverbruiker hierom verzoekt.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.1
  - number: '2.2'
    text: |-
      1 Het plafondtarief voor elektriciteit wordt vastgesteld op: € 0,24755 per kWh.

      2 Het plafondtarief voor gas wordt vastgesteld op: € 0,85734 per m3(n).

      3 Het plafondtarief voor warmte wordt vastgesteld op: € 47,38 per GJ.

      4 De plafondtarieven, bedoeld in de voorgaande leden, zijn exclusief energiebelasting en ODE en inclusief 21% btw.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.2
    machine_readable:
      execution:
        # Tariffs are euro-per-unit rates with up to five decimals (lid 4: excl.
        # energiebelasting/ODE, incl. 21% btw). Typed `number` because the corpus
        # `amount` convention is whole eurocents and the schema's type_spec has no
        # per-unit tariff unit (EUR/kWh, EUR/m3(n), EUR/GJ) yet.
        output:
          - name: plafondtarief_elektriciteit  # EUR per kWh
            type: number
          - name: plafondtarief_gas  # EUR per m3(n)
            type: number
          - name: plafondtarief_warmte  # EUR per GJ
            type: number
        actions:
          # Lid 1: "Het plafondtarief voor elektriciteit wordt vastgesteld op: € 0,24755 per kWh."
          - output: plafondtarief_elektriciteit
            value: 0.24755
          # Lid 2: "... voor gas ... € 0,85734 per m3(n)."
          - output: plafondtarief_gas
            value: 0.85734
          # Lid 3: "... voor warmte ... € 47,38 per GJ."
          - output: plafondtarief_warmte
            value: 47.38
  - number: '2.3'
    text: |-
      1 Het volumeplafond voor elektriciteit wordt vastgesteld op: 2.900 kWh elektriciteit per kleinverbruikaansluiting
      per jaar.

      2 Het volumeplafond voor gas wordt vastgesteld op: 1.200 m3(n) gas per kleinverbruikaansluiting per jaar.

      3 Het volumeplafond voor warmte wordt vastgesteld op: 37,0 GJ warmte per kleinverbruikaansluiting per
      leveringsovereenkomst per jaar.

      4 Het volumeplafond voor warmte, bedoeld in het derde lid, is niet van toepassing op de hoeveelheid warmte
      die is geleverd voor de opwarming van tapwater, indien die hoeveelheid warmte afzonderlijk wordt bemeten en de
      leveringskosten daarvoor afzonderlijk worden gefactureerd.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.3
    machine_readable:
      execution:
        output:
          - name: volumeplafond_elektriciteit
            type: number
          - name: volumeplafond_gas
            type: number
          - name: volumeplafond_warmte
            type: number
        actions:
          # Lid 1: "Het volumeplafond voor elektriciteit wordt vastgesteld op: 2.900 kWh ... per jaar."
          - output: volumeplafond_elektriciteit
            value: 2900
          # Lid 2: "... voor gas ... 1.200 m3(n) ... per jaar."
          - output: volumeplafond_gas
            value: 1200
          # Lid 3: "... voor warmte ... 37,0 GJ ... per jaar."
          - output: volumeplafond_warmte
            value: 37.0
  - number: '2.4'
    text: |-
      Indien aan een kleinverbruikaansluiting in 2023 elektriciteit wordt ingevoed op het elektriciteitsnet,
      vindt voor de toepassing van het volumeplafond bij het verstrekken van de eindfactuur de
      berekening van de hoeveelheid elektriciteit die in 2023 aan de kleinverbruikaansluiting is geleverd
      plaats met overeenkomstige toepassing van de wijze van berekening van het verbruik, bedoeld in
      [artikel 31c, eerste of tweede lid, van de Elektriciteitswet 1998][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0009755#Artikel31c
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.4
    references:
      - id: ref1
        bwb_id: BWBR0009755
        artikel: 31c
  - number: '2.5'
    text: |-
      Indien voor de levering van elektriciteit of gas een eindfactuur wordt verstrekt die betrekking heeft
      op een periode in 2023, bedraagt het deel van het volumeplafond over die periode de som van de van de in
      [bijlage II][ref1] opgenomen standaardvolumefracties per dag in 2023 voor elektriciteit of gas die van toepassing
      zijn op die periode.


      [ref1]: https://wetten.overheid.nl/BWBR0047628
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.5
    references:
      - id: ref1
        bwb_id: BWBR0047628
  - number: '2.6'
    text: |-
      De subsidie wordt verleend onder de volgende opschortende voorwaarden:

      a. goedkeuring van de Europese Commissie in een procedure als bedoeld in artikel 108, derde lid, van het Verdrag
      betreffende de werking van de Europese Unie met betrekking tot deze regeling;

      b. instemming van de Staten-Generaal met het bij brief van de Minister van Economische Zaken en Klimaat van
      17 november 2022 ingediende voorstel van wet tot wijziging van de begrotingsstaat van het Ministerie van
      Economische Zaken en Klimaat (XIII) voor het jaar 2022 (Tiende incidentele suppletoire begroting inzake regelingen
      in verband met hoge energieprijzen), Kamerstukken II, vergaderjaar 2022/23, 36252.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.6
  - number: '2.7'
    text: |-
      1 De Minister maakt na de datum van subsidieverlening de gegevens bekend, bedoeld in paragraaf 3, onderdeel 76, van
      het Tijdelijk crisiskader voor staatssteunmaatregelen ter ondersteuning van de economie na de Russische agressie
      tegen Oekraïne (PbEU 2022, C 426/01).

      2 De gegevens, bedoeld in het tweede lid, blijven ten minste tien jaar openbaar beschikbaar.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel2.7
  - number: '3.1'
    text: |-
      Indien subsidie wordt verstrekt voor de toepassing van het prijsplafond voor elektriciteit maar niet voor gas,
      wordt de hoogte van de subsidie berekend volgens de formule:

      waarbij *kva, THE, CLE, PTE, TUK en OBE* achtereenvolgens staan voor:

      *kva*: kleinverbruikaansluiting;

      *THE*: de totale hoeveelheid elektriciteit in kWh die de subsidieontvanger in 2023 per kleinverbruikaansluiting
      heeft geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt.
      Hierbij wordt gerekend met een maximale bovengrens van het volumeplafond voor elektriciteit en een ondergrens van
      nul;

      *CLE*: het gemiddelde contractuele leveringstarief voor elektriciteit in € per kWh per kleinverbruikaansluiting,
      op basis van de leveringstarieven in € per kWh die in 2023 door de subsidieontvanger in rekening zijn gebracht
      aan de kleinverbruikaansluiting gewogen naar de hoeveelheid elektriciteit die in 2023 is geleverd aan deze
      kleinverbruikaansluiting, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is
      verstrekt;

      *PTE*: het plafondtarief voor elektriciteit;

      *TUK*: een tegemoetkoming in de uitvoeringskosten voor de toepassing van het prijsplafond, berekend overeenkomstig
      [artikel 3.6][ref1];

      *OBE*: de overschrijding van de in 2023 gerealiseerde brutomarge voor elektriciteit ten opzichte van de historische
      referentiewaarde van de brutomarge voor elektriciteit in €, bepaald overeenkomstig [bijlage III][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel3.6
      [ref2]: https://wetten.overheid.nl/BWBR0047628
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel3.1
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: '3.6'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0047628
  - number: '3.2'
    text: |-
      Indien subsidie wordt verstrekt voor de toepassing van het prijsplafond voor gas maar niet voor elektriciteit,
      wordt de hoogte van de subsidie berekend volgens de formule:

      waarbij *kva, THG, CLG, PTG, TUK* en *OBG,* achtereenvolgens staan voor:

      *kva*: kleinverbruikaansluiting;

      *THG*: de totale hoeveelheid gas in m3(n) die de subsidieontvanger in 2023 per kleinverbruikaansluiting heeft
      geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt. Hierbij
      wordt gerekend met een maximale bovengrens van het volumeplafond voor gas en een ondergrens van nul;

      *CLG*: het gemiddelde contractuele leveringstarief voor gas in € per m3(n) per kleinverbruikaansluiting, op basis
      van de leveringstarieven in € per m3(n) die in 2023 door de subsidieontvanger in rekening zijn gebracht aan de
      kleinverbruikaansluiting gewogen naar de hoeveelheid gas die in 2023 is geleverd aan deze kleinverbruikaansluiting,
      waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt;

      *PTG*: het plafondtarief voor gas;

      *TUK*: een tegemoetkoming in de uitvoeringskosten voor de toepassing van het prijsplafond, berekend overeenkomstig
      [artikel 3.6][ref1];

      *OBG*: de overschrijding van de in 2023 gerealiseerde brutomarge voor gas ten opzichte van de historische
      referentiewaarde van de brutomarge voor gas in €, bepaald overeenkomstig [bijlage III][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel3.6
      [ref2]: https://wetten.overheid.nl/BWBR0047628
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: '3.6'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0047628
  - number: '3.3'
    text: |-
      Indien subsidie wordt verstrekt voor de toepassing van het prijsplafond voor zowel elektriciteit als gas, wordt de
      hoogte van de subsidie berekend volgens de formule:

      waarbij kva, THE, CLE, PTE, TUK, THG, CLG, PTG en OBEG achtereenvolgens staan voor:

      *kva*: kleinverbruikaansluiting;

      *THE*: de totale hoeveelheid elektriciteit in kWh die de subsidieontvanger in 2023 per kleinverbruikaansluiting
      heeft geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt.
      Hierbij wordt gerekend met een maximale bovengrens van het volumeplafond voor elektriciteit en een ondergrens van
      nul;

      *CLE*: het gemiddelde contractuele leveringstarief voor elektriciteit in € per kWh per kleinverbruikaansluiting,
      op basis van de leveringstarieven in € per kWh die in 2023 door de subsidieontvanger in rekening zijn gebracht
      aan de kleinverbruikaansluiting gewogen naar de hoeveelheid elektriciteit die in 2023 is geleverd aan deze
      kleinverbruikaansluiting, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is
      verstrekt;

      *PTE*: het plafondtarief voor elektriciteit;

      *TUK*: een tegemoetkoming in de uitvoeringskosten voor de toepassing van het prijsplafond, berekend overeenkomstig
      [artikel 3.6][ref1];

      *THG*: de totale hoeveelheid gas in m3(n) die de subsidieontvanger in 2023 per kleinverbruikaansluiting heeft
      geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt. Hierbij
      wordt gerekend met een maximale bovengrens van het volumeplafond voor gas en een ondergrens van nul;

      *CLG*: het gemiddelde contractuele leveringstarief voor gas in € per m3(n) per kleinverbruikaansluiting, op basis
      van de leveringstarieven in € per m3(n) die in 2023 door de subsidieontvanger in rekening zijn gebracht aan de
      kleinverbruikaansluiting gewogen naar de hoeveelheid gas die in 2023 is geleverd aan deze kleinverbruikaansluiting,
      waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt;

      *PTG*: het plafondtarief voor gas;

      *OBEG*: de overschrijdingen van de in 2023 gerealiseerde brutomarge voor elektriciteit en gas ten opzichte van de
      historische referentiewaardes voor elektriciteit en gas in €, bepaald overeenkomstig [bijlage III][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel3.6
      [ref2]: https://wetten.overheid.nl/BWBR0047628
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel3.3

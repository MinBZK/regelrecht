  - number: '4.1'
    text: |-
      1 Een aanvraag voor subsidieverlening kan worden ingediend in de periode van 12 december 2022, 09:00 uur, tot
      16 januari 2023, 17.00 uur.

      2 De aanvraag kan ook na de periode, genoemd in het eerste lid, binnen de volgende termijnen maar uiterlijk
      15 november 2023, 17.00 uur, worden ingediend indien:

      a. aan de aanvrager een vergunning is verleend als bedoeld in [artikel 95a van de Elektriciteitswet 1998][ref1]:
      binnen twee maanden na verlening van die vergunning;

      b. de aanvrager een overeenkomst tot het leveren van elektriciteit aan een groep afnemers heeft afgesloten als
      bedoeld in [95n van de Elektriciteitswet 1998][ref2]: binnen twee maanden na ondertekening van die overeenkomst
      door alle partijen;

      c. de aanvrager een buiten Nederland gevestigde leverancier van elektriciteit is aan ten hoogste 500 afnemers als
      bedoeld in [artikel 95a, tweede lid, onderdeel b, van de Elektriciteitswet 1998][ref3]: binnen twee maanden na het
      beginnen met het leveren van elektriciteit aan die afnemers;

      d. aan de aanvrager een vergunning is verleend als bedoeld in [artikel 43, eerste lid, van de Gaswet][ref4]: binnen
      twee maanden na verlening van die vergunning;

      e. de aanvrager een buiten Nederland gevestigde leverancier van gas is aan ten hoogste 500 afnemers als bedoeld in
      [artikel 43, tweede lid, onderdeel a, van de Gaswet][ref5]: binnen twee maanden na het beginnen met leveren van gas
      aan die afnemers;

      f. de aanvrager een leverancier is die een overeenkomst heeft tot het leveren van gas aan een groep afnemers als
      bedoeld in [artikel 52c van de Gaswet][ref6]: binnen twee maanden na ondertekening van de overeenkomst door alle
      partijen;

      g. de aanvrager is begonnen met de levering van warmte als bedoeld in [artikel 2 van de Warmtewet][ref7]: binnen
      twee maanden na het begin van die levering.


      [ref1]: https://wetten.overheid.nl/BWBR0009755#Artikel95a
      [ref2]: https://wetten.overheid.nl/BWBR0009755#Artikel95n
      [ref3]: https://wetten.overheid.nl/BWBR0009755#Artikel95a
      [ref4]: https://wetten.overheid.nl/BWBR0011440#Artikel43

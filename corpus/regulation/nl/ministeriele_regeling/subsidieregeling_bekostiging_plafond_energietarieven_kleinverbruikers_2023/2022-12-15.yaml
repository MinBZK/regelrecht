  - number: '5.3'
    text: |-
      1 De subsidieontvanger voert een zodanige administratie dat daaruit op elk moment op een eenvoudige en duidelijke
      wijze is af te leiden dat hij voldoet aan de bij deze regeling gestelde eisen.

      2 De subsidieontvanger bewaart de administratie tot tien jaar na de datum van de beschikking tot de
      subsidievaststelling.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.3
  - number: '5.4'
    text: |-
      De subsidieontvanger verleent gedurende vijf jaar na de datum van de beschikking tot subsidievaststelling
      medewerking aan een evaluatie door de Minister van de doeltreffendheid en de effecten van de aan hem verleende
      subsidie, voor zover medewerking redelijkerwijs van hem kan worden verlangd.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.4
  - number: '5.5'
    text: |-
      Voor het maandelijks corrigeren van het cumulatieve voorschot, bedoeld in [artikel 6.1.2, eerste lid][ref1],
      verstrekt de subsidieontvanger na afloop van een kalendermaand waarvoor hij een voorschot heeft ontvangen, aan de
      Minister gegevens over:

      a. het aantal kleinverbruikaansluitingen waaraan in die voorgaande kalendermaand elektriciteit of gas is geleverd;

      b. de hoeveelheid elektriciteit in kWh of gas in m3(n) die in die voorgaande kalendermaand is geleverd aan
      kleinverbruikaansluitingen, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur
      is verstrekt;

      c. voor elektriciteit: het gemiddelde contractuele leveringstarief voor elektriciteit in € per kWh per
      kleinverbruikaansluiting, op basis van de leveringstarieven in € per kWh die in de voorgaande kalendermaand of
      kalendermaanden in 2023 door de subsidieontvanger in rekening zijn gebracht aan de kleinverbruikaansluiting,
      gewogen naar de hoeveelheid elektriciteit die in de voorgaande kalendermaand of kalendermaanden in 2023 is
      geleverd aan deze kleinverbruikaansluiting, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een
      eindfactuur is verstrekt;

      d. voor gas: het gemiddelde contractuele leveringstarief voor gas in € per m3(n) per kleinverbruikaansluiting, op
      basis van de leveringstarieven in € per m3(n) die in de voorgaande kalendermaand of kalendermaanden in 2023 door de
      subsidieontvanger in rekening zijn gebracht aan de kleinverbruikaansluiting gewogen naar de hoeveelheid gas die in
      de voorgaande kalendermaand of kalendermaanden in 2023 is geleverd aan deze kleinverbruikaansluiting, waarvoor de
      toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt;

      e. voor alle kleinverbruikaansluitingen waarvoor in die voorgaande maand eindfactuur is verstrekt, opgeteld het
      voorschot dat is verstrekt in de periode waar de eindfactuur op ziet.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.1.2
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.5

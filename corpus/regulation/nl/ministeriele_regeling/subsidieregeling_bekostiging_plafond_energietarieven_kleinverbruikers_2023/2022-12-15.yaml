  - number: '3.6'
    text: |-
      De hoogte van de tegemoetkoming in de uitvoeringskosten, bedoeld in de [artikelen 3.1][ref1], [3.2][ref2],
      [3.3][ref3] en [3.5][ref4], wordt berekend volgens de formule:

      waarbij *DLOkva, kva* en

      achtereenvolgens staan voor:

      *DLOkva*: het aantal dagen in 2023 dat er een leveringsovereenkomst voor de levering van elektriciteit, gas of
      warmte is gesloten met de kleinverbruikaansluiting;

      *kva*: kleinverbruikaansluiting;

      : de som van het bedrag per kleinverbruikaansluiting voor alle kleinverbruikaansluitingen.



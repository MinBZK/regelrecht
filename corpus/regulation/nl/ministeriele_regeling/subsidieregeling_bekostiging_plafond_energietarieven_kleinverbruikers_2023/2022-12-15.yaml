  - number: '4.2'
    text: |-
      1 Een aanvraag voor subsidieverlening wordt ingediend met gebruikmaking van een middel dat door de Minister
      beschikbaar wordt gesteld.

      2 De aanvraag omvat in ieder geval:

      a. gegevens over de subsidieaanvrager waaronder het nummer van registratie in het handelsregister, het post- en
      bezoekadres, en het rekeningnummer;

      b. gegevens over de contactpersoon bij de subsidieaanvrager, waaronder de naam, het telefoonnummer en het e-
      mailadres;

      c. een beschrijving van de methode van data-extractie uit de eigen administratie van de gegevens die gevraagd
      worden bij een aanvraag voor een voorschot;

      d. een beschrijving van de wijze van toepassing van prijsplafond;

      e. een verklaring over de juistheid van de bij de aanvraag overlegde gegevens die is ondertekend door de bestuurder
      van de subsidieaanvrager;

      f. indien de subsidieaanvrager lid is van een groep: een opgave van de samenstelling van de groep.

      3 Indien de aanvraag de toepassing van het prijsplafond voor elektriciteit of
      gas betreft, gaat de aanvraag vergezeld van de bedrijfs-EAN-code, bedoeld in
      [artikel 2.8.2, onderdeel a, van de Informatiecode elektriciteit en gas][ref1].

      4 Indien de aanvraag warmte betreft, gaat de aanvraag vergezeld van:

      a. indien de subsidieaanvrager houder is van een vergunning op grond van
      [artikel 9, eerste lid, van de Warmtewet][ref2]: een afschrift van de vergunning;

      b. indien gevallen anders dan bedoeld in onderdeel a:

      i. representatieve voorbeelden van de gehanteerde leveringsovereenkomsten voor warmte, in geanonimiseerde vorm;

      ii. een beschrijving van het warmtenet met in ieder geval de locatie van het net op postcodeniveau en het aantal
      bemeten kleinverbruikaansluitingen voor warmte waarvoor de subsidieaanvrager leveringsovereenkomsten heeft
      afgesloten.

      5 De aanvraag gaat vergezeld van een verklaring waarmee de subsidieaanvrager ermee instemt dat een netbeheerder
      als bedoeld in [artikel 79, eerste lid, van de Elektriciteitswet 1998][ref3] of een netbeheerder als bedoeld in
      [artikel 37, eerste lid, van de Gaswet][ref4] op verzoek van de Minister voor de uitvoering van deze regeling
      periodiek in ieder geval gegevens verstrekt uit het centraal aansluitingenregister per bedrijfs-EAN over het:

      a. het aantal kleinverbruikaansluitingen;

      b. het aantal kleinverbruikaansluitingen die wel in het centraal aansluitingenregister zijn opgenomen maar waarvoor
      nog geen standaardjaarafname, standaardjaarinvoeding of standaardjaarverbruik in het centraal aansluitingenregister
      is opgenomen;

      c. het aantal kleinverbruikaansluitingen waarvoor de standaardjaarafname, verminderd met de standaarjaarinvoeding,
      of het standaardjaarverbruik hoger is dan 2.900 kWh of 1.200 m3(n);

      d. het aantal kleinverbruikaansluitingen waarvoor de standaardjaarafname, verminderd met de standaardjaarinvoeding,
      of het standaardjaarverbruik gelijk aan of lager is dan 2.900 kWh of, respectievelijk 1.200 m3(n);

      e. het gemiddelde van de standaardjaarafname, verminderd met de standaardjaarinvoeding, of het
      standaardjaarverbruik van de in onderdeel d bedoelde kleinverbruikaansluitingen.


      [ref1]: https://wetten.overheid.nl/BWBR0037934#Artikel2.8.2
      [ref2]: https://wetten.overheid.nl/BWBR0033729#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0009755#Artikel79
      [ref4]: https://wetten.overheid.nl/BWBR0011440#Artikel37
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel4.2

  - number: '3.5'
    text: |-
      Indien subsidie wordt verstrekt voor de toepassing van het prijsplafond voor warmte, wordt de hoogte van de
      subsidie berekend volgens de formule:

      waarbij *kva, THW, CLW, PTW TUK en NRW* achtereenvolgens staan voor:

      *kva*: kleinverbruikaansluiting;

      *THW*: de totale hoeveelheid warmte in GJ die de subsidieontvanger in 2023 per kleinverbruikaansluiting heeft
      geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt. Hierbij
      wordt gerekend met een maximale bovengrens van het volumeplafond voor warmte en een ondergrens van nul;

      *CLW*: het gemiddelde contractuele leveringstarief voor warmte in € per GJ per kleinverbruikaansluiting,
      op basis van de leveringstarieven in € per GJ die in 2023 door de subsidieontvanger in rekening zijn
      gebracht aan de kleinverbruikaansluiting gewogen naar de hoeveelheid warmte die in 2023 is geleverd aan deze
      kleinverbruikaansluiting, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is
      verstrekt;

      *PTW*: het plafondtarief voor warmte;

      *TUK*: een tegemoetkoming in de uitvoeringskosten voor de toepassing van het prijsplafond, berekend overeenkomstig
      [artikel 3.6][ref1];

      *NRW*: de overschrijding van het in 2023 gerealiseerde rendement in € ten opzichte van het normrendement voor
      warmte in €, bepaald overeenkomstig [bijlage III][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel3.6
      [ref2]: https://wetten.overheid.nl/BWBR0047628
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel3.5

  - number: '5.6'
    text: |-
      1 De subsidieontvanger verstrekt aan de Minister een rapport van feitelijke bevindingen van een accountant over de
      getrouwheid van:

      a. voor elektriciteit of gas: de gegevens van de eerste aanvraag voor een voorschot, binnen vier maanden na
      indiening van die aanvraag, indien het totaalbedrag aan te verstrekken voorschotten naar verwachting € 125.000 of
      meer zal bedragen;

      b. voor warmte: de gegevens van de aanvraag voor het voorschot binnen vier maanden na de indiening van die aanvraag
      indien het bedrag aan te verstrekken voorschotten naar verwachting € 125.000 of meer zal bedragen.

      2 De subsidieontvanger verstrekt aan de Minister een verklaring van een onafhankelijk en ter zake kundig persoon
      over de getrouwheid van:

      a. voor elektriciteit of gas: de gegevens van de eerste aanvraag voor een voorschot, binnen vier maanden na
      indiening van die aanvraag, indien het totaalbedrag aan te verstrekken voorschotten naar verwachting minder dan
      € 125.000 zal bedragen;

      b. voor warmte: de gegevens van de aanvraag voor het voorschot, binnen vier maanden na de indiening van die
      aanvraag, indien het bedrag aan te verstrekken voorschotten naar verwachting minder dan € 125.000 zal bedragen.

      3 Voor het verstrekken van het rapport van feitelijke bevindingen, bedoeld in het eerste lid, of de verklaring
      van een onafhankelijk en ter zake kundig persoon, bedoeld in het tweede lid, wordt gebruikgemaakt van een door de
      Minister ter beschikking gesteld model of een door de Minister geaccepteerd vergelijkbaar document.

      4 Indien bij de controle op de naleving van de aan de subsidieverstrekking verbonden voorwaarden en verplichtingen
      onregelmatigheden worden geconstateerd, kan de Minister van de subsidieontvanger een rapport van feitelijke
      bevindingen van een accountant verlangen, opgesteld volgens de door de Minister gegeven aanwijzingen.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.6
  - number: '5.7'
    text: |-
      1 De subsidieontvanger deelt onverwijld de indiening bij de rechtbank van een verzoek tot faillietverklaring van
      hem, tot verlening van surseance van betaling aan hem of tot toepassing van de schuldsaneringsregeling natuurlijke
      personen over hem schriftelijk mee aan de Minister.

      2 De subsidieontvanger verstrekt op verzoek aan de Minister alle overige bescheiden, gegevens of inlichtingen die
      nodig zijn voor een beslissing over de subsidie.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.7
  - number: '5.8'
    text: |-
      De subsidieontvanger is aangesloten bij een instantie voor buitengerechtelijke geschilbeslechting die bevoegd is
      klachten te behandelen van kleinverbruikers tegen leveranciers over de toepassing van deze regeling.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.8
  - number: '5.9'
    text: |-
      Voor de toepassing van deze regeling dienen de door de subsidieontvanger gehanteerde contractuele
      leveringstarieven voor elektriciteit, gas of warmte te voldoen aan het bepaalde bij of
      krachtens [artikel 95b van de Elektriciteitswet 1998][ref1], [artikel 44 van de Gaswet][ref2] of
      [artikel 5 van de Warmtewet][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0009755#Artikel95b
      [ref2]: https://wetten.overheid.nl/BWBR0011440#Artikel44
      [ref3]: https://wetten.overheid.nl/BWBR0033729#Artikel5
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.9
    references:
      - id: ref1
        bwb_id: BWBR0009755
        artikel: 95b
      - id: ref2
        bwb_id: BWBR0011440
        artikel: '44'
      - id: ref3
        bwb_id: BWBR0033729
        artikel: '5'
  - number: 6.1.1
    text: |-
      De Minister verstrekt in 2023 maandelijks een voorschot voor de toepassing van het prijsplafond voor elektriciteit
      of gas op maandelijks in te dienen aanvragen.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.1
  - number: 6.1.2
    text: |-
      1 Het cumulatieve voorschot van alle reeds verstrekte voorschotten wordt maandelijks ambtshalve gecorrigeerd aan de
      hand van de eindfacturen die in die kalendermaand zijn verstrekt, totdat het cumulatieve voorschot is gecorrigeerd
      voor alle eindfacturen waarbij toepassing van het prijsplafond aan orde was in de periode waar de eindfactuur op
      ziet.

      2 Een reeds verstrekt voorschot kan op verzoek van de subsidieontvanger achteraf eenmalig worden gecorrigeerd:

      a. aan kleinverbruikaansluitingen waarvoor op het moment van indiening van de aanvraag voor dat voorschot nog geen
      sprake was van een leveringsovereenkomst; of

      b. indien sprake is van andere wijzigingen die substantiële invloed kunnen hebben op de hoogte van dat voorschot,
      met uitzondering van de in het eerste lid bedoelde correcties aan de hand van de eindfacturen.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.2
  - number: 6.1.3
    text: |-
      De hoogte van het maandelijkse voorschot voor de toepassing van het prijsplafond voor elektriciteit wordt berekend
      volgens de formule:

      waarbij *TC, kva, VHE, VLE, PTE, TUKv,*

      achtereenvolgens staan voor:

      *TC*: tariefcohort, waarbinnen de subsidieontvanger alle kleinverbruikaansluitingen plaatst met een contractueel
      leveringstarief dat binnen deze bandbreedte valt en waartegen naar verwachting elektriciteit zal worden geleverd in
      de kalendermaand waarvoor de aanvraag voor een voorschot is ingediend;

      *kva*: kleinverbruikaansluiting;

      *VHE*: de verwachte hoeveelheid te leveren elektriciteit in kWh per kleinverbruikaansluiting, op basis van de
      in het centraal aansluitingenregister geregistreerde standaardjaarafname, bepaald per kleinverbruikaansluiting,
      verminderd met de in het centraal aansluitingenregister geregistreerde standaardjaarinvoeding voor die
      kleinverbruikaansluiting. Hierbij wordt gerekend met een maximale bovengrens van 1/12e van het volumeplafond voor
      elektriciteit en een ondergrens van nul. Voor de standaardjaarafname en standaardjaarinvoeding wordt uitgegaan van
      de meest recente gegevens uit het centraal aansluitingenregister die de subsidieontvanger van de netbeheerder heeft
      ontvangen.

      *VLE*: het verwachte gemiddelde contractuele leveringstarief voor elektriciteit in € per kleinverbruikaansluiting
      in de betreffende kalendermaand, gewogen naar de hoeveelheid elektriciteit die naar verwachting aan de betreffende
      kleinverbruikaansluitingen zal worden geleverd, waarvoor de toepassing van het prijsplafond zal plaatsvinden;

      *PTE*: het plafondtarief voor elektriciteit;

      *TUKv*: een bedrag als voorschot voor een tegemoetkoming in de te maken uitvoeringskosten voor de toepassing van
      het prijsplafond, berekend overeenkomstig [artikel 6.1.5][ref1];

      : de som van het bedrag per kleinverbruikaansluiting binnen een tariefcohort voor alle kleinverbruikaansluitingen
      binnen dat tariefcohort;

      : de som van het bedrag per tariefcohort voor alle tariefcohorten.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.1.5
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.3
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: 6.1.5
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 6.1.4
    text: |-
      De hoogte van het maandelijkse voorschot voor de toepassing van het prijsplafond voor gas wordt berekend volgens
      de formule:

      waarbij *TC, kva, VHG, VLG, PTG, TUKv,*

      achtereenvolgens staan voor:

      *TC*: tariefcohort waarbinnen de subsidieontvanger alle kleinverbruikaansluitingen plaatst met een contractueel
      leveringstarief dat binnen deze bandbreedte valt en waartegen naar verwachting gas zal worden geleverd in de
      kalendermaand waarvoor de aanvraag voor een voorschot is ingediend;

      *kva*: kleinverbruikaansluiting;

      *VHG*: de verwachte hoeveelheid te leveren gas in m3(n) per kleinverbruiker, op basis van het
      standaardjaarverbruik, op basis van het in het centraal aansluitingenregister geregistreerde standaardjaarverbruik,
      bepaald per kleinverbruikaansluiting. Hierbij wordt gerekend met een maximale bovengrens van 1/12e van het
      volumeplafond voor gas en een ondergrens van nul. Voor het standaardjaarverbruik wordt uitgegaan van de meest
      recente gegevens uit het centraal aansluitingenregister die de subsidieontvanger van de netbeheerder heeft
      ontvangen;

      *VLG*: het verwachte gemiddelde contractuele leveringstarief voor gas in € per m3(n) per kleinverbruikaansluiting
      in de kalendermaand waarvoor een voorschot is ingediend, gewogen naar de hoeveelheid gas die naar verwachting aan
      de betreffende kleinverbruikaansluitingen zal worden geleverd, waarvoor de toepassing van het prijsplafond zal
      plaatsvinden;

      *PTG*: het plafondtarief voor gas;

      *TUKv*: een bedrag als voorschot voor een tegemoetkoming in de te maken uitvoeringskosten voor de toepassing van
      het prijsplafond, berekend overeenkomstig [artikel 6.1.5][ref1];

      : de som van het bedrag per kleinverbruikaansluiting binnen een tariefcohort voor alle kleinverbruikaansluitingen
      binnen dat tariefcohort.

      : de som van het bedrag per tariefcohort voor alle tariefcohorten.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.1.5
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.4
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: 6.1.5
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 6.1.5
    text: |-
      De hoogte van het bedrag als voorschot voor een tegemoetkoming in de uitvoeringskosten, bedoeld in de
      [artikelen 6.1.3][ref1] en [6.1.4][ref2], wordt berekend volgens de formule:

      waarbij *kva* en

      achtereenvolgens staan voor:

      *kva*: kleinverbruikaansluiting;

      : de som van het bedrag per kleinverbruikaansluiting voor alle kleinverbruikaansluitingen.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.1.3
      [ref2]: https://wetten.overheid.nl/BWBR0047628#Artikel6.1.4
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.5
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: 6.1.3
        hoofdstuk: '6'
        paragraaf: '6.1'
      - id: ref2
        bwb_id: BWBR0047628
        artikel: 6.1.4
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 6.1.6
    text: |-
      Indien een contractueel leveringstarief voor de kalendermaand waarvoor een aanvraag voor een voorschot wordt
      ingediend, niet bekend is op moment van indienen van de aanvraag, wordt het contractuele leveringstarief voor
      die kleinverbruikaansluiting berekend aan de hand van de op dag, voorafgaand aan indiening van de aanvraag,
      gepubliceerde:

      a. voor elektriciteit: NLB-Dutch Power Financial Base Futures settlement prijzen, month ahead, end of day, voor de
      kalendermaand waar de aanvraag voor een voorschot op ziet, omgerekend naar kWh elektriciteit;

      b. voor gas: TFM-Dutch TTF Natural Gas Base Load Dutch settlement prijzen, month ahead, end of day, voor de
      kalendermaand waar de aanvraag voor een voorschot op ziet, omgerekend naar m3(n) gas.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.6
  - number: 6.1.7
    text: |-
      1 De aanvraag voor eerste voorschot wordt gelijktijdig ingediend met de aanvraag voor subsidieverlening.

      2 De aanvraag voor het tweede en het daaropvolgende voorschot wordt ingediend uiterlijk op de vijftiende dag, om
      17:00 uur, van de kalendermaand die voorafgaat aan de kalendermaand waarop het voorschot betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.7
  - number: 6.1.8
    text: |-
      1 Een aanvraag voor een voorschot wordt ingediend met gebruikmaking van een middel dat door de Minister beschikbaar
      wordt gesteld.

      2 De aanvraag bevat in ieder geval:

      a. het aantal kleinverbruikaansluitingen waarvoor volgens de meest recente gegevens uit het centraal
      aansluitingenregister die de subsidieontvanger van de netbeheerder heeft ontvangen;

      b. het aantal kleinverbruikaansluitingen per tariefcohort waarvoor de toepassing van het prijsplafond aan de orde
      is in de kalendermaand waarvoor het voorschot wordt aangevraagd;

      c. voor elektriciteit: de verwachte hoeveelheid elektriciteit in kWh per kleinverbruikaansluiting, verminderd met
      de in standaardjaarinvoeding voor die kleinverbruikaansluiting, waarbij wordt gerekend met een maximale bovengrens
      van 1/12e van het volumeplafond voor elektriciteit en een ondergrens van nul en waarbij voor de standaardjaarafname
      en standaardjaarinvoeding wordt uitgegaan van de meest recente gegevens uit het centraal aansluitingenregister die
      de subsidieontvanger van de netbeheerder heeft ontvangen;

      d. voor elektriciteit: het verwachte gemiddelde contractuele leveringstarief voor elektriciteit in € per
      kleinverbruikaansluiting in de kalendermaand waarvoor het voorschot wordt aangevraagd, gewogen naar de hoeveelheid
      elektriciteit die naar verwachting aan de betreffende kleinverbruikaansluitingen zal worden geleverd, waarvoor de
      toepassing van het prijsplafond zal plaatsvinden;

      e. voor gas: de verwachte hoeveelheid gas in m3(n) per kleinverbruikaansluiting, waarbij wordt gerekend met
      een maximale bovengrens van 1/12e van het volumeplafond voor gas en een ondergrens van nul en waarbij voor het
      standaardjaarverbruik wordt uitgegaan van de meest recente gegevens uit het centraal aansluitingenregister die de
      subsidieontvanger van de netbeheerder heeft ontvangen;

      f. voor gas: het verwachte gemiddelde contractuele leveringstarief voor gas in € per m3(n) per
      kleinverbruikaansluiting in de kalendermaand waarvoor een voorschot is ingediend, gewogen naar de hoeveelheid gas
      die naar verwachting aan de betreffende kleinverbruikaansluitingen zal worden geleverd, waarvoor de toepassing van
      het prijsplafond zal plaatsvinden.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.8
  - number: 6.1.9
    text: |-
      1 De Minister geeft een beschikking op een aanvraag voor een voorschot binnen twee weken na ontvangst van de
      aanvraag.

      2 Deze termijn kan eenmaal met ten hoogste twee weken worden verlengd.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.1.9
  - number: 6.2.1
    text: |-
      De Minister verstrekt op aanvraag één keer in 2023 een voorschot voor de toepassing van het prijsplafond voor
      warmte.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.1
  - number: 6.2.2
    text: |-
      Het jaarlijkse voorschot kan op verzoek van de subsidieontvanger worden gecorrigeerd bij wijzigingen van het aantal
      kleinverbruikaansluitingen of een contractueel leveringstarief.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.2
  - number: 6.2.3
    text: |-
      De hoogte van het jaarlijkse voorschot wordt berekend volgens de formule:

      Waarbij *KVA, VHW, VLW, PTW, TUKv* en

      achtereenvolgens staan voor:

      *kva: kleinverbruikaansluiting;*

      *VHW*: de verwachte hoeveelheid te leveren warmte in GJ per kleinverbruikaansluiting. Hierbij wordt gerekend met
      een maximale bovengrens van het volumeplafond voor warmte en een ondergrens van nul;

      *VLW*: het verwachte gemiddelde contractuele leveringstarief voor warmte in € per GJ per kleinverbruikaansluiting
      in 2023, gewogen naar de hoeveelheid warmte die naar verwachting aan de betreffende kleinverbruikaansluiting zal
      worden geleverd in 2023, waarvoor de toepassing van het prijsplafond zal plaatsvinden;

      *PTW*: het plafondtarief voor warmte;

      *TUKv*: een bedrag als voorschot voor een tegemoetkoming in de te maken uitvoeringskosten voor de toepassing van
      het prijsplafond, berekend overeenkomstig [artikel 6.2.4][ref1];

      : de som van het bedrag per kleinverbruikaansluiting voor alle kleinverbruikaansluitingen.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.2.4
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.3
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: 6.2.4
        hoofdstuk: '6'
        paragraaf: '6.2'
  - number: 6.2.4
    text: |-
      De hoogte van het bedrag als voorschot voor een tegemoetkoming in de uitvoeringskosten, bedoeld in
      [artikel 6.2.3][ref1], wordt berekend volgens de formule:

      waarbij *kva* en

      achtereenvolgens staan voor:

      *kva*: kleinverbruikaansluiting;

      : de som van het bedrag per kleinverbruikaansluiting voor alle kleinverbruikaansluitingen.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.2.3
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.4
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: 6.2.3
        hoofdstuk: '6'
        paragraaf: '6.2'
  - number: 6.2.5
    text: |-
      1 Het voorschot wordt per kwartaal in 2023 uitbetaald.

      2 Het kwartaalbedrag wordt in gelijke delen uitbetaald op basis van de volgens [artikel 6.2.2][ref1] berekende
      hoogte van het voorschot.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel6.2.2
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.5
    references:
      - id: ref1
        bwb_id: BWBR0047628
        artikel: 6.2.2
        hoofdstuk: '6'
        paragraaf: '6.2'
  - number: 6.2.6
    text: |-
      1 De aanvraag voor een voorschot wordt gelijktijdig ingediend met de aanvraag voor subsidieverlening.

      2 De aanvraag voor een voorschot wordt ingediend met gebruikmaking van een middel dat door de Minister beschikbaar
      wordt gesteld.

      3 De aanvraag omvat in ieder geval een raming van:

      a. het aantal kleinverbruikaansluitingen;

      b. de hoeveelheid naar verwachting te leveren warmte binnen het volumeplafond voor warmte;

      c. het verwachte gemiddelde contractuele leveringstarief voor warmte in € per GJ per kleinverbruikaansluiting
      in 2023, gewogen naar de hoeveelheid warmte die naar verwachting aan de betreffende kleinverbruikaansluiting zal
      worden geleverd in 2023, waarvoor de toepassing van het prijsplafond zal plaatsvinden.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.6
  - number: 6.2.7
    text: |-
      1 De Minister geeft een beschikking op een aanvraag voor een voorschot binnen twee weken na ontvangst van de
      aanvraag.

      2 Deze termijn kan eenmaal met ten hoogste twee weken worden verlengd.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel6.2.7
  - number: '7.1'
    text: |-
      Een subsidieontvanger dient uiterlijk 30 juni 2025, 17:00 uur, een aanvraag in voor subsidievaststelling voor de
      toepassing van het prijsplafond voor elektriciteit, gas of warmte.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel7.1
  - number: '7.2'
    text: |-
      1 De aanvraag wordt ingediend met gebruikmaking van een middel dat door de Minister beschikbaar wordt gesteld.

      2 De aanvraag bevat in ieder geval:

      a. de hoeveelheid elektriciteit, gas of warmte in kWh, m3(n) of GJ die in 2023 aan kleinverbruikaansluitingen is
      geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt;

      b. het gemiddelde contractuele leveringstarief voor elektriciteit of gas in € per kWh of m3(n), gewogen naar
      de totale hoeveelheid elektriciteit of gas die in 2023 aan kleinverbruikaansluitingen is geleverd, waarvoor de
      toepassing van het prijsplafond heeft plaatsgevonden en waarvoor een eindfactuur is verstrekt;

      c. voor warmte: het contractuele leveringstarief voor warmte in € per GJ, gewogen naar de hoeveelheid warmte die in
      2023 aan kleinverbruikaansluitingen is geleverd, waarvoor de toepassing van het prijsplafond heeft plaatsgevonden
      en een eindfactuur is verstrekt;

      d. voor elektriciteit of gas: de in 2023 gerealiseerde brutomarge voor elektriciteit of gas per
      kleinverbruikaansluiting in €, bepaald overeenkomstig [bijlage III][ref1];

      e. voor elektriciteit of gas: de historische referentiewaarde voor elektriciteit of gas in €, bepaald
      overeenkomstig [bijlage III][ref2];

      f. voor warmte: het in 2023 gerealiseerde rendement per kleinverbruikaansluiting in €, bepaald overeenkomstig
      [bijlage III][ref3];

      g. voor warmte: het normrendement in €, bepaald overeenkomstig [bijlage III][ref4];

      h. het aantal kleinverbruikaansluitingen waaraan in 2023 elektriciteit, gas of warmte is geleverd, waarvoor de
      toepassing van het prijsplafond heeft plaatsgevonden en een eindfactuur is verstrekt, gewogen naar het aantal dagen
      waarvoor een leveringsovereenkomst was;

      i. een beschrijving van de methode van data-extractie uit de eigen administratie van de gegevens die gevraagd
      worden bij de subsidievaststelling.

      3 De aanvraag gaat vergezeld van een product van een accountant over de getrouwheid van de gegevens in de aanvraag,
      met gebruikmaking van een door de Minister ter beschikking gesteld model of een door de Minister geaccepteerd
      vergelijkbaar document, indien het totaal aan verstrekte voorschotten € 125.000 of meer bedraagt.


      [ref1]: https://wetten.overheid.nl/BWBR0047628
      [ref2]: https://wetten.overheid.nl/BWBR0047628
      [ref3]: https://wetten.overheid.nl/BWBR0047628
      [ref4]: https://wetten.overheid.nl/BWBR0047628

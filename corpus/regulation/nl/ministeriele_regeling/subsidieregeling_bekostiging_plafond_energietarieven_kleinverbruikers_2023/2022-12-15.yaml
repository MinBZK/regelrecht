preamble:
  text: |-
    Gelet op Verordening (EU) 2022/1854 van de Raad van 6 oktober 2022 betreffende een noodinterventie in verband met
    de hoge energieprijzen (PbEU 2022 LI 261/1)

    Handelende in overeenstemming met de mededeling van de Europese Commissie van 9 oktober 2022 betreffende het
    Tijdelijk crisiskader voor staatssteunmaatregelen ter ondersteuning van de economie na de Russische agressie tegen
    Oekraïne (PbEU 2022, C 426/01);

    Gelet op de artikelen 2, eerste en tweede lid, en 3 van de Kaderwet EZK- en LNV-subsidies;

    Besluit:
  url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#ArtikelAanhef
articles:
  - number: '1.1'
    text: |-
      1 In deze regeling wordt verstaan onder:

        - *accountant:* accountant of accountant-administratieconsulent als bedoeld in
      [artikel 393, eerste lid, van Boek 2 van het Burgerlijk Wetboek][ref1];
        - *btw:* omzetbelasting als bedoeld in [artikel 1 van de Wet op de omzetbelasting 1968][ref2];
        - *centraal aansluitingenregister:* centraal aansluitingenregister, genoemd in
      [artikel 2.1.2 van de Informatiecode elektriciteit en gas][ref3];
        - *contractueel leveringstarief:* leveringstarief voor elektriciteit, gas of warmte dat volgt uit een
      leveringsovereenkomst;
        - *eindfactuur:* factuur als bedoeld in
      [artikel 2 van het Besluit factuur, verbruiks- en indicatief kostenoverzicht energie][ref4];
        - *energiebelasting:* energiebelasting als bedoeld in
      [artikel 48, eerste lid, van de Wet belastingen op milieugrondslag][ref5];
        - *handelsregister:* handelsregister als bedoeld in [artikel 2 van de Handelsregisterwet 2007][ref6];
        - *gas:* gas als bedoeld in [artikel 1, eerste lid, onderdeel b, subonderdeel 1°, van de Gaswet][ref7];
        - *groep:* groep als bedoeld in [artikel 24b van Boek 2 van het Burgerlijk Wetboek][ref8];
        - *kleinverbruiker:* afnemer van elektriciteit, gas of warmte met een kleinverbruikaansluiting;
        - *kleinverbruikaansluiting:* a. primair allocatiepunt als bedoeld in
      [artikel 1.1 van de Begrippencode elektriciteit][ref9] van een aansluiting op een net met een totale maximale
      doorlaatwaarde van ten hoogste 3*80A als bedoeld in [artikel 95a, eerste lid, van de Elektriciteitswet 1998][ref10]
      in een onroerende zaak ter zake waarvan op de levering van elektriciteit
      [artikel 63, eerste lid, van de Wet belastingen op milieugrondslag][ref11] van toepassing is, die is geregistreerd
      in het centraal aansluitingenregister en in bedrijf is; b. aansluiting op een net met een totale capaciteit van ten
      hoogste 40 m3(n) per uur als bedoeld in [artikel 43, eerste lid, van de Gaswet][ref12], die is geregistreerd in het
      centraal aansluitingenregister en in bedrijf is; c. aansluiting als bedoeld in [artikel 1 van de Warmtewet][ref13]
      met een vermogen van maximaal 100 kilowatt, die in bedrijf is.
        - *leverancier:* a. houder van een vergunning als bedoeld in
      [artikel 95a, eerste lid, van de Elektriciteitswet 1998][ref14]; b. leverancier die een overeenkomst heeft tot het
      leveren van elektriciteit aan een groep afnemers als bedoeld in [artikel 95n van de Elektriciteitswet 1998][ref15];
      c. buiten Nederland gevestigde leverancier van elektriciteit aan ten hoogste 500 afnemers als bedoeld in
      [artikel 95a, tweede lid, onderdeel b, van de Elektriciteitswet 1998][ref16]; d. houder van een vergunning
      als bedoeld in [artikel 43, eerste lid, van de Gaswet][ref17]; e. leverancier die een overeenkomst
      heeft tot het leveren van gas aan een groep afnemers als bedoeld in [artikel 52c van de Gaswet][ref18];
      f. buiten Nederland gevestigde leverancier van gas aan ten hoogste 500 afnemers als bedoeld in
      [artikel 43, tweede lid, onderdeel a, van de Gaswet][ref19]; g. leverancier die zorgdraagt voor een betrouwbare
      levering van warmte als bedoeld in [artikel 2 van de Warmtewet][ref20], met uitzondering van een leverancier als
      bedoeld in [artikel 1a van de Warmtewet][ref21];
        - *leveringsovereenkomst:* overeenkomst voor de levering van elektriciteit, gas of warmte tussen een leverancier en
      een kleinverbruiker;
        - *Minister:* Minister voor Klimaat en Energie;
        - *ODE:* opslag duurzame energie- en klimaattransitie als bedoeld in
      [artikel 1, eerste lid, van de Wet opslag duurzame energie- en klimaattransitie][ref22];
        - *plafondtarief:* plafondtarief als bedoeld in [artikel 2.2][ref23];
        - *standaardjaarafname:* standaardjaarafname (SJA) als bedoeld in
      [artikel 1.1 van de Begrippencode elektriciteit][ref24];
        - *standaardjaarinvoeding:* standaardjaarinvoeding (SJI) als bedoeld in
      [artikel 1.1 van de Begrippencode elektriciteit][ref25];
        - *standaardjaarverbruik:* standaardjaarverbruik (SJV) als bedoeld in [artikel 1.1 van de Begrippencode gas][ref26];
        - *tariefcohort:* in [bijlage I][ref27] opgenomen categorie van contractuele leveringstarieven met een specifieke
      bandbreedte van contractuele leveringstarieven voor elektriciteit of gas;
        - *termijnbedrag:* door een kleinverbruiker te betalen voorschotbedrag aan een leverancier voor de in een periode
      te leveren elektriciteit, gas of warmte aan een kleinverbruikaansluiting;
        - *toepassing van het prijsplafond:* toepassen van het prijsplafond als bedoeld in
      [artikel 2.1, tweede lid][ref28];
        - *volumeplafond:* volumeplafond als bedoeld in [artikel 2.3][ref29];
        - *warmte:* warmte als bedoeld in [artikel 1 van de Warmtewet][ref30];
        - *warmtenet:* warmtenet als bedoeld in [artikel 1 van de Warmtewet][ref31].

      2 Voor de toepassing van deze regeling wordt het contractueel leveringstarief bepaald met de formule:

      *VL + O – K*

      waarbij *VL*, O en K achtereenvolgens staan voor:

      *VL*: de variabele leveringskosten, exclusief energiebelasting en ODE, inclusief 21% btw:

      ○ voor elektriciteit per kWh, uitgedrukt in € in vijf decimalen;

      ○ voor gas in € in vijf decimalen per m3(n);

      ○ voor warmte per GJ, uitgedrukt in € in twee decimalen;

      *O*: de direct aan de variabele leveringskosten te relateren opslagen, inclusief 21% btw;

      *K*: de direct aan de variabele leveringskosten te relateren kortingen, inclusief 21% btw.

      3 Voor de toepassing van deze regeling wordt voor gas onder één m3(n) verstaan: één kubieke meter gas onder
      normaalcondities met een calorische bovenwaarde van 35,17 MJ.



  - number: '3.4'
    text: |-
      Indien subsidie is verstrekt voor de toepassing van het prijsplafond voor elektriciteit of gas aan een
      subsidieontvanger die deel uitmaakt van een groep, wordt, indien dit door de subsidieontvanger bij de aanvraag
      is aangegeven, voor het berekenen van de overschrijding van de brutomarge, bedoeld in de [artikelen 3.1][ref1],
      [3.2][ref2] of [3.3][ref3], de over- of onderschrijding van de historische benchmark van de subsidieontvanger
      overeenkomstig [bijlage III][ref4] verrekend:

      a. indien sprake is van één andere subsidieontvanger die deel uitmaakt van de groep: de onder- of overschrijdingen
      van de historische benchmark van dat lid;

      b. indien sprake is van meer dan één andere subsidieontvanger die deel uitmaakt van de groep: de onder- of
      overschrijdingen van de historische benchmark van elk van de andere leden van de groep.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel3.1
      [ref2]: https://wetten.overheid.nl/BWBR0047628#Artikel3.2
      [ref3]: https://wetten.overheid.nl/BWBR0047628#Artikel3.3
      [ref4]: https://wetten.overheid.nl/BWBR0047628
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel3.4

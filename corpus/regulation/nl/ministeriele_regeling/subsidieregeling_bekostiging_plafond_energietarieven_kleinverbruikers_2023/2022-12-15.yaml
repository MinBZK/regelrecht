  - number: '4.4'
    text: |-
      1 De Minister beslist op een aanvraag voor subsidieverlening binnen twee weken na ontvangst van de aanvraag.

      2 Deze termijn kan eenmaal met ten hoogste twee weken worden verlengd.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel4.4
  - number: '4.5'
    text: |-
      In de beschikking tot subsidieverlening wordt geen bedrag opgenomen waarop de subsidie ten hoogste kan worden
      vastgesteld.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel4.5
  - number: '4.6'
    text: |-
      De Minister beslist afwijzend op een aanvraag voor subsidie indien:

      a. de aanvraag niet voldoet aan de bij deze regeling gestelde regels;

      b. de subsidieaanvrager failliet is verklaard of hem surséance van betaling is verleend, dan wel een verzoek
      daartoe bij de rechtbank is ingediend.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel4.6
  - number: '4.7'
    text: |-
      De Minister maakt zo spoedig mogelijk na een besluit tot subsidieverlening de naam van de subsidieontvanger en het
      inschrijvingsnummer in het handelsregister bekend.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel4.7
  - number: '5.1'
    text: |-
      1 Bij aanvang van de toepassing van het prijsplafond in een kalendermaand van 2023 verwerkt de subsidieontvanger
      dit in het voorstel voor het met ingang van die kalendermaand door de kleinverbruiker te betalen termijnbedrag,
      en stelt het termijnbedrag overeenkomstig bij indien toepassing van het prijsplafond leidt tot verlaging van het
      termijnbedrag, tenzij de kleinverbruiker aangeeft daar niet mee in te stemmen.

      2 In afwijking van het eerste lid kan de subsidieontvanger het voorstel tot bijstelling van het termijnbedrag ten
      hoogste één kalendermaand later doen dan bedoeld in het eerste lid, indien de subsidieontvanger kan aantonen dat
      eerdere bijstelling redelijkerwijs niet mogelijk is.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel5.1
  - number: '5.2'
    text: |-
      1 Indien het plafondtarief in een periode in 2023 lager was dan het gemiddelde contractuele leveringstarief voor
      elektriciteit, gas of warmte, bedoeld [artikel 3.1][ref1], [3.2][ref2], [3.3][ref3] of [3.5][ref4], in die periode,
      past de subsidieontvanger het prijsplafond toe bij de elektriciteit, gas of warmte die in die periode is geleverd
      aan een kleinverbruikaansluiting en waarvoor een eindfactuur is verstrekt.

      2 Bij toepassing van het eerste lid neemt de subsidieontvanger in de eindfactuur het bedrag op waarmee de
      eindfactuur is aangepast vanwege de toepassing van het prijsplafond, indien toepassing van het prijsplafond aan de
      orde was in de periode waar de eindfactuur op ziet.

      3 De periode waar een eindfactuur voor de levering van elektriciteit, gas of warmte aan een
      kleinverbruikaansluiting op ziet, bedraagt ten minste één kalendermaand, tenzij de subsidieontvanger gedurende
      minder dan één kalendermaand, gerekend vanaf de vorige eindfactuur, elektriciteit, gas of warmte heeft geleverd aan
      de kleinverbruikaansluiting.


      [ref1]: https://wetten.overheid.nl/BWBR0047628#Artikel3.1
      [ref2]: https://wetten.overheid.nl/BWBR0047628#Artikel3.2

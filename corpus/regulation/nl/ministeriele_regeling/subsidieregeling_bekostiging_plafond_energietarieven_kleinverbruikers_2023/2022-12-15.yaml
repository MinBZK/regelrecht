  - number: '7.3'
    text: De Minister beslist op een aanvraag voor subsidievaststelling binnen dertien weken na ontvangst van de aanvraag.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel7.3
  - number: '8.1'
    text: |-
      1 Deze regeling treedt in werking met ingang van de dag na de datum van uitgifte van de Staatscourant waarin zij
      wordt geplaatst.

      2 Deze regeling vervalt met ingang van 1 januari 2027, met dien verstande dat zij van toepassing blijft op
      subsidies die voor die datum zijn verstrekt.
    url: https://wetten.overheid.nl/BWBR0047628/2022-12-15#Artikel8.1
    machine_readable:
      execution:
        output:
          # Lid 2: "Deze regeling vervalt met ingang van 1 januari 2027, ..."
          # Grounded source of the law's end date. The top-level valid_to
          # ('2026-12-31') is the inclusive last-day-in-force derived from it
          # (vervaldatum minus one day). See RFC-019.
          - name: vervaldatum
            type: date
        actions:
          - output: vervaldatum
            value: '2027-01-01'
  - number: '8.2'
    text: 'Deze regeling wordt aangehaald als: Subsidieregeling bekostiging plafond energietarieven kleinverbruikers 2023.'

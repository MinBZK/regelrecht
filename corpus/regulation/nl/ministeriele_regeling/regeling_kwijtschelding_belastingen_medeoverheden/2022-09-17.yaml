    article: '26'
articles:
  - number: '1'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel1
    text: |
      In deze regeling wordt verstaan onder:

      - alleenstaande: alleenstaande als bedoeld in artikel 4, eerste lid, onderdeel a, van de Participatiewet;

      - alleenstaande ouder: alleenstaande ouder als bedoeld in artikel 4, eerste lid, onderdeel b, van de Participatiewet;

      - echtgenoot: echtgenoot als bedoeld in artikel 3 van de Participatiewet;

      - pensioengerechtigde: persoon die de pensioengerechtigde leeftijd, bedoeld in artikel 7a van de Algemene Ouderdomswet,
      heeft bereikt;

      - Uitvoeringsregeling: Uitvoeringsregeling Invorderingswet 1990;

      - verordening: verordening van provinciale staten van een provincie, de raad van een gemeente of het algemeen bestuur
      van een waterschap.
  - number: '2'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel2
    text: |
      Bij verordening kan van de in artikel 16 van de Uitvoeringsregeling genoemde percentages worden afgeweken, mits:

      a. de percentages ten minste 90 en ten hoogste 100 bedragen; en

      b. het percentage voor alle belastingschuldigen, bedoeld in artikel 16 van de Uitvoeringsregeling, hetzelfde is.
  - number: '3'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel3
    text: |
      1. Onverminderd het bepaalde in artikel 2 kan bij verordening worden bepaald dat voor de vaststelling van de kosten van
      bestaan van pensioengerechtigden in plaats van de bijstandsnorm het netto-ouderdomspensioen wordt gehanteerd.

      2. Het hanteren van het netto-ouderdomspensioen, bedoeld in het eerste lid, geschiedt door:

      a. voor de pensioengerechtigden, bedoeld in artikel 16, tweede lid, onderdeel a, van de Uitvoeringsregeling, in plaats
      van de norm, genoemd in het toepasselijke artikelonderdeel, tweemaal het netto-ouderdomspensioen voor een gehuwde
      pensioengerechtigde als bedoeld in artikel 9, eerste lid, onderdeel b, van de Algemene Ouderdomswet te hanteren;

      b. voor de belastingschuldigen, bedoeld in artikel 16, tweede lid, onderdelen b en d, van de Uitvoeringsregeling, die
      tevens pensioengerechtigd zijn, bij de berekening van de norm, genoemd in die artikelonderdelen, in plaats van factor
      B, genoemd in artikel 22a, eerste lid, van de Participatiewet, tweemaal het netto-ouderdomspensioen voor een gehuwde
      pensioengerechtigde als bedoeld in artikel 9, eerste lid, onderdeel b, van de Algemene Ouderdomswet te hanteren; en

      c. voor de pensioengerechtigden, bedoeld in artikel 16, tweede lid, onderdeel c, van de Uitvoeringsregeling, in plaats
      van de norm, genoemd in het betreffende artikelonderdeel, éénmaal het netto-ouderdomspensioen voor een ongehuwde
      pensioengerechtigde als bedoeld in artikel 9, eerste lid, onderdeel a, van de Algemene Ouderdomswet te hanteren.

      3. Het netto-ouderdomspensioen wordt berekend door het bruto-ouderdomspensioen, bedoeld in artikel 9, vijfde lid, van
      de Algemene Ouderdomswet, te verminderen met:

      a. de verschuldigde loonbelasting;

      b. de premies voor de volksverzekeringen; en

      c. de inkomensafhankelijke bijdrage, bedoeld in artikel 41 van de Zorgverzekeringswet.
  - number: '4'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel4
    text: |
      Bij verordening kan in afwijking van artikel 12, tweede lid, onderdeel d, van de Uitvoeringsregeling het totale bedrag
      aan financiële middelen, bedoeld in dat onderdeel, worden verhoogd, mits:

      a. de verhoging voor de belastingschuldige en zijn echtgenoot ten hoogste € 2.000 bedraagt;

      b. de verhoging voor een alleenstaande 75 procent bedraagt van de verhoging, bedoeld in onderdeel a; en

      c. de verhoging voor een alleenstaande ouder 90 procent bedraagt van de verhoging, bedoeld in onderdeel a.
  - number: '5'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel5
    text: |
      De Regeling van de Staatssecretaris van Binnenlandse Zaken en de Minister van Verkeer en Waterstaat van 2 mei 1996
      houdende Nadere regels kwijtschelding gemeentelijke en waterschapsbelastingen (Stcrt. 1996, 98) wordt ingetrokken.
  - number: '6'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel6
    text: |
      1. Deze regeling treedt in werking met ingang van de dag na de datum van uitgifte van de Staatscourant waarin zij wordt
      geplaatst en werkt terug tot en met 1 januari 2022.

      2. Met ingang van 1 januari 2022 berusten verordeningen ter uitvoering van de artikelen 1 of 1a van de Regeling van de
      Staatssecretaris van Binnenlandse Zaken en de Minister van Verkeer en Waterstaat van 2 mei 1996 houdende Nadere regels
      kwijtschelding gemeentelijke en waterschapsbelastingen (Stcrt. 1996, 98) mede op de artikelen 2 of 3 van deze regeling.
  - number: '7'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel7
    text: |
      Deze regeling wordt aangehaald als: Regeling kwijtschelding belastingen medeoverheden.

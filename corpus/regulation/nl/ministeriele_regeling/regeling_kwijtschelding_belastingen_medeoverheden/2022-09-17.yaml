---
$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/tags/schema-v0.5.2/schema/v0.5.2/schema.json
$id: regeling_kwijtschelding_belastingen_medeoverheden
regulatory_layer: MINISTERIELE_REGELING
publication_date: '2022-09-16'
valid_from: '2022-09-17'
bwb_id: BWBR0047157
url: https://wetten.overheid.nl/BWBR0047157/2022-09-17
name: Regeling kwijtschelding belastingen medeoverheden
competent_authority:
  name: Minister van Binnenlandse Zaken en Koninkrijksrelaties
legal_basis:
  - law_id: invorderingswet_1990
    article: '26'
articles:
  - number: '1'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel1
    text: |
      In deze regeling wordt verstaan onder:

      - alleenstaande: alleenstaande als bedoeld in artikel 4, eerste lid, onderdeel a, van de Participatiewet;

      - alleenstaande ouder: alleenstaande ouder als bedoeld in artikel 4, eerste lid, onderdeel b, van de Participatiewet;

      - echtgenoot: echtgenoot als bedoeld in artikel 3 van de Participatiewet;

      - pensioengerechtigde: persoon die de pensioengerechtigde leeftijd, bedoeld in artikel 7a van de Algemene Ouderdomswet,
      heeft bereikt;

      - Uitvoeringsregeling: Uitvoeringsregeling Invorderingswet 1990;

      - verordening: verordening van provinciale staten van een provincie, de raad van een gemeente of het algemeen bestuur
      van een waterschap.
  - number: '2'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel2
    text: |
      Bij verordening kan van de in artikel 16 van de Uitvoeringsregeling genoemde percentages worden afgeweken, mits:

      a. de percentages ten minste 90 en ten hoogste 100 bedragen; en

      b. het percentage voor alle belastingschuldigen, bedoeld in artikel 16 van de Uitvoeringsregeling, hetzelfde is.
    machine_readable:
      definitions:
        kostennorm_percentage_min:
          description: Ondergrens (decimaal) van het kostennorm-percentage dat een provinciale/gemeentelijke/waterschaps
            verordening mag hanteren. Artikel 2, onder a, Regeling kwijtschelding belastingen medeoverheden.
          value: 0.9
        kostennorm_percentage_max:
          description: Bovengrens (decimaal) van het kostennorm-percentage dat een provinciale/gemeentelijke/waterschaps
            verordening mag hanteren. Artikel 2, onder a, Regeling kwijtschelding belastingen medeoverheden.
          value: 1.0
      execution:
        parameters:
          - name: kostennorm_percentage_verordening
            type: number
            required: true
            description: Het door de verordening gekozen percentage (decimaal, bv. 1.0 voor 100%).
        output:
          - name: kostennorm_percentage_rechtsgeldig
            type: boolean
            description: |
              True indien het door een verordening gekozen kostennorm-percentage valt binnen de bij
              artikel 2 van deze regeling gestelde grenzen (>= 90% en <= 100%). URI artikel 16 declareert
              de open_term `kostennorm_percentage`; deze regeling begrenst wat verordeningen daar mogen
              invullen. HHNK art 2 kiest 1.0 (100%), dat valt binnen de grenzen.
        actions:
          - output: kostennorm_percentage_rechtsgeldig
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $kostennorm_percentage_verordening
                  value: $kostennorm_percentage_min
                - operation: LESS_THAN_OR_EQUAL
                  subject: $kostennorm_percentage_verordening
                  value: $kostennorm_percentage_max
  - number: '3'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel3
    text: |
      1. Onverminderd het bepaalde in artikel 2 kan bij verordening worden bepaald dat voor de vaststelling van de kosten van
      bestaan van pensioengerechtigden in plaats van de bijstandsnorm het netto-ouderdomspensioen wordt gehanteerd.

      2. Het hanteren van het netto-ouderdomspensioen, bedoeld in het eerste lid, geschiedt door:

      a. voor de pensioengerechtigden, bedoeld in artikel 16, tweede lid, onderdeel a, van de Uitvoeringsregeling, in plaats
      van de norm, genoemd in het toepasselijke artikelonderdeel, tweemaal het netto-ouderdomspensioen voor een gehuwde
      pensioengerechtigde als bedoeld in artikel 9, eerste lid, onderdeel b, van de Algemene Ouderdomswet te hanteren;

      b. voor de belastingschuldigen, bedoeld in artikel 16, tweede lid, onderdelen b en d, van de Uitvoeringsregeling, die
      tevens pensioengerechtigd zijn, bij de berekening van de norm, genoemd in die artikelonderdelen, in plaats van factor
      B, genoemd in artikel 22a, eerste lid, van de Participatiewet, tweemaal het netto-ouderdomspensioen voor een gehuwde
      pensioengerechtigde als bedoeld in artikel 9, eerste lid, onderdeel b, van de Algemene Ouderdomswet te hanteren; en

      c. voor de pensioengerechtigden, bedoeld in artikel 16, tweede lid, onderdeel c, van de Uitvoeringsregeling, in plaats
      van de norm, genoemd in het betreffende artikelonderdeel, éénmaal het netto-ouderdomspensioen voor een ongehuwde
      pensioengerechtigde als bedoeld in artikel 9, eerste lid, onderdeel a, van de Algemene Ouderdomswet te hanteren.

      3. Het netto-ouderdomspensioen wordt berekend door het bruto-ouderdomspensioen, bedoeld in artikel 9, vijfde lid, van
      de Algemene Ouderdomswet, te verminderen met:

      a. de verschuldigde loonbelasting;

      b. de premies voor de volksverzekeringen; en

      c. de inkomensafhankelijke bijdrage, bedoeld in artikel 41 van de Zorgverzekeringswet.
    machine_readable:
      execution:
        parameters:
          - name: bruto_ouderdomspensioen_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
            description: Bruto-ouderdomspensioen per maand (artikel 9, vijfde lid, AOW). SVB-bedrag
              inclusief vakantie-uitkering.
          - name: verschuldigde_loonbelasting_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
            description: Verschuldigde loonbelasting over het bruto-ouderdomspensioen (tarieven eerste
              schijf voor pensioengerechtigden).
          - name: premies_volksverzekeringen_maand
            type: amount
            type_spec:
              unit: eurocent
            required: true
            description: Premies voor de volksverzekeringen (AOW-, ANW-, Wlz-premie) die op het
              bruto-pensioen drukken.
          - name: huishoudtype
            type: string
            required: true
        input:
          - name: inkomensafhankelijke_bijdrage_zvw_maand
            type: amount
            type_spec:
              unit: eurocent
            source:
              regulation: zorgverzekeringswet
              output: inkomensafhankelijke_bijdrage_maand
              parameters:
                bruto_inkomen_maand: $bruto_ouderdomspensioen_maand
            description: Inkomensafhankelijke bijdrage per artikel 41 Zorgverzekeringswet. Wordt via
              cross-law source opgehaald bij Zvw; als die wet geen machine_readable artikel 41 biedt,
              dient deze waarde door de caller te worden aangeleverd.
        output:
          - name: netto_ouderdomspensioen_maand
            type: amount
            type_spec:
              unit: eurocent
            description: |
              Netto-ouderdomspensioen per lid 3: bruto minus loonbelasting minus premies volksverzekeringen
              minus inkomensafhankelijke bijdrage Zvw. Gebruikt als alternatief voor de bijstandsnorm
              wanneer een verordening lid 1 activeert voor pensioengerechtigden. URI art 16 heeft deze
              waarde voor 2026 ingebakken in de `definitions` netto_ouderdomspensioen_alleenstaand en
              netto_ouderdomspensioen_echtgenoten; dit artikel documenteert de formule.
          - name: kostennorm_basis_pensioengerechtigd
            type: amount
            type_spec:
              unit: eurocent
            description: |
              Basisbedrag kostennorm voor een pensioengerechtigde na toepassing van lid 2: tweemaal het
              netto-ouderdomspensioen voor gehuwden (onderdeel a) of eenmaal voor alleenstaanden
              (onderdeel c). HHNK art 2 lid 2 activeert dit pad.
        actions:
          - output: netto_ouderdomspensioen_maand
            value:
              operation: SUBTRACT
              values:
                - operation: SUBTRACT
                  values:
                    - operation: SUBTRACT
                      values:
                        - $bruto_ouderdomspensioen_maand
                        - $verschuldigde_loonbelasting_maand
                    - $premies_volksverzekeringen_maand
                - $inkomensafhankelijke_bijdrage_zvw_maand
          - output: kostennorm_basis_pensioengerechtigd
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $huishoudtype
                    value: echtgenoten
                  then:
                    operation: MULTIPLY
                    values:
                      - 2
                      - $netto_ouderdomspensioen_maand
              default: $netto_ouderdomspensioen_maand
  - number: '4'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel4
    text: |
      Bij verordening kan in afwijking van artikel 12, tweede lid, onderdeel d, van de Uitvoeringsregeling het totale bedrag
      aan financiële middelen, bedoeld in dat onderdeel, worden verhoogd, mits:

      a. de verhoging voor de belastingschuldige en zijn echtgenoot ten hoogste € 2.000 bedraagt;

      b. de verhoging voor een alleenstaande 75 procent bedraagt van de verhoging, bedoeld in onderdeel a; en

      c. de verhoging voor een alleenstaande ouder 90 procent bedraagt van de verhoging, bedoeld in onderdeel a.
    machine_readable:
      definitions:
        verhoging_cap_echtgenoten:
          description: Maximale verhoging (eurocent) van de vrijstelling financiele middelen voor de
            belastingschuldige en echtgenoot, artikel 4, onder a.
          value: 200000
        verhoging_ratio_alleenstaande:
          description: Ratio van de verhoging voor een alleenstaande ten opzichte van echtgenoten
            (artikel 4, onder b). 75%.
          value: 0.75
        verhoging_ratio_alleenstaande_ouder:
          description: Ratio van de verhoging voor een alleenstaande ouder ten opzichte van echtgenoten
            (artikel 4, onder c). 90%.
          value: 0.9
      execution:
        parameters:
          - name: verhoging_verordening
            type: amount
            type_spec:
              unit: eurocent
            required: true
            description: Door de verordening vastgestelde verhoging (eurocent per huishoudtype).
          - name: huishoudtype
            type: string
            required: true
        output:
          - name: verhoging_max
            type: amount
            type_spec:
              unit: eurocent
            description: Wettelijke bovengrens voor de verhoging per huishoudtype conform artikel 4.
          - name: verhoging_rechtsgeldig
            type: boolean
            description: |
              True indien de door een verordening vastgestelde verhoging binnen de bij artikel 4
              gestelde grenzen valt. URI art 12 declareert de open_term
              `verhoging_financiele_middelen_vrijstelling`; deze regeling begrenst de maxima per
              huishoudtype. HHNK art 4 kiest 200000/180000/150000 (echtgenoten/alleenstaande ouder/
              alleenstaande), wat de grenzen raakt maar niet overschrijdt.
        actions:
          - output: verhoging_max
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $huishoudtype
                    value: echtgenoten
                  then: $verhoging_cap_echtgenoten
                - when:
                    operation: EQUALS
                    subject: $huishoudtype
                    value: alleenstaande_ouder
                  then:
                    operation: MULTIPLY
                    values:
                      - $verhoging_cap_echtgenoten
                      - $verhoging_ratio_alleenstaande_ouder
                - when:
                    operation: EQUALS
                    subject: $huishoudtype
                    value: alleenstaande
                  then:
                    operation: MULTIPLY
                    values:
                      - $verhoging_cap_echtgenoten
                      - $verhoging_ratio_alleenstaande
              default: 0
          - output: verhoging_rechtsgeldig
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $verhoging_verordening
              value: $verhoging_max
  - number: '5'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel5
    text: |
      De Regeling van de Staatssecretaris van Binnenlandse Zaken en de Minister van Verkeer en Waterstaat van 2 mei 1996
      houdende Nadere regels kwijtschelding gemeentelijke en waterschapsbelastingen (Stcrt. 1996, 98) wordt ingetrokken.
  - number: '6'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel6
    text: |
      1. Deze regeling treedt in werking met ingang van de dag na de datum van uitgifte van de Staatscourant waarin zij wordt
      geplaatst en werkt terug tot en met 1 januari 2022.

      2. Met ingang van 1 januari 2022 berusten verordeningen ter uitvoering van de artikelen 1 of 1a van de Regeling van de
      Staatssecretaris van Binnenlandse Zaken en de Minister van Verkeer en Waterstaat van 2 mei 1996 houdende Nadere regels
      kwijtschelding gemeentelijke en waterschapsbelastingen (Stcrt. 1996, 98) mede op de artikelen 2 of 3 van deze regeling.
  - number: '7'
    url: https://wetten.overheid.nl/BWBR0047157/2022-09-17#Artikel7
    text: |
      Deze regeling wordt aangehaald als: Regeling kwijtschelding belastingen medeoverheden.

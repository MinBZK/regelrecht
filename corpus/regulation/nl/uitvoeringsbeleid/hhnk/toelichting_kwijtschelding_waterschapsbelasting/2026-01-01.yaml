articles:
  - number: '2.3'
    text: |-
      **Kan ik kwijtschelding aanvragen voor al betaalde
      bedragen?**

      U kunt tot 3 maanden nadat u (een deel van) de
      aanslag heeft betaald kwijtschelding aanvragen. Als
      uw kwijtscheldingsverzoek wordt toegewezen, krijgt u
      het betaalde bedrag terug, voor zover de betaling
      niet langer dan 3 maanden voor ontvangst van het
      verzoek is gedaan.
    url: >-
      https://cuatro.sim-cdn.nl/hhnk/uploads/toelichting_kwijtschelding_waterschapsbelasting_januari_2026.pdf
    machine_readable:
      definitions:
        TERMIJN_TERUGVRAGEN_MAANDEN:
          value: 3
          description: >-
            Maximaal 3 maanden na betaling kan
            kwijtschelding worden aangevraagd
      execution:
        parameters:
          - name: datum_betaling
            type: date
            required: true
            description: >-
              Datum waarop de (laatste) betaling heeft
              plaatsgevonden
          - name: datum_verzoek
            type: date
            required: true
            description: >-
              Datum waarop het kwijtscheldingsverzoek is
              ingediend
        output:
          - name: terugvraag_binnen_termijn
            type: boolean
            description: >-
              Of het verzoek binnen 3 maanden na betaling
              is ingediend
          - name: uiterste_datum_terugvraag
            type: date
            description: >-
              Uiterste datum om kwijtschelding aan te
              vragen na betaling
        actions:
          - output: uiterste_datum_terugvraag
            value:
              operation: DATE_ADD
              date: $datum_betaling
              months: $TERMIJN_TERUGVRAGEN_MAANDEN
          - output: terugvraag_binnen_termijn
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_verzoek
              value: $uiterste_datum_terugvraag

  - number: '4.4'
    text: |-
      **Wanneer is het verwijtbaar dat ik de aanslag niet
      kan betalen?**

      In sommige gevallen wordt geen kwijtschelding
      verleend als het aan uzelf te wijten is dat u de
      aanslag (nu) niet kunt betalen. Hiervan is onder
      andere sprake als:

      - een uitbetaald bedrag (bijvoorbeeld een
      belastingteruggaaf) niet is gebruikt om de aanslag
      te betalen waarvoor kwijtschelding wordt gevraagd;
      - vanaf het opleggen van de belastingaanslag tot aan
      het indienen van het verzoek om kwijtschelding op
      enig moment voldoende middelen aanwezig waren om de
      aanslag te kunnen betalen;
      - U wist of kon vermoeden dat een aanslag
      waterschapsbelasting zou worden opgelegd en u
      hiervoor geen middelen heeft gereserveerd, terwijl
      deze middelen er wel waren;
      - Als uw inkomen niet in verhouding staat tot uw
      uitgaven en u hier geen of onvoldoende opheldering
      over geeft.
    url: >-
      https://cuatro.sim-cdn.nl/hhnk/uploads/toelichting_kwijtschelding_waterschapsbelasting_januari_2026.pdf
    machine_readable:
      execution:
        parameters:
          - name: uitbetaald_bedrag_niet_aangewend
            type: boolean
            required: true
            description: >-
              Uitbetaald bedrag niet gebruikt om aanslag
              te betalen
          - name: op_enig_moment_voldoende_middelen
            type: boolean
            required: true
            description: >-
              Tussen opleggen aanslag en verzoek waren er
              voldoende middelen
          - name: nalatig_middelen_reserveren
            type: boolean
            required: true
            description: >-
              Wist of kon vermoeden dat aanslag zou komen
              maar heeft niet gereserveerd
          - name: inkomen_uitgaven_onevenredig
            type: boolean
            required: true
            description: >-
              Inkomen staat niet in verhouding tot
              uitgaven zonder opheldering
        output:
          - name: is_verwijtbaar
            type: boolean
            description: >-
              Of het niet-betalen verwijtbaar is aan de
              belastingschuldige
        actions:
          - output: is_verwijtbaar
            value:
              operation: OR
              conditions:
                - operation: EQUALS
                  subject: $uitbetaald_bedrag_niet_aangewend
                  value: true
                - operation: EQUALS
                  subject: $op_enig_moment_voldoende_middelen
                  value: true
                - operation: EQUALS
                  subject: $nalatig_middelen_reserveren
                  value: true
                - operation: EQUALS
                  subject: $inkomen_uitgaven_onevenredig
                  value: true

  - number: '6'
    text: |-
      **Bijlage: Normbedragen kwijtschelding per
      1 januari 2026**

      Normbedragen, ziektekostennormen,
      woonlastennormen en kinderopvangtarieven die
      gelden voor kwijtscheldingsverzoeken per
      1 januari 2026. Deze bedragen worden halfjaarlijks
      bijgesteld door de Rijksoverheid.
    url: >-

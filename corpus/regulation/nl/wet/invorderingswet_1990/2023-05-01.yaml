---
$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: invorderingswet_1990
regulatory_layer: WET
publication_date: '1990-05-31'
valid_from: '2023-05-01'
url: https://wetten.overheid.nl/BWBR0004770/2023-05-01
bwb_id: BWBR0004770
name: Invorderingswet 1990

articles:
  - number: '26'
    text: |-
      **Kwijtschelding**

      1. Bij ministeriele regeling worden regels gesteld
      krachtens welke aan de belastingschuldige die niet in
      staat is anders dan met buitengewoon bezwaar een
      belastingaanslag geheel of gedeeltelijk te betalen,
      gehele of gedeeltelijke kwijtschelding kan worden
      verleend.

      2. Bij ministeriele regeling worden regels gesteld
      krachtens welke aan de belastingschuldige ter zake van
      belasting waarvoor op de voet van artikel 25, vijfde
      lid, uitstel van betaling is verleend, kwijtschelding
      van belasting kan worden verleend indien dit uitstel
      eindigt doordat de termijn, bedoeld in artikel 25,
      vijfde lid, tweede volzin, is verstreken.
      Kwijtschelding van belasting kan worden verleend tot
      een bedrag gelijk aan het nog openstaande bedrag nadat
      de termijn, bedoeld in artikel 25, vijfde lid, tweede
      volzin, is verstreken.

      3. Indien de ontvanger het op de voet van artikel 25,
      vijfde lid, verleende uitstel van betaling beeindigt
      omdat zich met betrekking tot een aanspraak uit een
      overeenkomst van levensverzekering of een aanspraak
      ingevolge een pensioenregeling een omstandigheid
      voordoet als bedoeld in artikel 25, vijfde lid, vierde
      volzin, kan krachtens bij ministeriele regeling te
      stellen regels aan de belastingschuldige kwijtschelding
      van belasting worden verleend voor zover:

      a. die belasting hoger is dan de belasting die zou zijn
      geheven ter zake van de hiervoor bedoelde omstandigheid
      indien de belastingschuldige op het moment waarop die
      omstandigheid zich voordeed in Nederland zou hebben
      gewoond;

      b. de omstandigheid die ingevolge artikel 25, vijfde
      lid, vierde volzin, tot beeindiging van het uitstel van
      betaling heeft geleid, ingevolge een regeling ter
      voorkoming van dubbele belasting niet belastbaar is in
      Nederland.

      4-8. [leden 4-8 niet opgenomen - betreffen specifieke
      situaties rond uitstel van betaling en
      aandelenvervreemding die buiten het focusgebied
      kwijtschelding waterschapsbelastingen vallen]
    url: https://wetten.overheid.nl/BWBR0004770/2023-05-01#Artikel26
    machine_readable:
      open_terms:
        - id: kwijtscheldingsregels
          type: boolean
          required: true
          delegated_to: minister
          delegation_type: MINISTERIELE_REGELING
          legal_basis: >-
            artikel 26, eerste lid, Invorderingswet 1990
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: niet_in_staat_te_betalen
            type: boolean
            required: true
            description: >-
              Belastingschuldige is niet in staat anders dan
              met buitengewoon bezwaar te betalen
        output:
          - name: recht_op_kwijtschelding
            type: boolean
            description: >-
              Of de belastingschuldige in aanmerking komt
              voor kwijtschelding
        actions:
          - output: recht_op_kwijtschelding
            value:
              operation: EQUALS
              subject: $niet_in_staat_te_betalen
              value: true

  - number: 26a
    text: |-
      **Ambtshalve kwijtschelding hersteloperatie toeslagen**

      1. De ontvanger verleent bij voor bezwaar vatbare
      beschikking ambtshalve kwijtschelding van het nog op
      31 december 2020 openstaande bedrag van een
      belastingaanslag van een persoon als bedoeld in
      artikel 3.1, eerste lid, van de Wet hersteloperatie
      toeslagen.

      2. Het eerste lid is van overeenkomstige toepassing op:

      a. belastingaanslagen die niet voor 1 januari 2021
      bekend zijn gemaakt en betrekking hebben op een
      tijdvak dat is geeindigd, dan wel een tijdstip dat is
      gelegen, voor 1 januari 2021;

      b. nog openstaande bedragen, niet zijnde belastingen,
      die door de ontvanger worden ingevorderd met toepassing
      dan wel overeenkomstige toepassing van deze wet.

      3. De ontvanger verleent bij voor bezwaar vatbare
      beschikking aan degene, bedoeld in het eerste lid, die
      aansprakelijk is gesteld overeenkomstig artikel 49 voor
      de belasting of bedragen, bedoeld in het eerste en
      tweede lid, ontslag van de verplichting tot betaling van
      die belastingen of bedragen.

      4. Indien het openstaande bedrag, bedoeld in het eerste
      lid, na 31 december 2020 is verminderd als gevolg van
      een betaling of verrekening, betaalt de ontvanger het
      bedrag waarmee het openstaande bedrag is verminderd uit
      aan de belastingschuldige.

      5. Geen kwijtschelding wordt verleend indien het
      ontstaan of niet voldoen van de belastingaanslag het
      gevolg is van ernstig verwijtbaar handelen of nalaten
      van de belastingschuldige.

      6-9. [leden 6-9 niet opgenomen - betreffen termijnen,
      voorlopige aanslagen, de-minimissteun en
      rechtsmiddelen]
    url: https://wetten.overheid.nl/BWBR0004770/2023-05-01#Artikel26a
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: is_toeslagengedupeerde
            type: boolean
            required: true
            description: >-
              Persoon als bedoeld in artikel 3.1 lid 1
              Wet hersteloperatie toeslagen
          - name: openstaand_bedrag_op_peildatum
            type: number
            required: true
            description: >-
              Openstaand bedrag belastingaanslag op
              31 december 2020 in eurocent
          - name: ernstig_verwijtbaar
            type: boolean
            required: true
            description: >-
              Of het ontstaan of niet voldoen ernstig
              verwijtbaar is
        output:
          - name: recht_op_ambtshalve_kwijtschelding
            type: boolean
            description: >-
              Of de persoon recht heeft op ambtshalve
              kwijtschelding
          - name: kwijtscheldingsbedrag
            type: amount
            type_spec:
              unit: eurocent
            description: Bedrag dat wordt kwijtgescholden
        actions:
          - output: recht_op_ambtshalve_kwijtschelding
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_toeslagengedupeerde
                  value: true
                - operation: GREATER_THAN
                  subject: $openstaand_bedrag_op_peildatum
                  value: 0
                - operation: NOT
                  value: $ernstig_verwijtbaar
          - output: kwijtscheldingsbedrag
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $recht_op_ambtshalve_kwijtschelding
                    value: true
                  then: $openstaand_bedrag_op_peildatum
              default: 0

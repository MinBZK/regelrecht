preamble:
  text: |-
    Wij Beatrix, bij de gratie Gods, Koningin der Nederlanden, Prinses van Oranje-Nassau, enz. enz. enz.

    Allen, die deze zullen zien of horen lezen, saluut! doen te weten:

    Alzo Wij in overweging genomen hebben, dat het wenselijk is opnieuw regels te stellen met betrekking tot de
    verzekering van werknemers tegen geldelijke gevolgen van werkloosheid, ter vervanging van de Werkloosheidswet (Stb.
    1967, 421) en de Wet Werkloosheidsvoorziening (Stb. 1964, 485);

    Zo is het, dat Wij, de Raad van State gehoord, en met gemeen overleg der Staten-Generaal, hebben goedgevonden en
    verstaan, gelijk Wij goedvinden en verstaan bij deze:
  url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#ArtikelAanhef

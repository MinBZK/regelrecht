        artikel: '25'
  - number: '27.4'
    text: |-
      Het UWV weigert de uitkering tijdelijk of blijvend, geheel of gedeeltelijk indien de verzekerde, bedoeld in
      de [Ziektewet][ref1], die gedurende de eerste dertien weken van zijn ongeschiktheid tot het verrichten van
      zijn arbeid wegens ziekte een uitkering ontvangt op grond van deze wet een verplichting voortvloeiend uit
      [artikel 45, eerste lid, van de Ziektewet][ref2] niet is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel45
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '45'
  - number: '27.5'
    text: |-
      Het opleggen van een maatregel op grond van het vierde lid blijft achterwege indien voor dezelfde gedraging een
      maatregel op grond van het eerste, tweede of derde lid kan worden opgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
  - number: '27.6'
    text: |-
      Een maatregel als bedoeld in het derde of vierde lid wordt afgestemd op de ernst van de gedraging en de mate waarin
      de werknemer de gedraging verweten kan worden. Van het opleggen van een maatregel wordt in elk geval afgezien,
      indien elke vorm van verwijtbaarheid ontbreekt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
  - number: '27.7'
    text: |-
      Het UWV kan afzien van het opleggen van een maatregel als bedoeld in het derde of vierde lid en volstaan met het
      geven van een schriftelijke waarschuwing ter zake van het niet tijdig nakomen van een verplichting als bedoeld in
      [artikel 25][ref1], indien het niet tijdig nakomen van de verplichting, niet heeft geleid tot het ten onrechte of
      tot een te hoog bedrag verlenen van uitkering, of ter zake van het zich niet houden aan een voorschrift als bedoeld
      in [artikel 24, eerste lid, onderdeel b, onder 1°][ref2], of [artikel 26, eerste lid, onderdeel b of d][ref3],
      tenzij het niet tijdig nakomen van de verplichting, of het zich niet houden aan de voorschriften, plaatsvindt
      binnen een periode van twee jaar te rekenen vanaf de datum waarop eerder aan de werknemer een zodanige waarschuwing
      is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel24
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel26
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '26'
        hoofdstuk: II
        paragraaf: '2'
  - number: '27.8'
    text: Het UWV kan afzien van het opleggen van een maatregel indien daarvoor dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
  - number: '27.9'
    text: |-
      Het opleggen van een maatregel blijft achterwege indien voor dezelfde gedraging een bestuurlijke boete als bedoeld
      in [artikel 27a][ref1] wordt opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel27a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 27a
        hoofdstuk: II
        paragraaf: '2'
  - number: '27.10'
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld met betrekking tot het derde, vierde
      en zesde lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
  - number: '27.11'
    text: |-
      Het bedrag, bedoeld in het eerste en tweede lid, wordt als volgt berekend: A x B x (C / D). Hierbij staat: A voor
      0,75 in de eerste twee maanden waarop recht op uitkering bestaat en daarna voor 0,7; B voor het aantal uren in
      een kalendermaand dat de werknemer gewerkt zou hebben indien hij de arbeid, bedoeld in het eerste of tweede lid,
      zou hebben aanvaard, verkregen of behouden; C voor het dagloon; en D voor het gemiddeld aantal arbeidsuren per
      kalenderweek, bedoeld in [artikel 16, tweede en zesde lid][ref1], gedeeld door 5.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
  - number: 27a.1
    text: |-
      Het UWV legt een bestuurlijke boete op van ten hoogste het benadelingsbedrag wegens het niet of niet
      behoorlijk nakomen door de werknemer van de verplichting, bedoeld in [artikel 25][ref1]. Indien de feiten
      en omstandigheden, bedoeld in artikel 25, niet of niet behoorlijk zijn medegedeeld en deze overtreding
      opzettelijk is begaan, bedraagt de bestuurlijke boete ten hoogste het bedrag van de vijfde categorie, bedoeld
      in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2]. Indien de feiten en omstandigheden, bedoeld
      in artikel 25, niet of niet behoorlijk zijn medegedeeld en deze overtreding niet opzettelijk is begaan, bedraagt
      de bestuurlijke boete ten hoogste het bedrag van de derde categorie, bedoeld in artikel 23, vierde lid, van het
      Wetboek van Strafrecht.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 27a.2
    text: |-
      In dit artikel wordt onder benadelingsbedrag verstaan het brutobedrag dat als gevolg van het niet of niet
      behoorlijk nakomen van de verplichting, bedoeld in [artikel 25][ref1], ten onrechte of tot een te hoog bedrag aan
      uitkering is ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: 27a.3
    text: |-
      Indien het niet of niet behoorlijk nakomen door de werknemer van de verplichting, bedoeld in [artikel 25][ref1],
      niet heeft geleid tot een benadelingsbedrag, legt het UWV een bestuurlijke boete op van ten hoogste het bedrag van
      de tweede categorie, bedoeld in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 27a.4
    text: |-
      Het UWV kan afzien van het opleggen van een bestuurlijke boete en volstaan met het geven van een schriftelijke
      waarschuwing wegens het niet of niet behoorlijk nakomen door de werknemer van de verplichting, bedoeld in
      [artikel 25][ref1], in situaties die bij algemene maatregel van bestuur worden bepaald, tenzij het niet of niet
      behoorlijk nakomen van de verplichting plaatsvindt binnen een periode van twee jaar te rekenen vanaf de datum
      waarop eerder aan de werknemer een zodanige waarschuwing is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: 27a.5
    text: |-
      Het UWV legt een bestuurlijke boete op wegens het niet of niet behoorlijk nakomen door de werknemer van de
      verplichting, bedoeld in [artikel 25][ref1], als gevolg waarvan ten onrechte of tot een te hoog bedrag aan
      uitkering is ontvangen, van ten hoogste 150 procent van het benadelingsbedrag, met overeenkomstige toepassing van
      het eerste lid, indien binnen een tijdvak van vijf jaar voorafgaand aan de dag van het begaan van de overtreding
      een eerdere bestuurlijke boete of strafrechtelijke sanctie is opgelegd wegens een eerdere overtreding, bestaande
      uit eenzelfde gedraging, die onherroepelijk is geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: 27a.6
    text: |-
      Onder eenzelfde gedraging als bedoeld in het vijfde lid wordt verstaan het niet of niet
      behoorlijk nakomen van de verplichting, bedoeld in de [artikelen 25][ref1] van deze wet,
      [12 van de Toeslagenwet][ref2], [12, eerste lid, van de Wet inkomensvoorziening oudere werklozen][ref3],
      [80 van de Wet op de arbeidsongeschiktheidsverzekering][ref4],
      [27, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen][ref5], [31, eerste lid][ref6], of
      [49 van de Ziektewet][ref7], als gevolg waarvan ten onrechte of tot een te hoog bedrag aan uitkering, ziekengeld of
      toeslag is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0004043#Artikel12
      [ref3]: https://wetten.overheid.nl/BWBR0024394#Artikel12
      [ref4]: https://wetten.overheid.nl/BWBR0002524#Artikel80
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref6]: https://wetten.overheid.nl/BWBR0001888#Artikel31
      [ref7]: https://wetten.overheid.nl/BWBR0001888#Artikel49
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004043
        artikel: '12'
      - id: ref3
        bwb_id: BWBR0024394
        artikel: '12'
      - id: ref4
        bwb_id: BWBR0002524
        artikel: '80'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '27'
      - id: ref6
        bwb_id: BWBR0001888
        artikel: '31'
      - id: ref7
        bwb_id: BWBR0001888
        artikel: '49'
  - number: 27a.7
    text: |-
      In afwijking van het vijfde lid is het in dat lid genoemde tijdvak van vijf jaar tien jaar indien wegens de eerdere
      overtreding, bedoeld in het vijfde lid, de werknemer is gestraft met een onvoorwaardelijke gevangenisstraf.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
  - number: 27a.8
    text: Het UWV kan afzien van het opleggen van een bestuurlijke boete indien daarvoor dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
  - number: 27a.9
    text: |-
      Degene aan wie een bestuurlijke boete is opgelegd, is verplicht desgevraagd aan het UWV de inlichtingen te
      verstrekken die voor de tenuitvoerlegging van de bestuurlijke boete van belang zijn.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
  - number: 27a.10
    text: Bij algemene maatregel van bestuur worden nadere regels gesteld over de hoogte van de bestuurlijke boete.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
  - number: 27a.11
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij de bestuurlijke boete is opgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
  - number: 27a.12
    text: |-
      In afwijking van [artikel 8:69 van de Algemene wet bestuursrecht][ref1] kan de rechter in beroep of hoger beroep
      het bedrag waarop de bestuurlijke boete is vastgesteld ook ten nadele van de werknemer wijzigen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 27a.13
    text: |-
      Indien ten aanzien van een overtreding waarvoor een bestuurlijke boete is opgelegd geen sprake is geweest van
      opzet of grove schuld, en voorts is gebleken dat binnen een jaar nadat de bestuurlijke boete is opgelegd niet
      nogmaals een overtreding wegens eenzelfde gedraging als bedoeld in het zesde lid is begaan, is het UWV bevoegd op
      verzoek van degene aan wie de bestuurlijke boete is opgelegd, de bestuurlijke boete geheel of gedeeltelijk kwijt
      te schelden bij medewerking aan een schuldregeling. [Artikel 36c, eerste, derde en vierde lid][ref1], is van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel36c
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 36c
        hoofdstuk: II
        paragraaf: '3'
  - number: 27a.14
    text: |-
      Het besluit tot kwijtschelding, bedoeld in het dertiende lid, wordt ingetrokken of ten nadele van degene aan wie
      de bestuurlijke boete is opgelegd herzien indien binnen vijf jaar na het besluit tot kwijtschelding wederom een
      overtreding is begaan wegens eenzelfde gedraging als bedoeld in het zesde lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27a
  - number: 27g.1
    text: |-
      Het UWV verrekent de bestuurlijke boete en een eerdere bestuurlijke boete wegens eenzelfde gedraging als
      bedoeld in artikel 27a, vijfde lid, met een uitkering op grond van deze wet, de [Ziektewet][ref1], de
      [Wet werk en inkomen naar arbeidsvermogen][ref2], de [Wet op de arbeidsongeschiktheidsverzekering][ref3],
      de [Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref4], de
      [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref5], de
      [Wet arbeidsongeschiktheidsvoorziening militairen][ref6], de [Wet inkomensvoorziening oudere werklozen][ref7], de
      [Wet arbeid en zorg][ref8] of een toeslag op grond van de [Toeslagenwet][ref9], die de overtreder ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0019057
      [ref3]: https://wetten.overheid.nl/BWBR0002524
      [ref4]: https://wetten.overheid.nl/BWBR0008656
      [ref5]: https://wetten.overheid.nl/BWBR0008657
      [ref6]: https://wetten.overheid.nl/BWBR0002822
      [ref7]: https://wetten.overheid.nl/BWBR0024394
      [ref8]: https://wetten.overheid.nl/BWBR0013008
      [ref9]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0019057
      - id: ref3
        bwb_id: BWBR0002524
      - id: ref4
        bwb_id: BWBR0008656
      - id: ref5
        bwb_id: BWBR0008657
      - id: ref6
        bwb_id: BWBR0002822
      - id: ref7
        bwb_id: BWBR0024394
      - id: ref8
        bwb_id: BWBR0013008
      - id: ref9
        bwb_id: BWBR0004043
  - number: 27g.2
    text: |-
      Onverminderd het eerste lid kan het UWV de bestuurlijke boete verrekenen met een vordering die degene aan wie de
      bestuurlijke boete is opgelegd op hem heeft.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
  - number: 27g.3
    text: |-
      De Sociale verzekeringsbank onderscheidenlijk de gemeente betaalt het bedrag van de bestuurlijke boete, zonder
      dat daarvoor een machtiging nodig is, op zijn verzoek aan het UWV indien de overtreder een uitkering ontvangt
      op grond van de [Algemene Ouderdomswet][ref1], de [Algemene nabestaandenwet][ref2], de [Participatiewet][ref3],
      de [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers][ref4] of de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0002221
      [ref2]: https://wetten.overheid.nl/BWBR0007795
      [ref3]: https://wetten.overheid.nl/BWBR0015703
      [ref4]: https://wetten.overheid.nl/BWBR0004044
      [ref5]: https://wetten.overheid.nl/BWBR0004163
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
    references:
      - id: ref1
        bwb_id: BWBR0002221
      - id: ref2
        bwb_id: BWBR0007795
      - id: ref3
        bwb_id: BWBR0015703
      - id: ref4
        bwb_id: BWBR0004044
      - id: ref5
        bwb_id: BWBR0004163
  - number: 27g.4
    text: |-
      De in [artikel 479g van het Wetboek van Burgerlijke Rechtsvordering][ref1] aan de raad voor de
      kinderbescherming toegekende bevoegdheid komt gelijkelijk toe aan het UWV. Indien het UWV gebruik
      maakt van deze bevoegdheid, geschiedt de bekendmaking van het dwangbevel, in afwijking van
      [artikel 4:123, eerste lid, van de Algemene wet bestuursrecht][ref2], door middel van toezending per post aan
      degene aan wie de boete is opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel479g
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 479g
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 27g.5
    text: |-
      Zolang de overtreder zijn verplichting, bedoeld in [artikel 27a, negende lid][ref1], niet of niet behoorlijk
      nakomt:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel27a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 27a
        hoofdstuk: II
        paragraaf: '2'
  - number: 27g.5.a
    text: |-
      is het UWV in afwijking van [artikel 4:93, vierde lid, van de Algemene wet bestuursrecht][ref1] bevoegd tot
      verrekening van de bestuurlijke boete voor zover beslag op de vordering van de schuldeiser nietig zou zijn;


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 27g.5.b
    text: |-
      geldt de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1], in afwijking van
      [artikel 4:116 van de Algemene wet bestuursrecht][ref2], niet bij de invordering van een bestuurlijke boete bij
      dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27g
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 27i
    text: |-
      Indien het UWV de werknemer de uitkering op grond van deze wet tijdelijk of blijvend, geheel of gedeeltelijk heeft
      geweigerd dan wel hem een bestuurlijke boete heeft opgelegd, stelt het UWV het reïntegratiebedrijf dat ten behoeve
      van die verzekerde werkzaamheden gericht op vergroting van de mogelijkheden tot het verrichten van arbeid of op
      inschakeling in arbeid verricht, van dat besluit in kennis voorzover dat noodzakelijk is voor de uitvoering van de
      werkzaamheden door het reïntegratiebedrijf.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27i
  - number: '28'
    text: |-
      Indien het UWV een maatregel als bedoeld in [artikel 27][ref1] heeft opgelegd, zet het in geval van herleving van
      het recht op uitkering als bedoeld in [artikel 21][ref2] een weigering van de uitkering voort.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel21
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel28
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '27'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '21'
        hoofdstuk: II
        paragraaf: '1'
  - number: '29'
    text: |-
      Bij een besluit tot herziening van de uitkering wordt mededeling gedaan van de herziening en, in een bijlage, van
      de op die herziening betrekking hebbende gewijzigde rechten en plichten van de werknemer.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel29
  - number: '30.1'
    text: Het UWV betaalt de uitkering waarop op grond van deze wet recht bestaat.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
  - number: '30.2'
    text: |-
      Het UWV schort de betaling van de uitkering op of schorst de betaling, indien het op grond van duidelijke
      aanwijzingen van oordeel is of het gegronde vermoeden heeft, dat:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
  - number: 30.2.a
    text: het recht op uitkering niet of niet meer bestaat;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
  - number: 30.2.b
    text: recht op een lagere uitkering bestaat; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
  - number: 30.2.c
    text: |-
      de werknemer een verplichting, hem op grond van de [artikelen 24][ref1], [25][ref2] of [26][ref3] opgelegd, niet
      is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel24
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel26
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '26'
        hoofdstuk: II
        paragraaf: '2'
  - number: '30.3'
    text: |-
      Indien een reïntegratiebedrijf aan het UWV heeft gemeld dat het gegronde vermoeden bestaat dat een persoon aan wie
      een uitkering op grond van deze wet is toegekend onvoldoende medewerking verleent aan de op hem betrekking hebbende
      werkzaamheden van het reïntegratiebedrijf, neemt het UWV een besluit omtrent de gehele of gedeeltelijke opschorting
      of schorsing van de betaling van de uitkering aan die persoon voor de duur van ten hoogste acht weken.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
  - number: '30.4'
    text: |-
      Het UWV stelt het reïntegratiebedrijf in kennis van een besluit tot opschorting of schorsing als bedoeld in het
      derde lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30
  - number: 30a.1
    text: |-
      Is van de aanvrager of ontvanger van een uitkering bij het UWV een adres in Nederland bekend, terwijl in de
      basisregistratie personen ambtshalve is opgenomen dat hij is vertrokken naar een onbekend land van verblijf,
      dan verzoekt het UWV hem de afwijkende registratie in de basisregistratie personen binnen een redelijke termijn
      ongedaan te laten maken.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30a
  - number: 30a.2
    text: |-
      Wanneer na afloop van deze termijn, de afwijkende registratie niet is beëindigd of als uit de basisregistratie
      personen niet blijkt dat het college van burgemeester en wethouders van de desbetreffende gemeente de gegevens over
      het adres in onderzoek heeft genomen, schort het UWV de betaling van de uitkering aan de persoon, die recht heeft
      op de uitkering, op.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30a
  - number: 30a.3
    text: |-
      De opschorting wordt beëindigd zodra is vastgesteld dat de persoon, bedoeld in het tweede lid, in het buitenland
      woont of verblijft of dat een adres in Nederland in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30a
  - number: 30a.4
    text: |-
      Indien het onderzoek van het college van burgemeester en wethouders is afgerond en de persoon, bedoeld in
      het tweede lid, in de basisregistratie personen ambtshalve opgenomen blijft met gegevens over het vertrek uit
      Nederland, schort het UWV de betaling van de uitkering op tot verblijf in het buitenland kan worden vastgesteld of
      een adres in Nederland in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel30a
  - number: '31.1'
    text: |-
      Het UWV betaalt geen voorschot op de uitkering over tijdvakken waarin het loon niet wordt doorbetaald in verband
      met een geschil tussen de werknemer en zijn werkgever over het bestaan van ziekte van de werknemer.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel31
  - number: '31.2'
    text: |-
      Voor zover bij of krachtens deze wet niet anders is bepaald, wordt een voorschot op de uitkering beschouwd als een
      uitkering op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel31
  - number: '32'
    text: |-
      De uitkering die niet in ontvangst is genomen of is ingevorderd binnen drie maanden na de dag van
      betaalbaarstelling, wordt niet meer betaald. Het UWV is bevoegd in bijzondere gevallen ten gunste van de werknemer
      af te wijken van de in de eerste volzin genoemde drie maanden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel32
  - number: '33.1'
    text: Het UWV betaalt de uitkering in de regel per kalendermaand achteraf.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel33
  - number: '33.2'
    text: |-
      In afwijking van het eerste lid is het UWV bevoegd, op verzoek van de werknemer of uit eigen beweging, de uitkering
      over een kortere periode te betalen, indien de werknemer over die kortere periode loon ontving.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel33
  - number: '33.3'
    text: |-
      In afwijking van het eerste lid betaalt het UWV aan de werknemer die werkloos is ten gevolge van de eindiging
      van zijn dienstbetrekking en in wiens dagloon vakantiebijslag is berekend, een gedeelte van de uitkering als
      vakantiebijslag jaarlijks in de maand mei over de aan die maand voorafgaande maanden, of, indien het recht op
      uitkering eerder dan in de maand mei geheel eindigt, in de desbetreffende maand. De vakantiebijslag bedraagt 8/108
      van de uitkering.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel33
  - number: '33.4'
    text: |-
      Indien het percentage van de vakantiebijslag, bedoeld in
      [artikel 15, eerste lid, van de Wet minimumloon en minimumvakantiebijslag][ref1], wordt gewijzigd, treedt dit
      gewijzigde percentage in de plaats van de teller en het getal boven het honderd in plaats van de noemer van de in
      het derde lid genoemde breuk. Het gewijzigde percentage wordt in aanmerking genomen over de uitkering waarop recht
      bestaat vanaf de dag waarop de wijziging ingaat.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel15
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '15'
  - number: '33.5'
    text: De vakantiebijslag wordt betaald zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel33
  - number: '35'
    text: |-
      De uitkering wordt niet betaald over perioden gelegen voor 26 weken voorafgaand aan de dag waarop de aanvraag om
      een uitkering werd ingediend. Het UWV is bevoegd in bijzondere gevallen af te wijken van de eerste zin.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel35
  - number: '36.1'
    text: |-
      De uitkering die als gevolg van een besluit als bedoeld in [artikel 22a][ref1] of [27][ref2] onverschuldigd
      is betaald, alsmede hetgeen anderszins onverschuldigd is betaald, wordt door het UWV teruggevorderd. Indien
      de uitkering, bedoeld in [artikel 18, eerste lid][ref3], van de werkgever wordt teruggevorderd, kan deze het
      teruggevorderde bedrag niet verhalen op de werknemer.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel22a
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel27
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 22a
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '27'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
  - number: '36.2'
    text: |-
      Een uitkering die onverschuldigd aan de werkgever is betaald, wordt door het UWV van de werkgever teruggevorderd,
      indien de werknemer recht heeft op loon over de uren waarop de onverschuldigd betaalde uitkering betrekking had.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: '36.3'
    text: |-
      In afwijking van het eerste lid kan het UWV besluiten van terugvordering of van verdere terugvordering af te zien,
      indien degene van wie wordt teruggevorderd:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: 36.3.a
    text: gedurende vijf jaar volledig aan zijn betalingsverplichtingen heeft voldaan;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: 36.3.b
    text: |-
      gedurende vijf jaar niet volledig aan zijn betalingsverplichtingen heeft voldaan, maar het achterstallige bedrag
      over die periode, vermeerderd met de daarover verschuldigde wettelijke rente en de op de invordering betrekking
      hebbende kosten, alsnog heeft betaald;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: 36.3.c
    text: |-
      gedurende vijf jaar geen betalingen heeft verricht en niet aannemelijk is dat hij deze op enig moment zal gaan
      verrichten; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: 36.3.d
    text: een bedrag, overeenkomend met ten minste 50% van de restsom in één keer aflost.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: '36.4'
    text: |-
      De in het derde lid, onderdelen a, b en c, genoemde termijn is tien jaar indien de terugvordering het gevolg is van
      het niet of niet behoorlijk nakomen van de verplichting, bedoeld in [artikel 25][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: '36.5'
    text: 'De in het derde lid, onder a en b, genoemde termijn is drie jaar indien:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: 36.5.a
    text: |-
      het gemiddeld inkomen van de belanghebbende in die periode de beslagvrije voet bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1] niet te boven is gegaan; en


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 36.5.b
    text: |-
      de terugvordering niet het gevolg is van het niet of niet behoorlijk nakomen van de verplichting, bedoeld in
      [artikel 25][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: '36.6'
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn kan het UWV besluiten geheel of gedeeltelijk van terugvordering af
      te zien.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: '36.7'
    text: |-
      Degene van wie wordt teruggevorderd is verplicht desgevraagd aan het UWV de inlichtingen te verstrekken die voor de
      terugvordering van belang zijn.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: '36.8'
    text: |-
      In afwijking van het eerste lid kan het UWV, onder voorwaarden die Onze Minister kan stellen, besluiten van
      terugvordering af te zien indien het terug te vorderen bedrag een door Onze Minister vast te stellen bedrag niet te
      boven gaat.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36
  - number: 36a.1
    text: |-
      Het UWV kan de onverschuldigd betaalde uitkering, bedoeld in [artikel 36, eerste en tweede lid][ref1], invorderen
      bij dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel36
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '36'
        hoofdstuk: II
        paragraaf: '3'
  - number: 36a.2
    text: |-
      [Artikel 27g][ref1] is van overeenkomstige toepassing, met dien verstande dat indien het
      gemiddeld inkomen van de belanghebbende gedurende drie jaar de beslagvrije voet bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref2] niet te boven is gegaan, het
      UWV de aflossingsbedragen lager vaststelt.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel27g
      [ref2]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 27g
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 36b
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij is vastgesteld dat onverschuldigd is betaald.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36b
  - number: 36c.1
    text: |-
      In afwijking van [artikel 36, eerste lid][ref1], kan het UWV, op verzoek van de werknemer, besluiten gedeeltelijk
      van terugvordering of gedeeltelijk van verdere terugvordering af te zien door medewerking aan een schuldregeling,
      indien:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel36
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '36'
        hoofdstuk: II
        paragraaf: '3'
  - number: 36c.1.a
    text: |-
      redelijkerwijs te voorzien is dat de werknemer niet zal kunnen voortgaan met het betalen van zijn schulden of
      indien hij in de toestand verkeert dat hij heeft opgehouden te betalen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.1.b
    text: |-
      redelijkerwijs te voorzien is dat een schuldregeling met betrekking tot alle vorderingen, behoudens de in het
      tweede lid bedoelde vorderingen, van de overige schuldeisers zonder een zodanig besluit niet tot stand zal komen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.1.c
    text: |-
      een naar het oordeel van het UWV betrouwbaar voorstel voor een schuldregeling tot stand is gekomen door tussenkomst
      van een schuldhulpverlener als bedoeld in [artikel 48 van de Wet op het consumentenkrediet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004815#Artikel48
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
    references:
      - id: ref1
        bwb_id: BWBR0004815
        artikel: '48'
  - number: 36c.1.d
    text: aannemelijk is dat medewerking aan een schuldregeling niet concurrentieverstorend werkt; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.1.e
    text: |-
      uitdeling in het kader van de schuldregeling plaatsvindt overeenkomstig
      [artikel 349 van de Faillissementswet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001860#Artikel349
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
    references:
      - id: ref1
        bwb_id: BWBR0001860
        artikel: '349'
  - number: 36c.2
    text: |-
      Het eerste lid is niet van toepassing, indien een vordering is ontstaan door het opzettelijk of door grove schuld
      niet nakomen door de werknemer van de verplichting, bedoeld in [artikel 25][ref1], en hiervoor een boete als
      bedoeld in [artikel 27a][ref2] is opgelegd, dan wel met betrekking tot het niet naleven van die verplichting
      aangifte is gedaan op grond van het [Wetboek van Strafrecht][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel27a
      [ref3]: https://wetten.overheid.nl/BWBR0001854
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: 27a
        hoofdstuk: II
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0001854
  - number: 36c.3
    text: |-
      Het besluit tot afzien van terugvordering of verdere terugvordering wordt ingetrokken of ten nadele van de
      werknemer gewijzigd indien:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.3.a
    text: |-
      niet binnen twaalf maanden nadat dat besluit is bekendgemaakt, een schuldregeling tot stand is gekomen die voldoet
      aan de eisen, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.3.b
    text: de werknemer zijn schuld aan het UWV niet overeenkomstig de schuldregeling voldoet; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.3.c
    text: |-
      onjuiste of onvolledige gegevens zijn verstrekt en de verstrekking van juiste of volledige gegevens tot een ander
      besluit zou hebben geleid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36c.4
    text: |-
      Bij ministeriële regeling kunnen met betrekking tot dit artikel nadere regels worden gesteld ten aanzien van de
      bevoegdheid om mee te werken aan schuldregelingen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36c
  - number: 36d
    text: |-
      Een vordering van het UWV als bedoeld in [artikel 36][ref1] en [36c][ref2] is bevoorrecht en volgt onmiddellijk na
      de vorderingen, bedoeld in [artikel 288 van Boek 3 van het Burgerlijk Wetboek][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel36
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel36c
      [ref3]: https://wetten.overheid.nl/BWBR0005291#Artikel288
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel36d
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '36'
        hoofdstuk: II
        paragraaf: '3'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: 36c
        hoofdstuk: II
        paragraaf: '3'
      - id: ref3
        bwb_id: BWBR0005291
        artikel: '288'
  - number: '37'
    text: |-
      Ingeval het UWV een aan een overheidswerknemer toegekende uitkering op grond van deze wet, de [Ziektewet][ref1],
      de [Wet op de arbeidsongeschiktheidsverzekering][ref2], de [Wet werk en inkomen naar arbeidsvermogen][ref3]
      of [hoofdstuk 3, afdeling 2, paragraaf 1][ref4], of de [artikelen 4:2b, eerste tot en met zesde lid][ref5],
      of [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref6], dan wel een toeslag op grond van de
      [Toeslagenwet][ref7] betaalt aan een overheidswerkgever met het oogmerk die uitkering of toeslag door diens
      tussenkomst te doen uitbetalen:


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0002524
      [ref3]: https://wetten.overheid.nl/BWBR0019057
      [ref4]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref6]: https://wetten.overheid.nl/BWBR0013008#Artikel6
      [ref7]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel37
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0002524
      - id: ref3
        bwb_id: BWBR0019057
      - id: ref4
        bwb_id: BWBR0013008
        paragraaf: '1'
      - id: ref5
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref6
        bwb_id: BWBR0013008
        artikel: '6'
      - id: ref7
        bwb_id: BWBR0004043
  - number: 37.a
    text: |-
      wordt de bedoelde uitkering of toeslag niet vermeerderd met de daarover door de werkgever verschuldigde premie op
      grond van [artikel 24, tweede lid, van de Wet financiering sociale verzekeringen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel37
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '24'
  - number: 37.b
    text: |-
      treedt, in afwijking van [artikel 11, tweede lid][ref1],
      [artikel 10, derde lid, van de Wet op de arbeidsongeschiktheidsverzekering][ref2], en
      [artikel 11, derde lid, van de Ziektewet][ref3], voorzover die artikelleden betrekking hebben op de premie bedoeld
      in [artikel 24, tweede lid, van de Wet financiering sociale verzekeringen][ref4], de overheidswerkgever niet in de
      plaats van het UWV.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0002524#Artikel10
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0017745#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel37
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '11'
        hoofdstuk: I
        paragraaf: '3'
      - id: ref2
        bwb_id: BWBR0002524
        artikel: '10'
      - id: ref3
        bwb_id: BWBR0001888
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0017745
        artikel: '24'
  - number: '38.1'
    text: |-
      Voor het in ontvangst nemen en het verlenen van kwijting voor de betaling van de uitkering, wordt een minderjarige
      met een meerderjarige gelijk gesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel38
  - number: '38.2'
    text: |-
      Indien de wettelijke vertegenwoordiger van de minderjarige zich schriftelijk bij het UWV verzet tegen betaling aan
      de minderjarige wordt de uitkering aan de wettelijke vertegenwoordiger betaald.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel38
  - number: '39.1'
    text: |-
      Indien degene aan wie een uitkering is toegekend, aanspraak heeft op verstrekking of vergoeding van zorg als
      bedoeld in de [Wet langdurige zorg][ref1] en op grond van die wet een bijdrage voor die zorg verschuldigd
      is, is het UWV bevoegd de uitkering tot het bedrag van die bijdrage in plaats van aan degene, aan wie de
      uitkering is toegekend, zonder diens machtiging uit te betalen aan het Zorginstituut Nederland, genoemd in
      [artikel 58, eerste lid, van de Zorgverzekeringswet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0035917
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel58
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel39
    references:
      - id: ref1
        bwb_id: BWBR0035917
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '58'
  - number: '39.2'
    text: |-
      Indien aan degene aan wie een uitkering op grond van deze wet is toegekend, een
      maatwerkvoorziening of persoonsgebonden budget wordt verstrekt voor beschermd wonen als bedoeld in
      [artikel 1.1.1 van de Wet maatschappelijke ondersteuning 2015][ref1], en hij op grond van die [wet][ref2] hiervoor
      een bijdrage is verschuldigd, is het UWV bevoegd de uitkering tot het bedrag van die bijdrage in plaats van
      aan degene, aan wie die uitkering is toegekend, zonder diens machtiging uit te betalen aan het CAK, genoemd in
      [artikel 6.1.1, eerste lid, van de Wet langdurige zorg][ref3], dat voor de gemeente de bijdrage int.


      [ref1]: https://wetten.overheid.nl/BWBR0035362#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0035362
      [ref3]: https://wetten.overheid.nl/BWBR0035917#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel39
    references:
      - id: ref1
        bwb_id: BWBR0035362
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0035362
      - id: ref3
        bwb_id: BWBR0035917
        artikel: '6'
  - number: '39.3'
    text: |-
      Indien degene, aan wie een uitkering is toegekend, in een inrichting ter verpleging van geesteszieken of van
      zwakzinnigen is opgenomen en het UWV, van de desbetreffende inrichting of van het college van burgemeester en
      wethouders van de gemeente die de opnamekosten betaalt, het verzoek ontvangt om de uitkering aan die inrichting
      of die gemeente uit te betalen, is het UWV bevoegd dat verzoek zonder het stellen van andere voorwaarden in te
      willigen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel39
  - number: '39.4'
    text: |-
      Indien het eerste of tweede lid toepassing vindt, heeft de in het derde lid bedoelde bevoegdheid betrekking op het
      gedeelte van de uitkering dat niet aan de in het eerste of tweede lid genoemde instantie wordt uitbetaald.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel39
  - number: '39.5'
    text: |-
      Een herziening van de uitkering op grond van het eerste of tweede lid als gevolg van een wijziging van de
      verschuldigde bijdrage vindt plaats zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel39
  - number: '40.1'
    text: De uitkering is onvervreemdbaar en niet vatbaar voor verpanding of belening.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel40
  - number: '40.2'
    text: |-
      Een machtiging tot het in ontvangst nemen van de uitkering, onder welke vorm of benaming ook verleend, is steeds
      herroepelijk.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel40
  - number: '40.3'
    text: Elk beding, strijdig met het eerste of tweede lid, is nietig.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel40
  - number: '41'
    text: |-
      De uitkering wordt niet betaald indien deze per maand doorgaans minder bedraagt dan een achtste deel van het
      minimumloon.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel41
  - number: '42.1'
    text: |-
      De uitkeringsduur is ten minste drie maanden en ten hoogste 24 maanden, te rekenen vanaf de eerste dag waarop het
      recht op uitkering is ontstaan.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: '42.2'
    text: 'Indien de werknemer:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: 42.2.a
    text: |-
      aantoont in de periode van vijf kalenderjaren onmiddellijk voorafgaande aan het kalenderjaar waarin zijn
      eerste werkloosheidsdag is gelegen, in ten minste vier kalenderjaren over 52 of meer dagen per kalenderjaar
      respectievelijk over 208 of meer uren per kalenderjaar loon te hebben ontvangen, waarbij voor 1 januari 2013 52 of
      meer dagen bepalend is en vanaf 1 januari 2013 208 of meer uren; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: 42.2.b
    text: |-
      onmiddellijk voorafgaande aan of op zijn eerste dag van werkloosheid recht heeft op een uitkering op grond van een
      wet als genoemd in [artikel 19, eerste lid, onderdeel b, c of d][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: 42.2.b.1
    text: |-
      is de uitkeringsduur een maand voor ieder kalenderjaar arbeidsverleden voor zover het arbeidsverleden niet meer dan
      tien kalenderjaren is; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: 42.2.b.2
    text: |-
      wordt de uitkeringsduur, voor zover het arbeidsverleden meer is dan tien kalenderjaren, verlengd met een
      halve maand voor ieder kalenderjaar arbeidsverleden gelegen na 2015 en met een maand voor ieder kalenderjaar
      arbeidsverleden gelegen voor 2016. Bij het berekenen van de uitkeringsduur worden de maanden en de halve maanden
      bij elkaar opgeteld en wanneer die berekening niet leidt tot een aantal gehele maanden, telt een halve maand voor
      15 kalenderdagen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: '42.3'
    text: |-
      Bij het vaststellen van de uitkeringsduur op grond van het eerste en tweede lid blijven perioden waarin recht op
      uitkering bestaat op grond van [artikel 18, eerste lid][ref1], buiten beschouwing.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
  - number: '42.4'
    text: |-
      Indien de duur van het arbeidsverleden gelegen voor 2016 niet louter uitgedrukt wordt in een aantal gehele
      kalenderjaren, wordt het kwart, halve of driekwart kalenderjaar geacht gelegen te zijn na 2015.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: '42.5'
    text: |-
      Als de duur van het arbeidsverleden gelegen na 2015 niet louter uitgedrukt wordt in een aantal gehele
      kalenderjaren, wordt de duur van het arbeidsverleden naar beneden afgerond tot gehele kalenderjaren.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: '42.6'
    text: 'Het arbeidsverleden, bedoeld in het tweede lid, wordt berekend door samentelling van:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: 42.6.a
    text: |-
      het aantal kalenderjaren, vanaf en met inbegrip van 2013 tot en met het kalenderjaar onmiddellijk voorafgaande aan
      het kalenderjaar waarin zijn eerste werkloosheidsdag is gelegen, waarin de werknemer over 208 of meer uren loon
      heeft ontvangen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: 42.6.b
    text: |-
      het aantal kalenderjaren, vanaf en met inbegrip van 1998 tot 2013, waarover de werknemer over 52 of meer dagen loon
      heeft ontvangen; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: 42.6.c
    text: |-
      het aantal kalenderjaren vanaf en met inbegrip van het kalenderjaar waarin de werknemer zijn 18e verjaardag
      bereikte tot 1998.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
  - number: '42.7'
    text: |-
      Een kalenderjaar wordt in aanmerking genomen bij de berekening, bedoeld in het vierde lid, onderdelen a en b, indien
      volgens de informatie, bedoeld in [artikel 33d van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1],
      de werknemer in dat kalenderjaar over 52 of meer dagen loon heeft ontvangen respectievelijk over 208 of meer uren
      loon heeft ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel33d
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 33d
  - number: 42a.1
    text: |-
      Voor de toepassing van [artikel 42][ref1] worden met dagen waarover loon is ontvangen of met acht uren waarover
      loon is ontvangen, gelijkgesteld:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: 42a.1.a
    text: |-
      dagen waarover recht bestond op een uitkering die naar aard en strekking overeenkomt met een uitkering
      op grond van de [Wet werk en inkomen naar arbeidsvermogen][ref1] of met een uitkering op grond van de
      [Wet op de arbeidsongeschiktheidsverzekering][ref2] voorzover de uitkering wordt toegekend naar een
      arbeidsongeschiktheid van ten minste 80% respectievelijk wordt toegekend over periodes waarin de persoon
      slechts in staat is om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen, bedoeld in
      [artikel 1 van eerstgenoemde wet][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0019057
      [ref2]: https://wetten.overheid.nl/BWBR0002524
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel1
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0019057
      - id: ref2
        bwb_id: BWBR0002524
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '1'
  - number: 42a.1.b
    text: |-
      dagen waarover een persoon een uitkering ontvangt op grond van
      [hoofdstuk III van de Wet arbeidsongeschiktheidsvoorziening militairen][ref1], berekend naar een
      arbeidsongeschiktheid van ten minste 80% of een toelage op grond van dat hoofdstuk, die al dan niet
      vermeerderd met de arbeidsongeschiktheidsuitkering 70% of meer bedraagt van het dagloon, waarnaar de
      arbeidsongeschiktheidsuitkering is of zou zijn berekend.


      [ref1]: https://wetten.overheid.nl/BWBR0002822#HoofdstukIII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0002822
        hoofdstuk: III
  - number: 42a.2
    text: |-
      Voor de toepassing van [artikel 42][ref1] worden niet reeds in aanmerking genomen kalenderjaren waarin een
      persoon recht heeft op kinderbijslag op grond van [artikel 7 van de Algemene Kinderbijslagwet][ref2] of een
      andere gezinsbijslag als bedoeld in artikel 3, eerste lid, onderdeel j, van Verordening (EG) nr. 883/2004 van
      het Europees Parlement en de Raad van de Europese Unie van 29 april 2004 betreffende de coördinatie van de
      socialezekerheidsstelsels (PbEU 2004, L 166) voor een tot zijn huishouden behorend kind dat bij de aanvang van dat
      kalenderjaar de leeftijd van vijf jaar niet heeft bereikt, voor de helft gelijkgesteld met kalenderjaren waarin
      over 52 of meer dagen loon is ontvangen, respectievelijk over 208 of meer uren loon is ontvangen. De in de eerste
      zin bedoelde persoon wordt aangemerkt als verzorgend persoon.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0002368#Artikel7
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
      - id: ref2
        bwb_id: BWBR0002368
        artikel: '7'
  - number: 42a.3
    text: |-
      Voor de toepassing van [artikel 42][ref1] worden niet reeds in aanmerking genomen kalenderjaren vanaf en
      met in begrip van een bij ministeriële regeling nader te bepalen kalenderjaar, waarin een persoon inkomsten
      ontvangt voor het verlenen van zorg op grond van een regeling voor persoonsgebonden budget, die is gegrond op
      [artikel 3.3.3 van de Wet langdurige zorg][ref2] dan wel voor het verlenen van ondersteuning ten laste van een
      persoonsgebonden budget als bedoeld in [artikel 2.3.6 van de Wet maatschappelijke ondersteuning 2015][ref3], voor
      de helft gelijkgesteld met kalenderjaren waarin over 52 of meer dagen loon is ontvangen, respectievelijk over
      208 of meer uren loon is ontvangen, tenzij de zorg of ondersteuning wordt verleend als zelfstandige. De eerste
      zin is uitsluitend van toepassing indien de in de eerste zin bedoelde persoon aantoont dat deze zorgverlening aan
      deze voorwaarden voldoet of heeft voldaan. Die persoon wordt aangemerkt als verzorgend persoon. Bij ministeriële
      regeling kunnen nadere regels worden gesteld met betrekking tot de uitvoering van dit lid.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0035917#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0035362#Artikel2
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
      - id: ref2
        bwb_id: BWBR0035917
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0035362
        artikel: '2'
  - number: 42a.4
    text: |-
      Het tweede en derde lid vinden geen toepassing indien de verzorgende persoon in een kalenderjaar voor een
      periode langer dan een half jaar als werknemer in de zin van een wettelijke regeling inzake werkloosheid
      recht heeft op een uitkering ter zake van werkloosheid of op de loongerelateerde uitkering op grond van
      [hoofdstuk 7 van de Wet werk en inkomen naar arbeidsvermogen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '7'
  - number: 42a.5
    text: 'Voor de toepassing van het tweede lid wordt onder:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
  - number: 42a.5.a
    text: een kind verstaan een eigen, aangehuwd of pleegkind;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
  - number: 42a.5.b
    text: een pleegkind verstaan een kind dat als een eigen kind wordt onderhouden en opgevoed.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
  - number: 42a.6
    text: |-
      Voor de toepassing van [artikel 42][ref1] worden dagen, tot een maximum van achttien maanden, waarover de werknemer
      onbetaald verlof heeft genoten, gelijkgesteld met dagen, waarover loon is ontvangen of met acht uren, waarover loon
      is ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: 42a.7
    text: |-
      Voor de toepassing van dit artikel en van [artikel 42][ref1] wordt niet als loon beschouwd een uitkering:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: 42a.7.a
    text: |-
      op grond van deze wet, met uitzondering van een uitkering op grond van [hoofdstuk IV][ref1] van deze wet;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukIV
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: IV
  - number: 42a.7.b
    text: |-
      op grond van [hoofdstuk 7 van de Wet werk en inkomen naar arbeidsvermogen][ref1], met uitzondering van een
      uitkering aan de persoon die slechts in staat is om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen,
      bedoeld in [artikel 1 van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel1
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '7'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '1'
  - number: 42a.7.c
    text: |-
      op grond van de [Wet op de arbeidsongeschiktheidsverzekering][ref1], berekend naar een arbeidsongeschiktheid van
      minder dan 80%; of


      [ref1]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0002524
  - number: 42a.7.d
    text: die naar aard en strekking overeenkomt met een uitkering als bedoeld in onderdeel a, b of c.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
  - number: 42a.8
    text: |-
      Voor de toepassing van dit artikel en van [artikel 42][ref1] wordt niet als loon beschouwd
      het voordeel van het voor privé-doeleinden ter beschikking stellen van een auto, bedoeld in
      [artikel 13bis van de Wet op de loonbelasting 1964][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0002471#Artikel13bis
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
      - id: ref2
        bwb_id: BWBR0002471
        artikel: 13bis
  - number: 42a.9
    text: 'Bij algemene maatregel van bestuur kunnen regels worden gesteld:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
  - number: 42a.9.a
    text: |-
      ter vaststelling van het aantal dagen respectievelijk het aantal uren waarover loon is ontvangen, bedoeld in
      [artikel 42][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: 42a.9.b
    text: |-
      op grond waarvan voor het bepalen van het aantal van 52 dagen of van het aantal van 208 uren, bedoeld in
      [artikel 42][ref1], dagen of uren waarover, anders dan bedoeld in het zesde lid, geen loon is ontvangen, worden
      gelijkgesteld met dagen of uren waarover loon is ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: 42b.1
    text: |-
      Indien het recht op uitkering is geëindigd en vervolgens een nieuw recht op uitkering is ontstaan, zonder dat aan
      de voorwaarde, bedoeld in [artikel 42, tweede lid, onderdeel a of b][ref1], wordt voldaan, dan wordt de duur van
      dat nieuwe recht verlengd met:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: 42b.1.a
    text: |-
      de resterende duur van het beëindigde recht, indien de werknemer over ten minste drie maanden een uitkering heeft
      ontvangen op grond van dat beëindigde recht;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42b
  - number: 42b.1.b
    text: |-
      de duur van het beëindigde recht waarop drie maanden in mindering worden gebracht, indien de werknemer over minder
      dan drie maanden een uitkering heeft ontvangen op grond van dat beëindigde recht.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42b
  - number: 42b.2
    text: |-
      Het eerste lid vindt geen toepassing voorzover het eerdere recht was geëindigd op grond van
      [artikel 20, eerste lid, onderdeel a of c][ref1], en op grond van [artikel 21][ref2] niet voor herleving in
      aanmerking zou zijn gekomen wegens het overschrijden van de in laatstgenoemd artikel bedoelde termijnen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel21
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '21'
        hoofdstuk: II
        paragraaf: '1'
  - number: 42c.1
    text: |-
      De persoon die op de dag, onmiddellijk voorafgaande aan de eerste dag van werkloosheid, werknemer in de zin van
      deze wet was, wordt voor de toepassing van de [artikelen 42][ref1] en [42a][ref2] als werknemer in de zin van deze
      wet beschouwd gedurende de periode waarin hij:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel42a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: 42a
        hoofdstuk: II
        paragraaf: '4'
  - number: 42c.1.a
    text: |-
      voor 1 januari 1987 als werknemer in de zin van de Werkloosheidswet of de [Wet Werkloosheidsvoorziening][ref1]
      zoals die wetten luidden op 31 december 1986 in dienstbetrekking heeft gestaan dan wel zijn militaire dienstplicht
      of in plaats daarvan vervangende dienst heeft vervuld;


      [ref1]: https://wetten.overheid.nl/BWBR0002470
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42c
    references:
      - id: ref1
        bwb_id: BWBR0002470
  - number: 42c.1.b
    text: |-
      vanaf 1 januari 1987 een arbeidsverhouding had ter zake waarvan hem door het Rijk invaliditeitspensioen was
      verzekerd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42c
  - number: 42c.2
    text: |-
      Ten aanzien van de persoon, bedoeld in [artikel 17c, vierde lid][ref1], is het eerste lid, onderdeel a, van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17c
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel42c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 17c
        hoofdstuk: II
        paragraaf: '1'
  - number: '43.1'
    text: |-
      Telkens nadat het recht op uitkering na eindiging van dat recht is herleefd op grond van [artikel 21][ref1],
      eindigt de uitkering zoveel later dan de in [artikel 42, eerste, tweede en derde lid][ref2], bedoelde periode als
      de periode tussen de eindiging en herleving van het recht op uitkering heeft geduurd.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel21
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '21'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: '43.2'
    text: |-
      Voor de persoon, bedoeld in [artikel 29, tweede lid, onderdeel d, aanhef en onder 1°, van de Ziektewet][ref1]
      die eerder dan de eerste dag van de veertiende week van de ongeschiktheid tot het verrichten van zijn arbeid
      een uitkering ontvangt op grond van die wet wordt voor de vaststelling van de periode tussen de eindiging en de
      herleving van het recht op uitkering, de periode waarin het ziekengeld wordt uitbetaald tijdens de eerste 13 weken
      van ongeschiktheid tot het verrichten van zijn arbeid, buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
  - number: '43.3'
    text: |-
      Voor de persoon, bedoeld in [artikel 29, tweede lid, onderdeel e of f, van de Ziektewet][ref1] worden voor de
      vaststelling van de periode tussen de eindiging en de herleving van het recht op uitkering, telkens nadat het recht
      op uitkering is geëindigd wegens ziekte, de eerste dertien weken waarin de persoon een uitkering ontvangt op grond
      van de [Ziektewet][ref2] buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0001888
  - number: '43.4'
    text: |-
      Voor de bepaling van de periode van dertien weken bedoeld in het derde lid, worden perioden waarover een uitkering
      op grond van de [Ziektewet][ref1] wordt ontvangen samengeteld, indien zij elkaar met een onderbreking van minder
      dan vier weken opvolgen.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: '43.5'
    text: |-
      [Artikel 19, tweede lid][ref1], is van toepassing op het tweede tot en met vierde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: '44'
    text: De uitkering op grond van dit hoofdstuk wordt berekend naar het dagloon.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel44
  - number: '47.1'
    text: 'De uitkering op grond van deze wet bedraagt per kalendermaand:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47
  - number: 47.1.a
    text: 0,75 x (A – B x C/D) – E over de eerste twee maanden waarin recht op een uitkering bestaat; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47
  - number: 47.1.b
    text: 0,7 x (A – B x C/D) – E vanaf de derde maand waarin recht op een uitkering bestaat.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47
  - number: '47.2'
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen in verband met arbeid, bedoeld in het eerste lid
      wordt verstaan.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47
  - number: 47a
    text: |-
      Indien de werknemer deelneemt aan een voor hem naar het oordeel van het UWV noodzakelijke opleiding of scholing en
      het recht op uitkering op grond van [artikel 76][ref1] blijft bestaan, wordt op de uitkering geheel in mindering
      gebracht het inkomen uit of in verband met de opleiding of scholing voor zover dat meer bedraagt dan een nader bij
      ministeriële regeling door Onze Minister vast te stellen bedrag.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel76
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '76'
        hoofdstuk: VI
  - number: 47b.1
    text: |-
      Indien de werknemer toestemming van het UWV heeft verkregen om werkzaamheden als bedoeld in
      [artikel 77a, eerste lid][ref1], te verrichten, wordt de uitkering voor de duur van die toestemming verminderd
      met 29% van de uitkering, dan wel met een lager, bij algemene maatregel van bestuur te bepalen, percentage van
      de uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel77a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 77a
        hoofdstuk: VI
  - number: 47b.2
    text: |-
      Met ingang van de dag waarop de werknemer die toestemming van het UWV heeft verkregen om werkzaamheden als bedoeld
      in [artikel 77a, eerste lid][ref1], te verrichten, handelt in strijd met artikel 77a, eerste lid, onderdeel d,
      wordt de uitkering voor de resterende duur van die toestemming verminderd met 100% van de uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel77a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel47b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 77a
        hoofdstuk: VI
  - number: '53.1'
    text: |-
      Het UWV laat, op zijn verzoek, tot de vrijwillige werkloosheidsverzekering toe de persoon,
      jonger dan de pensioengerechtigde leeftijd, die op grond van het bepaalde bij of krachtens
      [artikel 3, tweede, vierde en vijfde lid][ref1], niet als werknemer wordt beschouwd, en


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel3
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '3'
        hoofdstuk: I
        paragraaf: '2'
  - number: 53.1.a
    text: |-
      wiens werknemerschap is geëindigd en die buiten Nederland woont, aldaar direct aansluitend op de beëindiging van
      zijn werknemerschap een dienstbetrekking vervult voor de duur van maximaal vijf jaar en wiens werkgever binnen
      Nederland woont of gevestigd is;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: 53.1.b
    text: |-
      die Nederlander is en die is uitgezonden om werkzaamheden te verrichten voor door Onze Minister in overeenstemming
      met Onze Minister van Buitenlandse Zaken aan te wijzen organisaties voor ontwikkelingssamenwerking;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: 53.1.c
    text: |-
      die Nederlander is en die is uitgezonden om, in of buiten Nederland, werkzaamheden te verrichten voor een
      volkenrechtelijke organisatie, waarvan Nederland lid is dan wel waarvan de werkzaamheden door Nederland worden
      ondersteund;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: 53.1.d
    text: die in Nederland woont, en buiten Nederland een dienstbetrekking vervult; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: 53.1.e
    text: |-
      die Nederlander is en buiten Nederland werkzaamheden verricht die worden bekostigd door het Rijk en die tevens in
      opdracht van het Rijk worden verricht in het kader van een wettelijke taakomschrijving of ter uitvoering van een
      internationaal verdrag dan wel een daarmee gelijk te stellen overeenkomst of een besluit van een volkenrechtelijke
      organisatie.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: '53.2'
    text: |-
      Het UWV laat, op zijn verzoek, tot de vrijwillige werkloosheidsverzekering toe de persoon, jonger dan de
      pensioengerechtigde leeftijd, wiens arbeidsverhouding op grond van [artikel 6, eerste lid, onderdeel c][ref1], niet
      als dienstbetrekking wordt beschouwd.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '6'
        hoofdstuk: I
        paragraaf: '2'
  - number: '53.3'
    text: |-
      Voorafgaand aan het vervullen van een dienstbetrekking, bedoeld in het eerste lid, onderdeel a, dient de persoon
      gedurende een aaneengesloten periode van tenminste één jaar de hoedanigheid van werknemer te bezitten.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: '53.4'
    text: |-
      Met de Nederlander, bedoeld in het eerste lid, onderdeel b, c en e, wordt gelijkgesteld de persoon, die onderdaan
      is van één van de lidstaten van de Europese Gemeenschap of onderdaan is van een Staat, waarmee Nederland een
      verdrag inzake sociale zekerheid heeft gesloten, mits hij voor hij werd uitgezonden in Nederland woonde.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel53
  - number: '54.1'
    text: Het verzoek om toelating tot de vrijwillige werkloosheidsverzekering wordt ingediend bij het UWV.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
  - number: '54.2'
    text: 'Het verzoek om toelating als bedoeld in het eerste lid moet worden ingediend:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
  - number: 54.2.a
    text: |-
      door de in [artikel 53, eerste lid, onderdeel a][ref1], bedoelde persoon: binnen dertien weken na de dag, waarop
      zijn werknemerschap is geëindigd;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 54.2.b
    text: |-
      door de in [artikel 53, eerste lid, onderdeel b, c en e][ref1] bedoelde persoon: binnen dertien weken na de dag
      van zijn vertrek naar het buitenland dan wel, indien de in [artikel 53, eerste lid, onderdeel c][ref2], bedoelde
      werkzaamheden worden verricht in Nederland, binnen dertien weken na de dag waarop die werkzaamheden een aanvang
      hebben genomen;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 54.2.c
    text: |-
      door de in [artikel 53, eerste lid, onderdeel d][ref1], bedoelde persoon: binnen dertien weken na de dag, waarop
      zijn werkzaamheden buiten Nederland een aanvang hebben genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: '54.3'
    text: |-
      Het UWV is bevoegd te verklaren dat een verzoek om toelating tot de vrijwillige werkloosheidsverzekering, ingediend
      na de ingevolge het tweede lid geldende termijn, tijdig is ingekomen, indien de persoon die het verzoek heeft
      gedaan, redelijkerwijs niet geacht kan worden in verzuim te zijn geweest.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
  - number: '54.4'
    text: 'De vrijwillige werkloosheidsverzekering vangt aan:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
  - number: 54.4.a
    text: |-
      voor de in [artikel 53, eerste lid, onderdeel a][ref1], bedoelde persoon: op de dag na die, waarop zijn
      werknemerschap is geëindigd;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 54.4.b
    text: |-
      voor de in [artikel 53, eerste lid, onderdeel b, c en e][ref1] bedoelde persoon: op de dag van zijn vertrek naar
      het buitenland dan wel, indien de in [artikel 53, eerste lid, onderdeel c][ref2], bedoelde werkzaamheden worden
      verricht in Nederland, op de dag waarop die werkzaamheden een aanvang hebben genomen;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 54.4.c
    text: |-
      voor de in [artikel 53, eerste lid, onder d][ref1], bedoelde persoon: op de dag waarop zijn werkzaamheden een
      aanvang hebben genomen;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 54.4.d
    text: |-
      voor de in [artikel 53, tweede lid][ref1], bedoelde persoon: op de dag van ontvangst van zijn verzoek om toelating.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: '55'
    text: |-
      Toelating van een persoon tot de vrijwillige werkloosheidsverzekering vindt slechts plaats, indien hij zich
      tegelijkertijd vrijwillig verzekert op grond van de [Ziektewet][ref1]. De in de eerste zin opgenomen verplichting
      is niet van toepassing indien betrokkene bij ziekte, zwangerschap of bevalling, recht heeft op loon dan wel
      bezoldiging.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel55
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: '56'
    text: |-
      De persoon die is toegelaten tot de vrijwillige werkloosheidsverzekering wordt voor de toepassing van deze wet voor
      de duur van die verzekering als werknemer beschouwd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56
  - number: 56a
    text: 'Het UWV beëindigt de vrijwillige werkloosheidsverzekering:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
  - number: 56a.a
    text: op verzoek van de vrijwillig verzekerde met ingang van een door hem te bepalen datum;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
  - number: 56a.b
    text: |-
      met ingang van de dag, waarop de termijn van vijf jaar, bedoeld in [artikel 53, eerste lid, onderdeel a][ref1],
      is verstreken;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 56a.c
    text: |-
      met ingang van de dag, waarop de werkzaamheden bedoeld in [artikel 53, eerste en tweede lid][ref1] worden
      beëindigd;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: 56a.d
    text: met ingang van de dag waarop de vrijwillig verzekerde verplicht verzekerd wordt ingevolge deze wet;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
  - number: 56a.e
    text: |-
      indien de verschuldigde premie over een periode van twee volle kalendermaanden niet, niet volledig of niet-tijdig
      is betaald; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
  - number: 56a.f
    text: |-
      indien niet langer wordt voldaan aan andere vereisten voor toelating tot de vrijwillige verzekering, bedoeld in
      [artikel 53, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel56a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: '57'
    text: |-
      De persoon, bedoeld in [artikel 53, eerste lid, onderdeel a, b en c][ref1], die werkloos is, heeft eerst recht op
      uitkering na terugkeer in Nederland.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel53
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel57
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '53'
        hoofdstuk: III
  - number: '58.1'
    text: |-
      De persoon, die om toelating tot de vrijwillige werkloosheidsverzekering verzoekt, bepaalt bij de aanvang van de
      vrijwillige werkloosheidsverzekering de hoogte van het dagloon, met dien verstande dat dit niet meer kan bedragen
      dan:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel58
  - number: 58.1.a
    text: |-
      het bedrag, bedoeld in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1], met
      betrekking tot een loontijdvak van een dag eventueel verhoogd of verlaagd krachtens [artikel 18 van die wet][ref2];
      en


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '18'
  - number: 58.1.b
    text: het loon of het inkomen dat hij in geval van werkloosheid naar het oordeel van het UWV derft.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel58
  - number: '58.2'
    text: |-
      Voor de vaststelling van de hoogte van het recht op uitkering op grond van de vrijwillige werkloosheidsverzekering
      wordt, zonodig in afwijking van [artikel 1b, eerste lid][ref1], en de daarop berustende bepalingen, onder dagloon
      verstaan het in het eerste lid bedoelde dagloon.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel1b
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 1b
        hoofdstuk: I
        paragraaf: '1'
  - number: '59'
    text: |-
      Het UWV stelt nadere regels met betrekking tot de vrijwillige werkloosheidsverzekering. Deze regels bevatten in
      ieder geval bepalingen met betrekking tot:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel59
  - number: 59.a
    text: de toelating tot de vrijwillige werkloosheidsverzekering;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel59
  - number: 59.b
    text: het einde van de vrijwillige werkloosheidsverzekering;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel59
  - number: 59.c
    text: |-
      het dagloon, bedoeld in [artikel 58, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel58
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '58'
        hoofdstuk: III
  - number: '60'
    text: |-
      Voor zover bij of krachtens dit hoofdstuk niet anders is bepaald, zijn de overige artikelen van deze wet en de
      daarop berustende bepalingen, voor zoveel nodig, van overeenkomstige toepassing op het recht op uitkering, het
      geldend maken van het recht op uitkering, de betaling van de uitkering, de hoogte en de duur van de uitkering op
      grond van dit hoofdstuk.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel60
  - number: '61'
    text: |-
      Een werknemer heeft recht op uitkering op grond van dit hoofdstuk, indien hij van een werkgever, die in
      staat van faillissement is verklaard, aan wie surséance van betaling is verleend, ten aanzien van wie de
      schuldsaneringsregeling natuurlijke personen van toepassing is, of die anderszins verkeert in de blijvende toestand
      dat hij heeft opgehouden te betalen, loon, vakantiegeld, of vakantiebijslag te vorderen heeft of indien hij
      geldelijk nadeel kan ondervinden doordat deze werkgever bedragen die hij in verband met de dienstbetrekking met de
      werknemer aan derden verschuldigd is, niet heeft betaald.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel61
  - number: 61a.1
    text: |-
      De nagelaten betrekkingen van een werknemer hebben recht op uitkering op grond van dit hoofdstuk over de
      periode vanaf de dag na overlijden tot en met één maand na de dag van het overlijden, ten bedrage van het
      loon dat de werknemer laatstelijk rechtens toekwam, doch ten hoogste anderhalf maal het bedrag, bedoeld in
      [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1], met betrekking tot het loontijdvak
      van een dag, vermenigvuldigd met 21,75, indien zij van een werkgever, die verkeert in een omstandigheid als bedoeld
      in [artikel 61][ref2], een overlijdensuitkering te vorderen hebben. Indien het loon dat de werknemer laatstelijk
      rechtens toekwam meer bedroeg dan de uitkomst van de berekening, bedoeld in de vorige zin, worden de tot het loon
      behorende elementen naar evenredigheid betaald.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel61a
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: 61a.2
    text: |-
      [Artikel 674, derde en vierde lid, van Boek 7 van het Burgerlijk Wetboek][ref1] en [artikel 63][ref2]
      zijn van overeenkomstige toepassing met betrekking tot het recht op uitkering op grond van dit artikel. De
      [artikelen 19][ref3], [20][ref4], [21][ref5], [64][ref6] en [65][ref7] zijn niet van toepassing met betrekking tot
      het recht op uitkering op grond van dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel674
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel63
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel19
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref5]: https://wetten.overheid.nl/BWBR0004045#Artikel21
      [ref6]: https://wetten.overheid.nl/BWBR0004045#Artikel64
      [ref7]: https://wetten.overheid.nl/BWBR0004045#Artikel65
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel61a
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '674'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '63'
        hoofdstuk: IV
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref4
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref5
        bwb_id: BWBR0004045
        artikel: '21'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref6
        bwb_id: BWBR0004045
        artikel: '64'
        hoofdstuk: IV
      - id: ref7
        bwb_id: BWBR0004045
        artikel: '65'
        hoofdstuk: IV
  - number: '62.1'
    text: |-
      Geen recht op uitkering op grond van dit hoofdstuk heeft de werknemer, wiens dienstbetrekking met de werkgever
      reeds was geëindigd voordat de werkgever kwam te verkeren in een toestand als bedoeld in [artikel 61][ref1],
      tenzij:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: 62.1.a
    text: |-
      een duidelijke samenhang bestaat tussen de omstandigheden die tot het eindigen van de dienstbetrekking leidden en
      de omstandigheden, die tot die toestand hebben geleid; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel62
  - number: 62.1.b
    text: |-
      de werknemer een recht heeft op betaling van loon, vakantiegeld, vakantiebijslag of andere bedragen als bedoeld in
      [artikel 61][ref1], dat geen verband houdt met een toestand als bedoeld in [artikel 61][ref2] en dat niet geldend
      kan worden gemaakt uitsluitend wegens die toestand.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: '62.2'
    text: |-
      De werknemer heeft of de nagelaten betrekkingen hebben geen recht op uitkering indien de aanvraag om een uitkering
      is ingediend nadat 26 weken zijn verstreken na de dag waarop de werkgever is komen te verkeren in een toestand als
      bedoeld in [artikel 61][ref1]. Het UWV is bevoegd in bijzondere gevallen af te wijken van de eerste zin.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: '62.3'
    text: |-
      Mede heeft recht op uitkering op grond van dit hoofdstuk de persoon, niet zijnde werknemer, bedoeld in de
      [artikelen 3][ref1] of [3a][ref2], die gewoonlijk arbeid in Nederland verricht voor de werkgever, bedoeld in
      [artikel 61][ref3] of [61a][ref4], mits er geen recht op een uitkering bestaat in een andere lidstaat van de
      Europese Unie dan wel in een land aangesloten bij de Europese Economische Ruimte.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel3a
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel61
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel61a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '3'
        hoofdstuk: I
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: 3a
        hoofdstuk: I
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
      - id: ref4
        bwb_id: BWBR0004045
        artikel: 61a
        hoofdstuk: IV
  - number: '63.1'
    text: |-
      De werknemer, wiens werkgever verkeert in een toestand als bedoeld in [artikel 61][ref1], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel63
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: 63.1.a
    text: |-
      indien geen tijdige betaling van loon, vakantiegeld of vakantiebijslag heeft plaatsgevonden, binnen een week na de
      dag waarop hij deze betaling normaal zou hebben ontvangen daarvan aangifte te doen bij het UWV; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel63
  - number: 63.1.b
    text: |-
      binnen een week na de dag waarop het hem redelijkerwijs duidelijk moet zijn geweest dat zijn werkgever de bedragen,
      bedoeld in [artikel 61][ref1], niet heeft betaald, daarvan aangifte te doen bij het UWV.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel63
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: '63.2'
    text: |-
      Indien de werknemer een verplichting hem op grond van het eerste lid opgelegd, niet of niet behoorlijk is
      nagekomen, weigert het Uitvoeringsinstituut werknemersverzekeringen de uitkering op grond van dit hoofdstuk
      tijdelijk of blijvend, geheel of gedeeltelijk.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel63
  - number: '63.3'
    text: |-
      Indien het de werknemer voor de totstandkoming van de dienstbetrekking of voor een wijziging in de
      arbeidsvoorwaarden tijdens de dienstbetrekking redelijkerwijs duidelijk moet zijn geweest dat in verband met
      een toestand als bedoeld in [artikel 61][ref1], geen of slechts ten dele betaling zou plaatsvinden van loon,
      vakantiegeld, vakantiebijslag of aan derden verschuldigde bedragen in verband met de dienstbetrekking van de
      werknemer, is het tweede lid van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel63
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: '64.1'
    text: 'Het recht op uitkering op grond van dit hoofdstuk wordt per kalendermaand berekend en omvat:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: 64.1.a
    text: 'het loon over ten hoogste dertien weken, onmiddellijk voorafgaande aan:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: 64.1.a.1°
    text: de dag waarop de dienstbetrekking door ontbinding eindigt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: 64.1.a.2°
    text: de dag waarop de dienstbetrekking met wederzijds goedvinden eindigt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: 64.1.a.3°
    text: de dag waarop de dienstbetrekking van rechtswege eindigt, of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: 64.1.a.4°
    text: de dag van opzegging van de dienstbetrekking;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: 64.1.b
    text: |-
      het loon over ten hoogste de voor de werknemer geldende termijn van opzegging of de termijn van opzegging, die
      zou hebben gegolden als deze termijn was aangevangen op de op grond van het tweede lid door het UWV vastgestelde
      dag, met dien verstande dat de krachtens [artikel 40 van de Faillissementswet][ref1] ten aanzien van de werknemer
      geldende termijn, zowel in als buiten faillissement, niet wordt overschreden; en


      [ref1]: https://wetten.overheid.nl/BWBR0001860#Artikel40
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0001860
        artikel: '40'
  - number: 64.1.c
    text: |-
      het vakantiegeld, de vakantiebijslag en de bedragen, die de werkgever in verband met de dienstbetrekking met de
      werknemer aan derden verschuldigd is, over ten hoogste het jaar onmiddellijk voorafgaande aan het tijdstip waarop
      de in onderdeel a, onder 1°, 2°, 3° of de in onderdeel b bedoelde termijn eindigt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: '64.2'
    text: |-
      Ten aanzien van het eerste lid, onderdeel a, geldt dat het recht op uitkering op grond van dit hoofdstuk het loon
      omvat over ten hoogste dertien weken onmiddellijk voorafgaande aan de dag waarop de dienstbetrekking naar het
      oordeel van het UWV redelijkerwijs had moeten worden beëindigd of opgezegd, indien de dienstbetrekking niet of op
      een later dan het daarvoor redelijkerwijs in aanmerking komende moment is beëindigd of opgezegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: '64.3'
    text: |-
      De hoogte van de uitkering van het vakantiegeld, bedoeld in het eerste lid, onderdeel c, wordt berekend op grond
      van de aanspraak op vakantiedagen die de werknemer bij het einde van de dienstbetrekking heeft, met dien verstande
      dat de uitkering niet meer bedraagt dan het vakantiegeld over het aantal vakantiedagen dat hij kan verwerven in een
      jaar waarin hij een dienstbetrekking met de werkgever, bedoeld in [artikel 61][ref1], heeft en waarin hij gedurende
      de volledig overeengekomen arbeidsduur recht op loon heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: '64.4'
    text: |-
      Voor zover de uitkering betrekking heeft op het loon, bedoeld in het eerste lid, onderdelen a
      en b, bedraagt de uitkering per kalendermaand, zonder verrekening van inkomen als
      bedoeld in artikel 65, ten hoogste 100/108 deel van anderhalf maal het bedrag, bedoeld in
      [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1], vermenigvuldigd met 21,75.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '64.5'
    text: |-
      Voor zover de uitkering betrekking heeft op de vakantiebijslag, bedoeld in het eerste lid, onderdeel c,
      bedraagt de uitkering per kalendermaand ten hoogste 8/108 deel van anderhalf maal het bedrag, bedoeld in
      [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1], vermenigvuldigd met 21,75.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '64.6'
    text: |-
      Voor zover de uitkering betrekking heeft op het vakantiegeld, bedoeld in het eerste lid, onderdeel c, bedraagt de
      uitkering per dag waarop het vakantiegeld betrekking heeft ten hoogste 100/108 deel van anderhalf maal het bedrag,
      bedoeld in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '64.7'
    text: |-
      Indien het loon, bedoeld in het eerste lid, onderdelen a en b, betrekking heeft op een periode die
      niet aanvangt op de eerste dag van een kalendermaand of niet op de laatste dag van een kalendermaand
      eindigt, bedraagt de uitkering in die kalendermaand, zonder verrekening van inkomen als bedoeld
      in [artikel 65][ref1], ten hoogste 100/108 deel van anderhalf maal het bedrag, bedoeld in
      [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref2], vermenigvuldigd met 21,75 maal
      het verschil tussen enerzijds het totale aantal dagen in die kalendermaand en anderzijds het aantal dagen in die
      kalendermaand voordat voornoemde periode is aangevangen of nadat voornoemde periode is geëindigd, gedeeld door
      het totaal aantal dagen in die kalendermaand. Bij het bepalen van het aantal dagen in een kalendermaand worden de
      zaterdagen en zondagen buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel65
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '65'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '64.8'
    text: |-
      Indien de vakantiebijslag, bedoeld in het eerste lid, onderdeel c, betrekking heeft op een
      periode die niet aanvangt op de eerste dag van een kalendermaand of niet op de laatste dag van een
      kalendermaand eindigt, bedraagt de uitkering in die kalendermaand, zonder verrekening van inkomen als
      bedoeld in [artikel 65][ref1], ten hoogste 100/108 deel van anderhalf maal het bedrag, bedoeld in
      [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref2], vermenigvuldigd met 21,75 maal
      het verschil tussen enerzijds het totale aantal dagen in die kalendermaand en anderzijds het aantal dagen in die
      kalendermaand voordat voornoemde periode is aangevangen of nadat voornoemde periode is geëindigd, gedeeld door
      het totaal aantal dagen in die kalendermaand. Bij het bepalen van het aantal dagen in een kalendermaand worden de
      zaterdagen en zondagen buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel65
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '65'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '64.9'
    text: |-
      Indien de uitkering is verminderd op grond van het vierde of zevende lid, worden de verschillende tot het loon
      behorende elementen naar evenredigheid betaald.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: '64.10'
    text: |-
      Indien de werkgever over de periode als bedoeld in het eerste lid, loon, vakantiegeld of vakantiebijslag aan de
      werknemer heeft betaald dan wel een bedrag in verband met de dienstbetrekking met de werknemer aan een derde heeft
      betaald, wordt dat inkomensbestanddeel toegerekend aan een periode voorafgaand aan voornoemde periode, indien de
      werknemer of die derde over die voorafgaande periode een vordering tot betaling van dat inkomensbestanddeel heeft
      op de werkgever.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel64
  - number: '65.1'
    text: |-
      Indien de verplichting tot betaling van het loon, bedoeld in [artikel 64, eerste lid, onderdeel b][ref1], door
      het UWV is overgenomen en de werknemer geniet inkomen in een kalendermaand, wordt de op grond van artikel 64,
      eerste lid, onderdeel b, vierde of zevende lid, vastgestelde uitkering vermenigvuldigd met de uitkomst van (A-
      B)/A. Hierbij staat: A voor de uitkering per kalendermaand indien die niet zou zijn gemaximeerd op grond van
      [artikel 64, vierde of zevende lid][ref2]; en B voor het inkomen in een kalendermaand.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel64
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel64
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel65
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '64'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '64'
        hoofdstuk: IV
  - number: '65.2'
    text: |-
      Indien de berekening, bedoeld in het eerste lid, leidt tot een negatief bedrag, wordt de uitkering op nihil
      gesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel65
  - number: '66.1'
    text: |-
      De vorderingen van de werknemer en derden op de werkgever, bedoeld in [artikel 64, eerste lid][ref1], gaan over op
      het UWV, voorzover deze vorderingen door het UWV worden voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel64
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '64'
        hoofdstuk: IV
  - number: '66.2'
    text: |-
      Het UWV verhaalt de door werkgevers verschuldigde premies op grond van
      [Wet financiering sociale verzekeringen][ref1] over de uitkering, bedoeld in dit hoofdstuk, op de werkgever.


      [ref1]: https://wetten.overheid.nl/BWBR0017745
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0017745
  - number: '66.3'
    text: |-
      De vorderingen van het UWV, bedoeld in het tweede lid, zijn bevoorrecht op alle goederen van de werkgever en gaan
      boven alle andere voorrechten met uitzondering van die van de [artikelen 287][ref1] en [288 onder a][ref2], alsmede
      die van [artikel 284 van Boek 3 van het Burgerlijk Wetboek][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0005291#Artikel287
      [ref2]: https://wetten.overheid.nl/BWBR0005291#Artikel288
      [ref3]: https://wetten.overheid.nl/BWBR0005291#Artikel284
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0005291
        artikel: '287'
      - id: ref2
        bwb_id: BWBR0005291
        artikel: '288'
      - id: ref3
        bwb_id: BWBR0005291
        artikel: '284'
  - number: '67'
    text: 'Voor de toepassing van dit hoofdstuk wordt:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel67
  - number: 67.a
    text: |-
      onder loon verstaan: al hetgeen de werkgever in verband met de dienstbetrekking aan de werknemer rechtens
      verschuldigd is met uitzondering van vakantiegeld en vakantiebijslag;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel67
  - number: 67.b
    text: |-
      onder vakantiegeld en vakantiebijslag ook verstaan: vakantiebonnen, vakantiezegels en andere dergelijke
      waardepapieren; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel67
  - number: 67.c
    text: |-
      onder werknemer ook verstaan: de persoon die uitsluitend omdat hij de pensioengerechtigde leeftijd heeft bereikt of
      ouder is niet als werknemer wordt beschouwd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel67
  - number: '68.1'
    text: |-
      De [artikelen 17][ref1], [17a][ref2], [17b][ref3], [18][ref4],
      __REF004___________________________________________________________________________________________________________
      _____________________, [20, eerste lid, onderdeel c][ref6], [28][ref7], [35][ref8], [41][ref9], [42][ref10],
      [42a][ref11] en [47][ref12] zijn niet van toepassing op het recht op uitkering, het geldend maken van het recht op
      uitkering en de betaling van de uitkering op grond van dit hoofdstuk.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel17a

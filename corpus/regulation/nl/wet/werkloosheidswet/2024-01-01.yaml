        bwb_id: BWBR0004045
        artikel: '43'
        hoofdstuk: II
        paragraaf: '4'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '50'
        hoofdstuk: II
        paragraaf: '5'
  - number: 130h.2.b
    text: |-
      op wie het eerste lid, onderdeel b of c van toepassing is, en wiens recht als bedoeld in dat lid eindigt of
      is geëindigd op grond van het verrichten van werkzaamheden als werknemer, en die terzake van de verrichte
      werkzaamheden op of na 11 augustus 2003 een nieuw recht op uitkering krijgt, tot aan het moment waarop dat eerste
      recht zonder toepassing van de [artikelen 43][ref1] en [50][ref2] zou hebben geduurd.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel43
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel50
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h

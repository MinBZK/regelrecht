      dat is aangevangen voor 1 juli 2005 wordt vanaf die datum aangemerkt als een traject, bedoeld in
      [artikel 72, eerste lid, onder b][ref2], met dien verstande dat de duur van het traject hierdoor niet wordt
      verlengd.



  - number: 130o.2
    text: |-
      Indien dit een langere duur van het recht op uitkering ten gevolge heeft, blijven de [artikelen 42][ref1],
      [43][ref2], 52g en 52h, zoals die luidden op de dag voor inwerkingtreding van artikel I, onderdeel BB, van de in
      het eerste lid genoemde wet, tot vijf jaar na die dag, van toepassing met betrekking tot het recht op uitkering van
      de persoon die op of voor die dag recht op uitkering op grond van deze wet had, welk recht eindigt of is geëindigd
      op grond van het verrichten van werkzaamheden als werknemer, en die ter zake van de verrichte werkzaamheden na die
      dag een nieuw recht op uitkering krijgt.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel43
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130o

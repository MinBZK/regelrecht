  - number: 130r.3
    text: |-
      Voor zover de uitkering, bedoeld in [artikel 61a][ref1], betrekking heeft op de periode voorafgaand aan de dag
      van inwerkingtreding van de [onderdelen V, X en Y van artikel XXVI van Wet werk en zekerheid][ref2], heeft de
      maximering, bedoeld in artikel 61a, eerste lid, geen plaats.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel61a
      [ref2]: https://wetten.overheid.nl/BWBR0035254#ArtikelXXVI

  - number: 130bb.2
    text: Dit artikel vervalt op een bij koninklijk besluit te bepalen tijdstip.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130bb
  - number: 130cc.1
    text: |-
      Deze wet en de daarop berustende bepalingen zoals deze luidden op de dag voor de inwerkingtreding
      van [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref1], blijven van toepassing op een
      recht op uitkering op grond van [hoofdstuk IV][ref2] indien de dag vanaf welke een werkgever verkeert
      in een toestand als bedoeld in [artikel 61][ref3] is gelegen voor de dag van inwerkingtreding van
      [artikel XXVI, onderdelen V, X en Y, van de Wet werk en zekerheid][ref4].



  - number: 1b.6
    text: |-
      Bij algemene maatregel van bestuur worden, onder meer voor [artikel 18][ref1], ten aanzien van de vaststelling van
      het dagloon, bedoeld in het eerste lid, en de herziening ervan nadere en zo nodig afwijkende regels gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
  - number: 1b.7
    text: |-
      Het dagloon berekend op grond van dit artikel en de daarop berustende bepalingen
      wordt herzien met ingang van de dag waarop en in de mate waarin het bedrag genoemd in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref1] wordt herzien.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
  - number: 1b.8
    text: |-
      Door of namens Onze Minister wordt in de Staatscourant medegedeeld met ingang van welke dag en met welk percentage
      een herziening als bedoeld in het zevende lid plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.9
    text: |-
      Een herziening van de uitkering als gevolg van een herziening van het dagloon vindt plaats zonder dat dit bij
      beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.10
    text: |-
      Bij algemene maatregel van bestuur wordt tevens bepaald wat onder inkomen als bedoeld in dit artikel wordt
      verstaan. Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer
      wordt genoten als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking
      wordt genomen alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: '2.1'
    text: Waar een natuurlijk persoon woont en waar een lichaam gevestigd is, wordt naar de omstandigheden beoordeeld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel2
  - number: '2.2'
    text: |-
      Voor de toepassing van het eerste lid worden schepen die binnen Nederland hun thuishaven hebben, beschouwd als deel
      van Nederland.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel2
  - number: '3.1'
    text: |-
      Werknemer is de natuurlijke persoon, jonger dan de pensioengerechtigde leeftijd, die in privaatrechtelijke of in
      publiekrechtelijke dienstbetrekking staat.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: '3.2'
    text: |-
      Wie zijn dienstbetrekking buiten Nederland en het continentaal plat vervult, wordt niet als werknemer beschouwd,
      tenzij hij in Nederland woont en zijn werkgever eveneens in Nederland woont of gevestigd is. Voor zover een
      werkgever:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.2.a
    text: |-
      in Nederland een vaste inrichting voor de uitoefening van zijn bedrijf of beroep of een in Nederland wonende of
      gevestigde vaste vertegenwoordiger heeft; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.2.b
    text: in Nederland een of meer personen in dienst heeft en hij door of vanwege Onze Minister als werkgever is aangewezen,
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: '3.3'
    text: |-
      In afwijking van het eerste en tweede lid wordt niet als werknemer beschouwd de vreemdeling die niet rechtmatig in
      Nederland verblijf houdt in de zin van [artikel 8, onder a tot en met e en l, van de Vreemdelingenwet 2000][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: '3.4'
    text: 'Bij of krachtens algemene maatregel van bestuur kan worden bepaald, dat:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.4.a
    text: |-
      personen, die buiten Nederland wonen ook als werknemer worden beschouwd, voor zover zij hun dienstbetrekking buiten
      Nederland vervullen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.4.b
    text: |-
      personen, die in Nederland wonen, ook als werknemer worden beschouwd, voor zover zij hun dienstbetrekking buiten
      Nederland vervullen en hun werkgever buiten Nederland woont of gevestigd is.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: '3.5'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kan van het eerste, tweede en derde lid worden afgeweken ten
      aanzien van:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.5.a
    text: vreemdelingen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.5.b
    text: |-
      personen op wie een regeling van toepassing is inzake verzekering tegen geldelijke gevolgen van werkloosheid van
      Aruba, Curaçao, Sint Maarten of een vergelijkbare regeling ten behoeve van de openbare lichamen Bonaire, Sint
      Eustatius en Saba, of van een andere mogendheid;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.5.c
    text: personen, die slechts tijdelijk in Nederland verblijven of tijdelijk in Nederland werkzaam zijn;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.5.d
    text: personen werkzaam bij een volkenrechtelijke organisatie.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: '3.6'
    text: 'Bij een maatregel, als bedoeld in het vijfde lid, kan worden afgeweken van het derde lid ten aanzien van:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.6.a
    text: vreemdelingen die rechtmatig in Nederland arbeid verrichten, dan wel hebben verricht;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
  - number: 3.6.b
    text: |-
      vreemdelingen die, na rechtmatig verblijf te hebben gehouden in de zin van
      [artikel 8, onder a tot en met e en l, van de Vreemdelingenwet 2000][ref1], rechtmatig in Nederland verblijf hebben
      als bedoeld in [artikel 8, onder g of h, van de Vreemdelingenwet 2000][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 3a
    text: |-
      Zo nodig in afwijking van [artikel 3][ref1] en de daarop berustende bepalingen:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel3
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '3'
        hoofdstuk: I
        paragraaf: '2'
  - number: 3a.a
    text: |-
      wordt als werknemer beschouwd de persoon van wie de verzekering op grond van deze wet voortvloeit uit de toepassing
      van bepalingen van een verdrag of van een besluit van een volkenrechtelijke organisatie;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3a
  - number: 3a.b
    text: |-
      wordt niet als werknemer beschouwd de persoon op wie op grond van een verdrag of een besluit van een
      volkenrechtelijke organisatie de wetgeving van een andere mogendheid van toepassing is.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel3a
  - number: '4.1'
    text: 'Als dienstbetrekking wordt mede beschouwd de arbeidsverhouding van de persoon die:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.a
    text: |-
      anders dan als zelfstandige en anders dan als thuiswerker, op grond van een overeenkomst tot aanneming van werk als
      bedoeld in [artikel 750 van Boek 7 van het Burgerlijk Wetboek][ref1], persoonlijk een werk tot stand brengt;


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel750
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '750'
  - number: 4.1.b
    text: de in onderdeel a bedoelde persoon bij het tot stand brengen van dat werk bijstaat;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.c
    text: |-
      krachtens overeenkomst met een ander tegen beloning geregeld zijn bemiddeling verleent tot het tot stand komen
      van overeenkomsten tussen daartoe door hem te bezoeken personen en die ander, mits hij de bedoelde bemiddeling
      uitsluitend voor die ander verleent, het verlenen van die bemiddeling niet een voor hem bijkomstige werkzaamheid is
      en hij zich daarbij doorgaans door niet meer dan twee andere personen laat bijstaan;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.d
    text: |-
      krachtens overeenkomst met een ander tegen beloning geregeld zijn bemiddeling verleent tot het tot stand komen
      van overeenkomsten tussen daartoe door hem te bezoeken personen en een opdrachtgever van die ander, mits hij
      de bedoelde bemiddeling uitsluitend voor die ander verleent, het verlenen van die bemiddeling niet een voor hem
      bijkomstige werkzaamheid is en hij zich daarbij doorgaans door niet meer dan twee andere personen laat bijstaan;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.e
    text: |-
      de bestuurder van een vennootschap als bedoeld in
      [artikel 132, derde lid, van Boek 2 van het Burgerlijk Wetboek][ref1], is, dan wel, indien een vennootschap
      toepassing geeft aan [artikel 129a van Boek 2 van het Burgerlijk Wetboek][ref2], de uitvoerend bestuurder is,
      bedoeld in artikel 129a, eerste lid, van Boek 2 van het Burgerlijk Wetboek, van een vennootschap als bedoeld in
      artikel 132, derde lid, van Boek 2 van het Burgerlijk Wetboek, met uitsluiting van de directeur-grootaandeelhouder,
      bedoeld in [artikel 6, eerste lid, onderdeel d][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0003045#Artikel132
      [ref2]: https://wetten.overheid.nl/BWBR0003045#Artikel129a
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0003045
        artikel: '132'
      - id: ref2
        bwb_id: BWBR0003045
        artikel: 129a
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '6'
        hoofdstuk: I
        paragraaf: '2'
  - number: 4.1.f
    text: 'als lid van de bemanning van een vissersvaartuig aanspraak heeft op een aandeel in de besomming, tenzij hij:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.f.1°
    text: |-
      als zodanig tegen geldelijke gevolgen van arbeidsongeschiktheid is verzekerd bij het Sociaal Fonds voor de
      Maatschapsvisserij; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.f.2°
    text: exploitant of mede-exploitant van het vaartuig is;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.g
    text: zijn militaire dienstplicht of in plaats daarvan vervangende dienst vervult;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.1.h
    text: |-
      degene, die als bestuurder werkzaam is ten behoeve van een coöperatie die met haar leden uitsluitend
      arbeidsovereenkomsten als bedoeld in [artikel 610, eerste lid, van Boek 7 van het Burgerlijk Wetboek][ref1] sluit,
      indien hij lid is van de coöperatie en deze blijkens haar statuten en met inachtneming van de vereisten gesteld in
      het derde lid en krachtens het vierde lid kan worden beschouwd als een coöperatie met werknemerszelfbestuur.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel610
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '610'
  - number: '4.2'
    text: |-
      Het eerste lid, onderdeel a en b, blijft buiten toepassing, indien de in onderdeel a bedoelde overeenkomst
      rechtstreeks is aangegaan met een natuurlijk persoon ten behoeve van diens persoonlijke aangelegenheden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: '4.3'
    text: 'Een coöperatie als bedoeld in het eerste lid, onderdeel h, dient te voldoen aan de vereisten, dat:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.3.a
    text: |-
      doorgaans ten minste twee derde deel van het aantal personen met wie de coöperatie een arbeidsovereenkomst als
      bedoeld in [artikel 610, eerste lid, van Boek 7 van het Burgerlijk Wetboek][ref1] heeft gesloten, lid van de
      coöperatie is;


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel610
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '610'
  - number: 4.3.b
    text: |-
      het lidmaatschap van de coöperatie door ieder van de in onderdeel a bedoelde personen onder dezelfde voorwaarden
      kan worden verkregen en voorwaarden van geldelijke aard geen wezenlijke belemmering vormen voor de verkrijging van
      het lidmaatschap;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.3.c
    text: de leden van de coöperatie ieder één stem hebben;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.3.d
    text: |-
      de arbeidsvoorwaarden van de leden van de coöperatie niet wezenlijk verschillen van hetgeen gebruikelijk is in
      gelijksoortige ondernemingen in de desbetreffende sector;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.3.e
    text: |-
      een lid van de coöperatie behoudens in geval van liquidatie van de coöperatie, bij beëindiging van zijn
      lidmaatschap ten hoogste aanspraak kan maken op het door hem uit hoofde van een geldelijke voorwaarde als bedoeld
      in onderdeel b, hetzij uit anderen hoofde aan de coöperatie betaalde bedrag, herrekend naar geldontwaarding.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: '4.4'
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld waarbij de in het derde lid genoemde vereisten
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.4.a
    text: nader worden bepaald;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.4.b
    text: |-
      worden aangevuld met andere vereisten op grond waarvan de coöperatie kan worden beschouwd als een coöperatie met
      werknemerszelfbestuur.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: '4.5'
    text: 'Voor de toepassing van het eerste lid, onderdeel a, wordt onder zelfstandige verstaan de persoon die:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
  - number: 4.5.a
    text: |-
      in Nederland woont en die belastbare winst uit onderneming geniet als bedoeld in
      [paragraaf 3.2.1 van de Wet inkomstenbelasting 2001][ref1], tenzij hij de onderneming niet voor eigen rekening
      feitelijk drijft; of


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Paragraaf3.2.1
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0011353
        paragraaf: 3.2.1
  - number: 4.5.b
    text: |-
      niet in Nederland woont en die belastbare winst uit Nederlandse onderneming geniet als bedoeld in
      [afdeling 7.2 van de Wet inkomstenbelasting 2001][ref1], tenzij hij de onderneming niet voor eigen rekening
      feitelijk drijft;


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Afdeling7.2
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0011353
        afdeling: '7.2'
  - number: 4.5.c
    text: |-
      directeur-grootaandeelhouder is als bedoeld in [artikel 6, eerste lid, onderdeel d][ref1], en het werk tot
      stand brengt uitsluitend voor rekening en risico van de onderneming van de rechtspersoon waarvan hij directeur-
      grootaandeelhouder is.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel4
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '6'
        hoofdstuk: I
        paragraaf: '2'
  - number: '5'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld, op grond waarvan eveneens als
      dienstbetrekking wordt beschouwd de arbeidsverhouding van de persoon die:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel5
  - number: 5.a
    text: als thuiswerker arbeid verricht;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel5
  - number: 5.b
    text: de in onderdeel *a* bedoelde persoon als hulp bij het verrichten van de arbeid bijstaat;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel5
  - number: 5.c
    text: als musicus of anderszins als artiest optreedt of als beroep een tak van sport beoefent; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel5
  - number: 5.d
    text: |-
      tegen beloning persoonlijk arbeid verricht en wiens arbeidsverhouding niet reeds op grond van dit artikel en de
      [artikelen 3][ref1] en [4][ref2] als dienstbetrekking wordt beschouwd, doch hiermee maatschappelijk gelijk kan
      worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel5
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '3'
        hoofdstuk: I
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '4'
        hoofdstuk: I
        paragraaf: '2'
  - number: '6.1'
    text: 'Als dienstbetrekking wordt niet beschouwd de arbeidsverhouding van een persoon:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: 6.1.a
    text: |-
      die minister, staatssecretaris, commissaris van de Koning, burgemeester, Nationale ombudsman, substituut-ombudsman,
      lid van gedeputeerde staten, wethouder, voorzitter van een waterschap of de Rijksvertegenwoordiger voor de openbare
      lichamen Bonaire, Sint Eustatius en Saba, is;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: 6.1.b
    text: |-
      die als vrijwilliger werkzaamheden verricht als politiebeambte, alsmede van degene die als vrijwilliger al dan niet
      tegen loon werkzaamheden verricht bij de brandweer;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: 6.1.c
    text: |-
      die doorgaans op minder dan vier dagen per week uitsluitend of nagenoeg uitsluitend diensten verricht ten behoeve
      van het huishouden van de natuurlijke persoon tot wie hij in dienstbetrekking staat;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: 6.1.d
    text: die directeur-grootaandeelhouder is;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: 6.1.e
    text: |-
      die als vrijwilliger als bedoeld in [artikel 2, zesde lid, van de Wet op de loonbelasting 1964][ref1], uitsluitend
      vergoedingen of verstrekkingen als bedoeld in dat lid ontvangt met een gezamenlijke waarde van ten hoogste de in
      dat artikellid genoemde bedragen per maand en per kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel2
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
    references:
      - id: ref1
        bwb_id: BWBR0002471
        artikel: '2'
  - number: '6.2'
    text: |-
      Voor de toepassing van het eerste lid, onderdeel c, wordt onder het verrichten van diensten ten behoeve van een
      huishouden mede verstaan het verlenen van zorg aan de leden van dat huishouden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: '6.3'
    text: Het eerste lid is alleen van toepassing op de aldaar bedoelde arbeidsverhoudingen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: '6.4'
    text: |-
      Door Onze Minister worden, in overeenstemming met Onze Minister van Financiën, regels gesteld omtrent hetgeen onder
      directeur-grootaandeelhouder, bedoeld in het eerste lid, onderdeel *d*, wordt verstaan.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
  - number: '6.5'
    text: |-
      Als dienstbetrekking wordt niet beschouwd de arbeidsverhouding van de overheidswerknemer, voor zover de
      overheidswerknemer als gevolg van de beëindiging van die arbeidsverhouding recht op wachtgeld heeft verkregen
      of verkrijgt. Onder wachtgeld als bedoeld in de eerste zin wordt verstaan: een wachtgeld in de zin van het
      [Rijkswachtgeldbesluit 1959][ref1], zoals dat luidde op 31 december 2000, of een soortgelijke uitkering van
      een overheidswerknemer op grond van ontslag of werkloosheid alsmede een wachtgeld of daarmee gelijkgestelde
      uitkering in de zin van de bij of krachtens de [Kaderwet militaire pensioenen][ref2] vastgestelde bepalingen, met
      uitzondering van een uitkering in verband met functioneel leeftijdsontslag of vrijwillig vervroegd uittreden.


      [ref1]: https://wetten.overheid.nl/BWBR0002326
      [ref2]: https://wetten.overheid.nl/BWBR0011955
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel6
    references:
      - id: ref1
        bwb_id: BWBR0002326
      - id: ref2
        bwb_id: BWBR0011955
  - number: '8.1'
    text: |-
      Een persoon wiens dienstbetrekking geheel of gedeeltelijk is geëindigd, behoudt de hoedanigheid van werknemer,
      voor zover hij geen werkzaamheden verricht uit hoofde waarvan hij op grond van deze wet niet als werknemer wordt
      beschouwd, behalve als die werkzaamheden worden aangemerkt als vrijwilligerswerk.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8
  - number: '8.2'
    text: |-
      In afwijking van het eerste lid behoudt een persoon de hoedanigheid van werknemer voor zover het aantal
      uren in een kalenderweek waarop hij de werkzaamheden uit hoofde waarvan hij op grond van deze wet niet als
      werknemer wordt beschouwd, verricht niet hoger is dan het gemiddeld aantal uren per kalenderweek waarop hij deze
      werkzaamheden verrichtte in de 26 kalenderweken onmiddellijk voorafgaande aan het moment waarop de werkzaamheden in
      dienstbetrekking, waaruit de werknemer werkloos is geworden, eindigden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8
  - number: '8.3'
    text: |-
      Een persoon, wiens werknemerschap geheel of gedeeltelijk is geëindigd door het verrichten van werkzaamheden
      in de uitoefening van een bedrijf of in de zelfstandige uitoefening van een beroep, herkrijgt bij de volledige
      beëindiging van die werkzaamheden de hoedanigheid van werknemer, indien de werkzaamheden worden beëindigd binnen
      een periode die gelijk is aan de uitkeringsduur, dan wel binnen anderhalf jaar, indien de uitkeringsduur korter is
      dan anderhalf jaar.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8
  - number: '8.4'
    text: |-
      Een persoon, wiens werknemerschap geheel of gedeeltelijk is geëindigd door het verrichten van werkzaamheden als
      lid van de Eerste Kamer der Staten-Generaal, van een vertegenwoordigend orgaan van een publiekrechtelijk lichaam,
      dat bij rechtstreekse verkiezing wordt samengesteld, of van een algemeen bestuur van een waterschap, herkrijgt bij
      gehele of gedeeltelijke beëindiging van die werkzaamheden de hoedanigheid van werknemer, voor zover die beëindiging
      plaatsvindt binnen het tijdvak van de bij de aanvang van die werkzaamheden voor die persoon nog geldende
      uitkeringsduur krachtens deze wet.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8
  - number: '8.5'
    text: |-
      Een persoon, wiens werknemerschap geheel of gedeeltelijk is geëindigd door het verrichten van werkzaamheden,
      waarvan hij op grond van deze wet niet als werknemer wordt beschouwd, niet zijnde werkzaamheden als bedoeld in
      het derde of vierde lid, herkrijgt bij gehele of gedeeltelijke beëindiging van die werkzaamheden de hoedanigheid
      van werknemer.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8
  - number: '8.6'
    text: |-
      Bij ministeriële regeling worden nadere voorwaarden gesteld aan het aanmerken van werkzaamheden als
      vrijwilligerswerk als bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8
  - number: 8a
    text: |-
      Degene die op grond van de verplichte verzekering op grond van de [Wet werk en inkomen naar arbeidsvermogen][ref1]
      of de [Wet op de arbeidsongeschiktheidsverzekering][ref2] een uitkering ontvangt verliest de hoedanigheid van
      werknemer indien hij niet in Nederland woont.


      [ref1]: https://wetten.overheid.nl/BWBR0019057
      [ref2]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel8a
    references:
      - id: ref1
        bwb_id: BWBR0019057
      - id: ref2
        bwb_id: BWBR0002524
  - number: '9'
    text: |-
      Werkgever is de overheidswerkgever onderscheidenlijk de natuurlijke persoon tot wie of het lichaam tot welk een of
      meer natuurlijke personen in dienstbetrekking staan.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel9
  - number: '10'
    text: 'Als werkgever wordt beschouwd:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel10
  - number: 10.a
    text: |-
      in de gevallen, bedoeld in [artikel 4, eerste lid][ref1], onderdeel: *a en b:* de aanbesteder; *c en d:* degene,
      met wie de overeenkomst tot bemiddeling is gesloten; *e:* de vennootschap; *f:* de exploitant of mede-exploitant
      van het vaartuig; *g:* Onze Minister van Defensie of Onze Minister; *h:* de coöperatie.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '4'
        hoofdstuk: I
        paragraaf: '2'
  - number: 10.b
    text: |-
      in de gevallen, bedoeld in [artikel 5][ref1], onderdeel: *a:* de opdrachtgever; *b:* de thuiswerker; *c:* degene,
      met wie het optreden of de sportbeoefening is overeengekomen; *d:* degene, die bij de in [artikel 5][ref2] bedoelde
      algemene maatregel van bestuur als werkgever wordt aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel5
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '5'
        hoofdstuk: I
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '5'
        hoofdstuk: I
        paragraaf: '2'
  - number: 10.c
    text: |-
      de aangewezen inhoudingsplichtige, bedoeld in [artikel 6, zesde lid, van de Wet op de loonbelasting 1964][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0002471
        artikel: '6'
  - number: '11.1'
    text: 'Het UWV wordt als werkgever beschouwd in de gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
  - number: 11.1.a
    text: |-
      ziekengeld wordt betaald op grond van de verplichte verzekering krachtens de [Ziektewet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: 11.1.b
    text: |-
      uitkering wordt betaald op grond van de verplichte verzekering of [hoofdstuk IV van deze wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukIV
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: IV
  - number: 11.1.c
    text: |-
      uitkering wordt betaald op grond van de verplichte verzekering op grond van de
      [Wet werk en inkomen naar arbeidsvermogen][ref1] of de [Wet op de arbeidsongeschiktheidsverzekering][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0019057
      [ref2]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0019057
      - id: ref2
        bwb_id: BWBR0002524
  - number: 11.1.d
    text: |-
      uitkering wordt betaald op grond van [hoofdstuk 3, afdeling 2, paragraaf 1][ref1],
      of de [artikelen 4:2b, eerste tot en met zesde lid][ref2], of
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref3] aan de werknemer of gelijkgestelde, bedoeld in
      [artikel 3:6, eerste lid, van die wet][ref4];


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel6
      [ref4]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0013008
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '6'
      - id: ref4
        bwb_id: BWBR0013008
        artikel: '3'
  - number: 11.1.e
    text: |-
      geen ziekengeld wordt betaald op grond van [artikel 29, eerste lid, van de Ziektewet][ref1] maar wel een toeslag op
      grond van de [Toeslagenwet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0004043
  - number: '11.2'
    text: |-
      Ingeval het UWV de uitkering of toeslag, bedoeld in het eerste lid, vermeerderd met de daarover door de werkgever
      verschuldigde premies en de inkomensafhankelijk bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref1],
      betaalt aan de werkgever, bedoeld in [artikel 9][ref2], [10][ref3] of [12][ref4], teneinde deze uitkering door
      diens tussenkomst te doen uitbetalen, treedt voor de toepassing van het eerste lid, deze in de plaats van het UWV,
      onafhankelijk van het voortbestaan van de dienstbetrekking met die werkgever.


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel10
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel12
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '42'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '9'
        hoofdstuk: I
        paragraaf: '3'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '10'
        hoofdstuk: I
        paragraaf: '3'
      - id: ref4
        bwb_id: BWBR0004045
        artikel: '12'
        hoofdstuk: I
        paragraaf: '3'
  - number: '11.3'
    text: |-
      Indien een eigenrisicodrager als bedoeld in
      [artikel 40, aanhef, eerste lid, van de Wet financiering sociale verzekeringen][ref1] de uitkering, bedoeld
      in [artikel 8, onderdeel a, van de Ziektewet][ref2] op grond van [artikel 63a van de Ziektewet][ref3]
      betaalt of de uitkering op grond van de [Wet werk en inkomen naar arbeidsvermogen][ref4],
      bedoeld in [artikel 8a, eerste lid, van de Ziektewet][ref5] op grond van
      [artikel 82 van de Wet werk en inkomen naar arbeidsvermogen][ref6] betaalt, treedt voor de toepassing van het
      eerste lid deze eigenrisicodrager als werkgever in de plaats van het UWV, onafhankelijk van het voortbestaan van de
      dienstbetrekking met die eigenrisicodrager.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel63a
      [ref4]: https://wetten.overheid.nl/BWBR0019057
      [ref5]: https://wetten.overheid.nl/BWBR0001888#Artikel8a
      [ref6]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '8'
      - id: ref3
        bwb_id: BWBR0001888
        artikel: 63a
      - id: ref4
        bwb_id: BWBR0019057
      - id: ref5
        bwb_id: BWBR0001888
        artikel: 8a
      - id: ref6
        bwb_id: BWBR0019057
        artikel: '82'
  - number: '11.4'
    text: |-
      Bij ministeriële regeling kunnen met betrekking tot de door de werkgever verschuldigde premies, bedoeld in het
      tweede lid, nadere regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel11
  - number: '12'
    text: |-
      Onze Minister is bevoegd, in afwijking van de [artikelen 9][ref1] en [10][ref2], andere dan de aldaar bedoelde
      personen of lichamen aan te wijzen als werkgever ten aanzien van de persoon die:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel10
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '9'
        hoofdstuk: I
        paragraaf: '3'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '10'
        hoofdstuk: I
        paragraaf: '3'
  - number: 12.a
    text: |-
      krachtens overeenkomst met een ander tegen beloning geregeld zijn bemiddeling verleent tot het tot stand komen van
      overeenkomsten tussen daartoe door hem te bezoeken personen en een opdrachtgever van die ander;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel12
  - number: 12.b
    text: een thuiswerker als hulp bij het verrichten van de arbeid bijstaat;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel12
  - number: 12.c
    text: als musicus of anderszins als artiest optreedt dan wel als beroep een tak van sport beoefent.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel12
  - number: '13'
    text: |-
      De werkgever is verplicht de werknemer de gelegenheid te geven tot het uitoefenen van de hem op grond van deze
      wet of de daarop berustende bepalingen toegekende bevoegdheden en tot het nakomen van de hem op grond van deze wet
      of de daarop berustende bepalingen opgelegde verplichtingen, voor zover de uitoefening van die bevoegdheden en de
      nakoming van die verplichtingen niet buiten de arbeidstijd kan geschieden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel13
  - number: '14.1'
    text: |-
      Loon is het loon in de zin van [hoofdstuk 3 van de Wet financiering sociale verzekeringen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0017745
        hoofdstuk: '3'
  - number: '14.2'
    text: |-
      Minimumloon is het minimumloon per maand, bedoeld in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref1] of, indien
      het een werknemer jonger dan 21 jaar betreft, het op grond van de [artikelen 7, derde lid][ref2], en
      [8, derde lid, van die wet][ref3] voor zijn leeftijd geldende minimumloon, beide vermeerderd met de daarover
      berekende vakantietoeslag, bedoeld in [artikel 15 van die wet][ref4] en vervolgens gedeeld door 21,75.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0002638#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0002638#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0002638#Artikel15
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0002638
        artikel: '7'
      - id: ref3
        bwb_id: BWBR0002638
        artikel: '8'
      - id: ref4
        bwb_id: BWBR0002638
        artikel: '15'
  - number: '14.3'
    text: |-
      Loon, door verschillende personen te zamen onverdeeld ontvangen, wordt, voor zover niet blijkt van een andere
      verdeling, geacht door ieder van hen voor een gelijk deel te zijn ontvangen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel14
  - number: '15'
    text: |-
      Met inachtneming van de [artikelen 16 tot en met 21][ref1] en de daarop berustende bepalingen heeft de werknemer
      die werkloos is recht op uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
  - number: '16.1'
    text: 'Werkloos wordt de werknemer die:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: 16.1.a
    text: |-
      in een kalenderweek ten minste vijf arbeidsuren minder heeft dan zijn gemiddeld aantal arbeidsuren per kalenderweek
      of een aantal arbeidsuren heeft dat ten hoogste gelijk is aan de helft van zijn gemiddeld aantal arbeidsuren per
      kalenderweek; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: 16.1.b
    text: beschikbaar is om arbeid te aanvaarden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: '16.2'
    text: |-
      Onder het in het eerste lid bedoelde gemiddeld aantal arbeidsuren per kalenderweek wordt verstaan het gemiddeld
      aantal arbeidsuren in de 26 kalenderweken onmiddellijk voorafgaande aan de kalenderweek, bedoeld in het eerste
      lid. Indien de werknemer ten opzichte van zijn gemiddeld aantal arbeidsuren per kalenderweek minder dan vijf
      arbeidsuren heeft verloren, worden bij de bepaling hoeveel arbeidsuren de werknemer heeft en bij de bepaling van
      het gemiddeld aantal arbeidsuren per kalenderweek, bedoeld in de eerste zin, mede in aanmerking genomen de uren
      waarin de werknemer werkzaamheden verricht uit hoofde waarvan hij niet als werknemer wordt beschouwd. Voor de
      vaststelling van de periode van 26 kalenderweken, bedoeld in de eerste zin, worden kalenderweken, tot een maximum
      van 78 kalenderweken, waarin de werknemer onbetaald verlof heeft genoten, niet in aanmerking genomen, tenzij dit
      leidt tot een lager gemiddeld aantal arbeidsuren per kalenderweek dan wanneer die kalenderweken wel in aanmerking
      zouden worden genomen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: '16.3'
    text: 'Bij algemene maatregel van bestuur kunnen met betrekking tot het eerste en het tweede lid regels worden gesteld:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: 16.3.a
    text: |-
      omtrent de berekening van het verlies van arbeidsuren bij een opeenvolgend verlies van arbeidsuren, waarbij andere
      perioden voor de berekening van het gemiddeld aantal arbeidsuren in aanmerking kunnen worden genomen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: 16.3.b
    text: |-
      waarbij voor bepaalde groepen werknemers een kortere of langere periode voor de berekening van het gemiddeld aantal
      arbeidsuren geldt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: '16.4'
    text: |-
      In afwijking van het eerste lid is tevens werkloos de werknemer die voldoet aan het eerste lid, onderdeel *a*, doch
      niet voldoet aan het eerste lid, onderdeel *b*, wegens het enkele feit dat hij voorafgaand aan of aansluitend op
      het arbeidsurenverlies deelneemt of gaat deelnemen aan een naar het oordeel van het UWV noodzakelijke opleiding
      of scholing, als bedoeld in [artikel 76][ref1]. Voor de toepassing van [artikel 16a, tweede lid][ref2], wordt een
      werknemer op wie de eerste volzin van toepassing is beschouwd als een werknemer die voldoet aan de voorwaarden van
      het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel76
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel16a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '76'
        hoofdstuk: VI
      - id: ref2
        bwb_id: BWBR0004045
        artikel: 16a
        hoofdstuk: II
        paragraaf: '1'
  - number: '16.5'
    text: |-
      In afwijking van het eerste lid is gedurende de periode dat de voor de werknemer rechtens geldende opzegtermijn
      langer duurt dan de opzegtermijn, bedoeld in [artikel 64, eerste lid][ref1], onderdeel b, tevens werkloos
      de werknemer waarvan de werkgever het loon niet voldoet omdat hij verkeert in een toestand als bedoeld in
      [artikel 61][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel64
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel61
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '64'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '61'
        hoofdstuk: IV
  - number: '16.6'
    text: |-
      Indien bij een beoordeling als bedoeld in
      [artikel 6, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen][ref1] of een beoordeling als
      bedoeld in [artikel 19ab, eerste lid, van de Ziektewet][ref2] is vastgesteld dat de werknemer voor een
      geringer aantal uren belastbaar is dan gezonde personen met soortgelijke opleiding en ervaring als bedoeld in
      [artikel 1 van de Wet werk en inkomen naar arbeidsvermogen][ref3], doch minder dan 35% arbeidsongeschikt is, wordt
      onder het in het tweede lid bedoelde gemiddeld aantal arbeidsuren per kalenderweek verstaan: het aantal uren dat
      die werknemer belastbaar is, tenzij dit leidt tot een hoger aantal arbeidsuren.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel19ab
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel1
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: 19ab
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '1'
  - number: '16.7'
    text: Voor de toepassing van deze wet en de daarop berustende bepalingen is de maandag de eerste dag van de kalenderweek.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
  - number: '16.8'
    text: |-
      Een recht op uitkering dat is ontstaan en direct eindigt op grond van [artikel 20, eerste lid, onderdeel c][ref1],
      wordt geacht niet te zijn ontstaan indien het inkomen is genoten uit werkzaamheden als werknemer.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
  - number: 16a.1
    text: |-
      Voor de toepassing van deze wet en de daarop berustende bepalingen is de eerste dag van werkloosheid de eerste dag
      waarop een verlies van een of meer arbeidsuren intreedt in de kalenderweek waarin zich een situatie voordoet als
      bedoeld in [artikel 16, eerste of vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
  - number: 16a.2
    text: |-
      Indien bij het intreden van het arbeidsurenverlies, bedoeld in [artikel 16, eerste lid][ref1], niet wordt
      voldaan aan de andere in dat lid bedoelde voorwaarde, of de werknemer geen recht op uitkering heeft op grond van
      [artikel 19][ref2], wordt, in afwijking van het eerste lid, voor de toepassing van deze wet en de daarop berustende
      bepalingen als eerste werkloosheidsdag aangemerkt, de dag van de kalenderweek waarop aan de andere voorwaarde,
      bedoeld in het eerste lid, wordt voldaan en artikel 19 niet meer aan het recht op uitkering in de weg staat.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: 16a.3
    text: |-
      In afwijking van het eerste en tweede lid is de eerste dag van werkloosheid voor de werknemer,
      bedoeld in [artikel 16, vijfde lid][ref1], de dag na het einde van de termijn, bedoeld in
      [artikel 64, eerste lid, onderdeel b][ref2], dan wel de eerste dag dat de werkgever het loon niet meer voldoet
      indien deze dag later is gelegen dan de dag na het einde van de bedoelde termijn.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel64
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel16a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '64'
        hoofdstuk: IV
  - number: '17.1'
    text: |-
      Recht op uitkering ontstaat voor de werknemer indien hij in 36 kalenderweken onmiddellijk voorafgaand aan de eerste
      dag van werkloosheid in ten minste 26 kalenderweken ten minste één arbeidsuur per kalenderweek heeft.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17
  - number: '17.2'
    text: |-
      Indien [artikel 19, derde of vierde lid][ref1], toepassing heeft gevonden, ontstaat in afwijking van het eerste
      lid het recht op uitkering indien de werknemer in 36 kalenderweken onmiddellijk voorafgaand aan de dag waarop het
      arbeidsurenverlies is ingetreden in ten minste 26 kalenderweken ten minste één arbeidsuur per kalenderweek heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: 17a.1
    text: |-
      Voor de vaststelling van het in [artikel 17][ref1] bedoelde aantal van 36 kalenderweken worden niet in aanmerking
      genomen kalenderweken gedurende welke de werknemer:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
  - number: 17a.1.a
    text: wegens ziekte of arbeidsongeschiktheid geen arbeid kon verrichten;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
  - number: 17a.1.b
    text: |-
      werkzaamheden heeft verricht als bedoeld in [artikel 8][ref1] en hij op grond van dat artikel de hoedanigheid van
      werknemer heeft herkregen;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '8'
        hoofdstuk: I
        paragraaf: '2'
  - number: 17a.1.c
    text: wegens het genieten van onbetaald verlof geen arbeid heeft verricht, tot een maximum van 78 kalenderweken; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
  - number: 17a.1.d
    text: |-
      geen arbeid heeft verricht maar wel recht op uitkering heeft op grond van
      [hoofdstuk 3, afdeling 2, paragraaf 1][ref1], of de [artikelen 4:2b, eerste tot en met zesde lid][ref2], of
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
    references:
      - id: ref1
        bwb_id: BWBR0013008
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '6'
  - number: 17a.2
    text: |-
      Voor de vaststelling van het in [artikel 17][ref1] bedoelde aantal van 26 kalenderweken worden arbeidsuren in een
      kalenderweek slechts in aanmerking genomen, voor zover deze betrekking hebben op de dienstbetrekking waaruit de
      werknemer werkloos is geworden en op een of meer dienstbetrekkingen waarvoor eerstgenoemde dienstbetrekking in de
      plaats is gekomen, en voor zover deze niet reeds eerder hebben geleid tot het ontstaan van een recht op uitkering
      op grond van dit hoofdstuk of op grond van [hoofdstuk 7 van de Wet werk en inkomen naar arbeidsvermogen][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0019057
        hoofdstuk: '7'
  - number: 17a.3
    text: |-
      Bij algemene maatregel van bestuur kan voor bepaalde groepen werknemers het in [artikel 17][ref1] bedoelde aantal
      van 36 kalenderweken hoger worden vastgesteld en het in dat onderdeel bedoelde aantal van 26 kalenderweken lager
      worden vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
  - number: 17a.4
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld op grond waarvan kalenderweken waarin de werknemer
      arbeidsuren heeft meermaals in aanmerking kunnen worden genomen bij de berekening van het in [artikel 17][ref1]
      bedoelde aantal van 26 kalenderweken.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
  - number: 17b.1
    text: |-
      Indien in de kalenderweek na het ontstaan van een recht op uitkering ter zake van gedeeltelijke werkloosheid uit
      een dienstbetrekking, een nieuw recht op uitkering ontstaat ter zake van toegenomen werkloosheid uit dezelfde
      dienstbetrekking, of een dienstbetrekking die voor eerstgenoemde dienstbetrekking in de plaats is gekomen, worden
      beide rechten samengevoegd tot een recht.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17b
  - number: 17b.2
    text: |-
      Het eerste lid vindt geen toepassing met betrekking tot een recht dat reeds door samenvoeging van rechten is
      ontstaan.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17b
  - number: 17c.1
    text: |-
      De persoon die op de dag, onmiddellijk voorafgaande aan de eerste dag van werkloosheid, werknemer in de zin van
      deze wet was en die in de periode van 36 weken, bedoeld in [artikel 17][ref1], gelegen vóór 1 januari 1987, arbeid
      heeft verricht als werknemer in de zin van de Werkloosheidswet of de [Wet Werkloosheidsvoorziening][ref2] zoals
      die wetten luidden op 31 december 1986, dan wel zijn militaire dienstplicht of in plaats daarvan vervangende dienst
      heeft vervuld, wordt met betrekking tot de weken waarin hij deze arbeid heeft verricht beschouwd als werknemer in
      de zin van deze wet.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0002470
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0002470
  - number: 17c.2
    text: |-
      De persoon die op de dag, onmiddellijk voorafgaande aan de eerste dag van werkloosheid, werknemer in de zin van
      deze wet was en die in de periode van 36 weken, bedoeld in [artikel 17][ref1], vanaf 1 januari 1987, arbeid heeft
      verricht in een arbeidsverhouding ter zake waarvan hem door het Rijk invaliditeitspensioen is verzekerd, wordt met
      betrekking tot de weken waarin hij deze arbeid heeft verricht beschouwd als werknemer in de zin van deze wet.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
  - number: 17c.3
    text: |-
      [Artikel 17a][ref1] is van overeenkomstige toepassing met betrekking tot het eerste en tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 17a
        hoofdstuk: II
        paragraaf: '1'
  - number: 17c.4
    text: |-
      Ten aanzien van de persoon die op 31 december 1986 recht had op een uitkering op grond van de Algemene
      Arbeidsongeschiktheidswet of de [Wet op de arbeidsongeschiktheidsverzekering][ref1] of beide wetten, en die op
      het tijdstip waarop de arbeidsongeschiktheid intrad werknemer was in de zin van de Werkloosheidswet zoals die wet
      luidde op 31 december 1986, zijn het eerste en het derde lid van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel17c
    references:
      - id: ref1
        bwb_id: BWBR0002524
  - number: '18.1'
    text: |-
      De werknemer, die werkloos is uitsluitend als gevolg van vorst, sneeuwval, hoog water of andere buitengewone
      natuurlijke omstandigheden heeft recht op uitkering voor de duur van de buitengewone natuurlijke omstandigheden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel18
  - number: '18.2'
    text: |-
      De [artikelen 17][ref1] en [42, tweede lid, onderdeel a][ref2] zijn niet van toepassing op de in het eerste lid
      bedoelde werknemer.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel42
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '17'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '42'
        hoofdstuk: II
        paragraaf: '4'
  - number: '19.1'
    text: 'Geen recht op uitkering heeft de werknemer die:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.1.a
    text: |-
      een uitkering ontvangt op grond van de [Ziektewet][ref1] of een uitkering die naar aard en strekking daarmee
      overeenkomt;


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: 19.1.b
    text: |-
      een arbeidsongeschiktheidsuitkering dan wel een loongerelateerde uitkering van de werkhervattingsuitkering
      gedeeltelijk arbeidsgeschikten ontvangt op grond van de [Wet werk en inkomen naar arbeidsvermogen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: 19.1.c
    text: |-
      een uitkering ontvangt op grond van de [Wet op de arbeidsongeschiktheidsverzekering][ref1], berekend naar een
      arbeidsongeschiktheid van ten minste 80%, of een uitkering ontvangt die naar aard en strekking met die uitkering
      overeenkomt;


      [ref1]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0002524
  - number: 19.1.d
    text: |-
      een uitkering ontvangt op grond van [hoofdstuk III van de Wet arbeidsongeschiktheidsvoorziening militairen][ref1],
      berekend naar een arbeidsongeschiktheid van ten minste 80%, of een toelage op grond van dat hoofdstuk, die, al
      dan niet vermeerderd met de arbeidsongeschiktheidsuitkering, 70% of meer bedraagt van het dagloon waarnaar de
      arbeidsongeschiktheidsuitkering is of zou zijn berekend;


      [ref1]: https://wetten.overheid.nl/BWBR0002822#HoofdstukIII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0002822
        hoofdstuk: III
  - number: 19.1.e
    text: buiten Nederland woont of verblijf houdt anders dan wegens vakantie;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.1.f
    text: |-
      niet rechtmatig in Nederland verblijf houdt als bedoeld in [artikel 8 van de Vreemdelingenwet 2000][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 19.1.g
    text: rechtens zijn vrijheid is ontnomen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.1.h
    text: zich onttrekt aan de tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.1.i
    text: de pensioengerechtigde leeftijd heeft bereikt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.1.j
    text: |-
      op grond van [artikel 64 van de Wet financiering sociale verzekeringen][ref1] een ontheffing wegens gemoedsbezwaren
      heeft of wiens werkloosheid binnen 3 maanden na de datum van intrekking van een zodanige ontheffing is aangevangen;


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel64
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '64'
  - number: 19.1.k
    text: |-
      vakantie geniet buiten de bij ministeriële regeling vast te stellen periode, bedoeld in het negende lid, onderdeel
      b;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.1.l
    text: |-
      werkloos is ten gevolge van werkstaking of uitsluiting, tenzij voor de werknemer een ontheffing is verleend op
      grond van [artikel 8, derde lid, van het Buitengewoon Besluit Arbeidsverhoudingen 1945][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002014#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0002014
        artikel: '8'
  - number: 19.1.m
    text: |-
      een uitkering ontvangt op grond van de [Wet arbeid en zorg][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0013008
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0013008
  - number: 19.1.n
    text: een uitreiziger is.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.2'
    text: |-
      Indien een uitkering als bedoeld in het eerste lid, onderdeel *a*, *b*, *c* of *d* niet wordt betaald wegens voor
      de werknemer geldende wachtdagen of wegens enig handelen of nalaten dat hem redelijkerwijs kan worden verweten,
      wordt het niet betalen daarvan voor de toepassing van het eerste lid gelijkgesteld met het ontvangen van die
      uitkering. Onder wachtdagen worden niet verstaan de eerste dertien weken van ongeschiktheid van de werknemer tot
      het verrichten van zijn arbeid wegens ziekte.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.3'
    text: |-
      Geen recht op uitkering heeft de werknemer zolang de rechtens geldende opzegtermijn niet is verstreken en de
      arbeidsovereenkomst is geëindigd door opzegging of doordat daarover schriftelijk overeenstemming is bereikt.
      Onder de rechtens geldende opzegtermijn wordt verstaan de termijn die de werkgever of de werknemer op grond van
      [artikel 672 van Boek 7 van het Burgerlijk Wetboek][ref1] of een overeenkomstige bepaling van soortgelijke
      regeling ieder voor zich bij opzegging in acht behoort te nemen. In geval de dienstbetrekking is geëindigd met
      wederzijds goedvinden, geldt de in de vorige zin genoemde opzegtermijn voor de werkgever. Als datum waarop de
      dienstbetrekking wordt geacht te zijn opgezegd, geldt de datum waarop:


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel672
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '672'
  - number: 19.3.a
    text: de beëindiging schriftelijk is overeengekomen; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.3.b
    text: de werkgever of de werknemer de arbeidsovereenkomst heeft opgezegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.4'
    text: |-
      Geen recht op uitkering heeft de werknemer totdat de arbeidsovereenkomst voor bepaalde tijd zou
      zijn verstreken, indien deze tussentijds met wederzijds goedvinden is geëindigd, zonder dat in die
      arbeidsovereenkomst schriftelijk is overeengekomen dat deze tussentijds kan worden opgezegd als bedoeld in
      [artikel 667, derde lid, van Boek 7 van het Burgerlijk Wetboek][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel667
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '667'
  - number: '19.5'
    text: |-
      Het derde en vierde lid zijn niet langer van toepassing indien [artikel 16, vijfde lid][ref1], is toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
  - number: '19.6'
    text: |-
      De werknemer ten aanzien van wie het derde of vierde lid is toegepast, heeft enkel geen recht op uitkering voor
      zover het de beëindiging van de arbeidsovereenkomst, bedoeld in het derde en vierde lid, betreft.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.7'
    text: 'Geen recht op uitkering heeft de werknemer over een dag waarop zijn arbeid wordt onderbroken uitsluitend doordat:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.7.a
    text: deze dag voor hem als rustdag geldt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.7.b
    text: |-
      deze dag een nationale of algemeen erkende christelijke feestdag is, dan wel een kerkelijke feestdag, die ter
      plaatse waar de werknemer pleegt te werken, algemeen als zodanig wordt gevierd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.8'
    text: |-
      Het eerste lid blijft buiten toepassing ten aanzien van de werknemer die uitsluitend uit hoofde van een
      andere dienstbetrekking dan de dienstbetrekking waaruit hij werkloos is geworden in een omstandigheid
      verkeert als bedoeld in het eerste lid. Het eerste lid, onderdeel m, blijft tevens buiten toepassing
      ten aanzien van degene die een uitkering ontvangt op grond van [artikel 4:2b, zevende lid][ref1], of
      [artikel 6:3, zevende lid, van de Wet arbeid en zorg][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel6
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '6'
  - number: '19.9'
    text: 'Bij ministeriële regeling kunnen regels worden gesteld:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.9.a
    text: met betrekking tot het begrip vakantie genieten, bedoeld in het eerste lid, onderdeel k;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.9.b
    text: |-
      met betrekking tot de vaststelling van de periode gedurende welke de werknemer met behoud van zijn recht op
      uitkering vakantie kan genieten.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.10'
    text: |-
      Onze Minister is bevoegd regels te stellen voor gevallen waarin het eerste lid, onderdeel e, buiten toepassing
      blijft in verband met een ramp.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.11'
    text: |-
      Het eerste lid, onderdeel g, is niet van toepassing op bij algemene maatregel van bestuur aan te wijzen categorieën
      personen waarbij tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel plaatsvindt buiten een
      penitentiaire inrichting, een instelling voor de verpleging van ter beschikking gestelden, of een inrichting als
      bedoeld in [artikel 1, onderdeel b, van de Beginselenwet justitiële jeugdinrichtingen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0011756#Artikel1
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0011756
        artikel: '1'
  - number: '19.12'
    text: 'Het eerste lid, onderdeel b, is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.12.a
    text: |-
      de werknemer, bedoeld in [artikel 18, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
  - number: 19.12.b
    text: |-
      de werknemer wiens werkloosheid uitsluitend het gevolg is van verkorting van de werktijd waarvoor op grond van
      [artikel 8, derde lid, van het Buitengewoon Besluit Arbeidsverhoudingen 1945][ref1] ontheffing is verleend, en


      [ref1]: https://wetten.overheid.nl/BWBR0002014#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0002014
        artikel: '8'
  - number: 19.12.c
    text: |-
      de werknemer wiens werkloosheid is ontstaan na het ontstaan van het recht op de loongerelateerde
      uitkering van de werkhervattingsuitkering gedeeltelijk arbeidsgeschikten op grond van de
      [Wet werk en inkomen naar arbeidsvermogen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: '19.13'
    text: |-
      In afwijking van het eerste lid, onderdeel e, blijft het recht op uitkering bestaan ten aanzien van de werknemer
      die buiten Nederland verblijf houdt anders dan wegens vakantie, indien hij gedurende dat verblijf meewerkt aan
      activiteiten die bevorderlijk zijn voor zijn inschakeling in de arbeid als bedoeld in de [hoofdstukken VI][ref1] en
      [XA][ref2], mits:


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukVI
      [ref2]: https://wetten.overheid.nl/BWBR0004045#HoofdstukXA
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: VI
      - id: ref2
        bwb_id: BWBR0004045
        hoofdstuk: XA
  - number: 19.13.a
    text: die activiteiten niet langer duren dan zes maanden;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.13.b
    text: |-
      die activiteiten blijkens een intentieverklaring een reëel uitzicht bieden op een aansluitende dienstbetrekking
      voor ten minste zes maanden; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: 19.13.c
    text: |-
      die activiteiten plaatsvinden in een lidstaat van de Europese Unie, in een andere staat die partij is bij de
      Overeenkomst betreffende de Europese Economische Ruimte of in Zwitserland.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
  - number: '19.14'
    text: |-
      Voor de toepassing van dit artikel wordt onder intentieverklaring verstaan: een ondertekende verklaring waarin de
      ondertekenaar aangeeft dat hij het voornemen heeft om een werknemer die meewerkt aan activiteiten die bevorderlijk
      zijn voor zijn inschakeling in de arbeid als bedoeld in de [hoofdstukken VI][ref1] en [XA][ref2], na afloop van die
      activiteiten in dienst te nemen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukVI
      [ref2]: https://wetten.overheid.nl/BWBR0004045#HoofdstukXA
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: VI
      - id: ref2
        bwb_id: BWBR0004045
        hoofdstuk: XA
  - number: '20.1'
    text: 'Het recht op uitkering eindigt:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel20
  - number: 20.1.a
    text: |-
      met ingang van de dag waarop de werknemer geen recht op uitkering meer heeft op grond van [artikel 19][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel20
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: 20.1.b
    text: met ingang van de dag waarop de voor de werknemer geldende uitkeringsduur is verstreken;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel20
  - number: 20.1.c
    text: |-
      met ingang van de eerste dag van de kalendermaand waarin de werknemer niet meer werkloos
      is omdat hij inkomen geniet dat, na vermenigvuldiging met de factor C / D, bedoeld
      in[ artikel 47, eerste lid, onderdelen a en b][ref1], meer dan 87,5% van het maandloon bedraagt;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel47
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel20
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '47'
        hoofdstuk: II
        paragraaf: '5'
  - number: 20.1.d
    text: |-
      met ingang van de eerste dag van de kalendermaand waarin de werknemer, die weer arbeid verricht en die daardoor
      minder dan vijf uur arbeidsurenverlies als bedoeld in [artikel 16, eerste lid, onderdeel a][ref1], heeft, een
      aanvraag tot eindiging van het recht op WW-uitkering heeft ingediend.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel20
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
  - number: '21.1'
    text: |-
      Indien het recht op uitkering op grond van [artikel 20, eerste lid, onderdeel a of c][ref1], is geëindigd en
      vervolgens de omstandigheid die tot dat eindigen heeft geleid heeft opgehouden te bestaan, herleeft het recht op
      uitkering met inachtneming van het tweede lid, de in [artikel 8][ref2] en het derde lid genoemde termijnen, het
      vierde lid en de op grond van het vijfde lid gestelde regels. Indien laatstelijk het recht op uitkering op grond
      van artikel 20, eerste lid, onderdeel d, is geëindigd, herleeft het recht op uitkering met ingang van de eerste
      dag van de kalendermaand waarin de werknemer een aanvraag tot herleving van het recht op WW-uitkering indient met
      inachtneming van het tweede lid en de in het derde lid genoemde termijnen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '8'
        hoofdstuk: I
        paragraaf: '2'
  - number: '21.2'
    text: 'Het recht herleeft niet indien:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
  - number: 21.2.a
    text: |-
      een nieuw recht op uitkering ingevolge dit hoofdstuk ontstaat, waarvan het maandloon meer dan 87,5% bedraagt van
      het maandloon van de eerdere uitkering; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
  - number: 21.2.b
    text: |-
      een recht op uitkering op grond van de [Wet werk en inkomen naar arbeidsvermogen][ref1] ontstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: '21.3'
    text: 'Een recht op uitkering dat is geëindigd:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
  - number: 21.3.a
    text: |-
      wegens een omstandigheid als bedoeld in [artikel 19, eerste lid, onderdeel e, g, h, k of n][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: 21.3.b
    text: |-
      op grond van [artikel 20, eerste lid, onderdeel c][ref1], als gevolg van het minder beschikbaar zijn voor arbeid
      dan zijn gemiddeld aantal arbeidsuren, bedoeld in [artikel 16, tweede lid][ref2], wegens andere omstandigheden dan
      ziekte of arbeidsongeschiktheid of het volgen van scholing of opleiding, terzake waarvan de werknemer een uitkering
      ontvangt als bedoeld in [artikel 19, eerste lid, onderdelen a, b, c of d][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel19
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
  - number: 21.3.c
    text: |-
      op grond van [artikel 20, eerste lid, onderdeel d][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
  - number: 21.3.d
    text: wegens een combinatie van de hier bedoelde omstandigheden;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
  - number: '21.4'
    text: |-
      Een recht op uitkering dat is geëindigd op grond van [artikel 20, eerste lid, onderdeel c][ref1], doordat
      inkomen wordt genoten dat uitsluitend in verband met het verrichten van werkzaamheden als bedoeld in
      [artikel 8, vierde lid][ref2], meer bedraagt dan 87,5% van het maandloon kan slechts herleven, indien de periode
      tussen de eindiging van het recht en het vervallen van de omstandigheid als hier bedoeld niet langer is dan de
      resterende uitkeringsduur bij de eindiging van het recht.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '8'
        hoofdstuk: I
        paragraaf: '2'
  - number: '21.5'
    text: |-
      Bij ministeriële regeling kan worden geregeld dat het derde lid buiten toepassing blijft voor categorieën van
      werknemers.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
  - number: '21.6'
    text: |-
      Indien het recht op uitkering op grond van [artikel 20, eerste lid, onderdeel a][ref1], juncto
      [artikel 19, eerste lid, onderdeel a][ref2], is geëindigd en vervolgens op grond van het eerste lid herleeft, is
      [artikel 16, zesde lid][ref3], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel19
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '19'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
  - number: '22.1'
    text: Het UWV stelt op aanvraag vast of recht op uitkering bestaat.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22
  - number: '22.2'
    text: |-
      Een uitkering als bedoeld in [artikel 18][ref1] en een uitkering die verband houdt met een verleende ontheffing op
      grond van [artikel 8, derde lid, van het Buitengewoon Besluit Arbeidsverhoudingen 1945][ref2] worden betaald zonder
      dat dit bij beschikking is vastgesteld, indien redelijkerwijs mag worden aangenomen dat aan een beschikking geen
      behoefte bestaat.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0002014#Artikel8
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0002014
        artikel: '8'
  - number: '22.3'
    text: |-
      Een uitkering als bedoeld in het tweede lid wordt beëindigd zonder dat dit bij beschikking is vastgesteld, indien
      redelijkerwijs mag worden aangenomen dat aan een beschikking geen behoefte bestaat. Indien de belanghebbende binnen
      een redelijke termijn om een beschikking verzoekt, dan wordt deze zo spoedig mogelijk alsnog verstrekt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22
  - number: '22.4'
    text: Het UWV betaalt de uitkering, bedoeld in het tweede lid, binnen zes weken na indiening van de aanvraag.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22
  - number: 22a.1
    text: |-
      Onverminderd het elders in deze wet bepaalde terzake van herziening of intrekking van een besluit tot toekenning
      van uitkering en terzake van weigering van uitkering, herziet het UWV een dergelijk besluit of trekt het dat in:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22a
  - number: 22a.1.a
    text: |-
      indien het niet of niet behoorlijk nakomen van een verplichting op grond van [artikel 24][ref1], [25][ref2] of
      [26][ref3] heeft geleid tot het ten onrechte of tot een te hoog bedrag verlenen van uitkering;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel24
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel26
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '26'
        hoofdstuk: II
        paragraaf: '2'
  - number: 22a.1.b
    text: indien anderszins de uitkering ten onrechte of tot een te hoog bedrag is verleend;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22a
  - number: 22a.1.c
    text: |-
      indien het niet of niet behoorlijk nakomen van de verplichting bedoeld in [artikel 25][ref1] ertoe leidt dat niet
      kan worden vastgesteld of nog recht op uitkering bestaat.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: 22a.2
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn kan het UWV besluiten geheel of gedeeltelijk van herziening of
      intrekking af te zien.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel22a
  - number: '23.1'
    text: |-
      De intrekking of verlaging van een uitkering, die voortvloeit uit het door de werkgever ingesteld bezwaar of
      beroep, vindt niet eerder plaats dan de dag volgend op die waarop de beslissing op bezwaar is bekendgemaakt of de
      uitspraak is gedaan. De eerste zin is van overeenkomstige toepassing in geval van intrekking van het bezwaar of
      beroep omdat het UWV geheel of gedeeltelijk is tegemoet gekomen aan het bezwaar of beroep van de werkgever.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel23
  - number: '23.2'
    text: |-
      Het eerste lid geldt niet, indien de uitkering door eigen schuld of toedoen van de werknemer ten onrechte of tot
      een te hoog bedrag is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel23
  - number: '24.1'
    text: 'De werknemer voorkomt dat hij:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.1.a
    text: verwijtbaar werkloos wordt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.1.b
    text: 'werkloos is of blijft, doordat hij:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.1.b.1°
    text: in onvoldoende mate tracht passende arbeid te verkrijgen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.1.b.2°
    text: nalaat aangeboden passende arbeid te aanvaarden of door eigen toedoen geen passende arbeid verkrijgt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.1.b.3°
    text: door eigen toedoen geen passende arbeid behoudt; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.1.b.4°
    text: |-
      in verband met door hem te verrichten arbeid eisen stelt die het aanvaarden of verkrijgen van passende arbeid
      belemmeren.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: '24.2'
    text: 'De werknemer is verwijtbaar werkloos geworden indien:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: 24.2.a
    text: |-
      aan de werkloosheid een dringende reden ten grondslag ligt in de zin van
      [artikel 678 van Boek 7 van het Burgerlijk Wetboek][ref1] en de werknemer terzake een verwijt kan worden gemaakt;


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel678
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '678'
  - number: 24.2.b
    text: |-
      de dienstbetrekking is beëindigd door of op verzoek van de werknemer zonder dat aan de voortzetting ervan zodanige
      bezwaren waren verbonden, dat deze voortzetting redelijkerwijs niet van hem kon worden gevergd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: '24.3'
    text: |-
      Onder passende arbeid als bedoeld in het eerste lid wordt, in de periode voordat zes maanden waarin een recht op
      uitkering bestaat op grond van deze wet zijn verstreken, verstaan arbeid die aansluit bij de arbeid waaruit de
      werknemer werkloos is geworden. Na deze periode van zes maanden is alle arbeid die voor de krachten en bekwaamheden
      van de werknemer is berekend, passend, tenzij aanvaarding om redenen van lichamelijke, geestelijke of sociale
      aard niet van hem kan worden gevergd. Niet als passend wordt beschouwd arbeid op grond van een dienstbetrekking
      als bedoeld in [hoofdstuk 2][ref1] of [3 van de Wet sociale werkvoorziening][ref2] of arbeid op grond waarvan
      men niet als werknemer in de zin van deze wet wordt aangemerkt. Bij of krachtens algemene maatregel van bestuur
      worden nadere regels gesteld omtrent het begrip passende arbeid, waarbij tevens wordt bepaald op welke wijze
      wordt vastgesteld of arbeid aansluit bij de arbeid waaruit de werknemer werkloos is geworden, alsmede in welke
      gevallen een periode waarin recht op ziekengeld op grond van de [Ziektewet][ref3] bestaat, wordt meegeteld bij de
      vaststelling van de periode, bedoeld in de eerste zin.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
      [ref3]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0001888
  - number: '24.4'
    text: |-
      In afwijking van het derde lid, is alle arbeid direct passend, indien de werknemer na 104 weken ziekte, op grond
      van [artikel 5 van de Wet werk en inkomen naar arbeidsvermogen][ref1] geen uitkering ontvangt en als gevolg
      hiervan een uitkering op grond van deze wet ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel5
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '5'
  - number: '24.5'
    text: |-
      De werknemer is verplicht zich zodanig te gedragen dat hij door zijn doen en laten het Algemeen Werkloosheidsfonds
      of het Uitvoeringsfonds voor de overheid niet benadeelt of zou kunnen benadelen. Onder benadeling in de zin van dit
      artikel is niet begrepen een gedraging als bedoeld in [artikel 25][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '25'
        hoofdstuk: II
        paragraaf: '2'
  - number: '24.6'
    text: |-
      Het niet voeren van verweer door de werknemer tegen of het instemmen van de werknemer met een beëindiging van de
      dienstbetrekking door of op verzoek van de werkgever leidt niet tot overtreding van de verplichtingen, bedoeld in
      het eerste lid, aanhef en onderdeel a, of het vijfde lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: '24.7'
    text: |-
      Het tweede en zesde lid zijn van overeenkomstige toepassing met betrekking tot het eerste lid, onderdeel b, onder
      3°, waarbij voor de overeenkomstige toepassing van het tweede lid, onderdeel b, voor «de dienstbetrekking is
      beëindigd» mede wordt gelezen: de arbeid is beëindigd of niet voortgezet.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: '24.8'
    text: |-
      Onze Minister is bevoegd regels te stellen waarbij bepaalde groepen werknemers worden vrijgesteld van
      verplichtingen, hun op grond van het eerste lid, onderdeel b, onder 1°, 2° en 4°, opgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: '24.9'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld op grond waarvan aan werknemers in
      individuele gevallen tijdelijk ontheffing kan worden verleend van verplichtingen, hun op grond van het eerste lid,
      onderdeel b, onder 1°, 2° of 4°, opgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
  - number: '24.10'
    text: |-
      In afwijking van het zesde en zevende lid, is sprake van benadeling als bedoeld
      in het vijfde lid indien de werknemer tijdens het verlengde tijdvak, bedoeld in
      [artikel 25, negende lid, van de Wet werk en inkomen naar arbeidsvermogen][ref1], zonder deugdelijke grond heeft
      nagelaten verweer te voeren tegen of heeft ingestemd met een beëindiging van de dienstbetrekking.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
  - number: '25.1'
    text: |-
      De werknemer is verplicht aan het UWV op zijn verzoek of onverwijld uit eigen beweging alle feiten en
      omstandigheden mede te delen, waarvan hem redelijkerwijs duidelijk moet zijn dat zij van invloed kunnen zijn op
      het recht op uitkering, het geldend maken van het recht op uitkering, de hoogte of de duur van de uitkering, of
      op het bedrag van de uitkering dat aan de werknemer wordt betaald. Deze verplichting geldt niet, voor zover een
      recht op uitkering niet geldend kan worden gemaakt als gevolg van een blijvend gehele weigering. Deze verplichting
      geldt evenmin indien die feiten en omstandigheden door het UWV kunnen worden vastgesteld op grond van bij wettelijk
      voorschrift als authentiek aangemerkte gegevens of kunnen worden verkregen uit bij ministeriële regeling aan te
      wijzen administraties. Bij ministeriële regeling wordt bepaald voor welke gegevens de derde zin van toepassing is.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel25
  - number: '25.2'
    text: |-
      Het eerste lid is van overeenkomstige toepassing op de werkgever van de in [artikel 18, eerste lid][ref1], bedoelde
      werknemer indien de betaling van de uitkering, bedoeld in artikel 18, eerste lid, geschiedt door zijn tussenkomst.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
  - number: '26.1'
    text: 'De werknemer is verplicht:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.a
    text: |-
      zich te onthouden van zeer ernstige misdragingen jegens de met de uitvoering van deze wet belaste personen en
      instanties tijdens het verrichten van hun werkzaamheden;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.b
    text: binnen één week na het intreden van zijn werkloosheid bij het UWV een aanvraag om een uitkering in te dienen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.c
    text: de voorschriften op te volgen die het UWV ten behoeve van een doelmatige controle stelt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.d
    text: |-
      zich als werkzoekende bij het UWV te laten registreren en die registratie
      tijdig te doen verlengen, indien hem daartoe het recht toekomt op grond van
      [artikel 30b, derde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30b
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30b
  - number: 26.1.e
    text: mee te werken aan de activiteiten die bevorderlijk zijn voor zijn inschakeling in de arbeid;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.f
    text: |-
      mee te werken aan een scholing of opleiding die noodzakelijk wordt geacht voor zijn
      inschakeling in de arbeid, beschikbaar te zijn voor de voorzieningen, bedoeld in
      [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] en mee te werken aan het verkrijgen van die
      voorzieningen;


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
  - number: 26.1.g
    text: |-
      mee te werken aan een voor hem gewenst onderzoek naar zijn arbeidsgeschiktheid door een arts, een psycholoog of een
      beroepskeuze-adviseur;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.h
    text: |-
      te voldoen aan de andere voorwaarden die het UWV op grond van [artikel 101, tweede lid][ref1], stelt;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel101
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '101'
        hoofdstuk: VIII
  - number: 26.1.i
    text: |-
      de hem op grond van [hoofdstuk VI][ref1] opgelegde verplichtingen na te komen; en


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukVI
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: VI
  - number: 26.1.j
    text: |-
      de voorschriften op te volgen die het UWV stelt in verband met het genieten van vakantie tijdens de duur van de
      uitkering;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26.1.k
    text: |-
      mee te werken aan het opstellen van de re-integratievisie, bedoeld in
      [artikel 30a, vierde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1], en het re-
      integratieplan, bedoeld in [artikel 30a, zesde lid, van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
      [ref2]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
      - id: ref2
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 26.1.l
    text: |-
      te voldoen aan de verplichtingen die zijn opgenomen in de re-integratievisie, bedoeld in
      [artikel 30a, vierde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1], en het re-
      integratieplan, bedoeld in [artikel 30a, zesde lid, van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
      [ref2]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
      - id: ref2
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 26.1.m
    text: |-
      bij deelname aan een re-integratietraject de reden van het niet naleven van zijn re-integratieverplichtingen
      onmiddellijk aan het re-integratiebedrijf mee te delen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: '26.2'
    text: |-
      Het UWV is bevoegd regels te stellen met betrekking tot het tijdstip van registratie, bedoeld in het eerste lid,
      onderdeel d.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: '26.3'
    text: |-
      Onze Minister is bevoegd regels te stellen waarbij bepaalde groepen werknemers worden vrijgesteld van
      verplichtingen, hun op grond van het eerste lid, onderdelen d, f of g, opgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: '26.4'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld op grond waarvan aan werknemers in
      individuele gevallen tijdelijk ontheffing kan worden verleend van verplichtingen, hun op grond van het eerste lid,
      onderdelen d, f of g, opgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26
  - number: 26a
    text: |-
      [Artikel 24, eerste lid, onderdeel b][ref1], is niet van toepassing op de geïndiceerde, bedoeld in artikel 1,
      eerste lid, van de Wet sociale werkvoorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel26a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
  - number: '27.1'
    text: |-
      Het UWV brengt een bedrag blijvend op de uitkering in mindering indien de werknemer een verplichting als bedoeld in
      [artikel 24, eerste lid, onderdeel a, of onderdeel b, onder 3°][ref1], niet is nagekomen, tenzij het niet nakomen
      van de verplichting de werknemer niet in overwegende mate kan worden verweten. In dat geval brengt het UWV de helft
      van het bedrag, bedoeld in de eerste zin, in mindering over ten hoogste een periode van 26 weken.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
  - number: '27.2'
    text: |-
      Het UWV brengt een bedrag blijvend op de uitkering in mindering indien de werknemer een verplichting als bedoeld in
      [artikel 24, eerste lid, onderdeel b, onder 2°][ref1], niet is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
  - number: '27.3'
    text: |-
      Het UWV weigert de uitkering tijdelijk of blijvend, geheel of gedeeltelijk ter zake van het
      niet of niet behoorlijk nakomen door de werknemer van een verplichting als bedoeld in de
      [artikelen 24, eerste lid, onderdeel b, onder 1° of 4°, of vijfde lid][ref1], of [26][ref2],
      [artikel 55, tweede lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref3] of
      [artikel 28, tweede lid, van de Wet werk en inkomen naar arbeidsvermogen][ref4], dan wel ter zake van het niet
      binnen de door het UWV daarvoor vastgestelde termijn nakomen door de werknemer van een verplichting als bedoeld
      in [artikel 25][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel24
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel26
      [ref3]: https://wetten.overheid.nl/BWBR0013060#Artikel55
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref5]: https://wetten.overheid.nl/BWBR0013060#Artikel25

  - number: 130p
    text: |-
      Voor de toepassing van [artikel 42b][ref1] wordt bij de bepaling van de duur van een nieuw recht op uitkering
      met betrekking tot de persoon wiens eerdere recht is ontstaan voor 1 oktober 2006 voor «de duur van de verlengde
      uitkering, bedoeld in [artikel 42, tweede lid][ref2], van het eerdere recht voor zover de werknemer hierover geen
      uitkering heeft ontvangen als gevolg van de eindiging van dat eerdere recht» gelezen: de resterende duur van het
      eerdere recht voor zover de werknemer hierover geen uitkering heeft ontvangen als gevolg van de eindiging van dat
      eerdere recht, verminderd met drie maanden.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel42b
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel42

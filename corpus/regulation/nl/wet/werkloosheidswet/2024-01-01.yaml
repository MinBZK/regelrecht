  - number: '132'
    text: |-
      Een gedraging die in strijd is met een op grond van deze wet uitgevaardigde algemene maatregel van bestuur, voor
      zover uitdrukkelijk als strafbaar feit in de zin van dit artikel aangeduid, wordt gestraft met hechtenis van ten
      hoogste een maand of geldboete van de tweede categorie.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel132
  - number: '135'
    text: |-

  - number: 130x
    text: |-
      [Artikel 16, derde lid][ref1], zoals dat artikel luidde voor de inwerkingtreding van artikel I, onderdeel C, van de
      Wet vereenvoudiging regelingen UWV blijft van toepassing op de werknemer, van wie de dienstbetrekking is geëindigd
      door ontbinding op verzoek van de werkgever en de datum van het verzoek tot ontbinding is gelegen voor de dag van
      inwerkingtreding van dit artikel van die wet.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130x

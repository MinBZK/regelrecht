  - number: 130dd.1
    text: |-
      Deze wet en de daarop berustende bepalingen zoals deze luidden op de dag voor de datum waarop
      [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref1] in werking is getreden, blijven van toepassing op
      een uitkering ontstaan voor inwerkingtreding van artikel XXVI, onderdeel C, van de Wet werk en zekerheid indien de
      werkloosheid is ingetreden in verband met het verlenen van een ontheffing van het verbod de werktijd te verkorten
      krachtens [artikel 8, derde lid, van het Buitengewoon Besluit Arbeidsverhoudingen 1945][ref2] en als gevolg daarvan
      een uitkering wordt ontvangen op grond van [hoofdstuk II][ref3] van deze wet.



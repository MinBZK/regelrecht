  - number: 1a.1
    text: 'Onder arbeidsuur wordt in deze wet verstaan:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1a.1.a
    text: uur waarover een werknemer inkomen uit arbeid heeft ontvangen; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1a.1.b
    text: uur waarover een werknemer recht heeft op inkomen uit arbeid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1a.2
    text: 'Bij ministeriële regeling kunnen regels worden gesteld waarbij:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1a.2.a
    text: uren worden gelijkgesteld met een arbeidsuur als bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1a.2.b
    text: arbeidsuren als bedoeld in het eerste lid niet als arbeidsuren worden aangemerkt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1a.2.c
    text: |-
      vastgesteld wordt welke in het kader van een dienstbetrekking ontvangen bedragen in aanmerking komen voor
      omrekening naar arbeidsuren en hoeveel arbeidsuren deze bedragen vertegenwoordigen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1a
  - number: 1b.1
    text: |-
      Voor de berekening van de hoogte van de uitkering waarop op grond van deze wet recht bestaat wordt als dagloon
      beschouwd 1/261 deel van het loon dat de werknemer in de periode van één jaar, die eindigt op de laatste dag
      van het tweede aangiftetijdvak voorafgaande aan het aangiftetijdvak waarin het arbeidsurenverlies, bedoeld in
      [artikel 16, eerste lid, onderdeel a][ref1], is ingetreden, verdiende, doch ten hoogste het bedrag, bedoeld in
      [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref2], met betrekking tot een loontijdvak
      van een dag.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '17'
  - number: 1b.2
    text: 'Het maandloon in een kalendermaand bedraagt:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.2.a
    text: indien de werknemer over de volledige kalendermaand recht op een uitkering heeft gehad 21,75 maal het dagloon;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.2.b
    text: |-
      indien de werknemer niet over de volledige kalendermaand recht op een uitkering heeft gehad het aantal werkdagen in
      die kalendermaand waarop recht op uitkering heeft bestaan, vermenigvuldigd met het dagloon. Bij het bepalen van het
      aantal werkdagen wordt een kalenderweek geacht vijf werkdagen te hebben; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.3
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld met betrekking tot het aanmerken van kalendermaanden
      als volledige kalendermaanden als bedoeld in het tweede lid, onderdeel a, en met betrekking tot het aanmerken van
      dagen als werkdagen als bedoeld in het tweede lid, onderdeel b.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.4
    text: 'Het inkomen in een kalendermaand bedraagt:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.4.a
    text: |-
      indien de werknemer over de volledige kalendermaand recht op een uitkering heeft gehad: het inkomen over de eerste
      tot en met de laatste dag van de kalendermaand; of
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.4.b
    text: |-
      indien de werknemer niet over de volledige kalendermaand recht op een uitkering heeft gehad: het inkomen over de
      dagen in die kalendermaand waarop het recht op uitkering heeft bestaan.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
  - number: 1b.5
    text: |-
      Indien de werknemer de hoedanigheid van werknemer, bedoeld in [artikel 8, eerste lid][ref1], verliest of heeft
      verloren, anders dan door het verrichten van werkzaamheden als bedoeld in artikel 8, vierde lid, dan wel indien
      de werknemer in een kalenderweek minder beschikbaar voor arbeid is dan zijn gemiddeld aantal arbeidsuren per
      kalenderweek, bedoeld in [artikel 16, tweede lid][ref2], wordt onder zijn inkomen in een kalendermaand tevens
      verstaan: '(A + B) x C / D. Hierbij staat: A voor het aantal uren in een kalendermaand waarover de werknemer'
      de hoedanigheid van werknemer verliest of heeft verloren als bedoeld in [artikel 8][ref3], voor zover het uren
      betreft op dagen waarop recht op uitkering bestaat; B voor het aantal arbeidsuren in een kalendermaand dat de
      werknemer minder beschikbaar is voor arbeid wegens andere omstandigheden dan ziekte, arbeidsongeschiktheid of
      omdat hij deelneemt dan wel gaat deelnemen aan een naar het oordeel van het UWV noodzakelijke opleiding of scholing
      als bedoeld in [artikel 76][ref4]; C voor het dagloon waarnaar de uitkering zou zijn berekend indien dat niet
      gemaximeerd zou zijn op het in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref5]
      bedoelde bedrag, dan wel voor de uitkering, bedoeld in [artikel 64, eerste lid, onderdeel b][ref6], zonder de
      maximering, bedoeld in artikel 64, vierde en zevende lid, gedeeld door 21,75 als de uitkering betrekking heeft
      op een periode die aanvangt op de eerste dag en eindigt op de laatste dag van een kalendermaand, dan wel gedeeld
      door het aantal dagen, bedoeld in artikel 64, zevende lid; en D voor het gemiddeld aantal arbeidsuren, bedoeld in
      [artikel 16, tweede en zesde lid][ref7], gedeeld door 5.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel76
      [ref5]: https://wetten.overheid.nl/BWBR0017747#Artikel17
      [ref6]: https://wetten.overheid.nl/BWBR0004045#Artikel64
      [ref7]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel1b
    references:

  - number: 130l.3
    text: |-
      De [artikelen 72][ref1] en [72a][ref2], zoals die luidden op de dag voor inwerkingtreding van de wet van 16 juli
      2005, houdende wijziging van de Werkloosheidswet in verband met het preventief inzetten van reïntegratie-
      instrumenten, het opdragen van de reïntegratietaak aan overheidswerkgevers, het ondersteunen van WAO-
      herbeoordeelden bij scholing, het subsidiëren van scholing in het kader van de WAJONG en enkele andere wijzigingen
      in wetten die de reïntegratie-instrumenten betreffen (Stb. 382), blijven van toepassing op de persoon, die recht
      heeft op uitkering op grond van hoofdstuk IIa of IIb en van wie de eerste werkloosheidsdag is gelegen voor 1 juli
      2005.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel72
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel72a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130l

  - number: 130ee
    text: |-
      [Artikel 42b, eerste lid][ref1], vindt geen toepassing voor zover het eerdere recht was geëindigd op grond
      van [artikel 20, eerste lid, onderdelen a, b, c en d][ref2], zoals dat luidde op de dag voor de datum waarop
      [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref3] in werking is getreden en op grond van artikel 21,
      zoals dat luidde op de dag voor die inwerkingtreding, geen herleving zou plaatsvinden wegens het overschrijden van
      de in laatstgenoemd artikel bedoelde termijnen.



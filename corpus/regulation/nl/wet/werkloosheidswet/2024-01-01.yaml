  - number: 130z.1
    text: |-
      [Hoofdstuk II][ref1] en de daarop berustende bepalingen zoals deze luidden op de dag voor de datum waarop
      [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref2] in werking is getreden, blijven van toepassing op
      een recht op uitkering waarvan de eerste werkloosheidsdag is gelegen voor de dag van die inwerkingtreding.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0035254#ArtikelXXVI
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130z
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0035254
        artikel: XXVI
  - number: 130z.2
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat een recht op uitkering op
      grond van [hoofdstuk II][ref1] zoals dat hoofdstuk luidde op de dag voor de datum waarop
      [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref2] in werking is getreden, in afwijking van het
      eerste lid, door het UWV wordt omgezet in een recht op uitkering op grond van deze wet, zoals die luidt op het
      tijdstip van inwerkingtreding van de hiervoor bedoelde algemene maatregel van bestuur, met dien verstande dat de
      duur van de uitkering door omzetting niet wordt verkort en de omzetting niet eerder geschiedt dan een half jaar na
      inwerkingtreding van dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0035254#ArtikelXXVI
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130z
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0035254
        artikel: XXVI
  - number: 130z.3
    text: |-
      In de algemene maatregel van bestuur, bedoeld in het tweede lid, wordt bepaald op welke wijze het dagloon wordt
      berekend bij de omzetting, bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130z
  - number: 130aa.1
    text: |-
      In afwijking van [artikel 130z][ref1] wordt indien een recht op uitkering op grond van [hoofdstuk II][ref2], zoals
      dat hoofdstuk luidde op de dag voor de datum waarop [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref3]
      in werking is getreden, bestaat of na die inwerkingtreding herleeft en er bestaat of ontstaat een recht op
      uitkering op grond van deze wet zoals deze luidt na die inwerkingtreding, het eerstgenoemde recht door het
      UWV omgezet in een recht op uitkering op grond van deze wet zoals deze luidt na die inwerkingtreding, met dien
      verstande dat de duur van de uitkering door omzetting niet wordt verkort en na omzetting [artikel 24][ref4] van
      deze wet en de daarop berustende bepalingen van toepassing blijven zoals deze luidden voor de inwerkingtreding van
      [artikel XXVI, onderdeel H, van de Wet werk en zekerheid][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel130z
      [ref2]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref3]: https://wetten.overheid.nl/BWBR0035254#ArtikelXXVI
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel24
      [ref5]: https://wetten.overheid.nl/BWBR0035254#ArtikelXXVI
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130aa
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: 130z
        hoofdstuk: XB
      - id: ref2
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref3
        bwb_id: BWBR0035254
        artikel: XXVI
      - id: ref4
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref5
        bwb_id: BWBR0035254
        artikel: XXVI
  - number: 130aa.2
    text: |-
      Bij algemene maatregel van bestuur worden nadere regels gesteld omtrent de omzetting, bedoeld in het eerste lid,
      waarbij wordt bepaald op welke wijze het dagloon wordt berekend bij die omzetting.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130aa
  - number: 130bb.1
    text: |-
      Deze wet en de daarop berustende bepalingen zoals deze luidden op de dag voor de datum waarop
      [artikel XXVI, onderdeel S, van de Wet werk en zekerheid][ref1] inwerking is getreden, blijven van toepassing op
      een recht op uitkering op grond van [artikel 18][ref2] dat is ontstaan voor de inwerkingtreding van artikel XXVI,
      onderdeel C, van de Wet werk en zekerheid.



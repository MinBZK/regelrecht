        paragraaf: '5'
  - number: '68.2'
    text: |-
      Voor zover bij of krachtens dit hoofdstuk niet anders is bepaald zijn de overige artikelen van deze wet en de
      daarop berustende bepalingen, voor zoveel nodig, van overeenkomstige toepassing op het recht op uitkering, het
      geldend maken van het recht op uitkering en de betaling van de uitkering op grond van dit hoofdstuk.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel68
  - number: 72a
    text: 'De overheidswerkgever heeft tot taak de inschakeling in de arbeid te bevorderen van:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel72a
  - number: 72a.a
    text: |-
      een persoon die uit hoofde van een dienstbetrekking als overheidswerknemer met die overheidswerkgever recht heeft
      op uitkering op grond van [hoofdstuk II][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel72a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
  - number: 72a.b
    text: |-
      een overheidswerknemer die kan aantonen dat de dienstbetrekking binnen vier maanden zal eindigen en van wie naar
      het oordeel van het UWV redelijkerwijs valt aan te nemen dat hij recht zal hebben op een uitkering op grond van
      [hoofdstuk II][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel72a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
  - number: '73'
    text: |-
      De werknemer die recht heeft op een uitkering op grond van deze wet heeft recht op ondersteuning bij
      arbeidsinschakeling.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel73
  - number: '75'
    text: |-
      Onze Minister is bevoegd regels te stellen op grond waarvan, in bij die regels aan te geven gevallen en met
      inachtneming van bij die regels te stellen beperkingen, de werknemer bevoegd is deel te nemen aan een opleiding of
      scholing in dagonderwijs.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel75
  - number: '76.1'
    text: |-
      Indien de werknemer die recht heeft op een uitkering op grond van [hoofdstuk II][ref1], deelneemt of gaat deelnemen
      aan een voor hem, naar het oordeel van het UWV, noodzakelijke opleiding of scholing, blijft volgens door Onze
      Minister te stellen regels het recht op uitkering op grond van dat hoofdstuk bestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
  - number: '76.2'
    text: |-
      In de door Onze Minister te stellen regels, die voor verschillende groepen werknemers verschillend kunnen luiden,
      worden in ieder geval voorschriften en beperkingen gegeven met betrekking tot de aard, de omvang en de duur van de
      opleiding of scholing.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76
  - number: 76a.1
    text: |-
      Het UWV kan toestemming verlenen aan de werknemer, die recht heeft op een uitkering op grond van
      [hoofdstuk II][ref1], om op een proefplaats bij een werkgever gedurende maximaal zes maanden onbeloonde
      werkzaamheden te verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
  - number: 76a.2
    text: |-
      Voor de werknemer, bedoeld in het eerste lid, blijft het recht op uitkering op grond van [hoofdstuk II][ref1]
      bestaan, onverminderd [artikel 20, eerste lid, aanhef en onderdeel b][ref2], gedurende de periode waarover
      toestemming is verleend tot het verrichten van die werkzaamheden.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel20
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
  - number: 76a.3
    text: 'De onbeloonde werkzaamheden op een proefplaats zijn:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 76a.3.a
    text: werkzaamheden, waartoe de werknemer met zijn krachten en bekwaamheden in staat is;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 76a.3.b
    text: |-
      werkzaamheden, waarbij de werkgever, bij wie de proefplaatsing geschiedt, een aansprakelijkheidsverzekering ten
      behoeve van de werknemer heeft afgesloten;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 76a.3.c
    text: |-
      werkzaamheden, die de werknemer niet reeds eerder onbeloond op een proefplaats bij die werkgever of diens
      rechtsvoorganger heeft verricht; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 76a.3.d
    text: |-
      werkzaamheden, waarbij er, naar het oordeel van het UWV, een reëel uitzicht is op een op de onbeloonde
      werkzaamheden aansluitende dienstbetrekking van dezelfde of grotere omvang voor ten minste 6 maanden.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 76a.4
    text: |-
      Indien de werkzaamheden, bedoeld in het eerste lid, wegens ziekte worden onderbroken, wordt de periode waarin een
      uitkering bij ziekte wordt ontvangen, voor de toepassing van dat lid buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 76a.5
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld omtrent de uitvoering van het eerste tot en met
      vierde lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel76a
  - number: 77a.1
    text: |-
      Het UWV kan een werknemer toestemming verlenen om gedurende 6 kalendermaanden werkzaamheden in de uitoefening van
      een bedrijf of in de zelfstandige uitoefening van een beroep te verrichten, indien:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
  - number: 77a.1.a
    text: aannemelijk is dat de werknemer in de toekomst met die werkzaamheden structureel in zijn bestaan kan voorzien;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
  - number: 77a.1.b
    text: de werkzaamheden nog geen aanvang hebben genomen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
  - number: 77a.1.c
    text: |-
      de werknemer recht heeft op uitkering op grond van [hoofdstuk II][ref1], anders dan op grond van
      [artikel 18][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel18
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '18'
        hoofdstuk: II
        paragraaf: '1'
  - number: 77a.1.d
    text: |-
      geen werkzaamheden verricht worden in opdracht, ten behoeve, of onder verantwoordelijkheid van de werkgever bij
      wie de werknemer, bedoeld in het eerste lid, onmiddellijk voorafgaande aan het intreden van zijn werkloosheid als
      werknemer arbeid heeft verricht;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
  - number: 77a.1.e
    text: deze toestemming tijdens de uitkeringsduur niet eerder aan de werknemer is verleend.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
  - number: 77a.2
    text: |-
      Voor de werknemer, bedoeld in het eerste lid, blijft, onverminderd
      [artikel 20, eerste lid, aanhef en onderdeel b][ref1], het recht op uitkering op grond van [hoofdstuk II][ref2]
      bestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '20'
        hoofdstuk: II
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        hoofdstuk: II
  - number: 77a.3
    text: |-
      De werknemer aan wie toestemming is verleend als bedoeld in het eerste lid wordt geacht werknemer te zijn en te
      blijven zolang die toestemming duurt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel77a
  - number: '78'
    text: |-
      De werknemer, ten aanzien van wie [artikel 75][ref1], [76][ref2], [76a][ref3], 77 of [77a][ref4] wordt toegepast,
      wordt geacht werkloos te zijn en te blijven zolang die toepassing duurt.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel75
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel76
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel76a
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel77a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel78
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '75'
        hoofdstuk: VI
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '76'
        hoofdstuk: VI
      - id: ref3
        bwb_id: BWBR0004045
        artikel: 76a
        hoofdstuk: VI
      - id: ref4
        bwb_id: BWBR0004045
        artikel: 77a
        hoofdstuk: VI
  - number: 78c
    text: |-
      Het UWV kan de werknemer, die recht heeft op een uitkering op grond van [hoofdstuk II][ref1], en voor wie
      de kans op inschakeling in het arbeidsproces gering is en die daardoor vooralsnog niet bemiddelbaar is
      op de arbeidsmarkt, onbeloonde additionele werkzaamheden laten verrichten gedurende maximaal twee jaar.
      [Artikel 10a, tweede tot en met tiende lid, van de Participatiewet][ref2] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel10a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel78c
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0015703
        artikel: 10a
  - number: '79.1'
    text: |-
      Het UWV verhaalt op de overheidswerkgever tot wie de dienstbetrekking bestond uit hoofde waarvan de
      overheidswerknemer de in onderdeel a bedoelde uitkering ontvangt:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: 79.1.a
    text: |-
      de op grond van [hoofdstuk II][ref1] te betalen uitkering aan die overheidswerknemer,
      met uitzondering van de premie verschuldigd over een uitkering, als bedoeld in
      [artikel 24, tweede lid, van de Wet financiering sociale verzekeringen][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '24'
  - number: 79.1.b
    text: |-
      de op grond van enige wet over de uitkering, bedoeld in onderdeel a, door het UWV verschuldigde premies en de
      inkomensafhankelijke bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref1], die niet op deze uitkering
      in mindering kunnen worden gebracht, met uitzondering van de premie verschuldigd over een uitkering, als bedoeld in
      [artikel 24, tweede lid, van de Wet financiering sociale verzekeringen][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel24
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '42'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '24'
  - number: '79.2'
    text: 'Voor de toepassing van het eerste lid wordt onder uitkering niet verstaan de uitkering aan een persoon:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: 79.2.a
    text: |-
      voor wie een beschikking geldt als bedoeld in
      [artikel 4a van de Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref1] waarin hij met betrekking tot de, in
      de in het eerste lid bedoelde dienstbetrekking, verrichte soort van werkzaamheden wordt aangemerkt als zelfstandige
      als bedoeld in [artikel 4 van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0008656#Artikel4a
      [ref2]: https://wetten.overheid.nl/BWBR0008656#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
    references:
      - id: ref1
        bwb_id: BWBR0008656
        artikel: 4a
      - id: ref2
        bwb_id: BWBR0008656
        artikel: '4'
  - number: 79.2.b
    text: |-
      waarvan het de overheidswerkgever niet redelijkerwijs duidelijk kon zijn dat deze tot hem in een privaatrechtelijke
      of publiekrechtelijke dienstbetrekking stond;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: 79.2.c
    text: |-
      welke op grond van deze wet wordt ontvangen in de eerste dertien weken van ongeschiktheid tot het verrichten van
      zijn arbeid wegens ziekte. Perioden van ongeschiktheid worden samengeteld indien zij elkaar met een onderbreking
      van minder dan vier weken opvolgen of indien zij direct voorafgaan aan en aansluiten op een periode waarin
      uitkering in verband met zwangerschap of bevalling op grond van [artikel 3:7, eerste lid][ref1], [3:8][ref2]
      of[ 3:10, eerste lid, van de Wet arbeid en zorg][ref3] wordt genoten, tenzij de ongeschiktheid redelijkerwijs niet
      geacht kan worden voort te vloeien uit dezelfde oorzaak.


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '3'
  - number: '79.3'
    text: |-
      Op het totaal van de bedragen die op de overheidswerkgever op grond van het eerste lid over enig tijdvak
      wordt verhaald, wordt in mindering gebracht hetgeen het UWV in dat tijdvak ontvangt door de toepassing van
      [artikel 36][ref1], onder aftrek van de daarop betrekking hebbende uitvoeringskosten, voorzover die toepassing
      betrekking heeft op uitkeringen en premies die eerder op grond van dat lid op de overheidswerkgever zijn verhaald.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel36
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '36'
        hoofdstuk: II
        paragraaf: '3'
  - number: '79.4'
    text: |-
      Indien hetgeen op grond van het derde lid in mindering wordt gebracht het totaal van de bedragen die op de
      overheidswerkgever over het betrokken tijdvak wordt verhaald overtreft, wordt dat meerdere door het UWV betaald aan
      de overheidswerkgever.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: '79.5'
    text: |-
      Indien de overheidswerkgever, bedoeld in het eerste lid, niet meer bestaat, wordt voor de toepassing van het eerste
      tot en met derde lid onder overheidswerkgever verstaan de rechtsopvolger van die overheidswerkgever. De eerste zin
      is niet van toepassing met betrekking tot de rechtsopvolger na faillissement.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: '79.6'
    text: Het UWV kan de in het eerste lid bedoelde bedragen invorderen bij dwangbevel.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: '79.7'
    text: Het UWV kan nadere regels stellen met betrekking tot het eerste tot en met derde lid en het vijfde lid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel79
  - number: '80.1'
    text: |-
      Een beschikking tot verhaal van uitkering, premies of vergoeding als bedoeld in [artikel 79, eerste lid][ref1],
      wordt niet meer gegeven indien meer dan vijf jaren sedert het einde van het kalenderjaar zijn verstreken, waarin
      zij zijn betaald of afgedragen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel79
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel80
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '79'
        hoofdstuk: VII
  - number: '80.2'
    text: |-
      Uitkering, premies of vergoeding, die niet zijn ingevorderd binnen tien jaren na het geven van de beschikking tot
      verhaal, worden niet meer ingevorderd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel80
  - number: '80.3'
    text: |-
      De rechtsvordering tot terugbetaling van een onverschuldigd betaald bedrag in verband met verhaal van uitkering,
      premies of vergoeding verjaart door verloop van vijf jaren sedert het einde van het kalenderjaar waarin de
      beschikking tot verhaal is gegeven.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel80
  - number: '81'
    text: |-
      De vordering van het UWV wegens verhaal als bedoeld in [artikel 79, eerste lid][ref1], is
      bevoorrecht op alle goederen van de werkgever en gaat boven alle andere voorrechten met
      uitzondering van die van de [artikelen 287][ref2] en [288 onder a][ref3], alsmede dat van
      [artikel 284 van Boek 3 van het Burgerlijk Wetboek][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel79
      [ref2]: https://wetten.overheid.nl/BWBR0005291#Artikel287
      [ref3]: https://wetten.overheid.nl/BWBR0005291#Artikel288
      [ref4]: https://wetten.overheid.nl/BWBR0005291#Artikel284
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel81
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '79'
        hoofdstuk: VII
      - id: ref2
        bwb_id: BWBR0005291
        artikel: '287'
      - id: ref3
        bwb_id: BWBR0005291
        artikel: '288'
      - id: ref4
        bwb_id: BWBR0005291
        artikel: '284'
  - number: '98'
    text: In de uitvoering van deze wet wordt voorzien door het UWV.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel98
  - number: '99'
    text: De werknemer is verzekerd bij het UWV.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel99
  - number: '101.1'
    text: Het UWV stelt een uitkeringsreglement werkloosheidsverzekeringen vast.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: '101.2'
    text: 'Onverminderd het elders in deze wet dienaangaande bepaalde, bevat het uitkeringsreglement bepalingen omtrent:'
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: 101.2.a
    text: voorschriften ten behoeve van een doelmatige controle, die ten aanzien van de werknemers moeten worden genomen;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: 101.2.b
    text: voorschriften met betrekking tot het genieten van vakantie tijdens de duur van de uitkering;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: 101.2.c
    text: |-
      voorschriften in verband met de betaling van de uitkering door tussenkomst van de werkgever, indien tijdens
      werkloosheid de dienstbetrekking voortduurt;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: 101.2.d
    text: andere voorwaarden, die aan het ontvangen van uitkering zijn verbonden;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: 101.2.e
    text: |-
      het betalen van een deel van de uitkering in de vorm van bijdragen aan sociale fondsen, waaronder begrepen bonnen,
      zegels en certificaten, die door het desbetreffende fonds worden uitgegeven of voorgeschreven; en
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: 101.2.f
    text: samenloop van uitkering en inkomsten uit of in verband met arbeid.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: '101.3'
    text: |-
      Het uitkeringsreglement mag geen bepalingen bevatten, welke strijdig zijn met deze wet en de daarop berustende
      bepalingen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel101
  - number: '111'
    text: |-
      Tussen Onze Minister en Onze Minister van Financiën dient overeenstemming te bestaan omtrent te stellen regels als
      bedoeld in [artikel 12][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel12
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel111
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '12'
        hoofdstuk: I
        paragraaf: '3'
  - number: '116.1'
    text: |-
      De door het UWV op grond van de [artikelen 26, tweede lid][ref1], [59][ref2] en [79, zevende lid][ref3], gestelde
      regels behoeven de goedkeuring van Onze Minister.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel26
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel59
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel79
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel116
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '26'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '59'
        hoofdstuk: III
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '79'
        hoofdstuk: VII
  - number: '116.2'
    text: |-
      Een door het UWV vastgesteld uitkeringsreglement werkloosheidsverzekeringen, bedoeld in
      [artikel 101, eerste lid][ref1], behoeft de goedkeuring van Onze Minister.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel101
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel116
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '101'
        hoofdstuk: VIII
  - number: '126'
    text: |-
      In afwijking van [artikel 1:2 van de Algemene wet bestuursrecht][ref1] is de werkgever geen belanghebbende bij een
      besluit van het UWV over het verzekerd zijn op grond van deze wet als bedoeld in [artikel 127a, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel127a
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel126
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: 127a
        hoofdstuk: X
  - number: 127a.1
    text: |-
      Een aanvraag tot het geven van een beschikking over het verzekerd zijn op grond van deze wet kan door de werknemer
      uitsluitend bij het UWV worden ingediend. Het UWV geeft de beschikking binnen dertien weken na ontvangst van de
      aanvraag.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel127a
  - number: 127a.2
    text: |-
      Een beschikking over de betaling van een voorschot op grond van [artikel 31][ref1] of
      [4:95, eerste lid, van de Algemene wet bestuursrecht][ref2] wordt gegeven binnen vier weken na ontvangst van de
      aanvraag.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel31
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel127a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '31'
        hoofdstuk: II
        paragraaf: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 127a.3
    text: |-
      Een beschikking op grond van [hoofdstuk IV][ref1] en de daarop berustende bepalingen wordt gegeven binnen zes
      maanden na ontvangst van de aanvraag.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukIV
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel127a
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: IV
  - number: 127a.4
    text: |-
      Indien een beschikking als bedoeld in het eerste, tweede of derde lid niet binnen de toepasselijke termijn kan
      worden gegeven, wordt dit schriftelijk aan de aanvrager medegedeeld onder vermelding van een zo kort mogelijke
      termijn waarbinnen de beschikking wel tegemoet kan worden gezien.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel127a
  - number: '129'
    text: |-
      In afwijking van [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1] beslist het UWV binnen dertien
      weken gerekend vanaf de dag na die waarop de termijn voor het indienen van het bezwaarschrift is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel129
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: 129a
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld ten aanzien van de behandeling van bezwaarschriften
      tegen besluiten, waaraan een medische of arbeidskundige beoordeling ten grondslag ligt.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel129a
  - number: 129b
    text: |-
      Het bezwaar of beroep van een werkgever tegen het verhaal, bedoeld in [artikel 79, eerste lid][ref1], kan niet zijn
      gegrond op de grief dat de uitkering ten onrechte of tot een te hoog bedrag is vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel79
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel129b
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '79'
        hoofdstuk: VII
  - number: 129c
    text: |-
      Ten aanzien van besluiten waaraan een medische beoordeling ten grondslag ligt zijn de
      [artikelen 103 tot en met 110 van de Wet werk en inkomen naar arbeidsvermogen][ref1] van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel103
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel129c
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '103'
  - number: 129d.1
    text: |-
      Tegen uitspraken van de Centrale Raad van Beroep kan ieder der partijen beroep in cassatie instellen terzake van
      schending of verkeerde toepassing van de [artikelen 2 tot en met 12][ref1] en [14, eerste lid][ref2], en de daarop
      berustende bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel14
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel129d
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '2'
        hoofdstuk: I
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '14'
        hoofdstuk: I
        paragraaf: '4'
  - number: 129d.2
    text: |-
      Op dit beroep zijn de voorschriften betreffende het beroep in cassatie tegen de uitspraken van de gerechtshoven
      inzake beroepen in belastingzaken van overeenkomstige toepassing, waarbij de Centrale Raad van Beroep de plaats
      inneemt van een gerechtshof.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel129d
  - number: '130.1'
    text: |-
      Bij algemene maatregel van bestuur kan bij wijze van experiment, met het oog op het onderzoeken van mogelijkheden
      om deze wet met betrekking tot de inschakeling in de arbeid van werknemers die recht op uitkering hebben op grond
      van [hoofdstuk II][ref1], doeltreffender uit te voeren, worden afgeweken van het bepaalde bij of krachtens de
      [artikelen 24][ref2], [26][ref3] en [72 tot en met 78][ref4] van deze wet. Bij toepassing van de eerste zin wordt
      bij algemene maatregel van bestuur geregeld op welke wijze van welke artikelen wordt afgeweken.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel24
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel26
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel72
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130
    references:
      - id: ref1
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '24'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '26'
        hoofdstuk: II
        paragraaf: '2'
      - id: ref4
        bwb_id: BWBR0004045
        artikel: '72'
        hoofdstuk: VI
  - number: '130.2'
    text: |-
      Een experiment als bedoeld in het eerste lid duurt ten hoogste vier jaar. Indien, voor een experiment is afgelopen,
      een voorstel van wet is ingediend bij de Staten-Generaal om het experiment om te zetten in een structurele
      wettelijke regeling, kan het experiment worden verlengd tot het tijdstip waarop het voorstel van wet in werking
      treedt. Het eerste lid, tweede zin, is van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130
  - number: '130.3'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de uitvoering van een experiment en
      voorzieningen worden getroffen voor zich gedurende een experiment voordoende onvoorziene gevallen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130
  - number: '130.4'
    text: |-
      Onze Minister meldt aan de Staten-Generaal hoe het experiment in de praktijk is verlopen, alsmede zijn standpunt
      inzake de voortzetting ervan anders dan als experiment.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130
  - number: '130.5'
    text: |-
      De voordracht voor krachtens dit artikel vast te stellen algemene maatregelen van bestuur wordt niet eerder gedaan
      dan vier weken nadat het ontwerp aan beide kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130
  - number: 130g.1
    text: |-
      De [artikelen 82, tweede lid][ref1], 82a, eerste lid, en 97c, zesde lid, zoals deze artikelen luidden
      op de dag voorafgaande aan het tijdstip van inwerkingtreding van de desbetreffende bepalingen van de
      [Invoeringswet Wet financiering sociale verzekeringen][ref2], zijn niet van toepassing indien de dienstbetrekking
      is aangegaan voor 1 januari 2002.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0017747
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130g
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '82'
        hoofdstuk: VII
      - id: ref2
        bwb_id: BWBR0017747
  - number: 130g.2
    text: |-
      De [artikelen 82, derde lid][ref1], 82a, tweede lid, en 97c, zevende lid, zoals deze artikelen luidden
      op de dag voorafgaande aan het tijdstip van inwerkingtreding van de desbetreffende bepalingen van de
      [Invoeringswet Wet financiering sociale verzekeringen][ref2], zijn niet van toepassing indien de werknemer voor
      1 januari 2002 zijn eigen arbeid of een andere functie bij dezelfde werkgever geheel of gedeeltelijk heeft hervat
      dan wel indien diens arbeidsplaats voor die datum is aangepast tot behoud, herstel of ter bevordering van de
      mogelijkheden tot het verrichten van arbeid van die werknemer.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0017747
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130g
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '82'
        hoofdstuk: VII
      - id: ref2
        bwb_id: BWBR0017747
  - number: 130g.3
    text: |-
      Zo nodig in afwijking van de [artikelen 82, tweede, derde en vierde lid][ref1], 82a, eerste,
      tweede en derde lid, of 97c, zesde, zevende en achtste lid, zoals deze artikelen luidden op de
      dag voorafgaande aan het tijdstip van inwerkingtreding van de desbetreffende bepalingen van de
      [Invoeringswet Wet financiering sociale verzekeringen][ref2], kan het bedrag dat in mindering wordt gebracht op
      de door de werkgever verschuldigde premie en de premiekorting met betrekking tot het jaar 2002, in 2003 worden
      vastgesteld. Bij ministeriële regeling kunnen met betrekking tot dit lid nadere regels worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0017747
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130g
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '82'
        hoofdstuk: VII
      - id: ref2
        bwb_id: BWBR0017747
  - number: 130h.1
    text: |-
      Hoofdstuk IIA, Afdeling III, zoals dat luidde op de dag voor inwerkingtreding van de wet van 19 december 2003
      tot wijziging van de Werkloosheidswet in verband met afschaffing van de vervolguitkering (Stb. 546), blijft van
      toepassing op een recht op uitkering:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
  - number: 130h.1.a
    text: waarvan de eerste werkloosheidsdag is gelegen voor 11 augustus 2003;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
  - number: 130h.1.b
    text: |-
      ontstaan als gevolg van eindiging van de dienstbetrekking door opzegging, indien de aanzegging van de opzegging
      heeft plaatsgevonden voor de in onderdeel a genoemde datum;
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
  - number: 130h.1.c
    text: |-
      ontstaan als gevolg van ontbinding door de rechter van de dienstbetrekking, indien de datum waarop de ontbinding is
      uitgesproken is gelegen voor de in onderdeel a genoemde datum.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
  - number: 130h.2
    text: |-
      De artikelen 48, 51 en 52, zoals die luidden op de dag voor inwerkingtreding van de in het eerste lid genoemde wet,
      blijven van toepassing op de persoon:
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
  - number: 130h.2.a
    text: |-
      die voor 11 augustus 2003 recht op uitkering op grond van deze wet had, welk recht eindigt of is geëindigd op
      grond van het verrichten van werkzaamheden als werknemer, en die terzake van de verrichte werkzaamheden op of na 11
      augustus 2003 een nieuw recht op uitkering krijgt, tot aan het moment waarop dat eerste recht zonder toepassing van
      de [artikelen 43][ref1] en [50][ref2] zou hebben geduurd;


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel43
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel50
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
    references:

  - number: 130r.2
    text: |-
      [Artikel 64, vijfde, zesde en achtste lid][ref1], is niet van toepassing op het vakantiegeld en de vakantiebijslag,
      voor zover het deel van het jaar bedoeld in artikel 64, eerste lid, onderdeel c, ligt voor de dag waarop de
      [onderdelen V, X en Y van artikel XXVI van de Wet werk en zekerheid][ref2] in werking zijn getreden.



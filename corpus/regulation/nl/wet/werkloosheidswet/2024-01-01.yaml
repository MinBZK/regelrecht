  - number: 130h.3
    text: |-
      De artikelen 15, 35c, 52b, derde lid, en 52d, derde tot en met vijfde lid, zoals die luidden op de dag voor
      inwerkingtreding van de in het eerste lid genoemde wet, blijven van toepassing op de in het eerste en tweede lid
      bedoelde rechten respectievelijk personen.
    url: https://wetten.overheid.nl/BWBR0004045/2024-01-01#Artikel130h
  - number: 130h.4
    text: |-
      Met opzegging als bedoeld in het eerste lid, onderdeel b, wordt gelijkgesteld, ontslag als bedoeld in de
      [artikelen 93][ref1] en [94 van het Algemeen Rijksambtenarenreglement][ref2] of een overeenkomstige bepaling van
      een soortgelijke regeling.



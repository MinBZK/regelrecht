  - number: 122m
    text: |-
      Indien het bij koninklijke boodschap van 24 januari 2014 ingediende voorstel van wet tot wijziging van de
      Algemene nabestaandenwet en de Wet uitkeringen burger-oorlogsslachtoffers 1940–1945 in verband met een technische
      aanpassing van de berekening van de nabestaandenuitkering voor alleenstaande ouders en een verduidelijking van de
      Werkloosheidswet (Kamerstukken 33 855) tot wet wordt verheven en artikel IVa, onderdeel C, onderdeel 3, van die wet
      in werking treedt en uiterlijk op de dag voorafgaande aan de datum van inwerkingtreding beroep is ingesteld tegen
      de uitspraak op bezwaar van de inspecteur op grond van [artikel 40][ref1], blijft het recht van toepassing zoals
      dat gold op die dag.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122m
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 122n.1
    text: |-
      De quotumheffing, bedoeld in [hoofdstuk 3, afdeling 4, paragraaf 4a][ref1], wordt niet uitgevoerd dan
      nadat bij regeling van Onze Minister, in overeenstemming met het gevoelen van de ministerraad, tot
      invoering is besloten indien is gebleken dat het aantal banen voor arbeidsbeperkten als bedoeld in
      [artikel 38b, eerste, tweede en zesde lid, en het vijfde lid][ref2], in onvoldoende mate is toegenomen ten opzichte
      van het aantal van deze banen op 1 januari 2013, waarbij dit apart wordt beoordeeld voor de sector overheid
      onderscheidenlijk de sector niet-overheid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
    references:
      - id: ref1
        bwb_id: BWBR0017745
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 122n.2
    text: |-
      In afwijking van het eerste lid wordt de quotumheffing, bedoeld in [hoofdstuk 3, afdeling 4, paragraaf 4a][ref1],
      niet uitgevoerd indien hiertoe bij regeling van Onze Minister, in overeenstemming met het gevoelen van de
      ministerraad, is besloten, indien is gebleken dat het aantal banen voor arbeidsbeperkten als bedoeld in
      [artikel 38b, eerste, tweede en zesde lid, en het vijfde lid][ref2], in voldoende mate is toegenomen ten opzichte
      van het aantal van deze banen op 1 januari 2013, waarbij dit apart wordt beoordeeld voor de sector overheid
      onderscheidenlijk de sector niet-overheid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
    references:
      - id: ref1
        bwb_id: BWBR0017745
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 122n.3
    text: |-
      Bij regeling van Onze Minister wordt ten behoeve van de vaststelling van de toename, bedoeld in het eerste en
      tweede lid, het aantal banen bepaald voor arbeidsbeperkten, bedoeld in het eerste en tweede lid, uitgedrukt in
      verloonde uren op 1 januari 2013 voor de sector overheid onderscheidenlijk de sector niet-overheid en wordt voor de
      desbetreffende sector voor het desbetreffende kalenderjaar, bepaald:
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
  - number: 122n.3.a
    text: het cumulatief aantal extra te realiseren banen voor deze arbeidsbeperkten uitgedrukt in verloonde uren;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
  - number: 122n.3.b
    text: het cumulatief aantal gerealiseerde banen voor deze arbeidsbeperkten uitgedrukt in verloonde uren, en
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
  - number: 122n.3.c
    text: |-
      de uitkomst van de vergelijking tussen het cumulatief aantal banen, bedoeld in de onderdelen a en b, uitgedrukt in
      verloonde uren.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
  - number: 122n.4
    text: |-
      Voor de toepassing van het derde lid wordt niet als arbeidsbeperkte beschouwd de persoon die arbeid verricht in
      een dienstbetrekking in de zin van [artikel 2 van de Wet sociale werkvoorziening][ref1], tenzij deze persoon op
      grond van het vijfde lid is aangewezen en aan de werkgever in de sector overheid onderscheidenlijk de sector niet-
      overheid ter beschikking is gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Artikel2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
    references:
      - id: ref1
        bwb_id: BWBR0008903
        artikel: '2'
  - number: 122n.5
    text: |-
      Bij regeling van Onze Minister worden categorieën arbeidsbeperkten die aan de werkgever in de sector overheid
      onderscheidenlijk de sector niet-overheid ter beschikking zijn gesteld om voor hem onder zijn toezicht en
      leiding arbeid te verrichten, aangewezen die overeenkomstig die regeling te stellen regels worden beschouwd
      als arbeidsbeperkten waarop het derde lid van toepassing is. Deze categorieën arbeidsbeperkten worden voor de
      toepassing van het derde lid niet geacht in dienstbetrekking te staan tot de werkgever in de sector overheid
      onderscheidenlijk de sector niet-overheid die deze arbeidsbeperkten ter beschikking heeft gesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
  - number: 122n.6
    text: |-
      Een krachtens het eerste lid vastgestelde ministeriële regeling wordt gelijktijdig aan de beide kamers der Staten-
      Generaal overgelegd. De ministeriële regeling treedt niet eerder in werking dan vier weken na de overlegging.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122n
  - number: 122na.1
    text: |-
      Nadat bij regeling van Onze Minister op grond van [artikel 122n, eerste lid][ref1], tot invoering van
      de quotumheffing voor de betreffende sector is besloten, wordt de quotumheffing, in afwijking van de
      [artikelen 38e, eerste lid][ref2], en 122n, eerste lid, niet uitgevoerd met betrekking tot kalenderjaren die zijn
      gelegen vóór 1 januari 2026.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel122n
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38e
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122na
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 122n
        hoofdstuk: 7a
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38e
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 122na.2
    text: |-
      Ten aanzien van een kalenderjaar waarover de quotumheffing op grond van het eerste lid niet wordt uitgevoerd, wordt
      met overeenkomstige toepassing van [artikel 38f][ref1] een quotumpercentage vastgesteld voor de sector overheid,
      onderscheidenlijk voor de sector niet-overheid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38f
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122na
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38f
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 122o
    text: |-
      [Artikel 38h, achtste lid][ref1], vervalt met ingang van 1 januari van het vierde kalenderjaar na het kalenderjaar
      waarin de quotumheffing op grond van [artikel 122n, eerste lid][ref2], is geactiveerd, tenzij voor die datum een
      voorstel van wet bij de Tweede Kamer der Staten-Generaal is ingediend, dat een vergelijkbare regeling bevat voor de
      uitsluiting van de dwangsomregeling, bedoeld in artikel 38h, achtste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38h
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel122n
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122o
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38h
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 122n
        hoofdstuk: 7a
  - number: 122p
    text: |-
      [Artikel 40, eerste lid, aanhef en onderdeel a][ref1], blijft buiten toepassing op het
      ziekengeld op grond van de [Ziektewet][ref2], alsmede de overlijdensuitkering, bedoeld in
      [artikel 35 van de Ziektewet][ref3], vermeerderd met de verschuldigde inkomensafhankelijke bijdrage, bedoeld
      in [artikel 42 van de Zorgverzekeringswet][ref4], dat is of wordt betaald aan de verzekerde ten aanzien van wie
      de eerste dag van ongeschiktheid tot werken is gelegen op of na de dag dat de verzekerde de leeftijd, bedoeld in
      [artikel 7, onderdeel a, van de Algemene Ouderdomswet][ref5] heeft bereikt en voor de dag van inwerkingtreding
      van [artikel III, onderdeel D, van de Wet werken na de AOW-gerechtigde leeftijd][ref6].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0001888
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel35
      [ref4]: https://wetten.overheid.nl/BWBR0018450#Artikel42
      [ref5]: https://wetten.overheid.nl/BWBR0002221#Artikel7
      [ref6]: https://wetten.overheid.nl/BWBR0037099#ArtikelIII
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122p
    references:
      - id: ref1

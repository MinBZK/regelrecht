        artikel: '61'
        hoofdstuk: '4'
        paragraaf: '3'
      - id: ref2
        bwb_id: BWBR0002221
      - id: ref3
        bwb_id: BWBR0004770
  - number: '123'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld omtrent
      de wijze waarop de rijksbelastingdienst, het UWV, de SVB, het CAK, genoemd in
      [artikel 6.1.1, eerste lid, van de Wet langdurige zorg][ref1], de zorgautoriteit en de organen die betrokken
      zijn bij de uitvoering van de [Wet langdurige zorg][ref2], samenwerken ten behoeve van een goede uitvoering
      van deze wet, de [Wet structuur uitvoeringsorganisatie werk en inkomen][ref3], de volksverzekeringen,
      de werknemersverzekeringen, de [Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref4], de
      [Zorgverzekeringswet][ref5] en de belastingwetten, voorzover het betreft de financiering van de sociale
      verzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0035917#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0035917
      [ref3]: https://wetten.overheid.nl/BWBR0013060
      [ref4]: https://wetten.overheid.nl/BWBR0008656
      [ref5]: https://wetten.overheid.nl/BWBR0018450
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel123
    references:
      - id: ref1
        bwb_id: BWBR0035917
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0035917
      - id: ref3
        bwb_id: BWBR0013060
      - id: ref4
        bwb_id: BWBR0008656
      - id: ref5
        bwb_id: BWBR0018450
  - number: '124'
    text: |-
      De SVB, het UWV, het CAK, genoemd in [artikel 6.1.1, eerste lid, van de Wet langdurige zorg][ref1], de
      zorgautoriteit, de organen die betrokken zijn bij de uitvoering van de [Wet langdurige zorg][ref2], de
      rijksbelastingdienst, het Centraal Planbureau en het Centraal Bureau voor de Statistiek zijn bevoegd uit eigen
      beweging en verplicht desgevraagd aan elkaar en aan Onze Minister, Onze Minister van Financiën en Onze Minister
      van Volksgezondheid, Welzijn en Sport kosteloos de opgaven en inlichtingen te verstrekken die noodzakelijk
      zijn voor de uitvoering van deze wet, de [Wet structuur uitvoeringsorganisatie werk en inkomen][ref3], de
      volksverzekeringen, de werknemersverzekeringen, de [Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref4],
      de [Zorgverzekeringswet][ref5] en de belastingwetten, voorzover het betreft de financiering van de sociale
      verzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0035917#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0035917
      [ref3]: https://wetten.overheid.nl/BWBR0013060
      [ref4]: https://wetten.overheid.nl/BWBR0008656
      [ref5]: https://wetten.overheid.nl/BWBR0018450
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel124
    references:

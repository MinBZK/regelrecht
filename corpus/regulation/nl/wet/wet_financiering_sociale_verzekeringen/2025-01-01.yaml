  - number: 122i
    text: |-
      Een gemeente die zelf het risico, bedoeld in [artikel 40, eerste lid][ref1], draagt op
      1 juli 2011, draagt op die datum tevens zelf dit risico ten aanzien van haar werknemers als
      bedoeld in artikel 40, elfde lid, zoals dat luidde op de dag voor de inwerkingtreding van
      [artikel IV, onderdeel H, van de Wet Harmonisatie en vereenvoudiging socialezekerheidswetgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0029334#ArtikelIV
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122i

        artikel: '2'
  - number: '9.1'
    text: |-
      De verschuldigde premie voor de volksverzekeringen is de premie voor de volksverzekeringen verminderd met de voor
      de premieplichtige toepasselijke heffingskorting voor de volksverzekeringen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel9
  - number: '9.2'
    text: |-
      Indien de premieplichtige ook belastingplichtig is voor de inkomstenbelasting en de
      volgens [artikel 8.3 van de Wet inkomstenbelasting 2001][ref1], met inachtneming van
      [artikel 2.7, eerste lid, tweede en derde zin, van die wet][ref2], berekende heffingskorting voor de
      inkomstenbelasting niet volledig kan worden verrekend met de volgens artikel 2.7, eerste lid, eerste zin, van die
      wet verschuldigde inkomstenbelasting, na toepassing van regelingen ter voorkoming van dubbele belasting, wordt het
      bedrag van de verschuldigde premie voor de volksverzekeringen ook met dat niet verrekende deel verminderd.


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0011353#Artikel2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel9
    references:
      - id: ref1
        bwb_id: BWBR0011353
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0011353
        artikel: '2'
  - number: '10.1'
    text: |-
      De premie voor de volksverzekeringen wordt vastgesteld op de som van de percentages bedoeld in [artikel 11][ref1]
      van het premie-inkomen.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel11
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '11'
        hoofdstuk: '2'
        paragraaf: '3'
        afdeling: '2'
  - number: '10.2'
    text: |-
      Tot de premie, bedoeld in het eerste lid, behoort met ingang van de eerste dag van de maand waarin de verzekerde de
      pensioengerechtigde leeftijd, bedoeld in [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1], zal bereiken
      niet de premie voor de algemene ouderdomsverzekering.


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: '11.1'
    text: |-
      Het premiepercentage voor de algemene ouderdomsverzekering wordt bij regeling van Onze Minister vastgesteld. Het
      bedraagt ten hoogste 18,25.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel11
  - number: '11.2'
    text: Het premiepercentage voor de nabestaandenverzekering wordt bij regeling van Onze Minister vastgesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel11
  - number: '11.3'
    text: |-
      Het premiepercentage voor de verzekering langdurige zorg wordt vastgesteld bij regeling van Onze Minister van
      Volksgezondheid, Welzijn en Sport in overeenstemming met Onze Minister.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel11
  - number: '11.4'
    text: |-
      Indien een wijziging van een premiepercentage ingaat op een ander tijdstip dan 1 januari, vindt de vaststelling
      plaats in overeenstemming met Onze Minister van Financiën en kunnen daarbij regels worden gesteld omtrent de wijze
      van berekening van de premie over het gehele kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel11
  - number: '12.1'
    text: 'De heffingskorting voor de volksverzekeringen is de som van:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel12
  - number: 12.1.a
    text: |-
      indien betrokkene premieplichtig is voor de algemene ouderdomsverzekering: de op grond van
      [hoofdstuk 8 van de Wet inkomstenbelasting 2001][ref1] berekende heffingskorting voor de algemene
      ouderdomsverzekering;


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0011353
        hoofdstuk: '8'
  - number: 12.1.b
    text: |-
      indien betrokkene premieplichtig is voor de nabestaandenverzekering: de op grond van
      [hoofdstuk 8 van de Wet inkomstenbelasting 2001][ref1] berekende heffingskorting voor de nabestaandenverzekering;


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0011353
        hoofdstuk: '8'
  - number: 12.1.c
    text: |-
      indien betrokkene premieplichtig is voor de verzekering langdurige zorg: de op grond van
      [hoofdstuk 8 van de Wet inkomstenbelasting 2001][ref1] berekende heffingskorting voor de verzekering langdurige
      zorg.


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0011353
        hoofdstuk: '8'
  - number: '12.2'
    text: |-
      Indien de premie voor de volksverzekeringen bij wijze van inhouding wordt geheven, worden voor de toepassing
      van het eerste lid de heffingskortingen, genoemd in [artikel 8.2 van de Wet inkomstenbelasting 2001][ref1],
      die geen deel uitmaken van de standaardloonheffingskorting, bedoeld in
      [artikel 21c van de Wet op de loonbelasting 1964][ref2], geacht geen deel uit te maken van de
      standaardheffingskorting, bedoeld in [artikel 8.2 van de Wet inkomstenbelasting 2001][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0002471#Artikel21c
      [ref3]: https://wetten.overheid.nl/BWBR0011353#Artikel8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0011353
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0002471
        artikel: 21c
      - id: ref3
        bwb_id: BWBR0011353
        artikel: '8'
  - number: '12.3'
    text: |-
      De heffingskorting, bedoeld in het eerste lid, geldt ten aanzien van degene die het gehele kalenderjaar
      premieplichtig is. Bij ministeriële regeling worden regels gesteld voor de bepaling van de heffingskorting ten
      aanzien van degene die een gedeelte van het jaar premieplichtig is.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel12
  - number: '13'
    text: |-
      Bij regeling van Onze Minister, in overeenstemming met Onze Minister van Financiën en Onze Minister van
      Volksgezondheid, Welzijn en Sport, kunnen nadere regels worden gesteld met betrekking tot deze afdeling.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel13
  - number: '14.1'
    text: |-
      Bij ministeriële regeling kunnen bedragen worden vastgesteld die als rijksbijdrage ten gunste komen van het
      Ouderdomsfonds.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel14
  - number: '14.2'
    text: |-
      Onze Minister van Volksgezondheid, Welzijn en Sport kan jaarlijks bedragen vaststellen die als rijksbijdrage ten
      gunste komen van het Fonds langdurige zorg.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel14
  - number: '15'
    text: |-
      Ten gunste van het Ouderdomsfonds, het Nabestaandenfonds en het Fonds langdurige zorg wordt jaarlijks een
      rijksbijdrage in de kosten van de heffingskortingen voor de volksverzekeringen toegekend. Deze bijdrage
      wordt door Onze Minister vastgesteld volgens de formule: BIKKt = (BIKKt-1 + A*Kt-1)*Kt/Kt-1 waarbij: BIKKt
      = de bijdrage in de kosten van de heffingskortingen ten gunste van het fonds in een bepaald jaar; BIKKt-
      1 = de bijdrage in de kosten van de heffingskortingen ten gunste van het fonds in het voorafgaande jaar;
      A = het aandeel van de premie ten gunste van het fonds in het gecombineerde heffingspercentage, bedoeld
      in [artikel 8.1, onderdeel c, van de Wet inkomstenbelasting 2001][ref1], in het jaar waarvoor de bijdrage
      wordt toegekend, verminderd met het aandeel in het daaraan voorafgaande jaar; Kt = de door Onze Minister, in
      overeenstemming met Onze Ministers van Financiën en van Volksgezondheid, Welzijn en Sport, geraamde totale kosten
      voor de heffingskortingen in het jaar waarvoor de bijdrage wordt toegekend; Kt-1 = de door Onze Minister, in
      overeenstemming met Onze Ministers van Financiën en van Volksgezondheid, Welzijn en Sport, geraamde totale kosten
      voor de heffingskortingen in het jaar voorafgaand aan het jaar waarvoor de bijdrage wordt toegekend.


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Artikel8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0011353
        artikel: '8'
  - number: '16.1'
    text: |-
      Voor de toepassing van dit hoofdstuk wordt onder loon verstaan het loon en de gage overeenkomstig de
      [Wet op de loonbelasting 1964][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0002471
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0002471
  - number: '16.2'
    text: 'Tot het loon behoren niet:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel16
  - number: 16.2.a
    text: |-
      hetgeen uit een vroegere dienstbetrekking als bedoeld in de [Wet op de loonbelasting 1964][ref1] wordt
      genoten met uitzondering van uitkeringen op grond van een werknemersverzekering of wachtgeld als bedoeld in
      [artikel 6, vijfde lid, tweede zin, van de Werkloosheidswet][ref2] en de aanvullingen daarop van degene tot wie de
      werknemer in dienstbetrekking staat en met uitzondering van toeslagen op grond van de [Toeslagenwet][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0002471
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel6
      [ref3]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0002471
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '6'
      - id: ref3
        bwb_id: BWBR0004043
  - number: 16.2.b
    text: |-
      eindheffingsbestanddelen als bedoeld in
      [artikel 31, eerste lid, onderdelen b tot en met h, van de Wet op de loonbelasting 1964][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel31
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0002471
        artikel: '31'
  - number: 16.2.c
    text: |-
      een tegemoetkoming als bedoeld in de [artikelen 63a van de Wet werk en inkomen naar arbeidsvermogen](onbekend) en
      [65l van de Wet op de arbeidsongeschiktheidsverzekering](onbekend).
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel16
  - number: '17.1'
    text: |-
      Het loon, waarnaar de premies op grond van dit hoofdstuk worden geheven, wordt bij dezelfde werkgever tot
      geen hoger bedrag in aanmerking genomen dan het door Onze Minister, in overeenstemming met Onze Ministers van
      Volksgezondheid, Welzijn en Sport en van Financiën, met betrekking tot het kalenderjaar vastgestelde bedrag.
      Voorts bedraagt het dagloon dat aan de uitkeringen op grond van de werknemersverzekeringen of vrijwillige
      werknemersverzekeringen ten grondslag ligt of wordt gelegd ten hoogste het bedrag, bedoeld in de eerste volzin, met
      betrekking tot een loontijdvak van een dag, waarbij het kalenderjaar wordt gesteld op 261 dagen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel17
  - number: '17.2'
    text: |-
      Het bedrag, bedoeld in het eerste lid, eerste zin, wordt herleid en vastgesteld voor andere loontijdvakken
      waarin loon als bedoeld in [artikel 16][ref1] wordt genoten. Voor de herleiding van het loontijdvak van een jaar
      naar een ander loontijdvak is [artikel 25, eerste en vierde lid, van de Wet op de loonbelasting 1964][ref2] van
      overeenkomstige toepassing, met uitzondering van de toepassing voor het dagloon, bedoeld in het eerste lid, tweede
      volzin. Het dagloon wordt herleid en vastgesteld voor loontijdvakken waarvoor Onze Minister dit nodig acht.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0002471#Artikel25
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel17
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '16'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0002471
        artikel: '25'
  - number: '17.3'
    text: |-
      De premies die op grond van dit hoofdstuk worden geheven worden per loontijdvak berekend over het verschil
      tussen het loon dat de werknemer in het kalenderjaar heeft genoten tot en met dat loontijdvak en het loon dat
      de werknemer in dat kalenderjaar heeft genoten tot en met het aan dat loontijdvak voorafgaande loontijdvak, met
      dien verstande dat van het bij eenzelfde werkgever genoten loon buiten aanmerking blijft het gedeelte dat meer
      bedraagt dan het met toepassing van het tweede lid vastgestelde bedrag per loontijdvak, vermenigvuldigd met het
      aantal loontijdvakken van het kalenderjaar. In afwijking van de eerste zin kunnen de premies die op grond van
      dit hoofdstuk worden geheven, apart worden berekend over het deel van het bij een werkgever genoten loon, dat
      betrekking heeft op de betaling van uitkeringen als bedoeld in [artikel 40, eerste lid, onderdeel a of b][ref1],
      door een eigenrisicodrager, indien de betaling wordt gedaan namens of ten behoeve van die werkgever door een derde
      die in opdracht van hem deze betalingen verricht op grond van zijn taak als eigenrisicodrager. Indien de werkgever
      in een kalenderjaar kiest voor de in de tweede zin bedoelde berekening wordt deze toegepast vanaf het eerste
      loontijdvak en vervolgens in alle daaropvolgende loontijdvakken in dat kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel17
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: '17.4'
    text: |-
      Bij regeling van Onze Minister, in overeenstemming met Onze Minister van Financiën, kunnen regels worden
      gesteld voor de vaststelling van het voor premieberekening in aanmerking komende loon bij samenloop van loon
      dat gelijktijdig wordt genoten uit een dienstbetrekking in de zin van de [Wet op de loonbelasting 1964][ref1] en
      uit een vroegere dienstbetrekking in de zin van die wet. In de te stellen regels wordt uitgegaan van een totaal
      loonbedrag in een kalenderjaar, dat niet hoger is dan het bedrag, bedoeld in het eerste lid, eerste volzin,
      waarbij niet meer dan één keer rekening wordt gehouden met dat bedrag en waarbij het tweede en derde lid van
      overeenkomstige toepassing zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0002471
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel17
    references:
      - id: ref1
        bwb_id: BWBR0002471
  - number: '17.5'
    text: |-
      Bij regeling van Onze Minister, in overeenstemming met Onze Minister van Financiën, kunnen nadere
      regels worden gesteld in ieder geval voor de omstandigheid dat bij één of meerdere werkgevers naast
      loon uit dienstbetrekking ook een uitkering op grond van een werknemersverzekering of op grond van
      [hoofdstuk 3, afdeling 2, paragraaf 1][ref1], of de [artikelen 4:2b, eerste tot en met zesde lid][ref2], en
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref3] wordt ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel6
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel17
    references:
      - id: ref1
        bwb_id: BWBR0013008
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '6'
  - number: '18.1'
    text: |-
      Het bedrag, bedoeld in [artikel 17, eerste lid][ref1], wordt herzien
      met ingang van de dag waarop en in de mate waarin het bedrag genoemd in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref2] wordt herzien. Voor de
      berekening van het herziene bedrag wordt de mate waarin het minimumloon wordt herzien, uitgedrukt in procenten en
      afgerond op twee decimalen. Het herziene bedrag wordt afgerond op het dichtstbijzijnde veelvoud van € 2,61. Indien
      het restbedrag € 1,305 bedraagt, geschiedt de afronding naar boven.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0002638#Artikel8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0002638
        artikel: '8'
  - number: '18.2'
    text: |-
      De dag, bedoeld in het eerste lid, en het overeenkomstig het eerste lid herziene bedrag worden door Onze Minister
      in de Staatscourant bekend gemaakt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel18
  - number: '18.3'
    text: |-
      Het overeenkomstig het eerste lid herziene bedrag treedt in de plaats van het bedrag, bedoeld in
      [artikel 17, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
  - number: '18.4'
    text: |-
      Uitsluitend voor de berekening van het loon waarnaar de premies en de inkomensafhankelijke
      bijdrage uit de [Zorgverzekeringswet][ref1] worden geheven, wordt het bedrag, bedoeld in
      [artikel 17, eerste lid, eerste volzin][ref2], naar beneden afgerond op hele euro’s. Voor de berekening van het
      loon waarnaar de premies en de inkomensafhankelijke bijdrage uit de Zorgverzekeringswet worden geheven blijft
      het bedrag, bedoeld in artikel 17, eerste lid, eerste volzin, zoals dat geldt per 1 januari van een kalenderjaar
      gedurende dat hele kalenderjaar van kracht.


      [ref1]: https://wetten.overheid.nl/BWBR0018450
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0018450
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '17'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
  - number: '19'
    text: |-
      [Artikel 17, eerste en tweede lid][ref1], is niet van toepassing in de gevallen, bedoeld in
      [artikel 26b, eerste volzin, van de Wet op de loonbelasting 1964][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0002471#Artikel26b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0002471
        artikel: 26b
  - number: '20'
    text: |-
      De werkgever mag de door hem verschuldigde premie niet verhalen op de werknemer. Elk beding waarbij van de eerste
      zin wordt afgeweken, is nietig.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel20
  - number: '21'
    text: |-
      Geen premies voor de werknemersverzekeringen zijn verschuldigd met ingang van de eerste
      dag van de maand waarin de verzekerde de pensioengerechtigde leeftijd, bedoeld in
      [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1], zal bereiken.


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: '22.1'
    text: |-
      Indien een wijziging van een premiepercentage bij ministeriële regeling op grond van dit hoofdstuk ingaat op een
      ander tijdstip dan 1 januari, vindt de vaststelling plaats in overeenstemming met Onze Minister van Financiën.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel22
  - number: '22.2'
    text: |-
      Indien een wijziging door het UWV van een premiepercentage op grond van dit hoofdstuk ingaat op een ander tijdstip
      dan 1 januari, is goedkeuring vereist van Onze Minister en Onze Minister van Financiën. Indien Onze Minister en
      Onze Minister van Financiën hun goedkeuring onthouden stellen zij het percentage zelf vast.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel22
  - number: '22.3'
    text: |-
      Onze Minister en Onze Minister van Financiën kunnen in een geval als bedoeld in dit artikel regels stellen omtrent
      de wijze van berekening van de premie over het gehele kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel22
  - number: '23'
    text: |-
      De financiële middelen tot dekking van de uitgaven van het Algemeen Werkloosheidsfonds worden verkregen door het
      heffen van premie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel23
  - number: '24.1'
    text: Deze afdeling is niet van toepassing op overheidswerkgevers voorzover zij werkgever zijn van overheidswerknemers.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel24
  - number: '24.2'
    text: |-
      In afwijking van het eerste lid is deze afdeling van toepassing ten aanzien van degenen
      die uitkering ontvangen op grond van de [Werkloosheidswet][ref1], de [Ziektewet][ref2], de
      [Wet werk en inkomen naar arbeidsvermogen][ref3], de [Wet op de arbeidsongeschiktheidsverzekering][ref4],
      of [hoofdstuk 3, afdeling 2, paragraaf 1][ref5], of de [artikelen 4:2b, eerste tot en met zesde lid][ref6],
      en [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref7], dan wel een toeslag op grond
      van de [Toeslagenwet][ref8], indien zij die uitkering of toeslag uit hoofde van een dienstbetrekking als
      overheidswerknemer ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0001888
      [ref3]: https://wetten.overheid.nl/BWBR0019057
      [ref4]: https://wetten.overheid.nl/BWBR0002524
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref6]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref7]: https://wetten.overheid.nl/BWBR0013008#Artikel6
      [ref8]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0001888
      - id: ref3
        bwb_id: BWBR0019057
      - id: ref4
        bwb_id: BWBR0002524
      - id: ref5
        bwb_id: BWBR0013008
        paragraaf: '1'
      - id: ref6
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref7
        bwb_id: BWBR0013008
        artikel: '6'
      - id: ref8
        bwb_id: BWBR0004043
  - number: '25'
    text: |-
      De premie is verschuldigd door de werkgever in de zin van de [Werkloosheidswet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004045
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0004045
  - number: '26'
    text: De maatstaf voor de heffing van de premie is het loon.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel26
  - number: '27.1'
    text: |-
      De premie, bedoeld in [artikel 23][ref1], wordt bij regeling van Onze Minister vastgesteld op een
      percentage van het loon dat voor categorieën van werknemers naar de aard van hun arbeidsovereenkomst
      verschilt, waarbij onderscheid wordt gemaakt in een lage premie voor werknemers met een schriftelijke
      arbeidsovereenkomst voor onbepaalde tijd niet zijnde een oproepovereenkomst als bedoeld in
      [artikel 628a, negende en tiende lid, van Boek 7 van het Burgerlijk Wetboek][ref2], en een hoge premie voor overige
      werknemers. Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld over het verschil tussen
      de hoge en de lage premie en over de gevallen waarin in afwijking van de eerste zin met terugwerkende kracht de
      hoge premie van toepassing is. Voorts kunnen bij of krachtens algemene maatregel van bestuur nadere voorwaarden
      worden gesteld aan de toepassing van de premie en over de wijze waarop de lage premie wordt herzien in de gevallen
      waarin met terugwerkende kracht de hoge premie van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0005290#Artikel628a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '23'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0005290
        artikel: 628a
  - number: '27.2'
    text: |-
      De premie, bedoeld in [artikel 23][ref1], over een uitkering op grond van de [Werkloosheidswet][ref2],
      de [Ziektewet][ref3], de [Wet werk en inkomen naar arbeidsvermogen][ref4], de
      [Wet op de arbeidsongeschiktheidsverzekering][ref5], [hoofdstuk 3, afdeling 2, paragraaf 1][ref6],
      of de [artikelen 4:2b, eerste tot en met zesde lid][ref7], en
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref8] aan de werknemer of gelijkgestelde, bedoeld
      in [artikel 3:6, eerste lid, van die wet][ref9], en over een toeslag op grond van de [Toeslagenwet][ref10] wordt
      vastgesteld op het percentage van de lage premie, bedoeld in het eerste lid. Bij of krachtens algemene maatregel
      van bestuur kunnen nadere voorwaarden worden gesteld aan de toepassing van de eerste zin.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0004045
      [ref3]: https://wetten.overheid.nl/BWBR0001888
      [ref4]: https://wetten.overheid.nl/BWBR0019057
      [ref5]: https://wetten.overheid.nl/BWBR0002524
      [ref6]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref7]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref8]: https://wetten.overheid.nl/BWBR0013008#Artikel6
      [ref9]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref10]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel27
    references:
      - id: ref1

      - id: ref10
        bwb_id: BWBR0004043
  - number: '27.3'
    text: |-
      In afwijking van het eerste lid is het percentage van de lage premie, bedoeld in het eerste lid, van toepassing
      indien het een werknemer betreft die
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel27
  - number: 27.3.a
    text: |-
      de beroepspraktijkopleiding volgt van de beroepsbegeleidende leerweg van een beroepsopleiding als bedoeld in
      [artikel 7.2.2, eerste lid, onderdelen a tot en met e, van de Wet educatie en beroepsonderwijs][ref1], op de
      grondslag van een schriftelijke, in de administratie van de werkgever opgenomen overeenkomst als bedoeld in
      [artikel 7.2.8 van die wet][ref2], gesloten door de partijen, genoemd in [artikel 7.2.9 van die wet][ref3]; of


      [ref1]: https://wetten.overheid.nl/BWBR0007625#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0007625#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0007625#Artikel7
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0007625
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0007625
        artikel: '7'
      - id: ref3
        bwb_id: BWBR0007625
        artikel: '7'
  - number: 27.3.b
    text: |-
      de leeftijd van 21 jaar nog niet heeft bereikt, mits het aantal verloonde uren in het aangiftetijdvak van vier
      weken niet meer bedraagt dan 48 uur, dan wel in het aangiftetijdvak van een maand niet meer bedraagt dan 52 uur.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel27
  - number: '27.4'
    text: |-
      Het bezwaar of beroep van een werkgever tegen een besluit dat met terugwerkende kracht de hoge premie van
      toepassing is, als bedoeld in het eerste lid, kan niet zijn gegrond op de grief dat een uitkering op grond van de
      [Werkloosheidswet][ref1] ten onrechte of tot een te hoog bedrag is vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0004045
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0004045
  - number: '29'
    text: |-
      De financiële middelen tot dekking van de uitgaven ten laste van het Uitvoeringsfonds voor de overheid worden
      verkregen door het in rekening brengen van de uitgaven, bedoeld in [artikel 79 van de Werkloosheidswet][ref1], bij
      de overheidswerkgevers en door het heffen van premie.


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel79
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel29
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '79'
  - number: '30'
    text: De premie is verschuldigd door de overheidswerkgever.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel30
  - number: '31'
    text: De premie wordt bij ministeriële regeling vastgesteld op een percentage van het loon.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel31
  - number: '33.1'
    text: |-
      De financiële middelen tot dekking van de uitgaven ten laste van het Arbeidsongeschiktheidsfonds worden verkregen
      door het heffen van de gedifferentieerde premie, bedoeld in [artikel 36][ref1], de quotumheffing, bedoeld in
      [artikel 38h][ref2], en door een bijdrage van het rijk als bedoeld in [artikel 114, onderdeel f][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel36
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38h
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel114
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '36'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38h
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '114'
        hoofdstuk: '7'
        paragraaf: '2'
        afdeling: '3'
  - number: '33.2'
    text: |-
      De financiële middelen tot dekking van de uitgaven ten laste van de Werkhervattingskas, alsmede de financiële
      middelen voor het vormen en in stand houden van een staartlastenvermogen in de Werkhervattingskas, worden verkregen
      door het heffen van de in [artikel 38][ref1] bedoelde gedifferentieerde premie.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '38'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
  - number: '34.1'
    text: |-
      De premie is verschuldigd door werkgevers in de zin van de [Wet werk en inkomen naar arbeidsvermogen][ref1] en
      bestaat uit een gedifferentieerde premie ten behoeve van het Arbeidsongeschiktheidsfonds en een gedifferentieerde
      premie ten behoeve van de Werkhervattingskas.


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: '34.2'
    text: |-
      In afwijking van [artikel 20][ref1] kan de werkgever de met betrekking tot een werknemer door hem verschuldigde
      gedifferentieerde premie ten behoeve van de Werkhervattingskas, bedoeld in [artikel 38][ref2], verhalen op de
      werknemer onder bij ministeriële regeling te bepalen voorwaarden tot een bij die regeling nader te bepalen bedrag,
      dat ten hoogste de helft van de door de werkgever verschuldigde premie kan bedragen.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '20'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '38'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
  - number: '34.3'
    text: |-
      De quotumheffing is verschuldigd door werkgevers in de zin van de [Wet werk en inkomen naar arbeidsvermogen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: '34.4'
    text: |-
      De quotumheffing is niet verschuldigd indien in het kalenderjaar voorafgaand aan het kalenderjaar waarover de
      quotumheffing wordt geheven, de werkgever minder dan 25 vermenigvuldigd met het gemiddeld aantal verloonde uren
      per werknemer op jaarbasis in Nederland aan verloonde uren als bedoeld in [artikel 38b, vierde lid][ref1], in de
      loonaangifte op grond van de [Wet op de loonbelasting 1964][ref2] heeft verantwoord.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
      [ref2]: https://wetten.overheid.nl/BWBR0002471
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0002471
  - number: '34.5'
    text: |-
      Bij algemene maatregel van bestuur kunnen categorieën werknemers worden aangewezen ten aanzien waarvan de verloonde
      uren bij de toepassing van het vierde lid in mindering worden gebracht op het totaal aantal verloonde uren die de
      werkgever in de loonaangifte heeft verantwoord.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
  - number: '34.6'
    text: |-
      Indien de quotumheffing op grond van het vierde lid zou zijn verschuldigd maar in het kalenderjaar
      waarover de quotumheffing wordt geheven blijkt dat de werkgever minder dan 25 vermenigvuldigd met het
      gemiddeld aantal verloonde uren per werknemer op jaarbasis in Nederland aan verloonde uren als bedoeld in
      [artikel 38b, vierde lid][ref1], in de loonaangifte op grond van de [Wet op de loonbelasting 1964][ref2] heeft
      verantwoord, is de quotumheffing niet verschuldigd.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
      [ref2]: https://wetten.overheid.nl/BWBR0002471
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0002471
  - number: '34.7'
    text: |-
      De voor de toepassing van het vierde en zesde lid in aanmerking te nemen verloonde uren worden vastgesteld op grond
      van de loonaangiften die uiterlijk op 1 mei van het jaar waarover de quotumheffing wordt geheven onderscheidenlijk
      op 1 mei van het jaar volgend op kalenderjaar waarover de quotumheffing wordt geheven zijn ingediend alsmede
      de correcties daarop die uiterlijk op die datum zijn ingediend. Hierbij worden uitsluitend loonaangiften en
      correcties in aanmerking genomen met betrekking tot het kalenderjaar voorafgaand aan het kalenderjaar waarover de
      quotumheffing wordt geheven onderscheidenlijk het kalenderjaar waarover de quotumheffing wordt geheven.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
  - number: '34.8'
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden regels gesteld ter uitvoering van het vierde en zesde lid
      die in ieder geval betrekking hebben op:
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
  - number: 34.8.a
    text: |-
      de bepaling van het gemiddeld aantal verloonde uren per werknemer op jaarbasis in Nederland in het desbetreffende
      kalenderjaar;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
  - number: 34.8.b
    text: |-
      de herleiding van het totaal aantal verloonde uren door de werkgever indien de werkgever in het desbetreffende
      kalenderjaar niet gedurende het gehele kalenderjaar de hoedanigheid van werkgever heeft gehad.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel34
  - number: '35.1'
    text: De maatstaf voor de heffing van de premie is het loon.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel35
  - number: '35.2'
    text: |-
      De maatstaf voor de quotumheffing is het aantal verloonde uren, bedoeld in [artikel 38b, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: '36.1'
    text: |-
      De gedifferentieerde premie ten behoeve van het Arbeidsongeschiktheidsfonds, bedoeld in
      [artikel 34, eerste lid][ref1], wordt bij regeling van Onze Minister vastgesteld op een percentage van het
      loon, bedoeld in [paragraaf 1 van afdeling 1][ref2] van dit hoofdstuk, waarbij voor kleine werkgevers een lager
      percentage geldt dan voor overige werkgevers en het verschil tussen het hoge en het lage percentage niet meer
      bedraagt dan 2 procentpunt.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel34
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
  - number: '36.2'
    text: |-
      Bij algemene maatregel van bestuur wordt geregeld welke werkgevers voor de toepassing van dit artikel worden
      aangemerkt als kleine werkgevers. Daarbij kunnen aanvullende criteria worden vastgesteld voor het aanmerken van een
      werkgever als kleine werkgever.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel36
  - number: '36.3'
    text: |-
      Indien een werkgever met toepassing van het bepaalde bij of krachtens de [artikelen 96][ref1] of [97][ref2] is
      aangesloten bij verschillende sectoren, wordt voor elk bedrijfsonderdeel van de werkgever waar werkzaamheden worden
      verricht die behoren tot een afzonderlijke sector het eerste en tweede lid toegepast als was dat bedrijfsonderdeel
      een afzonderlijke werkgever.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel96
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel97
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '96'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '97'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '36.4'
    text: |-
      In afwijking van het eerste en tweede lid is over een uitkering op grond van de
      [Wet werk en inkomen naar arbeidsvermogen][ref1], de [Wet op de arbeidsongeschiktheidsverzekering][ref2],
      de [Ziektewet][ref3], [hoofdstuk 3, afdeling 2, paragraaf 1][ref4],
      of de [artikelen 4:2b, eerste tot en met zesde lid][ref5], en
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref6], de [Werkloosheidswet][ref7], over
      een toeslag op grond van de [Toeslagenwet][ref8] en over het loon uit een dienstbetrekking op grond van de
      [Wet sociale werkvoorziening][ref9], het krachtens het eerste lid vastgestelde hoge percentage verschuldigd.
      Met een uitkering op grond van de Werkloosheidswet wordt gelijkgesteld een wachtgeld als bedoeld in
      [artikel 1, onderdeel r, van de Wet overheidspersoneel onder de werknemersverzekeringen][ref10].


      [ref1]: https://wetten.overheid.nl/BWBR0019057

preamble:
  text: |-
    Wij Beatrix, bij de gratie Gods, Koningin der Nederlanden, Prinses van Oranje-Nassau, enz. enz. enz.

    Allen, die deze zullen zien of horen lezen, saluut! doen te weten:

    Alzo Wij in overweging genomen hebben, dat het wenselijk is ter vermindering van administratieve en
    uitvoeringslasten en vereenvoudiging van regelgeving de heffing en invordering van de premies voor de
    werknemersverzekeringen te laten plaatsvinden door de rijksbelastingdienst tezamen met en op zoveel mogelijk
    gelijke wijze als die van de loonbelasting en de regeling daarvan en van hetgeen overigens de financiering van
    de werknemersverzekeringen betreft tezamen met de regeling van de financiering van de volksverzekeringen – onder
    intrekking van onder andere de Wet financiering volksverzekeringen – onder te brengen in één wet;

    Zo is het, dat Wij, de Raad van State gehoord, en met gemeen overleg der Staten-Generaal, hebben goedgevonden en
    verstaan, gelijk Wij goedvinden en verstaan bij deze:
  url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#ArtikelAanhef

  - number: 38c
    text: |-
      Bij regeling van Onze Minister worden werkgevers voor de toepassing van deze paragraaf en [artikel 122n][ref1]
      ingedeeld bij de sector overheid of de sector niet-overheid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel122n
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38c
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 122n
        hoofdstuk: 7a
  - number: 38d.1
    text: |-
      Het UWV draagt zorg voor de inrichting en de adequate werking van de registratie van arbeidsbeperkten en is de
      verwerkingsverantwoordelijke in de zin van artikel 4, onderdeel 7, van de Algemene verordening gegevensbescherming
      met betrekking tot de verwerking van gegevens, waaronder persoonsgegevens als bedoeld in die verordening, ten
      behoeve van deze registratie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.2
    text: |-
      Het UWV verwerkt in de registratie, bedoeld in het eerste lid, de gegevens over arbeidsbeperkten met het oog op
      het bevorderen van de arbeidsdeelname van deze personen en ten behoeve van de vaststelling van de quotumheffing,
      bedoeld in [artikel 38h][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38h
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38h
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38d.3
    text: |-
      Het college van burgemeester en wethouders verstrekt het UWV uit eigen beweging
      en verplicht op verzoek kosteloos de gegevens over de arbeidsbeperkten, bedoeld in
      [artikel 38b, eerste lid, onderdelen a, b, d en e, en tweede lid][ref1], die noodzakelijk zijn voor de
      gegevensverwerking, bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38d.4
    text: |-
      Het UWV verstrekt het college van burgemeester en wethouders en de belastingdienst uit eigen beweging en verplicht
      op verzoek kosteloos gegevens uit de registratie, bedoeld in het eerste lid, die noodzakelijk zijn voor de
      uitvoering van hun taken.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.5
    text: |-
      Het UWV is bevoegd gegevens die het verwerkt voor de uitvoering van de
      [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref1] en voor de uitvoering van de taak, bedoeld in
      [artikel 30d van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref2], te verwerken ten behoeve van de
      registratie, bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0008657
      [ref2]: https://wetten.overheid.nl/BWBR0013060#Artikel30d
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0008657
      - id: ref2
        bwb_id: BWBR0013060
        artikel: 30d
  - number: 38d.6
    text: |-
      Het UWV en de belastingdienst zijn bevoegd de gegevens, die zij verwerken in de polisadministratie op grond van
      [artikel 33 van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] tevens te verwerken voor zover
      deze noodzakelijk zijn voor de bevordering van arbeidsdeelname van arbeidsbeperkten en voor de vaststelling van de
      quotumheffing, bedoeld in [artikel 38h][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel33
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38h
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: '33'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38h
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38d.7
    text: |-
      Het UWV is bevoegd op verzoek van een werkgever aan deze mee te delen of de door de werkgever aangeduide werknemer,
      de persoon met wie hij verwacht een dienstbetrekking aan te gaan of de persoon, die onder zijn toezicht en leiding
      arbeid verricht of als bedoeld in [artikel 38g, tweede lid][ref1], ter beschikking is gesteld, op basis van het
      burgerservicenummer, is opgenomen in de registratie, bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38d.8
    text: |-
      Het college van burgemeester en wethouders en het UWV informeren de persoon op wie de gegevens betrekking
      hebben over de verwerking van zijn gegevens op grond van dit artikel voordat de gegevens worden vastgelegd in de
      registratie, bedoeld in het eerste lid, of worden verstrekt met het oog op die vastlegging, tenzij deze persoon
      redelijkerwijs hiervan kennis draagt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.9
    text: 'Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld, in ieder geval met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.9.a
    text: |-
      de inrichting, de gegevensset en de wijze van verkrijging van de gegevens ten behoeve van de registratie, bedoeld
      in het eerste lid,
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.9.b
    text: de geldigheidsduur van de registratie van de persoon en het vervallen van de registratie van de persoon, en
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.9.c
    text: |-
      de vaststelling, bedoeld in [artikel 38b, eerste lid, onderdelen a en e][ref1], ten behoeve van de opname van
      personen in de registratie, bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38d.10
    text: 'Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.10.a
    text: |-
      de ambtshalve verstrekking door het UWV van gegevens uit de registratie, bedoeld in het eerste lid, aan werkgevers
      als bedoeld in het zevende lid;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
  - number: 38d.10.b
    text: |-
      de verstrekking van gegevens aan het UWV door werkgevers als bedoeld in het zevende lid in verband met het
      verrichten van arbeid door arbeidsbeperkten als bedoeld in [artikel 38g, tweede en vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38d
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38e.1
    text: |-
      De met betrekking tot het quotumtekort, bedoeld in [artikel 38g][ref1], verschuldigde heffing wordt geheven indien
      deze op grond van [artikel 122n, eerste lid][ref2], voor de werkgever in de desbetreffende sector is geactiveerd en
      niet op grond van artikel 122n, tweede lid, niet wordt uitgevoerd.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel122n
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38e
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 122n
        hoofdstuk: 7a
  - number: 38e.2
    text: |-
      De quotumheffing wordt geheven over het kalenderjaar waarover het quotumtekort wordt vastgesteld, waarbij het
      quotumtekort wordt bepaald door het aantal arbeidsplaatsen ingevuld door arbeidsbeperkten, uitgedrukt in verloonde
      uren, ten opzichte van het totaal aantal arbeidsplaatsen, uitgedrukt in verloonde uren, in dat jaar overeenkomstig
      de berekeningsformule, bedoeld in [artikel 38g, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38e
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38e.3
    text: |-
      De voor de toepassing van het tweede lid in aanmerking te nemen verloonde uren worden vastgesteld op grond van
      de loonaangiften die uiterlijk op 1 mei van het jaar volgend op het in het tweede lid bedoelde kalenderjaar zijn
      ingediend alsmede de correcties daarop die uiterlijk op die datum zijn ingediend. Hierbij worden uitsluitend
      loonaangiften en correcties in aanmerking genomen met betrekking tot het kalenderjaar waarover het quotumtekort
      wordt vastgesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38e
  - number: 38f.1
    text: |-
      Bij regeling van Onze Minister wordt in het kalenderjaar voorafgaand aan het kalenderjaar waarover het
      quotumtekort, bedoeld in [artikel 38g][ref1], wordt bepaald, ten behoeve van de bepaling van het quotumtekort,
      bedoeld in artikel 38g, voor het desbetreffende kalenderjaar een quotumpercentage voor de sector overheid
      onderscheidenlijk de sector niet-overheid vastgesteld overeenkomstig de berekeningsformule, bedoeld in het tweede
      lid. Bij deze regeling worden de berekeningen op grond van het tweede lid die tot dit percentage hebben geleid,
      gepubliceerd. Het percentage wordt naar beneden afgerond op twee cijfers achter de komma.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
    # Umbrella machine_readable voor 38f (quotumpercentage-vaststelling).
    # Aggregeert 38f.1 (procedure: minister stelt vast bij regeling in
    # kalenderjaar t-1), 38f.2 (berekeningsformule met variabelen A-H),
    # 38f.3 en 38f.4 (delegatie naar AMvB voor variabelen A-E+H resp. F+G).
    #
    # Procedureel artikel; geen rechtstreekse berekening op persoonsniveau.
    # Modelleert wie vaststelt en wat de termijn is. De numerieke
    # berekening per 38f.2 is afhankelijk van macro-data (sectortotalen,
    # gemiddelde verloonde uren) en valt buiten persoon-scope; gemodelleerd
    # als untranslatable.
    machine_readable:
      definitions:
        afronding_decimalen_quotumpercentage:
          value: 2
        afrondingsmethode_quotumpercentage:
          value: naar_beneden
      execution:
        produces:
          legal_character: BESLUIT_VAN_ALGEMENE_STREKKING
          decision_type: ALGEMEEN_VERBINDEND_VOORSCHRIFT
        parameters:
          - name: kalenderjaar_quotumtekort
            type: number
            required: true
            description: |-
              Kalenderjaar t waarover het quotumtekort (38g) wordt bepaald.
              De vaststelling vindt plaats in t-1 (38f.1).
        output:
          - name: vaststelling_door
            type: string
            description: |-
              Bevoegd gezag dat het quotumpercentage vaststelt. Vast op
              'MINISTER_SZW'. 38f.1: 'Bij regeling van Onze Minister'.
              Onze Minister = Minister van SZW (Wfsv art. 1 onderdeel a).
          - name: instrument_vaststelling
            type: string
            description: |-
              Instrument waarmee vaststelling plaatsvindt. Vast op
              'MINISTERIELE_REGELING'. 38f.1: 'Bij regeling van Onze Minister'.
          - name: kalenderjaar_vaststelling
            type: number
            description: |-
              Kalenderjaar waarin het quotumpercentage moet worden
              vastgesteld: t-1 ten opzichte van het kalenderjaar waarover
              het quotumtekort wordt bepaald (38f.1: 'in het kalenderjaar
              voorafgaand aan').
          - name: beslissingstermijn_dagen
            type: number
            description: |-
              Uiterste termijn (in dagen vanaf 1 januari van het jaar t)
              waarbinnen vaststelling moet plaatsvinden. 38f.1 noemt geen
              expliciete dag-termijn, alleen 'in het kalenderjaar
              voorafgaand'. Modelleer-keuze: einde van kalenderjaar
              t-1 = 365 dagen (uiterste moment binnen voorafgaand jaar).
              Voor administratieve duidelijkheid; juridische termijn
              blijft 'voor afloop kalenderjaar t-1'.
          - name: afronding_decimalen
            type: number
            description: |-
              Aantal decimalen waarop het quotumpercentage wordt afgerond.
              38f.1 laatste volzin: 'twee cijfers achter de komma'.
          - name: afrondingsmethode
            type: string
            description: |-
              Methode van afronden. 38f.1: 'naar beneden afgerond'.
              Vast op 'naar_beneden'.
          - name: publicatieplicht_berekening
            type: boolean
            description: |-
              Verplichting tot publicatie van de onderliggende berekeningen
              (38f.1 tweede volzin: 'worden de berekeningen ... gepubliceerd').
              Vast op TRUE.
          - name: variabelen_amvb_38f_3
            type: string
            description: |-
              Variabelen uit formule 38f.2 waarvoor 38f.3 nadere regels bij
              AMvB delegeert: 'A,B,C,D,E,H' (en mogelijkheid om categorieën
              werknemers van variabele D af te trekken). Comma-separated
              omdat het engine-action-formaat geen array-literal kent.
          - name: variabelen_amvb_38f_4
            type: string
            description: |-
              Variabelen uit formule 38f.2 waarvoor 38f.4 nadere regels bij
              AMvB delegeert, met voorhang-procedure (vier weken aan beide
              kamers): 'F,G'. Comma-separated.
        actions:
          - output: vaststelling_door
            value: MINISTER_SZW
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: |-
                'Bij regeling van Onze Minister wordt ... vastgesteld'.
                Onze Minister = Minister van SZW (Wfsv 1 onderdeel a).
          - output: instrument_vaststelling
            value: MINISTERIELE_REGELING
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: "'Bij regeling van Onze Minister' = ministeriële regeling."
          - output: kalenderjaar_vaststelling
            value:
              operation: SUBTRACT
              values:
                - $kalenderjaar_quotumtekort
                - 1
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: |-
                '... in het kalenderjaar voorafgaand aan het kalenderjaar
                waarover het quotumtekort ... wordt bepaald'.
          - output: beslissingstermijn_dagen
            value: 365
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: |-
                38f.1 noemt 'in het kalenderjaar voorafgaand' zonder
                expliciete dag-termijn. Modelleer-keuze: 365 dagen
                (uiterste moment t-1). Schrikkeljaren niet apart
                gemodelleerd; juridisch is de term het einde van t-1.
          - output: afronding_decimalen
            value: $afronding_decimalen_quotumpercentage
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: "'twee cijfers achter de komma'."
          - output: afrondingsmethode
            value: $afrondingsmethode_quotumpercentage
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: "'naar beneden afgerond'."
          - output: publicatieplicht_berekening
            value: true
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '1'
              explanation: |-
                Tweede volzin: 'Bij deze regeling worden de berekeningen
                op grond van het tweede lid die tot dit percentage hebben
                geleid, gepubliceerd.'
          - output: variabelen_amvb_38f_3
            value: A,B,C,D,E,H
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '3'
              explanation: |-
                'Bij of krachtens algemene maatregel van bestuur worden
                nadere regels gesteld met betrekking tot de variabelen A
                tot en met E en H van de formule, bedoeld in het tweede lid.'
          - output: variabelen_amvb_38f_4
            value: F,G
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38f
              paragraph: '4'
              explanation: |-
                'Bij of krachtens algemene maatregel van bestuur worden
                nadere regels gesteld met betrekking tot de variabelen F
                en G van de formule, bedoeld in het tweede lid.' Met
                voorhang-procedure (vier weken aan beide kamers).
      untranslatables:
        - construct: 'berekeningsformule quotumpercentage (38f.2 — variabelen A t/m H)'
          reason: |-
            38f.2 bevat de berekeningsformule met acht variabelen (A t/m H)
            voor macro-vaststelling per sector (overheid/niet-overheid).
            De feitelijke formule (in de wet aangeduid met 'overeenkomstig
            de volgende formule:') is niet als algebraïsche expressie
            opgenomen in de YAML-articles-array — alleen de variabel-
            definities (38f.2.A t/m 38f.2.H). De formule zelf is in de
            geconsolideerde wettekst typografisch weergegeven en niet
            machine-leesbaar overgenomen in het corpus. Bovendien werken
            de variabelen op macro-niveau (sector totaal aantal banen,
            gemiddeld aantal verloonde uren) — geen persoon-scope.
            Voor de banenafspraak-doelgroepregister-iteratie van het
            financieel CV is deze berekening niet relevant; pas-toe-of-
            leg-uit: niet gemodelleerd, expliciet als untranslatable
            gemarkeerd.
          legal_text_excerpt: 'De quotumpercentages worden berekend overeenkomstig de volgende formule:'
          suggestion: |-
            Latere iteratie: variabelen A-H modelleren als open_terms en
            de AMvB (38f.3/38f.4) als implements-artikel, met de formule
            als ADD/SUBTRACT/MULTIPLY/DIVIDE-keten zodra de formule
            tekstueel in het corpus is opgenomen.
          accepted: true
        - construct: 'AMvB-delegatie variabelen A-E en H (38f.3)'
          reason: |-
            38f.3 delegeert nadere regels voor variabelen A-E en H naar
            AMvB. Concrete getallen / categorieën zitten niet in deze
            wet. Engine output variabelen_amvb_38f_3 is pass-through
            van de delegatie-set.
          accepted: true
        - construct: 'AMvB-delegatie variabelen F en G met voorhang (38f.4)'
          reason: |-
            38f.4 delegeert variabelen F en G naar AMvB met voorhang-
            procedure (vier weken aan beide kamers). Procedurele
            voorhang-bewaking valt buiten engine-scope; alleen het feit
            van delegatie is hier gemodelleerd.
          accepted: true
        - construct: 'beslissingstermijn als kalenderjaar t-1 ipv concrete dag-termijn'
          reason: |-
            38f.1 noemt geen dag-termijn maar 'in het kalenderjaar
            voorafgaand'. Engine modelleert dit als 365 dagen
            (uiterste moment binnen t-1). De juridisch bindende termijn
            blijft 'voor afloop kalenderjaar t-1'; afnemers moeten
            kalenderjaar_vaststelling i.c.m. eindjaar interpreteren.
          accepted: true
  - number: 38f.2
    text: 'De quotumpercentages worden berekend overeenkomstig de volgende formule: waarbij:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
  - number: 38f.2.A
    text: |-
      = totaal aantal banen bij werkgevers die op grond van artikel 34, derde en vierde lid, quotumheffing zijn
      verschuldigd, die worden vervuld door arbeidsbeperkten als bedoeld in [artikel 38b, eerste en zesde lid][ref1] op
      grond van de nulmeting op 1 januari 2013 in de sector overheid onderscheidenlijk de sector niet-overheid


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38f.2.B
    text: |-
      = het aantal extra banen voor arbeidsbeperkten als bedoeld in [artikel 38b, eerste en zesde lid][ref1] bij
      werkgevers dat dient te worden gerealiseerd vanaf het kalenderjaar 2015 overeenkomstig het sociaal akkoord voor de
      sector overheid onderscheidenlijk de sector niet-overheid


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38f.2.C
    text: |-
      = het gemiddeld aantal verloonde uren van arbeidsbeperkten als bedoeld in [artikel 38b, eerste en zesde lid][ref1]
      in de sector overheid en de sector niet-overheid tezamen


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38f.2.D
    text: |-
      = het totaal aantal banen bij werkgevers in de sector overheid onderscheidenlijk de sector niet-overheid die op
      grond van [artikel 34, derde en vierde lid][ref1], quotumheffing zijn verschuldigd


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel34
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
  - number: 38f.2.E
    text: |-
      = het gemiddeld aantal verloonde uren van een werknemer bij werkgevers in de sector overheid en de sector niet-
      overheid tezamen die op grond van [artikel 34, derde en vierde lid][ref1], quotumheffing zijn verschuldigd


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel34
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
  - number: 38f.2.F
    text: |-
      = het aantal arbeidsbeperkten, bedoeld in [artikel 38b, tweede en zesde lid][ref1], bij werkgevers die op grond van
      [artikel 34, derde en vierde lid][ref2], quotumheffing zijn verschuldigd, in de sector overheid onderscheidenlijk
      de sector niet-overheid


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel34
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
  - number: 38f.2.G
    text: |-
      = het gemiddeld aantal verloonde uren van arbeidsbeperkten als bedoeld in [artikel 38b, tweede en zesde lid][ref1],
      in de sector overheid onderscheidenlijk de sector niet-overheid tezamen die op grond van
      [artikel 34, derde en vierde lid][ref2], quotumheffing zijn verschuldigd


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel34
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
  - number: 38f.2.H
    text: |-
      = het aantal gerealiseerde extra banen voor arbeidsbeperkten bij werkgevers als bedoeld in
      [artikel 34, vierde en zesde lid][ref1], in de sector overheid onderscheidenlijk de sector niet-overheid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel34
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
  - number: 38f.3
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld met betrekking tot de variabelen A tot
      en met E en H van de formule, bedoeld in het tweede lid. Hierbij kunnen categorieën werknemers worden aangewezen
      waarvan de banen in mindering worden gebracht op het totaal aantal banen, bedoeld in het tweede lid met betrekking
      tot variabele D.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
  - number: 38f.4
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld met betrekking tot de variabelen F
      en G van de formule, bedoeld in het tweede lid. De voordracht voor een krachtens de vorige volzin vast te stellen
      algemene maatregel van bestuur wordt niet eerder gedaan dan vier weken nadat het ontwerp aan beide kamers der
      Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
  - number: 38f.5
    text: |-
      Bij regeling van Onze Minister kunnen werknemers in bepaalde soorten dienstbetrekkingen voor de toepassing van het
      eerste en tweede lid en [artikel 122n, eerste en tweede lid][ref1], worden gelijkgesteld met arbeidsbeperkten.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel122n
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 122n
        hoofdstuk: 7a
  - number: 38f.6
    text: |-
      Ten aanzien van de werknemers, bedoeld in het vijfde lid, is deze afdeling, alsmede
      [artikel 38b, eerste lid, onderdeel f][ref1], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38f
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38g.1
    text: |-
      Ten behoeve van de vaststelling van de quotumheffing, bedoeld in [artikel 38h][ref1], wordt het quotumtekort per
      werkgever bepaald overeenkomstig de berekeningsformule, bedoeld in het derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38h
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38h
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38g.2
    text: |-
      Voor de toepassing van dit artikel wordt niet als werknemer en niet als arbeidsbeperkte beschouwd de persoon die
      arbeid verricht in een dienstbetrekking in de zin van [artikel 2 van de Wet sociale werkvoorziening][ref1], tenzij
      deze persoon op grond van het vierde lid is aangewezen en aan de werkgever ter beschikking is gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Artikel2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
    references:
      - id: ref1
        bwb_id: BWBR0008903
        artikel: '2'
  - number: 38g.3
    text: 'Het quotumtekort wordt berekend overeenkomstig de volgende formule: waarbij:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.3.A
    text: |-
      = totaal verloonde uren van werknemers bij de werkgever in het kalenderjaar waarover het quotumtekort wordt
      vastgesteld
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.3.B
    text: |-
      = het quotumpercentage dat op grond van [artikel 38f, eerste lid][ref1], is vastgesteld voor het kalenderjaar in de
      sector overheid onderscheidenlijk de sector niet-overheid waartoe de werkgever behoort


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38f
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38f
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38g.3.C
    text: |-
      = aantal verloonde uren bij de werkgever van arbeidsbeperkten in het kalenderjaar waarover het quotumtekort wordt
      vastgesteld
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.3.D
    text: |-
      = het gemiddeld aantal verloonde uren van arbeidsbeperkten op jaarbasis in de sector overheid en de sector niet-
      overheid tezamen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.4
    text: |-
      Bij algemene maatregel van bestuur worden categorieën arbeidsbeperkten die aan de werkgever ter beschikking zijn
      gesteld om voor hem onder zijn toezicht en leiding arbeid te verrichten aangewezen, die overeenkomstig bij of
      krachtens die maatregel te stellen regels worden beschouwd als werknemers en arbeidsbeperkten waarop het derde
      lid van toepassing is. Deze categorieën arbeidsbeperkten worden voor de toepassing van het derde lid niet geacht
      in dienstbetrekking te staan tot de werkgever die deze arbeidsbeperkten ter beschikking heeft gesteld. Bij of
      krachtens deze maatregel worden in verband met dit lid nadere regels gesteld voor de toepassing van het derde lid.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.5
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen categorieën werknemers worden aangewezen ten aanzien waarvan
      de verloonde uren in mindering worden gebracht op het totaal aantal verloonde uren, bedoeld in het derde lid, met
      betrekking tot variabele A.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.6
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld omtrent de wijze waarop een
      quotumtekort wordt bepaald.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.7
    text: |-
      Bij de gegevensverwerking die nodig is op grond van het vierde en vijfde lid kan door de werkgever die de
      arbeidsbeperkten ter beschikking stelt en de werkgever aan wie deze arbeidsbeperkten ter beschikking zijn gesteld
      om onder zijn toezicht en leiding arbeid te verrichten, het burgerservicenummer worden gebruikt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38g.8
    text: |-
      Ingeval de periode waarin een werknemer arbeidsbeperkte is, in de loop van een aangiftetijdvak voor de
      loonbelasting begint of eindigt, worden bij de berekening van het quotumtekort tevens de verloonde uren in
      aanmerking genomen bij die werkgever in het buiten die periode vallende deel van het aangiftetijdvak waarin die
      periode begint of eindigt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38g
  - number: 38h.1
    text: |-
      De inspecteur stelt bij voor bezwaar vatbare beschikking de quotumheffing vast voor de werkgever, ten aanzien van
      wie een quotumtekort als bedoeld in [artikel 38g][ref1] is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38h.2
    text: 'De beschikking bevat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.2.a
    text: |-
      de vaststelling dat de werkgever quotumheffing is verschuldigd op grond van [artikel 34, derde en vierde lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel34
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
  - number: 38h.2.b
    text: het kalenderjaar waarover het quotumtekort is vastgesteld waarop de beschikking betrekking heeft;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.2.c
    text: het totale aantal verloonde uren bij de werkgever in het kalenderjaar waarover het quotumtekort is vastgesteld;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.2.d
    text: het aantal van die verloonde uren dat wordt ingevuld door arbeidsbeperkten;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.2.e
    text: |-
      de berekening van het quotumtekort, bedoeld in [artikel 38g, derde lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38g
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38g
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38h.2.f
    text: het bedrag van de quotumheffing.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.3
    text: |-
      De vaststelling van de quotumheffing vindt plaats vóór 1 november volgend op het kalenderjaar waarover het
      quotumtekort wordt vastgesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.4
    text: De quotumheffing bedraagt het quotumtekort vermenigvuldigd met € 5.000.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.5
    text: |-
      De inspecteur is bevoegd tot herziening van een beschikking op grond van dit artikel indien enig feit grond
      oplevert voor het vermoeden dat de beschikking is gegeven op grond van onjuiste of onvolledige gegevens. Een
      herziening ten nadele van de werkgever is uitsluitend mogelijk indien deze tekortkoming een gevolg is van een feit
      dat aan de werkgever of de gewezen werkgever kan worden toegerekend of redelijkerwijs kenbaar had kunnen zijn. De
      inspecteur stelt de herziening vast bij voor bezwaar vatbare beschikking. De bevoegdheid tot herziening vervalt
      door verloop van 5 jaren na het einde van het kalenderjaar waarop de beschikking betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.6
    text: |-
      Beschikkingen van de inspecteur op grond van dit artikel worden genomen gehoord het UWV en in overeenstemming met
      het UWV.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
  - number: 38h.7
    text: |-
      Op het bezwaar, beroep, hoger beroep en beroep in cassatie inzake de beschikking is
      [hoofdstuk V van de Algemene wet inzake rijksbelastingen][ref1] van overeenkomstige toepassing. Het bezwaar,
      beroep, hoger beroep en beroep in cassatie inzake de beschikking kan niet zijn gegrond op de grief dat een
      werknemer niet is opgenomen in de registratie, bedoeld in [artikel 38d][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0002320#HoofdstukV
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38d
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
    references:
      - id: ref1
        bwb_id: BWBR0002320
        hoofdstuk: V
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38d
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: 38h.8
    text: |-
      [Paragraaf 4.1.3.2 van de Algemene wet bestuursrecht][ref1] is niet van toepassing ten aanzien van de beslissing
      van de inspecteur naar aanleiding van het bezwaar tegen de beschikking, bedoeld in het eerste en vijfde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Paragraaf4.1.3.2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38h
    references:
      - id: ref1
        bwb_id: BWBR0005537
        paragraaf: 4.1.3.2
  - number: 38i.1
    text: |-
      De inspecteur stelt de beschikking ter invordering van de daaruit blijkende quotumheffing aan de ontvanger ter
      hand. Onverminderd het overigens in deze paragraaf bepaalde geschiedt de invordering van de quotumheffing met
      toepassing van de [Invorderingswet 1990][ref1] en de [Kostenwet invordering rijksbelastingen][ref2] als ware die
      heffing een rijksbelasting.


      [ref1]: https://wetten.overheid.nl/BWBR0004770
      [ref2]: https://wetten.overheid.nl/BWBR0002645
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38i
    references:
      - id: ref1
        bwb_id: BWBR0004770
      - id: ref2
        bwb_id: BWBR0002645
  - number: 38i.2
    text: De beschikking is invorderbaar zes weken na de dagtekening van de beschikking.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38i
  - number: 38j
    text: De belastingdienst is belast met de heffing van de quotumheffing en de invordering van deze heffing.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38j
  - number: '39'
    text: |-
      Onze Minister kan bedragen vaststellen die jaarlijks of in het desbetreffende jaar als rijksbijdrage als bedoeld in
      [artikel 114, onderdeel f][ref1], ten gunste komen van het Arbeidsongeschiktheidsfonds.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel114
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel39
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '114'
        hoofdstuk: '7'
        paragraaf: '2'
        afdeling: '3'
  - number: '40.1'
    text: |-
      De inspecteur verleent overeenkomstig deze afdeling aan een werkgever op aanvraag bij voor bezwaar vatbare
      beschikking toestemming om zelf het risico te dragen van betaling van:
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: 40.1.a
    text: |-
      het ziekengeld aan de personen, bedoeld in [artikel 29, tweede lid, onderdelen a, b en c, van de Ziektewet][ref1],
      die laatstelijk tot de werkgever in dienstbetrekking stonden en de overlijdensuitkeringen op grond van die wet aan
      nabestaanden van deze personen; of


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
  - number: 40.1.b
    text: |-
      de WGA-uitkeringen en de overlijdensuitkeringen overeenkomstig
      [hoofdstuk 9 van de Wet werk en inkomen naar arbeidsvermogen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '9'
  - number: '40.2'
    text: |-
      De werkgever legt bij een aanvraag als bedoeld in het eerste lid, onderdeel b, een schriftelijke garantie over
      waaruit blijkt dat een bank of een verzekeraar zich jegens het UWV verplicht, op het eerste verzoek van het UWV
      waarbij het UWV schriftelijk meedeelt dat de verplichtingen die voortvloeien uit het zelf dragen van het risico
      niet worden nagekomen, die verplichtingen na te komen. Bij regeling van Onze Minister, in overeenstemming met Onze
      Minister van Financiën, kan een model worden gegeven dat wordt gehanteerd voor de garantie, bedoeld in de eerste
      zin.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.3'
    text: |-
      De overheidswerkgever, bedoeld in
      [artikel 1, onderdeel k, van de Wet overheidspersoneel onder de werknemersverzekeringen][ref1], voorzover deze door
      Onze Minister in overeenstemming met Onze Minister van Financiën is aangewezen, is ontheven van de verplichting tot
      het overleggen van een schriftelijke garantie als bedoeld in het tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0009267#Artikel1
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0009267
        artikel: '1'
  - number: '40.4'
    text: |-
      De in het eerste lid bedoelde toestemming wordt niet verleend gedurende drie jaren nadat het door de werkgever zelf
      dragen van het desbetreffende in het eerste lid bedoelde risico is beëindigd of geëindigd.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.5'
    text: |-
      Onder een bank als bedoeld in het tweede lid wordt verstaan een financiële onderneming die ingevolge de
      [Wet op het financieel toezicht][ref1] in Nederland het bedrijf van bank mag uitoefenen.


      [ref1]: https://wetten.overheid.nl/BWBR0020368
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0020368
  - number: '40.6'
    text: |-
      Onder een verzekeraar als bedoeld in het tweede lid wordt verstaan een financiële onderneming die ingevolge de
      [Wet op het financieel toezicht][ref1] in Nederland het bedrijf van levensverzekeraar of schadeverzekeraar mag
      uitoefenen.


      [ref1]: https://wetten.overheid.nl/BWBR0020368
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0020368
  - number: '40.7'
    text: |-
      De garantie, bedoeld in het tweede lid, wordt voor onbepaalde tijd gegeven. Deze garantie strekt zich uit tot
      rechtsopvolgers onder algemene titel van de eigenrisicodrager en tot het risico dat overgaat op de verkrijgende
      werkgever, bedoeld in [artikel 82, derde lid, van de Wet werk en inkomen naar arbeidsvermogen][ref1]. Deze
      garantie kan door de desbetreffende bank of verzekeraar niet worden beëindigd zonder schriftelijke opzegging bij
      de inspecteur.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
  - number: '40.8'
    text: |-
      De garantie, bedoeld in het tweede lid, strekt zich niet uit tot een WGA-uitkering ter
      zake van ongeschiktheid tot werken die is ontstaan door een omstandigheid als bedoeld in
      [artikel 3:38 van de Wet op het financieel toezicht][ref1], door een omstandigheid die het gevolg is van een of
      meer terroristische handelingen voor zover de totale schade die in een kalenderjaar ten gevolge van dergelijke
      handelingen bij schade- of levensverzekeraars waarop de [Wet op het financieel toezicht][ref2] van toepassing is,
      zal worden gedeclareerd, naar verwachting van de Nederlandse Herverzekeringsmaatschappij voor Terrorismeschaden
      N.V. hoger zal zijn dan het door die maatschappij herverzekerde maximumbedrag per kalenderjaar, of door een
      kernongeval als bedoeld in [artikel 1, eerste lid, van de Wet aansprakelijkheid kernongevallen][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0020368#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0020368
      [ref3]: https://wetten.overheid.nl/BWBR0003234#Artikel1
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0020368
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0020368
      - id: ref3
        bwb_id: BWBR0003234
        artikel: '1'
  - number: '40.9'
    text: |-
      De toestemming, bedoeld in het eerste lid, wordt door de inspecteur verleend met ingang van 1 januari of 1 juli van
      enig jaar, mits de aanvraag ten minste dertien weken voor de desbetreffende datum is ingediend. Aan een startende
      werkgever wordt op zijn verzoek toestemming verleend met ingang van het tijdstip waarop deze aanvangt werkgever
      te zijn.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.10'
    text: 'Het door de werkgever zelf dragen van het risico, bedoeld in het eerste lid:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: 40.10.a
    text: |-
      eindigt met ingang van de dag waarop de schriftelijke garantie, bedoeld in het tweede lid, eindigt,
      onderscheidenlijk met ingang van de dag waarop de eigenrisicodrager in staat van faillissement is verklaard of ten
      aanzien van hem de schuldsaneringsregeling natuurlijke personen van toepassing is verklaard dan wel de dag waarop
      hij ophoudt werkgever te zijn;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: 40.10.b
    text: |-
      wordt door de inspecteur op 1 januari of 1 juli van enig jaar beëindigd bij voor bezwaar vatbare beschikking op
      aanvraag van de werkgever, mits deze aanvraag ten minste dertien weken voor de desbetreffende datum is ingediend.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.11'
    text: |-
      In een geval als bedoeld in het tiende lid, onderdeel a, doet de inspecteur daarvan op verzoek van de werkgever
      mededeling bij voor bezwaar vatbare beschikking.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.12'
    text: |-
      De inspecteur is bevoegd tot intrekking van de beschikking, bedoeld in het eerste lid, indien enig feit grond
      oplevert voor het vermoeden dat de beschikking is verleend op grond van onjuiste of onvolledige gegevens en deze
      tekortkoming een gevolg is van een feit dat aan de werkgever of de gewezen werkgever kan worden toegerekend of
      redelijkerwijs kenbaar had kunnen zijn. De inspecteur stelt de intrekking van de beschikking vast bij voor bezwaar
      vatbare beschikking. De bevoegdheid tot intrekking werkt uiterlijk terug tot en met 1 januari van enig jaar waarop
      de beschikking betrekking heeft en vervalt door verloop van 5 jaren na het einde van het kalenderjaar waarop de
      beschikking betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.13'
    text: |-
      Indien de periode, bedoeld in [artikel 83, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen][ref1]
      wordt gewijzigd in die zin dat de wijziging een verlenging van de periode betekent, legt de werkgever
      die zelf het risico draagt van betaling de van de WGA-uitkering en de overlijdensuitkering, bedoeld in
      [artikel 74, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen][ref2], binnen een bij ministeriële
      regeling te bepalen termijn, een schriftelijke garantie over aan de inspecteur waaruit blijkt dat een bank of een
      verzekeraar zich jegens het UWV verplicht, op het eerste verzoek van het UWV, waarbij het UWV schriftelijk meedeelt
      dat de verplichtingen die voortvloeien uit het zelf dragen van het risico niet worden nagekomen, die verplichtingen
      na te komen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel83
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel74
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '83'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '74'
  - number: '40.14'
    text: |-
      Indien niet of niet tijdig wordt voldaan aan het dertiende lid, eindigt het door de werkgever zelf dragen van het
      risico, bedoeld in het eerste lid, onderdeel b, met ingang van de dag waarop de wijziging van de periode, bedoeld
      in [artikel 83, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen][ref1] in werking treedt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel83
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '83'
  - number: '40.15'
    text: Bij ministeriële regeling kunnen met betrekking tot het dertiende en veertiende lid nadere regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.16'
    text: |-
      Beschikkingen van de inspecteur op grond van deze afdeling worden genomen gehoord het UWV en in overeenstemming met
      het UWV.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '40.17'
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat de toestemming, bedoeld in het negende lid, eerste zin,
      en de beëindiging, bedoeld in het tiende lid, onderdeel b, uitsluitend wordt verleend onderscheidenlijk plaatsvindt
      met ingang van 1 januari van enig jaar. Bij regeling van Onze Minister, in overeenstemming met Onze Minister van
      Financiën, kan in bijzondere omstandigheden de termijn van dertien weken, bedoeld in het negende lid, eerste zin,
      en het tiende lid, onderdeel b, worden ingekort.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel40
  - number: '41.1'
    text: |-
      De eigenrisicodrager met betrekking tot de WGA-uitkering bedoeld in [artikel 40, eerste lid, onderdeel b][ref1], en
      de startende werkgever, bedoeld in [artikel 40, negende lid][ref2], die in afwachting is van de door de inspecteur
      te nemen beslissing op aanvraag, bedoeld in [artikel 40, eerste lid, onderdeel b][ref3], kunnen de bij ministeriële
      regeling genoemde kosten met betrekking tot een werknemer ten behoeve van eigenrisicodragen onder bij ministeriële
      regeling te bepalen voorwaarden, tot ten hoogste de helft verhalen op de werknemer.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel41
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: '41.2'
    text: |-
      De eigenrisicodrager die ter dekking van het risico, bedoeld in [artikel 40, eerste lid][ref1], een verzekering
      heeft afgesloten mag de door hem ter zake van die verzekering verschuldigde premie niet verhalen op de werknemer
      voorzover dit niet voortvloeit uit het eerste lid. Elk beding waarbij wordt afgeweken van de eerste zin is nietig.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel41
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: '42.1'
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden regels gesteld voor de vaststelling van de gedifferentieerde
      premie, bedoeld in [artikel 38][ref1], ingeval van eigenrisicodragen op grond van [artikel 40, eerste lid][ref2],
      en ingeval artikel 40, negende lid, voor de startende werkgever van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '38'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: '42.2'
    text: Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot deze afdeling.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel42
  - number: '43'
    text: |-
      Aan een gemeente of een bestuur van een openbaar lichaam ingevolge een gemeenschappelijke regeling als bedoeld
      in [artikel 1, tweede lid, van de Wet sociale werkvoorziening][ref1] wordt geen toestemming verleend als bedoeld
      in [artikel 40, eerste lid, aanhef en onderdeel b][ref2], ten aanzien van werknemers die werkzaam zijn in een
      dienstbetrekking op grond van de [Wet sociale werkvoorziening][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref3]: https://wetten.overheid.nl/BWBR0008903
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0008903
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0008903
  - number: '56.1'
    text: |-
      De premies, bedoeld in [artikel 34][ref1], zijn niet verschuldigd over het loon van personen voorzover zij
      werknemer zijn op grond van [artikel 4, eerste lid, onderdeel i of j, van de Ziektewet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel34
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel4
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel56
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '4'
  - number: '56.2'
    text: |-
      De uitkeringen op grond van de [Ziektewet][ref1] en de [Wet werk en inkomen naar arbeidsvermogen][ref2] uit hoofde
      van een dienstbetrekking als bedoeld in [artikel 4, eerste lid, onderdelen i en j, van de Ziektewet][ref3], de
      daaraan verbonden uitvoeringskosten alsmede de op grond van enige wet over die uitkeringen verschuldigde premies
      en de vergoeding, bedoeld in [artikel 46 van de Zorgverzekeringswet][ref4] die niet op die uitkeringen in mindering
      kunnen worden gebracht, komen ten laste van het Rijk.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0019057
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0018450#Artikel46
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel56
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0019057
      - id: ref3
        bwb_id: BWBR0001888
        artikel: '4'
      - id: ref4
        bwb_id: BWBR0018450
        artikel: '46'
  - number: '56.3'
    text: |-
      Ten laste van het Rijk komen voorts de kosten die rechtstreeks verband houden met de uitvoering van
      [artikel 30a, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] ten aanzien van een betrokkene,
      indien deze ten tijde van het aanvangen van de werkzaamheden van het re-integratiebedrijf, bedoeld in het achtste
      lid van dat artikel, een uitkering als bedoeld in het tweede lid ontvangt ten laste van het Rijk.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel56
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: '57'
    text: De rijksbelastingdienst heft de premie voor de volksverzekeringen en de premies voor de werknemersverzekeringen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel57
  - number: '58.1'
    text: |-
      De premie voor de volksverzekeringen wordt, onverminderd het tweede lid en onder verrekening van de krachtens
      dat lid geheven premie, bij wege van aanslag geheven met overeenkomstige toepassing van de voor de heffing van
      de inkomstenbelasting geldende regels, met uitzondering van [artikel 10a.28 van de Wet inkomstenbelasting 2001]
      (onbekend).
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel58
  - number: '58.2'
    text: |-
      Voorzover de premieplichtige van een inhoudingsplichtige loon geniet in de zin van de
      [Wet op de loonbelasting 1964][ref1], wordt de premie voor de volksverzekeringen bij wijze van inhouding geheven
      met overeenkomstige toepassing van de voor de heffing van de loonbelasting geldende regels.


      [ref1]: https://wetten.overheid.nl/BWBR0002471
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0002471
  - number: '58.3'
    text: |-
      Voorzover de premieplichtige aan de loonbelasting is onderworpen op grond van
      [artikel 5a van de Wet op de loonbelasting 1964][ref1] is het tweede lid niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel5a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0002471
        artikel: 5a
  - number: '59.1'
    text: |-
      De premies voor de werknemersverzekeringen worden geheven met overeenkomstige toepassing van de voor de heffing
      van de loonbelasting geldende regels. [Artikel 32d van de Wet op de loonbelasting 1964][ref1] is slechts van
      overeenkomstige toepassing indien degene aan wie het loon wordt afgestaan, werkgever van de werknemer is. De
      werkgever is tevens gehouden, al dan niet op verzoek van de inspecteur, door middel van een correctiebericht als
      bedoeld in [artikel 28a, tweede lid, van de Wet op de loonbelasting 1964][ref2] de gegevens die noodzakelijk zijn
      ten behoeve van de vaststelling van het premiepercentage, bedoeld in [artikel 27, eerste lid][ref3], te verstrekken
      indien er sprake is van een geval als bedoeld in artikel 27, eerste lid, waarin met terugwerkende kracht de hoge
      premie van toepassing is. Bij de toepassing van de derde zin is artikel 28a, derde tot en met zevende lid, van de
      Wet op de loonbelasting 1964 van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel32d
      [ref2]: https://wetten.overheid.nl/BWBR0002471#Artikel28a
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel27
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0002471
        artikel: 32d
      - id: ref2
        bwb_id: BWBR0002471
        artikel: 28a
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '27'
        hoofdstuk: '3'
        paragraaf: '5'
        afdeling: '2'
  - number: '59.2'
    text: |-
      In de uitnodiging tot het doen van aangifte, bedoeld in
      [artikel 7, eerste lid, van de Algemene wet inzake rijksbelastingen][ref1], kan mede opgave
      worden verlangd van gegevens die noodzakelijk zijn ten behoeve van de vaststelling van de
      premiepercentages, bedoeld in de [artikelen 27][ref2], [31][ref3], [36][ref4] en [38][ref5],
      alsmede ten behoeve van de doelen van de gegevensverwerking in de polisadministratie, bedoeld in
      [artikel 33, tweede lid, onderdelen a en e, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref6],
      waarbij met betrekking tot die verlangde gegevens de regels die gelden voor de heffing van de loonbelasting van
      overeenkomstige toepassing zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0002320#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel27
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel31
      [ref4]: https://wetten.overheid.nl/BWBR0017745#Artikel36
      [ref5]: https://wetten.overheid.nl/BWBR0017745#Artikel38
      [ref6]: https://wetten.overheid.nl/BWBR0013060#Artikel33
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0002320
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '27'
        hoofdstuk: '3'
        paragraaf: '5'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '31'
        hoofdstuk: '3'
        afdeling: '3'
      - id: ref4
        bwb_id: BWBR0017745
        artikel: '36'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
      - id: ref5
        bwb_id: BWBR0017745
        artikel: '38'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
      - id: ref6
        bwb_id: BWBR0013060
        artikel: '33'
  - number: '59.3'
    text: |-
      De inspecteur beslist ambtshalve of op verzoek van de werkgever bij voor bezwaar vatbare beschikking over het
      verzekerd zijn op grond van de werknemersverzekeringen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
  - number: '59.4'
    text: |-
      De inspecteur is bevoegd tot herziening van de beschikking, bedoeld in het derde lid, indien enig feit grond
      oplevert voor het vermoeden dat de beschikking is verleend op grond van onjuiste of onvolledige gegevens en deze
      tekortkoming een gevolg is van een feit dat aan de werkgever kan worden toegerekend of redelijkerwijs kenbaar
      had kunnen zijn. De inspecteur stelt de herziening van de beschikking vast bij voor bezwaar vatbare beschikking.
      De bevoegdheid tot herziening werkt uiterlijk terug tot en met 1 januari van enig jaar waarop de beschikking
      betrekking heeft en vervalt door verloop van 5 jaren na het einde van het kalenderjaar waarop de beschikking
      betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
  - number: '59.5'
    text: |-
      Op het beroep van de werkgever tegen de uitspraak op bezwaar van de inspecteur op grond van de [artikelen 40][ref1],
      [95][ref2] of [97][ref3] is [hoofdstuk V, afdeling 2, van de Algemene wet inzake rijksbelastingen][ref4] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel95
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel97
      [ref4]: https://wetten.overheid.nl/BWBR0002320#Afdeling2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '95'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '97'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref4
        bwb_id: BWBR0002320
        afdeling: '2'
  - number: '59.6'
    text: |-
      De inspecteur stelt de werkgever zonodig op de hoogte van de door het UWV op aanvraag van de werknemer genomen
      beschikking over het verzekerd zijn op grond van de werknemersverzekeringen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
  - number: '59.7'
    text: |-
      Indien in verband met een gevraagde beschikking informatie is gevraagd aan een persoon of
      instantie buiten Nederland en om die reden de beschikking niet binnen de termijn, bedoeld in
      [afdeling 4.1.3 van Algemene wet bestuursrecht][ref1], gegeven kan worden, wordt die termijn verlengd met ten
      hoogste zes maanden en wordt de aanvrager van deze verlenging schriftelijk in kennis gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling4.1.3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: 4.1.3
  - number: '59.8'
    text: |-
      In afwijking van de [artikelen 25][ref1], [30][ref2] en [34, eerste lid][ref3], en met overeenkomstige toepassing
      van [artikel 13bis, elfde en vijftiende lid, van de Wet op de loonbelasting 1964][ref4], is de premie door
      de werknemer verschuldigd in de gevallen, bedoeld in artikel 13bis, elfde en vijftiende lid, van de Wet op de
      loonbelasting 1964.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel30
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel34
      [ref4]: https://wetten.overheid.nl/BWBR0002471#Artikel13bis
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '25'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '30'
        hoofdstuk: '3'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '34'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '4'
      - id: ref4
        bwb_id: BWBR0002471
        artikel: 13bis
  - number: '59.9'
    text: |-
      Het zevende lid is van overeenkomstige toepassing op een aanvraag als bedoeld in het derde lid en op een aanvraag
      of melding op grond van de [artikelen 40][ref1], [95][ref2] of [97][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel95
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel97
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '95'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '97'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '60.1'
    text: |-
      De rijksbelastingdienst vordert de premie voor de volksverzekeringen en de premies voor de werknemersverzekeringen
      in.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel60
  - number: '60.2'
    text: |-
      Bij de invordering van de premie voor de volksverzekeringen zijn, naar gelang
      [artikel 58, eerste lid, dan wel tweede lid][ref1] van toepassing is, de regels geldende voor de invordering van de
      inkomstenbelasting onderscheidenlijk de loonbelasting van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel58
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel60
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '58'
        hoofdstuk: '4'
        paragraaf: '1'
  - number: '60.3'
    text: |-
      Bij de invordering van de premies voor de werknemersverzekeringen zijn de regels geldende voor de invordering van
      de loonbelasting, met uitzondering van [artikel 38, eerste lid, onderdeel a, van de Invorderingswet 1990][ref1],
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004770#Artikel38
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel60
    references:
      - id: ref1
        bwb_id: BWBR0004770
        artikel: '38'
  - number: '63'
    text: |-
      Bij regeling van Onze Minister, in overeenstemming met Onze Minister van Financiën en Onze Minister van
      Volksgezondheid, Welzijn en Sport, kunnen nadere regels worden gesteld met betrekking tot dit hoofdstuk.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel63
  - number: '64.1'
    text: |-
      De SVB kan op verzoek wegens gemoedsbezwaren tegen één of meer volksverzekeringen of alle werknemersverzekeringen
      ontheffen van de verplichtingen opgelegd op grond van de desbetreffende wetten en deze wet:
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel64
  - number: 64.1.a
    text: de persoon, die deze gemoedsbezwaren heeft;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel64
  - number: 64.1.b
    text: de rechtspersoon, waarbij natuurlijke personen zijn betrokken die deze gemoedsbezwaren hebben.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel64
  - number: '64.2'
    text: De SVB doet de inspecteur mededeling omtrent de ontheffing of intrekking van de ontheffing.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel64
  - number: '64.3'
    text: |-
      [Paragraaf 4.1.3.3 van de Algemene wet bestuursrecht][ref1] is van toepassing op verzoeken aan de SVB met
      betrekking tot het verlenen van een ontheffing als bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Paragraaf4.1.3.3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0005537
        paragraaf: 4.1.3.3
  - number: '65.1'
    text: |-
      Indien een ontheffing is verleend in het kader van één of meer volksverzekeringen, wordt voor geen van
      de volksverzekeringen premie geheven, doch vindt voor al die verzekeringen heffing van premievervangende
      inkomstenbelasting of premievervangende loonbelasting plaats overeenkomstig [artikel 58][ref1] tot het bedrag van
      de verschuldigde premie als bedoeld in [artikel 9][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel58
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel9
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel65
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '58'
        hoofdstuk: '4'
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '9'
        hoofdstuk: '2'
        paragraaf: '3'
        afdeling: '2'
  - number: '65.2'
    text: |-
      Indien een werkgever ontheffing is verleend in het kader van de werknemersverzekeringen wordt premievervangende
      loonbelasting geheven overeenkomstig [artikel 59][ref1] tot het bedrag aan premies dat hij met toepassing van
      [hoofdstuk 3][ref2] zou hebben afgedragen, indien hem geen ontheffing zou zijn verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel59
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel65
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '59'
        hoofdstuk: '4'
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0017745
        hoofdstuk: '3'
  - number: '65.3'
    text: |-
      Voor de toepassing van deze wet, de [Wet inkomstenbelasting 2001][ref1], de [Wet op de loonbelasting 1964][ref2]
      en de [Invorderingswet 1990][ref3] wordt de premievervangende belasting beschouwd als premie voor de
      volksverzekeringen dan wel voor de werknemersverzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0011353
      [ref2]: https://wetten.overheid.nl/BWBR0002471
      [ref3]: https://wetten.overheid.nl/BWBR0004770
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel65
    references:
      - id: ref1
        bwb_id: BWBR0011353
      - id: ref2
        bwb_id: BWBR0002471
      - id: ref3
        bwb_id: BWBR0004770
  - number: '66'
    text: |-
      Ten laste van het Rijk komen de bedragen aan premie voor de volksverzekeringen en de werknemersverzekeringen die
      wegens een ontheffing niet zijn geheven overeenkomstig [artikel 65][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel65
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '65'
        hoofdstuk: '5'
  - number: '67'
    text: |-
      Bij regeling van Onze Minister, in overeenstemming met Onze Minister van Financiën en Onze Minister van
      Volksgezondheid, Welzijn en Sport, worden regels gesteld ten aanzien van:
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel67
  - number: 67.a
    text: de voorwaarden, waaronder een ontheffing wordt verleend;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel67
  - number: 67.b
    text: de verdere gevolgen die aan een ontheffing worden verbonden;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel67
  - number: 67.c
    text: de gevallen, waarin een ontheffing wordt ingetrokken en de gevolgen die aan die intrekking worden verbonden.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel67
  - number: '68'
    text: |-
      De financiële middelen tot dekking van de uitgaven voor de vrijwillige volksverzekeringen worden verkregen door het
      heffen van premie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel68
  - number: '69'
    text: 'Voor de toepassing van deze afdeling wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel69
  - number: 69.a
    text: |-
      vrijwillige algemene ouderdomsverzekering: de verzekering, bedoeld in
      [hoofdstuk IV van de Algemene Ouderdomswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002221#HoofdstukIV
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel69
    references:
      - id: ref1
        bwb_id: BWBR0002221
        hoofdstuk: IV
  - number: 69.b
    text: |-
      vrijwillige nabestaandenverzekering: de verzekering, bedoeld in [hoofdstuk 5 van de Algemene nabestaandenwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0007795#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel69
    references:
      - id: ref1
        bwb_id: BWBR0007795
        hoofdstuk: '5'
  - number: '70.1'
    text: |-
      De verschuldigde premie voor de vrijwillige algemene ouderdomsverzekering of de vrijwillige nabestaandenverzekering
      wordt in rekening gebracht en geïnd door de SVB op de wijze en het tijdstip aangegeven door de SVB.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel70
  - number: '70.2'
    text: |-
      Een schuld aan premie voor een vrijwillige verzekering valt buiten de nalatenschap van degene, die tot die
      verzekering was toegelaten. De schuld wordt betaald door degene, die krachtens de betrokken vrijwillige verzekering
      prestaties ontvangt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel70
  - number: '71.1'
    text: |-
      Degene die is toegelaten tot de vrijwillige algemene ouderdomsverzekering of de vrijwillige
      nabestaandenverzekering, is voor die verzekeringen een premie verschuldigd volgens bij of krachtens algemene
      maatregel van bestuur te bepalen tarief.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel71
  - number: '71.2'
    text: |-
      De voordracht voor een op grond van het eerste lid vast te stellen algemene maatregel van bestuur wordt niet eerder
      gedaan dan vier weken nadat het ontwerp aan beide kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel71
  - number: '72'
    text: |-
      De financiële middelen tot dekking van de uitgaven voor de vrijwillige werknemersverzekeringen worden verkregen
      door het heffen van premie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel72
  - number: '73.1'
    text: |-
      De premies voor de vrijwillige werknemersverzekeringen worden in rekening gebracht en geïnd door het UWV op de
      wijze en het tijdstip, aangegeven door dat instituut.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel73
  - number: '73.2'
    text: Het UWV kan nadere regels stellen met betrekking tot de premie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel73
  - number: '73.3'
    text: De door het UWV op grond van het tweede lid gestelde regels behoeven de goedkeuring van Onze Minister.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel73
  - number: '74.1'
    text: |-
      De premie voor de vrijwillige verzekering op grond van de [Werkloosheidswet][ref1] wordt berekend over het dagloon,
      bedoeld in [artikel 58, eerste lid, van de Werkloosheidswet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel58
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel74
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '58'
  - number: '74.2'
    text: |-
      De premie bedraagt een door het UWV te bepalen percentage van het in het eerste lid bedoelde dagloon, met dien
      verstande dat de premie niet meer bedraagt dan de hoge premie, bedoeld in [artikel 27, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel27
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel74
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '27'
        hoofdstuk: '3'
        paragraaf: '5'
        afdeling: '2'
  - number: '75.1'
    text: |-
      De premie voor de vrijwillige verzekering op grond van de
      [Wet op de arbeidsongeschiktheidsverzekering][ref1] wordt berekend over het dagloon, bedoeld in
      [artikel 84, eerste lid, van de Wet op de arbeidsongeschiktheidsverzekering][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0002524
      [ref2]: https://wetten.overheid.nl/BWBR0002524#Artikel84
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel75
    references:
      - id: ref1
        bwb_id: BWBR0002524
      - id: ref2
        bwb_id: BWBR0002524
        artikel: '84'
  - number: '75.2'
    text: |-
      De premie bedraagt een door het UWV te bepalen percentage van het in het eerste lid bedoelde dagloon, met dien
      verstande dat de premie niet meer bedraagt dan het hoge krachtens [artikel 36, eerste lid][ref1], vastgestelde
      percentage voor de in dat artikel bedoelde gedifferentieerde premie voor het Arbeidsongeschiktheidsfonds.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel36
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel75
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '36'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
  - number: '76.1'
    text: |-
      De premie voor de vrijwillige verzekering op grond van de [Ziektewet][ref1] wordt berekend over het dagloon,
      bedoeld in [artikel 68, eerste lid, van de Ziektewet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel68
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel76
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '68'
  - number: '76.2'
    text: De premie bedraagt een door het UWV te bepalen percentage van het in het eerste lid bedoelde dagloon.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel76
  - number: 76a.1
    text: |-
      De premie voor de vrijwillige verzekering op grond van de
      [Wet werk en inkomen naar arbeidsvermogen][ref1] wordt berekend over het dagloon, bedoeld in
      [artikel 21, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0019057
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel21
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel76a
    references:
      - id: ref1
        bwb_id: BWBR0019057
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '21'
  - number: 76a.2
    text: |-
      De premie bedraagt een door het UWV te bepalen percentage van het in het eerste lid bedoelde dagloon, met dien
      verstande dat de premie niet meer bedraagt dan het hoge krachtens [artikel 36, eerste lid][ref1], vastgestelde
      percentage voor de in dat artikel bedoelde gedifferentieerde premie voor het Arbeidsongeschiktheidsfonds,
      vermeerderd met een premieopslag die wordt berekend op grond van het in [artikel 38, tweede lid][ref2], bedoelde
      percentage.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel36
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel76a
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '36'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '38'
        hoofdstuk: '3'
        paragraaf: '4'
        afdeling: '4'
  - number: '77'
    text: |-
      Degene die is toegelaten tot een vrijwillige verzekering, is verplicht aan de SVB of het UWV onverwijld uit eigen
      beweging mededeling te doen van alle feiten en omstandigheden waarvan het hem redelijkerwijs duidelijk is, dat zij
      van invloed zijn op de hoogte van de verschuldigde premie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel77
  - number: '79'
    text: |-
      In afwijking van [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1] beslist de SVB of het UWV
      binnen dertien weken gerekend vanaf de dag na die waarop de termijn voor het indienen van het bezwaarschrift is
      verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel79
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: '80'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot de
      vaststelling, de inning en de betaling van de premie voor een vrijwillige verzekering.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel80
  - number: '81'
    text: |-
      Bij regeling van Onze Minister en Onze Ministers van Financiën en van Volksgezondheid, Welzijn en Sport
      worden regels gesteld met betrekking tot de afdracht van de premie voor de volksverzekeringen en de premies
      voor de werknemersverzekeringen alsmede van de daarmee verband houdende bestuurlijke boeten en renten door de
      rijksbelastingdienst aan de fondsen en de wijze van toerekening van die premies, boeten en renten aan de fondsen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel81
  - number: '82.1'
    text: |-
      De SVB beheert en administreert afzonderlijk de middelen tot dekking van de uitgaven, bedoeld in
      [artikel 83, tweede lid][ref1], in de vorm van een Ouderdomsfonds.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel83
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '83'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '2'
  - number: '82.2'
    text: |-
      De SVB beheert en administreert afzonderlijk de middelen tot dekking van de uitgaven, bedoeld in
      [artikel 85, tweede lid][ref1], in de vorm van een Nabestaandenfonds.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel85
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '85'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '2'
  - number: '82.3'
    text: Het Ouderdomsfonds en het Nabestaandenfonds maken deel uit van de SVB.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel82
  - number: '83.1'
    text: 'Ten gunste van het Ouderdomsfonds komen:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
  - number: 83.1.a
    text: de premies voor de algemene ouderdomsverzekering en voor de vrijwillige algemene ouderdomsverzekering;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
  - number: 83.1.b
    text: |-
      rijksbijdragen als bedoeld in [artikel 14][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel14
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '14'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 83.1.c
    text: |-
      de bestuurlijke boeten, bedoeld in [artikel 17c van de Algemene Ouderdomswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel17c
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 17c
  - number: 83.1.d
    text: |-
      de bijdrage in de kosten van de heffingskortingen, bedoeld in [artikel 15][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel15
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '15'
        hoofdstuk: '2'
        afdeling: '3'
  - number: '83.2'
    text: 'Uit het Ouderdomsfonds worden betaald:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
  - number: 83.2.a
    text: de lasten van de algemene ouderdomsverzekering en van de vrijwillige algemene ouderdomsverzekering;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
  - number: 83.2.b
    text: |-
      de lasten van de regeling, vervat in [hoofdstuk VIII van de Algemene Ouderdomswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002221#HoofdstukVIII
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0002221
        hoofdstuk: VIII
  - number: 83.2.c
    text: |-
      de bijdrage, bedoeld in [artikel 87a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel87a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 87a
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '2'
  - number: '84'
    text: |-
      Onze Minister stelt een keer per jaar een prognose op van de benodigde middelen tot dekking van de lasten van de
      algemene ouderdomsverzekering voor de eerstkomende tien jaren, waarbij onderscheid wordt gemaakt naar de opbrengst
      van de premies voor de algemene ouderdomsverzekering en de rijksbijdragen bedoeld in [artikel 14][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel14
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '14'
        hoofdstuk: '2'
        afdeling: '3'
  - number: '85.1'
    text: 'Ten gunste van het Nabestaandenfonds komen:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
  - number: 85.1.a
    text: |-
      de premies voor de nabestaandenverzekering en voor de vrijwillige nabestaandenverzekering alsmede de te ontvangen
      bijdragen op grond van [artikel 66a van de Algemene nabestaandenwet][ref1] en de daarop berustende bepalingen;


      [ref1]: https://wetten.overheid.nl/BWBR0007795#Artikel66a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
    references:
      - id: ref1
        bwb_id: BWBR0007795
        artikel: 66a
  - number: 85.1.b
    text: |-
      de bestuurlijke boeten, bedoeld in [artikel 39 van de Algemene nabestaandenwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0007795#Artikel39
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
    references:
      - id: ref1
        bwb_id: BWBR0007795
        artikel: '39'
  - number: 85.1.c
    text: |-
      de bijdrage in de kosten van de heffingskortingen, bedoeld in [artikel 15][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel15
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '15'
        hoofdstuk: '2'
        afdeling: '3'
  - number: '85.2'
    text: 'Uit het Nabestaandenfonds worden betaald:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
  - number: 85.2.a
    text: de lasten van de nabestaandenverzekering en van de vrijwillige nabestaandenverzekering;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
  - number: 85.2.b
    text: |-
      de lasten voortvloeiend uit [hoofdstuk 8 van de Algemene nabestaandenwet][ref1] en de daarop berustende bepalingen;


      [ref1]: https://wetten.overheid.nl/BWBR0007795#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
    references:
      - id: ref1
        bwb_id: BWBR0007795
        hoofdstuk: '8'
  - number: 85.2.c
    text: |-
      de lasten van de tegemoetkomingen, bedoeld in [artikel 29a van de Algemene nabestaandenwet][ref1], en de daaraan
      verbonden uitvoeringskosten.


      [ref1]: https://wetten.overheid.nl/BWBR0007795#Artikel29a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel85
    references:
      - id: ref1
        bwb_id: BWBR0007795
        artikel: 29a
  - number: 87a.1
    text: |-
      Periodiek wordt door de SVB een bijdrage ten laste gebracht van het Ouderdomsfonds die ten gunste komt van het
      Zorgverzekeringsfonds, bedoeld in [artikel 39, eerste lid, van de Zorgverzekeringswet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel39
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel87a
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '39'
  - number: 87a.2
    text: |-
      De bijdrage, bedoeld in het eerste lid, vormt het verschil tussen het in het kalenderjaar geldende percentage,
      bedoeld in [artikel 45, eerste lid, van de Zorgverzekeringswet][ref1], dat wordt toegepast voor het loon, bedoeld
      in [artikel 42, eerste lid, van de Zorgverzekeringswet][ref2] en het in het kalenderjaar geldende percentage,
      bedoeld in artikel 45, tweede lid, van de Zorgverzekeringswet, dat wordt toegepast voor het bijdrage-inkomen,
      bedoeld in [artikel 43, tweede lid, van de Zorgverzekeringswet][ref3], vermenigvuldigd met de lasten van de
      algemene ouderdomsverzekering en de vrijwillige algemene ouderdomsverzekering.


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel45
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel42
      [ref3]: https://wetten.overheid.nl/BWBR0018450#Artikel43
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel87a
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '45'
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '42'
      - id: ref3
        bwb_id: BWBR0018450
        artikel: '43'
  - number: 87a.3
    text: |-
      De SVB stelt regels omtrent de termijnen waarin en de wijze waarop de bijdrage, bedoeld in het eerste lid,
      betaalbaar wordt gesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel87a
  - number: 87a.4
    text: |-
      De door de SVB op grond van het derde lid gestelde regels behoeven de goedkeuring van Onze Minister, na overleg met
      Onze Ministers van Financiën en van Volksgezondheid, Welzijn en Sport.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel87a
  - number: '89'
    text: Het Zorginstituut beheert en administreert afzonderlijk een Fonds langdurige zorg.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel89
  - number: '90.1'
    text: 'Ten gunste van het Fonds langdurige zorg komen:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
  - number: 90.1.a
    text: |-
      de premie voor de verzekering ingevolge de [Wet langdurige zorg][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: 90.1.b
    text: |-
      de inkomsten die in verband met de [Wet langdurige zorg][ref1] voortvloeien uit internationale overeenkomsten;


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: 90.1.c
    text: |-
      de bijdragen in de kosten van zorg die op grond van [artikel 3.2.5][ref1] of
      [11.1.4 van de Wet langdurige zorg][ref2] worden betaald door of namens de verzekerde, dan wel, in voorkomend
      geval, door het krachtens een wettelijke regeling tot betaling van zodanige bijdragen bevoegde orgaan dat
      uitkeringen of pensioenen uit hoofde van die regeling aan die verzekerde betaalbaar stelt;


      [ref1]: https://wetten.overheid.nl/BWBR0035917#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0035917#Artikel11
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0035917
        artikel: '11'
  - number: 90.1.d
    text: |-
      de bijdragen in de kosten van de heffingskortingen, bedoeld in [artikel 15][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel15
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '15'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 90.1.e
    text: |-
      een rijksbijdrage als bedoeld in [artikel 14, tweede lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel14
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '14'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 90.1.f
    text: |-
      door zorgaanbieders ingevolge een regel van de zorgautoriteit op grond van
      [artikel 37, eerste lid, aanhef en onder d, van de Wet marktordening gezondheidszorg][ref1] dan wel op aanwijzing
      van de zorgautoriteit op grond van [artikel 76, tweede lid, van die wet][ref2] afgedragen bedragen en door de
      zorgautoriteit van zorgaanbieders op grond van [artikel 81, eerste lid, onder c, van die wet][ref3] ingevorderde
      bedragen, voor zover die bedragen niet worden afgedragen aan het Zorgverzekeringsfonds of aan derden.


      [ref1]: https://wetten.overheid.nl/BWBR0020078#Artikel37
      [ref2]: https://wetten.overheid.nl/BWBR0020078#Artikel76
      [ref3]: https://wetten.overheid.nl/BWBR0020078#Artikel81
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0020078
        artikel: '37'
      - id: ref2
        bwb_id: BWBR0020078
        artikel: '76'
      - id: ref3
        bwb_id: BWBR0020078
        artikel: '81'
  - number: '90.2'
    text: 'Uit het Fonds langdurige zorg worden betaald:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
  - number: 90.2.a
    text: |-
      de kosten van de zorg en van de overige prestaties die op grond van de [Wet langdurige zorg][ref1] worden
      verstrekt, alsmede de met de uitvoering van die wet gepaard gaande kosten;


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: 90.2.b
    text: |-
      de uitgaven voor de verzekering ingevolge de [Wet langdurige zorg][ref1] die voortvloeien uit overeenkomsten,
      waaronder internationale overeenkomsten;


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: 90.2.c
    text: |-
      de uitgaven die in verband met de verzekering ingevolge de [Wet langdurige zorg][ref1] voorvloeien uit enige andere
      wettelijke regeling dan laatstgenoemde wet;


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: 90.2.e
    text: |-
      een uitkering als bedoeld in [artikel 3.2.8, tweede lid, van de Wet langdurige zorg][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0035917#Artikel3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
        artikel: '3'
  - number: 90.2.f
    text: |-
      de kosten die de Sociale verzekeringsbank maakt voor de uitvoering van de taak, bedoeld in
      [artikel 3.3.3, zevende lid, van de Wet langdurige zorg][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0035917#Artikel3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0035917
        artikel: '3'
  - number: 90.2.g
    text: |-
      bedragen als bedoeld in [artikel 56a van de Wet marktordening gezondheidszorg][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0020078#Artikel56a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0020078
        artikel: 56a
  - number: 90.2.h
    text: |-
      de door het Zorginstituut op grond van een ministeriële regeling vastgestelde verdeelbedragen, zijnde aan de
      relevante zorgverzekeraars toegekende delen van de bedragen bedoeld in onderdeel f van het eerste lid;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
  - number: 90.2.i
    text: |-
      de vergoedingen, bedoeld in [artikel 123, zesde en achtste lid, van de Zorgverzekeringswet][ref1] voor zover het
      zorg in de zin van de [Wet langdurige zorg][ref2] betreft.


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel123
      [ref2]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '123'
      - id: ref2
        bwb_id: BWBR0035917
  - number: '91.1'
    text: |-
      Het Zorginstituut doet jaarlijks uitkeringen uit het Fonds langdurige zorg ter dekking van de noodzakelijke
      uitgaven, gedaan voor de uitvoering van de in de [Wet langdurige zorg][ref1] geregelde verzekering, volgens bij of
      krachtens algemene maatregel van bestuur te stellen regels. Bij of krachtens deze algemene maatregel van bestuur
      kunnen tevens regels worden gesteld over de vorming en aanwending van reserves door Wlz-uitvoerders als bedoeld in
      de Wet langdurige zorg.


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: '91.2'
    text: |-
      De zorgautoriteit is bevoegd vast te stellen dat uitgaven niet verantwoord waren voor zover deze door hem niet
      noodzakelijk worden geacht voor de uitvoering van de verzekering op grond van de [Wet langdurige zorg][ref1].
      Met de uitkeringen, bedoeld in het eerste lid, evenals met de daarmee verkregen opbrengsten worden geen uitgaven
      gedekt waarvan de zorgautoriteit heeft vastgesteld dat zij niet verantwoord waren, tenzij de zorgautoriteit anders
      besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0035917
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0035917
  - number: '91.3'
    text: |-
      Op de uitkeringen, bedoeld in het eerste lid, kunnen voorschotten worden verleend overeenkomstig door het
      Zorginstituut te stellen regels,
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel91
  - number: '91.4'
    text: |-
      Op rechten of verplichtingen die voortvloeien uit hetgeen op grond van dit artikel is geregeld, is
      [titel 4.2 van de Algemene wet bestuursrecht][ref1] niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0005537
  - number: '93'
    text: |-
      Het UWV beheert en administreert afzonderlijk de in [artikel 99][ref1] bedoelde middelen tot dekking van de
      uitgaven en de uitgaven, bedoeld in [artikel 100][ref2], in de vorm van een Algemeen Werkloosheidsfonds dat deel
      uitmaakt van het UWV.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel99
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel100
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel93
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '99'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '100'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '95.1'
    text: |-
      Bij regeling van Onze Minister, na overleg met Onze Minister van Financiën en nadat hij het UWV in de gelegenheid
      heeft gesteld daarover advies uit te brengen, wordt het bedrijfs- en beroepsleven ingedeeld in sectoren,
      waarbij elke sector één of meer takken van bedrijf of beroep of gedeelten daarvan omvat en kan een sector worden
      onderverdeeld in sectoronderdelen, waarbij elk sectoronderdeel de bedrijfsactiviteiten van één of meer werkgevers
      omvat.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel95
  - number: '95.2'
    text: |-
      Indien een sector in sectoronderdelen is ingedeeld, stelt de inspecteur ten aanzien van elke bij de betrokken
      sector aangesloten werkgever bij voor bezwaar vatbare beschikking vast bij welk sectoronderdeel de werkgever
      behoort of bij welk sectoronderdeel de werkzaamheden die hij doet verrichten, behoren.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel95
  - number: '95.3'
    text: |-
      De inspecteur is bevoegd tot herziening van de beschikking, bedoeld in het tweede lid, indien enig feit grond
      oplevert voor het vermoeden dat de indeling van een werkgever bij een sectoronderdeel onjuist is en deze
      tekortkoming een gevolg is van een feit dat aan de werkgever kan worden toegerekend of redelijkerwijs kenbaar
      had kunnen zijn, waardoor de werkgever is bevoordeeld. De inspecteur stelt de herziening vast bij voor bezwaar
      vatbare beschikking. De bevoegdheid tot herziening werkt uiterlijk terug tot en met 1 januari van enig jaar waarop
      de beschikking betrekking heeft en vervalt door verloop van 5 jaren na het einde van het kalenderjaar waarop de
      beschikking betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel95
  - number: '96.1'
    text: |-
      Een werkgever is van rechtswege aangesloten bij de op grond van [artikel 95][ref1] vastgestelde sector waartoe de
      werkzaamheden behoren die hij als werkgever doet verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel95
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '95'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '96.2'
    text: |-
      Indien een werkgever werkzaamheden doet verrichten die behoren tot verschillende sectoren, is hij van rechtswege
      aangesloten bij de sector waartoe de werkzaamheden behoren waarvoor hij als werkgever in de regel het grootste
      bedrag aan premieplichtig loon betaalt of vermoedelijk zal betalen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel96
  - number: '96.3'
    text: |-
      Bij regeling van Onze Minister, in overeenstemming met Onze Minister van Financiën, kunnen met betrekking tot
      de aansluiting van een of meer categorieën werkgevers bij een sector regels worden gesteld, waarbij voor deze
      aansluiting andere criteria bepalend kunnen zijn dan genoemd in het eerste en tweede lid.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel96
  - number: '97.1'
    text: |-
      De werkgever die op grond van [artikel 96][ref1] bij een sector is aangesloten of ophoudt bij een sector
      aangesloten te zijn, doet daarvan binnen twee weken schriftelijk melding bij de inspecteur.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel96
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel97
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '96'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '97.2'
    text: |-
      De inspecteur deelt een werkgever bij voor bezwaar vatbare beschikking mee, bij welke sector en vanaf welke datum
      hij op grond van [artikel 96][ref1] is aangesloten. De datum waarop de aansluiting op grond van een beschikking als
      bedoeld in de eerste zin, wijzigt, kan in afwijking van artikel 96, eerste en tweede lid, niet gelegen zijn voor
      de datum waarop de werkgever om herziening heeft verzocht of de inspecteur ambtshalve heeft geconstateerd dat de
      indeling niet juist is, tenzij sprake is van een herziening op grond van het vierde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel96
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel97
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '96'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '97.3'
    text: |-
      In afwijking van [artikel 96, tweede lid][ref1], beslist de inspecteur bij voor bezwaar vatbare beschikking op
      aanvraag dat een werkgever met ingang van een door de inspecteur aan te geven datum voor door de inspecteur aan te
      wijzen werkzaamheden is aangesloten bij een andere sector dan de sector waartoe de werkzaamheden behoren die hij
      overigens doet verrichten. Een aanvraag als bedoeld in de eerste zin wordt niet in behandeling genomen indien deze
      is ingediend op of na 29 juni 2018, 17.00 uur.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel96
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel97
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '96'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
  - number: '97.4'
    text: |-
      De inspecteur is bevoegd tot herziening van de beschikking, bedoeld in het tweede en derde lid, indien enig
      feit grond oplevert voor het vermoeden dat de aansluiting bij een sector onjuist is en deze tekortkoming een
      gevolg is van een feit dat aan de werkgever kan worden toegerekend of redelijkerwijs kenbaar had kunnen zijn,
      waardoor de werkgever is bevoordeeld. De inspecteur stelt de herziening vast bij voor bezwaar vatbare beschikking.
      De bevoegdheid tot herziening werkt uiterlijk terug tot en met 1 januari van enig jaar waarop de beschikking
      betrekking heeft en vervalt door verloop van 5 jaren na het einde van het kalenderjaar waarop de beschikking
      betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel97

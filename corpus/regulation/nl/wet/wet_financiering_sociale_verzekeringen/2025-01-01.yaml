  - number: '38.4'
    text: |-
      De inspecteur stelt in geval van overgang van een onderneming in de zin van
      [artikel 662 van Boek 7 van het Burgerlijk Wetboek][ref1], alsmede in geval van een dergelijke overgang bij
      faillissement, de vastgestelde opslag of korting, bedoeld in het derde lid, opnieuw bij voor bezwaar vatbare
      beschikking vast voor de werkgever die een onderneming of een deel daarvan verkrijgt en voor de werkgever die een
      deel van zijn onderneming overdraagt.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel662
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '662'
  - number: '38.5'
    text: |-
      Indien de werkgever een overheidswerkgever is op wie [artikel 7:662 van het Burgerlijk Wetboek][ref1] niet van
      toepassing is, en deze geheel of gedeeltelijk is overgegaan naar een andere werkgever, alsmede in geval van een
      dergelijke overgang bij faillissement, stelt de inspecteur de vastgestelde opslag of korting, bedoeld in het derde
      lid, opnieuw vast bij voor bezwaar vatbare beschikking voor:


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel662
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '662'
  - number: 38.5.a
    text: de rechtsopvolger van die overheidswerkgever dan wel de verkrijger van een deel daarvan, en
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: 38.5.b
    text: voor de overheidswerkgever die een deel van de organisatie overdraagt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: '38.6'
    text: |-
      De inspecteur stelt, in geval aan een werkgever toestemming is verleend om zelf het risico te dragen van betaling
      van ziekengeld of WGA-uitkering en overlijdensuitkeringen als bedoeld in [artikel 40, eerste lid][ref1], alsmede
      in geval het door de werkgever zelf dragen van het risico, bedoeld in artikel 40, eerste lid, is geëindigd of
      wordt beëindigd, de vastgestelde opslag of korting, bedoeld in het derde lid, opnieuw bij voor bezwaar vatbare
      beschikking vast met ingang van de datum waarop het zelf dragen van het risico aanvangt dan wel is geëindigd of
      wordt beëindigd.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: '38.7'
    text: 'Bij of krachtens algemene maatregel van bestuur worden regels gesteld omtrent:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: 38.7.a
    text: |-
      de wijze waarop het gemiddelde percentage, bedoeld in het tweede lid, wordt vastgesteld, rekening houdend met de
      verschillende lasten voor de Werkhervattingskas;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: 38.7.b
    text: de wijze waarop de in het derde en het vierde lid, bedoelde opslag en korting worden berekend;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: 38.7.c
    text: |-
      de percentages die op grond van dit artikel ten hoogste voor categorieën van werkgevers, sector of sectoronderdeel
      mogen gelden en omtrent de percentages die op grond van dit artikel ten minste voor categorieën van werkgevers,
      sector of sectoronderdeel gelden.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: '38.8'
    text: |-
      De inspecteur is bevoegd tot herziening van een beschikking op grond van dit artikel indien enig feit grond
      oplevert voor het vermoeden dat de beschikking is gegeven op grond van onjuiste of onvolledige gegevens. Een
      herziening ten nadele van de werkgever is uitsluitend mogelijk indien deze tekortkoming een gevolg is van een feit
      dat aan de werkgever of de gewezen werkgever kan worden toegerekend of redelijkerwijs kenbaar had kunnen zijn.
      De inspecteur stelt de herziening vast bij voor bezwaar vatbare beschikking. De bevoegdheid tot herziening werkt
      uiterlijk terug tot en met 1 januari van enig jaar waarop de beschikking betrekking heeft en vervalt door verloop
      van 5 jaren na het einde van het kalenderjaar waarop de beschikking betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: '38.9'
    text: |-
      Beschikkingen van de inspecteur op grond van dit artikel worden genomen gehoord het UWV en in overeenstemming met
      het UWV.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: 38a.1
    text: |-
      In afwijking van [artikel 38][ref1] is over een uitkering op grond van de
      [Wet werk en inkomen naar arbeidsvermogen][ref2], de [Wet op de arbeidsongeschiktheidsverzekering][ref3],
      de [Ziektewet][ref4], [hoofdstuk 3, afdeling 2, paragraaf 1][ref5],
      of de [artikelen 4:2b, eerste tot en met zesde lid][ref6], en
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref7], de [Werkloosheidswet][ref8],
      over een toeslag op grond van de [Toeslagenwet][ref9] en over het loon uit een dienstbetrekking
      op grond van de [Wet sociale werkvoorziening][ref10], als gedifferentieerde premie ten
      behoeve van de Werkhervattingskas een vervangende premie verschuldigd. Met een uitkering
      op grond van de Werkloosheidswet wordt gelijkgesteld een wachtgeld als bedoeld in
      [artikel 1, onderdeel r, van de Wet overheidspersoneel onder de werknemersverzekeringen][ref11].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38
      [ref2]: https://wetten.overheid.nl/BWBR0019057
      [ref3]: https://wetten.overheid.nl/BWBR0002524
      [ref4]: https://wetten.overheid.nl/BWBR0001888
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref6]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref7]: https://wetten.overheid.nl/BWBR0013008#Artikel6
      [ref8]: https://wetten.overheid.nl/BWBR0004045

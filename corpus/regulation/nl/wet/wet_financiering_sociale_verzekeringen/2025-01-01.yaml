  - number: '38.1'
    text: |-
      In dit artikel wordt onder *categorie werkgevers* verstaan: - werkgevers ten laste van wie, in het tweede
      kalenderjaar dat aan het kalenderjaar waarvoor de premie wordt vastgesteld vooraf is gegaan, loon waarover
      de premies op grond van dit hoofdstuk worden geheven, is gekomen dat gelijk is aan, meer of minder bedraagt
      dan een bij algemene maatregel van bestuur te bepalen omvang van het gemiddelde van dit loon, bedoeld in
      [paragraaf 1 van afdeling 1 van dit hoofdstuk][ref1], per werknemer in dat kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0017745
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '1'
  - number: '38.2'
    text: |-
      Het UWV stelt voor de berekening van de gedifferentieerde premie een voor alle takken van bedrijf en beroep gelijk
      gemiddeld percentage vast.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
  - number: '38.3'
    text: |-
      Elk jaar wordt met ingang van 1 januari een opslag of korting vastgesteld waarmee het in het tweede lid bedoelde
      percentage wordt verhoogd respectievelijk verlaagd. Bij of krachtens algemene maatregel van bestuur kan worden
      bepaald dat de opslag of korting naar categorie werkgevers voor de werkgever afzonderlijk of per sector als
      bedoeld in [artikel 95][ref1], wordt vastgesteld, waarbij de korting of opslag voor werkgevers per sector of
      sectoronderdelen kan verschillen of op nihil kan worden vastgesteld. Indien een werkgever met toepassing van de
      [artikelen 96][ref2] of [97][ref3] is aangesloten bij verschillende sectoren, wordt voor elk bedrijfsonderdeel
      van de werkgever waar werkzaamheden worden verricht die behoren tot een afzonderlijke sector, de opslag of
      korting toegepast als was dat bedrijfsonderdeel een afzonderlijke werkgever. Voor de werkgever voor wie de
      korting of opslag afzonderlijk wordt vastgesteld, stelt de inspecteur de korting of opslag vast bij voor bezwaar
      vatbare beschikking. Ten aanzien van werkgevers voor wie de opslag of korting per sector wordt vastgesteld kan
      in bijzondere gevallen bij regeling van Onze Minister worden bepaald dat de opslag of korting op een door Onze
      Minister te bepalen wijze wordt vastgesteld aan de hand van het gemiddelde van de opslag of korting van een aantal
      sectoren.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel95
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel96
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel97
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '95'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref2

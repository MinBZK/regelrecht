  - number: '6.1'
    text: Premieplichtig voor de volksverzekeringen is de verzekerde in de zin van de volksverzekeringen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel6
  - number: '6.2'
    text: |-
      Ingeval [artikel 26b van de Wet op de loonbelasting 1964][ref1] toepassing vindt, wordt de in dat
      artikel bedoelde werknemer geacht premieplichtig te zijn. Ten aanzien van deze werknemer worden
      de in [artikel 10, eerste lid][ref2], bedoelde percentages toegepast op het loon in de zin van de
      [Wet op de loonbelasting 1964][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel26b
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel10
      [ref3]: https://wetten.overheid.nl/BWBR0002471
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel6
    references:

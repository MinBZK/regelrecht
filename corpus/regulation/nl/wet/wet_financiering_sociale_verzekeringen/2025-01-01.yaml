      - id: ref5
        bwb_id: BWBR0018450
  - number: 124a
    text: |-
      Het UWV is bevoegd de van de rijksbelastingdienst afkomstige gegevens, genoemd
      in de krachtens [artikel 73a, eerste lid][ref1], [artikel 73, zesde lid][ref2] of
      __REF002___________________________________________________________________________________________________________
      ___________________________ uitgevaardigde algemene maatregel van bestuur,
      te verstrekken aan de in de krachtens [artikel 73a, eerste lid][ref4], of
      [artikel 73, zesde lid van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref5]
      uitgevaardigde algemene maatregel van bestuur, onderscheidenlijk de in
      [artikel 73, eerste tot en met derde lid van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref6]
      genoemde derden.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel73a
      [ref2]: https://wetten.overheid.nl/BWBR0013060#Artikel73

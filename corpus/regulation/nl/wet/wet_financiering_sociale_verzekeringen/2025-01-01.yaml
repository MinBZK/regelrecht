  - number: '108.2'
    text: |-
      Ten laste van het Uitvoeringsfonds voor de overheid komen voorts de kosten die rechtstreeks verband houden met de
      uitvoering van [artikel 30a van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] ten aanzien van een
      betrokkene, indien deze ten tijde van het aanvangen van de werkzaamheden van het re-integratiebedrijf, bedoeld in
      het achtste lid van dat artikel een uitkering ontvangt als bedoeld in het eerste lid, onderdeel a, en het UWV deze
      uitkering met toepassing van [artikel 79 van de Werkloosheidswet][ref2] niet kan verhalen op de overheidswerkgever.



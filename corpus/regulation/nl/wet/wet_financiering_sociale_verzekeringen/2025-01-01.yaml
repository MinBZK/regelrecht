        artikel: '29'
  - number: 122r.2
    text: Dit artikel vervalt met ingang van 1 januari 2032.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122r
  - number: 122s
    text: |-
      De SVB neemt een besluit als bedoeld in [artikel 61, eerste lid][ref1], zoals dat luidde op de dag voor de
      datum van inwerkingtreding van de Wet van 16 oktober 2023 tot wijziging van de [Algemene Ouderdomswet][ref2],
      de Wet financiering sociale verzekeringen en de [Invorderingswet 1990][ref3] in verband met het afschaffen
      van de mogelijkheid om schuldig nalatig te verklaren bij het niet of niet geheel betalen van de premie voor de
      volksverzekeringen, niet op of na die datum van inwerkingtreding.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel61
      [ref2]: https://wetten.overheid.nl/BWBR0002221
      [ref3]: https://wetten.overheid.nl/BWBR0004770
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122s
    references:
      - id: ref1

      - id: ref5
        bwb_id: BWBR0004045
        artikel: '10'
      - id: ref6
        bwb_id: BWBR0004045
        artikel: '12'
      - id: ref7
        bwb_id: BWBR0001888
  - number: 38a.3
    text: |-
      Het eerste lid wordt eveneens niet toegepast ingeval een eigenrisicodrager de
      uitkering, bedoeld in [artikel 63a Ziektewet][ref1], betaalt of de uitkering, bedoeld in
      [artikel 82 van de Wet werk en inkomen naar arbeidsvermogen][ref2], betaalt, onafhankelijk van het voortbestaan
      van de dienstbetrekking met die eigenrisicodrager.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel63a
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38a
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: 63a
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '82'
  - number: 38a.4
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden regels gesteld voor de wijze waarop de vervangende premie,
      bedoeld in het eerste lid, wordt vastgesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38a
  - number: 38b.1
    text: |-
      In deze paragraaf en de daarop berustende bepalingen wordt onder een arbeidsbeperkte verstaan de persoon, niet
      zijnde de persoon van wie door het college van burgemeester en wethouders is vastgesteld dat hij uitsluitend in
      een beschutte omgeving onder aangepaste omstandigheden mogelijkheden tot arbeidsparticipatie heeft als bedoeld in
      [artikel 10b, eerste lid, van de Participatiewet][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel10b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38b
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: 10b
    # Umbrella machine_readable voor artikel 38b (doelgroepregister
    # banenafspraak). Aggregeert sub-leden 38b.1.a t/m 38b.1.f
    # (opname-gronden), 38b.2 (UWV-oordeel jonggehandicapt), 38b.3
    # (AMvB-delegatie beoordeling lid 2), 38b.4 (definitie verloonde uren).
    #
    # Doel: drie output-vragen voor Financieel CV banenafspraak-flow:
    #   1. behoort_tot_doelgroepregister_banenafspraak (kernoutput)
    #   2. datum_opname_doelgroepregister + grond_opname (voor LKV-3-jaartermijn)
    #   3. vaststelling_door (UWV — zie 38b.1.a, 38b.1.e, 38b.2)
    #
    # Uitsluiting volgens chapeau: persoon waarvoor college vaststelt dat
    # uitsluitend in beschutte omgeving onder aangepaste omstandigheden
    # mogelijkheden tot arbeidsparticipatie (Pwet 10b lid 1) — die persoon
    # is GEEN arbeidsbeperkte in zin van 38b en hoort dus niet in het
    # doelgroepregister banenafspraak (wel in beschut-werk-traject).
    #
    # 38b.5 (definitie 'de beschikking') en 38b.6 (registratie-blijfgrond)
    # vallen buiten scope per prompt: alleen 38b.1 t/m 38b.4.
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: bsn
            type: string
            required: true
            description: BSN van de persoon waarvan doelgroep-status wordt bepaald.
          - name: is_uitgesloten_beschut_werk_pwet_10b
            type: boolean
            required: true
            description: |-
              Chapeau-uitsluiting: door college vastgesteld dat persoon
              uitsluitend in beschutte omgeving onder aangepaste omstandigheden
              mogelijkheden tot arbeidsparticipatie heeft (Pwet 10b lid 1).
              Bron: gemeente. Zo'n persoon is per definitie GEEN
              arbeidsbeperkte in zin van 38b.1.
          - name: is_pwet_lks_toegeleid_met_uwv_loonwaarde_vaststelling
            type: boolean
            required: true
            description: |-
              38b.1.a: persoon is met collegale ondersteuning (Pwet 7 lid 1.a)
              toegeleid naar dienstbetrekking OF loonkostensubsidie wordt
              verstrekt op grond van Pwet 10d lid 2, EN UWV (op verzoek
              college) heeft vastgesteld dat persoon niet in staat is WML te
              verdienen, OF college heeft loonwaarde < WML vastgesteld
              conform Pwet 10d. Bron: UWV + gemeente.
          - name: is_wsw_geindiceerd_of_oude_indicatie
            type: boolean
            required: true
            description: |-
              38b.1.b: geïndiceerd in zin van Wet sociale werkvoorziening,
              of nog geldende indicatiebeschikking op grond van WSW art. 11
              zoals dat luidde op 31-12-2014. Bron: UWV / SVB.
          - name: heeft_wajong_arbeidsondersteuning_of_uitkering
            type: boolean
            required: true
            description: |-
              38b.1.c: recht op arbeidsondersteuning of arbeidsongeschiktheids-
              uitkering Wajong. Uitsluiting: persoon heeft duurzaam geen
              mogelijkheden tot arbeidsparticipatie (Wajong 1a:1) — die
              valt buiten 38b.1.c. Bron: UWV.
          - name: heeft_wajong_duurzaam_geen_mogelijkheden
            type: boolean
            required: true
            description: |-
              38b.1.c uitzondering: vastgesteld op grond van Wajong 1a:1
              dat persoon duurzaam geen mogelijkheden tot arbeidsparticipatie
              heeft. Sluit grond 38b.1.c uit. Bron: UWV.
          - name: voldoet_aan_amvb_indicatie_38b_1_d
            type: boolean
            required: true
            description: |-
              38b.1.d: voldoet aan bij of krachtens AMvB vastgestelde
              indicatie. Bron: UWV (uitvoering AMvB).
              AMvB-implementatie is open_term — niet in deze YAML
              gemodelleerd; engine ontvangt vlag van uitvoering.
          - name: is_pwet_toegeleid_met_uwv_wml_vaststelling_eigen_verzoek
            type: boolean
            required: true
            description: |-
              38b.1.e: persoon is met collegale ondersteuning (Pwet 7 lid 1.a)
              toegeleid naar dienstbetrekking EN op EIGEN VERZOEK heeft UWV
              vastgesteld dat persoon niet in staat is WML te verdienen.
              Bron: UWV.
          - name: was_arbeidsbeperkte_lid_1_b_of_c_op_of_na_2013_01_01
            type: boolean
            required: true
            description: |-
              38b.1.f overgangsrecht: persoon was op of na 1-1-2013 een
              persoon als bedoeld in lid 1 onderdeel b (Wsw) of c (Wajong),
              EN op 1-5-2015 niet langer zodanig persoon. Uitzondering:
              voormalige Wajong-er die duurzaam geen mogelijkheden meer
              heeft (Wajong 1a:1) valt buiten. Bron: UWV-historie.
          - name: was_lid_1_c_en_nu_wajong_duurzaam_geen_mogelijkheden
            type: boolean
            required: true
            description: |-
              38b.1.f uitsluiting: persoon valt onder onderdeel c-historie
              (Wajong) maar heeft inmiddels duurzaam geen mogelijkheden
              tot arbeidsparticipatie (Wajong 1a:1). Bron: UWV.
          - name: is_jonggehandicapt_uwv_oordeel_lid_2
            type: boolean
            required: true
            description: |-
              38b.2: UWV oordeelt dat persoon wegens ziekte/gebrek ontstaan
              voor 18e levensjaar of als studerende (Wajong 1:4) belemmering
              ondervindt, een voorziening ontvangt op grond van Pwet 10 of
              WIA 35, en zonder die voorziening geen WML kan verdienen.
              Bron: UWV-beoordeling (AMvB-regels per 38b.3). Wordt voor
              toepassing van deze paragraaf MEDE als arbeidsbeperkte
              beschouwd.
          - name: datum_eerste_opname_doelgroepregister
            type: date
            required: true
            description: |-
              Datum van eerste opname in doelgroepregister banenafspraak
              door UWV (datasource UWV). Wordt gebruikt voor afgeleide
              outputs zoals LKV-banenafspraak-termijn (3 jaar vanaf
              opname). Voor 38b.1 zelf niet rechtstreeks vereist; dient
              als pass-through naar afnemers (Wtl, Ziektewet).
        output:
          - name: behoort_tot_doelgroepregister_banenafspraak
            type: boolean
            description: |-
              Kernoutput: voldoet persoon aan een van de gronden van
              38b.1 (a t/m f) of 38b.2, en is hij niet uitgesloten op
              grond van chapeau (beschut werk Pwet 10b). Bepaalt opname
              in doelgroepregister banenafspraak.
          - name: voldoet_aan_grond_38b_1_a
            type: boolean
            description: 38b.1.a — Pwet LKS-traject + UWV-loonwaarde/WML-vaststelling.
          - name: voldoet_aan_grond_38b_1_b
            type: boolean
            description: 38b.1.b — Wsw-indicatie.
          - name: voldoet_aan_grond_38b_1_c
            type: boolean
            description: 38b.1.c — Wajong met arbeidsmogelijkheden.
          - name: voldoet_aan_grond_38b_1_d
            type: boolean
            description: 38b.1.d — AMvB-indicatie.
          - name: voldoet_aan_grond_38b_1_e
            type: boolean
            description: 38b.1.e — Pwet toeleiding + UWV WML-vaststelling op eigen verzoek.
          - name: voldoet_aan_grond_38b_1_f
            type: boolean
            description: 38b.1.f — overgangsrecht (was b of c, nu niet meer).
          - name: voldoet_aan_grond_38b_2
            type: boolean
            description: 38b.2 — UWV-oordeel jonggehandicapt met voorziening.
          - name: grond_opname_doelgroepregister
            type: string
            description: |-
              Eerst-passende grond volgens IF-volgorde a → b → c → d → e
              → f → lid 2. Enum: 'pwet_lks_uwv_loonwaarde' | 'wsw' |
              'wajong' | 'amvb_38b_1_d' | 'pwet_uwv_wml_eigen_verzoek' |
              'overgangsrecht_38b_1_f' | 'jonggehandicapt_uwv_oordeel' |
              'geen'.
          - name: datum_opname_doelgroepregister
            type: date
            description: |-
              Datum waarop persoon is opgenomen in doelgroepregister
              banenafspraak. Pass-through van invoer (UWV-bron).
              Voor LKV-banenafspraak-periode (3 jaar vanaf opname,
              Wtl 2.10-2.13).
          - name: vaststelling_door
            type: string
            description: |-
              Bevoegd gezag voor doelgroep-vaststelling 38b. Enum:
              'UWV'. 38b.1.a, 38b.1.e en 38b.2 noemen expliciet UWV
              als vaststeller; 38b.1.b (Wsw-indicatie) en 38b.1.c
              (Wajong-recht) leunen op vaststellingen die UWV beheert
              of administreert. AMvB-grond 38b.1.d wordt uitgevoerd
              door UWV per 38d. Constant 'UWV'.
          - name: verloonde_uren_definitie_actief
            type: boolean
            description: |-
              38b.4 — definitie van 'verloonde uren' is van toepassing in
              deze paragraaf en in artikel 122n. Pass-through TRUE; het
              feitelijke aantal verloonde uren komt uit polisadministratie
              SUWI 33 en loonaangifte (Wet LB 1964 28). Niet hier
              gemodelleerd.
        actions:
          - output: voldoet_aan_grond_38b_1_a
            value: $is_pwet_lks_toegeleid_met_uwv_loonwaarde_vaststelling
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.a'
              explanation: |-
                Pwet 7 lid 1.a-toeleiding of LKS via Pwet 10d lid 2, met
                UWV-vaststelling 'kan WML niet verdienen' op verzoek van
                het college, dan wel college-loonwaarde < WML.
          - output: voldoet_aan_grond_38b_1_b
            value: $is_wsw_geindiceerd_of_oude_indicatie
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.b'
              explanation: |-
                Wsw-indicatie of nog geldende oude indicatiebeschikking
                (Wsw 11, situatie 31-12-2014).
          - output: voldoet_aan_grond_38b_1_c
            value:
              operation: AND
              conditions:
                - $heeft_wajong_arbeidsondersteuning_of_uitkering
                - operation: NOT
                  value: $heeft_wajong_duurzaam_geen_mogelijkheden
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.c'
              explanation: |-
                Wajong-recht (arbeidsondersteuning of AO-uitkering),
                tenzij persoon duurzaam geen mogelijkheden tot
                arbeidsparticipatie heeft (Wajong 1a:1).
          - output: voldoet_aan_grond_38b_1_d
            value: $voldoet_aan_amvb_indicatie_38b_1_d
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.d'
              explanation: |-
                Voldoet aan bij of krachtens AMvB vastgestelde indicatie.
                Concrete invulling AMvB valt buiten deze YAML.
          - output: voldoet_aan_grond_38b_1_e
            value: $is_pwet_toegeleid_met_uwv_wml_vaststelling_eigen_verzoek
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.e'
              explanation: |-
                Pwet 7 lid 1.a-toeleiding + UWV-vaststelling op eigen
                verzoek dat persoon WML niet kan verdienen.
          - output: voldoet_aan_grond_38b_1_f
            value:
              operation: AND
              conditions:
                - $was_arbeidsbeperkte_lid_1_b_of_c_op_of_na_2013_01_01
                - operation: NOT
                  value: $was_lid_1_c_en_nu_wajong_duurzaam_geen_mogelijkheden
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.f'
              explanation: |-
                Overgangsrecht: was op/na 1-1-2013 persoon als bedoeld in
                onderdeel b of c, en op 1-5-2015 niet langer; uitzondering
                voor voormalige Wajong-er die nu duurzaam geen mogelijkheden
                heeft (Wajong 1a:1).
          - output: voldoet_aan_grond_38b_2
            value: $is_jonggehandicapt_uwv_oordeel_lid_2
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '2'
              explanation: |-
                UWV-oordeel: belemmering door ziekte/gebrek ontstaan voor
                18 jaar (of als studerende, Wajong 1:4), voorziening op
                grond van Pwet 10 of WIA 35, en zonder voorziening geen
                WML. Beoordelingsregels per AMvB (38b.3).
          - output: behoort_tot_doelgroepregister_banenafspraak
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value: $is_uitgesloten_beschut_werk_pwet_10b
                - operation: OR
                  conditions:
                    - $voldoet_aan_grond_38b_1_a
                    - $voldoet_aan_grond_38b_1_b
                    - $voldoet_aan_grond_38b_1_c
                    - $voldoet_aan_grond_38b_1_d
                    - $voldoet_aan_grond_38b_1_e
                    - $voldoet_aan_grond_38b_1_f
                    - $voldoet_aan_grond_38b_2
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1, 2'
              explanation: |-
                Persoon is arbeidsbeperkte in zin van 38b (en hoort dus
                in doelgroepregister banenafspraak, mits ook ingeschreven
                door UWV per 38d) als hij voldoet aan minimaal één grond
                van 38b lid 1 (a t/m f) of lid 2, EN niet onder de
                chapeau-uitsluiting valt (uitsluitend beschut werk Pwet 10b).
          - output: grond_opname_doelgroepregister
            value:
              operation: IF
              cases:
                - when: $voldoet_aan_grond_38b_1_a
                  then: pwet_lks_uwv_loonwaarde
                - when: $voldoet_aan_grond_38b_1_b
                  then: wsw
                - when: $voldoet_aan_grond_38b_1_c
                  then: wajong
                - when: $voldoet_aan_grond_38b_1_d
                  then: amvb_38b_1_d
                - when: $voldoet_aan_grond_38b_1_e
                  then: pwet_uwv_wml_eigen_verzoek
                - when: $voldoet_aan_grond_38b_1_f
                  then: overgangsrecht_38b_1_f
                - when: $voldoet_aan_grond_38b_2
                  then: jonggehandicapt_uwv_oordeel
              default: geen
              legal_basis:
                law: Wet financiering sociale verzekeringen
                bwb_id: BWBR0017745
                article: 38b
                paragraph: '1, 2'
                explanation: |-
                  Eerst-passende grond volgens volgorde a → b → c → d → e
                  → f → lid 2. Volgorde volgt de wettekst; bij samenloop
                  primeert de eerder genoemde grond (modelleer-keuze).
          - output: datum_opname_doelgroepregister
            value: $datum_eerste_opname_doelgroepregister
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              explanation: |-
                Pass-through. Datum opname in registratie wordt door UWV
                bijgehouden (38d lid 1) en is geen rekenresultaat van
                deze paragraaf zelf.
          - output: vaststelling_door
            value: UWV
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '1.a, 1.e, 2'
              explanation: |-
                UWV is de aangewezen vaststeller voor de doelgroep-
                kenmerken in 38b. 38b.1.a: 'door het UWV is vastgesteld';
                38b.1.e: 'door het UWV is of wordt vastgesteld';
                38b.2: 'naar het oordeel van het UWV'. Voor 38b.1.b/c
                berust de status op uitvoeringsadministraties die UWV
                beheert. AMvB-uitvoering 38b.1.d gebeurt eveneens door UWV.
          - output: verloonde_uren_definitie_actief
            value: true
            legal_basis:
              law: Wet financiering sociale verzekeringen
              bwb_id: BWBR0017745
              article: 38b
              paragraph: '4'
              explanation: |-
                38b.4 definieert 'verloonde uren' voor deze paragraaf en
                artikel 122n: uren waarover loon is betaald, opgenomen in
                loonaangifte (Wet LB 1964 art. 28 lid 1) én in
                polisadministratie (SUWI art. 33 lid 2). Geen rekenoutput
                hier; afnemers gebruiken polisadministratie.
      untranslatables:
        - construct: 'AMvB-indicatie (38b.1.d) — verwijst naar nog op te stellen indicatie'
          reason: |-
            38b.1.d delegeert de inhoudelijke indicatie naar een AMvB
            ('bij of krachtens algemene maatregel van bestuur vastgestelde
            indicatie'). De feitelijke indicatie-criteria staan niet in
            38b zelf en zijn dus niet uit dit artikel zelf afleidbaar.
            Modelleer-keuze: parameter $voldoet_aan_amvb_indicatie_38b_1_d
            (bron: UWV); ware modellering via open_terms/implements naar
            de AMvB valt buiten deze iteratie (geen aparte AMvB-YAML).
          accepted: true
        - construct: 'AMvB-beoordelingsregels jonggehandicapt (38b.3)'
          reason: |-
            38b.3 delegeert beoordelingsregels voor het UWV-oordeel onder
            38b.2 naar een AMvB. De engine ontvangt de uitkomst van die
            beoordeling als vlag $is_jonggehandicapt_uwv_oordeel_lid_2;
            de onderliggende beoordeling zelf wordt niet hier gemodelleerd.
          accepted: true
        - construct: 'definitie verloonde uren (38b.4) — alleen begripsbepaling'
          reason: |-
            38b.4 is een definitie-artikel: het verklaart wat 'verloonde
            uren' betekent. Het levert zelf geen numeriek aantal verloonde
            uren — dat komt uit polisadministratie. Output
            verloonde_uren_definitie_actief is een pass-through TRUE die
            aangeeft dat de definitie geldt; afnemende artikelen
            (bv. Wtl 2.13 of Wfsv 122n) halen het feitelijke aantal uit
            externe bron.
          accepted: true
        - construct: 'datum_opname_doelgroepregister als invoer (geen berekening)'
          reason: |-
            De opname-datum wordt door UWV vastgelegd in de registratie
            (38d). 38b zelf bevat geen berekening van deze datum; de YAML
            modelleert dit als pass-through-invoer. Voor LKV-banenafspraak-
            periode (3 jaar) gebruiken afnemers de datum die UWV verstrekt.
          accepted: true
        - construct: 'chapeau-uitsluiting beschut werk (Pwet 10b lid 1)'
          reason: |-
            Het chapeau van 38b.1 sluit personen uit die door college zijn
            vastgesteld als uitsluitend in beschutte omgeving onder
            aangepaste omstandigheden. Deze vaststelling is een Pwet-
            vaststelling (college). Cross-law via source.regulation naar
            Pwet zou cleaner zijn; modelleer-keuze nu: parameter-vlag
            $is_uitgesloten_beschut_werk_pwet_10b. Latere iteratie kan
            naar Pwet 10b koppelen.
          accepted: true

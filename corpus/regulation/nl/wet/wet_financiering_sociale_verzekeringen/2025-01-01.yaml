  - number: 122h
    text: |-
      Alle vermogensbestanddelen die door het UWV, genoemd in
      [hoofdstuk 5, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1],
      afzonderlijk worden beheerd en geadministreerd in de vorm van een Arbeidsongeschiktheidskas
      als bedoeld in [artikel 113][ref2], zoals dat luidde op de dag voor de inwerkingtreding van
      [artikel IV, onderdeel G, van de Wet Harmonisatie en vereenvoudiging socialezekerheidswetgeving][ref3], gaan over
      op het Arbeidsongeschiktheidsfonds, bedoeld [artikel 112][ref4], overeenkomstig door Onze Minister te stellen
      regels.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel113
      [ref3]: https://wetten.overheid.nl/BWBR0029334#ArtikelIV
      [ref4]: https://wetten.overheid.nl/BWBR0017745#Artikel112

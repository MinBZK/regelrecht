  - number: 124b
    text: |-
      De Minister van Sociale Zaken en Werkgelegenheid zendt binnen vijf jaar na de inwerkingtreding van
      [artikel 38d][ref1] aan de Staten-Generaal een verslag over de doeltreffendheid en de effecten van dit artikel in
      de praktijk.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38d
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel124b
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38d
        hoofdstuk: '3'
        paragraaf: 4a
        afdeling: '4'
  - number: '125.1'
    text: |-
      Hij die niet voldoet aan de inlichtingenplicht, bedoeld in [artikel 77][ref1], wordt gestraft met hechtenis van ten
      hoogste zes maanden of een geldboete van de derde categorie.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel77
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel125
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '77'
        hoofdstuk: '6'
        afdeling: '3'
  - number: '125.2'
    text: |-
      Hij die door hem op grond van deze wet betaalde of verschuldigde premie inhoudt op het loon van of op enige andere
      wijze verhaalt op een werknemer of gewezen werknemer, zonder dat dit bij deze wet is toegestaan, wordt gestraft met
      hechtenis van ten hoogste een maand of geldboete van de tweede categorie.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel125
  - number: '125.3'
    text: De in het eerste en tweede lid bedoelde strafbare feiten zijn overtredingen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel125
  - number: '126'
    text: |-
      Voor de plaatsing in het Staatsblad stelt Onze Minister de nummering van de artikelen, paragrafen, afdelingen
      en hoofdstukken van deze wet opnieuw vast en brengt hij de in deze wet voorkomende aanhalingen van de artikelen,
      paragrafen, afdelingen en hoofdstukken met de nieuwe nummering in overeenstemming.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel126
  - number: '127'
    text: |-
      De artikelen van deze wet treden in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de
      verschillende artikelen of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel127
  - number: '128'
    text: 'Deze wet wordt aangehaald als: Wet financiering sociale verzekeringen.'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel128

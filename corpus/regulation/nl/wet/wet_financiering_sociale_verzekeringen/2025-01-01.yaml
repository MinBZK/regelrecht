        artikel: IV
  - number: 122j
    text: |-
      [Artikel 64][ref1], zoals dat luidde op dag voorafgaand aan de inwerkingtreding van
      [artikel IV, onderdeel K, van de Wet harmonisatie en vereenvoudiging socialezekerheidswetgeving][ref2], blijft van
      toepassing op ontheffingen die op grond van dat artikel zijn verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel64
      [ref2]: https://wetten.overheid.nl/BWBR0029334#ArtikelIV
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122j

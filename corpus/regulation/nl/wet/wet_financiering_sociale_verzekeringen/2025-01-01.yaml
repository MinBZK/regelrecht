  - number: 38a.2
    text: |-
      Behalve voor degene die loon ontvangt uit een dienstbetrekking op grond van de [Wet sociale werkvoorziening][ref1]
      wordt het eerste lid niet toegepast ingeval het UWV de uitkering, vermeerderd met de daarover door de werkgever
      verschuldigde premies en de inkomensafhankelijke bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref2],
      betaalt aan de werkgever, bedoeld in [artikel 11 van de Wet werk en inkomen naar arbeidsvermogen][ref3] en in
      [artikel 9][ref4], [10][ref5] of [12 van de Werkloosheidswet][ref6] en de [Ziektewet][ref7], onafhankelijk van het
      voortbestaan van de dienstbetrekking met die werkgever.


      [ref1]: https://wetten.overheid.nl/BWBR0008903
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel42
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0004045#Artikel9
      [ref5]: https://wetten.overheid.nl/BWBR0004045#Artikel10
      [ref6]: https://wetten.overheid.nl/BWBR0004045#Artikel12
      [ref7]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel38a
    references:
      - id: ref1
        bwb_id: BWBR0008903
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '42'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0004045

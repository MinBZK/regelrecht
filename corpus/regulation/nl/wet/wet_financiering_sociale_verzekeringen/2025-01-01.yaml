        artikel: '10'
        hoofdstuk: '2'
        paragraaf: '3'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0002471
  - number: '7'
    text: De maatstaf voor de heffing van de premie voor de volksverzekeringen is het premie-inkomen van de premieplichtige.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel7
  - number: '8.1'
    text: |-
      Voor de heffing van de premie voor de volksverzekeringen bij wege van aanslag wordt onder premie-
      inkomen verstaan het belastbare inkomen uit werk en woning, bepaald volgens de regels van
      [hoofdstuk 3 van de Wet inkomstenbelasting 2001][ref1]. De toerekening van de gemeenschappelijke
      inkomensbestanddelen van de premieplichtige en zijn partner geschiedt overeenkomstig
      [artikel 2.17 van de Wet inkomstenbelasting 2001][ref2]. In het geval de premieplichtige en zijn partner beiden
      belastingplichtig zijn, geldt de gemaakte keuze, bedoeld in [artikel 2.17, tweede lid, van die wet][ref3], zowel
      voor de heffing van de inkomstenbelasting als voor de heffing van de premie voor de volksverzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0011353#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0011353#Artikel2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel8
    references:
      - id: ref1
        bwb_id: BWBR0011353
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0011353
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0011353
        artikel: '2'
  - number: '8.2'
    text: |-
      Voor de heffing van de premie voor de volksverzekeringen bij wijze van inhouding wordt onder premie-inkomen
      verstaan het belastbare loon in de zin van de [Wet op de loonbelasting 1964][ref1] met uitzondering van de
      eindheffingsbestanddelen, bedoeld in [artikel 31, eerste lid, onderdelen d tot en met g, van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0002471
      [ref2]: https://wetten.overheid.nl/BWBR0002471#Artikel31
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel8
    references:
      - id: ref1
        bwb_id: BWBR0002471
      - id: ref2
        bwb_id: BWBR0002471
        artikel: '31'
  - number: '8.3'
    text: |-
      Het premie-inkomen wordt tot geen hoger bedrag in aanmerking genomen dan het als eerste vermelde bedrag in kolom
      II van de tarieftabel in [artikel 2.10, eerste lid, van de Wet inkomstenbelasting 2001][ref1]. In afwijking
      van de eerste volzin wordt het premie-inkomen van een premieplichtige die is geboren vóór 1 januari 1946 tot
      geen hoger bedrag in aanmerking genomen dan het als eerste vermelde bedrag in kolom II van de tarieftabel in
      [artikel 2.10a, eerste lid, van de Wet inkomstenbelasting 2001][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0011353#Artikel2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel8
    references:

        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 117b.3.j
    text: |-
      het een WGA-uitkering betreft, toegekend aan een werknemer, die naar de dienstbetrekking waaruit de
      WGA uitkering is ontstaan, is toegeleid door het college van burgemeester en wethouders op grond van
      [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] en waarbij bij ziekte van die werknemer
      de mogelijkheid tot vergoeding als bedoeld in [artikel 8a, tweede lid, onderdeel b, van die wet][ref2],
      zoals dat luidde op 31 december 2015, van toepassing was of het ziekengeld betreft als bedoeld in
      [artikel 29, tweede lid, onderdeel a, b en c][ref3], dat aan die werknemer is toegekend direct aansluitend op een
      hiervoor bedoelde dienstbetrekking;


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel8a
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0015703
        artikel: 8a
      - id: ref3
        bwb_id: BWBR0001888
        artikel: '29'
  - number: 117b.3.k
    text: |-
      het ziekengeld betreft als bedoeld in [artikel 29, tweede lid, onderdelen a, b en c, van de Ziektewet][ref1]
      toegekend aan een werknemer direct aansluitend op een dienstbetrekking waarin recht op ziekengeld op grond van
      [artikel 29, tweede lid, onderdeel e, f of g, van de Ziektewet][ref2] bestond;


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '29'
  - number: 117b.3.l
    text: |-
      het een WGA-uitkering als bedoeld in [paragraaf 2.2 van de Wet werk en inkomen naar arbeidsvermogen][ref1] betreft.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Paragraaf2.2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
    references:
      - id: ref1
        bwb_id: BWBR0019057
        paragraaf: '2.2'
  - number: 117b.4
    text: |-
      Het UWV bezigt de middelen die zijn gereserveerd ten behoeve van de Werkhervattingskas niet tot bestrijding van
      uitgaven ten laste van de Werkhervattingskas dan met toestemming van Onze Minister.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
  - number: 117b.5
    text: 'Ten laste van de Werkhervattingskas komen voorts:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
  - number: 117b.5.b
    text: |-
      de loonkostensubsidie, bedoeld in [artikel 37a van de Wet werk en inkomen naar arbeidsvermogen][ref1] zoals dat
      luidde op 31 december 2011, indien de uitkeringsgerechtigde, met wie de werkgever aan wie de loonkostensubsidie
      wordt verstrekt een dienstbetrekking aangaat of is aangegaan, op de dag voorafgaand aan die dienstbetrekking recht
      heeft op een uitkering die ten laste komt van de Werkhervattingskas;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel37a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 37a
  - number: 117b.5.c
    text: |-
      de kosten die verband houden met de uitvoering van
      [artikel 30a, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] ten aanzien van een
      uitkeringsgerechtigde, indien deze ten tijde van het aanvangen van de werkzaamheden van het re-integratiebedrijf,
      bedoeld in het achtste lid van dat artikel, recht heeft op een uitkering die ten laste komt van de
      Werkhervattingskas.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 117b.6
    text: Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot dit artikel.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel117b
  - number: '118.1'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld omtrent de overheveling van gelden uit het
      Arbeidsongeschiktheidsfonds naar de Werkhervattingskas.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118
  - number: '118.2'
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over de overheveling van gelden uit het
      Arbeidsongeschiktheidsfonds naar het Rijk ten behoeve van de financiering van uitkeringen en re-
      integratievoorzieningen op grond van de [Wet arbeidsongeschiktheids-voorziening jonggehandicapten][ref1], en de
      financiering van uitkeringen en re-integratievoorzieningen op grond van de [Participatiewet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657
      [ref2]: https://wetten.overheid.nl/BWBR0015703
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118
    references:
      - id: ref1
        bwb_id: BWBR0008657
      - id: ref2
        bwb_id: BWBR0015703
  - number: 118a.1
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald, dat de colleges van burgemeester en wethouders uitkeringen
      aan werknemers, die voorafgaande aan de dienstbetrekking, door die colleges van burgemeester en wethouders op grond
      van [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] zijn ondersteund bij de arbeidsinschakeling
      vergoeden aan het UWV, indien de dienstbetrekking een bij die maatregel te bepalen tijd heeft geduurd.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
  - number: 118a.2
    text: 'Bij of krachtens de algemene maatregel van bestuur, bedoeld in het eerste lid, wordt in ieder geval geregeld:'
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.2.a
    text: welke uitkeringen op grond van de werknemersverzekeringen dit betreft;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.2.b
    text: de doelgroep van de werknemers;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.2.c
    text: de hoogte van de vergoeding;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.2.d
    text: de wijze van vergoeding;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.2.e
    text: ten gunste van welk fonds, bedoeld in deze afdeling, de vergoedingen komen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.3
    text: |-
      Een voordracht voor een krachtens dit artikel vast te stellen algemene maatregel van bestuur wordt niet eerder
      gedaan dan vier weken nadat het ontwerp aan beide Kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: 118a.4
    text: |-
      Een op grond van dit artikel vastgestelde algemene maatregel van bestuur treedt slechts in werking, nadat gebleken
      is dat aan werknemers als bedoeld in het eerste lid bovenmatig uitkeringen op grond van de werknemersverzekeringen
      worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel118a
  - number: '119.1'
    text: Het Zorginstituut, het UWV en de SVB beheren en administreren elk fonds afzonderlijk.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel119
  - number: '119.2'
    text: |-
      Indien met betrekking tot een fonds de lasten de baten blijken te overtreffen, wordt het tekort niet gedekt uit een
      ander fonds.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel119
  - number: '119.3'
    text: |-
      Het Zorginstituut, het UWV en de SVB houden, elk afzonderlijk, de financiële middelen die deel uitmaken van hun
      fondsen aan in een of meer rekeningen-courant bij Onze Minister van Financiën.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel119
  - number: '119.4'
    text: |-
      In afwijking van het derde lid kunnen het Zorginstituut, het UWV en de SVB een deel van de in het derde lid
      bedoelde financiële middelen buiten de in het derde lid bedoelde rekeningen-courant houden.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel119
  - number: '119.5'
    text: |-
      Bij regeling van Onze Minister en Onze Minister van Volksgezondheid, Welzijn en Sport worden, in overeenstemming
      met Onze Minister van Financiën, na overleg met het Zorginstituut, de SVB en het UWV, regels gesteld betreffende de
      omvang van het in het vierde lid bedoelde deel van de financiële middelen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel119
  - number: '119.6'
    text: |-
      Bij regeling van Onze Minister en Onze Minister van Volksgezondheid, Welzijn en Sport kunnen, in overeenstemming
      met Onze Minister van Financiën, nadere regels worden gesteld omtrent het derde lid.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel119
  - number: '120.1'
    text: |-
      Het Zorginstituut, het UWV en de SVB kunnen, voor de uitvoering van hun wettelijke taken, beschikken over de
      financiële middelen die zij in rekening-courant bij Onze Minister van Financiën aanhouden.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
  - number: '120.2'
    text: |-
      Bij regeling van Onze Minister van Financiën worden, in overeenstemming met Onze Minister en Onze Minister van
      Volksgezondheid, Welzijn en Sport en na overleg met het Zorginstituut, het UWV en de SVB, regels gesteld omtrent
      de rente die over de saldi van de in [artikel 119, derde lid][ref1], bedoelde rekeningen-courant wordt vergoed
      onderscheidenlijk in rekening wordt gebracht.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel119
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '119'
        hoofdstuk: '7'
        afdeling: '4'
  - number: '120.3'
    text: |-
      Onze Minister van Financiën brengt voor het beheer van de in [artikel 119, derde lid][ref1], bedoelde rekeningen-
      courant geen kosten in rekening.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel119
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '119'
        hoofdstuk: '7'
        afdeling: '4'
  - number: '120.4'
    text: |-
      Bij een tekort aan financiële middelen maken het Zorginstituut, het UWV en de SVB uitsluitend gebruik van de
      kredietfaciliteiten die door Onze Minister van Financiën worden verleend of lenen het UWV en de SVB uit een door
      hen beheerd fonds.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
  - number: '120.5'
    text: |-
      Onze Minister van Financiën informeert dagelijks het Zorginstituut, het UWV en de SVB ten aanzien van de in
      [artikel 119, derde lid][ref1], bedoelde rekeningen-courant, in elk geval met betrekking tot:


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel119
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '119'
        hoofdstuk: '7'
        afdeling: '4'
  - number: 120.5.a
    text: de slotstanden per dag;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
  - number: 120.5.b
    text: alle dagelijks geboekte mutaties of transacties in de desbetreffende rekening-courant.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
  - number: '120.6'
    text: |-
      Het Zorginstituut, het UWV en de SVB informeren Onze Minister van Financiën ten aanzien van de in
      [artikel 119, derde lid][ref1], bedoelde rekeningen-courant, in elk geval met betrekking tot de prognoses van de
      saldi van de desbetreffende rekening-courant.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel119
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '119'
        hoofdstuk: '7'
        afdeling: '4'
  - number: '120.7'
    text: |-
      Bij regeling van Onze Minister en Onze Minister van Volksgezondheid, Welzijn en Sport kunnen, in overeenstemming
      met Onze Minister van Financiën en na overleg met het Zorginstituut, het UWV en de SVB, nadere regels worden
      gesteld omtrent het vierde, vijfde en zesde lid.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
  - number: '120.8'
    text: |-
      Bij regeling van Onze Minister en Onze Minister van Volksgezondheid, Welzijn en Sport, in overeenstemming met Onze
      Minister van Financiën, kunnen regels worden gesteld met betrekking tot de door het College zorgverzekeringen,
      het UWV en de SVB beheerde fondsen betreffende de onderscheiding van het vermogen van het fonds in verschillende
      bestanddelen en de normen tot vaststelling van de omvang van deze bestanddelen.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel120
  - number: '121.1'
    text: |-
      Jaarlijks vóór bij regeling van Onze Minister vast te stellen tijdstippen zenden het UWV en de SVB aan Onze
      Minister met betrekking tot elk fonds afzonderlijk:
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel121
  - number: 121.1.a
    text: |-
      een rapportage van de ontwikkelingen die zich tot op dat moment hebben voorgedaan met betrekking tot de financiële
      middelen en de gerealiseerde uitgaven;
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel121
  - number: 121.1.b
    text: een begroting van de te verwachten uitgaven uit elk afzonderlijk fonds in het eerstvolgend kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel121
  - number: '121.2'
    text: |-
      Bij regeling van Onze Minister kunnen regels worden gesteld omtrent de aard en inrichting van de in het eerste lid
      bedoelde rapportage en de begroting van uitgaven.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel121
  - number: 121a
    text: |-
      Bij regeling van Onze Minister worden regels gesteld over de wijze waarop en de voorwaarden waaronder de aan het
      UWV en de SVB toegekende rijksbijdragen worden afgedragen en vastgesteld.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel121a
  - number: '122'
    text: |-
      Bij regeling van Onze Minister en Onze Minister van Volksgezondheid, Welzijn en Sport kunnen, in overeenstemming
      met Onze Minister van Financiën, en na overleg met het Zorginstituut, regels worden gesteld over de wijze waarop en
      de voorwaarden waaronder de afdracht van gelden plaatsvindt aan de fondsen die geheel of gedeeltelijk door het Rijk
      worden gefinancierd.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122
  - number: 122a
    text: |-
      Alle vermogensbestanddelen die door het UWV afzonderlijk worden beheerd en geadministreerd in de vorm van
      een sectorfonds als bedoeld in [artikel 94][ref1], zoals dat luidde op de dag voor inwerkingtreding van
      [artikel III, onderdeel I, van de Wet arbeidsmarkt in balans][ref2], gaan over op het Algemeen Werkloosheidsfonds.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel94
      [ref2]: https://wetten.overheid.nl/BWBR0042307#ArtikelIII
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122a
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '94'
        hoofdstuk: '7'
        paragraaf: '1'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0042307
        artikel: III
  - number: 122d
    text: |-
      De premie die op grond van [artikel 27][ref1] is vastgesteld wordt met ingang van het jaar 2015
      in verband met de ontwikkeling van de lasten voor werkgevers voortvloeiend uit de toepassing van
      [artikel 2.2 van de Wet tegemoetkomingen loondomein][ref2] verlaagd met 0,35% in 2015, 0,45% in 2016, 0,55% in
      2017, 0,60% in 2018, 0,70% in 2019 en 0,75% in 2020.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122d
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '27'
        hoofdstuk: '3'
        paragraaf: '5'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '2'
  - number: 122e.1
    text: |-
      De werkgever, die op de dag voorafgaande aan de datum van inwerkingtreding van
      __REF000___________________________________________________________________________________________________________
      ___ het risico draagt voor de betaling van de WGA uitkering, bedoeld in [artikel 40, eerste lid, onderdeel b][ref2],
      zoals dat artikel luidde voor die datum wordt na die datum geacht het risico te dragen voor betalingen als bedoeld
      in artikel 40, eerste lid, onderdeel b, met ingang van die datum, indien hij een garantie overlegt als bedoeld in
      artikel 40, tweede lid, die betrekking heeft op het dragen van dit risico.


      [ref1]: https://wetten.overheid.nl/BWBR0032089#ArtikelIII
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122e
    references:
      - id: ref1
        bwb_id: BWBR0032089
        artikel: III
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 122e.2
    text: |-
      De werkgever overlegt de garantie, bedoeld in het eerste lid, uiterlijk een dag voor de datum van inwerkingtreding,
      bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122e
  - number: 122e.3
    text: |-
      Het door de werkgever zelf dragen van het risico, bedoeld in [artikel 40, eerste lid, onderdeel a][ref1], wordt,
      onverminderd artikel 40, tiende lid, onderdeel b, door de inspecteur met ingang van de datum van inwerkingtreding,
      bedoeld in het eerste lid, beëindigd bij voor bezwaar vatbare beschikking, indien de garantie, bedoeld in het
      eerste lid, niet uiterlijk een dag voor die datum door de werkgever is overlegd.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122e
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 122f
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden regels gesteld voor uitkeringen op grond
      van de [Ziektewet][ref1] aan werknemers die zijn toegekend voor de datum van inwerkingtreding van
      [artikel II van de Wet beperking ziekteverzuim en arbeidsongeschiktheid vangnetters en WGA- uitkeringen][ref2],
      die voor die datum zijn toegekend aan werknemers, die uit de dienstbetrekking waaruit de WGA-uitkering is ontstaan,
      recht hadden op een uitkering op grond van de Ziektewet, en uitvoeringskosten en andere kosten in verband met deze
      uitkeringen, die ten laste komen van bij die maatregel aan te wijzen fondsen.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0032089#ArtikelII
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122f
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0032089
        artikel: II
  - number: 122ga
    text: |-
      De [artikelen 48a][ref1], [48b][ref2] en [115, eerste lid, onderdeel l][ref3], vervallen met ingang van 1 januari
      2018.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel48a
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel48b
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel115
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122ga
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 48a
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 48b

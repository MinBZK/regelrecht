      Koninkrijksrelaties, kan een bedrag worden vastgesteld dat op grond van [artikel 24][ref1] met toepassing van
      [artikel 27][ref2] op uitkeringen op grond van de [Wet op de arbeidsongeschiktheidsverzekering][ref3] of de
      [Wet werk en inkomen naar arbeidsvermogen][ref4] aan overheidswerknemers, volgens een bij die regeling te bepalen
      verdeling wordt afgedragen aan het Uitvoeringsfonds voor de overheid dan wel het Algemeen Werkloosheidsfonds.



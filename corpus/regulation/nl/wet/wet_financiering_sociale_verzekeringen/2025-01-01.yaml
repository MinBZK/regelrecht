        artikel: III
  - number: 122r.1
    text: |-
      In afwijking van [artikel 117b, derde lid, onderdeel c][ref1], komt een door UWV te betalen WGA-uitkering als
      bedoeld in dat onderdeel, niet ten laste van de Werkhervattingskas indien:


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel117b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122r
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 117b
        hoofdstuk: '7'
        paragraaf: '2'
        afdeling: '3'
  - number: 122r.1.a
    text: |-
      op grond van de [artikelen 38a, negende lid][ref1], of [38b, tweede lid, van de Ziektewet][ref2] geen ziekengeld is
      of wordt toegekend; en


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel38a
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel38b
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122r
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: 38a
      - id: ref2
        bwb_id: BWBR0001888
        artikel: 38b
  - number: 122r.1.b
    text: |-
      voor het tijdstip van inwerkingtreding van [artikel XIV, onderdeel D, van de Verzamelwet SZW 2022][ref1]
      bij UWV een aanvraag is gedaan om vast te stellen of de werknemer, aan wie de WGA-
      uitkering is toegekend, uit diezelfde dienstbetrekking recht had op ziekengeld als bedoeld in
      [artikel 29, tweede lid, onderdeel d, e, f of g, van de Ziektewet][ref2] of op ziekengeld als bedoeld in
      artikel 29, tweede lid, onderdelen a, b en c, van de Ziektewet, dat aan de werknemer is toegekend direct
      aansluitend op een dienstbetrekking waarin recht op ziekengeld als bedoeld in artikel 29, tweede lid, onderdeel e,
      f of g, van de Ziektewet bestond.


      [ref1]: https://wetten.overheid.nl/BWBR0046051#ArtikelXIV
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0017745/2025-01-01#Artikel122r
    references:
      - id: ref1

    text: 'in de maand voorafgaand aan de aanvang van de dienstbetrekking of op de eerste dag van de dienstbetrekking:'
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
  - number: 2.10.1.a.1°
    text: |-
      recht had op arbeidsondersteuning of een arbeidsongeschiktheidsuitkering op grond van de
      [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
    references:
      - id: ref1

        artikel: 10d
  - number: 2.10.1.a.4°
    text: |-
      voldeed aan een indicatie als bedoeld in
      [artikel 38b, eerste lid, onderdeel d, van de Wet financiering sociale verzekeringen][ref1]
      of werkzaam was in een dienstbetrekking die is aangewezen op grond van
      [artikel 38f, vijfde lid, van de Wet financiering sociale verzekeringen][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel38f
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
      - id: ref2
        bwb_id: BWBR0017745
        artikel: 38f
  - number: 2.10.1.a.5°
    text: |-
      een arbeidsbeperkte is als bedoeld in
      [artikel 38b, eerste lid, onderdeel f, van de Wet financiering sociale verzekeringen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel38b
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: 38b
  - number: 2.10.1.a.6°

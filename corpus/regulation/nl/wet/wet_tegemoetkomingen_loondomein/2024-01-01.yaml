  - number: 2.15.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen verstrekt uitsluitend aan degene die zijn eigen arbeid geheel
      of gedeeltelijk hervat of een andere functie bij dezelfde werkgever gaat bekleden en, met inachtneming van
      [artikel 2.14, tweede tot en met vierde lid][ref1], voldoet aan de voorwaarden, bedoeld in artikel 2.14, eerste
      lid, onderdeel a, op diens verzoek een verklaring dat de aanvrager aan de genoemde voorwaarden voldoet. Indien
      de doelgroepverklaring niet kan worden verstrekt, wordt het besluit tot weigering uitsluitend verstrekt aan de
      aanvrager van de doelgroepverklaring. De doelgroepverklaring wordt aangevraagd binnen drie maanden na de gehele of
      gedeeltelijke hervatting van zijn eigen arbeid of het gaan bekleden van een andere functie. Bij regeling van Onze
      Minister van Financiën kunnen, in overeenstemming met Onze Minister van Sociale Zaken en Werkgelegenheid, nadere
      regels worden gesteld met betrekking tot de geldigheid van de doelgroepverklaring, bedoeld in de eerste volzin.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.15
    references:

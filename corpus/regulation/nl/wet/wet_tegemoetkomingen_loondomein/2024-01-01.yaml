      van drie jaar vanaf de aanvang van de eerste dienstbetrekking tussen de werkgever en de werknemer waarbij aan de
      voorwaarden, bedoeld in [artikel 2.6][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.8
    references:

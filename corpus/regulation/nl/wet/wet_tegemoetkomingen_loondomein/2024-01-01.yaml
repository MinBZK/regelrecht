      aaneengesloten periode van een jaar vanaf het moment waarop de werknemer zijn eigen arbeid geheel of gedeeltelijk
      heeft hervat of een andere functie bij dezelfde werkgever is gaan bekleden, waarbij aan de voorwaarden, bedoeld in
      [artikel 2.14][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.16
    references:

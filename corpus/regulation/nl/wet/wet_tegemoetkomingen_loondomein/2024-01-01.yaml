        artikel: '4'
        hoofdstuk: IV
  - number: 4.7.5
    text: |-
      De inspecteur stelt de bestuurlijke boete bij beschikking vast. De bevoegdheid tot het opleggen van een boete
      vervalt door verloop van 5 jaren na het einde van het kalenderjaar waarop het verzoek, bedoeld in het eerste lid,
      betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.7
  - number: 4.7.6
    text: |-
      Op dit artikel zijn de [artikelen 67pa][ref1] en [67pb van de Algemene wet inzake rijksbelastingen][ref2] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0002320#Artikel67pa
      [ref2]: https://wetten.overheid.nl/BWBR0002320#Artikel67pb
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0002320
        artikel: 67pa
      - id: ref2
        bwb_id: BWBR0002320
        artikel: 67pb
  - number: '6.1'
    text: |-
      Teneinde zo veel mogelijk evenwicht te bereiken tussen de tegemoetkomingen, bedoeld in de [artikelen 2.2][ref1],
      [2.6][ref2], [2.10][ref3], [2.14][ref4] en [3.1][ref5], en de hiervoor in de rijksbegroting opgenomen bedragen,
      kunnen bij regeling van Onze Minister van Sociale Zaken en Werkgelegenheid met ingang van 1 januari van enig jaar
      de in de [artikelen 2.5][ref6], [2.9][ref7], [2.13][ref8], [2.17][ref9] en [3.2][ref10] opgenomen bedragen worden
      verlaagd dan wel verhoogd.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2

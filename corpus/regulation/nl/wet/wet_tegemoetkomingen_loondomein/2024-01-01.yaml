  - number: '6.3'
    text: |-
      Onze Minister van Sociale Zaken en Werkgelegenheid zendt binnen vier jaar na de inwerkingtreding van deze wet of
      onderdelen daarvan, en vervolgens telkens na vijf jaar, aan de Staten-Generaal een verslag over de doeltreffendheid
      en de effecten van de tegemoetkomingen, bedoeld in de [artikelen 2.1][ref1] en [3.1][ref2], in de praktijk.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.3
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: '6.4'
    text: |-
      De artikelen van deze wet treden in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de
      verschillende artikelen of onderdelen daarvan verschillend kan worden vastgesteld. In dat besluit wordt zo nodig
      toepassing gegeven aan [artikel 12 van de Wet raadgevend referendum][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0036443#Artikel12
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.4
    references:
      - id: ref1
        bwb_id: BWBR0036443
        artikel: '12'
  - number: 6.5.1
    text: 'Deze wet wordt aangehaald als: Wet tegemoetkomingen loondomein.'
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.5
  - number: 6.5.2
    text: 'De citeertitel kan worden afgekort tot: Wtl.'
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.5

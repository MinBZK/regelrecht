      werknemersverzekeringen verzoekt om een doelgroepverklaring als bedoeld in het eerste lid gelijktijdig met dit
      verzoek een bewijs dat hij in de maand voorafgaand aan de hervatting van zijn eigen arbeid of het gaan bekleden
      van een andere functie bij dezelfde werkgever recht had op een uitkering als bedoeld in artikel 2.14, derde lid.
      Bij regeling van Onze Minister van Financiën kunnen, in overeenstemming met Onze Minister van Sociale Zaken en
      Werkgelegenheid, nadere voorwaarden worden gesteld aan dit bewijs.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2

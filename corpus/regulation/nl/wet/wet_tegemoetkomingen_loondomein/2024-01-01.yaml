  - number: 6.2.c
    text: |-
      in de loonaangifte over het laatste aangiftetijdvak van het jaar voorafgaand aan de dag van inwerkingtreding
      van [artikel 5.1][ref1] de indicatie voor de premiekorting, bedoeld in onderdeel b, heeft aangegeven, dan
      wel uiterlijk op de in [artikel 4.1, tweede lid][ref2], bedoelde datum van het jaar waarin artikel 5.1 in
      werking is getreden, de aangifte over dat aangiftetijdvak door middel van een correctiebericht als bedoeld in
      [artikel 28a van de Wet op de loonbelasting 1964][ref3] heeft aangevuld met een indicatie voor de premiekorting,
      bedoeld in onderdeel b;


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0002471#Artikel28a
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.2

  - number: 2.3.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen of, indien het een oudere werknemer betreft die in de maand
      voorafgaand aan zijn dienstbetrekking recht had op een uitkering op grond van de [Participatiewet][ref1],
      de [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers][ref2] of de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen][ref3], het college van
      burgemeester en wethouders, verstrekt uitsluitend aan degene die een dienstbetrekking met een werkgever aangaat
      en, met inachtneming van [artikel 2.2, tweede tot en met vierde lid][ref4], voldoet aan de voorwaarden, bedoeld
      in artikel 2.2, eerste lid, onderdelen a tot en met c, op diens verzoek een verklaring dat deze werknemer aan
      de genoemde voorwaarden voldoet. Indien de doelgroepverklaring niet kan worden verstrekt, wordt het besluit
      tot weigering uitsluitend verstrekt aan de aanvrager van de doelgroepverklaring. De doelgroepverklaring wordt
      aangevraagd binnen drie maanden na aanvang van de dienstbetrekking. Bij regeling van Onze Minister van Financiën
      kunnen, in overeenstemming met Onze Minister van Sociale Zaken en Werkgelegenheid, nadere regels worden gesteld met
      betrekking tot de geldigheid van de doelgroepverklaring, bedoeld in de eerste volzin.


      [ref1]: https://wetten.overheid.nl/BWBR0015703
      [ref2]: https://wetten.overheid.nl/BWBR0004044
      [ref3]: https://wetten.overheid.nl/BWBR0004163
      [ref4]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.3
    references:
      - id: ref1
        bwb_id: BWBR0015703
      - id: ref2
        bwb_id: BWBR0004044
      - id: ref3
        bwb_id: BWBR0004163
      - id: ref4
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.2'
  - number: 2.3.2
    text: |-
      Indien [artikel 2.2, derde lid][ref1], van toepassing is, overlegt degene die het Uitvoeringsinstituut
      werknemersverzekeringen verzoekt om een doelgroepverklaring als bedoeld in het eerste lid gelijktijdig met
      dit verzoek een bewijs dat hij in de maand voorafgaand aan de aanvang van de dienstbetrekking recht had op een
      uitkering als bedoeld in [artikel 2.2, derde lid][ref2]. Bij regeling van Onze Minister van Financiën kunnen, in
      overeenstemming met Onze Minister van Sociale Zaken en Werkgelegenheid, nadere voorwaarden worden gesteld aan dit
      bewijs.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.3
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.2'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.2'
  - number: 2.3.3
    text: De werkgever bewaart de doelgroepverklaring, bedoeld in het eerste lid, bij de loonadministratie.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.3
  - number: 2.4.1
    text: |-
      Een loonkostenvoordeel oudere werknemer wordt ten hoogste verstrekt over een aaneengesloten periode van drie jaar
      vanaf de aanvang van de eerste dienstbetrekking tussen de werkgever en de werknemer waarbij aan de voorwaarden,
      bedoeld in [artikel 2.2][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.4
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.2'
  - number: 2.4.2
    text: |-
      Ingeval de periode waarin het loonkostenvoordeel oudere werknemer van toepassing is, in de loop van een
      aangiftetijdvak begint of eindigt, wordt die periode verlengd met het buiten die periode vallende deel van het
      aangiftetijdvak waarin die periode begint, onderscheidenlijk eindigt.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.4
  - number: '2.5'
    text: |-
      Een loonkostenvoordeel oudere werknemer bedraagt € 3,05 per verloond uur van de werknemers die voldoen aan de
      voorwaarden, bedoeld in [artikel 2.2][ref1], doch ten hoogste € 6.000 per werknemer per kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.5
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.2'
  - number: 2.6.1
    text: |-
      Een werkgever die een verzoek als bedoeld in [artikel 2.1][ref1] heeft gedaan, heeft recht op een
      loonkostenvoordeel arbeidsgehandicapte werknemer indien bij deze werkgever een werknemer in een of meerdere
      dienstbetrekkingen is die:


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
  - number: 2.6.1.a
    text: 'in de maand voorafgaand aan de aanvang van de dienstbetrekking:'
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
  - number: 2.6.1.a.1°
    text: |-
      recht had op een uitkering op grond van de [Wet werk en inkomen naar arbeidsvermogen][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: 2.6.1.a.2°
    text: |-
      arbeidsgehandicapte als bedoeld in [artikel 2 van de Wet op de (re)integratie arbeidsgehandicapten][ref1]
      zou zijn geweest in verband met het recht op een arbeidsongeschiktheidsuitkering
      op grond van de [Wet op de arbeidsongeschiktheidsverzekering][ref2] of de
      [Wet arbeidsongeschiktheidsverzekering zelfstandigen ][ref3]indien dat artikel niet zou zijn ingetrokken en tevens
      voor 1 januari 2006 arbeidsgehandicapte was op grond van dat artikel;


      [ref1]: https://wetten.overheid.nl/BWBR0009565#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0002524
      [ref3]: https://wetten.overheid.nl/BWBR0008656
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0009565
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0002524
      - id: ref3
        bwb_id: BWBR0008656
  - number: 2.6.1.b
    text: |-
      niet op enig moment in de periode van zes maanden voorafgaand aan de datum van indiensttreding in dienstbetrekking
      bij de werkgever is geweest; en
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
  - number: 2.6.1.c
    text: |-
      een geldige doelgroepverklaring als bedoeld in [artikel 2.7][ref1] aan de werkgever heeft verstrekt.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.3'
  - number: 2.6.2
    text: |-
      Bij de toepassing van het eerste lid met betrekking tot een werknemer die binnen vijf jaar na de eerste dag na
      afloop van de wachttijd, bedoeld in [artikel 23 van de Wet werk en inkomen naar arbeidsvermogen][ref1], of na
      afloop van het tijdvak, bedoeld in [artikel 24][ref2] of [25, negende lid, van die wet][ref3] of na afloop van
      het tijdvak, bedoeld in [artikel 629, elfde lid, onderdeel a, van Boek 7 van het Burgerlijk Wetboek][ref4] dan
      wel van het tijdvak, bedoeld in [artikel 76a, zesde lid, onderdeel a, van de Ziektewet][ref5], in dienstbetrekking
      werkzaamheden gaat verrichten bij een werkgever en die:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel24
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref4]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref5]: https://wetten.overheid.nl/BWBR0001888#Artikel76a
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '23'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '24'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '25'
      - id: ref4
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref5
        bwb_id: BWBR0001888
        artikel: 76a
  - number: 2.6.2.a
    text: |-
      volgens een arbeidskundig onderzoek op de dag, bedoeld in de aanhef, minder dan 35% arbeidsongeschikt is en niet in
      staat is tot het verrichten van arbeid bij de werkgever waarbij de werknemer op die dag in dienstbetrekking was; en
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
  - number: 2.6.2.b
    text: |-
      op de eerste dag van elf weken voorafgaand aan de dag, bedoeld in onderdeel a, geen dienstbetrekking had met een
      andere werkgever dan de werkgever, bedoeld in onderdeel a, en nog bij die werkgever in dienstbetrekking is, tenzij
      de dienstbetrekking met die andere werkgever reeds bestond op de eerste dag van de wachttijd, bedoeld in de aanhef;
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
  - number: 2.6.3
    text: 'Het eerste lid is niet of niet langer van toepassing indien:'
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
  - number: 2.6.3.a
    text: |-
      de werknemer de pensioengerechtigde leeftijd, bedoeld in
      [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1], heeft bereikt;


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: 2.6.3.b
    text: |-
      de werknemer arbeid verricht in een dienstbetrekking als bedoeld in
      [artikel 2 van de Wet sociale werkvoorziening][ref1] of als bedoeld in
      [artikel 10b, derde lid, van de Participatiewet][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel10b
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0008903
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0015703
        artikel: 10b
  - number: 2.6.3.c
    text: |-
      de periode, bedoeld in [artikel 2.8][ref1], voor deze werknemer is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.3'
  - number: 2.6.4
    text: |-
      Met een uitkering als bedoeld in het eerste lid, onderdeel a, wordt gelijkgesteld een naar aard en strekking
      daarmee overeenkomende uitkering op grond van een wettelijk stelsel inzake sociale zekerheid van een andere
      lidstaat van de Europese Unie, een andere staat die partij is bij de Overeenkomst betreffende de Europese
      Economische Ruimte dan wel Zwitserland.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
  - number: 2.6.5
    text: |-
      Voor de toepassing van dit artikel worden onderbrekingen van een dienstbetrekking tussen dezelfde werkgever en
      werknemer binnen de periode, bedoeld in [artikel 2.8, eerste lid][ref1], geacht niet te hebben plaatsgevonden.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.3'
  - number: 2.7.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen verstrekt uitsluitend aan degene die een dienstbetrekking met
      een werkgever aangaat en, met inachtneming van [artikel 2.6, derde tot en met vijfde lid][ref1], voldoet aan
      de voorwaarden, bedoeld in artikel 2.6, eerste lid, onderdelen a en b, of aan de voorwaarden, bedoel in artikel
      2.6, tweede lid, op diens verzoek een verklaring dat de aanvrager aan de genoemde voorwaarden voldoet. Indien
      de doelgroepverklaring niet kan worden verstrekt, wordt het besluit tot weigering uitsluitend verstrekt aan de
      aanvrager van de doelgroepverklaring. De doelgroepverklaring wordt aangevraagd binnen drie maanden na aanvang van
      de dienstbetrekking. Bij regeling van Onze Minister van Financiën kunnen, in overeenstemming met Onze Minister
      van Sociale Zaken en Werkgelegenheid, nadere regels worden gesteld met betrekking tot de geldigheid van de
      doelgroepverklaring, bedoeld in de eerste volzin.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.7
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.3'
  - number: 2.7.2
    text: |-
      Indien [artikel 2.6, vierde lid][ref1], van toepassing is, overlegt degene die het Uitvoeringsinstituut
      werknemersverzekeringen verzoekt om een doelgroepverklaring als bedoeld in het eerste lid gelijktijdig met
      dit verzoek een bewijs dat hij in de maand voorafgaand aan de aanvang van de dienstbetrekking recht had op
      een uitkering als bedoeld in artikel 2.6, vierde lid. Bij regeling van Onze Minister van Financiën kunnen, in
      overeenstemming met Onze Minister van Sociale Zaken en Werkgelegenheid, nadere voorwaarden worden gesteld aan dit
      bewijs.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.7
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.3'
  - number: 2.7.3
    text: De werkgever bewaart de doelgroepverklaring, bedoeld in het eerste lid, bij de loonadministratie.

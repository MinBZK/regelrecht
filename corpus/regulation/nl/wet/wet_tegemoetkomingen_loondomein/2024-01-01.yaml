        paragraaf: '2.5'
  - number: 4.7.2
    text: |-
      Indien de werkgever in de loonaangifte onjuiste gegevens heeft opgenomen waarvan de juistheid voor de toepassing
      van deze wet van belang is, vormt dit een verzuim waarvoor de inspecteur hem een bestuurlijke boete van ten hoogste
      € 1.319 per gegeven per werknemer per jaar kan opleggen.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.7
  - number: 4.7.3
    text: |-
      [Artikel 67cb van de Algemene wet inzake rijksbelastingen][ref1] is van overeenkomstige toepassing op het in
      het eerste lid en tweede lid genoemde bedrag, met dien verstande dat de wijziging van het bedrag voor het eerst
      plaatsvindt per 1 januari 2020.


      [ref1]: https://wetten.overheid.nl/BWBR0002320#Artikel67cb
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0002320
        artikel: 67cb
  - number: 4.7.4
    text: |-
      Wanneer de werkgever die een verzoek als bedoeld in [artikel 2.1][ref1] heeft gedaan met betrekking tot een
      werknemer die niet voldoet aan de voorwaarden, bedoeld in de [artikelen 2.2][ref2], [2.6][ref3], [2.10][ref4] of
      [2.14][ref5], dit verzoek door middel van een correctiebericht intrekt na de in [artikel 4.1, tweede lid][ref6],
      bedoelde datum volgend op het kalenderjaar waarop het verzoek betrekking heeft, maar voordat hij weet of
      redelijkerwijs moet vermoeden dat de inspecteur met de onjuistheid bekend is of bekend zal worden, is dit een
      omstandigheid die aanleiding geeft tot matiging van de boete.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref6]: https://wetten.overheid.nl/BWBR0037522#Artikel4
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.7
    references:

  - number: 3.1.1
    text: |-
      Een werkgever heeft recht op een lage-inkomensvoordeel indien bij deze werkgever een werknemer in een of meerdere
      dienstbetrekkingen is waarvan:
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
    # LIV — Lage-inkomensvoordeel, Wtl artikel 3.1 (recht) + 3.2 (hoogte).
    # Geldend op peildatum 2024-01-01. Per 2025-01-01 afgeschaft door
    # Wet 36458 (afschaffing LIV).
    #
    # Lid 1 — werkgever heeft recht als werknemer in dienstbetrekking is
    #         met (a) gemiddeld uurloon binnen LIV-grenzen en
    #         (b) ten minste 1248 verloonde uren.
    # Lid 2 — uitsluiting bij pensioengerechtigde leeftijd.
    # Lid 3 — gemiddeld uurloon = jaarloon / verloonde uren.
    # Lid 4 — uurloongrenzen worden jaarlijks aangepast (open_term).
    # Lid 5 — afwijking 2024: bovengrens = 104% van ondergrens
    #         (volgt uit ministeriële regeling, hier hardgecodeerd).
    # Hoogte (artikel 3.2.1): € 0,49 per verloond uur, max € 960 per
    #         werknemer per kalenderjaar.
    machine_readable:
      # 2024-specifieke bedragen (uit Regeling lage-inkomensvoordeel,
      # bij wijziging via art. 3.1 lid 4 + lid 5) zijn als literals
      # in de actions opgenomen — definitions-block werkt momenteel
      # niet vanuit een tweede machine_readable in dezelfde wet
      # (zie #TODO definitions-loading).
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: bsn
            type: string
            required: true
            description: BSN van de werknemer.
          - name: jaarloon_eurocent
            type: amount
            required: true
            type_spec:
              unit: eurocent
            description: |-
              Lid 3: jaarloon van de werknemer in eurocent
              (loonaangifte, Belastingdienst).
          - name: verloonde_uren
            type: number
            required: true
            description: |-
              Verloonde uren in het kalenderjaar (loonaangifte).
              Lid 1 onderdeel b drempel: 1248.
          - name: heeft_pensioengerechtigde_leeftijd_bereikt
            type: boolean
            required: true
            description: |-
              Lid 2: uitsluitingsgrond. Werknemer heeft de
              pensioengerechtigde leeftijd bereikt (artikel 7a lid 1 AOW).
        output:
          - name: gemiddeld_uurloon_eurocent
            type: amount
            type_spec:
              unit: eurocent
            description: |-
              Lid 3: jaarloon / verloonde uren (alleen zinvol bij
              verloonde_uren > 0).
          - name: voldoet_aan_uurloongrens
            type: boolean
            description: Lid 1 onderdeel a — gemiddeld uurloon binnen LIV-grenzen.
          - name: voldoet_aan_minimum_verloonde_uren
            type: boolean
            description: Lid 1 onderdeel b — ≥ 1248 verloonde uren.
          - name: heeft_recht_op_liv
            type: boolean
          - name: hoogte_liv_per_jaar_eurocent
            type: amount
            type_spec:
              unit: eurocent
            description: |-
              Artikel 3.2.1: € 0,49 × verloonde uren, met maximum € 960.
              Bij geen recht = 0.
        actions:
          - output: gemiddeld_uurloon_eurocent
            value:
              operation: DIVIDE
              values:
                - $jaarloon_eurocent
                - $verloonde_uren
              legal_basis:
                law: Wet tegemoetkomingen loondomein
                bwb_id: BWBR0037522
                article: '3.1'
                paragraph: '3'
                explanation: 'Gemiddeld uurloon = jaarloon / verloonde uren.'
          - output: voldoet_aan_uurloongrens
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $gemiddeld_uurloon_eurocent
                  value: 1433
                - operation: LESS_THAN_OR_EQUAL
                  subject: $gemiddeld_uurloon_eurocent
                  value: 1491
              legal_basis:
                law: Wet tegemoetkomingen loondomein
                bwb_id: BWBR0037522
                article: '3.1'
                paragraph: '1'
                sentence: 'a'
                explanation: |-
                  2024-grenzen: € 14,33 ondergrens, € 14,91 bovengrens
                  (= 104% van ondergrens, lid 5).
          - output: voldoet_aan_minimum_verloonde_uren
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $verloonde_uren
              value: 1248
              legal_basis:
                law: Wet tegemoetkomingen loondomein
                bwb_id: BWBR0037522
                article: '3.1'
                paragraph: '1'
                sentence: 'b'
          - output: heeft_recht_op_liv
            value:
              operation: AND
              conditions:
                - $voldoet_aan_uurloongrens
                - $voldoet_aan_minimum_verloonde_uren
                - operation: NOT
                  value: $heeft_pensioengerechtigde_leeftijd_bereikt
              legal_basis:
                law: Wet tegemoetkomingen loondomein
                bwb_id: BWBR0037522
                article: '3.1'
                explanation: |-
                  Lid 1 (a + b cumulatief) en lid 2 (uitsluiting
                  pensioengerechtigden).
          - output: hoogte_liv_per_jaar_eurocent
            value:
              operation: IF
              cases:
                - when: $heeft_recht_op_liv
                  then:
                    operation: MIN

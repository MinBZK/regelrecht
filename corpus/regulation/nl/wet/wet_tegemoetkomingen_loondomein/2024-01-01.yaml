  - number: 2.10.1
    text: |-
      Een werkgever die een verzoek als bedoeld in [artikel 2.1][ref1] heeft gedaan, heeft recht op een
      loonkostenvoordeel doelgroep banenafspraak en scholingsbelemmerden indien bij deze werkgever een werknemer in een
      of meerdere dienstbetrekkingen is die:


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
    references:

                      - operation: MULTIPLY
                        values:
                          - 49
                          - $verloonde_uren
                      - 96000
              default: 0
              legal_basis:
                law: Wet tegemoetkomingen loondomein
                bwb_id: BWBR0037522
                article: '3.2'
                paragraph: '1'
                explanation: |-
                  € 0,49 per verloond uur, met een maximum van € 960
                  per werknemer per kalenderjaar.
      open_terms:
        - id: liv_uurloongrenzen_per_jaar
          type: amount
          required: false
          delegated_to: minister
          delegation_type: MINISTERIELE_REGELING
          legal_basis: artikel 3.1 lid 4 Wet tegemoetkomingen loondomein
          description: |-
            Lid 4 — bedragen worden jaarlijks gewijzigd via Regeling
            van Minister van SZW na overleg met Minister van Financiën,
            in lijn met aanpassingen artikel 8 lid 1 Wml. In deze
            machine_readable hardgecodeerd voor 2024 als definitions.
          default:
            actions:
              - output: liv_uurloongrenzen_per_jaar
                value: 1433
      untranslatables:
        - construct: dienstbetrekking-aggregatie ('in een of meerdere dienstbetrekkingen')
          reason: |-
            Lid 1 staat toe dat verloonde uren over meerdere
            dienstbetrekkingen bij dezelfde werkgever worden opgeteld.
            Deze machine_readable rekent op één geaggregeerd jaarloon
            en uren-totaal en delegeert de aggregatie naar de
            invoerende laag (loonaangifte / Belastingdienst).
          legal_text_excerpt: 'in een of meerdere dienstbetrekkingen'
          accepted: true
        - construct: aangiftetijdvak-verlenging bij pensioenleeftijd
          reason: |-
            Lid 2 verlengt het LIV-recht binnen het lopende
            aangiftetijdvak waarin de werknemer pensioengerechtigd
            wordt. Een dergelijke partial-period berekening is met de
            huidige operatie-set niet faithful te modelleren; de engine
            beoordeelt enkel de bool-status op peildatum.
          legal_text_excerpt: |-
            Ingeval de periode waarin het lage-inkomensvoordeel van
            toepassing is, in de loop van een aangiftetijdvak eindigt,
            wordt die periode verlengd...
          accepted: true
  - number: 3.1.1.a
    text: |-
      het gemiddelde uurloon in het kalenderjaar gelijk is aan of meer bedraagt dan € 14,33 maar niet meer dan € 14,91;
      en
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
  - number: 3.1.1.b
    text: in het kalenderjaar ten minste 1248 verloonde uren zijn opgenomen in de loonaangifte.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
  - number: 3.1.2
    text: |-
      Het eerste lid is niet of niet langer van toepassing indien de werknemer de pensioengerechtigde leeftijd, bedoeld
      in [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1], heeft bereikt. Ingeval de periode waarin het lage-
      inkomensvoordeel van toepassing is, in de loop van een aangiftetijdvak eindigt, wordt die periode verlengd met het
      buiten die periode vallende deel van het aangiftetijdvak waarin die periode eindigt.


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: 3.1.3
    text: |-
      Het gemiddelde uurloon, bedoeld in het eerste lid, onderdeel a, wordt vastgesteld door het jaarloon te delen door
      de verloonde uren.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
  - number: 3.1.4
    text: |-
      Bij het begin van het kalenderjaar worden de bedragen, genoemd in het eerste lid, bij regeling van Onze Minister
      van Sociale Zaken en Werkgelegenheid, na overleg met Onze Minister van Financiën, gewijzigd in andere bedragen
      waarbij de te wijzigen bedragen worden verhoogd of verlaagd overeenkomstig de wijzigingen van de bedragen, genoemd
      in [artikel 8, eerste lid, van de Wet minimumloon en minimumvakantiebijslag][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
  - number: 3.1.5
    text: |-
      In afwijking van het vierde lid wordt de bovengrens van het uurloon, bedoeld in het eerste lid, onderdeel a, bij
      het begin van het kalenderjaar 2024 bij regeling van Onze Minister van Sociale Zaken en Werkgelegenheid, na overleg
      met Onze Minister van Financiën, gewijzigd zodat deze gelijk is aan 104% van de ondergrens van het uurloon, bedoeld
      in het eerste lid, onderdeel a.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.1
  - number: 3.2.1
    text: |-
      Een lage-inkomensvoordeel bedraagt € 0,49 per verloond uur van de werknemers die voldoen aan de voorwaarde, bedoeld
      in [artikel 3.1, eerste lid, onderdeel a][ref1], doch ten hoogste € 960 per werknemer per kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 3.2.2
    text: |-
      In afwijking van het eerste lid bedraagt een lage-inkomensvoordeel over het kalenderjaar 2022 € 0,78 per verloond
      uur van de werknemers die voldoen aan de voorwaarde, bedoeld in [artikel 3.1, eerste lid, onderdeel a][ref1], doch
      ten hoogste € 1.520 per werknemer.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.1.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen beoordeelt alle door een werkgever in het kalenderjaar gedane
      verzoeken om een of meer tegemoetkomingen als bedoeld in de [artikelen 2.1][ref1] en [3.1][ref2] gezamenlijk,
      berekent de hoogte van de tegemoetkomingen en stelt de uitkomst beschikbaar aan de inspecteur, waarbij:


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.1.1.a
    text: |-
      het recht op de tegemoetkomingen wordt beoordeeld op basis van de beschikbare gegevens bij het Uitvoeringsinstituut
      werknemersverzekeringen of het college van burgemeester en wethouders omtrent de doelgroep en de gegevens in de
      polisadministratie omtrent de overige voorwaarden; en
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
  - number: 4.1.1.b
    text: de hoogte van de tegemoetkomingen wordt berekend op basis van de gegevens in de polisadministratie.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
  - number: 4.1.2
    text: |-
      De in aanmerking te nemen gegevens uit de loonaangifte van de werkgever worden beoordeeld op grond van de
      loonaangiften over een kalenderjaar zoals die uiterlijk op 1 mei van het daaropvolgende kalenderjaar zijn ingediend
      alsmede de aanvullingen daarop die uiterlijk op die datum hebben plaatsgevonden.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
  - number: 4.1.3
    text: |-
      In afwijking in zoverre van het eerste lid wordt, indien voor een werknemer recht bestaat op meer dan
      een tegemoetkoming als bedoeld in de [artikelen 2.1][ref1] en [3.1][ref2] het totaal berekende bedrag aan
      tegemoetkomingen voor deze werknemer gemaximeerd op het bedrag van de berekende hoogste tegemoetkoming voor deze
      werknemer in het desbetreffende kalenderjaar, met dien verstande dat bij gelijke hoogte van alle tegemoetkomingen
      waar recht op bestaat voor de werknemer uitsluitend de tegemoetkoming wordt verstrekt die als eerste in deze wet
      wordt genoemd.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.1.4
    text: |-
      De inspecteur verstrekt aan werkgevers een overzicht van de werknemers waarvoor de werkgever een verzoek
      heeft gedaan en de voorgenomen beoordeling en berekening, bedoeld in het eerste lid, met betrekking tot deze
      werknemers. De verstrekking van dit overzicht vindt plaats vóór 15 maart volgend op het kalenderjaar waarover de
      tegemoetkomingen zijn aangevraagd waarbij rekening gehouden wordt met verzoeken die uiterlijk op 31 januari van het
      jaar volgend op het kalenderjaar waarover de tegemoetkomingen zijn aangevraagd zijn ingediend.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
  - number: 4.1.5
    text: |-
      Voor de toepassing van dit artikel en [artikel 4.2][ref1] wordt de werkgever geacht een verzoek om een
      tegemoetkoming als bedoeld in [artikel 3.1][ref2] te hebben gedaan indien uit de loonaangifte blijkt dat aan de
      voorwaarden, bedoeld in artikel 3.1, is voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.1
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.2.1
    text: |-
      Op alle door de werkgever in het kalenderjaar gedane verzoeken om een of meer tegemoetkomingen als bedoeld in
      de [artikelen 2.1][ref1] en [3.1][ref2] gezamenlijk beslist de inspecteur. Bij regeling van Onze Minister van
      Financiën kunnen, in overeenstemming met Onze Minister van Sociale Zaken en Werkgelegenheid, nadere regels gesteld
      worden met betrekking tot de gegevens die op de beschikking vermeld worden.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.2
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.2.2
    text: |-
      De beschikking van de inspecteur, bedoeld in het eerste lid, wordt gegeven overeenkomstig de beoordeling en
      berekening, bedoeld in [artikel 4.1, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel4
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.2
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
  - number: 4.2.3
    text: |-
      De beschikking van de inspecteur, bedoeld in het eerste lid, wordt gegeven vóór 1 augustus volgend op het
      kalenderjaar waarover de tegemoetkoming wordt aangevraagd.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.2
  - number: 4.3.1
    text: |-
      De inspecteur is bevoegd de op de voet van [artikel 4.2][ref1] gegeven beschikking tot vaststelling van een
      tegemoetkoming te herzien ten nadele van de werkgever of gewezen werkgever indien enig feit grond oplevert voor
      het vermoeden dat de beschikking is gegeven op grond van onjuiste of onvolledige gegevens. Een herziening is
      uitsluitend mogelijk indien de onjuistheid van de beschikking een gevolg is van een feit dat aan de werkgever of
      de gewezen werkgever kan worden toegerekend of de werkgever of de gewezen werkgever redelijkerwijs kenbaar had
      kunnen zijn. De inspecteur stelt de herziening bij beschikking vast. De bevoegdheid tot herziening vervalt door
      verloop van 5 jaren na het einde van het kalenderjaar waarop de beschikking tot vaststelling van een tegemoetkoming
      betrekking heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel4
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.3
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
  - number: 4.3.2
    text: |-
      Beschikkingen van de inspecteur op grond van dit artikel worden gegeven in overeenstemming met het
      Uitvoeringsinstituut werknemersverzekeringen.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.3
  - number: 4.4.1
    text: |-
      De uitbetaling van een tegemoetkoming geschiedt door de ontvanger met toepassing van de
      [Invorderingswet 1990][ref1] en de [Kostenwet invordering rijksbelastingen][ref2] als ware die tegemoetkoming een
      terug te geven bedrag aan rijksbelastingen.


      [ref1]: https://wetten.overheid.nl/BWBR0004770
      [ref2]: https://wetten.overheid.nl/BWBR0002645
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.4
    references:
      - id: ref1
        bwb_id: BWBR0004770
      - id: ref2
        bwb_id: BWBR0002645
  - number: 4.4.2
    text: |-
      Een tegemoetkoming wordt uitbetaald binnen zes weken na de dagtekening van de beschikking, bedoeld in
      [artikel 4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel4
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.4
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
  - number: 4.4.3
    text: |-
      Invordering van een terug te vorderen bedrag geschiedt door de ontvanger met toepassing van de
      [Invorderingswet 1990][ref1] en de [Kostenwet invordering rijksbelastingen][ref2] als ware die terugvordering een
      te betalen bedrag aan rijksbelastingen.


      [ref1]: https://wetten.overheid.nl/BWBR0004770
      [ref2]: https://wetten.overheid.nl/BWBR0002645
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.4
    references:
      - id: ref1
        bwb_id: BWBR0004770
      - id: ref2
        bwb_id: BWBR0002645
  - number: 4.4.4
    text: |-
      Een terug te vorderen bedrag is invorderbaar zes weken na dagtekening van de herzieningsbeschikking, bedoeld in
      [artikel 4.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel4
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.4
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
  - number: 4.5.1
    text: |-
      Op het bezwaar, beroep, hoger beroep en beroep in cassatie inzake de
      beschikkingen, bedoeld in de [artikelen 4.2][ref1], [4.3][ref2] en [4.7][ref3], is
      [hoofdstuk V van de Algemene wet inzake rijksbelastingen][ref4] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0037522#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0002320#HoofdstukV
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
      - id: ref3
        bwb_id: BWBR0037522
        artikel: '4'
        hoofdstuk: IV
      - id: ref4
        bwb_id: BWBR0002320
        hoofdstuk: V
  - number: 4.5.2
    text: |-
      In afwijking van [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1] beslist de inspecteur
      op het bezwaarschrift binnen 26 weken gerekend vanaf de dag na die waarop de termijn voor het indienen van
      het bezwaarschrift is verstreken. De inspecteur beslist op het bezwaarschrift inzake de verstrekking van een
      tegemoetkoming als bedoeld in de [artikelen 2.1][ref2] en [3.1][ref3] na overleg met het Uitvoeringsinstituut
      werknemersverzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref3
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.6.1
    text: |-
      De rijksbelastingdienst en het college van burgemeester en wethouders zijn verplicht aan het Uitvoeringsinstituut
      werknemersverzekeringen kosteloos de opgaven en inlichtingen te verstrekken die noodzakelijk zijn voor de
      uitvoering van deze wet.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.6
  - number: 4.6.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen is verplicht aan de rijksbelastingdienst kosteloos de opgaven en
      inlichtingen te verstrekken die noodzakelijk zijn voor de uitvoering van deze wet.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.6
  - number: 4.6.3
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen en de rijksbelastingdienst zijn bevoegd de gegevens die zij
      op grond van [artikel 33 van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] verwerken in de
      polisadministratie voor zover noodzakelijk tevens te verwerken voor de vaststelling van de tegemoetkomingen,
      bedoeld in de [artikelen 2.1][ref2] en [3.1][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel33
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037522#Artikel3
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.6
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: '33'
      - id: ref2
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref3
        bwb_id: BWBR0037522
        artikel: '3'
        hoofdstuk: III
  - number: 4.7.1
    text: |-
      Indien de werkgever een verzoek als bedoeld in [artikel 2.1][ref1] heeft gedaan met betrekking tot een
      werknemer die niet voldoet aan de voorwaarden, bedoeld in de [artikelen 2.2][ref2], [2.6][ref3], [2.10][ref4] of
      [2.14][ref5], vormt dit een verzuim waarvoor de inspecteur hem een bestuurlijke boete van ten hoogste € 1.319 per
      verzoek per jaar kan opleggen.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037522#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
      - id: ref2
        bwb_id: BWBR0037522

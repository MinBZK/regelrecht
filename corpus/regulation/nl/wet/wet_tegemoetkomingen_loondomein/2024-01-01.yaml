preamble:
  text: |-
    Wij Willem-Alexander, bij de gratie Gods, Koning der Nederlanden, Prins van Oranje-Nassau, enz. enz. enz.

    Allen, die deze zullen zien of horen lezen, saluut! doen te weten:

    Alzo Wij in overweging genomen hebben, dat het wenselijk is in het kader van de vereenvoudiging van de processen
    van de Belastingdienst en het terugdringen van administratieve lasten van werkgevers een instrument te introduceren
    dat het mogelijk maakt om op basis van reeds bij de overheid beschikbare gegevens geautomatiseerd en zonder de
    loonaangifteketen te belasten een tegemoetkoming in de loonkosten aan werkgevers te verstrekken en de bestaande
    premiekortingen voor ouderen en arbeidsgehandicapten te vervangen, mede om de bestaande verzilveringsproblematiek
    weg te nemen, en voorts een lage-inkomensvoordeel in te voeren voor werkgevers met werknemers aan de onderkant van
    de arbeidsmarkt;

    Zo is het, dat Wij, de Afdeling advisering van de Raad van State gehoord, en met gemeen overleg der Staten-
    Generaal, hebben goedgevonden en verstaan, gelijk Wij goedvinden en verstaan bij deze:
  url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#ArtikelAanhef
articles:
  - number: '1.1'
    text: |-
      In deze wet en de daarop berustende bepalingen wordt verstaan onder: - *werkgever:* de
      inhoudingsplichtige in de zin van de [Wet op de loonbelasting 1964][ref1] of de werkgever in de zin van de
      [Wet financiering sociale verzekeringen][ref2];
        - *werknemer:* de werknemer in de zin van de [Werkloosheidswet][ref3], de [Ziektewet][ref4], de
      [Wet werk en inkomen naar arbeidsvermogen][ref5] of de [Wet op de arbeidsongeschiktheidsverzekering][ref6];
        - *loonaangifte:* de aangifte voor de loonbelasting, de premie voor de volksverzekeringen, de premies
      voor de werknemersverzekeringen en de ingevolge de [Zorgverzekeringswet][ref7] over het loon verschuldigde
      inkomensafhankelijke bijdrage;
        - *aangiftetijdvak:* het tijdvak waarover de loonbelasting moet worden betaald;
        - *polisadministratie:* hetgeen daaronder wordt verstaan in
      [artikel 33 van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref8];
        - *loonadministratie:* de loonadministratie, bedoeld in
      artikel[ 28, eerste lid, onderdeel c, van de Wet op de loonbelasting 1964][ref9];
        - *verloonde uren:* de uren waarover loon is betaald en waarvan door de werkgever ingevolge
      [artikel 28, eerste lid, onderdeel d, van de Wet op de loonbelasting 1964][ref10] opgave aan de inspecteur is
      gedaan;
        - *jaarloon:* het door een werknemer in een dienstbetrekking als bedoeld in
      [artikel 3 tot en met 6 van de Ziektewet][ref11] in een kalenderjaar genoten loon uit
      tegenwoordige dienstbetrekking overeenkomstig het loon waarvan door de werkgever ingevolge
      [artikel 28, eerste lid, onderdeel e, van de Wet op de loonbelasting 1964][ref12] opgave aan de werknemer is
      gedaan;
        - *correctiebericht:* het correctiebericht, bedoeld in [artikel 28a van de Wet op de loonbelasting 1964][ref13];
        - *inspecteur of ontvanger:* de functionaris van de rijksbelastingdienst die als zodanig bij wet van Onze Minister
      van Financiën is aangewezen;
        - *Uitvoeringsinstituut werknemersverzekeringen:* het Uitvoeringsinstituut werknemersverzekeringen, genoemd in
      [hoofdstuk 5 van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref14].



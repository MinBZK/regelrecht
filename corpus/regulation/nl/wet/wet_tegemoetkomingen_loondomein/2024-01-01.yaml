      tot weigering uitsluitend verstrekt aan de aanvrager van de doelgroepverklaring. De doelgroepverklaring wordt
      aangevraagd binnen drie maanden na aanvang van de dienstbetrekking. Bij regeling van Onze Minister van Financiën
      kunnen, in overeenstemming met Onze Minister van Sociale Zaken en Werkgelegenheid, nadere regels worden gesteld met
      betrekking tot de geldigheid van de doelgroepverklaring, bedoeld in de eerste volzin.



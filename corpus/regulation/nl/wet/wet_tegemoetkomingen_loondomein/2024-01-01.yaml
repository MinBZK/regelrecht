      - id: ref2
        bwb_id: BWBR0008903
        artikel: '11'
  - number: 2.10.1.a.3°
    text: |-
      met ondersteuning bij de arbeidsinschakeling van het college van burgemeester en wethouders op grond van
      [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] naar een dienstbetrekking is of wordt toegeleid
      en van wie door het Uitvoeringsinstituut werknemersverzekeringen is vastgesteld dat hij niet in staat is tot
      het verdienen van het wettelijk minimumloon, bedoeld in [artikel 2, onderdeel c, van de Participatiewet][ref2],
      dan wel van wie door het college van burgemeester en wethouders in overeenstemming met de eisen gesteld aan
      een loonwaardevaststelling op grond van [artikel 10d, eerste of tweede lid, van de Participatiewet][ref3] een
      loonwaarde is vastgesteld die bij voltijdse arbeid minder bedraagt dan het wettelijk minimumloon, bedoeld in
      artikel 2, onderdeel c, van de Participatiewet, tenzij de dienstbetrekking is aangegaan voor 1 januari 2016;


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0015703#Artikel10d
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0015703
        artikel: '2'
      - id: ref3

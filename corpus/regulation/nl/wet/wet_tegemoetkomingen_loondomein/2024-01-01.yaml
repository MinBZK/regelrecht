      die voldoen aan de voorwaarden, bedoeld in [artikel 2.14][ref1], doch ten hoogste € 6.000 per werknemer per
      kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.17

        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.3'
  - number: 2.8.2
    text: |-
      Ingeval de periode waarin het loonkostenvoordeel arbeidsgehandicapte werknemer van toepassing is in de loop van
      een aangiftetijdvak begint of eindigt, wordt die periode verlengd met het buiten die periode vallende deel van het
      aangiftetijdvak waarin die periode begint, onderscheidenlijk eindigt.

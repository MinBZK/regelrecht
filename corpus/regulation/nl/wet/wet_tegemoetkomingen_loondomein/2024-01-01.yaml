  - number: 2.2.3
    text: |-
      Met een uitkering als bedoeld in het eerste lid, onderdeel a, wordt gelijkgesteld een naar aard en strekking
      daarmee overeenkomende uitkering op grond van een wettelijk stelsel inzake sociale zekerheid van een andere
      lidstaat van de Europese Unie, een andere staat die partij is bij de Overeenkomst betreffende de Europese
      Economische Ruimte dan wel Zwitserland.
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.2
  - number: 2.2.4
    text: |-
      Voor de toepassing van dit artikel worden onderbrekingen van een dienstbetrekking tussen dezelfde werkgever en
      werknemer binnen de periode, bedoeld in [artikel 2.4, eerste lid][ref1], geacht niet te hebben plaatsgevonden.


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.2
    references:

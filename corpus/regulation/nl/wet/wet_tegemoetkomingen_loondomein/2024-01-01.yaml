    text: |-
      geïndiceerd was als bedoeld in de [Wet sociale werkvoorziening][ref1] of een nog geldende indicatiebeschikking had
      op grond van [artikel 11 van die wet][ref2], zoals dat artikel luidde op 31 december 2014;


      [ref1]: https://wetten.overheid.nl/BWBR0008903
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Artikel11
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel2.10
    references:

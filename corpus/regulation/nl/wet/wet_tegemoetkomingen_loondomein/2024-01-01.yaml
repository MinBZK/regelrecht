  - number: '6.2'
    text: 'Een werkgever die:'
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.2
  - number: 6.2.a
    text: |-
      voor een werknemer een verzoek doet als bedoeld in [artikel 2.1][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel2
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.2
    references:
      - id: ref1
        bwb_id: BWBR0037522
        artikel: '2'
        hoofdstuk: II
        paragraaf: '2.1'
  - number: 6.2.b
    text: |-
      over het voor de werkgever van toepassing zijnde aangiftetijdvak direct voorafgaand aan
      de inwerkingtreding van [artikel 5.1][ref1] voor de werknemer, bedoeld in onderdeel a, een
      premiekorting op grond van de [artikelen 47][ref2], [49][ref3], [122a][ref4], [122b][ref5] of
      [122l van de Wet financiering sociale verzekeringen][ref6], zoals die luidden op de dag voor inwerkingtreding van
      artikel 5.1 heeft toegepast in de aangifte over dat tijdvak of uiterlijk op de in [artikel 4.1, tweede lid][ref7],
      bedoelde datum van het jaar waarin artikel 5.1 in werking is getreden in een correctiebericht als bedoeld in
      [artikel 28a van de Wet op de loonbelasting 1964][ref8] met betrekking tot die aangifte; en


      [ref1]: https://wetten.overheid.nl/BWBR0037522#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel47
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel49
      [ref4]: https://wetten.overheid.nl/BWBR0017745#Artikel122a
      [ref5]: https://wetten.overheid.nl/BWBR0017745#Artikel122b
      [ref6]: https://wetten.overheid.nl/BWBR0017745#Artikel122l
      [ref7]: https://wetten.overheid.nl/BWBR0037522#Artikel4
      [ref8]: https://wetten.overheid.nl/BWBR0002471#Artikel28a
    url: https://wetten.overheid.nl/BWBR0037522/2024-01-01#Artikel6.2
    references:

      [Wet op de arbeidsongeschiktheidsverzekering][ref1] wordt voor de toepassing van
      [artikel 10, eerste lid, onderdelen a en b, en tweede lid][ref2] mede verstaan onder:


      [ref1]: https://wetten.overheid.nl/BWBR0002524
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel10

  - number: '139'
    text: |-
      Onze minister zendt binnen vijf jaar na de inwerkingtreding van deze wet aan de Staten-Generaal een verslag over de
      doeltreffendheid en de effecten van deze wet in de praktijk.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel139
  - number: '140'
    text: |-
      Voor de plaatsing in het Staatsblad stelt Onze Minister de nummering van de artikelen, paragrafen en hoofdstukken
      van deze wet opnieuw vast waarbij rekening wordt gehouden met de artikelen die in het bij koninklijke boodschap
      van 17 mei 2005 ingediende voorstel van wet, betreffende regels omtrent de invoering en financiering van de Wet
      werk en inkomen naar arbeidsvermogen alsmede met betrekking tot de intrekking van de Wet op de (re)integratie
      arbeidsgehandicapten ([Wet Invoering en financiering Wet werk en inkomen naar arbeidsvermogen][ref1]) (Kamerstukken
      II 2004/05, 30 118, nr. 2) worden ingevoegd en brengt hij de in deze wet voorkomende aanhalingen van artikelen,
      paragrafen en hoofdstukken met de nieuwe nummering in overeenstemming.


      [ref1]: https://wetten.overheid.nl/BWBR0019058
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel140
    references:
      - id: ref1
        bwb_id: BWBR0019058
  - number: '141'
    text: |-
      De artikelen van deze wet treden in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de
      verschillende artikelen of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel141
  - number: '142'
    text: 'Deze wet wordt aangehaald als: Wet werk en inkomen naar arbeidsvermogen.'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel142

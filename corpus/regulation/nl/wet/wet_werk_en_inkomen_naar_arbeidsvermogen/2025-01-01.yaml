  - number: '131.1'
    text: |-
      Tot een bij koninklijk besluit te bepalen tijdstip luidt [artikel 90, derde lid][ref1], als volgt: 3. Bij of
      krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot het eerste lid,
      voorzover dat betrekking heeft op nadere regels omtrent een maatregel als bedoeld in [artikel 89][ref2].



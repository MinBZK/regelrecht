  - number: '127.1'
    text: |-
      De duur van de loongerelateerde uitkering van de WGA-uitkering is voor de verzekerde die op de dag met ingang
      waarvan hem een WGA-uitkering wordt toegekend:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.a
    text: 58 jaar of ouder is, vijf jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.b
    text: 53 jaar of ouder is, vier jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.c
    text: 48 jaar of ouder is, drie jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.d
    text: 43 jaar of ouder is, tweeënhalf jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.e
    text: 38 jaar of ouder is, twee jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.f
    text: 33 jaar of ouder is, anderhalf jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.g
    text: 28 jaar of ouder is, één jaar;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.h
    text: 23 jaar of ouder is, negen maanden;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: 127.1.i
    text: jonger dan 23 jaar is, zes maanden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel127
  - number: '128'
    text: |-
      In gedingen aangevangen voor het van toepassing worden van [artikel 99, vierde lid][ref1], bepaalt de rechter
      op verzoek van een van de partijen of ambtshalve een termijn waarbinnen partijen de gelegenheid wordt geboden
      hun stellingen en conclusies voor zover nodig aan te passen aan [artikel 99, vierde lid][ref2]. Stelt de rechter
      partijen tot een zodanige aanpassing in de gelegenheid, dan staat tegen die beslissing geen rechtsmiddel open;
      wijst de rechter een daartoe strekkend verzoek af, dan staat een rechtsmiddel daartegen slechts gelijktijdig met de
      einduitspraak open.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel99
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel99
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel128

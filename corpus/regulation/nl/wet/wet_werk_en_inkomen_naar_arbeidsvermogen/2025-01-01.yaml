preamble:
  text: |-
    Wij Beatrix, bij de gratie Gods, Koningin der Nederlanden, Prinses van Oranje-Nassau, enz. enz. enz.

    Allen, die deze zullen zien of horen lezen, saluut! doen te weten:

    Alzo Wij in overweging genomen hebben, dat het wenselijk is om werknemers die gedeeltelijk arbeidsgeschikt
    worden deel te laten blijven nemen aan het arbeidsproces alsmede om een inkomensverzekering te regelen voor deze
    werknemers en voor werknemers die volledig en duurzaam arbeidsongeschikt zijn geworden en in verband daarmee een
    nieuwe wet vast te stellen;

    Zo is het, dat Wij, de Raad van State gehoord, en met gemeen overleg der Staten-Generaal, hebben goedgevonden en
    verstaan, gelijk Wij goedvinden en verstaan bij deze:
  url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#ArtikelAanhef
articles:
  - number: '1'
    text: |-
      Voor de toepassing van deze wet en de daarop berustende bepalingen wordt verstaan onder: -
      *arbeidsongeschiktheidsuitkering*: de arbeidsongeschiktheidsuitkering, bedoeld in [hoofdstuk 6][ref1];
        - *arbodienst*: een dienst als bedoeld in [artikel 14a, tweede en derde lid, van de Arbeidsomstandighedenwet][ref2];
        - *burgerservicenummer*: het nummer, bedoeld in
      [artikel 1, onderdeel b, van de Wet algemene bepalingen burgerservicenummer][ref3];
        - *eigenrisicodrager*: de werkgever aan wie op grond van
      [artikel 40, eerste lid, aanhef en onderdeel b, van de Wet financiering sociale verzekeringen][ref4] toestemming
      is verleend om zelf het risico te dragen van betaling van het daarvoor in aanmerking komende deel van de WGA-
      uitkering;
        - *inkomen uit arbeid:* loon als bedoeld in [artikel 12][ref5], met dien verstande dat niet tot het inkomen uit
      arbeid worden gerekend: 1°. uitkeringen op grond van een werknemersverzekering en de [Wet arbeid en zorg][ref6]
      of wachtgeld als bedoeld in [artikel 6, vijfde lid, tweede zin, van de Werkloosheidswet][ref7]
      al dan niet vermeerderd met een toeslag op grond van de Toeslagenwet en de aanvullingen daarop
      van degene tot wie de werknemer in dienstbetrekking staat; 2°. hetgeen wordt genoten op grond van
      [artikel 629 van Boek 7 van het Burgerlijk Wetboek][ref8], alsmede hetgeen door de werknemer met een
      publiekrechtelijke dienstbetrekking wordt genoten op grond van naar aard en strekking met artikel 629 van
      Boek 7 van het Burgerlijk Wetboek overeenkomstige regelingen, al dan niet vermeerderd met een toeslag op grond
      van de [Toeslagenwet][ref9] en de aanvullingen daarop van degene tot wie de werknemer in dienstbetrekking
      staat; 3°. het voordeel van het voor privé-doeleinden ter beschikking stellen van een auto, bedoeld in
      [artikel 13bis van de Wet op de loonbelasting 1964][ref10];
        - *justitiële inrichting*: een penitentiaire inrichting, een instelling voor
      de verpleging van ter beschikking gestelden, of een inrichting als bedoeld in
      [artikel 1, onderdeel b, van de Beginselenwet justitiële jeugdinrichtingen][ref11];
        - *lichaam*: publiekrechtelijke of privaatrechtelijke rechtspersoon, maat- en vennootschap, samenwerkingsvorm
      zonder rechtspersoonlijkheid die maatschappelijk kan worden gelijkgesteld met een vereniging, onderneming van
      publiekrechtelijke rechtspersonen en doelvermogens;
        - *maatmaninkomen*: hetgeen gezonde personen met soortgelijke opleiding en ervaring, ter plaatse waar hij arbeid
      verricht of het laatst heeft verricht, of in de omgeving daarvan met arbeid gewoonlijk verdienen;
        - *onbetaald verlof*: een tussen werkgever en werknemer voor een gedeelte of het geheel van de arbeidstijd
      overeengekomen verlof, waarin de werknemer geen arbeid jegens de werkgever verricht;
        - *Onze Minister*: Onze Minister van Sociale Zaken en Werkgelegenheid;
        - *overheidswerkgever:* de werkgever, bedoeld in [artikel 1, onderdeel i, van de Werkloosheidswet][ref12];
        - *reïntegratie*: herstel, behoud en bevordering van de mogelijkheden tot het verrichten van arbeid en bevordering
      van inschakeling in de arbeid met dien verstande dat onder arbeid niet wordt verstaan arbeid op grond van een
      dienstbetrekking als bedoeld in [hoofdstuk 2][ref13] of [3 van de Wet sociale werkvoorziening][ref14];
        - *reïntegratiebedrijf:* een natuurlijke persoon dan wel rechtspersoon die in het kader van de uitoefening
      van beroep of bedrijf de inschakeling van personen in de arbeid bevordert met dien verstande dat onder
      arbeid niet wordt verstaan arbeid op grond van een dienstbetrekking als bedoeld in [hoofdstuk 2][ref15] of
      [3 van de Wet sociale werkvoorziening][ref16];
        - *reïntegratieplan*: het plan, bedoeld in [artikel 39, derde lid][ref17];
        - *reïntegratievisie*: de reïntegratievisie, bedoeld in [artikel 39, eerste lid][ref18];
        - *uitreiziger:* persoon ten aanzien van wie op grond van een melding van de opsporingsdiensten of inlichtingen-
      en veiligheidsdiensten, gericht aan het UWV, is gebleken dat het gegronde vermoeden bestaat dat deze persoon zich
      buiten Nederland bevindt met het doel om zich aan te sluiten bij een organisatie die is geplaatst op de lijst van
      organisaties, bedoeld in [artikel 14, vierde lid, van de Rijkswet op het Nederlanderschap][ref19];
        - *UWV*: het Uitvoeringsinstituut werknemersverzekeringen, genoemd in
      [hoofdstuk 5 van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref20];
        - *vreemdeling*: de persoon, bedoeld in de [Vreemdelingenwet 2000][ref21];
        - *vrijheidsstraf of vrijheidsbenemende maatregel:* een bij onherroepelijk geworden vonnis opgelegde vrijheidsstraf
      of vrijheidsbenemende maatregel als bedoeld in het [Wetboek van Strafrecht][ref22];
        - *wachtgeld:* wachtgeld op grond van het [Rijkswachtgeldbesluit 1959][ref23], uitkering op grond van het
      [Besluit Werkloosheid onderwijs- en onderzoekpersoneel][ref24], wachtgeld of daarmee gelijkgestelde uitkering
      op grond van de Algemene militaire pensioenwet, of een met die wachtgelden of die uitkeringen vergelijkbare
      uitkering op grond van ontslag of werkloosheid, met uitzondering van een uitkering in verband met functioneel
      leeftijdsontslag of vrijwillig vervroegd uittreden;
        - *wachttijd*: de wachttijd, bedoeld in [artikel 23][ref25];
        - *WGA-uitkering*: de werkhervattingsuitkering gedeeltelijk arbeidsgeschikten, bedoeld in [hoofdstuk 7][ref26];
        - *zelfstandige:* de persoon die de pensioengerechtigde leeftijd, bedoeld in
      [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref27], nog niet heeft bereikt: 1°. die in Nederland woont
      en die belastbare winst uit onderneming als bedoeld in [paragraaf 3.2.1 van de Wet inkomstenbelasting 2001][ref28]
      vermeerderd met de ondernemersaftrek, bedoeld in [paragraaf 3.2.4 van die wet][ref29], en de MKB-
      winstvrijstelling, bedoeld in [paragraaf 3.2.5 van die wet][ref30], geniet, tenzij hij de onderneming niet
      voor eigen rekening feitelijk drijft; 2°. die niet in Nederland woont en die belastbare winst uit Nederlandse
      onderneming als bedoeld in [afdeling 7.2 van de Wet inkomstenbelasting 2001][ref31] vermeerderd met de
      ondernemersaftrek, bedoeld in [paragraaf 3.2.4 van die wet][ref32], en de MKB-winstvrijstelling, bedoeld in
      [paragraaf 3.2.5 van die wet][ref33], geniet, tenzij hij de onderneming niet voor eigen rekening feitelijk drijft;
      of 3°. die directeur-grootaandeelhouder is, en het werk tot stand brengt uitsluitend voor rekening en risico van de
      onderneming van de rechtspersoon waarvan hij directeur-grootaandeelhouder is.



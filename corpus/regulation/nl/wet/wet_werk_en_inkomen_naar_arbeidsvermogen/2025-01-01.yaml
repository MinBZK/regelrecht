  - number: 133k.1
    text: |-
      Een nog niet afgehandeld en tot het UWV gericht verzoek met betrekking tot een persoon op wie met ingang van de
      dag van inwerkingtreding van [artikel VII van de Invoeringswet Participatiewet][ref1] de artikelen [34a][ref2],
      [35][ref3] of [36][ref4] niet meer van toepassing zijn om op grond van een of meer van die artikelen een besluit
      te nemen, wordt vanaf de dag van inwerkingtreding van artikel VII van die wet beschouwd als een aanvraag voor een
      voorziening gericht op arbeidsinschakeling als bedoeld in [artikel 10, eerste lid, van de Participatiewet][ref5].
      Deze aanvraag wordt beschouwd als te zijn gericht tot het college van burgemeester en wethouders van de betrokken
      gemeente.



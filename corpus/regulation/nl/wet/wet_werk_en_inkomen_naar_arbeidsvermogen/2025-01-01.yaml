  - number: '57.4'
    text: |-
      In afwijking van het derde lid geldt de voorwaarde van gedeeltelijke arbeidsgeschiktheid niet indien op de
      dag waarop het recht op WGA-uitkering is geëindigd omdat een of meer van de uitsluitingsgronden als bedoeld in
      [artikel 43, a, onder 2°, onderdeel d, e, f of i][ref1] van toepassing waren, de duur van de loongerelateerde
      uitkering nog niet was verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel57

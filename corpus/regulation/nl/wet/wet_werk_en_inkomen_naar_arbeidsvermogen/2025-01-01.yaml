        paragraaf: '2.2'
  - number: '123.2'
    text: |-
      Indien het eerste lid toepassing vindt, wordt op verzoek van de vrijwillig verzekerde de hoogte van het dagloon op
      grond waarvan de uitkering van de vrijwillige verzekering wordt berekend, gewijzigd dan wel wordt de vrijwillige
      verzekering beëindigd met ingang van het tijdstip, bedoeld in het eerste lid. [Artikel 21][ref1] is van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel21
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel123
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '21'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '123.3'
    text: |-
      Het verzoek, bedoeld in het tweede lid, wordt binnen drie maanden na het tijdstip, bedoeld in het eerste lid bij
      het UWV gedaan.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel123
  - number: '123.4'
    text: |-
      In afwijking van [artikel 18][ref1] wordt tot de vrijwillige verzekering op grond van dat artikel niet toegelaten,
      de persoon die op grond van [artikel 81 van de Wet op de arbeidsongeschiktheidsverzekering][ref2] moet worden
      toegelaten tot de vrijwillige verzekering op grond van die wet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0002524#Artikel81

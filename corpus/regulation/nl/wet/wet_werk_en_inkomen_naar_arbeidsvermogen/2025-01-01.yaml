    text: |-
      Bij de toepassing van [artikel 59, zesde lid][ref1], van deze wet is de duur van de te ontvangen loongerelateerde
      uitkering van de WGA-uitkering niet korter dan de nog resterende duur van de beëindigde en niet herleefde
      loongerelateerde uitkering op grond van de [Werkloosheidswet][ref2].



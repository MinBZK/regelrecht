      [artikelen 64, tweede, derde, vierde en zesde lid][ref1] en [102, derde lid][ref2],
      van deze wet en de [artikelen 629, derde en elfde lid][ref3], en
      [670, tiende lid, van Titel 10 van Boek 7 van het Burgerlijk Wetboek][ref4] zoals deze luidden voorafgaand aan de
      inwerkingtreding van de Aanpassings- en verzamelwet Wet werk en inkomen naar arbeidsvermogen van toepassing.



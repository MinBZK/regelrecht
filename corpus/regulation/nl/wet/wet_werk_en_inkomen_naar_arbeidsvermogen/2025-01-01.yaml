  - number: 48.1.c
    text: |-
      minder dan 35% arbeidsongeschikt was en de volledige en duurzame arbeidsongeschiktheid intreedt binnen vier weken
      na:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
  - number: 48.1.c.1°
    text: |-
      de in [artikel 47, tweede lid][ref1], bedoelde dag en voortkomt uit een andere oorzaak dan op grond waarvan hij
      gedurende de wachttijd ongeschikt was tot het verrichten van zijn arbeid; of



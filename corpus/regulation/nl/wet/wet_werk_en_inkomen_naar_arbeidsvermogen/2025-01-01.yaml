  - number: 133e.2
    text: |-
      Een voorziening die voor de dag van inwerkingtreding van de Wet van 3 december 2009, tot
      uitbreiding van de mogelijkheid om voorzieningen te verstrekken bij arbeid als zelfstandige
      (Stb. 589), is verstrekt of aangevraagd op grond van [artikel 34, tweede lid][ref1],
      [artikel 3:64 van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref2],
      [artikel 65e van de Wet op de arbeidsongeschiktheidsverzekering][ref3],
      [artikel 67c van de Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref4] of
      [artikel 52d van de Ziektewet][ref5], zoals die artikelen luidden voor de inwerkingtreding van die wet, wordt
      aangemerkt als een voorziening die is verstrekt op grond van [artikel 34a][ref6].



  - number: 1a.1
    text: 'Onder arbeidsuur wordt in deze wet verstaan:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: 1a.1.a
    text: uur waarover een werknemer inkomen uit arbeid heeft ontvangen; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: 1a.1.b
    text: uur waarover een werknemer recht heeft op inkomen uit arbeid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: 1a.2
    text: 'Bij ministeriële regeling kunnen regels worden gesteld waarbij:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: 1a.2.a
    text: uren worden gelijkgesteld met een arbeidsuur als bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: 1a.2.b
    text: arbeidsuren als bedoeld in het eerste lid niet als arbeidsuren worden aangemerkt;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: 1a.2.c
    text: |-
      vastgesteld wordt welke in het kader van een dienstbetrekking ontvangen bedragen in aanmerking komen voor
      omrekening naar arbeidsuren en hoeveel arbeidsuren deze bedragen vertegenwoordigen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel1a
  - number: '2.1'
    text: 'Voor de toepassing van deze wet en de daarop berustende bepalingen wordt gelijkgesteld met:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.1.a
    text: 'echtgenoot: geregistreerde partner;'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.1.b
    text: 'gehuwd: als partner geregistreerd.'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.2'
    text: 'Voor de toepassing van deze wet en de daarop berustende bepalingen wordt:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.2.a
    text: |-
      als gehuwd of als echtgenoot mede aangemerkt de ongehuwde meerderjarige die met een andere ongehuwde meerderjarige
      een gezamenlijke huishouding voert, tenzij het betreft een bloedverwant in de eerste graad;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.2.b
    text: als ongehuwd mede aangemerkt de persoon die duurzaam gescheiden leeft van de persoon met wie hij gehuwd is.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.3'
    text: |-
      Van een gezamenlijke huishouding is sprake indien twee personen hun hoofdverblijf in dezelfde woning hebben en zij
      blijk geven zorg te dragen voor elkaar door middel van het leveren van een bijdrage in de kosten van de huishouding
      dan wel anderszins.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.4'
    text: |-
      Een gezamenlijke huishouding wordt in ieder geval aanwezig geacht indien de betrokkenen hun hoofdverblijf hebben in
      dezelfde woning en:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.4.a
    text: zij met elkaar gehuwd zijn geweest of eerder voor de toepassing van deze wet daarmee gelijk zijn gesteld;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.4.b
    text: uit hun relatie een kind is geboren of erkenning heeft plaatsgevonden van een kind van de een door de ander;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.4.c
    text: |-
      zij zich wederzijds verplicht hebben tot een bijdrage aan de huishouding krachtens een geldend
      samenlevingscontract; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: 2.4.d
    text: |-
      zij op grond van een registratie worden aangemerkt als een gezamenlijke huishouding die naar aard en strekking
      overeenkomt met de gezamenlijke huishouding, bedoeld in het derde lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.5'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld met betrekking tot hetgeen wordt verstaan onder het
      blijk geven zorg te dragen voor een ander als bedoeld in het derde lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.6'
    text: |-
      Bij algemene maatregel van bestuur wordt vastgesteld welke registraties, en gedurende welk tijdvak, in aanmerking
      worden genomen voor de toepassing van het vierde lid, onderdeel d.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.7'
    text: |-
      Onder bloedverwant in de eerste graad als bedoeld in het tweede lid, onderdeel a, wordt mede verstaan een
      meerderjarig aangehuwd kind of een meerderjarig voormalig pleegkind van de ongehuwde meerderjarige.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
  - number: '2.8'
    text: |-
      Onder voormalig pleegkind als bedoeld in het zevende lid wordt verstaan een pleegkind voor wie de ongehuwde
      meerderjarige een pleegvergoeding ontving of ontvangt op grond van de [Wet op de jeugdzorg][ref1] of de
      [Jeugdwet][ref2], of kinderbijslag ontving op grond van de [Algemene Kinderbijslagwet][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0016637
      [ref2]: https://wetten.overheid.nl/BWBR0034925
      [ref3]: https://wetten.overheid.nl/BWBR0002368
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel2
    references:
      - id: ref1
        bwb_id: BWBR0016637
      - id: ref2
        bwb_id: BWBR0034925
      - id: ref3
        bwb_id: BWBR0002368
  - number: '3.1'
    text: Waar iemand woont en waar een lichaam gevestigd is, wordt naar de omstandigheden beoordeeld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel3
  - number: '3.2'
    text: |-
      Voor de toepassing van het eerste lid worden schepen die binnen Nederland hun thuishaven hebben, als deel van
      Nederland beschouwd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel3
  - number: '4.1'
    text: |-
      Volledig en duurzaam arbeidsongeschikt is hij die als rechtstreeks en objectief medisch vast te stellen gevolg van
      ziekte, gebrek, zwangerschap of bevalling duurzaam slechts in staat is om met arbeid ten hoogste 20% te verdienen
      van het maatmaninkomen per uur.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel4
  - number: '4.2'
    text: In het eerste lid wordt onder duurzaam verstaan een medisch stabiele of verslechterende situatie.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel4
  - number: '4.3'
    text: |-
      Onder duurzaam wordt mede verstaan een medische situatie waarbij op lange termijn een geringe kans op herstel
      bestaat.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel4
  - number: '5'
    text: |-
      Gedeeltelijk arbeidsgeschikt is hij die als rechtstreeks en objectief medisch vast te stellen gevolg van
      ziekte, gebrek, zwangerschap of bevalling slechts in staat is met arbeid ten hoogste 65% te verdienen van het
      maatmaninkomen per uur, doch die niet volledig en duurzaam arbeidsongeschikt is.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel5
  - number: '6.1'
    text: |-
      De beoordeling of iemand volledig en duurzaam arbeidsongeschikt of gedeeltelijk arbeidsgeschikt is, wordt gebaseerd
      op een verzekeringsgeneeskundig en een arbeidskundig onderzoek.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel6
  - number: '6.2'
    text: |-
      Bij het vaststellen van volledige en duurzame arbeidsongeschiktheid of gedeeltelijke arbeidsgeschiktheid wordt,
      zo mogelijk, rekening gehouden met verkregen nieuwe bekwaamheden, maar wordt buiten beschouwing gelaten of de
      verzekerde de arbeid feitelijk kan verkrijgen. Indien de verzekerde arbeid verricht of laatst heeft verricht
      waarvoor de werkgever loonkostensubsidie als bedoeld in [artikel 10d van de Participatiewet][ref1] ontvangt in
      verband met een verminderde loonwaarde van de verzekerde, wordt bij het vaststellen van de arbeidsongeschiktheid
      rekening gehouden met deze omstandigheid.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel10d
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel6
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: 10d
  - number: '6.3'
    text: |-
      Onder arbeid als bedoeld in [artikel 4, eerste lid][ref1], en [5][ref2] wordt verstaan alle algemeen geaccepteerde
      arbeid waartoe de verzekerde met zijn krachten en bekwaamheden in staat is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel5
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel6
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '4'
        hoofdstuk: '1'
        paragraaf: '1.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '5'
        hoofdstuk: '1'
        paragraaf: '1.2'
  - number: '6.4'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen met betrekking tot het eerste, tweede en derde lid, en de
      [artikelen 4][ref1] en [5][ref2] nadere en zo nodig afwijkende regels worden gesteld die voor volledig en duurzaam
      arbeidsongeschikten en gedeeltelijk arbeidsgeschikten verschillend kunnen zijn. Hierbij kan tevens onderscheid
      worden gemaakt tussen de situaties, bedoeld in [artikel 4, tweede en derde lid][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel6
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '4'
        hoofdstuk: '1'
        paragraaf: '1.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '5'
        hoofdstuk: '1'
        paragraaf: '1.2'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '4'
        hoofdstuk: '1'
        paragraaf: '1.2'
  - number: '6.5'
    text: |-
      De voordracht voor een krachtens het vierde lid vast te stellen algemene maatregel van bestuur, dan wel de
      vaststelling van een ministeriële regeling op basis van een dergelijke algemene maatregel van bestuur, wordt niet
      eerder gedaan dan vier weken nadat het ontwerp aan beide Kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel6
  - number: '6.6'
    text: |-
      Bij de beoordeling, bedoeld in het eerste lid, maakt de verzekeringsarts zo veel mogelijk gebruik van
      wetenschappelijke inzichten die de beoordeling van de arbeidsongeschiktheid of de gedeeltelijke arbeidsgeschiktheid
      kunnen ondersteunen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel6
  - number: '7.1'
    text: Verplicht verzekerd is de werknemer.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel7
  - number: '7.2'
    text: |-
      Een aanvraag tot het geven van een beschikking over het verplicht verzekerd zijn op grond van deze wet kan door de
      werknemer uitsluitend bij het UWV worden ingediend.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel7
  - number: '8.1'
    text: |-
      Werknemer is de werknemer in de zin van de [Ziektewet][ref1] met uitzondering van de werknemer:


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel8
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: 8.1.a
    text: |-
      die zijn werknemerschap ontleent aan [artikel 4, eerste lid, onderdeel g, van die wet][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel8
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '4'
  - number: 8.1.b
    text: |-
      die de leeftijd, bedoeld in [artikel 7, onderdeel a, van de Algemene Ouderdomswet][ref1], heeft bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel8
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: '7'
  - number: '8.2'
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald, dat personen die buiten Nederland wonen ook als werknemer
      worden aangemerkt, voorzover zij hun dienstbetrekking buiten Nederland vervullen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel8
  - number: '8.3'
    text: |-
      Bij de toepassing van het eerste lid blijft [artikel 6, tweede lid, van de Ziektewet][ref1] buiten toepassing ten
      aanzien van de persoon die geen arbeid verricht wegens het genieten van ononderbroken onbetaald verlof tot een
      maximum van achttien maanden, waarbij perioden van onbetaald verlof die elkaar met een onderbreking van minder dan
      vier weken opvolgen als ononderbroken onbetaald verlof worden aangemerkt.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel8
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '6'
  - number: '9'
    text: 'Als werknemer wordt mede beschouwd:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel9
  - number: 9.a
    text: 'in bij ministeriële regeling aan te wijzen gevallen de persoon, die:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel9
  - number: 9.a.1
    text: |-
      in een kalenderweek ten minste vijf arbeidsuren minder heeft dan zijn gemiddeld aantal arbeidsuren per kalenderweek
      of een aantal arbeidsuren heeft dat ten hoogste gelijk is aan de helft van zijn gemiddeld aantal arbeidsuren per
      kalenderweek als bedoeld in [artikel 16, eerste lid, onderdeel a, van de Werkloosheidswet][ref1], doch aan wie
      geen uitkering wordt verleend op grond van enige bepaling van [die wet][ref2] of van een regeling als bedoeld in
      onderdeel b; of


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0004045
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel9
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0004045
  - number: 9.a.2
    text: |-
      als gevolg van de regels gesteld in de ministeriële regeling op grond van [artikel 1a, tweede lid][ref1], geen
      arbeidsuren minder heeft als bedoeld onder 1°;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel1a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel9
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 1a
        hoofdstuk: '1'
        paragraaf: '1.1'
  - number: 9.b
    text: |-
      de persoon, die wegens werkloosheid niet werkt en die op grond van een bij ministeriële regeling aan te wijzen, van
      overheidswege getroffen regeling, uitkering ontvangt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel9
  - number: '10.1'
    text: |-
      De persoon die binnen vier weken na het einde van zijn verzekering ziek wordt, wordt voor het recht op een
      uitkering op grond van deze wet beschouwd alsof hij verzekerd was gebleven. Indien de verzekering berust op een
      dienstbetrekking als bedoeld in [artikel 3 van de Ziektewet][ref1], is de eerste zin eerst na het eindigen van die
      dienstbetrekking van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '3'
  - number: '10.2'
    text: |-
      Het eerste lid blijft buiten toepassing ten aanzien van de persoon, die op grond van
      [artikel 6, eerste lid, onderdeel a of b van de Ziektewet][ref1], niet verzekerd is.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel10
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '6'
  - number: '10.3'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld, op grond waarvan personen, die niet
      verzekerd zijn en die volledig en duurzaam arbeidsongeschikt of gedeeltelijk arbeidsgeschikt worden als gevolg
      van bij die maatregel aan te wijzen beroepsziekten, voor het recht op een uitkering worden beschouwd alsof zij
      verzekerd zijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel10
  - number: '11.1'
    text: |-
      Werkgever is de werkgever in de zin van de [Ziektewet][ref1] behoudens voorzover deze zijn werkgeverschap ontleent
      aan [artikel 10, onder 1°, onder g, van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel10
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '10'
  - number: '11.2'
    text: |-
      In de gevallen, bedoeld in [artikel 8, tweede lid][ref1], is werkgever de natuurlijke persoon tot wie, het lichaam
      of het orgaan van een lichaam tot welk, de werknemer in dienstbetrekking staat.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '8'
        hoofdstuk: '1'
        paragraaf: '1.3'
  - number: '11.3'
    text: |-
      In de gevallen, bedoeld in [artikel 9][ref1], wordt als werkgever aangemerkt de persoon of instantie, die door Onze
      Minister als werkgever wordt aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel9
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '9'
        hoofdstuk: '1'
        paragraaf: '1.3'
  - number: '12.1'
    text: 'In deze wet en de daarop berustende bepalingen wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel12
  - number: 12.1.a
    text: |-
      loon: het loon in de zin van [hoofdstuk 3 van de Wet financiering sociale verzekeringen][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0017745
        hoofdstuk: '3'
  - number: 12.1.b
    text: |-
      minimumloon: het minimumloon, bedoeld in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref1] of, indien
      het een werknemer jonger dan 21 jaar betreft, het voor zijn leeftijd geldende minimumloon, bedoeld in
      [artikel 7, derde lid][ref2], en [artikel 8, derde lid, van laatstgenoemde wet][ref3], beide vermeerderd met de
      daarover berekende vakantietoeslag, bedoeld in [artikel 15 van die wet][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0002638#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0002638#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0002638#Artikel15
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0002638
        artikel: '7'
      - id: ref3
        bwb_id: BWBR0002638
        artikel: '8'
      - id: ref4
        bwb_id: BWBR0002638
        artikel: '15'
  - number: '12.2'
    text: |-
      Loon, door verschillende personen tezamen onverdeeld genoten, wordt, voorzover niet blijkt van een andere
      verdeling, geacht door ieder van hen voor een gelijk deel te zijn genoten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel12
  - number: '12.3'
    text: |-
      De persoon die op grond van een regeling als bedoeld in [artikel 9, aanhef en onderdeel b][ref1], een uitkering
      ontvangt, wordt geacht op elke dag waarover hij die uitkering ontvangt, loon te ontvangen, ter hoogte van die
      uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel9
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel12
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '9'
        hoofdstuk: '1'
        paragraaf: '1.3'
  - number: '13.1'
    text: |-
      Voor de berekening van een uitkering waarop op grond van deze wet recht bestaat, wordt als dagloon beschouwd 1/261
      deel van het loon dat de werknemer verdiende in de periode van één jaar, die eindigt op de laatste dag van het
      aangiftetijdvak voorafgaande aan het aangiftetijdvak waarin de ziekte, het gebrek, de zwangerschap of de bevalling,
      die tot volledig en duurzame arbeidsongeschiktheid of gedeeltelijke arbeidsgeschiktheid heeft geleid, is ingetreden
      doch ten hoogste het in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1] bedoelde
      bedrag met betrekking tot een loontijdvak van een dag.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '13.2'
    text: |-
      In afwijking van het eerste lid wordt in het in [artikel 21][ref1] bedoelde geval het dagloon op de daar genoemde
      wijze vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel21
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '21'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '13.3'
    text: |-
      Bij algemene maatregel van bestuur worden met betrekking tot de vaststelling van het dagloon, bedoeld in het eerste
      lid, en de herziening ervan nadere en zonodig afwijkende regels gesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13
  - number: '13.4'
    text: 'Het maandloon bedraagt:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13
  - number: 13.4.a
    text: 'indien recht op een uitkering bestaat over een volledige kalendermaand: 21,75 maal het dagloon; of'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13
  - number: 13.4.b
    text: |-
      indien niet over een volledige kalendermaand recht op een uitkering bestaat: de uitkomst van het aantal dagen in
      de betreffende kalendermaand waarover recht op een uitkering bestaat gedeeld door het totaal aantal dagen in de
      betreffende kalendermaand vermenigvuldigd met 21,75 maal het dagloon. Bij het bepalen van het aantal dagen worden
      de zaterdagen en zondagen buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13
  - number: 13a.1
    text: Het dagloon van de verzekerde,
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13a
  - number: 13a.1.a
    text: die na het ontstaan van het recht op uitkering op grond van deze wet ziek is geworden, en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13a
  - number: 13a.1.b
    text: |-
      voor wie als gevolg van de toepassing van [artikel 43, onderdeel a, onder 1°][ref1], geen tweede recht op een
      uitkering ontstaat, omdat de eerste dag van de wachttijd is gelegen op een dag dat al recht op een uitkering op
      grond van deze wet bestaat of indien op die eerste dag het recht op een uitkering herleeft;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: 13a.2
    text: |-
      Voor de toepassing van het eerste lid wordt in [artikel 13, eerste lid][ref1], in plaats van «voorafgaande aan
      het aangiftetijdvak waarin de ziekte, het gebrek, de zwangerschap of de bevalling, die tot volledig en duurzame
      arbeidsongeschiktheid of gedeeltelijke arbeidsgeschiktheid heeft geleid, is ingetreden» gelezen: voorafgaande aan
      het aangiftetijdvak waarin de ziekte, het gebrek, de zwangerschap of de bevalling, die tot het ontstaan van een
      tweede recht op uitkering zou hebben geleid, is ingetreden.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel13
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel13a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '13'
        hoofdstuk: '1'
        paragraaf: '1.5'
  - number: '14.1'
    text: |-
      De daglonen worden herzien met ingang van de dag waarop en in de mate waarin het bedrag genoemd in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref1] wordt herzien.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
  - number: '14.2'
    text: |-
      Door of namens Onze Minister wordt in de Staatscourant medegedeeld met ingang van welke dag en met welk percentage
      een herziening als bedoeld in het eerste lid plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel14
  - number: '14.3'
    text: |-
      Een herziening van de uitkering als gevolg van een herziening van het dagloon vindt plaats zonder dat dit bij
      beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel14
  - number: '14.4'
    text: |-
      Het UWV betaalt de herziene uitkering, bedoeld in het derde lid, bij de eerstvolgende uitkeringsbetaling nadat de
      herziening, bedoeld in het eerste lid, heeft plaatsgevonden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel14
  - number: '15.1'
    text: |-
      In deze wet en de daarop berustende bepalingen wordt onder arbeidsverleden verstaan de periode die wordt berekend
      door samentelling van:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.1.a
    text: |-
      het aantal kalenderjaren, vanaf en met inbegrip van 2013 tot en met het kalenderjaar onmiddellijk voorafgaande aan
      het kalenderjaar waarin de dag is gelegen waarop het recht op een uitkering op grond van deze wet is ontstaan, of
      zou zijn ontstaan als [artikel 23, zesde lid][ref1], of [64, elfde lid][ref2], niet zou zijn toegepast, waarin de
      werknemer over 208 of meer uren loon heeft ontvangen; en


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel64
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '23'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: 15.1.b
    text: |-
      het aantal kalenderjaren, gelegen in de periode vanaf en met inbegrip van 1998 tot 2013, waarover de werknemer
      aantoont over 52 of meer dagen per jaar loon te hebben ontvangen; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.1.c
    text: |-
      het aantal kalenderjaren vanaf en met inbegrip van het jaar waarin de werknemer zijn 18e verjaardag bereikte tot
      1998.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: '15.2'
    text: |-
      Een kalenderjaar wordt in aanmerking genomen bij de berekening, bedoeld in
      het eerste lid, onderdelen a en b, indien volgens de informatie als bedoeld in
      [artikel 33d van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1], de werknemer in dat jaar over 52
      of meer dagen respectievelijk over 208 of meer uren loon heeft ontvangen, waarbij voor 1 januari 2013 52 of meer
      dagen bepalend is en vanaf 1 januari 2013 208 of meer uren.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel33d
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 33d
  - number: '15.3'
    text: |-
      Voor de toepassing van het eerste lid, onderdelen a en b, worden met dagen waarover loon is ontvangen of met acht
      uren waarover loon is ontvangen, gelijkgesteld:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.3.a
    text: |-
      dagen waarover recht bestond op een uitkering die naar aard en strekking overeenkomt met een uitkering op grond van
      de [Wet op de arbeidsongeschiktheidsverzekering][ref1] of met een uitkering op grond van deze wet voor zover deze
      uitkering wordt toegekend naar een arbeidsongeschiktheid van ten minste 80% respectievelijk wordt toegekend over
      periodes waarin de verzekerde slechts in staat is om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen
      per uur;


      [ref1]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0002524
  - number: 15.3.b
    text: |-
      dagen waarover een persoon een uitkering ontvangt op grond van
      [hoofdstuk III van de Wet arbeidsongeschiktheidsvoorziening militairen][ref1], berekend naar een
      arbeidsongeschiktheid van ten minste 80% of een toelage op grond van dat hoofdstuk, die al dan niet
      vermeerderd met de arbeidsongeschiktheidsuitkering 70% of meer bedraagt van het dagloon, waarnaar de
      arbeidsongeschiktheidsuitkering is of zou zijn berekend.


      [ref1]: https://wetten.overheid.nl/BWBR0002822#HoofdstukIII
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0002822
        hoofdstuk: III
  - number: '15.4'
    text: |-
      Voor de toepassing van het eerste lid, onderdelen a en b, worden niet reeds in aanmerking genomen kalenderjaren
      waarin een persoon recht heeft op kinderbijslag op grond van [artikel 7 van de Algemene Kinderbijslagwet][ref1]
      of een andere gezinsbijslag als bedoeld in artikel 3, eerste lid, onderdeel j, van Verordening (EG) nr. 883/2004
      van het Europees Parlement en de Raad van de Europese Unie van 29 april 2004 betreffende de coördinatie van de
      socialezekerheidsstelsels (PbEU 2004, L 166) voor een tot zijn huishouden behorend kind dat bij de aanvang van dat
      kalenderjaar de leeftijd van vijf jaar niet heeft bereikt, voor de helft gelijkgesteld met kalenderjaren waarin
      over 52 of meer dagen respectievelijk 208 of meer uren loon is ontvangen, waarbij voor 1 januari 2013 52 of meer
      dagen bepalend is en vanaf 1 januari 2013 208 of meer uren. De in de eerste zin bedoelde persoon wordt aangemerkt
      als verzorgend persoon.


      [ref1]: https://wetten.overheid.nl/BWBR0002368#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0002368
        artikel: '7'
  - number: '15.5'
    text: |-
      In afwijking van het vierde lid worden over de periode tot 1 januari 2005, waarin een persoon recht heeft op
      kinderbijslag op grond van [artikel 7 van de Algemene Kinderbijslagwet][ref1] of een andere gezinsbijslag als
      bedoeld in artikel 3, eerste lid, onderdeel j, van Verordening (EG) nr. 883/2004 van het Europees Parlement en de
      Raad van de Europese Unie van 29 april 2004 betreffende de coördinatie van de socialezekerheidsstelsels (PbEU 2004,
      L 166) voor een tot zijn huishouden behorend kind dat bij de aanvang van dat kalenderjaar de leeftijd van vijf jaar
      niet heeft bereikt, gelijkgesteld met, en worden dergelijke kalenderjaren over de periode van 1 januari 2005 tot
      1 januari 2007 voor drie kwart gelijkgesteld met, kalenderjaren waarin over 52 of meer dagen respectievelijk over
      208 of meer uren loon is ontvangen waarbij voor 1 januari 2013 52 of meer dagen bepalend is en vanaf 1 januari 2013
      208 of meer uren.


      [ref1]: https://wetten.overheid.nl/BWBR0002368#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0002368
        artikel: '7'
  - number: '15.6'
    text: |-
      Voor de toepassing van het eerste lid, onderdelen a en b, worden niet reeds in aanmerking genomen kalenderjaren
      vanaf en met in begrip van een bij ministeriële regeling nader te bepalen kalenderjaar, waarin een persoon
      inkomsten ontvangt voor het verlenen van zorg op grond van een regeling voor persoonsgebonden budget, die is
      gegrond op [artikel 3.3.3 van de Wet langdurige zorg][ref1] of voor het verlenen van ondersteuning ten laste van
      een persoonsgebonden budget als bedoeld in [artikel 2.3.6 van de Wet maatschappelijke ondersteuning 2015][ref2],
      of die voldoet aan [artikel 14a van de Zorgverzekeringswet][ref3], voor de helft gelijkgesteld met kalenderjaren
      waarin over 52 of meer dagen respectievelijk 208 of meer uren loon is ontvangen, waarbij voor 1 januari 2013 52
      of meer dagen bepalend is en vanaf 1 januari 2013 208 of meer uren, tenzij de zorg of ondersteuning wordt verleend
      als zelfstandige. De eerste zin is uitsluitend van toepassing indien de in de eerste zin bedoelde persoon aantoont
      dat deze zorgverlening aan deze voorwaarden voldoet of heeft voldaan. Die persoon wordt aangemerkt als verzorgend
      persoon. Bij ministeriële regeling kunnen nadere regels worden gesteld met betrekking tot de uitvoering van dit
      lid.


      [ref1]: https://wetten.overheid.nl/BWBR0035917#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0035362#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0018450#Artikel14a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0035917
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0035362
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0018450
        artikel: 14a
  - number: '15.7'
    text: |-
      Het vierde, vijfde en zesde lid vinden geen toepassing indien de verzorgende persoon in een kalenderjaar voor
      een periode langer dan een half jaar als werknemer in de zin van een wettelijke regeling inzake werkloosheid
      recht heeft op een uitkering ter zake van werkloosheid of op de loongerelateerde uitkering op grond van
      [hoofdstuk 7][ref1] van deze wet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '7'
  - number: '15.8'
    text: 'Voor de toepassing van het vierde en vijfde lid wordt onder:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.8.a
    text: een kind verstaan een eigen, aangehuwd of pleegkind;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.8.b
    text: een pleegkind verstaan een kind dat als een eigen kind wordt onderhouden en opgevoed.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: '15.9'
    text: |-
      Voor de toepassing van het eerste lid, onderdelen a en b, worden dagen, tot een maximum van achttien maanden,
      waarover de werknemer onbetaald verlof heeft genoten, gelijkgesteld met dagen, waarover loon is ontvangen of met
      acht uren waarover loon is ontvangen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: '15.10'
    text: 'Voor de toepassing van dit artikel wordt niet als loon beschouwd een uitkering:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.10.a
    text: |-
      op grond van de [Werkloosheidswet][ref1], met uitzondering van een uitkering op grond van
      [hoofdstuk IV van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0004045#HoofdstukIV
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0004045
        hoofdstuk: IV
  - number: 15.10.b
    text: |-
      op grond van [hoofdstuk 7][ref1] van deze wet, met uitzondering van een uitkering aan de persoon die slechts in
      staat is om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen per uur;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '7'
  - number: 15.10.c
    text: |-
      op grond van de [Wet op de arbeidsongeschiktheidsverzekering][ref1], berekend naar een arbeidsongeschiktheid van
      minder dan 80%; of


      [ref1]: https://wetten.overheid.nl/BWBR0002524
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0002524
  - number: 15.10.d
    text: die naar aard en strekking overeenkomt met een uitkering als bedoeld in onderdeel a, b of c.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: '15.11'
    text: |-
      Voor de toepassing van dit artikel wordt niet als loon beschouwd het voordeel van het voor privé-doeleinden ter
      beschikking stellen van een auto, bedoeld in [artikel 13bis van de Wet op de loonbelasting 1964][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0002471#Artikel13bis
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
    references:
      - id: ref1
        bwb_id: BWBR0002471
        artikel: 13bis
  - number: '15.12'
    text: 'Bij algemene maatregel van bestuur kunnen regels worden gesteld:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.12.a
    text: |-
      ter vaststelling van het aantal dagen waarover loon is ontvangen, bedoeld in het eerste lid, onderdeel b, en tweede
      lid;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: 15.12.b
    text: |-
      op grond waarvan voor het bepalen van het aantal van 52 dagen, bedoeld in het eerste lid, onderdeel b, en tweede
      lid, dagen waarover, anders dan bedoeld in het negende lid, geen loon is ontvangen, worden gelijkgesteld met dagen
      waarover loon is ontvangen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: '15.13'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld ter vaststelling van het aantal uren, bedoeld in
      het eerste lid, onderdeel a, en tweede lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel15
  - number: '16'
    text: |-
      Naast de op grond van [artikel 7][ref1] verplicht verzekerde personen en de op grond van [artikel 10][ref2] als
      verzekerd beschouwde personen zijn op grond van deze wet en de daarop berustende bepalingen eveneens verzekerd
      personen die zich vrijwillig hebben verzekerd op grond van [paragraaf 2][ref3] van dit hoofdstuk.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel10
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel16
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '7'
        hoofdstuk: '1'
        paragraaf: '1.3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '10'
        hoofdstuk: '1'
        paragraaf: '1.3'
      - id: ref3
        bwb_id: BWBR0019057
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '17'
    text: |-
      Voor de toepassing van deze wet en de daarop berustende bepalingen gelden aaneensluitende verzekeringen op grond
      van deze wet als één verzekering.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel17
  - number: '18.1'
    text: 'Het UWV laat op grond van deze paragraaf tot de vrijwillige verzekering toe, mits hij hier te lande woont:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.1.a
    text: |-
      de persoon, wiens verplichte verzekering is geëindigd en van wie op grond van gebleken
      omstandigheden redelijkerwijze valt aan te nemen dat onderbreking van die verplichte verzekering
      van korte duur zal zijn, dan wel die beschikbaar is om arbeid te aanvaarden als bedoeld in
      [artikel 16, eerste lid, onderdeel b, van de Werkloosheidswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045#Artikel16
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0004045
        artikel: '16'
  - number: 18.1.b
    text: |-
      de persoon, die, terwijl hij hier te lande woonde, in het buitenland verplicht verzekerd was tegen geldelijke
      gevolgen van langdurige arbeidsongeschiktheid, mits:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.1.b.1°
    text: hij niet meer in het buitenland verzekerd is, omdat hij niet langer werkzaamheden verricht in het buitenland; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.1.b.2°
    text: |-
      op grond van gebleken omstandigheden redelijkerwijze valt aan te nemen, dat het zijn bedoeling is bij geboden
      gelegenheid opnieuw een dienstbetrekking aan te gaan;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.1.c
    text: |-
      de persoon, wiens verplichte verzekering is geëindigd en die als zelfstandige werkzaamheden verricht of gaat
      verrichten, of als echtgenoot van de zelfstandige meewerkt of gaat meewerken, indien gedurende één jaar,
      onmiddellijk voorafgaande aan het einde van zijn verplichte verzekering, onafgebroken, al dan niet in Nederland, op
      grond van een wettelijke regeling een voorziening tegen geldelijke gevolgen van langdurige arbeidsongeschiktheid op
      hem van toepassing is geweest;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.1.d
    text: |-
      de persoon, die uit hoofde van een dienstbetrekking op grond waarvan slechts een gedeelte van een normale werkweek
      arbeid wordt verricht verplicht verzekerd is, indien op hem gedurende de drie jaren, onmiddellijk voorafgaande aan
      de dag van aanvang van de vrijwillige verzekering, onafgebroken een wettelijke regeling tegen geldelijke gevolgen
      van langdurige arbeidsongeschiktheid van toepassing is geweest;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.1.e
    text: |-
      de persoon, wiens arbeidsverhouding op grond van [artikel 6, eerste lid, onderdeel c, van de Ziektewet][ref1] niet
      als dienstbetrekking wordt beschouwd;


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '6'
  - number: 18.1.f
    text: |-
      de persoon, die op grond van [artikel 7 van de Ziektewet][ref1] als werknemer wordt beschouwd en tevens als
      zelfstandige werkzaamheden gaat verrichten of als echtgenoot van die zelfstandige meewerkt of gaat meewerken,
      indien gedurende de drie jaren, onmiddellijk voorafgaand aan de dag van aanvang van zijn vrijwillige verzekering,
      onafgebroken, al dan niet in Nederland, op grond van een wettelijke regeling een voorziening tegen geldelijke
      gevolgen van volledig duurzame arbeidsongeschiktheid of verminderde arbeidsgeschiktheid op hem van toepassing is
      geweest;


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '7'
  - number: 18.1.g
    text: de persoon, wiens recht op een uitkering krachtens deze wet is beëindigd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: '18.2'
    text: |-
      De in het eerste lid bedoelde verplichting bestaat eveneens ten aanzien van de persoon die de pensioengerechtigde
      leeftijd, bedoeld in [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1], nog niet heeft bereikt en die op
      grond van [artikel 3, tweede of vijfde lid, van de Ziektewet][ref2], niet als werknemer wordt beschouwd, en


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '3'
  - number: 18.2.a
    text: |-
      wiens verplichte verzekering is geëindigd en die buiten Nederland woont, aldaar direct aansluitend op de
      beëindiging van de verplichte verzekering een dienstbetrekking vervult voor de duur van maximaal vijf jaar en wiens
      werkgever binnen Nederland woont of gevestigd is;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.2.b
    text: |-
      die Nederlander is en die is uitgezonden om werkzaamheden te verrichten voor door Onze Minister in overeenstemming
      met Onze Minister van Buitenlandse Zaken aan te wijzen organisaties voor ontwikkelingssamenwerking;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.2.c
    text: |-
      die Nederlander is en die is uitgezonden om, in of buiten Nederland, werkzaamheden te verrichten voor een
      volkenrechtelijke organisatie, waarvan Nederland lid is dan wel waarvan de werkzaamheden door Nederland worden
      ondersteund;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.2.d
    text: die in Nederland woont, en buiten Nederland een dienstbetrekking vervult; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.2.e
    text: |-
      die Nederlander is en buiten Nederland werkzaamheden verricht die worden bekostigd door het Rijk en die tevens in
      opdracht van het Rijk worden verricht in het kader van een wettelijke taakomschrijving of ter uitvoering van een
      internationaal verdrag dan wel een daarmee gelijk te stellen overeenkomst of een besluit van een volkenrechtelijke
      organisatie.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: '18.3'
    text: |-
      Aan het vervullen van een dienstbetrekking als bedoeld in het tweede lid, onderdeel a, dient een aaneengesloten
      periode van verplichte verzekering van ten minste één jaar te zijn voorafgegaan.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: '18.4'
    text: |-
      Met de Nederlander, bedoeld in het tweede lid, onderdelen b, c en e, wordt gelijkgesteld de persoon, die onderdaan
      is van een van de lidstaten van de Europese Gemeenschap of onderdaan is van een Staat, waarmee Nederland een
      verdrag inzake sociale zekerheid heeft gesloten, mits hij voor hij werd uitgezonden in Nederland woonde.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: '18.5'
    text: |-
      De in het eerste lid, onderdelen c en d, genoemde termijn van één jaar respectievelijk van drie jaren wordt geacht
      niet te zijn onderbroken:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.5.a
    text: indien de betrokkene gedurende niet meer dan zestig dagen niet verzekerd is geweest;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: 18.5.b
    text: |-
      gedurende de wachttijd als bedoeld in [artikel 23][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel23
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '23'
        hoofdstuk: '3'
  - number: '18.6'
    text: |-
      De in het eerste lid, onderdelen c respectievelijk d, genoemde voorwaarde van een verzekeringsduur van één jaar
      respectievelijk van drie jaren wordt geacht te zijn vervuld, indien de betrokkene een uitkering ontvangt op grond
      van deze wet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel18
  - number: '19.1'
    text: 'Het verzoek om toelating tot de vrijwillige verzekering wordt ingediend bij het UWV:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
  - number: 19.1.a
    text: |-
      door de in [artikel 18, eerste lid, onderdelen a, b en c][ref1], bedoelde personen binnen dertien weken na het
      einde van hun verplichte verzekering;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.1.b
    text: |-
      door de in [artikel 18, eerste lid, onderdeel f][ref1], bedoelde persoon: binnen dertien weken na de dag, waarop
      zijn werkzaamheden als zelfstandige of zijn werkzaamheden als echtgenoot van de zelfstandige in diens bedrijfs- of
      beroepsuitoefening, een aanvang hebben genomen;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.1.c
    text: |-
      door de in [artikel 18, tweede lid, onderdeel a][ref1], bedoelde persoon: binnen dertien weken na de dag, waarop de
      verplichte verzekering is geëindigd;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.1.d
    text: |-
      door de in [artikel 18, tweede lid, onderdelen b, c en e][ref1], bedoelde persoon: binnen dertien weken na de dag
      van zijn vertrek naar het buitenland dan wel, indien de in [artikel 18, tweede lid, onderdeel c][ref2], bedoelde
      werkzaamheden worden verricht in Nederland, binnen dertien weken na de dag waarop die werkzaamheden een aanvang
      hebben genomen;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.1.e
    text: |-
      door de in [artikel 18, tweede lid, onderdeel d][ref1], bedoelde persoon: binnen dertien weken na de dag, waarop
      zijn werkzaamheden buiten Nederland een aanvang hebben genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '19.2'
    text: |-
      Het UWV kan bepalen dat een verzoek om toelating tot de vrijwillige verzekering, ingediend na de daartoe op grond
      van deze wet of de daarop berustende bepalingen gestelde termijn, geacht wordt tijdig te zijn ingekomen, indien de
      persoon die het verzoek heeft gedaan, redelijkerwijs niet geacht kan worden in verzuim te zijn geweest.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
  - number: '19.3'
    text: 'De vrijwillige verzekering vangt aan:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
  - number: 19.3.a
    text: |-
      voor de in [artikel 18, eerste lid, onderdelen a, b en c, en tweede lid, onderdeel a][ref1], bedoelde persoon: op
      de dag na die, waarop de verplichte verzekering is geëindigd;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.3.b
    text: |-
      voor de in [artikel 18, eerste lid, onderdelen d, e en f][ref1], bedoelde persoon: op de dag van ontvangst van zijn
      verzoek om toelating;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.3.c
    text: |-
      voor de in [artikel 18, tweede lid, onderdelen b, c en e][ref1], bedoelde persoon: op de dag van zijn vertrek naar
      het buitenland dan wel, indien de in [artikel 18, tweede lid, onderdeel c][ref2], bedoelde werkzaamheden worden
      verricht in Nederland, op de dag waarop die werkzaamheden een aanvang hebben genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 19.3.d
    text: |-
      voor de in [artikel 18, tweede lid, onderdeel d][ref1], bedoelde persoon: op de dag, waarop zijn werkzaamheden
      buiten Nederland een aanvang hebben genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel19
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '20'
    text: 'Het UWV beëindigt de vrijwillige verzekering:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
  - number: 20.a
    text: op verzoek van de vrijwillig verzekerde met ingang van een door hem te bepalen datum;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
  - number: 20.b
    text: |-
      met ingang van de dag, waarop de termijn van vijf jaar, bedoeld in [artikel 18, tweede lid, onderdeel a][ref1],
      is verstreken;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 20.c
    text: |-
      met ingang van de dag, waarop de werkzaamheden, bedoeld in [artikel 18, tweede lid][ref1], worden beëindigd en de
      vrijwillig verzekerde niet langer geacht kan worden inkomsten te verkrijgen wegens eindiging van die werkzaamheden
      dan wel inkomsten te derven in geval van ziekte;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: 20.d
    text: met ingang van de dag, waarop de vrijwillig verzekerde verplicht verzekerd wordt op grond van deze wet;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
  - number: 20.e
    text: |-
      indien de verschuldigde premie over een periode van twee volle kalendermaanden niet, niet volledig of niet tijdig
      wordt betaald; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
  - number: 20.f
    text: |-
      indien niet langer wordt voldaan aan andere vereisten voor toelating tot de vrijwillige verzekering, bedoeld in
      [artikel 18, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel20
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '18'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '21.1'
    text: |-
      De persoon, die om toelating tot de vrijwillige verzekering verzoekt, bepaalt bij de aanvang van de vrijwillige
      verzekering de hoogte van het dagloon, met dien verstande dat dit niet meer kan bedragen dan:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
  - number: 21.1.a
    text: |-
      het in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1] genoemde bedrag met betrekking
      tot een loontijdvak van een dag eventueel verhoogd of verlaagd krachtens [artikel 18 van die wet][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '18'
  - number: 21.1.b
    text: |-
      het loon of het inkomen dat hij in geval van volledig en duurzame arbeidsongeschiktheid naar het oordeel van het
      UWV derft.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
  - number: '21.2'
    text: |-
      Voor de persoon die verzekerde is op grond van deze paragraaf blijven bij het vaststellen van het recht op
      een WGA-uitkering en de duur en hoogte daarvan de [artikelen 54, derde en vierde lid][ref1], [58][ref2], en
      [59 tot en met 62][ref3] buiten toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel54
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel58
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel59
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '54'
        hoofdstuk: '7'
        paragraaf: '7.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '58'
        hoofdstuk: '7'
        paragraaf: '7.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '59'
        hoofdstuk: '7'
        paragraaf: '7.2'
  - number: '21.3'
    text: |-
      De hoogte van de WGA-uitkering op grond van de vrijwillige verzekering bedraagt per kalendermaand: I × J waarbij: -
      I staat voor maandloon; en
        - J staat voor het uitkeringspercentage, dat bij een arbeidsongeschiktheid van a. 35–45%, 28%; b. 45–55%, 35%; c.
      55–65%, 42%; d. 65–80%, 50,75%; en bij e. 80% of meer 70%, bedraagt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
  - number: '21.4'
    text: |-
      De hoogte van de uitkering, bedoeld in het derde lid, wordt eerst nadat een wijziging in de mate van
      arbeidsongeschiktheid ten minste twee kalendermaanden heeft voortgeduurd, herzien.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
  - number: '21.5'
    text: |-
      Op de WGA-uitkering, bedoeld in het derde lid, wordt, indien de persoon, die op grond van deze paragraaf
      verzekerd is, een inkomen verdient dat hoger is dan zijn resterende verdiencapaciteit als bedoeld in
      [artikel 60, vierde en vijfde lid][ref1], per kalendermaand in mindering gebracht: 0,7 x A x B/C waarbij: - A staat
      voor dat meerdere;
        - B staat voor het dagloon waarnaar de WGA-uitkering is berekend;
        - C staat voor het dagloon waarnaar de WGA-uitkering zou zijn berekend indien dat niet gemaximeerd zou zijn op het
      in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref2] bedoelde bedrag met betrekking tot
      een loontijdvak van een dag.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel60
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '60'
        hoofdstuk: '7'
        paragraaf: '7.2'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '21.6'
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen als bedoeld in dit artikel wordt verstaan.
      Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer wordt genoten
      als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking wordt genomen
      alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21
  - number: 21a
    text: |-
      Het UWV stelt nadere regels met betrekking tot de vrijwillige verzekering. Deze regels bevatten in ieder geval
      bepalingen met betrekking tot:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21a
  - number: 21a.a
    text: de toelating tot de vrijwillige verzekering;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21a
  - number: 21a.b
    text: het einde van de vrijwillige verzekering; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21a
  - number: 21a.c
    text: |-
      het dagloon, bedoeld in [artikel 21, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel21
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel21a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '21'
        hoofdstuk: '2'
        paragraaf: '2.2'
  - number: '22'
    text: |-
      Voorzover daarvan in deze paragraaf niet wordt afgeweken zijn de overige artikelen van deze wet en de daarop
      berustende bepalingen van overeenkomstige toepassing op deze paragraaf.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel22
  - number: '23.1'
    text: |-
      Voordat de verzekerde aanspraak kan maken op een uitkering op grond van deze wet geldt voor hem een wachttijd van
      104 weken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: '23.2'
    text: |-
      Als eerste dag van de wachttijd geldt de eerste werkdag al dan niet in een dienstbetrekking waarop door de
      verzekerde wegens ziekte niet is gewerkt of het werken tijdens de werktijd is gestaakt. Bij ministeriële regeling
      kunnen nadere regels worden gesteld en kunnen dagen waarop niet zou worden gewerkt als werkdag worden aangemerkt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: '23.3'
    text: 'Bij het bepalen van de wachttijd worden de volgende perioden in aanmerking genomen:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: 23.3.a
    text: |-
      perioden waarin recht bestaat op ziekengeld als bedoeld in de [Ziektewet][ref1] en de daarop berustende bepalingen
      worden in aanmerking genomen en worden samengeteld, indien zij:


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: 23.3.a.1°
    text: elkaar met een onderbreking van minder dan vier weken opvolgen; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: 23.3.a.2°
    text: |-
      direct voorafgaan aan en aansluiten op een periode waarin uitkering in verband met zwangerschap of bevalling op
      grond van [artikel 3:7, eerste lid][ref1], [3:8][ref2] of [3:10, eerste lid, van de Wet arbeid en zorg][ref3] wordt
      genoten, tenzij de ongeschiktheid voorafgaande aan en de ongeschiktheid aansluitende op die periode redelijkerwijs
      niet geacht kunnen worden voort te vloeien uit dezelfde oorzaak; en


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '3'
  - number: 23.3.b
    text: |-
      perioden die niet al op grond van onderdeel a meetellen maar waarin de verzekerde ongeschikt is geweest voor zijn
      arbeid. Deze perioden worden samengeteld, indien zij:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: 23.3.b.1°
    text: elkaar met een onderbreking van minder dan vier weken opvolgen; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: 23.3.b.2°
    text: |-
      direct voorafgaan aan en aansluiten op een periode waarin uitkering in verband met zwangerschap of bevalling op
      grond van [artikel 3:7, eerste lid][ref1], [3:8][ref2] of [3:10, eerste lid, van de Wet arbeid en zorg][ref3] wordt
      genoten, tenzij de ongeschiktheid voorafgaande aan en de ongeschiktheid aansluitende op die periode redelijkerwijs
      niet geacht kunnen worden voort te vloeien uit dezelfde oorzaak.


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '3'
  - number: '23.4'
    text: |-
      Met recht op ziekengeld als bedoeld in het derde lid, wordt gelijkgesteld de situatie dat aan een verzekerde geen
      ziekengeld wordt betaald als gevolg van de toepassing van de [artikelen 19a][ref1] en [19b van de Ziektewet][ref2]
      en de daarop berustende bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel19a
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel19b
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: 19a
      - id: ref2
        bwb_id: BWBR0001888
        artikel: 19b
  - number: '23.5'
    text: 'Voor het bepalen van de wachttijd worden niet in aanmerking genomen perioden gedurende welke:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: 23.5.a
    text: een uitkering wordt genoten als bedoeld in het derde lid, onderdeel a, onder 2°;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
  - number: 23.5.b
    text: |-
      geen recht op ziekengeld bestond op grond van [artikel 19aa, eerste lid, van de Ziektewet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel19aa
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: 19aa
  - number: '23.6'
    text: |-
      Op aanvraag van de verzekerde stelt het UWV, in afwijking van het eerste lid, een verkorte wachttijd vast indien
      de verzekerde volledig en duurzaam arbeidsongeschikt is als bedoeld in [artikel 4, tweede lid][ref1], en bij de
      aanvraag [artikel 66][ref2] in acht is genomen. Een verkorte wachttijd bedraagt ten minste 13 weken en ten hoogste
      78 weken. Het einde van een verkorte wachttijd wordt niet eerder vastgesteld dan tien weken na de dag waarop de
      aanvraag daartoe is ingediend.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel66
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '4'
        hoofdstuk: '1'
        paragraaf: '1.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '66'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '24.1'
    text: |-
      Na afloop van de wachttijd wordt het tijdvak, gedurende welke de verzekerde jegens zijn werkgever recht heeft op
      loon of bezoldiging, op gezamenlijk verzoek van de verzekerde en die werkgever door het UWV verlengd, tenzij:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel24
  - number: 24.1.a
    text: |-
      [artikel 29][ref1] of [29a, eerste of vierde lid][ref2], of [artikel 76c, onderdeel a, van de Ziektewet][ref3] van
      toepassing is, of


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel29a
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel76c
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel24
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: 29a
      - id: ref3
        bwb_id: BWBR0001888
        artikel: 76c
  - number: 24.1.b
    text: zwaarwegende omstandigheden zich daartegen verzetten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel24
  - number: '24.2'
    text: |-
      Het verlengde tijdvak, bedoeld in het eerste lid, eindigt op de door het UWV aangegeven datum en kan op verzoek
      van de werkgever of de verzekerde worden verkort, of wordt op hun gezamenlijk verzoek verder verlengd tenzij
      zwaarwegende omstandigheden zich daartegen verzetten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel24
  - number: '24.3'
    text: |-
      Het UWV stelt bij toepassing van het tweede lid een nieuwe datum vast waarop het verlengde tijdvak eindigt, met
      dien verstande dat dit tijdvak niet eerder eindigt dan dertien weken na het verzoek, bedoeld in het tweede lid,
      tenzij de werkgever voor het verstrijken van het tijdvak van die dertien weken geen loon meer verschuldigd is,
      omdat de dienstbetrekking is geëindigd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel24
  - number: '25.1'
    text: |-
      De werkgever jegens wie de verzekerde, bij ongeschiktheid tot het verrichten van arbeid wegens ziekte, recht
      heeft op loon als bedoeld in [artikel 629 van Boek 7 van het Burgerlijk Wetboek][ref1] dan wel aanspraak heeft op
      bezoldiging op grond van [artikel 76a, eerste lid, van de Ziektewet][ref2] houdt aantekening van het verloop van de
      ziekte en de reïntegratie van de verzekerde.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel76a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: 76a
  - number: '25.2'
    text: |-
      De werkgever, bedoeld in het eerste lid, stelt binnen een bij ministeriële regeling nader te bepalen termijn, in
      overeenstemming met de verzekerde een plan van aanpak op. De afspraken die in het plan van aanpak zijn gemaakt
      worden door werkgever en verzekerde nageleefd. Het plan van aanpak wordt periodiek geëvalueerd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.3'
    text: |-
      Uiterlijk dertien weken voor het verstrijken van de wachttijd stelt de werkgever, bedoeld in het eerste lid, in
      overleg met de verzekerde een reïntegratieverslag op en verstrekt hiervan een afschrift aan de verzekerde.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.4'
    text: |-
      Indien [artikel 24, eerste lid][ref1], toepassing heeft gevonden:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
  - number: 25.4.a
    text: |-
      stelt de werkgever in overleg met de verzekerde, indien hij nog geen reïntegratieverslag heeft opgesteld, in
      afwijking van het derde lid, het reïntegratieverslag uiterlijk dertien weken voor het verstrijken van het door
      het UWV vastgestelde verlengde tijdvak, bedoeld in [artikel 24, eerste lid][ref1], op en verstrekt een afschrift
      daarvan aan de verzekerde;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
  - number: 25.4.b
    text: |-
      vult de werkgever in overleg met de verzekerde, indien hij al een reïntegratieverslag heeft opgesteld dit
      reïntegratieverslag uiterlijk dertien weken voor het verstrijken van het door het UWV vastgestelde verlengde
      tijdvak, bedoeld in [artikel 24, eerste lid][ref1], aan en verstrekt een afschrift daarvan aan de verzekerde,
      tenzij de verzekerde verzoekt dit, in verband met het doen van een aanvraag als bedoeld in [artikel 64][ref2]
      eerder te doen. De werkgever komt binnen twee weken aan dit verzoek tegemoet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel64
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '25.5'
    text: |-
      Bij de uitvoering van het eerste tot en met het vierde lid laat de werkgever zich bijstaan door een persoon als
      bedoeld in [artikel 14, eerste lid, van de Arbeidsomstandighedenwet][ref1] die belast is met de bijstand, bedoeld
      in [artikel 14, eerste lid, onderdeel b, van die wet][ref2] of door een arbodienst.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel14
      [ref2]: https://wetten.overheid.nl/BWBR0010346#Artikel14
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '14'
      - id: ref2
        bwb_id: BWBR0010346
        artikel: '14'
  - number: '25.6'
    text: |-
      De verzekerde verleent zijn medewerking bij het opstellen van het plan van aanpak en het opstellen van het
      reïntegratieverslag.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.7'
    text: Bij ministeriële regeling kunnen regels met betrekking tot het eerste tot en met zesde lid worden gesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.8'
    text: |-
      Indien bij de behandeling van de aanvraag, bedoeld in [artikel 64][ref1] blijkt dat de werkgever zijn verplichting
      om een reïntegratieverslag op te stellen niet of niet volledig is nagekomen, stelt het UWV aan de werkgever een
      termijn waarbinnen het reïntegratieverslag wordt verstrekt of aangevuld.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel64
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '25.9'
    text: |-
      Indien bij de behandeling van de aanvraag, bedoeld in [artikel 64][ref1] en de beoordeling, bedoeld in
      [artikel 65][ref2] blijkt dat de werkgever zonder deugdelijke grond zijn verplichtingen op grond van
      het eerste, tweede, derde, vierde of vijfde lid dan wel de krachtens het zevende lid gestelde regels
      niet of niet volledig nakomt of onvoldoende reïntegratie-inspanningen heeft verricht, verlengt het
      UWV het tijdvak gedurende welke de verzekerde jegens die werkgever recht heeft op loon op grond van
      [artikel 629 van Boek 7 van het Burgerlijk Wetboek][ref3] dan wel aanspraak op bezoldiging op grond van
      [artikel 76a, eerste lid, van de Ziektewet][ref4], opdat de werkgever zijn tekortkoming ten aanzien van de bedoelde
      verplichtingen of reïntegratie-inspanningen kan herstellen. De verlenging bedoeld in de eerste zin, is ten hoogste
      52 weken. Indien op het moment van verlenging van het tijdvak, bedoeld in de eerste zin, recht bestaat op verlof
      op grond van [artikel 3:1, van de Wet arbeid en zorg][ref5], vangt het verlengde tijdvak aan met ingang van de dag
      waarop dat verlof eindigt. Indien tijdens het verlengde tijdvak, bedoeld in de eerste zin, recht ontstaat op verlof
      als bedoeld in de derde zin, wordt het tijdvak onderbroken voor de duur van dat verlof.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel65
      [ref3]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref4]: https://wetten.overheid.nl/BWBR0001888#Artikel76a
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '65'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref3
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref4
        bwb_id: BWBR0001888
        artikel: 76a
      - id: ref5
        bwb_id: BWBR0013008
        artikel: '3'
  - number: '25.10'
    text: |-
      Het UWV geeft de beschikking omtrent de toepassing van het negende lid uiterlijk zes weken voor de afloop
      van de wachttijd, bedoeld in [artikel 23][ref1], of indien toepassing is gegeven aan [artikel 24][ref2]
      voor de afloop van het verlengde tijdvak, indien de aanvraag, bedoeld in [artikel 64][ref3], tijdig
      is gedaan. Indien de aanvraag, bedoeld in [artikel 64][ref4], niet tijdig is gedaan, wordt de in
      de vorige zin bedoelde beschikking uiterlijk zes weken voor de afloop van het tijdvak, bedoeld in
      [artikel 629 lid 11, onderdeel a, van Boek 7 van het Burgerlijk Wetboek][ref5], gegeven dan wel van het tijdvak,
      bedoeld in [artikel 76a, zesde lid, onderdeel a, van de Ziektewet][ref6].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel24
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref5]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref6]: https://wetten.overheid.nl/BWBR0001888#Artikel76a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '23'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref5
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref6
        bwb_id: BWBR0001888
        artikel: 76a
  - number: '25.11'
    text: |-
      Verlenging van het tijdvak als bedoeld in het negende lid vindt niet plaats indien het UWV de
      beschikking omtrent de toepassing van het negende lid niet geeft voor de afloop van de wachttijd,
      bedoeld in [artikel 23][ref1], of indien toepassing is gegeven aan [artikel 24][ref2] van deze wet
      dan wel aan het [artikel 629 lid 11, onderdeel a, van Boek 7 van het Burgerlijk Wetboek][ref3], of
      [artikel 76a, zesde lid, onderdeel a, van de Ziektewet][ref4], voor afloop van het verlengde tijdvak.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel24
      [ref3]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref4]: https://wetten.overheid.nl/BWBR0001888#Artikel76a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '23'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref4
        bwb_id: BWBR0001888
        artikel: 76a
  - number: '25.12'
    text: |-
      Indien de werkgever na toepassing van het negende lid van mening is dat hij zijn tekortkoming ten aanzien van de
      in het negende lid bedoelde verplichtingen of reïntegratie-inspanningen heeft hersteld, meldt hij dit aan het UWV,
      waarbij hij aantoont dat hij de tekortkoming heeft hersteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.13'
    text: |-
      Het UWV geeft de beschikking waarin wordt vastgesteld of de tekortkoming, bedoeld in het negende lid, is hersteld
      binnen drie weken na de ontvangst van de melding, bedoeld in het twaalfde lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.14'
    text: |-
      Het tijdvak, bedoeld in het negende lid, eindigt zes weken nadat het UWV heeft vastgesteld dat de werkgever zijn
      tekortkoming ten aanzien van de in het negende lid bedoelde verplichtingen of reïntegratie-inspanningen heeft
      hersteld, maar niet later dan na 52 weken. Indien het UWV de beschikking omtrent de toepassing van het negende lid,
      de beschikking waarin wordt vastgesteld dat een tekortkoming is hersteld of de beschikking waarin wordt vastgesteld
      dat een tekortkoming niet is hersteld, te laat geeft, eindigt het tijdvak zoveel eerder als de beschikking later
      is afgegeven.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '25.15'
    text: |-
      Indien het UWV heeft vastgesteld dat de tekortkoming, bedoeld in het negende lid, is hersteld, geeft het UWV binnen
      zes weken een beschikking over het ontstaan van het recht op een uitkering als bedoeld in [hoofdstuk 6][ref1] en
      [7][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk6
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '6'
      - id: ref2
        bwb_id: BWBR0019057
        hoofdstuk: '7'
  - number: '25.16'
    text: |-
      Bij ministeriële regeling kunnen voor de toepassing van het negende tot en met het vijftiende lid nadere regels
      worden gesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel25
  - number: '26.1'
    text: |-
      Ten aanzien van de verzekerde die op grond van
      [artikel 29, tweede lid, onderdelen a, b, c of d, van de Ziektewet][ref1] recht heeft op ziekengeld, is op het UWV
      [artikel 25, tweede, vierde, vijfde, en achtste tot en met zestiende lid][ref2], niet van toepassing en is artikel
      25, eerste, derde en zesde lid, van overeenkomstige toepassing. Het UWV stelt, binnen een bij ministeriële regeling
      nader te bepalen termijn, in overleg met die verzekerde, een plan van aanpak op. Het plan van aanpak wordt periodiek
      geëvalueerd. [Artikel 30a, zesde en zevende lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref3]
      is van overeenkomstige toepassing, waarbij voor «de re-integratievisie» telkens wordt gelezen: het plan van aanpak.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref3]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0013060
        artikel: 30a
  - number: '26.2'
    text: |-
      In afwijking van het eerste lid is [artikel 25, eerste, tweede, derde, vijfde, zesde, zevende en achtste lid][ref1],
      van overeenkomstige toepassing op de eigenrisicodrager, bedoeld in
      [artikel 1, eerste lid, onderdeel h, van de Ziektewet][ref2] ten aanzien van de personen, bedoeld in
      [artikel 29, tweede lid, onderdelen a, b en c, van die wet][ref3], die laatstelijk tot hem in dienstbetrekking
      stonden. Indien bij de behandeling van de aanvraag, bedoeld in [artikel 64][ref4] en de beoordeling, bedoeld in
      [artikel 65][ref5] blijkt dat de eigenrisicodrager, bedoeld in de eerste zin, zonder deugdelijke grond de uit
      die zin voortvloeiende verplichtingen niet of niet volledig nakomt of onvoldoende reïntegratie-inspanningen heeft
      verricht, verlengt het UWV het tijdvak gedurende welke de persoon, bedoeld in de eerste zin recht op ziekengeld
      heeft op grond van [artikel 29 van de Ziektewet][ref6], opdat de eigenrisicodrager zijn tekortkoming ten aanzien
      van de bedoelde verplichtingen of reïntegratie-inspanningen kan herstellen. De verlenging, bedoeld in de tweede
      zin, is ten hoogste 52 weken. [Artikel 25, tiende tot en met zestiende lid][ref7], is van overeenkomstige
      toepassing met dien verstande dat indien de aanvraag later wordt gedaan dan in of op grond van [artikel 64][ref8]
      voorgeschreven, de beschikking tot verlenging van het tijdvak, bedoeld in de tweede zin, uiterlijk zes weken voor
      de afloop van het op grond van [artikel 29, tiende lid, onderdeel a, van de Ziektewet][ref9] verlengde tijdvak
      wordt genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel65
      [ref6]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref7]: https://wetten.overheid.nl/BWBR0001888#Artikel25
      [ref8]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref9]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '1'
      - id: ref3
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '65'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref6
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref7
        bwb_id: BWBR0001888
        artikel: '25'
      - id: ref8
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref9
        bwb_id: BWBR0001888
        artikel: '29'
  - number: '26.3'
    text: |-
      Indien de verzekerde, bedoeld in het eerste lid, bij de arbeidsinschakeling wordt ondersteund door het college van
      burgemeester en wethouders op grond van [artikel 7, derde lid, onderdeel c, van de Participatiewet][ref1], is het
      eerste lid van overeenkomstige toepassing op het college van burgemeester en wethouders en treedt het college van
      burgemeester en wethouders voor de toepassing van het eerste lid in de plaats van het UWV, met dien verstande dat
      de tweede zin van [artikel 65][ref2] niet van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel65
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel26
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '65'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '26.4'
    text: Bij ministeriële regeling kunnen nadere regels worden gesteld voor de uitvoering van dit artikel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel26
  - number: '27.1'
    text: |-
      De verzekerde die een aanvraag voor een uitkering heeft ingediend of een recht heeft op een uitkering op grond
      van deze wet en de instelling waaraan op grond van [artikel 71][ref1] een uitkering op grond van deze wet wordt
      uitbetaald, verstrekt op verzoek of uit eigen beweging zo spoedig mogelijk alle informatie, waarvan het hem
      redelijkerwijs duidelijk moet zijn dat die van invloed kan zijn op het recht op uitkering, de hoogte van de
      uitkering of de betaling van de uitkering, waaronder mede is begrepen informatie in het kader van reïntegratie, aan
      het UWV. Deze verplichting geldt niet indien die feiten en omstandigheden door het UWV kunnen worden vastgesteld
      op grond van bij wettelijk voorschrift als authentiek aangemerkte gegevens of kunnen worden verkregen uit bij
      ministeriële regeling aan te wijzen administraties. Bij ministeriële regeling wordt bepaald voor welke gegevens de
      tweede zin van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel71
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '71'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '27.2'
    text: |-
      De verzekerde die een aanvraag voor een uitkering heeft ingediend of een recht heeft op een uitkering op grond van
      deze wet is verplicht:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.2.a
    text: |-
      te voldoen aan elke oproep van het UWV of van een of meer door het UWV aangewezen personen om aanwezig te zijn
      op een door of vanwege het UWV te bepalen plaats voor beantwoording van vragen als bedoeld in onderdeel b het
      meewerken aan onderzoek als bedoeld in onderdeel c of het naleven van de controlevoorschriften, bedoeld in
      onderdeel d;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.2.b
    text: |-
      vragen te beantwoorden die door het UWV of door een of meer door het UWV aangewezen personen in verband met het
      recht op uitkering op grond van deze wet worden gesteld;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.2.c
    text: |-
      mee te werken door zich te laten onderzoeken door het UWV of door een of meer daartoe door het UWV aangewezen
      personen;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.2.d
    text: |-
      tot naleving van door het UWV vastgestelde controlevoorschriften die noodzakelijk zijn voor een juiste uitvoering
      van deze wet;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.2.e
    text: |-
      op verzoek onverwijld inzage te geven aan het UWV in een op hem betrekking hebbend document als bedoeld in
      [artikel 1, eerste lid, onder 1° tot en met 3°, van de Wet op de identificatieplicht][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0006297#Artikel1
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0006297
        artikel: '1'
  - number: 27.2.f
    text: |-
      zich te onthouden van zeer ernstige misdragingen jegens de met de uitvoering van deze wet belaste personen en
      instanties tijdens het verrichten van hun werkzaamheden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: '27.3'
    text: 'De verplichtingen, bedoeld in het eerste en tweede lid, zijn van overeenkomstige toepassing ten aanzien van:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.3.a
    text: het reïntegratiebedrijf dat in opdracht van het UWV of de eigenrisicodrager werkzaamheden verricht; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: 27.3.b
    text: |-
      personen die met toestemming van het UWV of de eigenrisicodrager zijn aangewezen door een reïntegratiebedrijf als
      bedoeld in onderdeel b, voorzover dit noodzakelijk is voor de uitvoering van de bij wet of overeenkomst aan deze
      personen en rechtspersonen opgedragen taken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: '27.4'
    text: |-
      De verzekerde die recht heeft op een uitkering op grond van deze wet en die bij deelname aan een
      reïntegratietraject zijn reïntegratieverplichtingen niet naleeft, deelt de reden daarvan onmiddellijk mede aan
      het reïntegratiebedrijf.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: '27.5'
    text: |-
      De verzekerde die een aanvraag voor een uitkering heeft ingediend of een recht heeft op een uitkering op grond
      van deze wet is verplicht te voldoen aan het voorschrift, gegeven door het UWV of de door hem daartoe aangewezen
      deskundige, om zich ter observatie te doen opnemen of te verblijven in een aangewezen inrichting.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: '27.6'
    text: |-
      De eigenrisicodrager treedt voor de toepassing van het eerste en tweede lid, voorzover het betreft de naleving door
      zijn werknemer of gewezen werknemer van plichten die reïntegratie betreffen, in de plaats van het UWV.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: '27.7'
    text: |-
      Dit artikel is van overeenkomstige toepassing op de persoon die tijdens de wachttijd, met uitzondering van de
      eerste dag van die wachttijd, geen verzekerde is op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
  - number: '27.8'
    text: |-
      De werkgever die een aanvraag heeft ingediend voor of recht heeft op een subsidie als bedoeld in [artikel 36][ref1]
      en de persoon, niet zijnde verzekerde, bedoeld in het eerste lid, die een aanvraag heeft ingediend voor of recht
      heeft op een voorziening als bedoeld in [artikel 35][ref2], verstrekken op verzoek van het UWV of uit eigen
      beweging zo spoedig mogelijk alle informatie, waarvan het hem redelijkerwijs duidelijk moet zijn dat zij van
      invloed kan zijn op de verstrekking of toekenning of op de duur of de hoogte van het reïntegratie-instrument, aan
      het UWV.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel36
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel35
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '36'
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '28.1'
    text: |-
      De verzekerde voorkomt het ontstaan van arbeidsongeschiktheid of verminderde arbeidsgeschiktheid en beperkt het
      bestaan van arbeidsongeschiktheid of verminderde arbeidsgeschiktheid, voorzover dit redelijkerwijs van hem verwacht
      mag worden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel28
  - number: '28.2'
    text: |-
      De verzekerde is gedurende de wachttijd alsmede het verlengde tijdvak, bedoeld in [artikel 24, eerste lid][ref1],
      en het tijdvak, bedoeld in [artikel 25, negende lid][ref2], verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel25
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel28
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
  - number: 28.2.a
    text: |-
      mee te werken aan door zijn werkgever of door een door die werkgever aangewezen deskundige gegeven redelijke
      voorschriften of getroffen maatregelen die erop gericht zijn om hem in staat te stellen passende arbeid te
      verrichten; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel28
  - number: 28.2.b
    text: voldoende reïntegratie-inspanningen te verrichten;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel28
  - number: 28.2.c
    text: een naar algemeen medische maatstaven adequate behandeling te ondergaan voor zijn ziekte of gebrek.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel28
  - number: '28.3'
    text: |-
      Dit artikel is van overeenkomstige toepassing op de persoon die tijdens de wachttijd, met uitzondering van de
      eerste dag van die wachttijd, geen verzekerde is op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel28
  - number: '29.1'
    text: |-
      De verzekerde die recht heeft op een WGA-uitkering is verplicht in voldoende mate te trachten mogelijkheden tot het
      verrichten van passende arbeid te behouden of te verkrijgen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: '29.2'
    text: |-
      Ter naleving van de plicht, bedoeld in het eerste lid, is de verzekerde die recht heeft op een WGA-uitkering in elk
      geval verplicht:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: 29.2.a
    text: |-
      zich geneeskundig te laten behandelen of aanwijzingen van een arts op te volgen indien het UWV of de
      eigenrisicodrager of het reïntegratiebedrijf in opdracht van het UWV of de eigenrisicodrager, daartoe opdracht
      geeft en zijn genezing niet te belemmeren;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: 29.2.b
    text: |-
      mee te werken aan activiteiten of werkzaamheden, gericht op zijn inschakeling in de arbeid, die het UWV of de
      eigenrisicodrager wenselijk acht voor verkrijging van mogelijkheden tot verrichten van passende arbeid;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: 29.2.c
    text: |-
      mee te werken aan aanpassing van de arbeidsplaats en aan persoonsgebonden voorzieningen die het UWV of de
      eigenrisicodrager verstrekt voor verkrijging van mogelijkheden tot verrichten van passende arbeid en zo nodig
      trachten die aanpassing en die voorzieningen te verkrijgen;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: 29.2.d
    text: mee te werken aan het opstellen van de reïntegratievisie en het reïntegratieplan;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: 29.2.e
    text: te voldoen aan verplichtingen die zijn opgenomen in de reïntegratievisie en het reïntegratieplan.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel29
  - number: '30.1'
    text: 'De verzekerde die recht heeft op een WGA-uitkering is verplicht:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: 30.1.a
    text: passende arbeid te verrichten indien hij daartoe in de gelegenheid wordt gesteld;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: 30.1.b
    text: in voldoende mate te trachten passende arbeid te verkrijgen; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: 30.1.c
    text: |-
      geen eisen te stellen in verband met door hem te verrichten arbeid die het aanvaarden of verkrijgen van passende
      arbeid belemmeren.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: '30.2'
    text: |-
      De verzekerde die zijn resterende verdiencapaciteit als bedoeld in [paragraaf 7.2][ref1] niet
      volledig benut en die recht heeft op een WGA-uitkering, is verplicht zich als werkzoekende
      bij het UWV te laten registreren, indien hem daartoe het recht toekomt op grond van
      [artikel 30b, eerste lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref2] en het UWV of de
      eigenrisicodrager hem dit opdraagt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
      [ref2]: https://wetten.overheid.nl/BWBR0013060#Artikel30b
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '7'
        paragraaf: '7.2'
      - id: ref2
        bwb_id: BWBR0013060
        artikel: 30b
  - number: '30.3'
    text: |-
      De verzekerde die recht heeft op een loongerelateerde uitkering van de WGA-uitkering en arbeid in dienstbetrekking
      verricht is verplicht:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: 30.3.a
    text: |-
      zich te onthouden van verwijtbaar gedrag dat aangemerkt kan worden als een dringende reden in de zin van
      [artikel 678 van boek 7 van het Burgerlijk Wetboek][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel678
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '678'
  - number: 30.3.b
    text: |-
      de dienstbetrekking niet door of op zijn verzoek te laten beëindigen zonder dat aan de voortzetting ervan zodanige
      bezwaren waren verbonden, dat deze voortzetting redelijkerwijs niet van hem kon worden gevergd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: '30.4'
    text: |-
      Onder passende arbeid als bedoeld in het eerste lid, wordt verstaan alle arbeid die voor de krachten en
      bekwaamheden van de werknemer is berekend, tenzij aanvaarding om redenen van lichamelijke, geestelijke of sociale
      aard niet van hem kan worden gevergd. Niet als passend wordt beschouwd arbeid op grond van een dienstbetrekking als
      bedoeld in [hoofdstuk 2][ref1] of [3 van de Wet sociale werkvoorziening][ref2] en arbeid op grond waarvan men niet
      als werknemer in de zin van de [Werkloosheidswet][ref3] wordt aangemerkt. Bij of krachtens algemene maatregel van
      bestuur kunnen nadere regels worden gesteld omtrent het begrip passende arbeid.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
      [ref3]: https://wetten.overheid.nl/BWBR0004045
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0004045
  - number: '30.5'
    text: |-
      Het door de verzekerde, bedoeld in het derde lid, niet voeren van verweer tegen of het instemmen met een
      beëindiging van de dienstbetrekking door of op verzoek van de werkgever leidt niet tot overtreding van de
      verplichting, bedoeld in het derde lid, aanhef en onderdeel a.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel30
  - number: '31'
    text: |-
      De plichten, bedoeld in [artikel 27][ref1], [28][ref2], [29][ref3], [30][ref4] en [64, derde lid][ref5], worden,
      indien de in die artikelen genoemde verzekerde een wettelijk vertegenwoordiger heeft, door die vertegenwoordiger
      nageleefd. Voorzover de plichten slechts door de verzekerde kunnen worden nageleefd, bevordert de wettelijk
      vertegenwoordiger die naleving.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel30
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel64
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel31
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '32.1'
    text: |-
      Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot de [artikelen 27][ref1],
      [28][ref2], [29][ref3] en [30, eerste tot en met derde lid][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel30
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel32
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '32.2'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld waarbij bepaalde groepen werknemers worden vrijgesteld van
      verplichtingen, hun op grond van [artikel 29][ref1] en [30, eerste lid][ref2], opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel30
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel32
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '32.3'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld op grond waarvan aan werknemers
      in individuele gevallen tijdelijk ontheffing kan worden verleend van verplichtingen, hun op grond van
      [artikel 30, eerste lid][ref1], opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel30
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel32
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '33'
    text: |-
      De verzekerde die een aanvraag voor een uitkering heeft ingediend, of een recht heeft op een uitkering op grond van
      deze wet wordt door zijn werkgever in de gelegenheid gesteld tot het geldend maken van de hem op grond van deze wet
      en de daarop berustende bepalingen toekomende aanspraken en tot het nakomen van de hem op grond van deze wet en de
      daarop berustende bepalingen opgelegde verplichtingen, voorzover de uitoefening van die bevoegdheden en de nakoming
      van die verplichtingen niet buiten de arbeidstijd kan geschieden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel33
  - number: '34.1'
    text: |-
      De verzekerde die recht heeft op een WGA-uitkering die niet ten laste komt van een eigenrisicodrager, heeft recht
      op ondersteuning bij arbeidsinschakeling en, met inachtneming van de daarvoor geldende wettelijke bepalingen,
      op de naar het oordeel van het UWV noodzakelijk geachte voorziening gericht op arbeidsinschakeling, tenzij
      [artikel 42][ref1] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '42'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: '34.2'
    text: |-
      Dit artikel is niet van toepassing op de verzekerde, die werkzaam is als werknemer in de zin van de
      [Wet sociale werkvoorziening][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008903
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0008903
  - number: 34a.1
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld op grond waarvan het UWV op aanvraag
      van de persoon met een naar het oordeel van het UWV structurele functionele beperking, die arbeid als zelfstandige
      verricht of gaat verrichten, in het kader van de bevordering van de inschakeling in en ondersteuning bij de arbeid
      als zelfstandige, voorzieningen kan verstrekken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
  - number: 34a.2
    text: |-
      Voorzieningen als bedoeld in het eerste lid worden uitsluitend verstrekt in verband met een naar het oordeel van
      het UWV structurele functionele beperking die het gevolg is van een ziekte of handicap die:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
  - number: 34a.2.a
    text: bij de aanvang van de arbeid als zelfstandige aanwezig was, of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
  - number: 34a.2.b
    text: |-
      binnen drie jaar na de aanvang van de arbeid als zelfstandige is ontstaan, indien bij de aanvang van de arbeid als
      zelfstandige reeds een ziekte of handicap aanwezig was.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
  - number: 34a.3
    text: |-
      Voorzieningen als bedoeld in het eerste lid worden niet verstrekt of worden beëindigd indien het inkomen van
      de persoon die arbeid als zelfstandige verricht, na een bij algemene maatregel van bestuur te bepalen aantal
      kalenderjaren na de aanvang van de arbeid als zelfstandige, meer bedraagt dan een bij die maatregel vast te stellen
      bedrag. Bij of krachtens die maatregel wordt tevens bepaald wat onder inkomen als bedoeld in de eerste zin wordt
      verstaan.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
  - number: 34a.4
    text: |-
      Voor de toepassing van dit artikel en de daarop berustende bepalingen wordt, in afwijking van [artikel 1][ref1],
      verstaan onder zelfstandige: de persoon die, anders dan in dienstbetrekking, arbeid in eigen bedrijf verricht of
      een beroep uitoefent, teneinde daarmee inkomen te verwerven.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel1
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '1'
        hoofdstuk: '1'
        paragraaf: '1.1'
  - number: 34a.5
    text: 'Dit artikel is niet van toepassing op de persoon:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
  - number: 34a.5.a
    text: |-
      die recht heeft op arbeidsondersteuning op grond van de
      [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
    references:
      - id: ref1
        bwb_id: BWBR0008657
  - number: 34a.5.b
    text: |-
      voor zover voor diens ondersteuning bij arbeidsinschakeling op grond van
      [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] het college van burgemeester en wethouders zorg
      draagt of onmiddellijk voorafgaande aan de aanvang van de arbeid als zelfstandige zorg droeg tot het moment dat het
      inkomen uit die arbeid gedurende twee aaneengesloten jaren ten minste het minimumloon per uur, vermenigvuldigd met
      de arbeidsduur welke in overeenkomstige dienstbetrekkingen in de regel geacht wordt een volledige dienstbetrekking
      te vormen bedraagt.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel34a
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
  - number: '35.1'
    text: |-
      Het UWV kan aan de persoon met een naar het oordeel van het UWV structurele functionele beperking, en die arbeid
      in dienstbetrekking verricht of die arbeid in dienstbetrekking gaat verrichten, doch niet werkzaam is of zal zijn
      als werknemer in de zin van de [Wet sociale werkvoorziening][ref1], of die scholing of opleiding in het kader
      van de bevordering van de inschakeling in het arbeidsproces volgt of gaat volgen of arbeid op een proefplaats
      verricht of gaat verrichten, met uitzondering van de persoon die werkzaam is als werknemer in de zin van de Wet
      sociale werkvoorziening, op aanvraag voorzieningen toekennen die strekken tot behoud, herstel of bevordering van de
      mogelijkheid tot het verrichten van arbeid, het volgen van de scholing of opleiding of het verrichten van arbeid op
      die proefplaats.


      [ref1]: https://wetten.overheid.nl/BWBR0008903
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0008903
  - number: '35.2'
    text: 'Onder voorzieningen als bedoeld in het eerste lid worden uitsluitend verstaan:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: 35.2.a
    text: |-
      vervoersvoorzieningen die er toe strekken dat de persoon, bedoeld in het eerste lid, zijn werkplek of
      opleidingslocatie kan bereiken;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: 35.2.b
    text: intermediaire activiteiten ten behoeve van personen met een visuele, auditieve of motorische handicap;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: 35.2.c
    text: |-
      meeneembare voorzieningen ten behoeve van de inrichting van de arbeidsplaats, de productie- en werkmethoden, de
      inrichting van de opleidingsplaats of de proefplaats en de bij de arbeid of opleiding te gebruiken hulpmiddelen,
      die in overwegende mate op het individu van de persoon, bedoeld in het eerste lid, zijn afgestemd; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: 35.2.d
    text: |-
      noodzakelijke persoonlijke ondersteuning bij het verrichten van de aan de persoon opgedragen taken, indien die
      ondersteuning een compensatie vormt voor zijn beperkingen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: '35.3'
    text: |-
      Het UWV kan aan de persoon, bedoeld in het eerste lid, op aanvraag vervoersvoorzieningen toekennen die strekken tot
      verbetering van zijn leefomstandigheden en die deel uitmaken van dan wel rechtstreeks samenhangen met voorzieningen
      als bedoeld in het tweede lid, onderdeel a.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: '35.4'
    text: 'Dit artikel is niet van toepassing op de persoon:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: 35.4.a
    text: |-
      die recht heeft op arbeidsondersteuning op grond van de
      [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0008657
  - number: 35.4.b
    text: |-
      voor zover voor diens ondersteuning bij arbeidsinschakeling op grond van
      [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] het college van burgemeester en wethouders
      zorg draagt of onmiddellijk voorafgaande aan een dienstbetrekking zorg droeg tot het moment dat het inkomen uit de
      arbeid in dienstbetrekking gedurende twee aaneengesloten jaren ten minste het minimumloon per uur, vermenigvuldigd
      met de arbeidsduur welke in overeenkomstige dienstbetrekkingen in de regel geacht wordt een volledige
      dienstbetrekking te vormen bedraagt en ten behoeve van die persoon in die twee jaren geen loonkostensubsidie als
      bedoeld in [artikel 10d van de Participatiewet][ref2] is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel10d
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0015703
        artikel: 10d
  - number: '35.5'
    text: Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot dit artikel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel35
  - number: '36.1'
    text: |-
      Het UWV kan op aanvraag van de werkgever die met een werknemer een dienstbetrekking, anders dan een
      dienstbetrekking in de zin van de [WSW][ref1], van ten minste zes maanden is aangegaan of waarmee door elkaar
      opvolgende dienstbetrekkingen gedurende ten minste zes maanden een dienstbetrekking blijkt te bestaan, subsidie
      verstrekken voor meerkosten voorzover:


      [ref1]: https://wetten.overheid.nl/BWBR0008903
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0008903
  - number: 36.1.a
    text: |-
      die werkgever aantoont dat het totaal van de kosten die hij maakt of heeft gemaakt ten behoeve van het in dienst
      houden of in dienst nemen van een werknemer met een naar het oordeel van het UWV structurele functionele beperking
      meer bedraagt dan bij algemene maatregel van bestuur te bepalen bedragen, die in hoogte verschillen afhankelijk van
      de hoogte van het loon van de werknemer;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: 36.1.b
    text: |-
      die werkgever, na ommekomst van de periode van 3 respectievelijk 1 jaar, genoemd in
      [artikel 49 van de Wet financiering sociale verzekeringen][ref1], kosten maakt of heeft gemaakt ten behoeve van het
      in dienst houden van een werknemer als bedoeld in onderdeel a;


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel49
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '49'
  - number: 36.1.c
    text: |-
      die werkgever kosten heeft gemaakt als bedoeld in het tweede lid en de periode van drie respectievelijk één jaar,
      bedoeld in onderdeel b, voortijdig wordt beëindigd op initiatief van de werknemer of omdat de werknemer wegens
      arbeidsongeschiktheid definitief niet in de dienstbetrekking terugkeert;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: 36.1.d
    text: |-
      die werkgever kosten heeft gemaakt als bedoeld in het tweede lid en de periode van drie respectievelijk één jaar,
      bedoeld in onderdeel b, voortijdig wordt beëindigd omdat er bij die werkgever geen passende arbeid aanwezig is.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: '36.2'
    text: |-
      Onder de kosten, bedoeld in het eerste lid, worden verstaan de kosten van voorzieningen, bedoeld in
      [artikel 35, tweede lid][ref1], voorzover die naar de aard der zaak duurzaam zijn verenigd met het bedrijf van
      de werkgever.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel35
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '36.3'
    text: |-
      Een subsidie als bedoeld in het eerste lid wordt niet verstrekt, indien de subsidie wordt aangevraagd voor een
      werknemer:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: 36.3.a
    text: 'voor wie reeds eerder aan de werkgever subsidie op grond van dit artikel is verstrekt, tenzij de subsidieaanvraag:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: 36.3.a.1°
    text: geen verband houdt met feiten en omstandigheden die aanleiding zijn geweest voor het verstrekken van de subsidie;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: 36.3.a.2°
    text: |-
      betrekking heeft op door de werkgever gemaakte kosten ter vervanging van de bij de arbeid te gebruiken hulpmiddelen
      door de werknemer;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: 36.3.b
    text: |-
      voor zover voor diens ondersteuning bij arbeidsinschakeling op grond van
      [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] het college van burgemeester en wethouders
      zorg draagt of onmiddellijk voorafgaande aan een dienstbetrekking zorg droeg tot het moment dat het inkomen uit de
      arbeid in dienstbetrekking gedurende twee aaneengesloten jaren ten minste het minimumloon per uur, vermenigvuldigd
      met de arbeidsduur welke in overeenkomstige dienstbetrekkingen in de regel geacht wordt een volledige
      dienstbetrekking te vormen bedraagt en ten behoeve van die persoon in die twee jaren geen loonkostensubsidie als
      bedoeld in [artikel 10d van de Participatiewet][ref2] is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel10d
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0015703
        artikel: 10d
  - number: '36.4'
    text: |-
      Het UWV kan op aanvraag van de werkgever een tegemoetkoming in de kosten verstrekken, voor zover
      de werkgever een voorziening als bedoeld in [artikel 35, tweede lid, onderdeel d][ref1], of
      [artikel 2:22, tweede lid, onderdeel d, van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref2]
      verstrekt aan de persoon met een naar het oordeel van het UWV structurele functionele beperking, die:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel35
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
  - number: 36.4.a
    text: |-
      een dienstbetrekking, anders dan een dienstbetrekking in de zin van de [Wet sociale werkvoorziening][ref1], met de
      werkgever is aangegaan; of


      [ref1]: https://wetten.overheid.nl/BWBR0008903
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0008903
  - number: 36.4.b
    text: |-
      arbeid op een proefplaats verricht, met uitzondering van de persoon, bedoeld in [artikel 34, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel34
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '34'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '36.5'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot dit artikel.
      Daarbij kunnen regels worden gesteld met betrekking tot subsidie in geval van overgang van onderneming als bedoeld
      in [artikel 662 van Boek 7 van het Burgerlijk Wetboek][ref1], met betrekking tot de te verstrekken gegevens bij
      een aanvraag voor subsidie. Tevens kunnen daarbij regels worden gesteld met betrekking tot het niet hanteren
      van een drempelbedrag als bedoeld in het eerste lid, onderdeel a, indien de subsidie wordt verstrekt ten behoeve
      van een werknemer als bedoeld in het eerste lid, onderdeel a, voor wie de werkgever geen korting als bedoeld in
      [artikel 49 van de Wet financiering sociale verzekeringen][ref2] kan toepassen.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel662
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel49
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '662'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '49'
  - number: '36.6'
    text: De bedragen in dit artikel worden verlaagd naar evenredigheid van de kortere duur van de dienstbetrekking.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel36
  - number: '37.1'
    text: |-
      Het UWV en de eigenrisicodrager kunnen, in het kader van de bevordering van de inschakeling in de arbeid,
      toestemming verlenen aan de gedeeltelijk arbeidsgeschikte die recht heeft op een uitkering op grond van deze wet om
      op een proefplaats bij een werkgever gedurende maximaal zes maanden onbeloonde werkzaamheden te verrichten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: '37.2'
    text: 'De onbeloonde werkzaamheden op een proefplaats zijn:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: 37.2.a
    text: werkzaamheden, waartoe de gedeeltelijk arbeidsgeschikte met zijn krachten en bekwaamheden in staat is;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: 37.2.b
    text: |-
      werkzaamheden, waarbij de werkgever, bij wie de proefplaatsing geschiedt, een aansprakelijkheidsverzekering ten
      behoeve van de gedeeltelijk arbeidsgeschikte heeft afgesloten;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: 37.2.c
    text: |-
      werkzaamheden, die de gedeeltelijk arbeidsgeschikte niet reeds eerder onbeloond op een proefplaats bij die
      werkgever of diens rechtsvoorganger heeft verricht; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: 37.2.d
    text: |-
      werkzaamheden, waarbij er, naar het oordeel van het UWV of de eigenrisicodrager, een reëel uitzicht is op een op de
      onbeloonde werkzaamheden aansluitende dienstbetrekking van dezelfde of grotere omvang voor ten minste 6 maanden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: '37.3'
    text: |-
      Indien de werkzaamheden, bedoeld in het eerste lid, wegens ziekte worden onderbroken, wordt de periode waarin een
      uitkering bij ziekte wordt ontvangen, voor de toepassing van dat lid buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: '37.4'
    text: |-
      In afwijking van [artikel 30, eerste lid, onderdeel b][ref1], is de gedeeltelijk arbeidsgeschikte die onbeloonde
      werkzaamheden op een proefplaats als bedoeld in het eerste of tweede lid verricht, voor de duur van de
      proefplaatsing niet verplicht passende arbeid te verkrijgen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel30
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '37.5'
    text: Bij ministeriële regeling kunnen nadere regels worden gesteld met betrekking tot de uitvoering van dit artikel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37
  - number: 37b
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan de persoon, die recht heeft op een WGA-uitkering, en
      voor wie de kans op inschakeling in het arbeidsproces gering is en die daardoor vooralsnog niet bemiddelbaar
      is op de arbeidsmarkt, onbeloonde additionele werkzaamheden laten verrichten gedurende maximaal twee jaar.
      [Artikel 10a, tweede tot en met tiende lid, van de Participatiewet][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel10a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel37b
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: 10a
  - number: '38'
    text: |-
      Het UWV kan controlevoorschriften vaststellen. Deze voorschriften gaan niet verder dan strikt noodzakelijk is voor
      een juiste uitvoering van deze wet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel38
  - number: '39.1'
    text: |-
      Nadat het recht op een WGA-uitkering is vastgesteld, stelt het UWV in samenspraak met de verzekerde een
      reïntegratievisie vast waarin verplichtingen en rechten van de verzekerde zijn vermeld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
  - number: '39.2'
    text: Het UWV evalueert, in samenspraak met de verzekerde, periodiek de reïntegratievisie en stelt deze zo nodig bij.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
  - number: '39.3'
    text: |-
      Indien de reïntegratievisie daartoe aanleiding geeft laat het UWV ten behoeve van de verzekerde, bedoeld in
      het eerste lid, een plan gericht op behoud en verkrijging van mogelijkheden tot het verrichten van arbeid en
      inschakeling in arbeid opstellen door een reïntegratiebedrijf. Het reïntegratieplan wordt in samenspraak met de
      verzekerde opgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
  - number: '39.4'
    text: |-
      In het reïntegratieplan worden verplichtingen en rechten van de verzekerde vermeld voorzover die niet in de
      reïntegratievisie zijn vermeld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
  - number: '39.5'
    text: |-
      Indien een reïntegratiebedrijf aan het UWV heeft gemeld dat het gegronde vermoeden bestaat dat een persoon aan wie
      een WGA-uitkering is toegekend onvoldoende medewerking verleent aan de op hem betrekking hebbende werkzaamheden van
      het reïntegratiebedrijf, neemt het UWV een beschikking met betrekking tot de gehele of gedeeltelijke opschorting of
      schorsing van de betaling van de uitkering aan die persoon voor de duur van ten hoogste acht weken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
  - number: '39.6'
    text: |-
      Het UWV stelt het reïntegratiebedrijf in kennis van een beschikking tot opschorting of schorsing als bedoeld in het
      vijfde lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
  - number: '39.7'
    text: |-
      Dit artikel is niet van toepassing indien [artikel 42][ref1] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel39
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '42'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 41a
    text: |-
      In door het UWV vast te stellen gevallen worden reiskosten, verblijfkosten en tijdverlies vergoed van personen
      die door het UWV zijn opgeroepen en van hun begeleiders indien de toestand van de persoon begeleiding noodzakelijk
      maakt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel41a
  - number: '42.1'
    text: |-
      De eigenrisicodrager bevordert ten aanzien van de verzekerde, bedoeld in [artikel 82, eerste lid][ref1], die
      recht heeft op een WGA-uitkering, de inschakeling in de arbeid in zijn bedrijf of in het bedrijf van een andere
      werkgever.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
  - number: '42.2'
    text: |-
      Uit hoofde van de uitoefening van zijn taak, bedoeld in het eerste lid, treft de eigenrisicodrager maatregelen
      gericht op behoud, herstel of bevordering van de mogelijkheid tot het verrichten van arbeid van de verzekerde.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel42
  - number: '42.3'
    text: |-
      De eigenrisicodrager verstrekt aan een re-integratiebedrijf gegevens voor zover deze noodzakelijk zijn voor de
      uitvoering van werkzaamheden, die de eigenrisicodrager in verband met de taak, bedoeld in het eerste lid, aan dat
      re-integratiebedrijf heeft opgedragen, alsmede het burgerservicenummer van de persoon wiens inschakeling in de
      arbeid door dat re-integratiebedrijf wordt bevorderd. Het re-integratiebedrijf verwerkt deze gegevens slechts voor
      zover dat noodzakelijk is voor deze werkzaamheden en gebruikt slechts met dat doel het burgerservicenummer bij
      die verwerking.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel42
  - number: '42.4'
    text: |-
      Indien [artikel 72][ref1] van toepassing is overlegt de eigenrisicodrager met het UWV of met een andere
      eigenrisicodrager, indien de verzekerde meer werkgevers heeft gehad die ook eigenrisicodrager zijn, over de
      uitoefening van de taak, bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel72
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '72'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '42.5'
    text: |-
      De eigenrisicodrager evalueert periodiek het plan van aanpak dat is opgesteld op grond van
      [artikel 25, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
  - number: '42.6'
    text: Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot dit artikel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel42
  - number: '43'
    text: |-
      Voor de toepassing van deze wet en de daarop berustende bepalingen worden de volgende uitsluitingsgronden
      onderscheiden:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel43
  - number: 43.a
    text: 'het recht hebben op een uitkering:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel43
  - number: 43.a.1°
    text: |-
      op grond van [hoofdstuk 6][ref1] of [hoofdstuk 7][ref2] van deze wet; of


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk6
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel43
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '6'
      - id: ref2
        bwb_id: BWBR0019057
        hoofdstuk: '7'
  - number: 43.a.2°
    text: |-
      op grond van [hoofdstuk 3, afdeling 2, paragraaf 1, van de Wet arbeid en zorg][ref1] als gevolg van de toepassing
      van [artikel 3:6, eerste lid, onderdeel b, onder 2° van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel43

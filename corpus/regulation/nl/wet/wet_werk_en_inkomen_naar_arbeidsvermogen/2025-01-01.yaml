  - number: '134'
    text: |-
      De werkgever die niet voldoet aan de verplichting, bedoeld in [artikel 33][ref1], wordt gestraft met hechtenis van
      ten hoogste een maand of geldboete van de tweede categorie.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel33
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel134
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '33'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '136'
    text: |-
      Het in [artikel 134][ref1] bedoelde strafbare feit is een overtreding.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel134
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel136
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '134'
        hoofdstuk: '14'
  - number: '137.1'
    text: |-
      Een overeenkomst met betrekking tot de verzekering van geldelijke gevolgen van langdurige arbeidsongeschiktheid
      waaronder mede wordt verstaan gedeeltelijke arbeidsgeschiktheid, gesloten door de persoon, die verplicht verzekerd
      wordt, vervalt met ingang van de dag, waarop de verzekeraar van de verzekerde mededeling van het verplicht
      verzekerd worden ontvangt, voorzover aan de overeenkomst rechten kunnen worden ontleend, gelijkwaardig aan die,
      welke uit de in deze wet geregelde verplichte verzekering voortvloeien. Bereikt deze mededeling de verzekeraar vóór
      de dag, waarop de betrokkene verplicht verzekerd wordt, dan vervalt de overeenkomst met ingang van die dag.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel137
  - number: '137.2'
    text: |-
      De premie, die de persoon, wiens verzekering op grond van het eerste lid geheel of gedeeltelijk is vervallen, heeft
      vooruitbetaald, wordt door de verzekeraar al naar gelang van het vervallen gedeelte der overeenkomst terugbetaald,
      onder aftrek van ten hoogste 25 procent van het terug te betalen bedrag voor administratiekosten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel137
  - number: '138'
    text: |-
      De [Algemene termijnenwet][ref1] is niet van toepassing op de termijnen, gesteld in de
      [artikelen 10, eerste lid][ref2], [23, derde en vijfde lid][ref3], [49, tweede lid][ref4],
      [60, tweede en derde lid][ref5], [61, zevende lid][ref6], en [74][ref7].


      [ref1]: https://wetten.overheid.nl/BWBR0002448
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel10
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel23
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel49
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel60
      [ref6]: https://wetten.overheid.nl/BWBR0019057#Artikel61
      [ref7]: https://wetten.overheid.nl/BWBR0019057#Artikel74
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel138

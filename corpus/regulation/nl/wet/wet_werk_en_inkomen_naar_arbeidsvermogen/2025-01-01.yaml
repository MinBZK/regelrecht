      grond van [artikel 76a, zesde lid, van de Ziektewet][ref2] of op ziekengeld op grond van
      [artikel 29, tiende lid, van de Ziektewet][ref3], tenzij dit loon of deze bezoldiging uitsluitend wordt genoten uit
      hoofde van een andere dienstbetrekking dan de dienstbetrekking, bedoeld in [artikel 23, tweede lid][ref4];



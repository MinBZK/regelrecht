        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
  - number: 133m.1.a
    text: |-
      op grond van [artikel 38a, negende lid][ref1], of [artikel 38b, tweede lid, van de Ziektewet][ref2] geen
      ziekengeld als bedoeld in [artikel 82, zesde lid][ref3], is of wordt toegekend; en


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel38a
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel38b
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel133m

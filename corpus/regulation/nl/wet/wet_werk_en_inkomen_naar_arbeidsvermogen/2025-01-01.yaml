  - number: '127'
    text: |-
      Voor de verzekerde wiens recht op uitkering ontstaat voor 1 januari 2008, wordt [artikel 59, eerste lid][ref1], als
      volgt gelezen:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel59

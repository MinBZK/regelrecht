  - number: 133m.1.b
    text: |-
      voor het tijdstip van inwerkingtreding van [artikel XXXII, onderdeel E, van de Verzamelwet SZW 2022][ref1]
      bij UWV een aanvraag is gedaan om vast te stellen of de werknemer, aan wie de WGA-
      uitkering is toegekend, uit diezelfde dienstbetrekking recht had op ziekengeld als bedoeld in
      [artikel 29, tweede lid, onderdeel d, e, f of g, van de Ziektewet][ref2] of op ziekengeld als bedoeld in
      artikel 29, tweede lid, onderdelen a, b en c, van de Ziektewet, dat aan de werknemer is toegekend direct
      aansluitend op een dienstbetrekking waarin recht op ziekengeld als bedoeld in artikel 29, tweede lid, onderdeel e,
      f of g, van de Ziektewet bestond.


      [ref1]: https://wetten.overheid.nl/BWBR0046051#ArtikelXXXII
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel133m

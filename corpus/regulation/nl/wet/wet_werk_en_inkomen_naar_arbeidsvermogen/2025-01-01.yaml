  - number: 133l.1
    text: |-
      In afwijking van [artikel 82, eerste lid][ref1], draagt de eigenrisicodrager die uiterlijk op 1 juli 2015
      eigenrisicodrager is geworden tot het moment dat dit eigenrisicodragen is beëindigd of geëindigd overeenkomstig
      [artikel 83][ref2] het risico van de betaling van de WGA-uitkering aan de verzekerde, die op de eerste dag van
      de bij die uitkering in acht genomen wachttijd tot hem in dienstbetrekking stond dan wel arbeidsongeschikt is
      geworden nadat de dienstbetrekking met hem is beëindigd en [artikel 46 van de Ziektewet][ref3] van toepassing
      is, alsmede het risico van betaling van de overlijdensuitkering, bedoeld in [artikel 74, eerste lid][ref4], aan
      de rechthebbende of rechthebbenden, bedoeld in dat lid, ook als die wachttijd is ingegaan voor de dag waarop deze
      werkgever eigenrisicodrager werd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel83
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel46
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel74
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel133l

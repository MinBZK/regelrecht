        artikel: '99'
        hoofdstuk: '11'
  - number: '129'
    text: |-
      De voorziening die op de dag voorafgaand aan de dag waarop [artikel 22][ref1] respectievelijk
      [artikel 31 van de Wet op de (re)integratie arbeidsgehandicapten][ref2] op grond van
      [artikel 2.10 van de Wet Invoering en financiering Wet werk en inkomen naar arbeidsvermogen][ref3]
      vervallen, is toegekend op grond van [artikel 22][ref4] of
      [artikel 31 van de Wet op de (re)integratie arbeidsgehandicapten][ref5], wordt voor de duur van het tijdvak
      waarvoor deze voorziening is toegekend en voorzover die voorziening niet is verstrekt in het kader van de
      inschakeling in de arbeid als zelfstandige, aangemerkt als een voorziening als bedoeld in [artikel 35][ref6].


      [ref1]: https://wetten.overheid.nl/BWBR0009565#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0009565#Artikel31
      [ref3]: https://wetten.overheid.nl/BWBR0019058#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0009565#Artikel22
      [ref5]: https://wetten.overheid.nl/BWBR0009565#Artikel31
      [ref6]: https://wetten.overheid.nl/BWBR0019057#Artikel35

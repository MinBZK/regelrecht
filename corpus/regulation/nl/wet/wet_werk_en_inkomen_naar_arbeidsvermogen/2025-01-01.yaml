    text: |-
      [Artikel 43, onderdeel f][ref1], is niet van toepassing op de persoon op wie dat artikel als gevolg van de
      opzegging van een verdrag, de beëindiging van de voorlopige toepassing van een verdrag dan wel de beëindiging
      van een daarmee gelijk te stellen situatie van toepassing zou worden, zolang deze persoon blijft wonen in
      hetzelfde land als waar hij op de dag voor buitenwerkingtreding als gevolg van die opzegging respectievelijk
      op de dag voor de beëindiging woonde en blijft voldoen aan de overige voorwaarden voor het recht op een
      arbeidsongeschiktheidsuitkering of een WGA-uitkering.



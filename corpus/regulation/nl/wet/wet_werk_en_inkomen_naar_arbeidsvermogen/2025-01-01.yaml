      Bij of krachtens algemene maatregel van bestuur kan worden bepaald dat voor bepaalde categorieën van
      eigenrisicodragers de toepassing van het eerste lid beperkt wordt tot een deel van de WGA-uitkeringen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel133l
  - number: 133m.1
    text: |-
      In afwijking van [artikel 82, zesde lid][ref1], draagt de eigenrisicodrager het risico van betaling van de WGA-
      uitkering aan de verzekerde niet indien:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel133m

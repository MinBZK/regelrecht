        artikel: '47'
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 48.1.c.2°
    text: |-
      de dag dat het recht op grond van [artikel 56][ref1] is geëindigd en voortkomt uit een andere oorzaak dan op grond
      waarvan hij eerder recht had op een WGA-uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel56
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '56'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: '48.2'
    text: |-
      Het recht op een arbeidsongeschiktheidsuitkering ontstaat niet indien een uitsluitingsgrond als bedoeld in
      [artikel 43, onderdeel a, onder 2°, d, e, f of i][ref1] zich voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '48.3'
    text: |-
      Het recht op arbeidsongeschiktheidsuitkering ontstaat alsnog op de dag dat geen van de uitsluitingsgronden als
      bedoeld in [artikel 43, onderdeel a, onder 2°, d, e, f of i][ref1] zich meer voordoet, mits de verzekerde op die
      dag volledig en duurzaam arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '49.1'
    text: 'Het recht op een arbeidsongeschiktheidsuitkering eindigt op de dag dat:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel49
  - number: 49.1.a
    text: de persoon die recht heeft op die uitkering niet meer volledig en duurzaam arbeidsongeschikt is; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel49
  - number: 49.1.b
    text: |-
      er op hem een uitsluitingsgrond als bedoeld in [artikel 43, onderdeel d, e, f, g, h of i][ref1] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel49
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '49.2'
    text: |-
      In afwijking van het eerste lid, onderdeel a, eindigt het recht op een arbeidsongeschiktheidsuitkering van de
      persoon die aansluitend aan het recht op een arbeidsongeschiktheidsuitkering als gevolg van het feit dat hij niet
      gedeeltelijk arbeidsgeschikt is geen recht krijgt op een WGA-uitkering, na twee maanden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel49
  - number: '50.1'
    text: |-
      Indien op grond van [artikel 49][ref1] het recht op een arbeidsongeschiktheidsuitkering is geëindigd, herleeft het
      recht op die uitkering op de dag dat de verzekerde weer volledig en duurzaam arbeidsongeschikt is, indien hij op de
      dag daaraan voorafgaand:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel49
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '49'
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 50.1.a
    text: recht had op een WGA-uitkering;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
  - number: 50.1.b
    text: |-
      minder dan 35% arbeidsongeschikt was en de volledige en duurzame arbeidsongeschiktheid intreedt binnen vijf jaar
      na:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
  - number: 50.1.b.1°
    text: |-
      de in [artikel 49][ref1] bedoelde dag en voortkomt uit dezelfde oorzaak als op grond waarvan hij eerder recht had
      op een arbeidsongeschiktheidsuitkering; of


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel49
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '49'
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 50.1.b.2°
    text: |-
      de dag dat het recht op grond van [artikel 56][ref1] is geëindigd en voortkomt uit dezelfde oorzaak als op grond
      waarvan hij eerder recht had op een WGA-uitkering; of


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel56
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '56'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: 50.1.c
    text: |-
      minder dan 35% arbeidsongeschikt was en de volledige en duurzame arbeidsongeschiktheid intreedt binnen vier weken
      na:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
  - number: 50.1.c.1°
    text: |-
      de in [artikel 49][ref1] bedoelde dag en voortkomt uit een andere oorzaak dan op grond waarvan hij eerder recht had
      op een arbeidsongeschiktheidsuitkering; of


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel49
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '49'
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 50.1.c.2°
    text: |-
      de dag dat het recht op grond van [artikel 56][ref1] is geëindigd en voortkomt uit een andere oorzaak dan op grond
      waarvan hij eerder recht had op een WGA-uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel56
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '56'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: '50.2'
    text: |-
      Het recht op een arbeidsongeschiktheidsuitkering herleeft niet indien een uitsluitingsgrond als bedoeld in
      [artikel 43, onderdeel a, onder 2°, d, e, f of i][ref1] zich voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '50.3'
    text: |-
      Het recht op arbeidsongeschiktheidsuitkering herleeft alsnog op de dag dat geen van de uitsluitingsgronden als
      bedoeld in [artikel 43, onderdeel a, onder 2°, d, e, f of i][ref1] zich meer voordoet, mits de verzekerde op die
      dag volledig en duurzaam arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel50
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '51'
    text: De arbeidsongeschiktheidsuitkering bedraagt per kalendermaand 75% van het maandloon.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel51
  - number: '52.1'
    text: |-
      Op de arbeidsongeschiktheidsuitkering wordt per kalendermaand in mindering gebracht: 0,7 x A x B/C waarbij: - A
      staat voor inkomen per kalendermaand;
        - B staat voor het dagloon waarnaar de arbeidsongeschiktheidsuitkering is berekend;
        - C staat voor het dagloon waarnaar de arbeidsongeschiktheidsuitkering zou zijn berekend indien dat niet
      gemaximeerd zou zijn op het in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1]
      bedoelde bedrag met betrekking tot een loontijdvak van een dag.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel52
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '52.2'
    text: |-
      Indien de volledig en duurzaam arbeidsongeschikte gedurende een aaneengesloten termijn van twaalf kalendermaanden
      per kalendermaand een inkomen verwerft dat meer bedraagt dan 20% van het maatmaninkomen per maand, roept het UWV de
      verzekerde op voor een onderzoek naar het voortbestaan van volledige en duurzame arbeidsongeschiktheid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel52
  - number: '52.3'
    text: |-
      Het tweede lid is niet van toepassing op bij ministeriële regeling te bepalen groepen volledig en duurzaam
      arbeidsongeschikten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel52
  - number: '52.4'
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen als bedoeld in dit artikel wordt verstaan.
      Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer wordt genoten
      als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking wordt genomen
      alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel52
  - number: '53'
    text: |-
      Indien de verzekerde verkeert in een blijvende of voorlopig blijvende toestand van hulpbehoevendheid die
      geregeld oppassing en verzorging nodig maakt, wordt de arbeidsongeschiktheidsuitkering voor de duur van die
      hulpbehoevendheid verhoogd door vermenigvuldiging met ten hoogste een factor 100/75. De eerste zin vindt geen
      toepassing, indien de verzekerde in een inrichting is opgenomen en de kosten van verblijf ten laste van een
      zorgverzekering of een verzekering inzake ziektekosten komen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel53
  - number: '54.1'
    text: 'Recht op een WGA-uitkering ontstaat voor de verzekerde die ziek wordt indien:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
  - number: 54.1.a
    text: hij de wachttijd heeft doorlopen;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
  - number: 54.1.b
    text: hij gedeeltelijk arbeidsgeschikt is; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
  - number: 54.1.c
    text: er op hem geen uitsluitingsgrond van toepassing is.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
  - number: '54.2'
    text: |-
      Het recht op een WGA-uitkering ontstaat niet eerder dan op de eerste dag na afloop van de wachttijd of indien op
      die dag de uitsluitingsgrond, bedoeld in [artikel 43, onderdeel b][ref1], van toepassing is, op de dag dat zich die
      uitsluitingsgrond niet meer voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '54.3'
    text: |-
      De WGA-uitkering bestaat voor de verzekerde die voldoet aan de referte-eis, bedoeld in [artikel 58][ref1] uit een
      loongerelateerde uitkering en na afloop hiervan uit een loonaanvullingsuitkering of een vervolguitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel58
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '58'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: '54.4'
    text: |-
      De WGA-uitkering bestaat voor de verzekerde die niet voldoet aan de referte-eis, bedoeld in [artikel 58][ref1] uit
      een loonaanvullingsuitkering of een vervolguitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel58
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '58'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: '55.1'
    text: |-
      Indien op de dag, bedoeld in [artikel 54, tweede lid][ref1], geen recht op een WGA-uitkering is ontstaan, ontstaat
      het recht op een WGA uitkering op de dag dat de verzekerde gedeeltelijk arbeidsgeschikt is, indien hij op de dag
      daaraan voorafgaand:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel54
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel55
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '54'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: 55.1.a
    text: recht had op een arbeidsongeschiktheidsuitkering;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel55
  - number: 55.1.b
    text: 'minder dan 35% arbeidsongeschikt was en de gedeeltelijke arbeidsgeschiktheid intreedt binnen vijf jaar na:'

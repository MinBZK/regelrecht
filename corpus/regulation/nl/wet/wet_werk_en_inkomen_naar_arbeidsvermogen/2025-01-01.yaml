  - number: '56.1'
    text: 'Het recht op een WGA-uitkering eindigt op de dag dat:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel56
  - number: 56.1.a
    text: de verzekerde niet meer gedeeltelijk arbeidsgeschikt is; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel56
  - number: 56.1.b
    text: |-
      er op hem een uitsluitingsgrond als bedoeld in [artikel 43, onderdeel a, onder 2°, d, e, f, g, h of i][ref1] van
      toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel56
    references:
      - id: ref1

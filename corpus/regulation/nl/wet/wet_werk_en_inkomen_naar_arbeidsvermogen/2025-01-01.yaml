  - number: '58.1'
    text: 'De verzekerde voldoet aan de referte-eis indien:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
  - number: 58.1.a
    text: |-
      hij in 36 kalenderweken onmiddellijk voorafgaande aan de eerste dag na de dag waarop het recht op
      loon op grond van [artikel 629 van Boek 7 van het Burgerlijk Wetboek][ref1] of bezoldiging op grond
      van [hoofdstuk IV, vierde afdeling, van de Ziektewet][ref2] of het recht op ziekengeld op grond van
      [artikel 29 van de Ziektewet][ref3] is geëindigd, in ten minste 26 kalenderweken ten minste één arbeidsuur per
      kalenderweek heeft;


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref2]: https://wetten.overheid.nl/BWBR0001888#AfdelingVierde
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref2
        bwb_id: BWBR0001888
        afdeling: Vierde
      - id: ref3
        bwb_id: BWBR0001888
        artikel: '29'
  - number: 58.1.b
    text: |-
      hij onmiddellijk voorafgaande aan de eerste dag van de wachttijd recht heeft op een uitkering op grond van de
      [Werkloosheidswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004045
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0004045
  - number: 58.1.c
    text: |-
      zijn recht op een uitkering op grond van de [Werkloosheidswet][ref1] is geëindigd wegens het gaan verrichten van
      arbeid in dienstbetrekking en hij op de eerste dag van de wachttijd recht op herleving van die uitkering zou hebben
      gehad, indien hij op die dag geen recht had gekregen op ziekengeld als bedoeld in de [Ziektewet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0001888
  - number: 58.1.d
    text: |-
      hij onmiddellijk voorafgaande aan de eerste dag van de wachttijd wegens werkloosheid niet werkt en wachtgeld
      ontvangt uit hoofde van een dienstbetrekking die is geëindigd voor 1 januari 2001;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
  - number: 58.1.e
    text: |-
      hij onmiddellijk voorafgaande aan de eerste dag van de wachttijd wegens werkloosheid niet werkt en wachtgeld
      ontvangt uit hoofde van een dienstbetrekking die is geëindigd op of na 1 januari 2001 voor zover het recht
      op wachtgeld zich uitstrekt over een periode gelegen na het bereiken van de volledige uitkeringsduur van het,
      in verband met dezelfde werkloosheid ontstane, recht op uitkering op grond van de [Werkloosheidswet][ref1],
      bedoeld in [hoofdstuk II van die wet][ref2], inclusief een eventuele verlenging van die duur op grond van
      [artikel 76 van die wet][ref3]; of


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0004045#HoofdstukII
      [ref3]: https://wetten.overheid.nl/BWBR0004045#Artikel76
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0004045
        hoofdstuk: II
      - id: ref3
        bwb_id: BWBR0004045
        artikel: '76'
  - number: 58.1.f
    text: |-
      het recht op uitkering op grond van de [Werkloosheidwet][ref1] is geëindigd wegens het ontvangen van een uitkering
      op grond van [hoofdstuk 3, afdeling 2, paragraaf 1, van de Wet arbeid en zorg][ref2] en de verzekerde onmiddellijk
      voorafgaande aan de eerste dag van de wachttijd deze laatste uitkering genoot.


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0013008
        paragraaf: '1'
  - number: '58.2'
    text: |-
      Voor de vaststelling van het aantal van 36 kalenderweken als bedoeld in het eerste lid, onderdeel a worden niet in
      aanmerking genomen kalenderweken gedurende welke de verzekerde:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
  - number: 58.2.a
    text: wegens ziekte of arbeidsongeschiktheid geen arbeid kon verrichten;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
  - number: 58.2.b
    text: |-
      werkzaamheden heeft verricht uit hoofde waarvan hij op grond van de [Werkloosheidswet][ref1] niet als werknemer
      wordt beschouwd als bedoeld in [artikel 8 van die wet][ref2] en hij op grond van dat artikel de hoedanigheid van
      werknemer heeft herkregen;


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '8'
  - number: 58.2.c
    text: wegens het genieten van onbetaald verlof geen arbeid heeft verricht, tot een maximum van achttien maanden; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
  - number: 58.2.d
    text: |-
      geen arbeid heeft verricht maar wel recht op uitkering heeft op grond van
      [hoofdstuk 3, afdeling 2, paragraaf 1][ref1], of de [artikelen 4:2b, eerste tot en met zesde lid][ref2], of
      [6:3, eerste tot en met zesde lid, van de Wet arbeid en zorg][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
    references:
      - id: ref1
        bwb_id: BWBR0013008
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '6'
  - number: '58.3'
    text: |-
      Bij algemene maatregel van bestuur kan voor bepaalde groepen werknemers het in het eerste lid bedoelde aantal
      van 36 kalenderweken hoger worden vastgesteld en het in dat lid bedoelde aantal van 26 kalenderweken lager worden
      vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel58
  - number: '59.1'
    text: |-
      De duur van de loongerelateerde uitkering van de WGA-uitkering is ten minste drie maanden en ten hoogste 24
      maanden, te rekenen vanaf de eerste dag waarop het recht op uitkering is ontstaan.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: '59.2'
    text: 'De uitkeringsduur:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: 59.2.a
    text: |-
      is een maand voor ieder kalenderjaar arbeidsverleden voor zover het arbeidsverleden niet langer is dan tien
      kalenderjaren; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: 59.2.b
    text: |-
      wordt voor zover het arbeidsverleden meer is dan tien kalenderjaren verlengd met een halve maand voor ieder
      kalenderjaar arbeidsverleden gelegen na 2015 en met een maand voor ieder kalenderjaar arbeidsverleden voor 2016.
      Bij het berekenen van de uitkeringsduur worden de maanden en de halve maanden bij elkaar opgeteld en wanneer die
      berekening niet leidt tot een aantal gehele maanden, telt een halve maand voor 15 kalenderdagen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: '59.3'
    text: |-
      Indien de duur van het arbeidsverleden gelegen voor 2016 niet louter uitgedrukt wordt in een aantal gehele
      kalenderjaren, wordt het kwart, halve of driekwart kalenderjaar geacht gelegen te zijn na 2015.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: '59.4'
    text: |-
      Als de duur van het arbeidsverleden gelegen na 2015 niet louter uitgedrukt wordt in een aantal gehele
      kalenderjaren, wordt de duur van het arbeidsverleden naar beneden afgerond tot gehele kalenderjaren.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: '59.5'
    text: |-
      De duur van de loongerelateerde uitkering, bedoeld in het eerste lid, wordt indien de verzekerde onmiddellijk
      voorafgaand aan deze loongerelateerde uitkering recht had op een arbeidsongeschiktheidsuitkering, verminderd met de
      duur van de ontvangen arbeidsongeschiktheidsuitkering, doch bedraagt ten minste een jaar.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
  - number: '59.6'
    text: |-
      De duur van de loongerelateerde uitkering, bedoeld in het eerste lid, wordt verminderd met de duur van de ontvangen
      uitkering op grond van de [Werkloosheidswet][ref1] of met de duur van het ontvangen wachtgeld indien de verzekerde,
      onmiddellijk voorafgaand aan de eerste dag van de wachttijd, uitsluitend verzekerd was als gevolg van het van
      toepassing zijn van de in [artikel 58, eerste lid, onderdeel b, c, d, e of f][ref2] bedoelde situaties. De duur
      van de loongerelateerde uitkering, bedoeld in het eerste lid, wordt voorts verminderd met de duur van de ontvangen
      uitkering op grond van de Werkloosheidswet die de verzekerde ontving uit hoofde van dezelfde dienstbetrekking als
      de dienstbetrekking waaruit het recht op een WGA-uitkering is ontstaan.


      [ref1]: https://wetten.overheid.nl/BWBR0004045
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel58
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0004045
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '58'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: '59.7'
    text: |-
      De duur van de loongerelateerde uitkering, bedoeld in het eerste lid, wordt verlengd indien als gevolg van de
      uitsluitingsgrond, bedoeld in [artikel 43, onderdeel a, onder 1°][ref1], geen recht op een uitkering is ontstaan
      indien de eerste dag van de wachttijd van dit niet ontstane recht op een uitkering is gelegen voor de dag dat recht
      op de loongerelateerde uitkering is ontstaan en dit niet ontstane recht op een uitkering tot een langere duur van
      de loongerelateerde uitkering zou hebben geleid.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel59
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '60.1'
    text: |-
      Indien de duur van de loongerelateerde uitkering van de WGA-uitkering is verstreken of als gevolg van
      [artikel 54, vierde lid][ref1], geen aanspraak heeft bestaan op deze uitkering, bestaat de WGA-uitkering uit:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel54
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '54'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: 60.1.a
    text: |-
      een loonaanvullingsuitkering voor de verzekerde die per kalendermaand een inkomen verdient dat ten minste gelijk is
      aan de inkomenseis, bedoeld in het tweede lid of voor wie op grond van het derde lid geen inkomenseis geldt; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
  - number: 60.1.b
    text: een vervolguitkering.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
  - number: '60.2'
    text: |-
      De inkomenseis wordt vastgesteld op de dag dat recht ontstaat op een WGA-uitkering en is voor de verzekerde
      die in staat is met arbeid meer dan 20% te verdienen van het maatmaninkomen per uur, gelijk aan 50% van de
      resterende verdiencapaciteit. De inkomenseis wordt herzien nadat een wijziging in de resterende verdiencapaciteit
      twee kalendermaanden heeft voortgeduurd. De inkomenseis geldt niet meer nadat de verzekerde ten minste twee
      kalendermaanden slechts in staat is geweest om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen per
      uur.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
  - number: '60.3'
    text: |-
      Voor de verzekerde, die op de dag dat recht ontstaat op een WGA-uitkering, of die gedurende tenminste twee
      kalendermaanden slechts in staat is geweest om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen per
      uur, als bedoeld in het tweede lid, geldt geen inkomenseis tot de dag dat zijn resterende verdiencapaciteit hoger
      dan 20% van zijn maatmaninkomen per uur is geweest gedurende een periode van 24 kalendermaanden. Deze periode
      eindigt op het moment dat de verzekerde gedurende ten minste twee kalendermaanden slechts in staat was met arbeid
      ten hoogste 20% te verdienen van het maatmaninkomen per uur.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
  - number: '60.4'
    text: |-
      Onder resterende verdiencapaciteit als bedoeld in het tweede en derde lid wordt verstaan: de op maandbasis
      berekende respectievelijk op uurbasis berekende resterende verdiencapaciteit zoals vastgesteld op grond van
      [artikel 6][ref1] en de daarop berustende bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '6'
        hoofdstuk: '1'
        paragraaf: '1.2'
  - number: '60.5'
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen als bedoeld in dit artikel wordt verstaan.
      Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer wordt genoten
      als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking wordt genomen
      alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel60
  - number: '61.1'
    text: 'De loongerelateerde uitkering van de WGA-uitkering bedraagt per kalendermaand:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.1.a
    text: 0,75 x (A-B x C/D) over de eerste twee maanden waarin het recht op uitkering bestaat; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.1.b
    text: '0,7 x (A-B x C/D) vanaf de derde maand waarin het recht op uitkering bestaat. Hierbij staat:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: '61.2'
    text: |-
      De hoogte van de loonaanvullingsuitkering van de WGA-uitkering komt overeen met de hoogte van de loongerelateerde
      uitkering, bedoeld in het eerste lid, onderdeel b, indien de verzekerde ten minste een inkomen verdient dat gelijk
      is aan zijn overblijvende verdiencapaciteit, bedoeld in het derde lid, of indien voor hem geen inkomenseis als
      bedoeld in [artikel 60][ref1] geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel60
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '60'
        hoofdstuk: '7'
        paragraaf: '7.2'
  - number: '61.3'
    text: |-
      De overblijvende verdiencapaciteit, bedoeld in het tweede lid, is gelijk aan twee maal de inkomenseis, bedoeld in
      [artikel 60, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel60
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '60'
        hoofdstuk: '7'
        paragraaf: '7.2'
  - number: '61.4'
    text: |-
      De loonaanvullingsuitkering van de WGA-uitkering bedraagt voor de verzekerde die een inkomen verdient van ten
      minste 50% van doch minder dan zijn overblijvende verdiencapaciteit, per kalendermaand: 0,7 x (E-F x G/H). Hierbij
      staat: '- E voor het maandloon;'
        - F voor de overblijvende verdiencapaciteit;
        - G voor het dagloon waarnaar de loonaanvullingsuitkering van de WGA-uitkering is berekend;
        - H staat voor het dagloon waarnaar de loonaanvullingsuitkering van de WGA-uitkering zou zijn berekend indien dat
      niet gemaximeerd zou zijn op het in [artikel 17, eerste lid, van de Wet financiering sociale verzekeringen][ref1]
      bedoelde bedrag met betrekking tot een loontijdvak van een dag.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel17
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '17'
  - number: '61.5'
    text: |-
      Indien de hoogte van de uitkering, bedoeld in het vierde lid, per kalendermaand minder bedraagt dan G × H waarbij:
        - G staat voor het uitkeringspercentage, bedoeld in het zesde lid; en
        - H staat voor het minimumloon per maand of het maandloon in het geval het minimumloon per maand hoger is dan het
      maandloon, wordt de hoogte van de uitkering, bedoeld in het vierde lid, vastgesteld op G × H, doch ten hoogste op
      0,7 x (A-B x C/D), als bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: '61.6'
    text: 'Het uitkeringspercentage, bedoeld in het vijfde lid, bedraagt bij een arbeidsongeschiktheid van:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.6.a
    text: 0–35%, 0%
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.6.b
    text: 35–45%, 28%;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.6.c
    text: 45–55%, 35%;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.6.d
    text: 55–65%, 42%;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.6.e
    text: 65–80%, 50,75%; en bij
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.6.f
    text: 80% of meer, 70%.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: '61.7'
    text: |-
      De hoogte van de uitkering, bedoeld in het vijfde lid, wordt eerst nadat een wijziging in de mate van
      arbeidsongeschiktheid ten minste twee kalendermaanden heeft voortgeduurd, herzien.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: '61.8'
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen als bedoeld in dit artikel wordt verstaan.
      Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer wordt genoten
      als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking wordt genomen
      alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: '61.9'
    text: 'De hoogte van de loonaanvullingsuitkering van de WGA-uitkering wordt voor de verzekerde:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.9.a
    text: die na het ontstaan van het recht op uitkering op grond van dit hoofdstuk ziek is geworden, en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
  - number: 61.9.b
    text: |-
      voor wie als gevolg van de toepassing van [artikel 43, onderdeel a, onder 1°][ref1], geen tweede recht op een
      uitkering op grond van dit hoofdstuk ontstaat omdat de eerste dag van de wachttijd is gelegen op een dag dat
      al recht op een uitkering op grond van deze wet bestaat of indien op die eerste dag het recht op een uitkering
      herleeft;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel61
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '62.1'
    text: |-
      De vervolguitkering van de WGA-uitkering bedraagt per kalendermaand: G × H waarbij: - G staat voor het
      uitkeringspercentage, bedoeld in [artikel 61, zesde lid][ref1]; en
        - H staat voor het minimumloon per maand of het maandloon in het geval het minimumloon per maand hoger is dan het
      maandloon. Indien niet over een volledige kalendermaand recht op een uitkering bestaat bedraagt het minimumloon,
      bedoeld in de eerste zin, de uitkomst van het aantal dagen in de desbetreffende kalendermaand waarover recht op een
      uitkering bestaat gedeeld door het totaal aantal dagen in de desbetreffende kalendermaand vermenigvuldigd met het
      minimumloon. Bij het bepalen van het aantal dagen worden de zaterdagen en zondagen buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel61
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '61'
        hoofdstuk: '7'
        paragraaf: '7.2'
  - number: '62.2'
    text: |-
      De vervolguitkering bedraagt voor een verzekerde die woont buiten Nederland, een van de andere lidstaten van de
      Europese Unie, een andere staat die partij is bij de Overeenkomst betreffende de Europese Economische Ruimte en
      Zwitserland, een bij ministeriële regeling vastgesteld percentage van het op grond van het eerste lid vastgestelde
      bedrag. Het percentage wordt zo bepaald dat het een weergave is van de verhouding tussen het kostenniveau van het
      land waar de verzekerde woonachtig is en dat van Nederland. Het percentage bedraagt maximaal 100.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
  - number: '62.3'
    text: |-
      Voor de toepassing van de [Toeslagenwet][ref1] ten aanzien van de verzekerde, bedoeld in het tweede lid, bedraagt
      het minimumloon het op grond van het tweede lid op hem van toepassing zijnde percentage van het minimumloon,
      bedoeld in die wet. Ten aanzien van die verzekerde worden de bedragen, genoemd in de [artikelen 2][ref2] en
      [8 van de Toeslagenwet][ref3], vastgesteld op het in de eerste zin bedoelde percentage van deze bedragen.


      [ref1]: https://wetten.overheid.nl/BWBR0004043
      [ref2]: https://wetten.overheid.nl/BWBR0004043#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0004043#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0004043
      - id: ref2
        bwb_id: BWBR0004043
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0004043
        artikel: '8'
  - number: '62.4'
    text: |-
      [Artikel 61, zevende lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel61
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '61'
        hoofdstuk: '7'
        paragraaf: '7.2'
  - number: '62.5'
    text: 'De hoogte van de vervolguitkering wordt voor de verzekerde:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
  - number: 62.5.a
    text: die na het ontstaan van recht op uitkering op grond van dit hoofdstuk ziek is geworden, en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
  - number: 62.5.b
    text: |-
      voor wie als gevolg van de toepassing van [artikel 43, onderdeel a, onder 1°][ref1], geen tweede recht op een
      uitkering op grond van dit hoofdstuk ontstaat omdat de eerste dag van de wachttijd is gelegen op een dag dat al
      recht op een uitkering op grond van dit hoofdstuk bestaat of indien op die eerste dag het recht op een dergelijke
      uitkering herleeft;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel62
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '63'
    text: |-
      Indien de verzekerde, die slechts in staat is om met arbeid ten hoogste 20% te verdienen van het maatmaninkomen
      per uur, verkeert in een blijvende of voorlopig blijvende toestand van hulpbehoevendheid welke geregeld
      oppassing en verzorging nodig maakt, wordt de WGA-uitkering voor de duur van die hulpbehoevendheid verhoogd door
      vermenigvuldiging met ten hoogste de factor 100/70. Voornoemde factor bedraagt ten hoogste 100/75 gedurende de
      eerste twee maanden van de loongerelateerde uitkering. De eerste zin vindt geen toepassing, indien de verzekerde in
      een inrichting is opgenomen en de kosten van verblijf ten laste van een zorgverzekering of een verzekering inzake
      ziektekosten komen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63
  - number: 63a.1
    text: |-
      De persoon die op 1 juli van het kalenderjaar recht heeft op een arbeidsongeschiktheidsuitkering of een WGA-
      uitkering, heeft recht op een tegemoetkoming.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.2
    text: De persoon, bedoeld in het eerste lid, ontvangt per kalenderjaar een tegemoetkoming van € 219,90.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.3
    text: |-
      Het bedrag, genoemd in het tweede lid, wordt jaarlijks per 1 januari gewijzigd overeenkomstig de
      tabelcorrectiefactor, bedoeld in [artikel 10.2 van de Wet inkomstenbelasting 2001][ref1]. Het gewijzigde bedrag
      wordt door of namens Onze Minister medegedeeld in de Staatscourant.


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Artikel10
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
    references:
      - id: ref1
        bwb_id: BWBR0011353
        artikel: '10'
  - number: 63a.4
    text: |-
      In afwijking van het derde lid kan het bedrag, genoemd in het tweede lid, bij algemene maatregel van bestuur met
      ingang van een bij die maatregel aan te geven datum worden vervangen door een ander bedrag.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.5
    text: Het UWV verstrekt de tegemoetkoming ambtshalve in het derde kwartaal van het kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.6
    text: De tegemoetkoming is niet vatbaar voor beslag.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.7
    text: |-
      De tegemoetkoming blijft buiten beschouwing bij de verlening van op het inkomen of vermogen afgestemde
      publiekrechtelijke uitkeringen en verstrekkingen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.8
    text: |-
      De tegemoetkoming is niet vatbaar voor terugvordering of verrekening met openstaande vorderingen of uitbetalingen
      in verband met een uitkering op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.9
    text: |-
      De tegemoetkoming wordt slecht één keer uitgekeerd in het geval er tevens aanspraak gemaakt kan worden op de
      tegemoetkoming op grond van [artikelen 65l van de Wet op de arbeidsongeschiktheidsverzekering](onbekend), [67i van
      de Wet arbeidsongeschiktheidsverzekering zelfstandigen](onbekend) of [3:75 van de Wet werk en arbeidsondersteuning
      jonggehandicapten](onbekend).
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: 63a.10
    text: De tegemoetkoming en de daarmee gepaard gaande beheerskosten komen ten laste van het Rijk.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel63a
  - number: '64.1'
    text: |-
      Het UWV stelt op aanvraag vast of recht op een uitkering op grond van [artikel 47][ref1] of [artikel 54][ref2]
      ontstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel47
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel54
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '47'
        hoofdstuk: '6'
        paragraaf: '6.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '54'
        hoofdstuk: '7'
        paragraaf: '7.1'
  - number: '64.2'
    text: |-
      Het UWV stelt de verzekerde van de mogelijkheid van het doen van een aanvraag schriftelijk in kennis uiterlijk op
      de dag waarop de wachttijd 89 weken heeft geduurd. Indien [artikel 24, derde lid][ref1], van toepassing is doet het
      UWV deze kennisgeving bij de bekendmaking van de in dat artikellid bedoelde beschikking. Het UWV verstrekt aan de
      werkgever een afschrift van de kennisgeving bedoeld in de eerste en tweede zin.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
  - number: '64.3'
    text: |-
      De verzekerde doet zijn aanvraag uiterlijk elf weken voor afloop van de wachttijd of indien toepassing is gegeven
      aan [artikel 24, derde lid][ref1], elf weken voor afloop van het in dat lid bedoelde verlengde tijdvak.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
  - number: '64.4'
    text: |-
      Indien het UWV de in het eerste lid bedoelde aanvraag afwijst omdat een uitsluitingsgrond als bedoeld in
      [artikel 43, onderdeel d, e, f of i][ref1], van toepassing is maakt het UWV melding van de mogelijkheid tot het
      doen van een nieuwe aanvraag alsmede van de termijn waarbinnen een nieuwe aanvraag dient te worden gedaan.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '64.5'
    text: |-
      Indien het vierde lid van toepassing is doet de verzekerde zijn nieuwe aanvraag binnen de op grond van dat lid door
      het UWV aangegeven termijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: '64.6'
    text: |-
      Een aanvraag wordt geacht tijdig te zijn ingediend indien het UWV de kennisgeving als bedoeld in het tweede
      lid niet heeft gedaan dan wel indien bij een latere kennisgeving dan bedoeld in het tweede lid of vierde lid de
      aanvraag wordt ingediend binnen vier weken nadat deze kennisgeving is ontvangen. Dit lid is niet van toepassing
      indien de werkgever de aangifte, bedoeld in [artikel 38, eerste lid, van de Ziektewet][ref1], niet heeft gedaan
      voor de dag waarop de wachttijd 81 weken heeft geduurd.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel38
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '38'
  - number: '64.7'
    text: |-
      Indien het UWV toepassing geeft aan [artikel 25, negende lid][ref1], of [artikel 26, tweede lid, tweede zin][ref2],
      wordt de behandeling van de aanvraag opgeschort.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel26
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '26'
        hoofdstuk: '3'
  - number: '64.8'
    text: 'Het UWV hervat de behandeling van de aanvraag in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: 64.8.a
    text: |-
      indien het UWV heeft vastgesteld dat de tekortkoming, bedoeld in [artikel 25, negende lid][ref1], of
      [artikel 26, tweede lid][ref2], is hersteld;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel26
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '26'
        hoofdstuk: '3'
  - number: 64.8.b
    text: op verzoek van de werknemer in verband met de beëindiging van zijn dienstbetrekking; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: 64.8.c
    text: |-
      tenminste zes weken voordat het tijdvak, bedoeld in [artikel 25, negende lid][ref1], of
      [artikel 26, tweede lid][ref2], van 52 weken is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel26
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '26'
        hoofdstuk: '3'
  - number: '64.9'
    text: |-
      [Artikel 25, vijftiende lid][ref1], is van overeenkomstige toepassing op de situatie, bedoeld in het achtste lid,
      onderdelen b en c.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
  - number: '64.10'
    text: |-
      Indien de toepassing van het eerste lid zou leiden tot kennelijke hardheid, is het UWV bevoegd het recht op een
      uitkering op grond van deze wet ambtshalve vast te stellen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: '64.11'
    text: |-
      Het recht op een uitkering op grond van deze wet kan niet worden vastgesteld over perioden gelegen voor 52 weken
      voorafgaand aan de dag waarop de aanvraag om een uitkering werd ingediend. Het UWV kan voor bijzondere gevallen van
      de eerste zin afwijken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: '64.12'
    text: |-
      Het elfde lid is van overeenkomstige toepassing indien het recht op uitkering op grond van deze wet later ontstaat
      dan wel herleeft of indien de uitkering op grond van deze wet wordt verhoogd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: '64.13'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de gegevens die door de verzekerde bij de
      aanvraag worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel64
  - number: '65'
    text: |-
      De aanvraag voor een uitkering op grond van deze wet gaat vergezeld van een reïntegratieverslag als bedoeld in
      [artikel 25, derde lid][ref1]. De eerste zin is niet van toepassing voorzover [artikel 26, eerste lid][ref2],
      toepassing vindt. Het UWV beoordeelt of de werkgever en de verzekerde dan wel de eigenrisicodrager,
      bedoeld in [artikel 1, eerste lid, onderdeel h, van de Ziektewet][ref3] en de personen, bedoeld in
      [artikel 29, tweede lid, onderdelen a, b en c, van die wet][ref4], die laatstelijk tot hem in dienstbetrekking
      stonden in redelijkheid hebben kunnen komen tot de reïntegratie-inspanningen, die zijn verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel26
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel1
      [ref4]: https://wetten.overheid.nl/BWBR0001888#Artikel29
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel65
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '26'
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0001888
        artikel: '1'
      - id: ref4
        bwb_id: BWBR0001888
        artikel: '29'
  - number: '66.1'
    text: |-
      Een aanvraag voor een verkorte wachttijd als bedoeld in [artikel 23, zesde lid][ref1], wordt tevens aangemerkt als
      aanvraag, bedoeld in [artikel 64, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel64
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '23'
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '66.2'
    text: Een aanvraag voor een verkorte wachttijd kan slechts eenmaal worden gedaan.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
  - number: '66.3'
    text: |-
      Op verzoek van de werknemer verstrekt de persoon, bedoeld in
      [artikel 14, eerste lid, van de Arbeidsomstandighedenwet][ref1], die belast is met de bijstand, bedoeld in artikel
      14, eerste lid, onderdeel b, van die wet, een verklaring waaruit de medische situatie alsmede de vooruitzichten van
      de werknemer blijken. De verklaring wordt mede opgesteld op basis van gegevens inzake de medische specialistische
      onderzoeken of behandelingen die de aanvrager heeft ondergaan, tenzij in redelijkheid niet van de bedrijfsarts kan
      worden gevergd dat hij deze gegevens aan zijn verklaring ten grondslag legt.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel14
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '14'
  - number: '66.4'
    text: Een aanvraag voor een verkorte wachttijd gaat vergezeld van de verklaring, bedoeld in het derde lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
  - number: '66.5'
    text: |-
      Indien de aanvraag voor een verkorte wachttijd niet vergezeld gaat van een verklaring als bedoeld in het derde lid,
      wordt de aanvraag niet in behandeling genomen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
  - number: '66.6'
    text: |-
      [Artikel 65][ref1] is niet van toepassing op een aanvraag voor een verkorte wachttijd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel65
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '65'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '66.7'
    text: |-
      Het derde, vierde en vijfde lid zijn niet van toepassing op de verzekerde aan wie ziekengeld als bedoeld in
      [artikel 29, tweede lid, van de Ziektewet][ref1] wordt uitgekeerd en die geen recht heeft op loon op grond van
      [artikel 629 van Boek 7 van het Burgerlijk Wetboek][ref2] of op bezoldiging of hetgeen daarmee overeenkomt als
      bedoeld in [artikel 76a van de Ziektewet][ref3], tenzij de verzekerde laatstelijk in dienstbetrekking stond tot een
      eigenrisicodrager, bedoeld in [artikel 1, eerste lid, onderdeel h, van de Ziektewet][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0005290#Artikel629
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel76a
      [ref4]: https://wetten.overheid.nl/BWBR0001888#Artikel1
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel66
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0005290
        artikel: '629'
      - id: ref3
        bwb_id: BWBR0001888
        artikel: 76a
      - id: ref4
        bwb_id: BWBR0001888
        artikel: '1'
  - number: '67.1'
    text: |-
      Het UWV betaalt de uitkering waarop op grond van deze wet recht bestaat. De betaling geschiedt in termijnen van
      een kalendermaand.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: '67.2'
    text: |-
      Het UWV schort de betaling van de uitkering op of schorst de betaling, indien het op grond van duidelijke
      aanwijzingen van oordeel is of het gegronde vermoeden heeft dat:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: 67.2.a
    text: het recht op uitkering niet of niet meer bestaat;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: 67.2.b
    text: recht op een lagere uitkering bestaat;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: 67.2.c
    text: |-
      de persoon, die recht heeft op een uitkering of zijn wettelijke vertegenwoordiger een verplichting als bedoeld in
      [artikel 27][ref1], [28][ref2], [29][ref3] of [30][ref4] of een instelling als bedoeld in [artikel 71][ref5] een
      verplichting als bedoeld in [artikel 27][ref6], niet of niet behoorlijk is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel30
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel71
      [ref6]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '71'
        hoofdstuk: '8'
        paragraaf: '8.2'
      - id: ref6
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '67.3'
    text: |-
      Indien de uitkering, bedoeld in het eerste lid, in het buitenland wordt uitbetaald, geschiedt de betaling in
      afwijking van [artikel 4:89, derde lid, van de Algemene wet bestuursrecht][ref1] op het tijdstip waarop de rekening
      van de daartoe door de schuldeiser aangewezen bank wordt gecrediteerd.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: '67.4'
    text: |-
      Wanneer de persoon, die recht heeft op een uitkering op grond van deze wet, een ander machtigt om de uitkering in
      ontvangst te nemen, onderscheidenlijk een verleende machtiging intrekt, wordt daaraan gevolg gegeven met ingang van
      een betalingstermijn, aanvangende na de dag waarop de machtiging wordt ingediend, onderscheidenlijk waarop van haar
      intrekking mededeling wordt gedaan, doch niet later dan de eerste dag van de tweede maand na de dag van indiening
      onderscheidenlijk intrekking van die machtiging.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: '67.5'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld inzake de betaalbaarstelling van de uitkeringen op grond van
      deze wet door organen die belast zijn met de uitbetaling van invaliditeitsuitkering of pensioen uit andere hoofde
      dan op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: '67.6'
    text: |-
      Het UWV kan onder door hem te stellen voorwaarden, op verzoek van de in het vijfde lid bedoelde organen,
      gelijktijdig met een uitkering op grond van deze wet, invaliditeitsuitkeringen of pensioenen verschuldigd door die
      organen, betaalbaar stellen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel67
  - number: '68.1'
    text: |-
      In afwijking van [artikel 67, eerste lid][ref1], betaalt het UWV een gedeelte van de uitkering waarop op grond
      van deze wet recht bestaat als vakantiebijslag jaarlijks in de maand mei over de aan die maand voorafgaande
      kalendermaanden, of, indien het recht op uitkering eerder dan in de maand mei geheel eindigt, in de desbetreffende
      kalendermaand. De vakantiebijslag bedraagt 8/108 van de uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel67
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel68
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '67'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '68.2'
    text: |-
      Indien het percentage van de vakantiebijslag, bedoeld in
      [artikel 15, eerste lid, van de Wet minimumloon en minimumvakantiebijslag][ref1], wordt gewijzigd, wijzigt de in
      het eerste lid genoemde breuk dienovereenkomstig. Het gewijzigde percentage wordt in aanmerking genomen over de
      uitkering waarop op grond van deze wet recht bestaat vanaf de dag waarop de wijziging ingaat.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel15
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel68
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '15'
  - number: '68.3'
    text: De vakantiebijslag wordt betaald zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel68
  - number: '68.4'
    text: Bij ministeriële regeling kunnen met betrekking tot het eerste lid nadere regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel68
  - number: '68.5'
    text: |-
      Indien na de uitbetaling van de vakantiebijslag in een andere maand dan de maand mei wederom recht op een uitkering
      ontstaat en dientengevolge het eerste lid moet worden toegepast, wordt daarbij rekening gehouden met hetgeen in die
      andere maand reeds werd uitbetaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel68
  - number: '69.1'
    text: |-
      Het UWV schort de betaling van een uitkering op grond van deze wet op indien de persoon die recht heeft
      op die uitkering een vreemdeling is die niet rechtmatig in Nederland verblijf houdt als bedoeld in
      [artikel 8 van de Vreemdelingenwet 2000][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel69
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: '69.2'
    text: |-
      De betaling van de uitkering op grond van deze wet wordt hervat indien de betrokkene daartoe een aanvraag indient
      en het UWV is gebleken dat hij feitelijk buiten Nederland woont of verblijf houdt en aan de overige voorwaarden
      voor het recht op uitkering voldoet.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel69
  - number: 69a.1
    text: |-
      Is van de aanvrager of ontvanger van een uitkering bij het UWV een adres in Nederland bekend, terwijl in de
      basisregistratie personen ambtshalve is opgenomen dat hij is vertrokken naar een onbekend land van verblijf,
      dan verzoekt het UWV hem de afwijkende registratie in de basisregistratie personen binnen een redelijke termijn
      ongedaan te laten maken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel69a
  - number: 69a.2
    text: |-
      Wanneer na afloop van deze termijn de afwijkende registratie niet is beëindigd of als uit de basisregistratie
      personen niet blijkt dat het college van burgemeester en wethouders van de desbetreffende gemeente de gegevens
      over het adres in onderzoek heeft genomen, schort het UWV de betaling van de uitkering aan de persoon, aan wie de
      uitkering is toegekend, op.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel69a
  - number: 69a.3
    text: |-
      De opschorting wordt beëindigd zodra is vastgesteld dat de persoon, bedoeld in het tweede lid, in het buitenland
      woont of verblijft of dat een adres in Nederland in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel69a
  - number: 69a.4
    text: |-
      Indien het onderzoek van het college van burgemeester en wethouders is afgerond en de persoon, bedoeld in
      het tweede lid, in de basisregistratie personen ambtshalve opgenomen blijft met gegevens over het vertrek uit
      Nederland, schort het UWV de betaling van de uitkering op tot verblijf in het buitenland kan worden vastgesteld of
      een adres in Nederland in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel69a
  - number: '70'
    text: |-
      Voorzover het betreft het in ontvangst nemen van een uitkering op grond van deze wet en het verlenen van kwijting
      voor de betaling daarvan, wordt een minderjarige met een meerderjarige gelijkgesteld. Indien de wettelijke
      vertegenwoordiger zich tegen de betaling aan de minderjarige schriftelijk verzet bij het UWV geschiedt de
      uitbetaling aan de wettelijke vertegenwoordiger.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel70
  - number: '71.1'
    text: |-
      Indien de persoon aan wie een uitkering op grond van deze wet is toegekend, aanspraak heeft op verstrekking of
      vergoeding van zorg als bedoeld in de [Wet langdurige zorg][ref1] en op grond van die wet een bijdrage voor die
      zorg verschuldigd is, is het UWV bevoegd de uitkering tot het bedrag van die bijdrage in plaats van aan degene aan
      wie de uitkering is toegekend, zonder diens machtiging uit te betalen aan het Zorginstituut Nederland, genoemd in
      [artikel 58, eerste lid, van de Zorgverzekeringswet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0035917
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel58
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel71
    references:
      - id: ref1
        bwb_id: BWBR0035917
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '58'
  - number: '71.2'
    text: |-
      Indien aan de persoon aan wie een uitkering op grond van deze wet is toegekend, een
      maatwerkvoorziening of persoonsgebonden budget wordt verstrekt voor beschermd wonen als bedoeld in
      [artikel 1.1.1 van de Wet maatschappelijke ondersteuning 2015][ref1], en hij op grond van die [wet][ref2] hiervoor
      een bijdrage is verschuldigd, is het UWV bevoegd de uitkering tot het bedrag van die bijdrage in plaats van aan
      de persoon, aan wie die uitkering is toegekend, zonder diens machtiging uit te betalen aan het CAK, genoemd in
      [artikel 6.1.1, eerste lid, van de Wet langdurige zorg][ref3], dat voor de gemeente de bijdrage int.


      [ref1]: https://wetten.overheid.nl/BWBR0035362#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0035362
      [ref3]: https://wetten.overheid.nl/BWBR0035917#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel71
    references:
      - id: ref1
        bwb_id: BWBR0035362
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0035362
      - id: ref3
        bwb_id: BWBR0035917
        artikel: '6'
  - number: '71.3'
    text: |-
      Indien de persoon die recht heeft op een uitkering op grond van deze wet in een inrichting ter verpleging van
      geesteszieken of van zwakzinnigen is opgenomen en het UWV, van de desbetreffende inrichting of van het college
      van burgemeester en wethouders van de gemeente die de opnamekosten betaalt, het verzoek ontvangt om de uitkering
      aan die inrichting of die gemeente uit te betalen, is het UWV bevoegd dat verzoek zonder het stellen van andere
      voorwaarden in te willigen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel71
  - number: '71.4'
    text: |-
      Indien het eerste of tweede lid toepassing vindt, heeft de in het derde lid bedoelde bevoegdheid betrekking op het
      gedeelte van de uitkering dat niet aan de in het eerste of tweede lid genoemde instantie wordt uitbetaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel71
  - number: '71.5'
    text: |-
      Een herziening van de uitkering op grond van het eerste of tweede lid als gevolg van een wijziging van de
      verschuldigde bijdrage vindt plaats zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel71
  - number: '72.1'
    text: |-
      Indien de persoon die recht heeft op een uitkering op grond van deze wet bij aanvang van de wachttijd meer dan een
      werkgever heeft, wordt de uitkering betaald door het UWV, ook indien een of meer werkgevers eigenrisicodrager zijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel72
  - number: '72.2'
    text: |-
      In de situatie, bedoeld in het eerste lid, verhaalt het UWV op de eigenrisicodrager, naar rato van de loonsom
      de door hem verschuldigde uitkering op grond van deze wet, alsmede de op grond van enige wet over deze uitkering
      verschuldigde premies die niet op deze uitkering in mindering kunnen worden gebracht en de verschuldigde
      inkomensafhankelijke bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref1], over deze uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel72
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '42'
  - number: '72.3'
    text: |-
      De uitkering op grond van deze wet wordt niet verhaald op de eigenrisicodrager, indien de persoon die recht heeft
      op die uitkering met behoud van hetzelfde loon bij die werkgever arbeid is blijven verrichten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel72
  - number: '72.4'
    text: Het UWV kan de in het tweede lid bedoelde bedragen invorderen bij dwangbevel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel72
  - number: '73.1'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld ter voorkoming of beperking van samenloop van een
      uitkering op grond van deze wet met een uitkering in verband met volledig en duurzame arbeidsongeschiktheid of
      gedeeltelijke arbeidsgeschiktheid op grond van andere wetten.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel73
  - number: '73.2'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld ter voorkoming of beperking van samenloop van
      uitkering op grond van deze wet met uitkering op grond van de sociale wetgeving van Aruba, Curaçao, Sint Maarten,
      de sociale wetgeving van Nederland ten behoeve van de openbare lichamen Bonaire, Sint Eustatius en Saba of van een
      andere Mogendheid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel73
  - number: '74.1'
    text: |-
      Na het overlijden van de persoon, die recht had op een uitkering op grond van deze wet, wordt met ingang van de dag
      na het overlijden een overlijdensuitkering uitbetaald:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: 74.1.a
    text: aan de langstlevende van de echtgenoten;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: 74.1.b
    text: |-
      bij ontstentenis van de in onderdeel a bedoelde persoon, aan de minderjarige kinderen tot wie de overledene in
      familierechtelijke betrekking stond;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: 74.1.c
    text: |-
      bij ontstentenis van de in de onderdelen a en b bedoelde personen, aan de persoon met wie de overledene in
      gezinsverband leefde.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: '74.2'
    text: |-
      De overlijdensuitkering is gelijk aan het bedrag van de uitkering op grond van deze wet over één kalendermaand,
      berekend naar de hoogte van die uitkering op de dag of laatstelijk voor de dag van overlijden van de persoon.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: '74.3'
    text: |-
      In verband met het overlijden van de persoon die recht had op een uitkering op grond van deze wet, is
      [artikel 43, onderdeel g][ref1], niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '74.4'
    text: |-
      De overlijdensuitkering wordt ambtshalve of op verzoek aan de rechthebbende of rechthebbenden genoemd in het eerste
      lid door het UWV uitbetaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: '74.5'
    text: De overlijdensuitkering wordt in een bedrag ineens uitbetaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: '74.6'
    text: |-
      Het bedrag van de overlijdensuitkering wordt verminderd met het bedrag aan uitkering op grond van deze wet dat,
      over na het overlijden gelegen dagen reeds is uitbetaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel74
  - number: '75'
    text: |-
      Uitkeringen op grond van deze wet die niet in ontvangst zijn genomen of zijn ingevorderd binnen twee jaar na de dag
      van betaalbaarstelling worden door het UWV niet meer betaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel75
  - number: '76.1'
    text: 'Het UWV herziet beschikkingen op grond van deze wet of trekt dergelijke beschikkingen in, indien:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel76
  - number: 76.1.a
    text: |-
      als gevolg van het niet of niet volledig nakomen van de [artikelen 27 tot en met 32][ref1] en de daarop berustende
      bepalingen het recht op een uitkering op grond van deze wet niet of niet meer kan worden vastgesteld of ten
      onrechte is vastgesteld of de hoogte van de uitkering ten onrechte op een te hoog bedrag is vastgesteld;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel76
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: 76.1.b
    text: |-
      de verstrekking van een voorziening als bedoeld in [artikel 34a, eerste lid][ref1], of [35][ref2] ten onrechte of
      tot een te hoog bedrag is verleend;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel34a
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel35
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel76
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 34a
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 76.1.c
    text: anderszins de uitkering ten onrechte of tot een te hoog bedrag is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel76
  - number: '76.2'
    text: |-
      Indien een voorziening als bedoeld in [artikel 34a, eerste lid][ref1], of [36][ref2] in
      de vorm van een subsidie wordt verstrekt, wijzigt of trekt het UWV de beschikking tot
      vaststelling van de subsidie in, indien sprake is van een omstandigheid als bedoeld in
      [artikel 4:49, eerste lid, onderdeel a, b of c, van de Algemene wet bestuursrecht][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel34a
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel36
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel76
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 34a
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '36'
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref3
        bwb_id: BWBR0005537
        artikel: '4'
  - number: '76.3'
    text: Indien daarvoor dringende redenen zijn, kan het UWV geheel of gedeeltelijk van herziening of intrekking afzien.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel76
  - number: '77.1'
    text: |-
      Een uitkering die op grond van deze wet alsmede hetgeen anderszins onverschuldigd is betaald en hetgeen als gevolg
      van een beschikking als bedoeld in [artikel 76][ref1] door het UWV onverschuldigd is betaald of verstrekt wordt
      door het UWV teruggevorderd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel76
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '76'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '77.2'
    text: |-
      De uitkering die onverschuldigd aan de werkgever is betaald, wordt door het UWV
      van de werkgever teruggevorderd, indien de werkgever de uitkering op grond van
      [artikel 629, vijfde lid, van Boek 7 van het Burgerlijk Wetboek][ref1] in mindering heeft kunnen brengen op het
      loon.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel629
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '629'
  - number: '77.3'
    text: |-
      In afwijking van het eerste lid kan het UWV besluiten van terugvordering of van verdere terugvordering af te zien,
      indien degene van wie wordt teruggevorderd:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: 77.3.a
    text: gedurende vijf jaar volledig aan zijn betalingsverplichtingen heeft voldaan;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: 77.3.b
    text: |-
      gedurende vijf jaar niet volledig aan zijn betalingsverplichtingen heeft voldaan, maar het achterstallige bedrag
      over die periode, vermeerderd met de daarover verschuldigde wettelijke rente en de op de invordering betrekking
      hebbende kosten, alsnog heeft betaald;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: 77.3.c
    text: |-
      gedurende vijf jaar geen betalingen heeft verricht en niet aannemelijk is dat hij deze op enig moment zal gaan
      verrichten; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: 77.3.d
    text: een bedrag, overeenkomend met ten minste 50% van de restsom in één keer aflost.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: '77.4'
    text: |-
      De in het derde lid, onderdelen a, b en c, genoemde termijn is tien jaar indien de terugvordering het gevolg is van
      het niet of niet behoorlijk nakomen van de verplichting, bedoeld in [artikel 27, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '77.5'
    text: 'De in het derde lid, onderdelen a en b, genoemde termijn is drie jaar indien:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: 77.5.a
    text: |-
      het gemiddeld inkomen van degene van wie wordt teruggevorderd in die periode de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1] niet te boven is gegaan; en


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 77.5.b
    text: |-
      de terugvordering niet het gevolg is van het niet of niet behoorlijk nakomen van de verplichting, bedoeld in
      [artikel 27, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '77.6'
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn kan het UWV besluiten geheel of gedeeltelijk van terugvordering af
      te zien.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: '77.7'
    text: |-
      Degene van wie wordt teruggevorderd is verplicht desgevraagd aan het UWV de inlichtingen te verstrekken die voor de
      terugvordering van belang zijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: '77.8'
    text: |-
      In afwijking van het eerste lid kan het UWV, onder bij ministeriële regeling te stellen voorwaarden, besluiten van
      terugvordering af te zien indien het terug te vorderen bedrag een bij ministeriële regeling vast te stellen bedrag
      niet te boven gaat.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel77
  - number: '78.1'
    text: |-
      Het UWV kan de onverschuldigd betaalde uitkering, bedoeld in [artikel 77, eerste en tweede lid][ref1], invorderen
      bij dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel77
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel78
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '77'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '78.2'
    text: |-
      [Artikel 96][ref1] is van overeenkomstige toepassing, met dien verstande dat indien het
      gemiddeld inkomen van de persoon gedurende drie jaar de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref2] niet te boven is gegaan, het
      UWV de aflossingsbedragen lager vaststelt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel96
      [ref2]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel78
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '96'
        hoofdstuk: '10'
      - id: ref2
        bwb_id: BWBR0001827
        artikel: 475c
  - number: '79'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij is vastgesteld dat onverschuldigd is betaald.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79
  - number: 79a.1
    text: |-
      In afwijking van [artikel 77, eerste lid][ref1], kan het Uitvoeringsinstituut werknemersverzekeringen, op verzoek
      van degene van wie wordt teruggevorderd, besluiten gedeeltelijk van terugvordering of gedeeltelijk van verdere
      terugvordering af te zien bij medewerking aan een schuldregeling, indien:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel77
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '77'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: 79a.1.a
    text: |-
      redelijkerwijs te voorzien is dat degene van wie wordt teruggevorderd niet zal kunnen voortgaan met het betalen van
      zijn schulden of indien hij in de toestand verkeert dat hij heeft opgehouden te betalen;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.1.b
    text: |-
      redelijkerwijs te voorzien is dat een schuldregeling met betrekking tot alle vorderingen, behoudens de in het
      tweede lid bedoelde vorderingen, van de overige schuldeisers zonder een zodanig besluit niet tot stand zal komen;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.1.c
    text: |-
      een naar het oordeel van het Uitvoeringsinstituut werknemersverzekeringen betrouwbaar voorstel voor
      een schuldregeling tot stand is gekomen door tussenkomst van een schuldhulpverlener als bedoeld in
      [artikel 48 van de Wet op het consumentenkrediet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004815#Artikel48
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
    references:
      - id: ref1
        bwb_id: BWBR0004815
        artikel: '48'
  - number: 79a.1.d
    text: aannemelijk is dat medewerking aan een schuldregeling niet concurrentieverstorend werkt; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.1.e
    text: |-
      uitdeling in het kader van de schuldregeling plaatsvindt overeenkomstig
      [artikel 349 van de Faillissementswet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001860#Artikel349
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
    references:
      - id: ref1
        bwb_id: BWBR0001860
        artikel: '349'
  - number: 79a.2
    text: |-
      Het eerste lid is niet van toepassing indien een vordering is ontstaan door het opzettelijk of door grove schuld
      niet nakomen door degene van wie wordt teruggevorderd van de verplichting, bedoeld in [artikel 27][ref1], en
      hiervoor een boete als bedoeld in [artikel 91][ref2] is opgelegd, dan wel met betrekking tot het niet naleven van
      die verplichting aangifte is gedaan op grond van het [Wetboek van Strafrecht][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel91
      [ref3]: https://wetten.overheid.nl/BWBR0001854
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '91'
        hoofdstuk: '10'
      - id: ref3
        bwb_id: BWBR0001854
  - number: 79a.3
    text: |-
      Het besluit tot het afzien van terugvordering of van verdere terugvordering wordt ingetrokken of ten nadele van
      degene van wie wordt teruggevorderd gewijzigd indien:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.3.a
    text: |-
      niet binnen twaalf maanden nadat dat besluit is bekendgemaakt, een schuldregeling tot stand is gekomen die voldoet
      aan de eisen, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.3.b
    text: |-
      degene van wie wordt teruggevorderd zijn schuld aan het Uitvoeringsinstituut werknemersverzekeringen niet
      overeenkomstig de schuldregeling voldoet; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.3.c
    text: |-
      onjuiste of onvolledige gegevens zijn verstrekt en de verstrekking van juiste of volledige gegevens tot een ander
      besluit zou hebben geleid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79a.4
    text: |-
      Bij ministeriële regeling kunnen met betrekking tot dit artikel nadere regels worden gesteld ten aanzien van de
      bevoegdheid om mee te werken aan schuldregelingen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79a
  - number: 79b
    text: |-
      Een vordering van het Uitvoeringsinstituut werknemersverzekeringen, als bedoeld in
      [artikel 77][ref1] en [79a][ref2] is bevoorrecht en volgt onmiddellijk na de vorderingen, bedoeld in
      [artikel 288 van Boek 3 van het Burgerlijk Wetboek][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel77
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel79a
      [ref3]: https://wetten.overheid.nl/BWBR0005291#Artikel288
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel79b
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '77'
        hoofdstuk: '8'
        paragraaf: '8.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: 79a
        hoofdstuk: '8'
        paragraaf: '8.2'
      - id: ref3
        bwb_id: BWBR0005291
        artikel: '288'
  - number: '80.1'
    text: |-
      Een uitkering op grond van deze wet en een voorziening als bedoeld in [artikel 34a, eerste lid][ref1], of
      [artikel 35][ref2] zijn onvervreemdbaar en niet vatbaar voor verpanding of belening.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel34a
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel35
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel80
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 34a
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '80.2'
    text: |-
      Volmacht tot ontvangst van een uitkering op grond van deze wet onder welke vorm of benaming ook verleend, is steeds
      herroepelijk.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel80
  - number: '80.3'
    text: Elk beding, strijdig met dit artikel, is nietig.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel80
  - number: '81'
    text: |-
      De voorzieningen, bedoeld in de [artikelen 34a, eerste lid][ref1], en [35][ref2], de verhoging, bedoeld in de
      [artikelen 53][ref3] en [63][ref4], alsmede de overlijdensuitkering, bedoeld in [artikel 74][ref5], zijn niet
      vatbaar voor beslag.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel34a
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel35
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel53
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel63
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel74
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel81
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 34a
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '53'
        hoofdstuk: '6'
        paragraaf: '6.2'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '63'
        hoofdstuk: '7'
        paragraaf: '7.2'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '74'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '82.1'
    text: |-
      De eigenrisicodrager draagt met inachtneming van [artikel 83][ref1] het risico van betaling van de WGA-
      uitkering aan de verzekerde, die op de eerste dag van de bij die uitkering in acht genomen wachttijd tot
      hem in dienstbetrekking stond dan wel arbeidsongeschikt is geworden nadat de dienstbetrekking met hem is
      beëindigd en [artikel 46 van de Ziektewet][ref2] van toepassing is, alsmede het risico van betaling van de
      overlijdensuitkering, bedoeld in [artikel 74, eerste lid][ref3], aan de rechthebbende of rechthebbenden, bedoeld
      in dat lid, indien die wachttijd is ingegaan op of na de dag waarop deze werkgever eigenrisicodrager werd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel83
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel46
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel74
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '83'
        hoofdstuk: '9'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '46'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '74'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '82.2'
    text: |-
      Indien het eigenrisicodragen eindigt blijft de werkgever het risico, bedoeld in het eerste lid, dragen, voor zover
      de eerste dag van ongeschiktheid tot werken wegens ziekte is gelegen voor het einde van het eigenrisicodragen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
  - number: '82.3'
    text: |-
      In geval van overgang van een onderneming in de zin van [artikel 662 van Boek 7 van het Burgerlijk Wetboek][ref1],
      alsmede in geval van een dergelijke overgang bij faillissement, wordt het risico van de betaling van de WGA-
      uitkering aan de verzekerde, die op de eerste dag van de bij die uitkering in acht genomen wachttijd in
      dienstbetrekking stond tot de werkgever die de onderneming heeft overgedragen, alsmede het risico van betaling
      van de overlijdensuitkering, bedoeld in [artikel 74, eerste lid][ref2], aan de rechthebbende of rechthebbenden,
      bedoeld in dat lid, in afwijking van het tweede lid gedragen door de werkgever die de onderneming verkrijgt,
      indien:


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel662
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel74
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '662'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '74'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: 82.3.a
    text: |-
      de werkgever die de onderneming overdraagt geen eigenrisicodrager is en de werkgever die de onderneming verkrijgt
      eigenrisicodrager is;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
  - number: 82.3.b
    text: de werkgever die de onderneming overdraagt eigenrisicodrager is; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
  - number: 82.3.c
    text: |-
      de werkgever die de onderneming overdraagt een werkgever is wiens eigenrisicodragen is beëindigd of geëindigd als
      bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
  - number: '82.4'
    text: |-
      Indien in de situatie, bedoeld in het derde lid, onderdeel a, slechts een deel van de onderneming overgaat,
      vindt het derde lid, onderdeel a, toepassing naar rato van het deel van de loonsom dat het overgegane deel van de
      onderneming deel uitmaakte van de gehele onderneming in het kalenderjaar voorafgaande aan dat van overgang.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
  - number: '82.5'
    text: |-
      Indien in de situatie, bedoeld in het derde lid, onderdeel b of c, slechts een deel van de onderneming overgaat,
      blijft het risico van de betaling van de uitkering berusten bij de werkgever die een deel van de onderneming
      overdraagt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
  - number: '82.6'
    text: |-
      Het eerste lid is niet van toepassing indien de uitkering wordt toegekend aan een verzekerde die
      uit de dienstbetrekking waaruit de WGA-uitkering is ontstaan recht had op ziekengeld als bedoeld in
      [artikel 29, tweede lid, onderdelen d, e, f of g, van de Ziektewet][ref1] of op ziekengeld als bedoeld in
      artikel 29, tweede lid, onderdelen a, b en c, dat aan een verzekerde is toegekend direct aansluitend op een
      dienstbetrekking waarin recht op ziekengeld als bedoeld in artikel 29, tweede lid, onderdeel e, f of g, bestond,
      tenzij op grond van [artikel 38a, negende lid][ref2], of [artikel 38b, tweede lid, van de Ziektewet][ref3]
      geen ziekengeld is of wordt toegekend dan wel indien de uitkering wordt toegekend in aansluiting op een
      uitkering toegekend op grond van de [Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref4] of de
      [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref5], of in aansluiting op een periode waarin recht op
      arbeidsondersteuning op grond van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten bestond.


      [ref1]: https://wetten.overheid.nl/BWBR0001888#Artikel29
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel38a
      [ref3]: https://wetten.overheid.nl/BWBR0001888#Artikel38b
      [ref4]: https://wetten.overheid.nl/BWBR0008656
      [ref5]: https://wetten.overheid.nl/BWBR0008657
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0001888
        artikel: '29'
      - id: ref2
        bwb_id: BWBR0001888
        artikel: 38a
      - id: ref3
        bwb_id: BWBR0001888
        artikel: 38b
      - id: ref4
        bwb_id: BWBR0008656
      - id: ref5
        bwb_id: BWBR0008657
  - number: '82.7'
    text: |-
      Het eerste lid is niet van toepassing indien de uitkering wordt toegekend aan een verzekerde die naar de
      dienstbetrekking waaruit de uitkering is ontstaan, is toegeleid door het college van burgemeester en wethouders
      op grond van [artikel 7, eerste lid, onderdeel a, van de Participatiewet][ref1] en waarbij bij ziekte van de
      werknemer de mogelijkheid tot vergoeding als bedoeld in [artikel 8a, tweede lid, onderdeel b, van die wet][ref2],
      zoals die luidde op 31 december 2015, van toepassing was.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0015703#Artikel8a
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0015703
        artikel: 8a
  - number: '82.8'
    text: |-
      Indien de eigenrisicodrager een overheidswerkgever is op wie [artikel 7:662 van het Burgerlijk Wetboek][ref1]
      niet van toepassing is, en deze geheel of gedeeltelijk is overgegaan naar een andere werkgever, alsmede in geval
      van een dergelijke overgang bij faillissement van die overheidswerkgever, zijn het derde, vierde en vijfde lid
      van overeenkomstige toepassing, met dien verstande dat onder werkgever die de onderneming overdraagt of heeft
      overgedragen wordt verstaan de overheidswerkgever die niet langer bestaat of deels is overgegaan en onder de
      werkgever die de onderneming verkrijgt de rechtsopvolger van deze overheidswerkgever dan wel de verkrijger van een
      organisatieonderdeel daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel662
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel82
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '662'
  - number: '83.1'
    text: |-
      De eigenrisicodrager draagt gedurende een bij ministeriële regeling te bepalen periode nadat het recht op een WGA-
      uitkering is ontstaan het eigenrisico, bedoeld in [artikel 82][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
  - number: '83.2'
    text: |-
      Indien een WGA-uitkering wordt toegekend direct aansluitend op een arbeidsongeschiktheidsuitkering wordt de duur
      van de arbeidsongeschiktheidsuitkering in mindering gebracht op de periode, bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel83
  - number: '83.3'
    text: |-
      Indien [artikel 24][ref1] is toegepast wordt de periode, bedoeld in het eerste lid, bekort met de duur van het
      verlengde tijdvak, bedoeld in artikel 24, eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel83
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
  - number: '84.1'
    text: |-
      De eigenrisicodrager is bevoegd, met inachtneming van [artikel 72][ref1], de door het UWV toegekende WGA-
      uitkering en de overlijdensuitkering, bedoeld in [artikel 74, eerste lid][ref2], namens het UWV te betalen aan
      de verzekerde, bedoeld in [artikel 82, eerste lid][ref3], onderscheidenlijk de rechthebbende of rechthebbenden,
      bedoeld in artikel 74, eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel72
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel74
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '72'
        hoofdstuk: '8'
        paragraaf: '8.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '74'
        hoofdstuk: '8'
        paragraaf: '8.2'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
  - number: '84.2'
    text: |-
      De door de eigenrisicodrager op grond van het eerste lid aan de verzekerde betaalde loonaanvullingsuitkering,
      bedoeld in [hoofdstuk 7][ref1], en de vervolguitkering, bedoeld in [artikel 62, vijfde lid][ref2], voor zover die
      uitkeringen meer bedragen dan hetgeen berekend is op grond van het eerste en vierde lid van dat artikel, alsmede
      de op grond van enige wet hierover verschuldigde premies die daarop niet in mindering kunnen worden gebracht en de
      verschuldigde inkomensafhankelijke bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref3], over deze
      beide uitkeringen, kunnen door hem op het UWV worden verhaald.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel62
      [ref3]: https://wetten.overheid.nl/BWBR0018450#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '7'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '62'
        hoofdstuk: '7'
        paragraaf: '7.2'
      - id: ref3
        bwb_id: BWBR0018450
        artikel: '42'
  - number: '84.3'
    text: |-
      Indien de eigenrisicodrager de uitkering en de overlijdensuitkering niet betaalt, betaalt het UWV deze uitkering
      en deze overlijdensuitkering en verhaalt het UWV de uitkering en de overlijdensuitkering, alsmede de op grond van
      enige wet over deze uitkering en deze overlijdensuitkering verschuldigde premies die niet op deze uitkering en
      deze overlijdensuitkering in mindering kunnen worden gebracht en de verschuldigde inkomensafhankelijke bijdrage,
      bedoeld in [artikel 42 van de Zorgverzekeringswet][ref1], over deze uitkering en deze overlijdensuitkering, op
      de eigenrisicodrager. Op de eigenrisicodrager wordt evenwel niet verhaald hetgeen deze, als hij de uitkering en de
      overlijdensuitkering wel had betaald, op grond van het tweede lid op het UWV had kunnen verhalen. Dit lid is van
      overeenkomstige toepassing, indien een voorschot op een uitkering is betaald.


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '42'
  - number: '84.4'
    text: |-
      Indien de eigenrisicodrager in staat van faillissement is verklaard, of indien ten aanzien van hem de
      schuldsaneringsregeling natuurlijke personen van toepassing is verklaard, dan wel indien hij ophoudt werkgever te
      zijn, betaalt het UWV:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
  - number: 84.4.a
    text: |-
      de WGA-uitkering en verhaalt het deze uitkering, alsmede de op grond van enige wet over deze uitkering
      verschuldigde premies die niet op deze uitkering in mindering kunnen worden gebracht en de verschuldigde
      inkomensafhankelijke bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref1], over deze uitkering,
      voor zover deze is betaald over de periode, bedoeld in [artikel 83][ref2], op de bank of verzekeraar, bedoeld in
      [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0018450#Artikel42
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel83
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0018450
        artikel: '42'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '83'
        hoofdstuk: '9'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '40'
  - number: 84.4.b
    text: |-
      de kosten die rechtstreeks verband houden met de uitvoering van
      __REF000___________________________________________________________________________________________________________
      __________ en verhaalt het deze kosten op de werkgever, bedoeld in de eerste zin, of de bank of verzekeraar,
      bedoeld in [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref2]. Bij ministeriële
      regeling kunnen regels worden gesteld met betrekking tot de soort en de omvang van de kosten, bedoeld in de eerste
      zin.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '40'
  - number: '84.5'
    text: |-
      In de situatie, bedoeld in [artikel 82, vierde lid][ref1], berust de betaling van de uitkering bij het UWV. Het
      UWV verhaalt op de eigenrisicodrager de uitkering, bedoeld in de vorige zin, alsmede de op grond van enige wet
      over deze uitkering verschuldigde premies die niet op deze uitkering in mindering kunnen worden gebracht en de
      verschuldigde inkomensafhankelijke bijdrage, bedoeld in [artikel 42 van de Zorgverzekeringswet][ref2], over deze
      uitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '42'
  - number: '84.6'
    text: Het UWV kan de in het derde en vierde lid bedoelde bedragen invorderen bij dwangbevel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
  - number: '84.7'
    text: |-
      Het eerste, tweede, derde, vijfde en zesde lid zijn van overeenkomstige toepassing op de werkgever die op grond van
      [artikel 82, tweede en derde lid][ref1], het in dat artikel bedoelde risico van betaling draagt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel84
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
  - number: '86.1'
    text: |-
      Het UWV kan bij de eigenrisicodrager kosten in rekening brengen ter zake van de betaling van de uitkering door het
      UWV en het verhaal op de eigenrisicodrager, bedoeld in [artikel 84, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel84
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel86
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '84'
        hoofdstuk: '9'
  - number: '86.2'
    text: |-
      Het UWV vergoedt aan de eigenrisicodrager of de bank of verzekeraar, bedoeld in
      [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref1] op aanvraag de schade die deze lijdt
      door toepassing van [artikel 117, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel117
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel86
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '117'
        hoofdstuk: '12'
        paragraaf: '12.4'
  - number: '87'
    text: Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot dit hoofdstuk.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel87
  - number: '88.1'
    text: 'Het UWV weigert een uitkering op grond van deze wet geheel of gedeeltelijk, blijvend of tijdelijk indien:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
  - number: 88.1.a
    text: |-
      de verzekerde verplichtingen, bedoeld in [artikel 27, tweede tot en met vijfde lid][ref1], [28][ref2], [29][ref3],
      of [30][ref4] niet of niet behoorlijk is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel30
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: 88.1.b
    text: |-
      de verzekerde de verplichting, bedoeld in [artikel 27, eerste lid][ref1], niet binnen de door het UWV daarvoor
      vastgestelde termijn is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: 88.1.c
    text: |-
      de verzekerde zich niet houdt aan de verplichting, bedoeld in [artikel 64, derde lid][ref1], of [artikel 65][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel65
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '65'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: 88.1.d
    text: |-
      de verzekerde tijdens het tijdvak, bedoeld in [artikel 25, negende lid][ref1], zonder deugdelijke grond heeft
      nagelaten verweer te voeren tegen of heeft ingestemd met een beëindiging van de dienstbetrekking.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel25
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
  - number: '88.2'
    text: |-
      Onverminderd het eerste lid kan het UWV de uitkering blijvend geheel weigeren, indien de verzekerde door het niet
      nakomen van de verplichting, bedoeld in [artikel 28, eerste lid][ref1], het ontstaan van de arbeidsongeschiktheid
      opzettelijk heeft veroorzaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel28
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '88.3'
    text: |-
      Het eerste lid is niet van toepassing indien de eigenrisicodrager, op grond van [artikel 89][ref1], de bevoegdheid
      heeft de WGA-uitkering te weigeren.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel89
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '89'
        hoofdstuk: '10'
  - number: '88.4'
    text: |-
      Het UWV kan afzien van het opleggen van een maatregel als bedoeld in het eerste lid en volstaan met het
      geven van een schriftelijke waarschuwing ter zake van het niet tijdig nakomen van de verplichting, bedoeld in
      [artikel 27, eerste lid][ref1], indien het niet tijdig nakomen van de verplichting niet heeft geleid tot het
      ten onrechte of tot een te hoog bedrag verlenen van uitkering, of ter zake van het zich niet houden aan de
      voorschriften, bedoeld in [artikel 30, eerste lid, onderdeel b][ref2], [artikel 64, derde lid][ref3], of in
      [artikel 65][ref4], tenzij het niet tijdig nakomen van de verplichting of het zich niet houden aan de voorschriften
      plaatsvindt binnen een periode van twee jaar te rekenen vanaf de datum waarop eerder aan de belanghebbende een
      zodanige waarschuwing is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel30
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel64
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel65
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '64'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '65'
        hoofdstuk: '8'
        paragraaf: '8.1'
  - number: '88.5'
    text: Het UWV kan afzien van het opleggen van een maatregel indien daarvoor dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel88
  - number: '89.1'
    text: |-
      De eigenrisicodrager kan in verband met de uitvoering van [artikel 42][ref1] de WGA-uitkering gedeeltelijk en
      blijvend, geheel en tijdelijk of gedeeltelijk en tijdelijk weigeren indien:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel42
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '42'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 89.1.a
    text: |-
      de verzekerde, bedoeld in [artikel 82][ref1], verplichtingen als bedoeld in
      [artikel 27, tweede juncto zesde lid en het vierde lid][ref2], [28, eerste lid][ref3], [29][ref4], of [30][ref5]
      niet of niet behoorlijk is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel30
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: 89.1.b
    text: |-
      de verzekerde, bedoeld in [artikel 82][ref1], de verplichting, bedoeld in
      [artikel 27, eerste juncto zesde lid][ref2], niet binnen de door de eigenrisicodrager daarvoor vastgestelde termijn
      is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel82
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '82'
        hoofdstuk: '9'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '89.2'
    text: |-
      Indien de verzekerde de verplichting, bedoeld in [artikel 28][ref1], [29][ref2] of [30][ref3], niet heeft nageleefd
      als bedoeld in [artikel 88, tweede lid][ref4], is het eerste lid niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel28
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel29
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel30
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel88
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '28'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '29'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '30'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '88'
        hoofdstuk: '10'
  - number: '89.3'
    text: |-
      Indien op grond van het eerste lid de uitkering geheel wordt geweigerd is [artikel 84, derde lid][ref1], niet
      van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel84
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '84'
        hoofdstuk: '9'
  - number: '89.4'
    text: |-
      De eigenrisicodrager is bevoegd [artikel 67, tweede lid, onderdeel c][ref1], toe te passen voor de duur van ten
      hoogste acht weken, waarbij de betaling ook gedeeltelijk kan worden opgeschort of geschorst.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel67
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '67'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '89.5'
    text: Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot dit artikel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel89
  - number: '90.1'
    text: |-
      Een maatregel als bedoeld in [artikel 88][ref1] of [89][ref2] wordt afgestemd op de ernst van de gedraging en de
      mate waarin de verzekerde de gedraging verweten kan worden. Van het opleggen van een maatregel wordt in elk geval
      afgezien, indien elke vorm van verwijtbaarheid ontbreekt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel88
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel89
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '88'
        hoofdstuk: '10'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '89'
        hoofdstuk: '10'
  - number: '90.2'
    text: |-
      Het opleggen van een maatregel blijft achterwege indien voor dezelfde gedraging een bestuurlijke boete als bedoeld
      in [artikel 91][ref1] wordt opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel91
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel90
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '91'
        hoofdstuk: '10'
  - number: '90.3'
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld met betrekking tot het eerste lid,
      waarbij in ieder geval kan worden geregeld in welke gevallen het UWV kan afzien van het opleggen van een maatregel.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel90
  - number: '91.1'
    text: |-
      Het UWV legt een bestuurlijke boete op van ten hoogste het benadelingsbedrag wegens het niet of niet
      behoorlijk nakomen door de verzekerde of zijn wettelijke vertegenwoordiger van de verplichting, bedoeld in
      [artikel 27, eerste lid][ref1]. Indien de feiten en omstandigheden, bedoeld in artikel 27, eerste lid, niet of niet
      behoorlijk zijn medegedeeld en deze overtreding opzettelijk is begaan, bedraagt de bestuurlijke boete ten hoogste
      het bedrag van de vijfde categorie, bedoeld in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2].
      Indien de feiten en omstandigheden, bedoeld in artikel 27, eerste lid, niet of niet behoorlijk zijn medegedeeld
      en deze overtreding niet opzettelijk is begaan, bedraagt de bestuurlijke boete ten hoogste het bedrag van de derde
      categorie, bedoeld in artikel 23, vierde lid, van het Wetboek van Strafrecht.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: '91.2'
    text: |-
      In dit artikel wordt onder benadelingsbedrag verstaan het brutobedrag dat als gevolg van het niet of niet
      behoorlijk nakomen van de verplichting, bedoeld in [artikel 27, eerste lid][ref1], ten onrechte of tot een te hoog
      bedrag aan uitkering is ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '91.3'
    text: |-
      Indien het niet of niet behoorlijk nakomen door de verzekerde of zijn wettelijke vertegenwoordiger van de
      verplichting, bedoeld in [artikel 27, eerste lid][ref1], niet heeft geleid tot een benadelingsbedrag, of indien
      een werkgever of een persoon als bedoeld in artikel 27, achtste lid, de verplichtingen op grond van artikel 27,
      achtste lid, niet of niet behoorlijk nakomt, legt het UWV een bestuurlijke boete op van ten hoogste het bedrag van
      de tweede categorie, bedoeld in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: '91.4'
    text: |-
      Het UWV kan afzien van het opleggen van een bestuurlijke boete en volstaan met het geven van een schriftelijke
      waarschuwing wegens het niet of niet behoorlijk nakomen door de verzekerde of zijn wettelijke vertegenwoordiger van
      de verplichting, bedoeld in [artikel 27, eerste lid][ref1], in situaties die bij algemene maatregel van bestuur
      worden bepaald, tenzij het niet of niet behoorlijk nakomen van de verplichting plaatsvindt binnen een periode van
      twee jaar te rekenen vanaf de datum waarop eerder aan hem een zodanige waarschuwing is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '91.5'
    text: |-
      Het UWV legt een bestuurlijke boete op wegens het niet of niet behoorlijk nakomen door de verzekerde of zijn
      wettelijke vertegenwoordiger van de verplichting, bedoeld in [artikel 27, eerste lid][ref1], als gevolg
      waarvan ten onrechte of tot een te hoog bedrag aan uitkering is ontvangen, van ten hoogste 150 procent van het
      benadelingsbedrag, met overeenkomstige toepassing van het eerste lid, indien binnen een tijdvak van vijf jaar
      voorafgaand aan de dag van het begaan van de overtreding een eerdere bestuurlijke boete of strafrechtelijke sanctie
      is opgelegd wegens een eerdere overtreding, bestaande uit eenzelfde gedraging, die onherroepelijk is geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
  - number: '91.6'
    text: |-
      Onder eenzelfde gedraging als bedoeld in het vijfde lid, wordt verstaan het niet of niet behoorlijk nakomen van de
      verplichting, bedoeld in de [artikelen 27, eerste lid][ref1], van deze wet, [25 van de Werkloosheidswet][ref2],
      [12 van de Toeslagenwet][ref3], [12, eerste lid, van de Wet inkomensvoorziening oudere werklozen][ref4],
      [80 van de Wet op de arbeidsongeschiktheidsverzekering][ref5], of [31, eerste lid][ref6], of
      [49 van de Ziektewet][ref7], als gevolg waarvan ten onrechte of tot een te hoog bedrag aan uitkering, ziekengeld of
      toeslag is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel27
      [ref2]: https://wetten.overheid.nl/BWBR0004045#Artikel25
      [ref3]: https://wetten.overheid.nl/BWBR0004043#Artikel12
      [ref4]: https://wetten.overheid.nl/BWBR0024394#Artikel12
      [ref5]: https://wetten.overheid.nl/BWBR0002524#Artikel80
      [ref6]: https://wetten.overheid.nl/BWBR0001888#Artikel31
      [ref7]: https://wetten.overheid.nl/BWBR0001888#Artikel49
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '27'
        hoofdstuk: '4'
        paragraaf: '4.1'
      - id: ref2
        bwb_id: BWBR0004045
        artikel: '25'
      - id: ref3
        bwb_id: BWBR0004043
        artikel: '12'
      - id: ref4
        bwb_id: BWBR0024394
        artikel: '12'
      - id: ref5
        bwb_id: BWBR0002524
        artikel: '80'
      - id: ref6
        bwb_id: BWBR0001888
        artikel: '31'
      - id: ref7
        bwb_id: BWBR0001888
        artikel: '49'
  - number: '91.7'
    text: |-
      In afwijking van het vijfde lid is het in dat lid genoemde tijdvak van vijf jaar tien jaar indien wegens de eerdere
      overtreding, bedoeld in het vijfde lid, de verzekerde of zijn wettelijke vertegenwoordiger is gestraft met een
      onvoorwaardelijke gevangenisstraf.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
  - number: '91.8'
    text: Het UWV kan afzien van het opleggen van een bestuurlijke boete indien daarvoor dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
  - number: '91.9'
    text: |-
      Degene aan wie een bestuurlijke boete is opgelegd, is verplicht desgevraagd aan het UWV de inlichtingen te
      verstrekken die voor de tenuitvoerlegging van de bestuurlijke boete van belang zijn.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
  - number: '91.10'
    text: Bij algemene maatregel van bestuur worden nadere regels gesteld over de hoogte van de bestuurlijke boete.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
  - number: '91.11'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij de bestuurlijke boete is opgelegd.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
  - number: '91.12'
    text: |-
      In afwijking van [artikel 8:69 van de Algemene wet bestuursrecht][ref1] kan de rechter in beroep of hoger beroep
      het bedrag waarop de bestuurlijke boete is vastgesteld ook ten nadele van de verzekerde of zijn wettelijke
      vertegenwoordiger wijzigen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '91.13'
    text: |-
      Indien ten aanzien van een overtreding waarvoor een bestuurlijke boete is opgelegd geen sprake is geweest van
      opzet of grove schuld, en voorts is gebleken dat binnen een jaar nadat de bestuurlijke boete is opgelegd niet
      nogmaals een overtreding wegens eenzelfde gedraging als bedoeld in het zesde lid is begaan, is het UWV bevoegd
      op verzoek van degene aan wie de bestuurlijke boete is opgelegd, de bestuurlijke boete geheel of gedeeltelijk
      kwijt te schelden bij medewerking aan een schuldregeling. [Artikel 79, eerste, derde en vierde lid][ref1], is van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel79
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '79'
        hoofdstuk: '8'
        paragraaf: '8.2'
  - number: '91.14'
    text: |-
      Het besluit tot kwijtschelding, bedoeld in het dertiende lid, wordt ingetrokken of ten nadele van degene aan wie
      de bestuurlijke boete is opgelegd herzien indien binnen vijf jaar na het besluit tot kwijtschelding wederom een
      overtreding is begaan wegens eenzelfde gedraging als bedoeld in het zesde lid.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel91
  - number: '96.1'
    text: |-
      Het UWV verrekent de bestuurlijke boete en een eerdere bestuurlijke boete wegens eenzelfde gedraging
      als bedoeld in [artikel 91, vijfde lid][ref1], met een uitkering op grond van deze wet, de
      [Werkloosheidswet][ref2], de [Ziektewet][ref3], de [Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref4],
      de [Wet arbeidsongeschiktheidsvoorziening jonggehandicapten][ref5], de
      [Wet arbeidsongeschiktheidsvoorziening militairen][ref6], de [Wet inkomensvoorziening oudere werklozen][ref7],
      de [Wet arbeid en zorg][ref8] of een toeslag op grond van de [Toeslagenwet][ref9], die de persoon aan wie een
      bestuurlijke boete is opgelegd ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel91
      [ref2]: https://wetten.overheid.nl/BWBR0004045
      [ref3]: https://wetten.overheid.nl/BWBR0001888
      [ref4]: https://wetten.overheid.nl/BWBR0008656
      [ref5]: https://wetten.overheid.nl/BWBR0008657
      [ref6]: https://wetten.overheid.nl/BWBR0002822
      [ref7]: https://wetten.overheid.nl/BWBR0024394
      [ref8]: https://wetten.overheid.nl/BWBR0013008
      [ref9]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '91'
        hoofdstuk: '10'
      - id: ref2
        bwb_id: BWBR0004045
      - id: ref3
        bwb_id: BWBR0001888
      - id: ref4
        bwb_id: BWBR0008656
      - id: ref5
        bwb_id: BWBR0008657
      - id: ref6
        bwb_id: BWBR0002822
      - id: ref7
        bwb_id: BWBR0024394
      - id: ref8
        bwb_id: BWBR0013008
      - id: ref9
        bwb_id: BWBR0004043
  - number: '96.2'
    text: |-
      Onverminderd het eerste lid kan het UWV de bestuurlijke boete verrekenen met een vordering die degene aan wie de
      bestuurlijke boete is opgelegd op hem heeft.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
  - number: '96.3'
    text: |-
      De Sociale verzekeringsbank onderscheidenlijk de gemeente betaalt het bedrag van de bestuurlijke
      boete, zonder dat daarvoor een machtiging nodig is, op zijn verzoek aan het UWV indien de
      persoon aan wie een bestuurlijke boete is opgelegd een uitkering ontvangt op grond van de
      [Algemene Ouderdomswet][ref1], de [Algemene nabestaandenwet][ref2], de [Participatiewet][ref3], de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers][ref4] of de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0002221
      [ref2]: https://wetten.overheid.nl/BWBR0007795
      [ref3]: https://wetten.overheid.nl/BWBR0015703
      [ref4]: https://wetten.overheid.nl/BWBR0004044
      [ref5]: https://wetten.overheid.nl/BWBR0004163
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0002221
      - id: ref2
        bwb_id: BWBR0007795
      - id: ref3
        bwb_id: BWBR0015703
      - id: ref4
        bwb_id: BWBR0004044
      - id: ref5
        bwb_id: BWBR0004163
  - number: '96.4'
    text: |-
      De in [artikel 479g van het Wetboek van Burgerlijke Rechtsvordering][ref1] aan de raad voor de
      kinderbescherming toegekende bevoegdheid komt gelijkelijk toe aan het UWV. Indien het UWV gebruik
      maakt van deze bevoegdheid, geschiedt de bekendmaking van het dwangbevel, in afwijking van
      [artikel 4:123, eerste lid, van de Algemene wet bestuursrecht][ref2], door middel van toezending per post aan de
      persoon aan wie de boete is opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel479g
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 479g
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: '96.5'
    text: |-
      Zolang de verzekerde of zijn wettelijke vertegenwoordiger zijn verplichting, bedoeld in
      [artikel 91, negende lid][ref1], niet of niet behoorlijk nakomt:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel91
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '91'
        hoofdstuk: '10'
  - number: 96.5.a
    text: |-
      is het UWV in afwijking van [artikel 4:93, vierde lid, van de Algemene wet bestuursrecht][ref1] bevoegd tot
      verrekening van de bestuurlijke boete voor zover beslag op de vordering van de schuldeiser nietig zou zijn;


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 96.5.b
    text: |-
      geldt de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1], in afwijking van
      [artikel 4:116 van de Algemene wet bestuursrecht][ref2], niet bij de invordering van een bestuurlijke boete bij
      dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel96
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 97a
    text: |-
      Indien het UWV de verzekerde de uitkering op grond van deze wet geheel of gedeeltelijk heeft geweigerd dan wel hem
      een bestuurlijke boete heeft opgelegd, stelt het UWV het reïntegratiebedrijf dat ten behoeve van die verzekerde
      werkzaamheden gericht op vergroting van de mogelijkheden tot het verrichten van arbeid of op inschakeling in arbeid
      verricht, van die beschikking in kennis, voorzover dat noodzakelijk is voor de uitvoering van de werkzaamheden door
      het reïntegratiebedrijf.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel97a
  - number: '98'
    text: |-
      Bij de vaststelling van de schadevergoeding waarop een persoon, die recht heeft op een uitkering op grond van deze
      wet, naar burgerlijk recht aanspraak kan maken in verband met zijn volledig en duurzame arbeidsongeschiktheid of
      gedeeltelijke arbeidsgeschiktheid, houdt de rechter rekening met de aanspraken, die hij op grond van deze wet en de
      daarop berustende bepalingen heeft.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel98
  - number: '99.1'
    text: |-
      Het UWV heeft voor de op grond van deze wet en de daarop berustende bepalingen gemaakte kosten verhaal op
      de persoon, die naar burgerlijk recht verplicht is schade te vergoeden aan de persoon die recht heeft op een
      uitkering op grond van deze wet, doch ten hoogste tot het bedrag, waarvoor deze bij het ontbreken van de aanspraken
      krachtens deze wet naar burgerlijk recht aansprakelijk zou zijn, verminderd met een bedrag, gelijk aan dat van de
      schadevergoeding tot betaling waarvan de aansprakelijke persoon jegens de persoon die recht heeft op een uitkering
      op grond van deze wet naar burgerlijk recht is gehouden.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel99
  - number: '99.2'
    text: |-
      Bij ministeriële regeling kan worden bepaald dat het UWV in plaats van het bedrag van de periodieke verstrekkingen
      de contante waarde daarvan kan vorderen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel99
  - number: '99.3'
    text: |-
      De eigenrisicodrager treedt voor de toepassing van het eerste en het tweede lid in de plaats van het UWV voorzover
      hij het risico van de betaling van uitkering op grond van deze wet draagt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel99
  - number: '99.4'
    text: |-
      De in het eerste lid bedoelde aansprakelijke en de aansprakelijke jegens de persoon met een naar het oordeel
      van het UWV structurele functionele beperking zijn eveneens verplicht tot vergoeding van de door het UWV of de
      eigenrisicodrager gemaakte redelijke kosten ter nakoming van de verplichtingen tot inschakeling in de arbeid van
      de persoon die recht heeft op een uitkering op grond van deze wet of de persoon met een naar het oordeel van het
      UWV structurele functionele beperking, die op het UWV of de eigenrisicodrager rusten op grond van deze wet en de
      daarop berustende bepalingen alsmede de [Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] en de daarop
      berustende bepalingen. De aansprakelijke kan hetzelfde verweer voeren dat hem jegens de persoon die recht heeft op
      een uitkering of voorziening op grond van deze wet ten dienste zou hebben gestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0013060
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel99
    references:
      - id: ref1
        bwb_id: BWBR0013060
  - number: '99.5'
    text: |-
      De werkgever en het UWV verstrekken elkaar op verzoek informatie, die noodzakelijk is voor de uitoefening van het
      regresrecht. Bij deze informatieverstrekking worden persoonsgegevens, waaronder het burgerservicenummer, verwerkt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel99
  - number: '100.1'
    text: |-
      [Artikel 99][ref1] geldt ten aanzien van de naar burgerlijk recht tot schadevergoeding verplichte werkgever van de
      persoon die recht heeft op een uitkering of voorziening op grond van deze wet, onderscheidenlijk ten aanzien van
      de naar burgerlijk recht tot schadevergoeding verplichte verzekerde, die in dienstbetrekking staat tot dezelfde
      werkgever als de persoon jegens wie naar burgerlijk recht een verplichting tot schadevergoeding bestaat, slechts
      indien de volledig en duurzame arbeidsongeschiktheid of gedeeltelijke arbeidsgeschiktheid is te wijten aan opzet of
      bewuste roekeloosheid van die werkgever onderscheidenlijk die verzekerde.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel99
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel100
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '99'
        hoofdstuk: '11'
  - number: '100.2'
    text: |-
      Voor de toepassing van het eerste lid wordt mede als werkgever beschouwd de inlener, bedoeld in
      [artikel 34 van de Invorderingswet 1990][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004770#Artikel34
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel100
    references:
      - id: ref1
        bwb_id: BWBR0004770
        artikel: '34'
  - number: '101'
    text: |-
      Indien in verband met het geven van een beschikking een in het buitenland wonende persoon
      is opgeroepen en om die reden de beschikking niet binnen de redelijke termijn, bedoeld in
      [artikel 4:13, eerste lid, van de Algemene wet bestuursrecht][ref1], gegeven kan worden, wordt die termijn verlengd
      met ten hoogste zes maanden en wordt de aanvrager van deze verlenging schriftelijk in kennis gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel101
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: '102.1'
    text: |-
      Een beschikking over het verzekerd zijn als bedoeld in [artikel 7, tweede lid][ref1], wordt door het UWV gegeven
      binnen dertien weken na ontvangst van de aanvraag.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel102
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '7'
        hoofdstuk: '1'
        paragraaf: '1.3'
  - number: '102.2'
    text: |-
      Een beschikking over verlenging van het tijdvak gedurende welke de verzekerde jegens zijn werkgever recht op
      loon heeft dan wel aanspraak op bezoldiging als bedoeld in [artikel 24][ref1] wordt gegeven binnen twee weken
      na ontvangst van de aanvraag. Indien de beschikking, bedoeld in de eerste zin niet binnen twee weken kan worden
      gegeven wordt de aanvrager daarvan schriftelijk in kennis gesteld onder vermelding van een zo kort mogelijke
      termijn waarbinnen de beschikking wel tegemoet kan worden gezien.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel24
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel102
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '24'
        hoofdstuk: '3'
  - number: '102.3'
    text: |-
      Een beschikking over het ontstaan, later ontstaan of herleven van het recht op een uitkering als bedoeld in
      [hoofdstuk 6][ref1] en [7][ref2], en een beschikking over een verkorting van de wachttijd als bedoeld in
      [artikel 66, eerste lid][ref3], wordt gegeven binnen een redelijke termijn na ontvangst van de aanvraag, tenzij
      [artikel 25, negende lid][ref4], of [26, tweede lid, tweede zin][ref5], toepassing heeft gevonden. De redelijke
      termijn is in ieder geval verstreken wanneer binnen acht weken na ontvangst van de aanvraag geen beschikking is
      gegeven, noch een kennisgeving als bedoeld in het vierde of vijfde lid is gedaan.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk6
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Hoofdstuk7
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel66
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel25
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel26
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel102
    references:
      - id: ref1
        bwb_id: BWBR0019057
        hoofdstuk: '6'
      - id: ref2
        bwb_id: BWBR0019057
        hoofdstuk: '7'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '66'
        hoofdstuk: '8'
        paragraaf: '8.1'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '25'
        hoofdstuk: '3'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '26'
        hoofdstuk: '3'
  - number: '102.4'
    text: |-
      Indien in verband met het geven van een beschikking als bedoeld in het derde lid advies is gevraagd aan een
      deskundige die niet onder verantwoordelijkheid van het UWV werkzaam is en om die reden de beschikking niet binnen
      acht weken gegeven kan worden, wordt die termijn verlengd met ten hoogste vier weken en wordt de aanvrager van die
      verlenging schriftelijk in kennis gesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel102
  - number: '102.5'
    text: |-
      Indien een beschikking als bedoeld in het eerste lid niet binnen dertien weken of de beschikking, bedoeld in het
      derde lid niet binnen acht weken kan worden gegeven om een andere dan de in het vierde lid bedoelde reden wordt de
      aanvrager daarvan schriftelijk in kennis gesteld onder vermelding van een zo kort mogelijke termijn waarbinnen de
      beschikking wel tegemoet kan worden gezien.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel102
  - number: '102.6'
    text: |-
      In afwijking van de in het derde tot en met vijfde lid genoemde termijn van acht weken, geldt tot en met
      31 december 2011, of tot een eerder, bij koninklijk besluit te bepalen, tijdstip, een termijn van veertien weken.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel102
  - number: '103'
    text: 'Voor de toepassing van deze paragraaf wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel103
  - number: 103.a
    text: 'medische beschikking: een beschikking, waaraan een beoordeling van medische gegevens ten grondslag ligt;'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel103
  - number: 103.b
    text: 'werknemer: de persoon, op wiens medische gegevens de beoordeling betrekking heeft;'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel103
  - number: 103.c
    text: |-
      de medebelanghebbende: de werkgever of de bank of verzekeraar, bedoeld in
      [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref1] in de situaties, genoemd in
      [artikel 84, vierde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel84
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel103
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '84'
        hoofdstuk: '9'
  - number: '105.1'
    text: |-
      De inzage in, dan wel kennisname of toezending van stukken die medische gegevens bevatten, is voorbehouden aan een
      gemachtigde van de medebelanghebbende, die advocaat of arts is danwel daarvoor van het UWV bijzondere toestemming
      heeft gekregen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel105
  - number: '105.2'
    text: 'De gemachtigde, bedoeld in het eerste lid, treedt in de plaats van de medebelanghebbende bij:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel105
  - number: 105.2.a
    text: de voorbereiding van een medische beschikking;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel105
  - number: 105.2.b
    text: het opstellen van een bezwaar- of beroepschrift; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel105
  - number: 105.2.c
    text: de behandeling van een bezwaar,
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel105
  - number: '105.3'
    text: |-
      [Artikel 7:4, tweede, vierde en zesde lid, van de Algemene wet bestuursrecht][ref1] is niet van toepassing op
      stukken of inlichtingen die medische gegevens bevatten.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel105
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: '106.1'
    text: |-
      Het UWV vermeldt de motivering van een medische beschikking, voorzover betrekking hebbend op medische gegevens, op
      een aparte bijlage.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel106
  - number: '106.2'
    text: |-
      De bijlage wordt behalve aan de werknemer uitsluitend verstrekt aan de gemachtigde van de medebelanghebbende,
      bedoeld in [artikel 105][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel105
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel106
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '105'
        hoofdstuk: '12'
        paragraaf: '12.2'
  - number: '106.3'
    text: |-
      Het tweede lid is van overeenkomstige toepassing op een rapport of een advies van een arts of een psycholoog,
      waarnaar bij de motivering van een medische beschikking wordt verwezen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel106
  - number: '107'
    text: |-
      Bij de bekendmaking van een medische beschikking wordt gewezen op de [artikelen 105][ref1], [106][ref2] en
      [108][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel105
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel106
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel108
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel107
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '105'
        hoofdstuk: '12'
        paragraaf: '12.2'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '106'
        hoofdstuk: '12'
        paragraaf: '12.2'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '108'
        hoofdstuk: '12'
        paragraaf: '12.2'
  - number: '108'
    text: |-
      De gronden van het bezwaar of beroep, bedoeld in
      [artikel 6:5, eerste lid, onderdeel d, van de Algemene wet bestuursrecht][ref1], worden in een aparte bijlage
      vermeld voorzover ze betrekking hebben op medische gegevens.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel108
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
  - number: '109.1'
    text: |-
      Indien [artikel 8:32, tweede lid van de Algemene wet bestuursrecht][ref1] is toegepast, vindt in afwijking van
      [artikel 8:62, eerste lid, van de Algemene wet bestuursrecht][ref2] het onderzoek ter zitting, voorzover betrekking
      hebbend op medische gegevens, met gesloten deuren plaats, tenzij de bestuursrechter ambtshalve of op verzoek van
      een van de partijen bepaalt dat het onderzoek openbaar is.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel109
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '109.2'
    text: |-
      In de uitnodiging, bedoeld in [artikel 8:56 van de Algemene wet bestuursrecht][ref1] wordt mededeling gedaan van
      het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel109
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '110'
    text: |-
      [Artikel 109][ref1] is van overeenkomstige toepassing bij de behandeling van het hoger beroep en bij de behandeling
      van een verzoek om een voorlopige voorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel109
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel110
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '109'
        hoofdstuk: '12'
        paragraaf: '12.2'
  - number: '111'
    text: |-
      In afwijking van [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1] beslist het UWV binnen dertien
      weken gerekend vanaf de dag na die waarop de termijn voor het indienen van het bezwaarschrift is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel111
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: '112.1'
    text: |-
      Indien bezwaar wordt gemaakt tegen een beschikking waaraan een verzekeringsgeneeskundige
      of arbeidskundige beoordeling ten grondslag ligt, beslist het UWV, in afwijking van
      [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1], binnen zeventien weken of, indien het advies
      vraagt aan een deskundige die niet onder zijn verantwoordelijkheid werkzaam is binnen eenentwintig weken, gerekend
      vanaf de dag na die waarop de termijn voor het indienen van het bezwaarschrift is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel112
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: '112.2'
    text: |-
      Indien in verband met het geven van een beslissing op bezwaar een in het buitenland wonende persoon is opgeroepen
      en om die reden de beslissing op bezwaar niet binnen de in het eerste lid bedoelde termijn gegeven kan worden,
      wordt de beslissing, in afwijking van [artikel 7:10, derde lid, van de Algemene wet bestuursrecht][ref1], verdaagd
      met ten hoogste zes maanden en wordt de aanvrager van deze verdaging schriftelijk in kennis gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel112
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: '114'
    text: |-
      In afwijking van [artikel 1:2 van de Algemene wet bestuursrecht][ref1] is de werkgever of de bank of verzekeraar,
      bedoeld in [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref2] geen belanghebbende bij
      een beschikking van het UWV over het verzekerd zijn op grond van deze wet.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0017745#Artikel40
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel114
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0017745
        artikel: '40'
  - number: '115'
    text: |-
      Het bezwaar of beroep van een werkgever of bank of verzekeraar, als bedoeld in
      [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref1]
      tegen de in [artikel 84][ref2] bedoelde betaling danwel tegen een in
      [artikel 38, derde of vierde lid, van de Wet financiering sociale verzekeringen][ref3], bedoelde opslag of korting
      kan niet zijn gegrond op de grief, dat een uitkering op grond van deze wet ten onrechte of tot een te hoog bedrag
      is vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel84
      [ref3]: https://wetten.overheid.nl/BWBR0017745#Artikel38
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel115
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '84'
        hoofdstuk: '9'
      - id: ref3
        bwb_id: BWBR0017745
        artikel: '38'
  - number: '116.1'
    text: |-
      Tegen uitspraken van de Centrale Raad van Beroep kan ieder der partijen beroep in cassatie instellen ter zake van
      schending of verkeerde toepassing van de [artikelen 2, tweede tot en met zesde lid][ref1], [3][ref2], [8][ref3],
      [9][ref4], [11][ref5] en [12, eerste lid, onderdeel a][ref6], en de daarop berustende bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel9
      [ref5]: https://wetten.overheid.nl/BWBR0019057#Artikel11
      [ref6]: https://wetten.overheid.nl/BWBR0019057#Artikel12
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel116
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '2'
        hoofdstuk: '1'
        paragraaf: '1.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '3'
        hoofdstuk: '1'
        paragraaf: '1.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '8'
        hoofdstuk: '1'
        paragraaf: '1.3'
      - id: ref4
        bwb_id: BWBR0019057
        artikel: '9'
        hoofdstuk: '1'
        paragraaf: '1.3'
      - id: ref5
        bwb_id: BWBR0019057
        artikel: '11'
        hoofdstuk: '1'
        paragraaf: '1.4'
      - id: ref6
        bwb_id: BWBR0019057
        artikel: '12'
        hoofdstuk: '1'
        paragraaf: '1.5'
  - number: '116.2'
    text: |-
      Op dit beroep zijn de voorschriften betreffende het beroep in cassatie tegen de uitspraken van de gerechtshoven
      inzake beroepen in belastingzaken van overeenkomstige toepassing, waarbij de Centrale Raad van Beroep de plaats
      inneemt van een gerechtshof.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel116
  - number: '117.1'
    text: |-
      Intrekking van het recht op een uitkering op grond van deze wet of verlaging van de hoogte ervan, die voortvloeien
      uit het door de werkgever ingesteld bezwaar of beroep, vinden niet eerder plaats dan zes weken na de dag waarop
      de beslissing op bezwaar is bekendgemaakt of de uitspraak is gedaan. De eerste zin is van overeenkomstige
      toepassing in geval van intrekking van het bezwaar of beroep omdat het UWV geheel of gedeeltelijk is tegemoet
      gekomen aan het bezwaar of beroep van de werkgever. De eerste en tweede zin zijn van overeenkomstige toepassing
      indien het bezwaar of beroep of de intrekking daarvan heeft plaatsgevonden door de bank of verzekeraar, bedoeld
      in [artikel 40, tweede lid, van de Wet financiering sociale verzekeringen][ref1] in de situaties, genoemd in
      [artikel 84, vierde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel40
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel84
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel117
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '40'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '84'
        hoofdstuk: '9'
  - number: '117.2'
    text: |-
      Het eerste lid geldt niet, indien de uitkering door eigen schuld of toedoen van de werknemer ten onrechte of tot
      een te hoog bedrag is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel117
  - number: '119'
    text: |-
      [Titel 4.2 van de Algemene wet bestuursrecht][ref1] is niet van toepassing op aanspraken op grond van
      [artikel 34a, eerste lid][ref2], en [35][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0005537
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel34a
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel35
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel119
    references:
      - id: ref1
        bwb_id: BWBR0005537
      - id: ref2
        bwb_id: BWBR0019057
        artikel: 34a
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '35'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '120'
    text: 'Geen recht op uitkering op grond van deze wet heeft de persoon die:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel120
  - number: 120.a
    text: |-
      verzekerd is op grond van [artikel 16 van de Wet op de arbeidsongeschiktheidsverzekering][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002524#Artikel16
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel120
    references:
      - id: ref1
        bwb_id: BWBR0002524
        artikel: '16'
  - number: 120.b
    text: |-
      recht heeft op toekenning of heropening van arbeidsongeschiktheidsuitkering op grond van de [artikelen 19a][ref1],
      [20][ref2], [43a][ref3], onderscheidenlijk [47][ref4], [47a][ref5] of [47b van die wet][ref6]; en


      [ref1]: https://wetten.overheid.nl/BWBR0002524#Artikel19a
      [ref2]: https://wetten.overheid.nl/BWBR0002524#Artikel20
      [ref3]: https://wetten.overheid.nl/BWBR0002524#Artikel43a
      [ref4]: https://wetten.overheid.nl/BWBR0002524#Artikel47
      [ref5]: https://wetten.overheid.nl/BWBR0002524#Artikel47a
      [ref6]: https://wetten.overheid.nl/BWBR0002524#Artikel47b
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel120
    references:
      - id: ref1
        bwb_id: BWBR0002524
        artikel: 19a
      - id: ref2
        bwb_id: BWBR0002524
        artikel: '20'
      - id: ref3
        bwb_id: BWBR0002524

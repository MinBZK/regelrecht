        hoofdstuk: '5'
  - number: 44.1.a
    text: |-
      de gevallen, bedoeld in de [Wet verplichte geestelijke gezondheidszorg][ref1], in de
      [Wet zorg en dwang psychogeriatrische en verstandelijk gehandicapte cliënten][ref2] en in
      [artikel 2.3 van de Wet forensische zorg][ref3]; en


      [ref1]: https://wetten.overheid.nl/BWBR0040635
      [ref2]: https://wetten.overheid.nl/BWBR0040632
      [ref3]: https://wetten.overheid.nl/BWBR0040634#Artikel2
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel44
    references:
      - id: ref1
        bwb_id: BWBR0040635
      - id: ref2
        bwb_id: BWBR0040632
      - id: ref3
        bwb_id: BWBR0040634
        artikel: '2'
  - number: 44.1.b
    text: |-
      bij algemene maatregel van bestuur aan te wijzen categorieën personen waarbij tenuitvoerlegging van een
      vrijheidsstraf of vrijheidsbenemende maatregel plaatsvindt buiten een justitiële inrichting.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel44
  - number: '44.2'
    text: |-
      In afwijking van [artikel 49, eerste lid, onderdeel b][ref1], en [56, eerste lid, onderdeel b][ref2], is
      [artikel 43, onderdeel d][ref3], eerst van toepassing met ingang van de dag dat de persoon één maand rechtens
      zijn vrijheid is ontnomen. Artikel 43, onderdeel d, is evenwel van toepassing met ingang van de eerste dag van de
      vrijheidsontneming indien de persoon, bedoeld in de eerste zin, op de dag voorafgaande aan de vrijheidsontneming
      geen recht heeft op een arbeidsongeschiktheidsuitkering of een WGA-uitkering omdat er op hem een uitsluitingsgrond
      van toepassing is als bedoeld in artikel 43, onderdeel e.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel49
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel56
      [ref3]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel44
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '49'
        hoofdstuk: '6'
        paragraaf: '6.1'
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '56'
        hoofdstuk: '7'
        paragraaf: '7.1'
      - id: ref3
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '44.3'
    text: |-
      Voor de toepassing van het tweede lid, worden perioden van vrijheidsontneming samengeteld, indien zij elkaar met
      een onderbreking van minder dan vier weken opvolgen.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel44
  - number: '45.1'
    text: |-
      [Artikel 43, onderdeel f][ref1], is niet van toepassing op de verzekerde die woont in een land waarin op grond
      van een verdrag of een besluit van een volkenrechtelijke organisatie recht op een uitkering op grond van deze wet
      kan bestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel45
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '45.2'
    text: |-
      Bij of krachtens algemene maatregel van bestuur kan worden geregeld dat het recht op een uitkering op grond van
      deze wet ontstaat of herleeft dan wel dat een dergelijke uitkering niet eindigt ten gunste van:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel45
  - number: 45.2.a
    text: een verzekerde, die werkzaamheden verricht in het algemeen belang en niet in Nederland woont;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel45
  - number: 45.2.b
    text: |-
      een verzekerde, die in Aruba, Curaçao, Sint Maarten of in de openbare lichamen Bonaire, Sint Eustatius en Saba
      woont; of
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel45
  - number: 45.2.c
    text: de gezinsleden van de in de onderdelen a of b bedoelde verzekerde.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel45
  - number: 46a
    text: |-
      Indien voor het vaststellen van het recht op uitkering op grond van deze wet, in het kader van een aanvraag voor
      de toekenning van een uitkering op grond van deze wet, naar het oordeel van het UWV een medisch onderzoek nodig is
      en de betrokkene niet meewerkt aan dat onderzoek, blijven eventuele uit deze wet voortvloeiende aanspraken op een
      uitkering op grond van deze wet buiten aanmerking, voor zolang het recht op uitkering niet kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel46a
  - number: '47.1'
    text: 'Recht op een arbeidsongeschiktheidsuitkering ontstaat voor de verzekerde die ziek wordt indien:'
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel47
  - number: 47.1.a
    text: hij de wachttijd heeft doorlopen;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel47
  - number: 47.1.b
    text: hij volledig en duurzaam arbeidsongeschikt is; en
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel47
  - number: 47.1.c
    text: er op hem geen uitsluitingsgrond van toepassing is.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel47
  - number: '47.2'
    text: |-
      Het recht op een arbeidsongeschiktheidsuitkering ontstaat niet eerder dan op de eerste dag na afloop van de
      wachttijd of indien op die dag de uitsluitingsgrond, bedoeld in [artikel 43, onderdeel b][ref1], van toepassing is,
      op de dag dat zich die uitsluitingsgrond niet meer voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel43
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel47
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '43'
        hoofdstuk: '5'
  - number: '48.1'
    text: |-
      Indien op de dag, bedoeld in [artikel 47, tweede lid][ref1], geen recht op een arbeidsongeschiktheidsuitkering
      is ontstaan, ontstaat het recht op een arbeidsongeschiktheidsuitkering op de dag dat de verzekerde duurzaam en
      volledig arbeidsongeschikt is, indien hij op de dag daaraan voorafgaand:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel47
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: '47'
        hoofdstuk: '6'
        paragraaf: '6.1'
  - number: 48.1.a
    text: recht had op een WGA-uitkering;
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
  - number: 48.1.b
    text: |-
      minder dan 35% arbeidsongeschikt was en de volledige en duurzame arbeidsongeschiktheid intreedt binnen vijf jaar
      na:
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
  - number: 48.1.b.1°
    text: |-
      de in [artikel 47, tweede lid][ref1], bedoelde dag en voortkomt uit dezelfde oorzaak als op grond waarvan hij
      gedurende de wachttijd ongeschikt was tot het verrichten van zijn arbeid; of



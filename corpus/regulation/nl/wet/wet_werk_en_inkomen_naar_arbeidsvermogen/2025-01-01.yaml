        paragraaf: '6.1'
  - number: 48.1.b.2°
    text: |-
      de dag dat het recht op grond van [artikel 56][ref1] is geëindigd en voortkomt uit dezelfde oorzaak als op grond
      waarvan hij eerder recht had op een WGA-uitkering; of


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel56
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel48
    references:

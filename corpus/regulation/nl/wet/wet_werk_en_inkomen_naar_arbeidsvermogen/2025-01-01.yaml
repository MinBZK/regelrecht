        artikel: '43'
        hoofdstuk: '5'
  - number: '56.2'
    text: |-
      In afwijking van het eerste lid, onderdeel a, eindigt het recht op een WGA-uitkering van de verzekerde wiens mate
      van arbeidsongeschiktheid lager is dan 35%, twee maanden na de dag dat hij niet langer gedeeltelijk arbeidsgeschikt
      is, doch niet eerder dan op de dag dat de loongerelateerde uitkering van de WGA-uitkering eindigt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel56
  - number: '56.3'
    text: |-
      In afwijking van het tweede lid, eindigt het recht op een WGA-uitkering van de verzekerde wiens mate van
      arbeidsongeschiktheid lager is dan 35%, omdat hij met arbeid meer verdient dan 65% van het maatmaninkomen per uur,
      één jaar na de dag waarop hij niet langer gedeeltelijk arbeidsgeschikt is, doch niet eerder dan op de dag dat de
      loongerelateerde uitkering van de WGA-uitkering eindigt.
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel56
  - number: '57.1'
    text: |-
      Indien op grond van [artikel 56][ref1] het recht op een WGA-uitkering is geëindigd, herleeft het recht op
      die uitkering op de dag dat de verzekerde weer gedeeltelijk arbeidsgeschikt is, indien hij op de dag daaraan
      voorafgaand:


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel56
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel57
    references:

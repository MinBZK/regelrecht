    text: |-
      Een vrijwillige verzekering op grond van de
      [Wet op de arbeidsongeschiktheidsverzekering][ref1] die op het tijdstip waarop
      __REF001___________________________________________________________________________________________________________
      ____ in werking treden, op grond van
      [artikel 83b, onderdeel d, van de Wet op de arbeidsongeschiktheidsverzekering][ref3] wordt beëindigd, wordt
      aangemerkt als een vrijwillige verzekering op grond van [artikel 18][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0002524
      [ref2]: https://wetten.overheid.nl/BWBR0019058#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0002524#Artikel83b
      [ref4]: https://wetten.overheid.nl/BWBR0019057#Artikel18
    url: https://wetten.overheid.nl/BWBR0019057/2025-01-01#Artikel123

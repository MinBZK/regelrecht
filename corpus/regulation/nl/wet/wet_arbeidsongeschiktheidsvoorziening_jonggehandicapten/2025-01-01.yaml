  - number: 8:11
    text: |-
      Deze wet treedt in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de verschillende artikelen
      of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel811

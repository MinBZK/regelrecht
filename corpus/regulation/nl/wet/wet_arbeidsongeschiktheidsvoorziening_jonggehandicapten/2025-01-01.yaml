  - number: 8:8.1
    text: 'Het Uitvoeringsinstituut werknemersverzekeringen stelt een garantiebedrag vast voor de jonggehandicapte die:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
  - number: 8:8.1.a
    text: |-
      in de maand voor inwerkingtreding van artikel I, onderdelen S, W, Z, AA en BB van de wet van 27 mei 2020 tot
      wijziging van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten en enkele andere wetten in verband met
      verdere activering van de participatie van jonggehandicapten en het harmoniseren van de verschillende regimes
      Wajong (Stb. 2020, 173) inkomen geniet en in de daaropvolgende maand nog steeds inkomen geniet; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
  - number: 8:8.1.b
    text: |-
      in de maand voor inwerkingtreding van [artikel XII, onderdeel R, van de Verzamelwet SZW 2021][ref1] een
      arbeidsongeschiktheidsuitkering ontving, waarbij sprake was van samenloop met een uitkering als bedoeld in de
      [artikelen 3:50][ref2] of [3:51][ref3] van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten, zoals die
      luidden op de dag voor inwerkingtreding van artikel XII, onderdeel Ja, van de Verzamelwet SZW 2021.


      [ref1]: https://wetten.overheid.nl/BWBR0044455#ArtikelXII
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0044455
        artikel: XII
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 8:8.2
    text: |-
      Het garantiebedrag wordt vastgesteld aan de hand van de berekeningswijze behorende bij de inkomensvoorziening of
      arbeidsongeschiktheidsuitkering waarop de jonggehandicapte op grond van de [hoofdstukken 2][ref1] en [3][ref2],
      zoals die luidden op de dag voor inwerkingtreding van artikel I, onderdelen S, W, Z, AA en BB, van de in het eerste
      lid, onderdeel a, genoemde wet of [artikel XII, onderdeel R, van de Verzamelwet SZW 2021][ref3] recht zou hebben
      gehad in de maand van inwerkingtreding van:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk3
      [ref3]: https://wetten.overheid.nl/BWBR0044455#ArtikelXII
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
    references:
      - id: ref1
        bwb_id: BWBR0008657
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008657
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0044455
        artikel: XII
  - number: 8:8.2.a
    text: |-
      artikel I, onderdelen S, W, Z, AA en BB, van de in het eerste lid, onderdeel a, genoemde wet, waarbij het inkomen
      in afwijking van de betreffende artikelen staat voor het gemiddelde inkomen per dag over een bij algemene maatregel
      van bestuur bepaalde periode, die voor verschillende situaties verschillend kan worden vastgesteld;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
  - number: 8:8.2.b
    text: |-
      [artikel XII, onderdeel R, van de Verzamelwet SZW 2021][ref1], waarbij voor de toepassing van de
      [artikelen 3:50][ref2] of [3:51][ref3] van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten zoals die
      luidden op de dag voor inwerkingtreding van artikel XII, onderdeel Ja, van de Verzamelwet SZW 2021, in afwijking
      van die artikelen, de uitkering wordt gebruikt waarop de jonggehandicapte op grond van die artikelen in de maand
      voorafgaand aan die inwerkingtreding recht had.



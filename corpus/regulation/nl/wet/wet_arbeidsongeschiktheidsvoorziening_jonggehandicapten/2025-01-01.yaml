---
$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: wet_arbeidsongeschiktheidsvoorziening_jonggehandicapten
regulatory_layer: WET
publication_date: '2020-12-04'
valid_from: '2025-01-01'
bwb_id: BWBR0008657
url: https://wetten.overheid.nl/BWBR0008657/2025-01-01
preamble:
  text: |-
    Wij Beatrix, bij de gratie Gods, Koningin der Nederlanden, Prinses van Oranje-Nassau, enz. enz. enz.

    Allen, die deze zullen zien of horen lezen, saluut! doen te weten:

    Alzo Wij in overweging genomen hebben, dat het wenselijk is in verband met de intrekking van de Algemene
    Arbeidsongeschiktheidswet een regeling te treffen met betrekking tot een arbeidsongeschiktheidsvoorziening voor
    jonggehandicapten;

    Zo is het, dat Wij, de Raad van State gehoord, en met gemeen overleg der Staten-Generaal, hebben goedgevonden en
    verstaan, gelijk Wij goedvinden en verstaan bij deze:
  url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#ArtikelAanhef
articles:
  - number: 1:1.1
    text: 'In deze wet en de daarop berustende bepalingen wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    # Stub voor doelgroepvaststelling: of een persoon Wajong-gerechtigd is
    # wordt door UWV vastgesteld op grond van hoofdstuk 1A en hoofdstuk 2.
    # Voor de NRP/LDP-graphconnecties is dit een pass-through stub.
    machine_readable:
      execution:
        parameters:
          - name: bsn
            type: string
            required: true
          - name: is_wajong_gerechtigd
            type: boolean
            required: true
            description: |-
              Heeft of had persoon recht op arbeidsongeschiktheidsuitkering
              of arbeidsondersteuning op grond van Wajong (zowel oude als
              nieuwe Wajong). Bron: UWV. Voor doelgroepbepaling
              Ziektewet 29b lid 2 onderdeel a en c.
          - name: is_jonggehandicapt_schoolverlater
            type: boolean
            required: true
            description: |-
              Heeft persoon onder 18 of 18+ vanwege ziekte/gebrek belemmering
              ondervonden bij volgen onderwijs en gaat binnen 5 jaar arbeid
              in dienstbetrekking verrichten. Bron: UWV-vaststelling.
              Voor doelgroepbepaling Ziektewet 29b lid 1 onderdeel c en d.
        output:
          - name: is_wajong_gerechtigd
            type: boolean
          - name: is_jonggehandicapt_schoolverlater
            type: boolean
        actions:
          - output: is_wajong_gerechtigd
            value: $is_wajong_gerechtigd
          - output: is_jonggehandicapt_schoolverlater
            value: $is_jonggehandicapt_schoolverlater
  - number: 1:1.1.a
    text: '*Onze Minister:* Onze Minister van Sociale Zaken en Werkgelegenheid;'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.1.b
    text: |-
      *Uitvoeringsinstituut werknemersverzekeringen:* het Uitvoeringsinstituut werknemersverzekeringen, genoemd in
      [hoofdstuk 5 van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0013060
        hoofdstuk: '5'
  - number: 1:1.1.c
    text: |-
      *Arbeidsongeschiktheidsfonds jonggehandicapten:* het Arbeidsongeschiktheidsfonds jonggehandicapten, bedoeld in
      [artikel 5:1][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel5
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '5'
        hoofdstuk: '5'
  - number: 1:1.1.d
    text: |-
      *jonggehandicapte:* de natuurlijke persoon, bedoeld in [artikel 1a:1][ref1], [artikel 2:3][ref2] of
      [artikel 3:2][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a

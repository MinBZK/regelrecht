        afdeling: '7'
  - number: 8:8.4
    text: |-
      De jonggehandicapte, bedoeld in het eerste lid, heeft recht op een inkomensvoorziening of een
      arbeidsongeschiktheidsuitkering ter hoogte van het garantiebedrag wanneer de inkomensvoorziening of de
      arbeidsongeschiktheidsuitkering op grond van [artikel 2:40][ref1], [2:46][ref2], [3:8][ref3] of [3:8b][ref4], het
      garantiebedrag niet te boven gaat.



  - number: 1a:12.2
    text: |-
      De strafbepaling van [artikel 84, eerste lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] is
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel84
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a12
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: '84'
  - number: 2:1
    text: |-
      In dit hoofdstuk en de daarop berustende bepalingen wordt verstaan onder grondslag: het minimumloon gedeeld door
      21,75.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel21
  - number: 2:2.1
    text: |-
      In dit hoofdstuk en de daarop berustende bepalingen wordt verstaan onder maatmaninkomen: het inkomen dat
      gezonde personen, met soortgelijke opleiding en ervaring, ter plaatse waar de jonggehandicapte woont of in de
      omgeving daarvan met arbeid gewoonlijk verdienen, waarbij, zoveel doenlijk, rekening wordt gehouden met door de
      jonggehandicapte verkregen nieuwe bekwaamheden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel22
  - number: 2:2.2
    text: |-
      Bij of krachtens algemene maatregel van bestuur kan worden bepaald hoe het maatmaninkomen, bedoeld in het eerste
      lid, wordt vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel22
  - number: 2:3.1
    text: 'Jonggehandicapte in de zin van dit hoofdstuk is de ingezetene die:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel23
  - number: 2:3.1.a
    text: |-
      aansluitend op de dag waarop hij zeventien jaar wordt als rechtstreeks en objectief medisch vast te stellen gevolg
      van ziekte, gebrek, zwangerschap of bevalling gedurende 52 weken niet in staat is geweest met arbeid meer dan 75%
      van het maatmaninkomen te verdienen, terwijl niet aannemelijk is dat hij binnen een jaar volledig zal herstellen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel23
  - number: 2:3.1.b
    text: |-
      na de in onderdeel a bedoelde dag waarop hij zeventien jaar wordt als rechtstreeks en objectief medisch vast te
      stellen gevolg van ziekte, gebrek, zwangerschap of bevalling gedurende 52 weken niet in staat is geweest om met
      arbeid meer dan 75% te verdienen van het maatmaninkomen, terwijl niet aannemelijk is dat hij binnen een jaar
      volledig zal herstellen en hij in het jaar, onmiddellijk voorafgaande aan de dag waarop het als rechtstreeks en
      objectief medisch vast te stellen gevolg van ziekte, gebrek, zwangerschap of bevalling is ingetreden, gedurende ten
      minste zes maanden studerende was.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel23
  - number: 2:3.2
    text: |-
      Indien de ingezetene geen jonggehandicapte is en binnen vijf jaar na afloop van de periode van 52 weken, bedoeld
      in het eerste lid, onderdeel a of b, niet meer in staat is om meer dan 75% van het maatmaninkomen te verdienen als
      gevolg van een oorzaak die reeds aanwezig was na afloop van de termijn van 52 weken, bedoeld in het eerste lid,
      onderdeel a of b, terwijl niet aannemelijk is dat de ingezetene binnen een jaar volledig zal herstellen, dan wordt
      de ingezetene alsnog jonggehandicapte met ingang van de dag waarop hij niet meer in staat is om meer dan 75% van
      het maatmaninkomen te verdienen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel23
  - number: 2:3.3
    text: |-
      Voor het bepalen van het tijdvak van 52 weken, bedoeld in het eerste lid, is
      [artikel 3:3, tweede en vierde lid][ref1], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel23
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 2:4.1
    text: |-
      Volledig en duurzaam arbeidsongeschikt in de zin van dit hoofdstuk en de daarop berustende bepalingen is de
      jonggehandicapte die duurzaam geen mogelijkheden tot arbeidsparticipatie heeft.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel24
  - number: 2:4.2
    text: |-
      Onder duurzaam wordt de situatie verstaan waarin de mogelijkheden tot arbeidsparticipatie zich niet kunnen
      ontwikkelen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel24
  - number: 2:5.1
    text: |-
      De beoordeling van wat iemand met arbeid kan verdienen, alsmede de beoordeling of iemand volledig en duurzaam
      arbeidsongeschikt is, wordt gebaseerd op een verzekeringsgeneeskundig en voor zover nodig een arbeidskundig
      onderzoek.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
  - number: 2:5.2
    text: |-
      Bij het vaststellen van hetgeen betrokkene met arbeid kan verdienen wordt, zo mogelijk, rekening gehouden met
      verkregen nieuwe bekwaamheden, maar wordt buiten beschouwing gelaten of betrokkene de arbeid feitelijk kan
      verkrijgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
  - number: 2:5.3
    text: |-
      Onder arbeid als bedoeld in het tweede lid, wordt verstaan alle algemeen geaccepteerde arbeid waartoe betrokkene
      met zijn krachten en bekwaamheden in staat is.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
  - number: 2:5.4
    text: |-
      Bij de toepassing van dit artikel wordt buiten beschouwing gelaten, hetgeen wordt of kan worden
      ontvangen voor arbeid verricht bij wijze van sociale werkvoorziening als bedoeld in [hoofdstuk 2][ref1]
      of [3 van de Wet sociale werkvoorziening][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 2:5.5
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen met betrekking tot het eerste, tweede en derde lid, en de
      [artikelen 2:3][ref1] en [2:4][ref2], nadere en zo nodig afwijkende regels worden gesteld die voor verschillende
      groepen van jonggehandicapten verschillend kunnen zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '1'
  - number: 2:5.6
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld met betrekking tot een periodieke
      herbeoordeling om vast te stellen of betrokkene volledig en duurzaam arbeidsongeschikt is.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
  - number: 2:5.7
    text: |-
      De voordracht voor een krachtens het vijfde lid vast te stellen algemene maatregel van bestuur, dan wel de
      vaststelling van een ministeriële regeling op basis van een dergelijke algemene maatregel van bestuur, wordt niet
      eerder gedaan dan vier weken nadat het ontwerp aan beide Kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
  - number: 2:5.8
    text: |-
      Bij de beoordeling, bedoeld in het eerste lid, maakt de verzekeringsarts zo veel mogelijk gebruik van
      wetenschappelijke inzichten die de beoordeling van wat iemand met arbeid kan verdienen, alsmede de beoordeling of
      iemand volledig en duurzaam arbeidsongeschikt is kunnen ondersteunen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel25
  - number: 2:6
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen per dag in de zin van dit hoofdstuk wordt
      verstaan. Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer
      wordt genoten als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking
      wordt genomen alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel26
  - number: 2:7.1
    text: |-
      De jonggehandicapte alsmede de instelling waaraan op grond van [artikel 2:55][ref1] de inkomensvoorziening wordt
      uitbetaald, doen op verzoek of onverwijld uit eigen beweging mededeling van alle feiten of omstandigheden, waarvan
      het hen redelijkerwijs duidelijk moet zijn dat die van invloed kan zijn op het recht op arbeidsondersteuning, de
      hoogte van de inkomensvoorziening of de betaling van de inkomensvoorziening, waaronder mede is begrepen informatie
      in het kader van re-integratie, aan het Uitvoeringsinstituut werknemersverzekeringen. Deze verplichting geldt niet
      indien die feiten en omstandigheden door het Uitvoeringsinstituut werknemersverzekeringen kunnen worden vastgesteld
      op grond van bij wettelijk voorschrift als authentiek aangemerkte gegevens of kunnen worden verkregen uit bij
      ministeriële regeling aan te wijzen administraties. Bij ministeriële regeling wordt bepaald voor welke gegevens de
      tweede zin van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:7.2
    text: 'De jonggehandicapte is verplicht:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.2.a
    text: |-
      te voldoen aan elke oproep van het Uitvoeringsinstituut werknemersverzekeringen of van een of meer door het
      Uitvoeringsinstituut werknemersverzekeringen aangewezen personen om aanwezig te zijn op een door of vanwege
      het Uitvoeringsinstituut werknemersverzekeringen te bepalen plaats voor beantwoording van vragen als bedoeld in
      onderdeel b, het meewerken aan een onderzoek als bedoeld in onderdeel c of het naleven van controlevoorschriften,
      bedoeld in onderdeel d;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.2.b
    text: |-
      vragen te beantwoorden die door het Uitvoeringsinstituut werknemersverzekeringen of door een of meer door het
      Uitvoeringsinstituut werknemersverzekeringen aangewezen personen in verband met het recht op arbeidsondersteuning
      op grond van deze wet worden gesteld;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.2.c
    text: |-
      mee te werken door zich te laten onderzoeken door het Uitvoeringsinstituut werknemersverzekeringen of door een of
      meer daartoe door het Uitvoeringsinstituut werknemersverzekeringen aangewezen personen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.2.d
    text: |-
      tot naleving van door het Uitvoeringsinstituut werknemersverzekeringen vastgestelde controlevoorschriften die
      noodzakelijk zijn voor een juiste uitvoering van deze wet;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.2.e
    text: |-
      op verzoek onverwijld inzage te geven aan het Uitvoeringsinstituut
      werknemersverzekeringen in een op hem betrekking hebben document als bedoel in
      [artikel 1, eerste lid, onder 1° tot en met 3°, van de Wet op de identificatieplicht][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0006297#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0006297
        artikel: '1'
  - number: 2:7.2.f
    text: |-
      zich te onthouden van zeer ernstige misdragingen jegens de met de uitvoering van deze wet belaste personen en
      instanties tijdens het verrichten van hun werkzaamheden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.3
    text: 'De verplichtingen, bedoeld in het eerste en tweede lid, zijn van overeenkomstige toepassing op:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.3.a
    text: de ingezetene die een aanvraag voor het recht op arbeidsondersteuning heeft ingediend;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.3.b
    text: |-
      de persoon die de leeftijd van 18 jaar nog niet heeft bereikt en ten aanzien van wie of ten behoeve van wie een re-
      integratie-instrument als bedoeld in [artikel 2:20][ref1], [2:22][ref2] of [2:23][ref3] is toegekend of waarvan
      toekenning wordt overwogen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:7.4
    text: 'De verplichtingen, bedoeld in het eerste en tweede lid, zijn van overeenkomstige toepassing ten aanzien van:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.4.a
    text: |-
      het re-integratiebedrijf dat in opdracht van het Uitvoeringsinstituut werknemersverzekeringen werkzaamheden
      verricht; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.4.b
    text: |-
      personen die met toestemming van het Uitvoeringsinstituut werknemersverzekeringen zijn aangewezen door een re-
      integratiebedrijf als bedoeld in onderdeel b, voor zover dit noodzakelijk is voor de uitvoering van de bij wet of
      overeenkomst aan deze personen en rechtspersonen opgedragen taken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.5
    text: |-
      De jonggehandicapte die recht heeft op arbeidsondersteuning op grond van dit hoofdstuk en die bij deelname aan een
      re-integratietraject zijn re-integratieverplichtingen niet naleeft, deelt de reden daarvan onmiddellijk mede aan
      het re-integratiebedrijf.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.6
    text: |-
      De ingezetene die een aanvraag voor arbeidsondersteuning heeft ingediend of de jonggehandicapte die recht heeft
      op arbeidsondersteuning op grond van dit hoofdstuk zijn verplicht te voldoen aan het voorschrift, gegeven door het
      Uitvoeringsinstituut werknemersverzekeringen of de door hem daartoe aangewezen deskundige, om zich ter observatie
      te doen opnemen of te verblijven in een aangewezen inrichting mits observatie of verblijf in een aangewezen
      inrichting noodzakelijk is voor de vaststelling van de omvang van de arbeidsbeperking of bijdraagt aan genezing of
      aan behoud, herstel of bevordering van de mogelijkheid tot het verrichten van arbeid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
  - number: 2:7.7
    text: |-
      De werkgever ten behoeve van wie het Uitvoeringsinstituut werknemersverzekeringen de aanspraak op een geldelijke
      beloning voor de verrichte arbeid, op grond van [artikel 2:20][ref1] heeft verminderd of die daarvoor een verzoek
      heeft gedaan, is verplicht aan het Uitvoeringsinstituut werknemersverzekeringen op zijn verzoek of onverwijld uit
      eigen beweging mededeling te doen van alle feiten en omstandigheden, waarvan hem redelijkerwijs duidelijk moet zijn
      dat zij van invloed kunnen zijn op de toekenning of de duur en hoogte van de vermindering.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel27
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:8.1
    text: |-
      De ingezetene die een aanvraag voor het recht op arbeidsondersteuning heeft ingediend en de jonggehandicapte
      beperken het bestaan van arbeidsongeschiktheid of verminderde arbeidsgeschiktheid, voor zover dit redelijkerwijs
      van hen verwacht mag worden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel28
  - number: 2:8.2
    text: 'De ingezetene die recht op arbeidsondersteuning heeft aangevraagd is verplicht:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel28
  - number: 2:8.2.a
    text: mee te werken aan het opstellen van het participatieplan; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel28
  - number: 2:8.2.b
    text: |-
      een naar algemeen medische maatstaven adequate behandeling te ondergaan voor zijn ziekte of gebrek die bijdraagt
      aan genezing of aan behoud, herstel of bevordering van de mogelijkheid tot het verrichten van arbeid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel28
  - number: 2:9
    text: |-
      De plichten, bedoeld in de [artikelen 2:7][ref1], [2:8][ref2], [2:31][ref3] en [2:32][ref4] worden, indien
      de in die artikelen genoemde ingezetene of jonggehandicapte een wettelijk vertegenwoordiger heeft, door die
      vertegenwoordiger nageleefd. Voor zover de plichten slechts door de ingezetene of jonggehandicapte kunnen worden
      nageleefd, bevordert de wettelijk vertegenwoordiger die naleving.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel29
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref4
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:10
    text: |-
      Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot de [artikelen 2:7][ref1]
      en [2:8][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel210
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:11.1
    text: |-
      Voor de toepassing van dit hoofdstuk en de daarop berustende bepalingen worden de volgende uitsluitingsgronden
      onderscheiden:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
  - number: 2:11.1.a
    text: het rechtens zijn vrijheid zijn ontnomen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
  - number: 2:11.1.b
    text: het zich onttrekken aan de tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
  - number: 2:11.1.c
    text: het niet in Nederland wonen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
  - number: 2:11.1.d
    text: |-
      het als vreemdeling niet rechtmatig verblijf houden in de zin van
      [artikel 8, onderdelen a tot en met e en l, van de Vreemdelingenwet 2000][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 2:11.1.e
    text: |-
      het bereiken of bereikt hebben van de pensioengerechtigde leeftijd, bedoeld in
      [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: 2:11.1.f
    text: een uitreiziger zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
  - number: 2:11.2
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat de uitsluitingsgrond, bedoeld in het eerste lid,
      onderdeel d, niet geldt ten aanzien van vreemdelingen die, na rechtmatig verblijf te hebben gehouden in de zin van
      [artikel 8, onder a tot en met e en l, van de Vreemdelingenwet 2000][ref1], rechtmatig in Nederland verblijf hebben
      als bedoeld in artikel 8, onder g of h, van de Vreemdelingenwet 2000.


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel211
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 2:12.1
    text: |-
      In afwijking van de [artikelen 2:15][ref1] en [2:16][ref2] is [artikel 2:11, eerste lid, onderdeel a][ref3], eerst
      van toepassing met ingang van de dag dat de persoon één maand rechtens zijn vrijheid is ontnomen, tenzij op de dag
      voorafgaande aan de vrijheidsontneming geen recht bestaat op arbeidsondersteuning op grond van artikel 2:11, eerste
      lid, onderdeel b.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel212
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:12.2
    text: |-
      [Artikel 2:11, eerste lid, onderdeel a][ref1], is niet van toepassing op bij algemene maatregel van bestuur aan
      te wijzen categorieën personen waarbij tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel
      plaatsvindt buiten een justitiële inrichting.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel212
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:12.3
    text: |-
      Voor de toepassing van het eerste lid, worden perioden van vrijheidsontneming samengeteld, indien zij elkaar met
      een onderbreking van minder dan vier weken opvolgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel212
  - number: 2:13.1
    text: |-
      In afwijking van de [artikelen 2:15][ref1] en [2:16][ref2] is [artikel 2:11, eerste lid, onderdeel c][ref3], eerst
      van toepassing met ingang van de eerste dag van de maand volgend op die waarin de jonggehandicapte buiten Nederland
      is gaan wonen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel213
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:13.2
    text: |-
      Het eerste lid is tevens van toepassing op de jonggehandicapte die buiten Nederland is gaan wonen en op wie
      [artikel 1:2, derde lid][ref1], van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel213
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 2:13.3
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan [artikel 2:11, eerste lid, onderdeel c][ref1], buiten
      toepassing laten of daarvan afwijken voor zover toepassing, gelet op het belang van het eindigen van het recht op
      arbeidsondersteuning indien de jonggehandicapte buiten Nederland gaat wonen, zal leiden tot een onbillijkheid van
      overwegende aard.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel213
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:14
    text: |-
      Indien voor het vaststellen van het recht op arbeidsondersteuning op grond van dit hoofdstuk, in het kader van een
      aanvraag voor de toekenning van het recht op arbeidsondersteuning op grond van deze wet, naar het oordeel van het
      Uitvoeringsinstituut werknemersverzekeringen een medisch onderzoek nodig is en de betrokkene niet meewerkt aan dat
      onderzoek, blijven eventuele uit dit hoofdstuk voortvloeiende aanspraken op arbeidsondersteuning buiten aanmerking,
      voor zolang het recht op arbeidsondersteuning niet kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel214
  - number: 2:15.1
    text: 'De jonggehandicapte heeft op aanvraag recht op arbeidsondersteuning op grond van dit hoofdstuk, indien:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.1.a
    text: |-
      hij sinds de dag waarop hij jonggehandicapte werd niet in staat is gebleven meer dan 75% van het maatmaninkomen
      te verdienen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.1.b
    text: |-
      op hem geen uitsluitingsgrond als bedoeld in [artikel 2:11][ref1] van toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:15.1.c
    text: hij de leeftijd van achttien jaar heeft bereikt;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.1.d
    text: |-
      hij de aanvraag, bedoeld in de aanhef, heeft ingediend op of na de datum van inwerkingtreding van de Wet van 3
      december 2009 tot wijziging van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten in verband met het
      bevorderen van de participatie van jonggehandicapten door werk en arbeidsondersteuning (Stb. 2009, 580).
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.2
    text: |-
      Het recht op arbeidsondersteuning op grond van dit hoofdstuk ontstaat op de dag dat aan de voorwaarden, bedoeld
      in het eerste lid, wordt voldaan doch niet eerder dan zestien weken na de dag waarop de aanvraag om het recht op
      arbeidsondersteuning, bedoeld in dit artikel, werd ingediend.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.3
    text: |-
      In afwijking van het tweede lid ontstaat het recht op arbeidsondersteuning op de dag waarop de aanvraag om het
      recht op arbeidsondersteuning werd ingediend, indien:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.3.a
    text: de jonggehandicapte volledig en duurzaam arbeidsongeschikt is; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
  - number: 2:15.3.b
    text: |-
      het recht op arbeidsondersteuning op grond van [artikel 2:17, eerste of tweede lid][ref1], herleeft.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
  - number: 2:15.4
    text: |-
      Recht op arbeidsondersteuning ontstaat niet, indien dit zou ingaan op of na de dag van inwerkingtreding van
      [artikel III, onderdeel B, van de Invoeringswet Participatiewet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0035333#ArtikelIII
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
    references:
      - id: ref1
        bwb_id: BWBR0035333
        artikel: III
  - number: 2:15.5
    text: |-
      In afwijking van het vierde lid kan het recht op arbeidsondersteuning wel herleven op grond van
      [artikel 2:17][ref1] of ontstaan op grond van [artikel 8:10, vierde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel215
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '8'
        hoofdstuk: '8'
  - number: 2:16.1
    text: 'Het recht op arbeidsondersteuning op grond van dit hoofdstuk eindigt:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
  - number: 2:16.1.a
    text: twee maanden na de dag dat de jonggehandicapte in staat is meer dan 75% van het maatmaninkomen te verdienen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
  - number: 2:16.1.b
    text: |-
      op de dag dat er op hem een uitsluitingsgrond als bedoeld in [artikel 2:11][ref1] van toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:16.1.c
    text: indien het Uitvoeringsinstituut werknemersverzekeringen daartoe op zijn verzoek besluit; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
  - number: 2:16.1.d
    text: indien de jonggehandicapte overlijdt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
  - number: 2:16.2
    text: |-
      In afwijking van het eerste lid, onderdeel a, eindigt het recht op arbeidsondersteuning van de jonggehandicapte
      die arbeid verricht, niet, tenzij de jonggehandicapte ten minste 75% van het maatmaninkomen verdient nadat
      hij vijf jaar arbeid heeft verricht. Arbeid verricht bij wijze van sociale werkvoorziening als bedoeld in
      [hoofdstuk 2][ref1] of [3 van de Wet sociale werkvoorziening][ref2] wordt buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 2:16.3
    text: |-
      Het recht op arbeidsondersteuning eindigt niet op grond van het eerste lid, onderdeel a, of
      het tweede lid, indien de jonggehandicapte gebruik maakt van een voorziening als bedoeld in
      [artikel 2:22, tweede lid, onderdeel a, b of d][ref1] of [2:23, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:16.4
    text: |-
      Bij ministeriële regeling kan worden bepaald dat het tweede lid voor onbeperkte duur toepassing vindt ten aanzien
      van bij die ministeriële regeling te bepalen groepen jonggehandicapten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel216
  - number: 2:17.1
    text: |-
      Indien op grond van [artikel 2:16, eerste lid, onderdeel a, of tweede lid][ref1], het recht op arbeidsondersteuning
      is geëindigd, herleeft op aanvraag het recht op arbeidsondersteuning als de jonggehandicapte niet in staat is om
      meer dan 75% van het maatmaninkomen te verdienen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel217
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
  - number: 2:17.2
    text: |-
      Indien op grond van [artikel 2:16, eerste lid, onderdeel b][ref1], geen recht op arbeidsondersteuning meer
      bestaat omdat op de persoon die recht had op arbeidsondersteuning één of meer uitsluitingsgronden als bedoeld in
      [artikel 2:11, eerste lid, onderdeel a, b, c, d of f][ref2] van toepassing waren, herleeft op aanvraag het recht op
      arbeidsondersteuning wanneer zich geen van deze uitsluitingsgronden meer voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel217
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:17.3
    text: |-
      Indien het recht op arbeidsondersteuning is geëindigd op grond van [artikel 2:16, eerste lid, onderdeel c][ref1],
      herleeft het recht op arbeidsondersteuning op aanvraag van de jonggehandicapte indien zich geen uitsluitingsgrond
      als bedoeld in [artikel 2:11][ref2] voordoet. Het recht op arbeidsondersteuning herleeft niet eerder dan een jaar
      na de dag waarop het recht op arbeidsondersteuning is geëindigd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel217
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:18.1
    text: |-
      Uiterlijk op de dag dat het recht op arbeidsondersteuning ontstaat, stelt het Uitvoeringsinstituut
      werknemersverzekeringen in samenspraak met de jonggehandicapte een ontwerpparticipatieplan op waarin de rechten, de
      verplichtingen en de gevolgen van het niet naleven van die verplichtingen van de jonggehandicapte en de voorwaarden
      voor het recht op inkomensondersteuning, bedoeld in [artikel 2:39][ref1], zijn vermeld. Indien de jonggehandicapte
      de volledige zorg heeft voor een tot zijn last komend kind tot vijf jaar bevat het ontwerpparticipatieplan
      afspraken over de wijze waarop arbeid en zorg kunnen worden gecombineerd. Bij deze afspraken worden in ieder
      geval de mogelijkheden tot scholing en opleiding betrokken. Het participatieplan wordt na de vijfde werkdag na de
      opstelling van het ontwerpparticipatieplan vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '7'
  - number: 2:18.2
    text: |-
      In het participatieplan kan worden bepaald dat ten behoeve van de inschakeling in de arbeid van de jonggehandicapte
      de volgende instrumenten kunnen worden ingezet:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
  - number: 2:18.2.a
    text: |-
      een re-integratietraject als bedoeld in
      [artikel 30a, achtste lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 2:18.2.b
    text: |-
      loondispensatie als bedoeld in [artikel 2:20][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:18.2.c
    text: |-
      loonkostensubsidie als bedoeld in [artikel 2:21][ref1] zoals dat luidde op 31 december 2011;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:18.2.d
    text: |-
      arbeidsplaatsvoorziening en voorziening ter ondersteuning van toeleiding naar arbeid als bedoeld in
      [artikel 2:22][ref1] en [2:23][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:18.2.e
    text: |-
      proefplaatsing als bedoeld in [artikel 2:24][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:18.3
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen evalueert, in samenspraak met de jonggehandicapte, bedoeld in het
      eerste lid, periodiek het participatieplan en stelt dit zo nodig bij.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel218
  - number: 2:19
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan de jonggehandicapte tevens een aanbod van concrete passende
      arbeid als bedoeld in [artikel 30a, tweede lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1]
      doen indien dat niet in het participatieplan wordt genoemd.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel219
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 2:20.1
    text: |-
      Indien de arbeidsprestatie van een werknemer die recht heeft op arbeidsondersteuning in een bepaalde functie,
      maar geen functie waarin hij werkzaam is als werknemer in de zin van de Wet sociale werkvoorziening of op een
      arbeidsovereenkomst als bedoeld in artikel 7 van die wet, ten gevolge van ziekte of gebrek duidelijk minder
      is dan de arbeidsprestatie die een geldelijke beloning van het minimumloon rechtvaardigt, vermindert het
      Uitvoeringsinstituut werknemersverzekeringen op verzoek van de betrokken werkgever of werknemer de hoogte van de
      aanspraak op een geldelijke beloning voor de verrichte arbeid naar evenredigheid, in afwijking van hetgeen bij en
      krachtens de [Wet minimumloon en minimumvakantiebijslag][ref1] is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0002638
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel220
    references:
      - id: ref1
        bwb_id: BWBR0002638
  - number: 2:20.2
    text: |-
      Elk beding waarbij een geldelijke beloning voor de verrichte arbeid wordt overeengekomen die lager is dan de
      beloning, vastgesteld op grond van het eerste lid is nietig.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel220
  - number: 2:22.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan aan de jonggehandicapte die arbeid in dienstbetrekking
      verricht, of die arbeid in dienstbetrekking gaat verrichten, doch niet werkzaam is of zal zijn als werknemer in
      de zin van de [Wet sociale werkvoorziening][ref1], of die scholing of opleiding in het kader van de bevordering
      van de inschakeling in het arbeidsproces volgt of gaat volgen, of arbeid op een proefplaats verricht of gaat
      verrichten, met uitzondering van de jonggehandicapte, die werkzaam is als werknemer in de zin van de Wet sociale
      werkvoorziening, op aanvraag voorzieningen toekennen die strekken tot behoud, herstel of bevordering van de
      mogelijkheid tot het verrichten van arbeid, het volgen van de scholing of opleiding of het verrichten van arbeid op
      die proefplaats.


      [ref1]: https://wetten.overheid.nl/BWBR0008903
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
    references:
      - id: ref1
        bwb_id: BWBR0008903
  - number: 2:22.2
    text: 'Onder voorzieningen als bedoeld in het eerste lid worden uitsluitend verstaan:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:22.2.a
    text: |-
      vervoersvoorzieningen die er toe strekken dat de jonggehandicapte, bedoeld in het eerste lid, zijn werkplek of
      opleidingslocatie kan bereiken;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:22.2.b
    text: intermediaire activiteiten ten behoeve van jonggehandicapten met een visuele, auditieve of motorische handicap;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:22.2.c
    text: |-
      meeneembare voorzieningen ten behoeve van de inrichting van de arbeidsplaats, de productie- en werkmethoden, de
      inrichting van de opleidingsplaats of de proefplaats en de bij de arbeid of opleiding te gebruiken hulpmiddelen,
      die in overwegende mate op het individu van de jonggehandicapte, bedoeld in het eerste lid, zijn afgestemd; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:22.2.d
    text: |-
      noodzakelijke persoonlijke ondersteuning bij het verrichten van de aan de jonggehandicapte opgedragen taken, indien
      die ondersteuning een compensatie vormt voor zijn beperkingen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:22.3
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan aan de jonggehandicapte, bedoeld in het eerste lid, op
      aanvraag vervoersvoorzieningen toekennen die strekken tot verbetering van zijn leefomstandigheden en die deel
      uitmaken van dan wel rechtstreeks samenhangen met voorzieningen als bedoeld in het tweede lid, onderdeel a.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:22.4
    text: Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot dit artikel.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel222
  - number: 2:23.1
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld op grond waarvan het
      Uitvoeringsinstituut werknemersverzekeringen op aanvraag van de jonggehandicapte, die arbeid als zelfstandige
      verricht of gaat verrichten, in het kader van de bevordering van de inschakeling in en ondersteuning bij de arbeid
      als zelfstandige, voorzieningen kan verstrekken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel223
  - number: 2:23.2
    text: |-
      Voorzieningen als bedoeld in het eerste lid worden uitsluitend verstrekt in verband met een naar het oordeel van
      het Uitvoeringsinstituut werknemersverzekeringen structurele functionele beperking die het gevolg is van een ziekte
      of handicap die:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel223
  - number: 2:23.2.a
    text: bij de aanvang van de arbeid als zelfstandige aanwezig was, of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel223
  - number: 2:23.2.b
    text: |-
      binnen drie jaar na de aanvang van de arbeid als zelfstandige is ontstaan, indien bij de aanvang van de arbeid als
      zelfstandige reeds een ziekte of handicap aanwezig was.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel223
  - number: 2:23.3
    text: |-
      Voorzieningen als bedoeld in het eerste lid worden niet verstrekt of worden beëindigd indien het inkomen van de
      jonggehandicapte die arbeid als zelfstandige verricht, na een bij algemene maatregel van bestuur te bepalen aantal
      kalenderjaren na de aanvang van de arbeid als zelfstandige, meer bedraagt dan een bij die maatregel vast te stellen
      bedrag. Bij of krachtens die maatregel wordt tevens bepaald wat onder inkomen als bedoeld in de eerste zin wordt
      verstaan.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel223
  - number: 2:24.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan, in het kader van de bevordering van de inschakeling in de
      arbeid, toestemming verlenen aan de jonggehandicapte die recht heeft op arbeidsondersteuning om op een proefplaats
      bij een werkgever gedurende maximaal zes maanden onbeloonde werkzaamheden te verrichten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.2
    text: |-
      Tijdens het verrichten van werkzaamheden op een proefplaats als bedoeld in het eerste lid wordt het recht op
      arbeidsondersteuning en de inkomensvoorziening niet beëindigd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.3
    text: 'De onbeloonde werkzaamheden op een proefplaats als bedoeld in het eerste lid zijn:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.3.a
    text: |-
      werkzaamheden, waartoe de jonggehandicapte, bedoeld in het eerste lid, met zijn krachten en bekwaamheden in staat
      is;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.3.b
    text: |-
      werkzaamheden, waarbij de werkgever, bij wie de proefplaatsing geschiedt, een aansprakelijkheidsverzekering ten
      behoeve van de jonggehandicapte, bedoeld in het eerste lid, heeft afgesloten;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.3.c
    text: |-
      werkzaamheden, die de jonggehandicapte, bedoeld in het eerste lid, niet reeds eerder onbeloond op een proefplaats
      bij die werkgever of diens rechtsvoorganger heeft verricht; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.3.d
    text: |-
      werkzaamheden, waarbij er, naar het oordeel van het Uitvoeringsinstituut werknemersverzekeringen, een reeël
      uitzicht is op een op de onbeloonde werkzaamheden aansluitende dienstbetrekking van dezelfde of grotere omvang voor
      ten minste 6 maanden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.4
    text: |-
      Indien de werkzaamheden, bedoeld in het eerste lid, wegens ziekte worden onderbroken, wordt deze periode voor de
      toepassing van dat lid buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:24.5
    text: Bij ministeriële regeling kunnen nadere regels worden gesteld met betrekking tot de uitvoering van dit artikel.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel224
  - number: 2:27
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld met betrekking tot de aanvraag van voorzieningen,
      bedoeld in de [artikelen 2:22][ref1] en [2:23][ref2] en van toestemming als bedoeld in [artikel 2:24][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel227
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:28
    text: |-
      Indien het Uitvoeringsinstituut werknemersverzekeringen ten behoeve van een jonggehandicapte die
      recht heeft op arbeidsondersteuning werkzaamheden door een re-integratiebedrijf laat verrichten, is
      [artikel 30a, tweede, zesde en zevende lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel228
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 2:29.1
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot door het Uitvoeringsinstituut
      werknemersverzekeringen te verstrekken subsidie aan een rechtspersoon die in het kader van de uitoefening van
      beroep of bedrijf door scholing de inschakeling van jonggehandicapten met ernstige scholingsbelemmeringen in de
      arbeid bevordert.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel229
  - number: 2:29.2
    text: |-
      Bij de subsidieverlening, bedoeld in het eerste lid, kunnen aan de subsidie-ontvanger verplichtingen worden
      opgelegd omtrent het hanteren van een registratiesysteem waaruit blijkt of het doel van de subsidie is bereikt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel229
  - number: 2:30.1
    text: |-
      De [artikelen 2:18 tot en met 2:20][ref1], [2:21][ref2] zoals dat luidde op 31 december 2011 en [2:24][ref3] zijn
      niet van toepassing op de jonggehandicapte die volledig en duurzaam arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel230
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:30.2
    text: |-
      In afwijking van het eerste lid is [artikel 2:20][ref1] wel van toepassing op de jonggehandicapte die volledig
      en duurzaam arbeidsongeschikt is, indien ten aanzien van die jonggehandicapte voor 1 januari 2018 loondispensatie
      was verleend en voor zover het een verzoek om loondispensatie betreft voor dezelfde functie als waarvoor de
      loondispensatie voor 1 januari 2018 was verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel230
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:31.1
    text: |-
      De jonggehandicapte die recht heeft op arbeidsondersteuning is verplicht in voldoende mate te trachten
      mogelijkheden tot het verrichten van passende arbeid te behouden of te verkrijgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
  - number: 2:31.2
    text: |-
      Ter naleving van de plicht, bedoeld in het eerste lid, is de jonggehandicapte die recht heeft op
      arbeidsondersteuning in elk geval verplicht:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
  - number: 2:31.2.a
    text: |-
      zich geneeskundig te laten behandelen of aanwijzingen van een arts op te volgen indien het Uitvoeringsinstituut
      werknemersverzekeringen of het re-integratiebedrijf in opdracht van het Uitvoeringsinstituut
      werknemersverzekeringen daartoe opdracht geeft en de behandeling of de aanwijzing bijdraagt aan genezing of
      aan behoud, herstel of bevordering van de mogelijkheid tot het verrichten van arbeid, en zijn genezing niet te
      belemmeren;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
  - number: 2:31.2.b
    text: |-
      mee te werken aan het opstellen van het re-integratieplan, bedoeld in
      [artikel 30a, zesde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 2:31.2.c
    text: |-
      te voldoen aan verplichtingen die zijn opgenomen in het re-integratieplan, bedoeld in
      [artikel 30a, zesde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 2:31.2.d
    text: |-
      mee te werken aan activiteiten of werkzaamheden, gericht op inschakeling in de arbeid, die het Uitvoeringsinstituut
      werknemersverzekeringen wenselijk acht voor verkrijging van de mogelijkheden tot het verrichten van passende
      arbeid;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
  - number: 2:31.2.e
    text: |-
      mee te werken aan aanpassing van de arbeidsplaats en aan persoonsgebonden voorzieningen die het
      Uitvoeringsinstituut werknemersverzekeringen verstrekt voor verkrijging van mogelijkheden tot het verrichten van
      passende arbeid en zo nodig te trachten die aanpassing en die voorzieningen te verkrijgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
  - number: 2:31.3
    text: |-
      De verplichtingen, bedoeld in het eerste en tweede lid, zijn niet van toepassing op de persoon die een
      dienstbetrekking heeft als bedoeld in [hoofdstuk 2][ref1] of [3 van de Wet sociale werkvoorziening][ref2] of die
      naar het oordeel van het Uitvoeringsinstituut werknemersverzekeringen niet in staat is tot het verrichten van
      passende arbeid.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 2:31.4
    text: |-
      In het re-integratieplan, bedoeld in
      [artikel 30a, zesde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1], kan voor de
      jonggehandicapte de verplichting worden opgenomen om een aanbod van concrete passende arbeid te accepteren.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel231
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 2:32.1
    text: |-
      De jonggehandicapte die recht heeft op arbeidsondersteuning en zijn resterende verdiencapaciteit
      niet volledig benut, is verplicht zich als werkzoekende bij het Uitvoeringsinstituut
      werknemersverzekeringen te laten registreren, indien hem daartoe het recht toekomt op grond van
      [artikel 30b, eerste lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] en het
      Uitvoeringsinstituut werknemersverzekeringen hem dit opdraagt. De verplichting, bedoeld in de eerste zin, is
      niet van toepassing op de jonggehandicapte die een dienstbetrekking heeft als bedoeld in [hoofdstuk 2][ref2]
      of [3 van de Wet sociale werkvoorziening][ref3] of die naar het oordeel van het Uitvoeringsinstituut
      werknemersverzekeringen niet in staat is tot het verrichten van passende arbeid.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30b
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref3]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30b
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref3
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 2:32.2
    text: 'De jonggehandicapte die recht heeft op arbeidsondersteuning en arbeid in dienstbetrekking verricht is verplicht:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:32.2.a
    text: |-
      zich te onthouden van verwijtbaar gedrag dat aangemerkt kan worden als een dringende reden in de zin van
      [artikel 678 van Boek 7 van het Burgerlijk Wetboek][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel678
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '678'
  - number: 2:32.2.b
    text: |-
      de dienstbetrekking niet door of op zijn verzoek te laten beëindigen zonder dat aan de voortzetting ervan zodanige
      bezwaren waren verbonden, dat deze voortzetting redelijkerwijs niet van hem kon worden gevergd;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:32.2.c
    text: in voldoende mate te trachten passende arbeid te verkrijgen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:32.2.d
    text: |-
      geen eisen te stellen in verband met de door hem te verrichten arbeid die het aanvaarden of verkrijgen van passende
      arbeid belemmeren.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:32.3
    text: |-
      Het door de jonggehandicapte, bedoeld in het tweede lid, niet voeren van verweer tegen of het instemmen met
      een beëindiging van de dienstbetrekking door of op verzoek van de werkgever leidt niet tot overtreding van de
      verplichting, bedoeld in het tweede lid, aanhef en onderdeel a.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:32.4
    text: |-
      In dit hoofdstuk wordt onder passende arbeid verstaan algemeen geaccepteerde arbeid waartoe de betrokkene met zijn
      krachten en bekwaamheden in staat is.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:32.5
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld op grond waarvan aan jonggehandicapten
      die recht hebben op arbeidsondersteuning in individuele gevallen tijdelijk ontheffing kan worden verleend van de
      voorwaarden, bedoeld in het tweede lid, onderdelen c of d.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel232
  - number: 2:33.1
    text: |-
      Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot de [artikelen 2:31][ref1]
      en [2:32, eerste en tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel233
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:33.2
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld waarbij bepaalde groepen jonggehandicapten worden
      vrijgesteld van verplichtingen, hun op grond van [artikel 2:31][ref1] opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel233
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:34
    text: |-
      De [artikelen 2:31][ref1] en [2:32, eerste lid][ref2], zijn niet van toepassing op de jonggehandicapte die volledig
      en duurzaam arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel234
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:34a
    text: |-
      De [artikelen 2:31, eerste lid en tweede lid, onderdelen b en c][ref1], en [2:32][ref2] zijn niet van toepassing op
      de jonggehandicapte die studerende is. In afwijking van [artikel 1:4, eerste lid][ref3], is de eerste zin ook van
      toepassing op de jonggehandicapte die studiefinanciering in de vorm van het levenlanglerenkrediet ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel234a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 2:35
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan controlevoorschriften vaststellen. Deze voorschriften gaan
      niet verder dan strikt noodzakelijk is voor een juiste uitvoering van dit hoofdstuk.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel235
  - number: 2:38
    text: |-
      Opgeroepenen en, indien hun toestand geleide nodig maakt, mede hun geleiders, worden reiskosten, verblijfkosten
      en tijdverlies vergoed in de gevallen en volgens regels die door het Uitvoeringsinstituut werknemersverzekeringen
      worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel238
  - number: 2:39.1
    text: |-
      De jonggehandicapte die recht heeft op arbeidsondersteuning ontvangt op aanvraag inkomensondersteuning met ingang
      van de dag waarop de aanvraag werd ingediend, doch niet voor de dag waarop recht op arbeidsondersteuning ontstaat.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel239
  - number: 2:39.2
    text: |-
      In afwijking van het eerste lid ontvangt de jonggehandicapte de inkomensondersteuning, bedoeld in het eerste lid,
      niet eerder dan de dag met ingang waarvan de jonggehandicapte aan de voorwaarde, bedoeld in het derde lid, voldoet.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel239
  - number: 2:39.3
    text: |-
      De jonggehandicapte die recht heeft op arbeidsondersteuning ontvangt inkomensondersteuning als bedoeld in het
      eerste lid, indien en zolang hij meewerkt aan het opstellen van het participatieplan.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel239
  - number: 2:39.5
    text: |-
      De voorwaarde, bedoeld in het derde lid, is niet van toepassing op de persoon die een dienstbetrekking heeft als
      bedoeld in [hoofdstuk 2][ref1] of [3 van de Wet sociale werkvoorziening][ref2] of die naar het oordeel van het
      Uitvoeringsinstituut werknemersverzekeringen niet in staat is tot het verrichten van passende arbeid.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel239
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 2:39.6
    text: |-
      De voorwaarde, bedoeld in het derde lid, is niet van toepassing op de jonggehandicapte die studerende is. In
      afwijking van [artikel 1:4, eerste lid][ref1], is de eerste zin ook van toepassing op de jonggehandicapte die
      studiefinanciering in de vorm van het levenlanglerenkrediet ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel239
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 2:40.1
    text: |-
      De inkomensondersteuning, bedoeld in [artikel 2:39, eerste lid][ref1], bedraagt per dag:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '7'
  - number: 2:40.1.a
    text: |-
      voor een jonggehandicapte die werkt met loondispensatie als bedoeld in [artikel 2:20][ref1]: (0,7 * G) – (0,7 *
      compensatiefactor * I); en


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:40.1.b
    text: 'voor andere jonggehandicapten: 0,7 * (G – I).'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.2
    text: 'De compensatiefactor bedraagt: (LW – 0,3) / (0,7 x LW).'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.3
    text: |-
      Voor zover dit leidt tot een hoger bedrag aan inkomensondersteuning per dag, bedraagt de inkomensondersteuning per
      dag, in afwijking van het eerste lid, onderdeel a: (I/LW) – I.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.4
    text: |-
      In afwijking van het eerste lid, onderdeel a, en het derde lid bedraagt de inkomensondersteuning, bedoeld in
      [artikel 2:39, eerste lid][ref1], per dag, bij een inkomen per dag dat naast een gedispenseerd loon tevens is
      opgebouwd uit andere inkomensbestanddelen:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '7'
  - number: 2:40.4.a
    text: (0,7 * G) – (0,7 * ((CF * Ia)+Io)); of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.4.b
    text: ((Ia/LW) + Io)–I, voor zover dit leidt tot een hoger bedrag aan inkomensondersteuning per dag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.5
    text: 'In het eerste tot en met het vierde lid staat:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.5.a
    text: G voor grondslag;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.5.b
    text: I voor het inkomen per dag;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.5.c
    text: |-
      LW voor de verminderde arbeidsprestatie, bedoeld in [artikel 2:20, eerste lid][ref1], uitgedrukt in een
      percentage;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:40.5.d
    text: Ia voor de gedispenseerde inkomensbestanddelen per dag;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.5.e
    text: Io voor de overige niet gedispenseerde inkomensbestanddelen per dag, waarbij Io = I-Ia; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:40.5.f
    text: CF voor de compensatiefactor, vastgesteld op basis van LW.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel240
  - number: 2:45.1
    text: |-
      De jonggehandicapte die recht heeft op arbeidsondersteuning en volledig en duurzaam arbeidsongeschikt is ontvangt
      een uitkering.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel245
  - number: 2:45.2
    text: |-
      [Artikel 2:39][ref1] is niet van toepassing op de jonggehandicapte die volledig en duurzaam arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel245
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '7'
  - number: 2:46.1
    text: |-
      De uitkering, bedoeld in [artikel 2:45][ref1], bedraagt per dag 0,75 * (G – I).


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel246
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '3'
        afdeling: '7'
  - number: 2:46.2
    text: |-
      [Artikel 1a:4, derde lid][ref1], is van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel246
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 2:46a.1
    text: |-
      Indien de volledige en duurzaam arbeidsongeschikte gedurende een aaneengesloten termijn van twaalf kalendermaanden
      per dag een inkomen verwerft dat meer bedraagt dan 20% van het maatmaninkomen, roept het Uitvoeringsinstituut
      werknemersverzekeringen de jonggehandicapte op voor een onderzoek naar het voortbestaan van volledige en duurzame
      arbeidsongeschiktheid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel246a
  - number: 2:46a.2
    text: |-
      Het eerste lid is niet van toepassing op bij ministeriële regeling te bepalen groepen volledig en duurzaam
      arbeidsongeschikten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel246a
  - number: 2:47.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen stelt vast of recht op arbeidsondersteuning op grond van
      [artikel 2:15][ref1] ontstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel247
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '4'
  - number: 2:47.2
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de gegevens die door de jonggehandicapte
      bij de aanvraag worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel247
  - number: 2:48
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen stelt vast of aanspraak op inkomensondersteuning als bedoeld in
      [artikel 2:39, eerste lid][ref1], bestaat.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel248
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '7'
  - number: 2:49.1
    text: |-
      De inkomensvoorziening wordt betaald door het Uitvoeringsinstituut werknemersverzekeringen. De betaling geschiedt
      in tijdvakken van een maand.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
  - number: 2:49.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen schort de betaling van de inkomensvoorziening op of schorst de
      betaling, indien het op grond van duidelijke aanwijzingen van oordeel is of het gegronde vermoeden heeft dat:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
  - number: 2:49.2.a
    text: aanspraak op inkomensvoorziening niet of niet meer bestaat;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
  - number: 2:49.2.b
    text: aanspraak op een lagere inkomensvoorziening bestaat;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
  - number: 2:49.2.c
    text: |-
      de jonggehandicapte of zijn wettelijke vertegenwoordiger een verplichting als bedoeld in de [artikelen 2:7][ref1],
      [2:8][ref2], [2:31][ref3] of [2:32][ref4] niet of niet behoorlijk is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref4
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:49.2.d
    text: |-
      een instelling als bedoeld in [artikel 2:55][ref1] een verplichting als bedoeld in [artikel 2:7][ref2], niet of
      niet behoorlijk is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:49.3
    text: |-
      Indien de inkomensvoorziening, bedoeld in het eerste lid, in het buitenland wordt uitbetaald, geschiedt de betaling
      in afwijking van [artikel 4:89, derde lid, van de Algemene wet bestuursrecht][ref1] op het tijdstip waarop de
      rekening van de daartoe door de schuldeiser aangewezen bank wordt gecrediteerd.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 2:49.4
    text: |-
      Indien de jonggehandicapte, aan wie een inkomensvoorziening is toegekend, een ander machtigt om de
      inkomensvoorziening in ontvangst te nemen, onderscheidenlijk een verleende machtiging intrekt, wordt daaraan
      gevolg gegeven met ingang van een betalingstijdvak, aanvangende na de dag waarop de machtiging door het
      Uitvoeringsinstituut werknemersverzekeringen is ontvangen, onderscheidenlijk waarop van haar intrekking mededeling
      wordt gedaan, doch niet later dan de eerste dag van de tweede maand na de dag van indiening onderscheidenlijk de
      mededeling.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel249
  - number: 2:50.1
    text: |-
      Een herziening van een inkomensvoorziening als gevolg van een herziening van de grondslag van het minimumloon vindt
      plaats zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel250
  - number: 2:50.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen betaalt de herziene inkomensvoorziening, bedoeld in het eerste
      lid, bij de eerstvolgende betaling nadat de grondslag van het minimumloon is herzien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel250
  - number: 2:51
    text: |-
      Indien de jonggehandicapte, die een inkomensvoorziening op grond van dit hoofdstuk ontvangt en die slechts
      in staat is om met arbeid minder dan 20% te verdienen van het maatmaninkomen, verkeert in een blijvende of
      voorlopig blijvende toestand van hulpbehoevendheid welke geregeld oppassing en verzorging nodig maakt, wordt de
      inkomensvoorziening voor de duur van die hulpbehoevendheid verhoogd door vermenigvuldiging met ten hoogste de
      factor 100/75. De eerste zin vindt geen toepassing, indien de jonggehandicapte in een inrichting is opgenomen en de
      kosten van verblijf ten laste van een zorgverzekering of een verzekering inzake ziektekosten komen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel251
  - number: 2:52.1
    text: |-
      De jonggehandicapte die behoort tot een bij ministeriële regeling te bepalen categorie heeft recht op een
      tegemoetkoming.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel252
  - number: 2:52.2
    text: De tegemoetkoming wordt verstrekt in aanvulling op de inkomensvoorziening.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel252
  - number: 2:52.3
    text: |-
      Bij ministeriële regeling worden in ieder geval regels gesteld met betrekking tot de hoogte van de tegemoetkoming
      en de betaling van de tegemoetkoming.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel252
  - number: 2:52.4
    text: De tegemoetkoming wordt betaald zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel252
  - number: 2:52.5
    text: |-
      De betaling van de tegemoetkoming vindt plaats binnen een maand nadat het recht op de tegemoetkoming is vastgesteld
      en geschiedt vervolgens in dezelfde termijnen als die waarin de betaling van de inkomensvoorziening plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel252
  - number: 2:53.1
    text: |-
      De jonggehandicapte die over een maand recht heeft op inkomensvoorziening, heeft over die maand recht op
      vakantiebijslag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel253
  - number: 2:53.2
    text: |-
      De vakantiebijslag bedraagt acht procent van het bedrag aan inkomensvoorziening waarop recht bestond. De betaling
      van de vakantiebijslag vindt eenmaal per jaar plaats in de maand mei, of, indien het recht op arbeidsondersteuning
      eerder dan in de maand mei eindigt, in de desbetreffende maand.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel253
  - number: 2:53.3
    text: |-
      Indien het percentage van de vakantiebijslag, bedoeld in
      [artikel 15, eerste lid, van de Wet minimumloon en minimumvakantiebijslag][ref1], wordt gewijzigd, treedt dit
      gewijzigde percentage in de plaats van het in het tweede lid genoemde percentage. Het gewijzigde percentage wordt
      in aanmerking genomen over de inkomensvoorziening waarop recht bestaat over het tijdvak aanvangende met de dag
      waarop de wijziging ingaat.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel15
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel253
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '15'
  - number: 2:53.4
    text: De vakantiebijslag wordt betaald zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel253
  - number: 2:53.5
    text: Bij ministeriële regeling kunnen met betrekking tot het eerste lid nadere regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel253
  - number: 2:53.6
    text: |-
      Het eerste tot en met het derde lid is van overeenkomstige toepassing op de overlijdensuitkering, bedoeld in
      [artikel 2:56][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel253
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:55.1
    text: |-
      Indien de jonggehandicapte aan wie een inkomensvoorziening is toegekend, aanspraak heeft op verstrekking of
      vergoeding van zorg als bedoeld in de [Wet langdurige zorg][ref1] en op grond van die wet een bijdrage voor die
      zorg verschuldigd is, is het Uitvoeringsinstituut werknemersverzekeringen bevoegd de inkomensondersteuning tot
      het bedrag van die bijdrage in plaats van aan de jonggehandicapte zonder diens machtiging uit te betalen aan het
      Zorginstituut Nederland, genoemd in [artikel 58, eerste lid, van de Zorgverzekeringswet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0035917
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel58
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255
    references:
      - id: ref1
        bwb_id: BWBR0035917
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '58'
  - number: 2:55.2
    text: |-
      Indien aan de jonggehandicapte aan wie een inkomensvoorziening is toegekend, een
      maatwerkvoorziening of persoonsgebonden budget wordt verstrekt voor beschermd wonen als bedoeld in
      [artikel 1.1.1 van de Wet maatschappelijke ondersteuning 2015][ref1], en hij op grond van die [wet][ref2]
      hiervoor een bijdrage is verschuldigd, is het Uitvoeringsinstituut werknemersverzekeringen bevoegd
      de inkomensvoorziening tot het bedrag van die bijdrage in plaats van aan de jonggehandicapte, aan wie
      de inkomensvoorziening is toegekend, zonder diens machtiging uit te betalen aan het CAK, genoemd in
      [artikel 6.1.1, eerste lid, van de Wet langdurige zorg][ref3], dat voor de gemeente de bijdrage int.


      [ref1]: https://wetten.overheid.nl/BWBR0035362#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0035362
      [ref3]: https://wetten.overheid.nl/BWBR0035917#Artikel6
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255
    references:
      - id: ref1
        bwb_id: BWBR0035362
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0035362
      - id: ref3
        bwb_id: BWBR0035917
        artikel: '6'
  - number: 2:55.3
    text: |-
      Indien de jonggehandicapte, aan wie een inkomensvoorziening is toegekend, in een inrichting ter verpleging
      van geesteszieken of van zwakzinnigen is opgenomen en het Uitvoeringsinstituut werknemersverzekeringen van de
      desbetreffende inrichting of van het college van burgemeester en wethouders van de gemeente die de opnamekosten
      betaalt, het verzoek ontvangt om de inkomensvoorziening aan die inrichting of die gemeente uit te betalen, kan het
      Uitvoeringsinstituut werknemersverzekeringen dat verzoek zonder het stellen van andere voorwaarden inwilligen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255
  - number: 2:55.4
    text: |-
      Indien het eerste of tweede lid toepassing vindt, heeft de in het derde lid bedoelde bevoegdheid betrekking op
      het gedeelte van de inkomensvoorziening dat niet aan de in het eerste of tweede lid genoemde instantie wordt
      uitbetaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255
  - number: 2:55.5
    text: |-
      Een herziening van de betaling van de inkomensvoorziening op grond van het eerste of tweede lid als gevolg van een
      wijziging van de verschuldigde bijdrage vindt plaats zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255
  - number: 2:55a.1
    text: |-
      Is van de aanvrager of ontvanger van een inkomensvoorziening bij het Uitvoeringsinstituut werknemersverzekeringen
      een adres in Nederland bekend, terwijl in de basisregistratie personen ambtshalve is opgenomen dat hij is
      vertrokken naar een onbekend land van verblijf, dan verzoekt het Uitvoeringsinstituut werknemersverzekeringen hem
      de afwijkende registratie in de basisregistratie personen binnen een redelijke termijn ongedaan te laten maken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255a
  - number: 2:55a.2
    text: |-
      Wanneer na afloop van deze termijn, de afwijkende registratie niet is beëindigd of als uit de basisregistratie
      personen niet blijkt dat het college van burgemeester en wethouders van de desbetreffende gemeente de gegevens over
      het adres in onderzoek heeft genomen, schort het Uitvoeringsinstituut werknemersverzekeringen de betaling van de
      inkomensvoorziening aan de persoon, aan wie de inkomensvoorziening is toegekend, op.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255a
  - number: 2:55a.3
    text: |-
      De opschorting wordt beëindigd zodra is vastgesteld dat de persoon, bedoeld in het tweede lid, in het buitenland
      woont of verblijft of dat een adres in Nederland in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255a
  - number: 2:55a.4
    text: |-
      Indien het onderzoek van het college van burgemeester en wethouders is afgerond en de persoon, bedoeld in
      het tweede lid, in de basisregistratie personen ambtshalve opgenomen blijft met gegevens over het vertrek uit
      Nederland, schort het Uitvoeringsinstituut werknemersverzekeringen de betaling van de inkomensvoorziening op tot
      verblijf in het buitenland kan worden vastgesteld of een adres in Nederland in de basisregistratie personen is
      opgenomen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel255a
  - number: 2:56.1
    text: |-
      Na het overlijden van de jonggehandicapte, aan wie een inkomensvoorziening is toegekend, wordt met ingang van de
      dag na het overlijden, de inkomensvoorziening in de vorm van een overlijdensuitkering betaald:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.1.a
    text: aan de langstlevende van de echtgenoten;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.1.b
    text: |-
      bij ontstentenis van de in onderdeel a bedoelde persoon, aan de minderjarige kinderen tot wie de overledene in
      familierechtelijke betrekking stond;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.1.c
    text: |-
      bij ontstentenis van de in de onderdelen a en b bedoelde personen aan degenen met wie de overledene in
      gezinsverband leefde.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.2
    text: |-
      De overlijdensuitkering is gelijk aan het bedrag van de inkomensvoorziening over één maand, doch niet over de
      zaterdagen en de zondagen, berekend naar de hoogte van die inkomensvoorziening op de dag of laatstelijk voor de dag
      van overlijden van de jonggehandicapte.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.3
    text: |-
      In verband met het overlijden van de jonggehandicapte aan wie een inkomensvoorziening is toegekend, is
      [artikel 2:11, eerste lid, onderdeel e][ref1], niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '3'
  - number: 2:56.4
    text: |-
      De overlijdensuitkering wordt ambtshalve of op aanvraag aan de rechthebbende of rechthebbenden, bedoeld in het
      eerste lid, door het Uitvoeringsinstituut werknemersverzekeringen betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.5
    text: De overlijdensuitkering wordt in een bedrag ineens betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:56.6
    text: |-
      Het bedrag van de overlijdensuitkering wordt verminderd met het bedrag aan inkomensvoorziening dat over na het
      overlijden gelegen dagen reeds is betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel256
  - number: 2:57
    text: |-
      Inkomensvoorzieningen op grond van dit hoofdstuk die niet in ontvangst zijn genomen of zijn ingevorderd binnen twee
      jaren na de dag van betaalbaarstelling, worden niet meer betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel257
  - number: 2:58.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen herziet beschikkingen op grond van dit hoofdstuk of trekt
      dergelijke beschikkingen in, indien:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel258
  - number: 2:58.1.a
    text: |-
      als gevolg van het niet nakomen van de [artikelen 2:7][ref1], [2:8][ref2], [2:31][ref3] en [2:32][ref4] en de
      daarop berustende bepalingen het recht op arbeidsondersteuning op grond van dit hoofdstuk niet of niet meer kan
      worden vastgesteld of ten onrechte is vastgesteld of een inkomensvoorziening ten onrechte op een te hoog bedrag
      is vastgesteld;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel258
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref4
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:58.1.b
    text: |-
      de verstrekking van een voorziening als bedoeld in [artikel 2:22][ref1] of [2:23][ref2] ten onrechte of tot een te
      hoog bedrag is verleend;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel258
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:58.1.c
    text: |-
      anderszins het recht op arbeidsondersteuning ten onrechte of een inkomensvoorziening tot een te hoog bedrag is
      vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel258
  - number: 2:58.2
    text: |-
      Indien een voorziening als bedoeld in [artikel 2:23][ref1] in de vorm van een subsidie wordt
      verstrekt, wijzigt het Uitvoeringsinstituut werknemersverzekeringen de beschikking tot vaststelling
      van de subsidie of trekt het die beschikking in, indien sprake is van een omstandigheid als bedoel in
      [artikel 4:49, eerste lid, onderdeel a, b, of c, van de Algemene wet bestuursrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel258
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 2:58.3
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn, kan het Uitvoeringsinstituut werknemersverzekeringen geheel of
      gedeeltelijk van herziening of intrekking afzien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel258
  - number: 2:59.1
    text: |-
      Een inkomensvoorziening die op grond van dit hoofdstuk onverschuldigd is betaald, hetgeen als gevolg van
      een beschikking als bedoeld in [artikel 2:58][ref1] door het Uitvoeringsinstituut werknemersverzekeringen
      onverschuldigd is betaald of verstrekt, alsmede hetgeen anderszins onverschuldigd is betaald, wordt door het
      Uitvoeringsinstituut werknemersverzekeringen teruggevorderd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:59.2
    text: |-
      In afwijking van het eerste lid kan het Uitvoeringsinstituut werknemersverzekeringen besluiten van terugvordering
      of van verdere terugvordering af te zien, indien degene van wie wordt teruggevorderd:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.2.a
    text: gedurende vijf jaar volledig aan zijn betalingsverplichtingen heeft voldaan;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.2.b
    text: |-
      gedurende vijf jaar niet volledig aan zijn betalingsverplichtingen heeft voldaan, maar het achterstallige bedrag
      over die periode, vermeerderd met de daarover verschuldigde wettelijke rente en de op de invordering betrekking
      hebbende kosten, alsnog heeft betaald;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.2.c
    text: |-
      gedurende vijf jaar geen betalingen heeft verricht en niet aannemelijk is dat hij deze op enig moment zal gaan
      verrichten; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.2.d
    text: een bedrag, overeenkomend met ten minste 50% van de restsom in één keer aflost.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.3
    text: |-
      De in het tweede lid, onderdelen a, b en c, genoemde termijn is tien jaar indien de terugvordering het gevolg is
      van het niet of niet behoorlijk nakomen van de verplichting, bedoeld in [artikel 2:7, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:59.4
    text: 'De in het tweede lid, onderdelen a en b, genoemde termijn is drie jaar indien:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.4.a
    text: |-
      het gemiddeld inkomen van degene van wie wordt teruggevorderd in die periode de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1] niet te boven is gegaan; en


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 2:59.4.b
    text: |-
      de terugvordering niet het gevolg is van het niet of niet behoorlijk nakomen van de verplichting, bedoeld in
      [artikel 2:7][ref1], eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:59.5
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn kan het Uitvoeringsinstituut werknemersverzekeringen besluiten
      geheel of gedeeltelijk van terugvordering af te zien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.6
    text: |-
      Degene van wie wordt teruggevorderd is verplicht desgevraagd aan het Uitvoeringsinstituut werknemersverzekeringen
      de inlichtingen te verstrekken die voor de terugvordering van belang zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:59.7
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan, onder bij ministeriële regeling te stellen voorwaarden,
      besluiten van terugvordering af te zien indien het terug te vorderen bedrag een bij ministeriële regeling vast te
      stellen bedrag niet te boven gaat.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel259
  - number: 2:60.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan de onverschuldigd betaalde inkomensvoorziening, bedoeld in
      [artikel 2:59, eerste lid][ref1], invorderen bij dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel260
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:60.2
    text: |-
      [Artikel 3:43][ref1] is van overeenkomstige toepassing, met dien verstande dat indien het
      gemiddeld inkomen van de persoon gedurende drie jaar de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref2] niet te boven is gegaan, het
      Uitvoeringsinstituut werknemersverzekeringen de aflossingsbedragen lager vaststelt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel260
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 2:61
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij is vastgesteld dat onverschuldigd is betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel261
  - number: 2:62.1
    text: |-
      In afwijking van [artikel 2:59][ref1] kan het Uitvoeringsinstituut werknemersverzekeringen, op verzoek van degene
      van wie wordt teruggevorderd, besluiten gedeeltelijk van terugvordering of gedeeltelijk van verdere terugvordering
      af te zien bij medewerking aan een schuldregeling, indien:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:62.1.a
    text: |-
      redelijkerwijs te voorzien is dat degene van wie wordt teruggevorderd niet zal kunnen voortgaan met het betalen van
      zijn schulden of indien hij in de toestand verkeert dat hij heeft opgehouden te betalen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.1.b
    text: |-
      redelijkerwijs te voorzien is dat een schuldregeling met betrekking tot alle vorderingen, behoudens de in het
      tweede lid bedoelde vorderingen, van de overige schuldeisers zonder een zodanig besluit niet tot stand zal komen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.1.c
    text: |-
      een naar het oordeel van het Uitvoeringsinstituut werknemersverzekeringen betrouwbaar voorstel voor
      een schuldregeling tot stand is gekomen door tussenkomst van een schuldhulpverlener als bedoeld in
      [artikel 48 van de Wet op het consumentenkrediet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0004815#Artikel48
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
    references:
      - id: ref1
        bwb_id: BWBR0004815
        artikel: '48'
  - number: 2:62.1.d
    text: aannemelijk is dat medewerking aan een schuldregeling niet concurrentieverstorend werkt;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.1.e
    text: |-
      uitdeling in het kader van de schuldregeling plaatsvindt overeenkomstig
      [artikel 349 van de Faillissementswet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001860#Artikel349
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
    references:
      - id: ref1
        bwb_id: BWBR0001860
        artikel: '349'
  - number: 2:62.2
    text: |-
      Het eerste lid is niet van toepassing indien een vordering is ontstaan door het opzettelijk of door grove schuld
      niet nakomen door degene van wie wordt teruggevorderd van de verplichting, bedoeld in [artikel 2:7][ref1], en
      hiervoor een boete is opgelegd als bedoeld in [artikel 2:69][ref2], dan wel met betrekking tot het niet naleven van
      die verplichting aangifte is gedaan op grond van het [Wetboek van Strafrecht][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0001854
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '9'
      - id: ref3
        bwb_id: BWBR0001854
  - number: 2:62.3
    text: |-
      Het besluit tot het gedeeltelijk afzien van terugvordering of tot het gedeeltelijk afzien van verdere
      terugvordering wordt ingetrokken of ten nadele van degene van wie wordt teruggevorderd gewijzigd indien:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.3.a
    text: |-
      niet binnen twaalf maanden nadat dat besluit is bekendgemaakt, een schuldregeling tot stand is gekomen die voldoet
      aan de eisen, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.3.b
    text: |-
      degene van wie wordt teruggevorderd zijn schuld aan het Uitvoeringsinstituut werknemersverzekeringen niet
      overeenkomstig de schuldregeling voldoet; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.3.c
    text: |-
      onjuiste of onvolledige gegevens zijn verstrekt en de verstrekking van juiste of volledige gegevens tot een ander
      besluit zou hebben geleid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:62.4
    text: Bij ministeriële regeling kunnen met betrekking tot dit artikel nadere regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel262
  - number: 2:63
    text: |-
      Een vordering van het Uitvoeringsinstituut werknemersverzekeringen als bedoeld in [artikel 2:59][ref1]
      en [2:62][ref2] is bevoorrecht en volgt onmiddellijk na de vorderingen, bedoeld in
      [artikel 288 van Boek 3 van het Burgerlijk Wetboek][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0005291#Artikel288
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel263
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
      - id: ref3
        bwb_id: BWBR0005291
        artikel: '288'
  - number: 2:64.1
    text: |-
      Een inkomensvoorziening op grond van dit hoofdstuk en een voorziening als bedoeld in de [artikelen 2:22][ref1] en
      [2:23][ref2] zijn onvervreemdbaar en niet vatbaar voor verpanding of belening.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel264
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 2:64.2
    text: |-
      Volmacht tot ontvangst van een inkomensvoorziening op grond van dit hoofdstuk onder welke vorm of benaming ook
      verleend, is steeds herroepelijk.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel264
  - number: 2:64.3
    text: Elk beding, strijdig met dit artikel, is nietig.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel264
  - number: 2:65
    text: |-
      De voorzieningen, bedoeld in de [artikelen 2:22][ref1] en [2:23][ref2], de verhoging, bedoeld in
      [artikel 2:51][ref3], alsmede de overlijdensuitkering, bedoeld in [artikel 2:56][ref4], zijn niet vatbaar voor
      beslag.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel265
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
      - id: ref4
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:66.1
    text: |-
      Een boete, opgelegd op grond van de [Algemene Kinderbijslagwet][ref1], de [Algemene nabestaandenwet][ref2],
      de [Algemene Ouderdomswet][ref3], de [Toeslagenwet][ref4], de [Werkloosheidswet][ref5], de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen][ref6], de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers][ref7], de
      [Wet inkomensvoorziening oudere werklozen][ref8], de [Wet werk en inkomen naar arbeidsvermogen][ref9] of de
      [Ziektewet][ref10], die verrekend kan worden met een uitkering op grond van deze wet, kan tevens verrekend worden
      met een inkomensvoorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0002368
      [ref2]: https://wetten.overheid.nl/BWBR0007795
      [ref3]: https://wetten.overheid.nl/BWBR0002221
      [ref4]: https://wetten.overheid.nl/BWBR0004043
      [ref5]: https://wetten.overheid.nl/BWBR0004045
      [ref6]: https://wetten.overheid.nl/BWBR0004163
      [ref7]: https://wetten.overheid.nl/BWBR0004044
      [ref8]: https://wetten.overheid.nl/BWBR0024394
      [ref9]: https://wetten.overheid.nl/BWBR0019057
      [ref10]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel266
    references:
      - id: ref1
        bwb_id: BWBR0002368
      - id: ref2
        bwb_id: BWBR0007795
      - id: ref3
        bwb_id: BWBR0002221
      - id: ref4
        bwb_id: BWBR0004043
      - id: ref5
        bwb_id: BWBR0004045
      - id: ref6
        bwb_id: BWBR0004163
      - id: ref7
        bwb_id: BWBR0004044
      - id: ref8
        bwb_id: BWBR0024394
      - id: ref9
        bwb_id: BWBR0019057
      - id: ref10
        bwb_id: BWBR0001888
  - number: 2:66.2
    text: |-
      Onverminderd het eerste lid kan het Uitvoeringsinstituut werknemersverzekeringen de bestuurlijke boete verrekenen
      met een vordering die degene aan wie de bestuurlijke boete is opgelegd op hem heeft.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel266
  - number: 2:67.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen weigert een inkomensvoorziening op grond van dit hoofdstuk geheel
      of gedeeltelijk, blijvend of tijdelijk indien:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel267
  - number: 2:67.1.a
    text: |-
      de jonggehandicapte verplichtingen als bedoeld in de [artikelen 2:7, tweede tot en met zesde lid][ref1],
      [2:8][ref2], [2:31][ref3] en [2:32][ref4] niet of niet behoorlijk is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel267
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
      - id: ref4
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '6'
  - number: 2:67.1.b
    text: |-
      de jonggehandicapte de verplichting, bedoeld in [artikel 2:7, eerste lid][ref1], niet binnen de door het
      Uitvoeringsinstituut werknemersverzekeringen daarvoor vastgestelde termijn is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel267
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:67.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een maatregel als bedoeld in het
      eerste lid en volstaan met het geven van een schriftelijke waarschuwing ter zake van het niet tijdig nakomen van de
      verplichting, bedoeld in [artikel 2:7, eerste lid][ref1], indien het niet tijdig nakomen van de verplichting niet
      heeft geleid tot het ten onrechte of tot een te hoog bedrag verlenen van een inkomensvoorziening, tenzij het niet
      tijdig nakomen van de verplichting plaatsvindt binnen een periode van twee jaar te rekenen vanaf de datum waarop
      eerder aan de belanghebbende een zodanige waarschuwing is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel267
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:67.3
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn kan het Uitvoeringsinstituut werknemersverzekeringen besluiten van
      het opleggen van een maatregel af te zien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel267
  - number: 2:68.1
    text: |-
      Een maatregel als bedoeld in [artikel 2:67][ref1] wordt afgestemd op de ernst van de gedraging en de mate waarin de
      jonggehandicapte de gedraging verweten kan worden. Van het opleggen van een maatregel wordt in elk geval afgezien,
      indien elke vorm van verwijtbaarheid ontbreekt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel268
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '9'
  - number: 2:68.2
    text: |-
      Het opleggen van een maatregel blijft achterwege indien voor dezelfde gedraging een bestuurlijke boete als bedoeld
      in [artikel 2:69][ref1] wordt opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel268
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '9'
  - number: 2:68.3
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld met betrekking tot het eerste lid,
      waarbij in ieder geval kan worden geregeld in welke gevallen het Uitvoeringsinstituut werknemersverzekeringen kan
      afzien van het opleggen van een maatregel.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel268
  - number: 2:69.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen legt een bestuurlijke boete op van ten hoogste het
      benadelingsbedrag wegens het niet of niet behoorlijk nakomen door de jonggehandicapte of zijn wettelijke
      vertegenwoordiger van de verplichting, bedoeld in [artikel 2:7, eerste lid][ref1]. Indien de feiten en
      omstandigheden, bedoeld in artikel 2:7, eerste lid, niet of niet behoorlijk zijn medegedeeld en deze overtreding
      opzettelijk is begaan, bedraagt de bestuurlijke boete ten hoogste het bedrag van de vijfde categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2]. Indien de feiten en omstandigheden, bedoeld in
      artikel 2:7, eerste lid, niet of niet behoorlijk zijn medegedeeld en deze overtreding niet opzettelijk is begaan,
      bedraagt de bestuurlijke boete ten hoogste het bedrag van de derde categorie, bedoeld in artikel 23, vierde lid,
      van het Wetboek van Strafrecht.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 2:69.2
    text: |-
      In dit artikel wordt onder benadelingsbedrag verstaan het brutobedrag dat als gevolg van het niet of niet
      behoorlijk nakomen van de verplichting, bedoeld in [artikel 2:7, eerste lid][ref1], ten onrechte of tot een te
      hoog bedrag aan inkomensvoorziening is ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:69.3
    text: |-
      Indien het niet of niet behoorlijk nakomen door de jonggehandicapte of zijn wettelijke vertegenwoordiger
      van de verplichting, bedoeld in [artikel 2:7, eerste lid][ref1], niet heeft geleid tot een
      benadelingsbedrag, of indien een werkgever als bedoeld in artikel 2:7, zevende lid, de verplichting,
      bedoeld in artikel 2:7, zevende lid, niet of niet behoorlijk nakomt, legt het Uitvoeringsinstituut
      werknemersverzekeringen een bestuurlijke boete op van ten hoogste het bedrag van de tweede categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 2:69.4
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een bestuurlijke
      boete en volstaan met het geven van een schriftelijke waarschuwing wegens het niet of niet behoorlijk
      nakomen door de jonggehandicapte of zijn wettelijke vertegenwoordiger van de verplichting, bedoeld in
      [artikel 2:7, eerste lid][ref1], in situaties die bij algemene maatregel van bestuur worden bepaald, tenzij het
      niet of niet behoorlijk nakomen van de verplichting plaatsvindt binnen een periode van twee jaar te rekenen vanaf
      de datum waarop eerder aan de jonggehandicapte of zijn wettelijke vertegenwoordiger een zodanige waarschuwing is
      gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:69.5
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen legt een bestuurlijke boete op wegens het niet of niet
      behoorlijk nakomen door de jonggehandicapte of zijn wettelijke vertegenwoordiger van de verplichting, bedoeld in
      [artikel 2:7, eerste lid][ref1], als gevolg waarvan ten onrechte of tot een te hoog bedrag aan inkomensvoorziening
      is ontvangen, van ten hoogste 150 procent van het benadelingsbedrag, met overeenkomstige toepassing van het eerste
      lid, indien binnen een tijdvak van vijf jaar voorafgaand aan de dag van het begaan van de overtreding een eerdere
      bestuurlijke boete of strafrechtelijke sanctie is opgelegd wegens een eerdere overtreding, bestaande uit eenzelfde
      gedraging, die onherroepelijk is geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
  - number: 2:69.6
    text: |-
      Onder eenzelfde gedraging als bedoeld in het vijfde lid wordt verstaan het niet of niet behoorlijk nakomen van de
      verplichting, bedoeld in [artikel 2:7, eerste lid][ref1], of [artikel 12 van de Toeslagenwet][ref2], als gevolg
      waarvan ten onrechte of tot een te hoog bedrag aan inkomensvoorziening of toeslag is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0004043#Artikel12
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0004043
        artikel: '12'
  - number: 2:69.7
    text: |-
      In afwijking van het vijfde lid is het in dat lid genoemde tijdvak van vijf jaar tien jaar indien wegens de eerdere
      overtreding, bedoeld in het vijfde lid, de jonggehandicapte of zijn wettelijke vertegenwoordiger is gestraft met
      een onvoorwaardelijke gevangenisstraf.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
  - number: 2:69.8
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een bestuurlijke boete indien
      daarvoor dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
  - number: 2:69.9
    text: |-
      Degene aan wie een bestuurlijke boete is opgelegd, is verplicht desgevraagd aan het Uitvoeringsinstituut
      werknemersverzekeringen de inlichtingen te verstrekken die voor de tenuitvoerlegging van de bestuurlijke boete van
      belang zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
  - number: 2:69.10
    text: Bij algemene maatregel van bestuur worden nadere regels worden gesteld over de hoogte van de bestuurlijke boete.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
  - number: 2:69.11
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij de bestuurlijke boete is opgelegd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
  - number: 2:69.12
    text: |-
      In afwijking van [artikel 8:69 van de Algemene wet bestuursrecht][ref1] kan de rechter in beroep of hoger beroep
      het bedrag waarop de bestuurlijke boete is vastgesteld ook ten nadele van de jonggehandicapte of zijn wettelijke
      vertegenwoordiger wijzigen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 2:69.13
    text: |-
      De [artikelen 3:43][ref1] en [3:44a][ref2] zijn van overeenkomstige toepassing op een bestuurlijke boete die op
      grond van dit artikel is opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
  - number: 2:69.14
    text: |-
      Indien ten aanzien van een overtreding waarvoor een bestuurlijke boete is opgelegd geen sprake is geweest
      van opzet of grove schuld, en voorts is gebleken dat binnen een jaar nadat de bestuurlijke boete is opgelegd
      niet nogmaals een overtreding wegens eenzelfde gedraging als bedoeld in het zesde lid is begaan, is het
      Uitvoeringsinstituut werknemersverzekeringen bevoegd op verzoek van degene aan wie de bestuurlijke boete is
      opgelegd, de bestuurlijke boete geheel of gedeeltelijk kwijt te schelden bij medewerking aan een schuldregeling.
      [Artikel 2:62, eerste, derde en vierde lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
  - number: 2:69.15
    text: |-
      Het besluit tot kwijtschelding, bedoeld in het veertiende lid, wordt ingetrokken of ten nadele van degene aan wie
      de bestuurlijke boete is opgelegd herzien indien binnen vijf jaar na het besluit tot kwijtschelding wederom een
      overtreding is begaan wegens eenzelfde gedraging als bedoeld in het zesde lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel269
  - number: 3:1.1
    text: |-
      Arbeidsongeschikt, geheel of gedeeltelijk, in de zin van dit hoofdstuk, is de persoon die als rechtstreeks en
      objectief medisch vast te stellen gevolg van ziekte, gebreken, zwangerschap of bevalling geheel of gedeeltelijk
      niet in staat is om met arbeid te verdienen, hetgeen gezonde personen, met soortgelijke opleiding en ervaring, ter
      plaatse waar hij woont of in de omgeving daarvan met arbeid gewoonlijk verdienen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.2
    text: |-
      De persoon die op de dag dat hij ingezetene wordt gedeeltelijk arbeidsongeschikt is in de zin van het eerste lid,
      wordt voor wat de door hem aan deze wet te ontlenen aanspraken betreft als geheel of gedeeltelijk arbeidsongeschikt
      aangemerkt, indien hij als rechtstreeks en objectief medisch vast te stellen gevolg van ziekte, gebreken,
      zwangerschap of bevalling geheel of gedeeltelijk niet in staat is om met arbeid te verdienen, hetgeen soortgelijke
      personen, die in dezelfde mate arbeidsongeschikt zijn in de zin van het eerste lid, ter plaatse waar hij woont of
      in de omgeving daarvan, met arbeid gewoonlijk verdienen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.3
    text: |-
      Indien de op de in het tweede lid bedoelde dag aanwezige arbeidsongeschiktheid in de zin van het eerste lid
      naderhand is afgenomen vindt het tweede lid vervolgens overeenkomstige toepassing, met dien verstande dat voor de
      dag waarop de betrokkene ingezetene wordt in de plaats treedt het tijdstip waarop de arbeidsongeschiktheid in de
      zin van het eerste lid is afgenomen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.4
    text: |-
      Het tweede en derde lid vinden geen toepassing indien de betrokkene op het moment dat hij ingezetene werd jonger
      was dan zeventien jaar en hij gedurende de zes jaren onmiddellijk voorafgaande aan de dag waarop hij zeventien jaar
      wordt ingezetene is geweest.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.5
    text: |-
      Onder de in het eerste en tweede lid eerstgenoemde arbeid wordt verstaan alle algemeen geaccepteerde arbeid waartoe
      de betrokkene met zijn krachten en bekwaamheden in staat is.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.6
    text: |-
      Bij de vaststelling van de mate van arbeidsongeschiktheid wordt buiten beschouwing gelaten of de betrokkene de
      arbeid feitelijk kan verkrijgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.7
    text: |-
      Bij de toepassing van dit artikel wordt buiten beschouwing gelaten, hetgeen wordt of kan worden ontvangen
      voor arbeid verricht bij wijze van sociale werkvoorziening als bedoeld in [hoofdstuk 2][ref1] of
      [3 van de Wet sociale werkvoorziening][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 3:1.8
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen met betrekking tot het eerste tot en met zevende lid nadere
      en zo nodig afwijkende regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.9
    text: |-
      De voordracht voor een krachtens het achtste lid vast te stellen algemene maatregel van bestuur, dan wel de
      vaststelling van een ministeriële regeling op basis van een dergelijke algemene maatregel van bestuur, wordt niet
      eerder gedaan dan vier weken nadat het ontwerp aan beide Kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:1.10
    text: |-
      Bij de beoordeling van arbeidsongeschiktheid als bedoeld in dit hoofdstuk maakt de verzekeringsarts zo veel
      mogelijk gebruik van wetenschappelijke inzichten die de beoordeling van arbeidsongeschiktheid kunnen ondersteunen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel31
  - number: 3:2
    text: 'Jonggehandicapte in de zin van dit hoofdstuk is de ingezetene die:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel32
  - number: 3:2.a
    text: op de dag waarop hij 17 jaar wordt, arbeidsongeschikt is;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel32
  - number: 3:2.b
    text: |-
      na de in onderdeel a bedoelde dag arbeidsongeschikt wordt en in het jaar, onmiddellijk voorafgaande aan de dag,
      waarop de arbeidsongeschiktheid is ingetreden, gedurende ten minste zes maanden studerende was.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel32
  - number: 3:2a
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen per dag in de zin van dit hoofdstuk wordt
      verstaan. Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer
      wordt genoten als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking
      wordt genomen alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel32a
  - number: 3:3.1
    text: |-
      De jonggehandicapte heeft recht op toekenning van arbeidsongeschiktheidsuitkering zodra hij onafgebroken 52 weken,
      onmiddellijk volgend op de in [artikel 3:2, onderdeel a of b][ref1] bedoelde dag, arbeidsongeschikt is geweest,
      indien hij na afloop van dat tijdvak nog arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '1'
  - number: 3:3.2
    text: |-
      Voor het bepalen van het tijdvak van 52 weken, bedoeld in het eerste lid, worden perioden van arbeidsongeschiktheid
      samengeteld, indien zij elkaar met een onderbreking van minder dan vier weken opvolgen of indien zij direct
      voorafgaan aan en aansluiten op een periode waarin uitkering in verband met zwangerschap of bevalling
      op grond van [artikel 3:7, eerste lid][ref1], [3:8][ref2], [3:10, eerste lid][ref3], [3:18][ref4] of
      [3:30, eerste lid, van de Wet arbeid en zorg][ref5] wordt genoten, tenzij de ongeschiktheid redelijkerwijs niet
      geacht kan worden voort te vloeien uit dezelfde oorzaak.


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref5
        bwb_id: BWBR0013008
        artikel: '3'
  - number: 3:3.3
    text: |-
      Recht op toekenning van arbeidsongeschiktheidsuitkering heeft eveneens de jonggehandicapte die na afloop van het in
      het eerste lid bedoelde tijdvak van 52 weken niet arbeidsongeschikt is, doch ten aanzien van wie dit wel het geval
      is binnen vier weken na afloop van dat tijdvak.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
  - number: 3:3.4
    text: |-
      Voor het bepalen van het tijdvak van 52 weken, bedoeld in het eerste lid, worden steeds in aanmerking
      genomen tijdvakken, gedurende welke de jonggehandicapte recht zou hebben gehad op ziekengeld op grond van de
      [Ziektewet][ref1], indien hij op grond van die wet zou zijn verzekerd.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0001888
  - number: 3:3.5
    text: |-
      Voor de toepassing van het eerste tot en met derde lid wordt niet als arbeidsongeschikt beschouwd degene die minder
      dan 25% arbeidsongeschikt is alsmede de jonggehandicapte die een uitkering geniet als bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
  - number: 3:3.6
    text: |-
      Toekenning van arbeidsongeschiktheidsuitkering vindt niet plaats met ingang van een dag, gelegen vóór die, waarop
      betrokkene de leeftijd van 18 jaar bereikt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
  - number: 3:3.7
    text: |-
      Toekenning ten aanzien van de in [artikel 1:2, derde lid][ref1], bedoelde persoon, vindt niet eerder plaats dan met
      ingang van de dag dat hij in Nederland woont.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel33
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 3:4.1
    text: |-
      Geen recht op arbeidsongeschiktheidsuitkering heeft de vreemdeling die niet rechtmatig verblijf houdt in de zin van
      [artikel 8, onder a tot en met e en l, van de Vreemdelingenwet 2000][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 3:4.2
    text: |-
      Bij algemene maatregel van bestuur kan worden afgeweken van het eerste lid ten
      aanzien van vreemdelingen die, na rechtmatig verblijf te hebben gehouden in de zin van
      [artikel 8, onder a tot en met e en l, van de Vreemdelingenwet 2000][ref1], rechtmatig in Nederland verblijf hebben
      als bedoeld in artikel 8, onder g of h, van de Vreemdelingenwet 2000.


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel34
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 3:5.1
    text: |-
      De jonggehandicapte, bedoeld in [artikel 3:3][ref1], heeft geen recht op arbeidsongeschiktheidsuitkering indien de
      dag waarop het recht op arbeidsongeschiktheidsuitkering zou ingaan dan wel de dag na afloop van de toepassing van
      [artikel 3:5a][ref2] met betrekking tot dat recht op uitkering, is gelegen in een periode dat hem rechtens zijn
      vrijheid is ontnomen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:5.2
    text: |-
      De jonggehandicapte, die op grond van het eerste lid geen recht op arbeidsongeschiktheidsuitkering heeft,
      heeft vanaf de dag dat hij in vrijheid wordt gesteld met inachtneming van de bepalingen van deze wet recht op
      arbeidsongeschiktheidsuitkering, indien hij op die dag arbeidsongeschikt is. [Artikel 3:3, vijfde lid][ref1], is
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:5.3
    text: |-
      Voor de toepassing van het eerste lid worden perioden van vrijheidsontneming samengeteld, indien zij elkaar met een
      onderbreking van minder dan vier weken opvolgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35
  - number: 3:5.4
    text: |-
      Met inachtneming van de bepalingen van deze wet heeft eveneens recht op arbeidsongeschiktheidsuitkering de
      jonggehandicapte, bedoeld in het tweede lid, die op de in dat lid bedoelde dag niet arbeidsongeschikt is, doch
      ten aanzien van wie dit wel het geval is binnen vier weken na die dag. [Artikel 3:3, vijfde lid][ref1], is van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:5.5
    text: |-
      Het eerste lid is niet van toepassing en het tweede lid en vierde lid zijn van overeenkomstige toepassing op bij
      algemene maatregel van bestuur aan te wijzen categorieën personen waarbij tenuitvoerlegging van een vrijheidsstraf
      of vrijheidsbenemende maatregel buiten een justitiële inrichting plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35
  - number: 3:5a
    text: |-
      De jonggehandicapte, bedoeld in [artikel 3:3][ref1], heeft geen recht op arbeidsongeschiktheidsuitkering indien en
      voor zolang hij op de dag waarop het recht op arbeidsongeschiktheidsuitkering zou ingaan en daarna zich onttrekt
      aan de tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:5b
    text: |-
      De jonggehandicapte, bedoeld in [artikel 3:3][ref1], heeft geen recht op arbeidsongeschiktheidsuitkering indien en
      voor zolang hij op de dag waarop het recht op arbeidsongeschiktheidsuitkering zou ingaan en daarna een uitreiziger
      is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel35b
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:6.1
    text: |-
      De jonggehandicapte, bedoeld in [artikel 3:3][ref1], heeft geen recht op arbeidsongeschiktheidsuitkering indien hij
      de aanvraag, bedoeld in [artikel 3:28][ref2], voor het eerst heeft ingediend op of na de datum van inwerkingtreding
      van de wet van 3 december 2009 tot wijziging van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten in
      verband met het bevorderen van de participatie van jonggehandicapten door werk en arbeidsondersteuning (Stb. 2009,
      580).


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:6.2
    text: |-
      De jonggehandicapte, bedoeld in [artikel 3:3][ref1], heeft geen recht op arbeidsongeschiktheidsuitkering, indien
      hij de leeftijd van zeventien jaar niet had bereikt op de datum van inwerkingtreding van de wet van 3 december 2009
      tot wijziging van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten in verband met het bevorderen van de
      participatie van jonggehandicapten door werk en arbeidsondersteuning (Stb. 2009, 580).


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel36
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:7.1
    text: De arbeidsongeschiktheidsuitkering wordt berekend naar de grondslag van het minimumloon.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel37
  - number: 3:7.2
    text: |-
      Onder het in het eerste lid bedoelde minimumloon wordt verstaan het minimumloon per maand, bedoeld in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref1], gedeeld door 21,75,
      of, indien het een persoon jonger dan 21 jaar betreft, het minimumloon per maand dat voor zijn leeftijd geldt op
      grond van [artikel 7, derde lid][ref2], en artikel 8, derde lid, van genoemde wet, gedeeld door 21,75.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0002638#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel37
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0002638
        artikel: '7'
  - number: 3:7.3
    text: |-
      Een herziening van de uitkering als gevolg van een herziening van de grondslag van het minimumloon vindt plaats
      zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel37
  - number: 3:7.4
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen betaalt de herziene uitkering, bedoeld in het derde lid, bij de
      eerstvolgende uitkeringsbetaling nadat de grondslag van het minimumloon is herzien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel37
  - number: 3:8.1
    text: 'De arbeidsongeschiktheidsuitkering bedraagt per dag:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.1.a
    text: |-
      voor een jonggehandicapte die werkt met loondispensatie als bedoeld in [artikel 3:63][ref1]: (0,7 * G) – (0,7 *
      compensatiefactor * I); en


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 3:8.1.b
    text: 'voor andere jonggehandicapten: 0,7 * (G – I).'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.2
    text: 'De compensatiefactor bedraagt: (LW – 0,3) / (0,7 x LW).'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.3
    text: |-
      Voor zover dit leidt tot een hoger bedrag aan arbeidsongeschiktheidsuitkering per dag, bedraagt de
      arbeidsongeschiktheidsuitkering per dag, in afwijking van het eerste lid, onderdeel a: (I/LW) – I.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.4
    text: |-
      In afwijking van het eerste lid, onderdeel a, en het derde lid bedraagt de arbeidsongeschiktheidsuitkering, bedoeld
      in [artikel 3:3, eerste lid][ref1], per dag, bij een inkomen per dag dat naast een gedispenseerd loon tevens is
      opgebouwd uit andere inkomensbestanddelen:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:8.4.a
    text: (0,7 * G) – (0,7 * ((CF * Ia) + Io)); of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.4.b
    text: ((Ia/LW) + Io)–I, voor zover dit leidt tot een hoger bedrag aan arbeidsongeschiktheidsuitkering per dag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.5
    text: 'In het eerste tot en met het vierde lid staat:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.5.a
    text: G voor grondslag;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.5.b
    text: I voor het inkomen per dag;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.5.c
    text: |-
      LW voor de verminderde arbeidsprestatie, bedoeld in [artikel 3:63, eerste lid][ref1], uitgedrukt in een
      percentage;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 3:8.5.d
    text: Ia voor de gedispenseerde inkomensbestanddelen per dag;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.5.e
    text: Io voor het overige niet gedispenseerde inkomensbestanddeel per dag, waarbij Io = I-Ia; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8.5.f
    text: CF voor de compensatiefactor, vastgesteld op basis van LW.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38
  - number: 3:8a.1
    text: |-
      [Artikel 3:8][ref1] is niet van toepassing, indien de jonggehandicapte voor 80% of meer arbeidsongeschikt is en
      duurzaam geen mogelijkheden tot arbeidsparticipatie heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:8a.2
    text: |-
      Onder duurzaam wordt de situatie verstaan waarin de mogelijkheden tot arbeidsparticipatie zich niet kunnen
      ontwikkelen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38a
  - number: 3:8a.3
    text: |-
      De jonggehandicapte die op 1 januari 2018 geen mogelijkheden tot arbeidsparticipatie heeft, wordt geacht op die dag
      duurzaam geen mogelijkheden tot arbeidsparticipatie te hebben.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38a
  - number: 3:8a.4
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen nadere regels worden gesteld met betrekking tot het eerste
      en tweede lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38a
  - number: 3:8a.5
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld met betrekking tot een periodieke
      herbeoordeling om vast te stellen of betrokkene duurzaam geen mogelijkheden tot arbeidsparticipatie heeft.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38a
  - number: 3:8b.1
    text: |-
      De arbeidsongeschiktheidsuitkering voor de jonggehandicapte, bedoeld in [artikel 3:8a, eerste lid][ref1], bedraagt
      per dag 0,75 * (G – I).


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38b
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:8b.2
    text: |-
      [Artikel 1a:4, derde lid][ref1], is van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel38b
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 3:9
    text: |-
      Een arbeidsongeschiktheidsuitkering, berekend naar een arbeidsongeschiktheid van 80% of meer, wordt, indien de
      jonggehandicapte verkeert in een althans voorlopig blijvende toestand van hulpbehoevendheid, die geregeld oppassing
      en verzorging nodig maakt, voor de duur van die hulpbehoevendheid tot ten hoogste zijn grondslag verhoogd. De
      eerste zin vindt geen toepassing, indien de jonggehandicapte in een inrichting is opgenomen en de kosten van
      verblijf ten laste van een zorgverzekering of een verzekering inzake ziektekosten komen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel39
  - number: 3:10.1
    text: |-
      De jonggehandicapte die behoort tot een bij ministeriële regeling te bepalen categorie heeft recht op een
      tegemoetkoming.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel310
  - number: 3:10.2
    text: De tegemoetkoming wordt verstrekt in aanvulling op de arbeidsongeschiktheidsuitkering.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel310
  - number: 3:10.3
    text: |-
      Bij ministeriële regeling worden in ieder geval regels gesteld met betrekking tot de hoogte van de tegemoetkoming
      en de betaling van de tegemoetkoming.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel310
  - number: 3:10.4
    text: De tegemoetkoming wordt betaald zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel310
  - number: 3:10.5
    text: |-
      De betaling van de tegemoetkoming vindt plaats binnen een maand nadat het recht op de tegemoetkoming is vastgesteld
      en geschiedt vervolgens in dezelfde termijnen als die waarin de betaling van de arbeidsongeschiktheidsuitkering
      plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel310
  - number: 3:11.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan met betrekking tot uit deze wet voortvloeiende aanspraken
      geheel of ten dele, tijdelijk of blijvend, buiten aanmerking laten:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
  - number: 3:11.1.a
    text: gehele arbeidsongeschiktheid die bestond op de dag dat een persoon ingezetene werd;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
  - number: 3:11.1.b
    text: |-
      arbeidsongeschiktheid, die is ingetreden binnen een half jaar na het tijdstip waarop een persoon ingezetene werd,
      terwijl de gezondheidstoestand van die persoon op dat tijdstip het intreden van de arbeidsongeschiktheid binnen een
      half jaar kennelijk moest doen verwachten;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
  - number: 3:11.1.c
    text: |-
      arbeidsongeschiktheid die bestond op de eerste dag dat een persoon studerende was als bedoeld in
      [artikel 1:4, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 3:11.1.d
    text: |-
      arbeidsongeschiktheid, die is ingetreden binnen een half jaar na het tijdstip waarop een persoon studerende werd,
      terwijl de gezondheidstoestand van die persoon op dat tijdstip het intreden van de arbeidsongeschiktheid binnen een
      half jaar kennelijk moest doen verwachten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
  - number: 3:11.2
    text: |-
      De in het eerste lid, onderdeel b en d, bedoelde bevoegdheid strekt zich mede uit tot de toeneming van
      de arbeidsongeschiktheid, voorzover deze toeneming kennelijk is voortgekomen uit dezelfde oorzaak als de
      arbeidsongeschiktheid die binnen een half jaar na aanvang van het ingezetenschap danwel na aanvang van de studie
      is ingetreden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
  - number: 3:11.3
    text: |-
      Het eerste en tweede lid blijven buiten toepassing ten aanzien van de jonggehandicapte indien hij op de dag dat hij
      ingezetene werd jonger was dan 17 jaar en hij gedurende de zes jaren onmiddellijk voorafgaande aan de dag waarop
      hij 17 jaar wordt ingezetene is geweest.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
  - number: 3:11.4
    text: |-
      Zolang het Uitvoeringsinstituut werknemersverzekeringen op grond van het eerste of tweede lid arbeidsongeschiktheid
      buiten aanmerking laat, vindt [artikel 3:1, tweede lid][ref1], overeenkomstige toepassing met betrekking tot
      de door de jonggehandicapte aan deze wet nog te ontlenen aanspraken, met dien verstande, dat voor de in het
      eerste lid bedoelde dag of tijdstip in de plaats treedt de dag met ingang waarvan het Uitvoeringsinstituut
      werknemersverzekeringen arbeidsongeschiktheid buiten aanmerking laat.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel311
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '1'
  - number: 3:12
    text: |-
      Indien voor het vaststellen van het recht op uitkering op grond van deze wet, in het kader van een aanvraag
      voor de toekenning van een uitkering op grond van deze wet, naar het oordeel van het Uitvoeringsinstituut
      werknemersverzekeringen een medisch onderzoek nodig is en de betrokkene niet meewerkt aan dat onderzoek, blijven
      eventuele uit deze wet voortvloeiende aanspraken op een uitkering op grond van deze wet buiten beschouwing, voor
      zolang het recht op uitkering niet kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel312
  - number: 3:18.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen herziet beschikkingen op grond van dit hoofdstuk of trekt
      dergelijke beschikkingen in:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel318
  - number: 3:18.1.a
    text: |-
      ter uitvoering van een beslissing als bedoeld in [artikel 3:11][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel318
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:18.1.b
    text: |-
      indien als gevolg van het niet nakomen van de [artikelen 3:37][ref1], [3:38][ref2] of [3:74][ref3] en de daarop
      berustende bepalingen het recht op uitkering op grond van dit hoofdstuk niet of niet meer kan worden vastgesteld of
      ten onrechte is vastgesteld of de uitkering ten onrechte op een te hoog bedrag is vastgesteld;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel318
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:18.1.c
    text: indien anderszins het recht op uitkering ten onrechte of tot een te hoog bedrag is verleend.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel318
  - number: 3:18.2
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn, kan het Uitvoeringsinstituut werknemersverzekeringen geheel of
      gedeeltelijk van herziening of intrekking afzien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel318
  - number: 3:19.1
    text: 'Het recht op arbeidsongeschiktheidsuitkering eindigt:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.1.a
    text: |-
      met ingang van de dag waarop de jonggehandicapte de pensioengerechtigde leeftijd, bedoeld in
      [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1], bereikt;


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: 3:19.1.b
    text: |-
      wanneer de arbeidsongeschiktheid is geëindigd, of beneden 25% is gedaald, met ingang van de dag, aangegeven in de
      daartoe strekkende beschikking van het Uitvoeringsinstituut werknemersverzekeringen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.1.c
    text: met ingang van de eerste dag van de maand volgend op die waarin de jonggehandicapte buiten Nederland is gaan wonen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.1.d
    text: indien het Uitvoeringsinstituut werknemersverzekeringen daartoe op verzoek van de jonggehandicapte besluit; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.1.e
    text: indien de jonggehandicapte overlijdt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.2
    text: |-
      In afwijking van het eerste lid, onderdeel b, eindigt het recht op arbeidsongeschiktheidsuitkering van de
      jonggehandicapte die arbeid verricht, niet, tenzij de jonggehandicapte ten minste 75% van het maatmaninkomen
      verdient nadat hij vijf jaar arbeid heeft verricht. Arbeid verricht bij wijze van sociale werkvoorziening als
      bedoeld in [hoofdstuk 2][ref1] of [3 van de Wet sociale werkvoorziening][ref2] wordt buiten beschouwing gelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
    references:
      - id: ref1
        bwb_id: BWBR0008903
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008903
        hoofdstuk: '3'
  - number: 3:19.3
    text: |-
      De arbeidsongeschiktheidsuitkering van de jonggehandicapte die deelneemt aan een voor hem gewenste opleiding of
      scholing, wordt gedurende deze opleiding of scholing niet ingetrokken in verband met een daaruit voortvloeiende
      afneming van de arbeidsongeschiktheid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.4
    text: |-
      Indien de intrekking van de arbeidsongeschiktheidsuitkering verband houdt met een voltooide scholing of opleiding,
      gaat deze intrekking niet eerder in dan een jaar na voltooiing van die scholing of opleiding.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.5
    text: |-
      Het eerste lid, onderdeel c, is tevens van toepassing op de jonggehandicapte die buiten Nederland is gaan wonen en
      op wie [artikel 1:2, derde lid][ref1], van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 3:19.6
    text: |-
      Het recht op arbeidsongeschiktheidsuitkering eindigt, indien de jonggehandicapte rechtens zijn vrijheid is
      ontnomen, vanaf de dag dat deze vrijheidsontneming één maand heeft geduurd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.7
    text: |-
      Het recht op arbeidsongeschiktheidsuitkering eindigt, indien de jonggehandicapte zich onttrekt aan de
      tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.8
    text: |-
      Voor de jonggehandicapte die op de dag voorafgaande aan de vrijheidsontneming geen recht
      op arbeidsongeschiktheidsuitkering heeft op grond van het zevende lid, eindigt het recht op
      arbeidsongeschiktheidsuitkering, in afwijking van het zesde lid, vanaf de dag dat de vrijheidsontneming ingaat.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.9
    text: |-
      Voor de toepassing van het zesde lid worden perioden van vrijheidsontneming samengeteld, indien zij elkaar met een
      onderbreking van minder dan vier weken opvolgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.10
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan het eerste lid, onderdeel c, buiten toepassing
      laten of daarvan afwijken voorzover toepassing, gelet op het belang van het eindigen van het recht op
      arbeidsongeschiktheidsuitkering indien de jonggehandicapte buiten Nederland gaat wonen, zal leiden tot een
      onbillijkheid van overwegende aard.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.11
    text: Het recht op arbeidsongeschiktheidsuitkering eindigt, indien de jonggehandicapte een uitreiziger is.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:19.12
    text: |-
      Het recht op arbeidsongeschiktheidsuitkering eindigt niet op grond van het eerste lid, onderdeel b, of het tweede
      lid, indien de jonggehandicapte gebruik maakt van een voorziening als bedoeld in [artikel 34a, eerste lid][ref1] of
      [artikel 35, tweede lid, onderdeel a, b of d, van de Wet werk en inkomen naar arbeidsvermogen][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel34a
      [ref2]: https://wetten.overheid.nl/BWBR0019057#Artikel35
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 34a
      - id: ref2
        bwb_id: BWBR0019057
        artikel: '35'
  - number: 3:19.13
    text: |-
      Bij ministeriële regeling kan worden bepaald dat het tweede lid voor onbeperkte duur toepassing vindt ten aanzien
      van bij die ministeriële regeling te bepalen groepen jonggehandicapten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel319
  - number: 3:20.1
    text: |-
      Indien het recht op uitkering op grond van [artikel 3:19, eerste lid, onderdeel c][ref1], is geëindigd en de
      jonggehandicapte vervolgens weer in Nederland woont, herleeft het recht op uitkering met ingang van de eerste dag
      van de maand volgend op die waarin hij weer in Nederland is gaan wonen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel320
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:20.2
    text: |-
      Indien het recht op uitkering is geëindigd op grond van [artikel 3:19, eerste lid, onderdeel d][ref1], herleeft
      het recht op uitkering op aanvraag van de jonggehandicapte, indien zich geen uitsluitingsgrond als bedoeld in de
      [artikelen 3:4 tot en met 3:6][ref2] voordoet. Het recht op uitkering herleeft niet eerder dan een jaar na de dag
      waarop het recht op uitkering is geëindigd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel320
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:21.1
    text: 'Indien de jonggehandicapte:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel321
  - number: 3:21.1.a
    text: |-
      wiens arbeidsongeschiktheidsuitkering wegens afneming van arbeidsongeschiktheid op grond van
      [artikel 3:19, eerste lid, onderdeel b][ref1], is ingetrokken; of


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel321
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:21.1.b
    text: |-
      die aan het einde van de wachttijd, bedoeld in [artikel 3:3, eerste lid][ref1], ongeschikt is tot het verrichten
      van zijn arbeid wegens ziekte, gebreken, zwangerschap of bevalling, maar geen recht had op toekenning van
      arbeidsongeschiktheidsuitkering omdat hij niet arbeidsongeschikt was; na de datum van die intrekking dan wel na
      het bereiken van die wachttijd arbeidsongeschikt wordt, vindt toekenning van arbeidsongeschiktheidsuitkering steeds
      plaats, zodra die arbeidsongeschiktheid onafgebroken vier weken heeft geduurd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel321
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:21.2
    text: |-
      Voor het bepalen van het tijdvak van vier weken, bedoeld in het eerste lid, worden perioden van
      arbeidsongeschiktheid samengeteld, indien zij elkaar met een onderbreking van minder dan vier weken opvolgen of
      indien zij direct voorafgaan aan en aansluiten op een periode waarin uitkering in verband met zwangerschap of
      bevalling op grond van [artikel 3:7, eerste lid][ref1], [3:8][ref2], [3:10, eerste lid][ref3], [3:18][ref4] of
      [3:30, eerste lid, van de Wet arbeid en zorg][ref5] wordt genoten, tenzij de ongeschiktheid redelijkerwijs niet
      geacht kan worden voort te vloeien uit dezelfde oorzaak. Bij de vaststelling van de eerstgenoemde periode van vier
      weken blijven perioden, waarin uitkering in verband met zwangerschap of bevalling op grond van artikel 3:7, eerste
      lid, 3:8, 3:10, eerste lid, 3:18 of 3:30, eerste lid, van de Wet arbeid en zorg wordt genoten, buiten beschouwing.


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel321
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref5
        bwb_id: BWBR0013008
        artikel: '3'
  - number: 3:21.3
    text: |-
      De [artikelen 3:5][ref1] en de daarop berustende bepalingen, [3:5a][ref2] en [3:5b][ref3] zijn van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel321
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:21.4
    text: |-
      Indien de arbeidsongeschiktheidsuitkering op grond van dit artikel wordt toegekend en tevens recht op
      ziekengeld op grond van de [Ziektewet][ref1] bestaat, wordt de arbeidsongeschiktheidsuitkering uitbetaald
      voor zover deze het ziekengeld overtreft, danwel zou overtreffen, indien het ziekengeld op grond van
      [artikel 45 van de Ziektewet][ref2] geheel of gedeeltelijk is geweigerd.


      [ref1]: https://wetten.overheid.nl/BWBR0001888
      [ref2]: https://wetten.overheid.nl/BWBR0001888#Artikel45
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel321
    references:
      - id: ref1
        bwb_id: BWBR0001888
      - id: ref2
        bwb_id: BWBR0001888
        artikel: '45'
  - number: 3:23.1
    text: |-
      De jonggehandicapte, wiens arbeidsongeschiktheidsuitkering in verband met [artikel 3:19, zesde lid][ref1], is
      geëindigd, heeft vanaf de dag dat hij in vrijheid wordt gesteld met inachtneming van de bepalingen van deze
      wet recht op heropening van de arbeidsongeschiktheidsuitkering, indien hij op die dag arbeidsongeschikt is.
      [Artikel 3:3, vijfde lid][ref2], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:23.2
    text: |-
      Aanspraak op heropening van de arbeidsongeschiktheidsuitkering heeft eveneens de jonggehandicapte, bedoeld in het
      eerste lid, die op de in dat lid bedoelde dag niet arbeidsongeschikt is, doch ten aanzien van wie dit wel het geval
      is binnen vier weken na afloop van dat tijdvak.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323
  - number: 3:23.3
    text: |-
      De [artikelen 3:3, vijfde lid][ref1], [3:29][ref2] en [3:30][ref3] zijn van overeenkomstige toepassing met
      betrekking tot de aanspraak op heropening van de arbeidsongeschiktheidsuitkering, bedoeld in dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:23.4
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op bij algemene maatregel van bestuur aan te wijzen
      categorieën personen waarbij tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel buiten een
      justitiële inrichting plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323
  - number: 3:23a.1
    text: |-
      De jonggehandicapte, wiens arbeidsongeschiktheidsuitkering in verband met [artikel 3:19, zevende lid][ref1], is
      geëindigd, heeft vanaf de dag dat hij in vrijheid wordt gesteld met inachtneming van de bepalingen van deze wet
      recht op heropening van de arbeidsongeschiktheidsuitkering, indien hij op die dag arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:23a.2
    text: |-
      Aanspraak op heropening van de arbeidsongeschiktheidsuitkering heeft eveneens de jonggehandicapte, bedoeld in het
      eerste lid, die op de in dat lid bedoelde dag niet arbeidsongeschikt is, doch ten aanzien van wie dit wel het geval
      is binnen vier weken na afloop van dat tijdvak.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323a
  - number: 3:23a.3
    text: |-
      De [artikelen 3:3, vijfde lid][ref1], [3:29][ref2] en [3:30][ref3] zijn van overeenkomstige toepassing met
      betrekking tot de aanspraak op heropening van de arbeidsongeschiktheidsuitkering, bedoeld in dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:23b.1
    text: |-
      De jonggehandicapte, wiens arbeidsongeschiktheidsuitkering in verband met [artikel 3:19, elfde lid][ref1], is
      geëindigd, heeft vanaf de dag dat niet langer het gegronde vermoeden bestaat dat hij zich buiten Nederland bevindt
      met het doel zich aan te sluiten bij een organisatie als bedoeld in [artikel 1:1, eerste lid, onderdeel s][ref2],
      met inachtneming van de bepalingen van deze wet recht op heropening van de arbeidsongeschiktheidsuitkering, indien
      hij op die dag arbeidsongeschikt is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323b
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 3:23b.2
    text: |-
      Aanspraak op heropening van de arbeidsongeschiktheidsuitkering heeft eveneens de jonggehandicapte, bedoeld in het
      eerste lid, die op de in dat lid bedoelde dag niet arbeidsongeschikt is, doch ten aanzien van wie dit wel het geval
      is binnen vier weken na afloop van dat tijdvak.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323b
  - number: 3:23b.3
    text: |-
      De [artikelen 3:3, vijfde lid][ref1], [3:29][ref2] en [3:30][ref3] zijn van overeenkomstige toepassing met
      betrekking tot de aanspraak op heropening van de arbeidsongeschiktheidsuitkering, bedoeld in dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel323b
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:24
    text: |-
      De jonggehandicapte die over een maand recht heeft op arbeidsongeschiktheidsuitkering, heeft over die maand recht
      op vakantie-uitkering.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel324
  - number: 3:25.1
    text: |-
      De vakantie-uitkering bedraagt acht procent van het bedrag aan arbeidsongeschiktheidsuitkering, waarop recht
      bestond in het tijdvak van twaalf maanden, voorafgaande aan de maand mei.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel325
  - number: 3:25.2
    text: |-
      Indien [artikel 3:17a][ref1] of [3:21, vierde lid][ref2], is toegepast, wordt onder het bedrag
      aan arbeidsongeschiktheidsuitkering, bedoeld in het eerste lid, verstaan het bedrag van de
      arbeidsongeschiktheidsuitkering, nadat dat artikel toepassing heeft gevonden.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel325
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:25.3
    text: |-
      Indien het percentage van de vakantiebijslag, bedoeld in
      [artikel 15, eerste lid, van de Wet minimumloon en minimumvakantiebijslag][ref1], wordt gewijzigd, treedt dit
      gewijzigde percentage in de plaats van het in het eerste lid genoemde percentage. Het gewijzigde percentage wordt
      in aanmerking genomen over de uitkering waarop recht bestaat over het tijdvak aanvangende met de dag waarop de
      wijziging ingaat.


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel15
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel325
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '15'
  - number: 3:25.4
    text: De vakantie-uitkering wordt betaald zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel325
  - number: 3:26
    text: |-
      De [artikelen 3:24][ref1] en [3:25, eerste tot en met derde lid][ref2], zijn van overeenkomstige toepassing op de
      overlijdensuitkering, bedoeld in [artikel 3:54][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel326
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:27.1
    text: |-
      Ten einde een recht op arbeidsongeschiktheidsuitkering geldend te kunnen maken meldt de jonggehandicapte zijn
      arbeidsongeschiktheid binnen dertien weken na de dag waarop hij 17 jaar is geworden dan wel binnen dertien
      weken na de in [artikel 3:2, eerste lid, onderdeel b][ref1], bedoelde dag aan het Uitvoeringsinstituut
      werknemersverzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel327
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '1'
  - number: 3:27.2
    text: |-
      Voor het bepalen van het tijdvak van dertien weken, bedoeld in het eerste lid, worden perioden van
      arbeidsongeschiktheid samengeteld, indien zij elkaar met een onderbreking van minder dan vier weken opvolgen of
      indien zij direct voorafgaan aan en aansluiten op een periode waarin uitkering in verband met zwangerschap of
      bevalling op grond van [artikel 3:7, eerste lid][ref1], [3:8][ref2], [3:10, eerste lid][ref3], [3:18][ref4] of
      [3:30, eerste lid, van de Wet arbeid en zorg][ref5] wordt genoten, tenzij de ongeschiktheid redelijkerwijs niet
      geacht kan worden voort te vloeien uit dezelfde oorzaak. Bij de vaststelling van het tijdvak van dertien weken
      blijven perioden, waarin uitkering in verband met zwangerschap of bevalling op grond van artikel 3:7, eerste lid,
      3:8, 3:10, eerste lid, 3:18 of 3:30, eerste lid, van de Wet arbeid en zorg wordt genoten, buiten beschouwing.


      [ref1]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0013008#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0013008#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel327
    references:
      - id: ref1
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0013008
        artikel: '3'
      - id: ref5
        bwb_id: BWBR0013008
        artikel: '3'
  - number: 3:28.1
    text: De arbeidsongeschiktheidsuitkering wordt op aanvraag toegekend.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:28.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen stelt de jonggehandicapte schriftelijk in kennis
      van de mogelijkheid van het doen van een aanvraag uiterlijk vier maanden voor de datum waarop het in
      [artikel 3:3, eerste lid][ref1], genoemde tijdvak van 52 weken eindigt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:28.3
    text: |-
      Het tweede lid is niet van toepassing, indien de jonggehandicapte de melding, bedoeld in
      [artikel 3:27, eerste lid][ref1], niet of niet tijdig heeft gedaan. Indien de jonggehandicapte deze melding
      niet tijdig heeft gedaan, geldt de in het tweede lid bedoelde verplichting voor het Uitvoeringsinstituut
      werknemersverzekeringen uiterlijk drie maanden nadat de jonggehandicapte de melding heeft gedaan.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '3'
  - number: 3:28.4
    text: |-
      De jonggehandicapte die in aanmerking wenst te komen voor toekenning van de uitkering, doet zijn aanvraag binnen
      negen maanden na aanvang van zijn arbeidsongeschiktheid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:28.5
    text: |-
      Onverminderd hetgeen in deze wet terzake van herziening of intrekking van de arbeidsongeschiktheidsuitkering
      is bepaald wordt ten aanzien van personen die na 1 juli 1954 zijn geboren, op een bij of krachtens algemene
      maatregel van bestuur bepaald tijdstip door het Uitvoeringsinstituut werknemersverzekeringen bezien of er in
      verband met wijziging van de mate van arbeidsongeschiktheid gronden zijn voor herziening of intrekking van de
      arbeidsongeschiktheidsuitkering. Het tijdstip kan voor verschillende groepen van personen verschillend worden
      vastgesteld. Bij algemene maatregel van bestuur kan worden bepaald dat de eerste zin niet van toepassing is op
      bepaalde groepen van personen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:28.6
    text: |-
      Ten aanzien van personen die na 1 juli 1954 maar voor 2 juli 1959 zijn geboren en die voor 22 februari 2007 op
      grond van het vijfde lid zijn herbeoordeeld, wordt door het Uitvoeringsinstituut werknemersverzekeringen bezien
      of er per 22 februari 2007 in verband met een wijziging van de mate van arbeidsongeschiktheid gronden zijn voor
      herziening, heropening of intrekking van de arbeidsongeschiktheidsuitkering. De eerste zin is niet van toepassing
      op personen die op 22 februari 2007 reeds in de hoogste arbeidsongeschiktheidsklasse zijn ingedeeld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:28.7
    text: |-
      Op grond van de beoordeling, bedoeld in het zesde lid, wordt de mate van arbeidsongeschiktheid van de persoon,
      bedoeld in het zesde lid, die niet heeft verzocht om een nieuwe medische beoordeling, niet lager vastgesteld dan de
      mate van arbeidsongeschiktheid die voor die persoon gold op 21 februari 2007.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:28.8
    text: |-
      Een aanvraag is tijdig ingediend, indien het Uitvoeringsinstituut werknemersverzekeringen de kennisgeving, bedoeld
      in het tweede lid, niet heeft gedaan dan wel indien bij een latere kennisgeving dan bedoeld in het tweede lid de
      aanvraag wordt ingediend binnen vier weken nadat deze kennisgeving is ontvangen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:28.9
    text: |-
      Indien de toepassing van het vierde lid zou leiden tot kennelijke hardheid, is het Uitvoeringsinstituut
      werknemersverzekeringen bevoegd de uitkering ambtshalve toe te kennen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel328
  - number: 3:29.1
    text: |-
      De arbeidsongeschiktheidsuitkering gaat in op de dag, met ingang waarvan de jonggehandicapte aan de vereisten voor
      het recht op toekenning van die uitkering voldoet.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel329
  - number: 3:29.2
    text: |-
      In afwijking van het eerste lid kan de uitkering niet vroeger ingaan dan een jaar voor de dag, waarop
      de aanvraag om toekenning dan wel voortzetting van de uitkering werd ingediend. Het Uitvoeringsinstituut
      werknemersverzekeringen kan voor bijzondere gevallen van de eerste zin afwijken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel329
  - number: 3:29.3
    text: |-
      Toekenning van arbeidsongeschiktheidsuitkering vindt niet plaats, indien deze zou ingaan op of na de in
      [artikel 3:19, eerste lid, onderdeel a][ref1], bedoelde dag.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel329
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:30
    text: |-
      Herziening, heropening dan wel herleving van de arbeidsongeschiktheidsuitkering vindt op aanvraag of ambtshalve
      plaats.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel330
  - number: 3:31.1
    text: |-
      De herziening van de arbeidsongeschiktheidsuitkering gaat in op de dag, waarop de jonggehandicapte op grond van
      deze wet voor een hogere of lagere uitkering in aanmerking komt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel331
  - number: 3:31.2
    text: |-
      Met betrekking tot de herziening van de arbeidsongeschiktheidsuitkering, die een verhoging van die
      uitkering tot gevolg heeft, alsmede met betrekking tot de heropening of herleving van de uitkering is
      [artikel 3:29, tweede lid][ref1], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel331
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:31.3
    text: |-
      De herziening van een arbeidsongeschiktheidsuitkering ter zake van afneming van de arbeidsongeschiktheid gaat in op
      de dag, aangegeven in de daartoe strekkende beschikking van het Uitvoeringsinstituut werknemersverzekeringen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel331
  - number: 3:31.4
    text: |-
      Indien de herziening van de arbeidsongeschiktheidsuitkering verband houdt met een voltooide scholing of opleiding,
      gaat deze herziening niet eerder in dan een jaar na voltooiing van die scholing of opleiding.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel331
  - number: 3:31.5
    text: |-
      De herleving van de uitkering, bedoeld in [artikel 3:20, eerste lid][ref1] gaat in op de eerste dag van de maand
      volgend op die waarin hij weer in Nederland is gaan wonen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel331
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:31.6
    text: |-
      Herleving van de arbeidsongeschiktheidsuitkering vindt niet plaats, indien deze zou ingaan op of na de in
      [artikel 3:19, eerste lid, onderdeel a][ref1], bedoelde dag.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel331
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:32
    text: |-
      De vakantie-uitkering wordt ambtshalve of, ingeval [artikel 3:52, eerste lid, tweede zin][ref1], toepassing vindt,
      op aanvraag door het Uitvoeringsinstituut werknemersverzekeringen toegekend.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel332
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:33.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan, telkens wanneer het dat nodig oordeelt, oproepen of doen
      oproepen en op een door of namens hem te bepalen plaats ondervragen of doen ondervragen:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
  - number: 3:33.1.a
    text: |-
      de jonggehandicapte, die de wachttijd van 52 weken, bedoeld in [artikel 3:3, eerste lid][ref1], doormaakt;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:33.1.b
    text: de jonggehandicapte, die aanspraak maakt op of recht heeft op een arbeidsongeschiktheidsuitkering;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
  - number: 3:33.1.c
    text: |-
      de jonggehandicapte ten aanzien van wie of ten behoeve van wie een reïntegratie-instrument als bedoeld in
      [artikel 3:63][ref1] is toegekend of waarvan toekenning wordt overwogen;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 3:33.1.d
    text: |-
      de ingezetene die de leeftijd van 17 jaar nog niet heeft bereikt en ten aanzien van wie of ten behoeve van wie een
      reïntegratie-instrument als bedoeld in [artikel 3:63][ref1] is toegekend of waarvan toekenning wordt overwogen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 3:33.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan de in het eerste lid bedoelde personen op een door of namens
      hem te bepalen plaats door een of meer daartoe door hem aangewezen deskundigen doen onderzoeken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
  - number: 3:33.3
    text: |-
      De daartoe door het Uitvoeringsinstituut werknemersverzekeringen aangewezen deskundige kan, ook zonder opdracht
      van het Uitvoeringsinstituut werknemersverzekeringen, de in het eerste lid bedoelde personen oproepen, ondervragen,
      onderzoeken, doen oproepen, doen ondervragen en doen onderzoeken door een of meer door hem daartoe aangewezen
      deskundigen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel333
  - number: 3:34
    text: |-
      Opgeroepenen en, indien hun toestand geleide nodig maakt, mede hun geleiders, worden reiskosten, verblijfkosten
      en tijdverlies vergoed in de gevallen en volgens regels die door het Uitvoeringsinstituut werknemersverzekeringen
      worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel334
  - number: 3:35.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen en de door hem daartoe aangewezen deskundige kunnen de personen,
      bedoeld in [artikel 3:33, eerste lid][ref1], voorschriften geven in het belang van een behandeling of van genezing
      of tot behoud, herstel en bevordering van de mogelijkheid tot het verrichten van arbeid.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel335
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:35.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan voorschrijven dat personen, bedoeld in
      [artikel 3:33, eerste lid][ref1], zich laten registreren als werkzoekende bij het Uitvoeringsinstituut
      werknemersverzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel335
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:36
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan controlevoorschriften vaststellen. Deze voorschriften mogen
      niet verder gaan dan strikt noodzakelijk is voor een juiste uitvoering van deze wet.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel336
  - number: 3:37.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen weigert de uitkering tijdelijk of blijvend, geheel of
      gedeeltelijk, indien een persoon als bedoeld in [artikel 3:33, eerste lid][ref1], na tijdig te zijn opgeroepen niet
      is verschenen of heeft geweigerd:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel337
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:37.1.a
    text: |-
      vragen te beantwoorden die zijn gesteld door het Uitvoeringsinstituut werknemersverzekeringen of de door hem
      daartoe aangewezen deskundige;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel337
  - number: 3:37.1.b
    text: |-
      zich te laten onderzoeken door de door het Uitvoeringsinstituut werknemersverzekeringen daartoe aangewezen
      deskundige; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel337
  - number: 3:37.1.c
    text: |-
      te voldoen aan het voorschrift, gegeven door het Uitvoeringsinstituut werknemersverzekeringen of de door
      hem daartoe aangewezen deskundige, om zich ter observatie te doen opnemen of te verblijven in een aangewezen
      inrichting.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel337
  - number: 3:37.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen handelt overeenkomstig het eerste lid bij toeneming van
      de arbeidsongeschiktheid, voor zover deze toeneming kennelijk is voortgekomen uit dezelfde oorzaak als de
      arbeidsongeschiktheid, ter zake waarvan het niet voldoen aan de oproeping of de weigering plaatsvond.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel337
  - number: 3:38.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen handelt overeenkomstig [artikel 3:37][ref1], indien de
      jonggehandicapte:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
  - number: 3:38.1.a
    text: |-
      de door het Uitvoeringsinstituut werknemersverzekeringen of de door hem daartoe aangewezen deskundige krachtens
      [artikel 3:35][ref1] in het belang van een behandeling of genezing of tot behoud, herstel of bevordering van
      de mogelijkheid tot het verrichten van arbeid en tot registratie als werkzoekende bij het Uitvoeringsinstituut
      werknemersverzekeringen gegeven voorschriften zonder deugdelijke grond niet opvolgt;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:38.1.b
    text: |-
      zich niet, zolang als het Uitvoeringsinstituut werknemersverzekeringen of de door hem daartoe aangewezen deskundige
      te kennen heeft gegeven dit noodzakelijk te achten, onder geneeskundige behandeling stelt of indien hij de
      voorschriften van de behandelende arts niet opvolgt;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
  - number: 3:38.1.c
    text: |-
      zich schuldig maakt aan gedragingen, waardoor zijn genezing wordt belemmerd of nalaat voldoende mee te werken om
      aanpassing aan zijn ziekte of gebrek te verkrijgen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
  - number: 3:38.1.d
    text: |-
      de controlevoorschriften, bedoeld in [artikel 3:36][ref1], of de verplichting, bedoeld in
      [artikel 55, tweede lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref2], niet of niet
      behoorlijk is nagekomen dan wel de verplichting, bedoeld in [artikel 3:74][ref3], niet binnen de door het
      Uitvoeringsinstituut werknemersverzekeringen daarvoor vastgestelde termijn is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0013060#Artikel55
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0013060
        artikel: '55'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:38.1.e
    text: zijn arbeidsongeschiktheid opzettelijk heeft veroorzaakt;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
  - number: 3:38.1.f
    text: |-
      zich niet houdt aan het voorschrift, bedoeld in [artikel 3:28, vierde lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:38.1.g
    text: |-
      zonder redelijke gronden niet meewerkt aan een scholing of opleiding die wenselijk wordt geacht voor zijn
      inschakeling in de arbeid;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
  - number: 3:38.1.h
    text: |-
      indien de belanghebbende zonder redelijke gronden niet meewerkt aan het opstellen van de reïntegratievisie,
      bedoeld in [artikel 30a, vierde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] of het
      reïntegratieplan, bedoeld in artikel 30a, zesde lid, van die wet;


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 3:38.1.i
    text: |-
      indien de belanghebbende de verplichtingen die zijn opgenomen in de reïntegratievisie bedoeld in
      [artikel 30a, vierde lid, van de Wet structuur uitvoeringsorganisatie][ref1] werk en inkomen of in het
      reïntegratieplan, bedoeld in artikel 30a, zesde lid, van die wet niet of niet behoorlijk is nagekomen;


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 3:38.1.j
    text: |-
      indien de belanghebbende die bij deelname aan een reïntegratietraject zijn reïntegratieverplichtingen niet naleeft,
      de reden daarvan niet onmiddellijk aan het reïntegratiebedrijf heeft medegedeeld;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
  - number: 3:38.1.k
    text: |-
      zich niet onthoudt van zeer ernstige misdragingen jegens de met de uitvoering van deze wet belaste personen en
      instanties tijdens het verrichten van hun werkzaamheden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
  - number: 3:38.2
    text: |-
      Het eerste lid, onderdelen g, h, i en j zijn niet van toepassing op de jonggehandicapte die studerende is. In
      afwijking van [artikel 1:4, eerste lid][ref1], is de eerste zin ook van toepassing op de jonggehandicapte die
      studiefinanciering in de vorm van het levenlanglerenkrediet ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel338
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 3:39.1
    text: |-
      Een maatregel als bedoeld in [artikel 3:37][ref1] of [3:38][ref2] wordt afgestemd op de ernst van de gedraging en
      de mate waarin de jonggehandicapte de gedraging kan worden verweten. Van het opleggen van een maatregel wordt in
      elk geval afgezien, indien elke vorm van verwijtbaarheid ontbreekt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel339
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
  - number: 3:39.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een maatregel als bedoeld in het
      eerste lid en volstaan met het geven van een schriftelijke waarschuwing ter zake van het niet tijdig nakomen van de
      verplichting, bedoeld in [artikel 3:74][ref1], indien het niet tijdig nakomen van de verplichting niet heeft geleid
      tot het ten onrechte of tot een te hoog bedrag verlenen van uitkering, of ter zake van het zich niet houden aan het
      voorschrift, bedoeld in [artikel 3:28, vierde lid][ref2], tenzij het niet tijdig nakomen van de verplichting of het
      zich niet houden aan het voorschrift plaatsvindt binnen een periode van twee jaar te rekenen vanaf de datum waarop
      eerder aan de jonggehandicapte een zodanige waarschuwing is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel339
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '2'
        afdeling: '3'
  - number: 3:39.3
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een maatregel indien daarvoor
      dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel339
  - number: 3:39.4
    text: |-
      Het opleggen van een maatregel blijft achterwege indien voor dezelfde gedraging een bestuurlijke boete als bedoeld
      in [artikel 3:40][ref1] wordt opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel339
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
  - number: 3:39.5
    text: Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld met betrekking tot het eerste lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel339
  - number: 3:40.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen legt een bestuurlijke boete op van ten hoogste het
      benadelingsbedrag wegens het niet of niet behoorlijk nakomen door de jonggehandicapte of zijn wettelijke
      vertegenwoordiger van de verplichting, bedoeld in [artikel 3:74][ref1]. Indien de feiten en omstandigheden,
      bedoeld in artikel 3:74, eerste lid, niet of niet behoorlijk zijn medegedeeld en deze overtreding opzettelijk
      is begaan, bedraagt de bestuurlijke boete ten hoogste het bedrag van de vijfde categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2]. Indien de feiten en omstandigheden, bedoeld in
      artikel 3:74, eerste lid, niet of niet behoorlijk zijn medegedeeld en deze overtreding niet opzettelijk is begaan,
      bedraagt de bestuurlijke boete ten hoogste het bedrag van de derde categorie, bedoeld in artikel 23, vierde lid,
      van het Wetboek van Strafrecht.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 3:40.2
    text: |-
      In dit artikel wordt onder benadelingsbedrag verstaan het brutobedrag dat als gevolg van het niet of niet
      behoorlijk nakomen van de verplichting, bedoeld in [artikel 3:74][ref1], ten onrechte of tot een te hoog bedrag
      aan uitkering is ontvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:40.3
    text: |-
      Indien het niet of niet behoorlijk nakomen door de jonggehandicapte of zijn wettelijke vertegenwoordiger van
      de verplichting, bedoeld in [artikel 3:74][ref1], niet heeft geleid tot een benadelingsbedrag, of indien een
      werkgever als bedoeld in artikel 3:74, derde lid, de verplichting, bedoeld in artikel 3:74, derde lid, niet of niet
      behoorlijk nakomt, legt het Uitvoeringsinstituut werknemersverzekeringen een bestuurlijke boete op van ten hoogste
      het bedrag van de tweede categorie, bedoeld in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 3:40.4
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een bestuurlijke boete en
      volstaan met het geven van een schriftelijke waarschuwing wegens het niet of niet behoorlijk nakomen door de
      jonggehandicapte of zijn wettelijke vertegenwoordiger van de verplichting, bedoeld in [artikel 3:74][ref1],
      in situaties die bij algemene maatregel van bestuur worden bepaald, tenzij het niet of niet behoorlijk nakomen
      van de verplichting plaatsvindt binnen een periode van twee jaar te rekenen vanaf de datum waarop eerder aan de
      jonggehandicapte of zijn wettelijke vertegenwoordiger een zodanige waarschuwing is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:40.5
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen legt een bestuurlijke boete op wegens het niet of niet
      behoorlijk nakomen door de jonggehandicapte of zijn wettelijke vertegenwoordiger van de verplichting, bedoeld in
      [artikel 3:74][ref1], als gevolg waarvan ten onrechte of tot een te hoog bedrag aan uitkering is ontvangen, van
      ten hoogste 150 procent van het benadelingsbedrag, met overeenkomstige toepassing van het eerste lid, indien binnen
      een tijdvak van vijf jaar voorafgaand aan de dag van het begaan van de overtreding een eerdere bestuurlijke boete
      of strafrechtelijke sanctie is opgelegd wegens een eerdere overtreding, bestaande uit eenzelfde gedraging, die
      onherroepelijk is geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:40.6
    text: |-
      Onder eenzelfde gedraging als bedoeld in het vijfde lid wordt verstaan het niet of niet behoorlijk nakomen van de
      verplichting, bedoeld in [artikel 3:74][ref1] of [artikel 12 van de Toeslagenwet][ref2], als gevolg waarvan ten
      onrechte of tot een te hoog bedrag aan arbeidsongeschiktheidsuitkering of toeslag is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0004043#Artikel12
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0004043
        artikel: '12'
  - number: 3:40.7
    text: |-
      In afwijking van het vijfde lid is het in dat lid genoemde tijdvak van vijf jaar tien jaar indien wegens de eerdere
      overtreding, bedoeld in het vijfde lid, de jonggehandicapte of zijn wettelijke vertegenwoordiger is gestraft met
      een onvoorwaardelijke gevangenisstraf.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
  - number: 3:40.8
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan afzien van het opleggen van een bestuurlijke boete indien
      daarvoor dringende redenen aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
  - number: 3:40.9
    text: |-
      Degene aan wie een bestuurlijke boete is opgelegd, is verplicht desgevraagd aan het Uitvoeringsinstituut
      werknemersverzekeringen de inlichtingen te verstrekken die voor de tenuitvoerlegging van de bestuurlijke boete van
      belang zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
  - number: 3:40.10
    text: Bij algemene maatregel van bestuur worden nadere regels worden gesteld over de hoogte van de bestuurlijke boete.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
  - number: 3:40.11
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij de bestuurlijke boete is opgelegd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
  - number: 3:40.12
    text: |-
      In afwijking van [artikel 8:69 van de Algemene wet bestuursrecht][ref1] kan de rechter in beroep of hoger beroep
      het bedrag waarop de bestuurlijke boete is vastgesteld ook ten nadele van de jonggehandicapte of zijn wettelijke
      vertegenwoordiger wijzigen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 3:40.13
    text: |-
      Indien ten aanzien van een overtreding waarvoor een bestuurlijke boete is opgelegd geen sprake is geweest
      van opzet of grove schuld, en voorts is gebleken dat binnen een jaar nadat de bestuurlijke boete is opgelegd
      niet nogmaals een overtreding wegens eenzelfde gedraging als bedoeld in het zesde lid is begaan, is het
      Uitvoeringsinstituut werknemersverzekeringen bevoegd op verzoek van degene aan wie de bestuurlijke boete is
      opgelegd, de bestuurlijke boete geheel of gedeeltelijk kwijt te schelden bij medewerking aan een schuldregeling.
      [Artikel 3:59, eerste, derde en vierde lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:40.14
    text: |-
      Het besluit tot kwijtschelding, bedoeld in het dertiende lid, wordt ingetrokken of ten nadele van degene aan wie
      de bestuurlijke boete is opgelegd herzien indien binnen vijf jaar na het besluit tot kwijtschelding wederom een
      overtreding is begaan wegens eenzelfde gedraging als bedoeld in het zesde lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel340
  - number: 3:43.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen verrekent de bestuurlijke boete en een eerdere bestuurlijke boete
      wegens eenzelfde gedraging als bedoeld in [artikel 3:40, vijfde lid][ref1], met een uitkering op grond van deze
      wet, de [Werkloosheidswet][ref2], de [Ziektewet][ref3], de [Wet werk en inkomen naar arbeidsvermogen][ref4], de
      [Wet op de arbeidsongeschiktheidsverzekering][ref5], de [Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref6],
      de [Wet arbeidsongeschiktheidsvoorziening militairen][ref7], de [Wet inkomensvoorziening oudere werklozen][ref8],
      de [Wet arbeid en zorg][ref9] of een toeslag op grond van de [Toeslagenwet][ref10], die de persoon aan wie een
      bestuurlijke boete is opgelegd ontvangt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0004045
      [ref3]: https://wetten.overheid.nl/BWBR0001888
      [ref4]: https://wetten.overheid.nl/BWBR0019057
      [ref5]: https://wetten.overheid.nl/BWBR0002524
      [ref6]: https://wetten.overheid.nl/BWBR0008656
      [ref7]: https://wetten.overheid.nl/BWBR0002822
      [ref8]: https://wetten.overheid.nl/BWBR0024394
      [ref9]: https://wetten.overheid.nl/BWBR0013008
      [ref10]: https://wetten.overheid.nl/BWBR0004043
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'

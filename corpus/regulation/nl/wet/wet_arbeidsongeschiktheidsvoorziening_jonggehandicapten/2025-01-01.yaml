        hoofdstuk: '2'
        afdeling: '5'
  - number: 7:1
    text: |-
      Een gedraging die in strijd is met een krachtens deze wet uitgevaardigde algemene maatregel van bestuur voor zover
      uitdrukkelijk als strafbaar feit in de zin van dit artikel aangeduid, wordt gestraft met een hechtenis van ten
      hoogste een maand of geldboete van de tweede categorie.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel71
  - number: 7:2
    text: |-
      De in [artikel 7:1][ref1] bedoelde strafbare feiten worden als overtredingen beschouwd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel72
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '7'
        hoofdstuk: '7'
  - number: 8:1
    text: |-
      In gedingen aangevangen voor het van toepassing worden van [artikel 4:2, derde lid][ref1], bepaalt de rechter op
      verzoek van een van de partijen of ambtshalve een termijn waarbinnen partijen de gelegenheid wordt geboden hun
      stellingen en conclusies voor zover nodig aan te passen aan artikel 4:2, derde lid. Stelt de rechter partijen tot
      een zodanige aanpassing in de gelegenheid, dan staat tegen die beslissing geen rechtsmiddel open; wijst de rechter
      een daartoe strekkend verzoek af, dan staat een rechtsmiddel daartegen slechts gelijktijdig met de einduitspraak
      open.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel81
    references:

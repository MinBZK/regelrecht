  - number: 8:8.5
    text: 'Het vierde lid is niet langer van toepassing, indien gedurende een aaneengesloten periode van een jaar:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
  - number: 8:8.5.a
    text: |-
      de inkomensvoorziening of de arbeidsongeschiktheidsuitkering op grond van [artikel 2:40][ref1], [2:46][ref2],
      [3:8][ref3] of [3:8b][ref4] hoger is dan het garantiebedrag; of



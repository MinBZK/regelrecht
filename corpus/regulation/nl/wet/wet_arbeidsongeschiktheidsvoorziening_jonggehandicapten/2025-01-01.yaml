  - number: 3:54.1
    text: |-
      Na het overlijden van de jonggehandicapte, aan wie een arbeidsongeschiktheidsuitkering is toegekend, wordt met
      ingang van de dag na het overlijden, de uitkering in de vorm van een overlijdensuitkering betaald:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.1.a
    text: aan de langstlevende van de echtgenoten;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.1.b
    text: |-
      bij ontstentenis van de in onderdeel a bedoelde persoon, aan de minderjarige kinderen tot wie de overledene in
      familierechtelijke betrekking stond;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.1.c
    text: |-
      bij ontstentenis van de in de onderdelen a en b bedoelde personen aan degenen met wie de overledene in
      gezinsverband leefde.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.2
    text: |-
      De overlijdensuitkering is gelijk aan het bedrag van de uitkering over één maand, doch niet over de zaterdagen
      en de zondagen, berekend naar de hoogte van die uitkering op de dag of laatstelijk voor de dag van overlijden van
      de jonggehandicapte.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.3
    text: |-
      In verband met het overlijden van de jonggehandicapte aan wie een uitkering is toegekend, is
      [artikel 3:19, eerste lid, onderdeel a][ref1], niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:54.4
    text: |-
      De overlijdensuitkering wordt ambtshalve of op aanvraag aan de rechthebbende of rechthebbenden, bedoeld in het
      eerste lid, door het Uitvoeringsinstituut werknemersverzekeringen betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.5
    text: De overlijdensuitkering wordt in een bedrag ineens betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:54.6
    text: |-
      Het bedrag van de overlijdensuitkering wordt verminderd met het bedrag aan arbeidsongeschiktheidsuitkering dat over
      na het overlijden gelegen dagen reeds is betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel354
  - number: 3:55
    text: |-
      Uitkeringen op grond van deze wet die niet in ontvangst zijn genomen of zijn ingevorderd binnen twee jaren na de
      dag van betaalbaarstelling, worden niet meer betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel355
  - number: 3:56.1
    text: |-
      De uitkering die als gevolg van een besluit als bedoeld in [artikel 3:18][ref1] onverschuldigd is verstrekt,
      alsmede hetgeen anderszins onverschuldigd is betaald, wordt door het Uitvoeringsinstituut werknemersverzekeringen
      teruggevorderd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:56.2
    text: |-
      De uitkering die onverschuldigd aan de werkgever is betaald, wordt door het Uitvoeringsinstituut
      werknemersverzekeringen van de werkgever teruggevorderd, indien de werkgever de uitkering op grond van
      [artikel 629, vijfde lid, van Boek 7 van het Burgerlijk Wetboek][ref1] in mindering heeft kunnen brengen op het
      loon.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel629
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '629'
  - number: 3:56.3
    text: |-
      In afwijking van het eerste lid kan het Uitvoeringsinstituut werknemersverzekeringen besluiten van terugvordering
      of van verdere terugvordering af te zien, indien degene van wie wordt teruggevorderd:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.3.a
    text: gedurende vijf jaar volledig aan zijn betalingsverplichtingen heeft voldaan;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.3.b
    text: |-
      gedurende vijf jaar niet volledig aan zijn betalingsverplichtingen heeft voldaan, maar het achterstallige bedrag
      over die periode, vermeerderd met de daarover verschuldigde wettelijke rente en de op de invordering betrekking
      hebbende kosten, alsnog heeft betaald;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.3.c
    text: |-
      gedurende vijf jaar geen betalingen heeft verricht en niet aannemelijk is dat hij deze op enig moment zal gaan
      verrichten; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.3.d
    text: een bedrag, overeenkomend met ten minste 50% van de restsom in één keer aflost.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.4
    text: |-
      De in het derde lid, onderdelen a, b en c, genoemde termijn is tien jaar indien de terugvordering het gevolg is van
      het niet of niet behoorlijk nakomen van de verplichting, bedoeld in [artikel 3:74][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:56.5
    text: 'De in het derde lid, onder a en b, genoemde termijn is drie jaar indien:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.5.a
    text: |-
      het gemiddeld inkomen van de belanghebbende in die periode de beslagvrije voet bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1] niet te boven is gegaan; en


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 3:56.5.b
    text: |-
      de terugvordering niet het gevolg is van het niet of niet behoorlijk nakomen van de verplichting, bedoeld in
      [artikel 3:74][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:56.6
    text: |-
      Indien daarvoor dringende redenen aanwezig zijn kan het Uitvoeringsinstituut werknemersverzekeringen besluiten
      geheel of gedeeltelijk van terugvordering af te zien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.7
    text: |-
      De persoon van wie of de instelling waarvan wordt teruggevorderd is verplicht desgevraagd aan het
      Uitvoeringsinstituut werknemersverzekeringen de inlichtingen te verstrekken die voor de terugvordering van belang
      zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:56.8
    text: |-
      In afwijking van het eerste lid kan het Uitvoeringsinstituut werknemersverzekeringen, onder voorwaarden die Onze
      Minister kan stellen, besluiten van terugvordering af te zien indien het terug te vorderen bedrag een door Onze
      Minister vast te stellen bedrag niet te boven gaat.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel356
  - number: 3:57.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan de onverschuldigd betaalde uitkering, bedoeld in
      [artikel 3:56, eerste en tweede lid][ref1], invorderen bij dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel357
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:57.2
    text: |-
      [Artikel 3:43][ref1] is van overeenkomstige toepassing, met dien verstande dat indien het
      gemiddeld inkomen van de belanghebbende gedurende drie jaar de beslagvrije voet bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref2] niet te boven is gegaan, het
      Uitvoeringsinstituut werknemersverzekeringen de aflossingsbedragen lager vaststelt.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel357
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0001827
        artikel: 475c
  - number: 3:58
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de wijze van tenuitvoerlegging van de
      beschikking waarbij is vastgesteld dat onverschuldigd is betaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel358
  - number: 3:59.1
    text: |-
      In afwijking van [artikel 3:56, eerste lid][ref1], kan het Uitvoeringsinstituut werknemersverzekeringen, op verzoek
      van de jonggehandicapte, besluiten gedeeltelijk van terugvordering of gedeeltelijk van verdere terugvordering af te
      zien door medewerking aan een schuldregeling, indien:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:59.1.a
    text: |-
      redelijkerwijs te voorzien is dat de jonggehandicapte niet zal kunnen voortgaan met het betalen van zijn schulden
      of indien hij in de toestand verkeert dat hij heeft opgehouden te betalen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.1.b
    text: |-
      redelijkerwijs te voorzien is dat een schuldregeling met betrekking tot alle vorderingen, behoudens de in het
      tweede lid bedoelde vorderingen, van de overige schuldeisers zonder een zodanig besluit niet tot stand zal komen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.1.c
    text: |-
      een naar het oordeel van het Uitvoeringsinstituut werknemersverzekeringen betrouwbaar voorstel voor
      een schuldregeling tot stand is gekomen door tussenkomst van een schuldhulpverlener als bedoeld in
      [artikel 48 van de Wet op het consumentenkrediet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004815#Artikel48
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
    references:
      - id: ref1
        bwb_id: BWBR0004815
        artikel: '48'
  - number: 3:59.1.d
    text: aannemelijk is dat medewerking aan een schuldregeling niet concurrentieverstorend werkt; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.1.e
    text: |-
      uitdeling in het kader van de schuldregeling plaatsvindt overeenkomstig
      [artikel 349 van de Faillissementswet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001860#Artikel349
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
    references:
      - id: ref1
        bwb_id: BWBR0001860
        artikel: '349'
  - number: 3:59.2
    text: |-
      Het eerste lid is niet van toepassing indien een vordering is ontstaan door het opzettelijk of door grove schuld
      niet nakomen door de jonggehandicapte van de verplichting, bedoeld in [artikel 3:74][ref1], en hiervoor een boete
      als bedoeld in [artikel 3:40][ref2] is opgelegd, dan wel indien hiervoor aangifte is gedaan op grond van het
      [Wetboek van Strafrecht][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0001854
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0001854
  - number: 3:59.3
    text: |-
      Het besluit tot het afzien van terugvordering of van verdere terugvordering wordt ingetrokken of ten nadele van de
      jonggehandicapte gewijzigd indien:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.3.a
    text: |-
      niet binnen twaalf maanden nadat dat besluit is bekendgemaakt, een schuldregeling tot stand is gekomen die voldoet
      aan de eisen, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.3.b
    text: |-
      de jonggehandicapte zijn schuld aan het Uitvoeringsinstituut werknemersverzekeringen niet overeenkomstig de
      schuldregeling voldoet; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.3.c
    text: |-
      onjuiste of onvolledige gegevens zijn verstrekt en de verstrekking van juiste of volledige gegevens tot een ander
      besluit zou hebben geleid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:59.4
    text: |-
      Bij ministeriële regeling kunnen met betrekking tot dit artikel nadere regels worden gesteld ten aanzien van de
      bevoegdheid om mee te werken aan schuldregelingen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel359
  - number: 3:60
    text: |-
      Een vordering van het Uitvoeringsinstituut werknemersverzekeringen als bedoeld in [artikel 3:56][ref1]
      en [3:59][ref2] is bevoorrecht en volgt onmiddellijk na de vorderingen, bedoeld in
      [artikel 288 van Boek 3 van het Burgerlijk Wetboek][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0005291#Artikel288
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel360
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
      - id: ref3
        bwb_id: BWBR0005291
        artikel: '288'
  - number: 3:61.1
    text: 'Onvervreemdbaar en niet vatbaar voor verpanding en belening zijn:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
  - number: 3:61.1.a
    text: de arbeidsongeschiktheidsuitkering;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
  - number: 3:61.1.b
    text: |-
      de verhoging van de arbeidsongeschiktheidsuitkering, bedoeld in [artikel 3:9][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:61.1.c
    text: de vakantie-uitkering;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
  - number: 3:61.1.d
    text: |-
      de tegemoetkoming, bedoeld in [artikel 3:10][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:61.2
    text: Volmacht tot ontvangst van een uitkering onder welke vorm of welke benaming ook verleend, is steeds herroepelijk.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
  - number: 3:61.3
    text: Elk beding, strijdig met dit artikel, is nietig.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel361
  - number: 3:62
    text: 'Niet vatbaar voor beslag zijn:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel362
  - number: 3:62.a
    text: |-
      de verhoging, bedoeld in [artikel 3:9][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel362
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:62.b
    text: |-
      de overlijdensuitkering, bedoeld in [artikel 3:54][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel362
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:63.1
    text: |-
      Indien de arbeidsprestatie van een werknemer die recht heeft op een arbeidsongeschiktheidsuitkering
      in een bepaalde functie, maar geen functie waarin hij werkzaam is als werknemer in de zin van de
      [Wet sociale werkvoorziening][ref1] of op een arbeidsovereenkomst als bedoeld in [artikel 7 van die wet][ref2],
      ten gevolge van ziekte of gebrek duidelijk minder is dan de arbeidsprestatie die een geldelijke beloning van
      het minimumloon rechtvaardigt, vermindert het Uitvoeringsinstituut werknemersverzekeringen op verzoek van de
      betrokken werkgever of werknemer de hoogte van de aanspraak op een geldelijke beloning voor de verrichte arbeid
      naar evenredigheid, in afwijking van hetgeen bij en krachtens de [Wet minimumloon en minimumvakantiebijslag][ref3]
      is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0008903
      [ref2]: https://wetten.overheid.nl/BWBR0008903#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0002638
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel363
    references:
      - id: ref1
        bwb_id: BWBR0008903
      - id: ref2
        bwb_id: BWBR0008903
        artikel: '7'
      - id: ref3
        bwb_id: BWBR0002638
  - number: 3:63.2
    text: |-
      Elk beding waarbij een geldelijke beloning voor de verrichte arbeid wordt overeengekomen die lager is dan de
      beloning, vastgesteld op grond van het eerste lid is nietig.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel363
  - number: 3:65.1
    text: |-
      Bij algemene maatregel van bestuur kan bij wijze van experiment, met het oog op het onderzoeken van
      mogelijkheden om deze wet met betrekking tot de inschakeling in de arbeid van jonggehandicapten die recht op een
      arbeidsongeschiktheidsuitkering hebben, doeltreffender uit te voeren, worden afgeweken van het bepaalde bij of
      krachtens de artikelen van deze wet. Bij toepassing van de eerste zin wordt bij algemene maatregel van bestuur
      geregeld op welke wijze van welke artikelen wordt afgeweken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel365
  - number: 3:65.2
    text: |-
      Een experiment als bedoeld in het eerste lid duurt ten hoogste vier jaar. Indien, voor een experiment is afgelopen,
      een voorstel van wet is ingediend bij de Staten-Generaal om het experiment om te zetten in een structurele
      wettelijke regeling, kan het experiment worden verlengd tot het tijdstip waarop het voorstel van wet in werking
      treedt. Het eerste lid, tweede zin, is van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel365
  - number: 3:65.3
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de uitvoering van een experiment en
      voorzieningen worden getroffen voor zich gedurende een experiment voordoende onvoorziene gevallen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel365
  - number: 3:65.4
    text: |-
      Onze Minister meldt aan de Staten-Generaal hoe het experiment in de praktijk is verlopen, alsmede zijn standpunt
      inzake de voortzetting ervan anders dan als experiment.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel365
  - number: 3:65.5
    text: |-
      De voordracht voor krachtens dit artikel vast te stellen algemene maatregelen van bestuur wordt niet eerder gedaan
      dan vier weken nadat het ontwerp aan beide kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel365
  - number: 3:66.1
    text: |-
      De jonggehandicapte die recht heeft op een arbeidsongeschiktheidsuitkering heeft recht op ondersteuning bij
      arbeidsinschakeling en, met inachtneming van de daarvoor geldende wettelijke bepalingen, op de naar het oordeel van
      het Uitvoeringsinstituut werknemersverzekeringen noodzakelijk geachte voorziening gericht op arbeidsinschakeling.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel366
  - number: 3:66.2
    text: |-
      Indien het Uitvoeringsinstituut werknemersverzekeringen ten behoeve van een jonggehandicapte die recht heeft op
      ondersteuning bij arbeidsinschakeling werkzaamheden door een re-integratiebedrijf laat verrichten, is het eerste
      lid van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel366
  - number: 3:66a
    text: |-
      In de re-integratievisie of het re-integratieplan, bedoeld in
      [artikel 30a, zesde lid, van de Wet structuur uitvoeringsorganisatie werk en inkomen][ref1], kan voor de
      jonggehandicapte de verplichting worden opgenomen om een aanbod van concrete passende arbeid te accepteren.


      [ref1]: https://wetten.overheid.nl/BWBR0013060#Artikel30a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel366a
    references:
      - id: ref1
        bwb_id: BWBR0013060
        artikel: 30a
  - number: 3:69.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan, in het kader van de bevordering van de inschakeling in de
      arbeid, toestemming verlenen aan de jonggehandicapte, die recht heeft op een arbeidsongeschiktheidsuitkering om op
      een proefplaats bij een werkgever gedurende maximaal zes maanden onbeloonde werkzaamheden te verrichten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.2
    text: |-
      Tijdens het verrichten van werkzaamheden op een proefplaats als bedoeld in het eerste lid wordt de
      arbeidsongeschiktheidsuitkering niet ingetrokken of herzien.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.3
    text: 'De onbeloonde werkzaamheden op een proefplaats als bedoeld in het eerste lid zijn:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.3.a
    text: |-
      werkzaamheden, waartoe de jonggehandicapte, bedoeld in het eerste lid, met zijn krachten en bekwaamheden in staat
      is;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.3.b
    text: |-
      werkzaamheden, waarbij de werkgever, bij wie de proefplaatsing geschiedt, een aansprakelijkheidsverzekering ten
      behoeve van de jonggehandicapte, bedoeld in het eerste lid, heeft afgesloten;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.3.c
    text: |-
      werkzaamheden, die de jonggehandicapte, bedoeld in het eerste lid, niet reeds eerder onbeloond op een proefplaats
      bij die werkgever of diens rechtsvoorganger heeft verricht; en
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.3.d
    text: |-
      werkzaamheden, waarbij er, naar het oordeel van het Uitvoeringsinstituut werknemersverzekeringen, een reëel
      uitzicht is op een op de onbeloonde werkzaamheden aansluitende dienstbetrekking van dezelfde of grotere omvang voor
      ten minste 6 maanden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.4
    text: |-
      Indien de werkzaamheden, bedoeld in het eerste lid, wegens ziekte worden onderbroken, wordt de periode waarin een
      uitkering bij ziekte wordt ontvangen, voor de toepassing van dat lid buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:69.5
    text: Bij ministeriële regeling kunnen nadere regels worden gesteld met betrekking tot de uitvoering van dit artikel.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel369
  - number: 3:73
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan de jonggehandicapte, die recht heeft op een
      arbeidsongeschiktheidsuitkering, en voor wie de kans op inschakeling in het arbeidsproces gering is en die
      daardoor vooralsnog niet bemiddelbaar is op de arbeidsmarkt, onbeloonde additionele werkzaamheden laten verrichten
      gedurende maximaal twee jaar. [Artikel 10a, tweede tot en met tiende lid, van de Participatiewet][ref1] is van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0015703#Artikel10a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel373
    references:
      - id: ref1
        bwb_id: BWBR0015703
        artikel: 10a
  - number: 3:73a.1
    text: |-
      De [artikelen 3:63][ref1], [3:66][ref2], [3:69][ref3] en [3:73][ref4] zijn niet van toepassing op
      de jonggehandicapte die duurzaam geen mogelijkheden tot arbeidsparticipatie heeft als bedoeld in
      [artikel 3:8a, eerste lid][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel373a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref4
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref5
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:73a.2
    text: |-
      In afwijking van het eerste lid is [artikel 3:63][ref1] wel van toepassing op de jonggehandicapte die duurzaam
      geen mogelijkheden tot arbeidsparticipatie heeft, indien ten aanzien van die jonggehandicapte voor 1 januari 2018
      loondispensatie was verleend en voor zover het een verzoek om loondispensatie betreft voor dezelfde functie als
      waarvoor de loondispensatie voor 1 januari 2018 was verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel373a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 3:74.1
    text: |-
      De jonggehandicapte, diens wettelijke vertegenwoordiger alsmede de instelling, bedoeld in [artikel 3:47][ref1],
      waaraan arbeidsongeschiktheidsuitkering wordt betaald, zijn verplicht aan het Uitvoeringsinstituut
      werknemersverzekeringen, op zijn verzoek of onverwijld uit eigen beweging mededeling te doen van alle feiten
      of omstandigheden, waarvan het hun redelijkerwijs duidelijk moet zijn dat zij van invloed kunnen zijn op het
      recht op uitkering, de hoogte van de uitkering, het geldend maken van het recht op uitkering of op het bedrag
      van de uitkering, dat wordt betaald. Deze verplichting geldt niet indien die feiten en omstandigheden door het
      Uitvoeringsinstituut werknemersverzekeringen kunnen worden vastgesteld op grond van bij wettelijk voorschrift
      als authentiek aangemerkte gegevens of kunnen worden verkregen uit bij ministeriële regeling aan te wijzen
      administraties. Bij ministeriële regeling wordt bepaald voor welke gegevens de tweede zin van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel374
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:74.2
    text: |-
      Op de jonggehandicapte die aanspraak maakt op of recht heeft op een vakantie-uitkering dan wel een tegemoetkoming
      als bedoeld in [artikel 3:10][ref1], en diens wettelijke vertegenwoordiger rusten overeenkomstige verplichtingen
      als omschreven in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel374
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
  - number: 3:74.3
    text: |-
      De jonggehandicapte aan wie een re-integratie-instrument als bedoeld in [afdeling 5][ref1] is verstrekt
      of toegekend, of aan wie verstrekking of toekenning daarvan wordt overwogen, alsmede diens wettelijk
      vertegenwoordiger, en de werkgever ten behoeve van wie het Uitvoeringsinstituut werknemersverzekeringen de
      aanspraak op een geldelijke beloning voor de verrichte arbeid, op grond van [artikel 3:63][ref2], heeft verminderd,
      zijn verplicht aan het Uitvoeringsinstituut werknemersverzekeringen op zijn verzoek of onverwijld uit eigen
      beweging mededeling te doen van alle feiten en omstandigheden, waarvan hun redelijkerwijs duidelijk moet zijn dat
      zij van invloed kunnen zijn op de verstrekking of toekenning of op de duur of de hoogte van het re-integratie-
      instrument.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel374
    references:
      - id: ref1
        bwb_id: BWBR0008657
        hoofdstuk: '3'
        afdeling: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '5'
  - number: 3:75.1
    text: |-
      De persoon die op 1 juli van het kalenderjaar recht heeft op een arbeidsongeschiktheidsuitkering of recht heeft op
      arbeidsondersteuning, heeft recht op een tegemoetkoming.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.2
    text: De persoon, bedoeld in het eerste lid, ontvangt per kalenderjaar een tegemoetkoming van € 219,90.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.3
    text: |-
      Het bedrag, genoemd in het tweede lid, wordt jaarlijks per 1 januari gewijzigd overeenkomstig de
      tabelcorrectiefactor, bedoeld in [artikel 10.2 van de Wet inkomstenbelasting 2001][ref1]. Het gewijzigde bedrag
      wordt door of namens Onze Minister medegedeeld in de Staatscourant.


      [ref1]: https://wetten.overheid.nl/BWBR0011353#Artikel10
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
    references:
      - id: ref1
        bwb_id: BWBR0011353
        artikel: '10'
  - number: 3:75.4
    text: |-
      In afwijking van het derde lid kan het bedrag, genoemd in het tweede lid, bij algemene maatregel van bestuur met
      ingang van een bij die maatregel aan te geven datum worden vervangen door een ander bedrag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.5
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen verstrekt de tegemoetkoming ambtshalve in het derde kwartaal van
      het kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.6
    text: De tegemoetkoming is niet vatbaar voor beslag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.7
    text: |-
      De tegemoetkoming blijft buiten beschouwing bij de verlening van op het inkomen of vermogen afgestemde
      publiekrechtelijke uitkeringen en verstrekkingen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.8
    text: |-
      De tegemoetkoming is niet vatbaar voor terugvordering of verrekening met openstaande vorderingen in verband met een
      uitkering op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 3:75.9
    text: |-
      De tegemoetkoming wordt slecht één keer uitgekeerd in het geval er tevens aanspraak gemaakt kan worden
      op de tegemoetkoming op grond van [artikelen 63a van de Wet werk en inkomen naar arbeidsvermogen][ref1],
      [65l van de Wet op de arbeidsongeschiktheidsverzekering][ref2] of
      [67i van de Wet arbeidsongeschiktheidsverzekering zelfstandigen][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0019057#Artikel63a
      [ref2]: https://wetten.overheid.nl/BWBR0002524#Artikel65l
      [ref3]: https://wetten.overheid.nl/BWBR0008656#Artikel67i
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
    references:
      - id: ref1
        bwb_id: BWBR0019057
        artikel: 63a
      - id: ref2
        bwb_id: BWBR0002524
        artikel: 65l
      - id: ref3
        bwb_id: BWBR0008656
        artikel: 67i
  - number: 3:75.10
    text: De tegemoetkoming en de daarmee gepaard gaande beheerskosten komen ten laste van het Rijk.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel375
  - number: 4:1
    text: |-
      Bij de vaststelling van de schadevergoeding, waarop de jonggehandicapte naar burgerlijk recht aanspraak kan maken
      ter zake van zijn arbeidsongeschiktheid, houdt de rechter rekening met de aanspraken, die hij op grond van deze
      wet heeft.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel41
  - number: 4:2.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen heeft voor de op grond van deze wet gemaakte kosten verhaal op
      degene, die in verband met het veroorzaken van arbeidsongeschiktheid jegens de jonggehandicapte naar burgerlijk
      recht tot schadevergoeding is verplicht, doch ten hoogste tot het bedrag, waarvoor deze bij het ontbreken van
      de aanspraken krachtens deze wet naar burgerlijk recht aansprakelijk zou zijn, verminderd met een bedrag, gelijk
      aan dat van de schadevergoeding tot betaling waarvan de aansprakelijke persoon jegens de jonggehandicapte naar
      burgerlijk recht is gehouden.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel42
  - number: 4:2.2
    text: |-
      Overeenkomstig door Onze Minister te stellen regels kan het Uitvoeringsinstituut werknemersverzekeringen in plaats
      van het bedrag van de periodieke verstrekkingen de contante waarde daarvan vorderen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel42
  - number: 4:2.3
    text: |-
      De in het eerste lid bedoelde aansprakelijke en de aansprakelijke jegens de ingezetene die de leeftijd van
      achttien jaar nog niet heeft bereikt zijn eveneens verplicht tot vergoeding van de door het Uitvoeringsinstituut
      werknemersverzekeringen gemaakte redelijke kosten ter nakoming van de verplichtingen tot inschakeling in de arbeid
      van de jonggehandicapte, die op het Uitvoeringsinstituut werknemersverzekeringen rusten op grond van deze wet
      en de daarop berustende bepalingen alsmede de [Wet structuur uitvoeringsorganisatie werk en inkomen][ref1] en de
      daarop berustende bepalingen. De aansprakelijke kan hetzelfde verweer voeren dat hem jegens de jonggehandicapte ten
      dienste zou hebben gestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0013060
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel42
    references:
      - id: ref1
        bwb_id: BWBR0013060
  - number: 5:1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen beheert en administreert afzonderlijk de in [artikel 5:2][ref1]
      bedoelde middelen tot dekking van de uitgaven en de uitgaven, bedoeld in [artikel 5:3][ref2], in de vorm
      van een Arbeidsongeschiktheidsfonds jonggehandicapten dat deel uitmaakt van het Uitvoeringsinstituut
      werknemersverzekeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel5
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel51
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '5'
        hoofdstuk: '5'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '5'
        hoofdstuk: '5'
  - number: 5:2
    text: |-
      In de middelen tot dekking van de uitgaven ten laste van het Arbeidsongeschiktheidsfonds jonggehandicapten wordt
      voorzien door:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel52
  - number: 5:2.a
    text: het Rijk;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel52
  - number: 5:2.b
    text: |-
      de bedragen, bedoeld in de [artikelen 2:54][ref1] en [3:46][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel52
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '2'
        afdeling: '8'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 5:2.c
    text: |-
      de bestuurlijke boeten, bedoeld in de [artikelen 2:69][ref1] en [3:40][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel52
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '9'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
  - number: 5:2.d
    text: |-
      de bedragen die het Uitvoeringsinstituut werknemersverzekeringen ontvangt met toepassing van verhaal als bedoeld
      in [artikel 4:2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel52
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '4'
        hoofdstuk: '4'
  - number: 5:3.1
    text: 'Ten laste van het Arbeidsongeschiktheidsfonds jonggehandicapten komen:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel53
  - number: 5:3.1.a
    text: de op grond van deze wet te betalen uitkeringen en inkomensvoorzieningen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel53
  - number: 5:3.1.b
    text: |-
      de op grond van enige wet over de uitkeringen en inkomensvoorzieningen op grond van deze wet
      door het Uitvoeringsinstituut werknemersverzekeringen verschuldigde premies die niet op deze
      uitkeringen en inkomensvoorzieningen in mindering kunnen worden gebracht en de op grond van

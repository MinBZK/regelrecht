  - number: 8:10e
    text: |-
      [Artikel 3:22, vierde lid][ref1], zoals dat luidde op de dag voor het tijdstip van inwerkingtreding van
      artikel I, onderdeel HHa, van de wet van 27 mei 2020 tot wijziging van de Wet arbeidsongeschiktheidsvoorziening
      jonggehandicapten en enkele andere wetten in verband met verdere activering van de participatie van
      jonggehandicapten en het harmoniseren van de verschillende regimes Wajong (Stb. 2020, 173), blijft van toepassing
      op de jonggehandicapte, wiens arbeidsongeschiktheidsuitkering meer dan vier weken voor dat tijdstip, in verband met
      [artikel 3:19, eerste lid, onderdeel b][ref2], is ingetrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810e

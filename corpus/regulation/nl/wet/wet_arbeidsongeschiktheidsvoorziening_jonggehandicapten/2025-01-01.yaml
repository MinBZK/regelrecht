  - number: 5:3.2
    text: Het Uitvoeringsinstituut werknemersverzekeringen kan nadere regels stellen omtrent het eerste lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel53
  - number: 5:4
    text: |-
      [Artikel 120 van de Wet financiering sociale verzekeringen][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0017745#Artikel120
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel54
    references:
      - id: ref1
        bwb_id: BWBR0017745
        artikel: '120'
  - number: 6:1.1
    text: |-
      Beschikkingen op grond van deze wet en de daarop berustende bepalingen worden gegeven binnen een redelijke termijn
      na ontvangst van de aanvraag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel61
  - number: 6:1.2
    text: |-
      De redelijke termijn is in ieder geval verstreken wanneer binnen veertien weken na ontvangst van de aanvraag geen
      beschikking is gegeven, noch een kennisgeving als bedoeld in het derde of vierde lid is gedaan.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel61
  - number: 6:1.3
    text: |-
      Indien een beschikking niet binnen de termijn van veertien weken kan worden gegeven, wordt die termijn met een
      redelijke termijn verlengd en wordt de aanvrager daarvan schriftelijk in kennis gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel61
  - number: 6:1.4
    text: |-
      Indien in verband met het geven van een beschikking als bedoeld in het eerste lid een in het buitenland wonende
      persoon is opgeroepen en om die reden de beschikking niet binnen veertien weken gegeven kan worden, wordt die
      termijn verlengd met ten hoogste zes maanden en wordt de aanvrager van deze verlenging schriftelijk in kennis
      gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel61
  - number: 6:3.1
    text: |-
      In afwijking van [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1] beslist het
      Uitvoeringsinstituut werknemersverzekeringen binnen dertien weken gerekend vanaf de dag na die waarop de termijn
      voor het indienen van het bezwaarschrift is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel63
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: 6:3.2
    text: |-
      Indien bezwaar wordt gemaakt tegen een besluit waaraan een medische of arbeidskundige beoordeling
      ten grondslag ligt, beslist het Uitvoeringsinstituut werknemersverzekeringen, in afwijking van
      [artikel 7:10, eerste lid, van de Algemene wet bestuursrecht][ref1], binnen zeventien weken of, indien het advies
      vraagt aan een deskundige die niet onder zijn verantwoordelijkheid werkzaam is binnen een en twintig weken,
      gerekend vanaf de dag na die waarop de termijn voor het indienen van het bezwaarschrift is verstreken.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel63
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: 6:3.3
    text: |-
      Indien in verband met het geven van een beslissing op bezwaar een in het buitenland wonende persoon is opgeroepen
      en om die reden de beslissing op bezwaar niet binnen de in het tweede lid bedoelde termijn gegeven kan worden,
      wordt de beslissing, in afwijking van [artikel 7:10, derde lid, van de Algemene wet bestuursrecht][ref1], verdaagd
      met ten hoogste zes maanden en wordt de aanvrager van deze verdaging schriftelijk in kennis gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel63
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '7'
  - number: 6:4
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld ten aanzien van de behandeling van bezwaarschriften
      tegen besluiten, waaraan een medische of arbeidskundige beoordeling ten grondslag ligt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel64
  - number: 6:5.1
    text: |-
      Tegen uitspraken van de Centrale Raad van Beroep kan ieder der partijen beroep in cassatie instellen ter zake van
      schending of verkeerde toepassing van de [artikelen 1:1, derde tot en met zevende lid][ref1], en [1:2][ref2] en de
      op die artikelen berustende bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel65
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 6:5.2
    text: |-
      Op dit beroep zijn de voorschriften betreffende het beroep in cassatie tegen uitspraken van de gerechtshoven inzake
      beroepen in belastingzaken van overeenkomstige toepassing, waarbij de Centrale Raad van Beroep de plaats inneemt
      van een gerechtshof.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel65
  - number: 6:6
    text: |-
      Titel 4.2 van de Algemene wet bestuursrecht is niet van toepassing op aanspraken op grond van [artikel 2:22][ref1]
      en [artikel 2:23][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel66
    references:

  - number: 8:10.1
    text: |-
      De jonggehandicapte die recht heeft op een arbeidsongeschiktheidsuitkering op grond van [hoofdstuk 3][ref1] heeft
      geen recht op arbeidsondersteuning op grond van [hoofdstuk 2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810
    references:
      - id: ref1
        bwb_id: BWBR0008657
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0008657
        hoofdstuk: '2'
  - number: 8:10.2
    text: |-
      [Hoofdstuk 4 van de Invoeringswet nieuwe en gewijzigde arbeidsongeschiktheidsregelingen][ref1] is niet van
      toepassing op de jonggehandicapte die recht heeft op arbeidsondersteuning op grond van [hoofdstuk 2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008658#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810
    references:

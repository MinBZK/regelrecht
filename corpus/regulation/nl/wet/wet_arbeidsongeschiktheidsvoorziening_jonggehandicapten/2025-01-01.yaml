        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0008657
        hoofdstuk: '2'
  - number: 8:10a
    text: |-
      [Artikel 2:23][ref1] is niet van toepassing op de jonggehandicapte, wiens arbeid als zelfstandige is aangevangen
      voor de dag van inwerkingtreding van de Wet van 3 december 2009 tot uitbreiding van de mogelijkheid om
      voorzieningen te verstrekken bij arbeid als zelfstandige (Stb. 2009, 589).


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810a
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 8:10b.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen stelt vast of de jonggehandicapte met een mate
      van arbeidsongeschiktheid van 80% of meer, geen mogelijkheden tot arbeidsparticipatie heeft
      als bedoeld in [artikel 3:8a][ref1], zoals dat artikel komt te luiden na inwerkingtreding van
      [artikel III, onderdeel O, van de Invoeringswet Participatiewet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0035333#ArtikelIII
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810b
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '1'
        afdeling: '2'
      - id: ref2
        bwb_id: BWBR0035333
        artikel: III
  - number: 8:10b.2
    text: |-
      Bij of krachtens algemene maatregel van bestuur worden regels gesteld met betrekking tot de beoordeling van het
      geen mogelijkheden tot arbeidsparticipatie hebben. Daarbij kan een procedure worden vastgesteld die afwijkt van
      de procedure bij de beoordeling van de mogelijkheden tot arbeidsparticipatie die de jonggehandicapte na de dag van
      inwerkingtreding van [artikel III, onderdeel B, van de Invoeringswet Participatiewet][ref1] heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0035333#ArtikelIII
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810b
    references:
      - id: ref1
        bwb_id: BWBR0035333
        artikel: III
  - number: 8:10c
    text: |-
      De jonggehandicapte die op de dag voor inwerkingtreding van
      [artikel III, onderdeel D, van de Invoeringswet Participatiewet][ref1] volledig en duurzaam arbeidsongeschikt
      was, als bedoeld in [artikel 2:4, eerste lid,][ref2] zoals dat luidde op die dag, wordt geacht op de dag
      van inwerkingtreding van artikel III, onderdeel D, van de Invoeringswet Participatiewet volledig en duurzaam
      arbeidsongeschikt te zijn, als bedoeld in artikel 2:4, zoals dat is komen te luiden op die dag.


      [ref1]: https://wetten.overheid.nl/BWBR0035333#ArtikelIII
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810c
    references:
      - id: ref1
        bwb_id: BWBR0035333
        artikel: III
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '1'
  - number: 8:10d
    text: |-
      De [artikelen 1a:10][ref1], [2:17][ref2] en [3:21][ref3], zoals deze luidden op de dag voorafgaande aan de
      inwerkingtreding van artikel I, onderdelen F, H en HH van de wet van 27 mei 2020 tot wijziging van de Wet
      arbeidsongeschiktheidsvoorziening jonggehandicapten en enkele andere wetten in verband met verdere activering van
      de participatie van jonggehandicapten en het harmoniseren van de verschillende regimes Wajong (Stb. 2020, 173),
      blijven van toepassing op de personen van wie het recht op arbeidsongeschiktheidsuitkering of arbeidsondersteuning
      voor of op de dag vijf jaar voor de inwerkingtreding van die wet is geëindigd, dan wel niet toegekend omdat zij
      niet arbeidsongeschikt waren.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel810d
    references:
      - id: ref1

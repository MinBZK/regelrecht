  - number: 8:8.3
    text: |-
      In afwijking van het tweede lid wordt het garantiebedrag voor de jonggehandicapte die in de maand van
      inwerkingtreding van artikel I, onderdelen S, W, Z, AA en BB van de in het eerste lid, onderdeel a, genoemde wet,
      recht zou hebben gehad op inkomensondersteuning, bedoeld in [artikel 2:39, eerste lid][ref1], zoals dat luidde
      op de dag voor inwerkingtreding van die wet, vastgesteld aan de hand van de berekeningswijze behorende bij de
      inkomensondersteuning, bedoeld in [artikel 2:41][ref2], zoals dat artikel luidde op de dag voor inwerkingtreding
      van die wet, indien die jonggehandicapte sinds januari 2015 onafgebroken inkomen heeft genoten.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88

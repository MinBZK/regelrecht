  - number: 3:43.2
    text: |-
      Onverminderd het eerste lid kan het Uitvoeringsinstituut werknemersverzekeringen de bestuurlijke boete verrekenen
      met een vordering die degene aan wie de bestuurlijke boete is opgelegd op hem heeft.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
  - number: 3:43.3
    text: |-
      De Sociale verzekeringsbank onderscheidenlijk de gemeente betaalt het bedrag van de bestuurlijke boete, zonder
      dat daarvoor een machtiging nodig is, op zijn verzoek aan het Uitvoeringsinstituut werknemersverzekeringen
      indien de persoon aan wie een bestuurlijke boete is opgelegd een uitkering ontvangt op grond van de
      [Algemene Ouderdomswet][ref1], de [Algemene nabestaandenwet][ref2], de [Participatiewet][ref3], de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers][ref4] of de
      [Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0002221
      [ref2]: https://wetten.overheid.nl/BWBR0007795
      [ref3]: https://wetten.overheid.nl/BWBR0015703
      [ref4]: https://wetten.overheid.nl/BWBR0004044
      [ref5]: https://wetten.overheid.nl/BWBR0004163
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
    references:
      - id: ref1
        bwb_id: BWBR0002221
      - id: ref2
        bwb_id: BWBR0007795
      - id: ref3
        bwb_id: BWBR0015703
      - id: ref4
        bwb_id: BWBR0004044
      - id: ref5
        bwb_id: BWBR0004163
  - number: 3:43.4
    text: |-
      De in [artikel 479g van het Wetboek van Burgerlijke Rechtsvordering][ref1] aan de raad voor de kinderbescherming
      toegekende bevoegdheid komt gelijkelijk toe aan het Uitvoeringsinstituut werknemersverzekeringen. Indien het
      Uitvoeringsinstituut werknemersverzekeringen gebruik maakt van deze bevoegdheid, geschiedt de bekendmaking van het
      dwangbevel, in afwijking van [artikel 4:123, eerste lid, van de Algemene wet bestuursrecht][ref2], door middel van
      toezending per post aan de persoon aan wie de boete is opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel479g
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 479g
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 3:43.5
    text: |-
      Zolang de jonggehandicapte of zijn wettelijke vertegenwoordiger zijn verplichting, bedoeld in
      [artikel 3:40, negende lid][ref1], niet of niet behoorlijk nakomt:


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
  - number: 3:43.5.a
    text: |-
      is het Uitvoeringsinstituut werknemersverzekeringen in afwijking van
      [artikel 4:93, vierde lid, van de Algemene wet bestuursrecht][ref1] bevoegd tot verrekening van de bestuurlijke
      boete voor zover beslag op de vordering van de schuldeiser nietig zou zijn;


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 3:43.5.b
    text: |-
      geldt de beslagvrije voet, bedoeld in de
      [artikelen 475c tot en met 475e van het Wetboek van Burgerlijke Rechtsvordering][ref1], in afwijking van
      [artikel 4:116 van de Algemene wet bestuursrecht][ref2], niet bij de invordering van een bestuurlijke boete bij
      dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel475c
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel343
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 475c
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 3:44a
    text: |-
      Indien het Uitvoeringsinstituut werknemersverzekeringen de jonggehandicapte de uitkering tijdelijk of
      blijvend, geheel of gedeeltelijk heeft geweigerd dan wel hem een bestuurlijke boete heeft opgelegd, stelt het
      Uitvoeringsinstituut werknemersverzekeringen het reïntegratiebedrijf dat ten behoeve van die jonggehandicapte
      werkzaamheden gericht op vergroting van de mogelijkheden tot het verrichten van arbeid of op inschakeling in arbeid
      verricht, van die beschikking in kennis voorzover dat noodzakelijk is voor de uitvoering van de werkzaamheden door
      het reïntegratiebedrijf.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel344a
  - number: 3:45.1
    text: |-
      De arbeidsongeschiktheidsuitkering wordt betaalbaar gesteld door het Uitvoeringsinstituut werknemersverzekeringen.
      De betaling geschiedt als regel in tijdvakken van een maand.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:45.2
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen schort de betaling van de arbeidsongeschiktheidsuitkering op of
      schorst het de betaling, indien het op grond van duidelijke aanwijzingen van oordeel is of het gegronde vermoeden
      heeft dat:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:45.2.a
    text: het recht op uitkering niet of niet meer bestaat;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:45.2.b
    text: recht op een lagere uitkering bestaat;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:45.2.c
    text: |-
      de jonggehandicapte of zijn wettelijke vertegenwoordiger een verplichting als bedoeld in [artikel 3:37][ref1],
      [3:38][ref2] of [3:74][ref3] niet of niet behoorlijk is nagekomen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: '3'
        afdeling: '3'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '6'
  - number: 3:45.3
    text: |-
      Indien de arbeidsongeschiktheidsuitkering in het buitenland wordt uitbetaald, geschiedt de betaling in afwijking
      van [artikel 4:89, derde lid, van de Algemene wet bestuursrecht][ref1] op het tijdstip waarop de rekening van de
      daartoe door de schuldeiser aangewezen bank wordt gecrediteerd.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 3:45.4
    text: |-
      Wanneer de jonggehandicapte, aan wie een arbeidsongeschiktheidsuitkering is toegekend, een ander machtigt om de
      uitkering in ontvangst te nemen, onderscheidenlijk een verleende machtiging intrekt, wordt daaraan gevolg gegeven
      met ingang van een betalingstijdvak, aanvangende na de dag waarop de machtiging wordt ingediend, onderscheidenlijk
      waarop van haar intrekking mededeling wordt gedaan, doch niet later dan de eerste dag van de tweede maand na de dag
      van indiening onderscheidenlijk de mededeling.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:45.5
    text: |-
      Indien een reïntegratiebedrijf aan het Uitvoeringsinstituut werknemersverzekeringen heeft gemeld dat het
      gegronde vermoeden bestaat dat een persoon aan wie een uitkering is toegekend onvoldoende medewerking verleent
      aan de op hem betrekking hebbende werkzaamheden van het reïntegratiebedrijf, neemt het Uitvoeringsinstituut
      werknemersverzekeringen een besluit omtrent de gehele of gedeeltelijke opschorting of schorsing van de betaling van
      de uitkering aan die persoon voor de duur van ten hoogste acht weken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:45.6
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen stelt het reïntegratiebedrijf in kennis van een besluit tot
      opschorting of schorsing als bedoeld in het vijfde lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel345
  - number: 3:47.1
    text: |-
      Indien de jonggehandicapte aan wie een arbeidsongeschiktheidsuitkering is toegekend, aanspraak heeft op
      verstrekking of vergoeding van zorg als bedoeld in de [Wet langdurige zorg][ref1] en op grond van die wet een
      bijdrage voor die zorg verschuldigd is, is het Uitvoeringsinstituut werknemersverzekeringen bevoegd de uitkering
      tot het bedrag van die bijdrage in plaats van aan de jonggehandicapte zonder diens machtiging uit te betalen aan
      het Zorginstituut Nederland, genoemd in [artikel 58, eerste lid, van de Zorgverzekeringswet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0035917
      [ref2]: https://wetten.overheid.nl/BWBR0018450#Artikel58
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347
    references:
      - id: ref1
        bwb_id: BWBR0035917
      - id: ref2
        bwb_id: BWBR0018450
        artikel: '58'
  - number: 3:47.2
    text: |-
      Indien aan de jonggehandicapte aan wie een arbeidsongeschiktheidsuitkering is toegekend, een
      maatwerkvoorziening of persoonsgebonden budget wordt verstrekt voor beschermd wonen als bedoeld in
      [artikel 1.1.1 van de Wet maatschappelijke ondersteuning 2015][ref1], en hij op grond van die [wet][ref2] hiervoor
      een bijdrage is verschuldigd, is het Uitvoeringsinstituut werknemersverzekeringen bevoegd de uitkering tot het
      bedrag van die bijdrage in plaats van aan jonggehandicapte, aan wie de uitkering is toegekend, zonder diens
      machtiging uit te betalen aan het CAK, genoemd in [artikel 6.1.1, eerste lid, van de Wet langdurige zorg][ref3],
      dat voor de gemeente de bijdrage int.


      [ref1]: https://wetten.overheid.nl/BWBR0035362#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0035362
      [ref3]: https://wetten.overheid.nl/BWBR0035917#Artikel6
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347
    references:
      - id: ref1
        bwb_id: BWBR0035362
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0035362
      - id: ref3
        bwb_id: BWBR0035917
        artikel: '6'
  - number: 3:47.3
    text: |-
      Indien de jonggehandicapte, aan wie een arbeidsongeschiktheidsuitkering is toegekend, in een inrichting ter
      verpleging van geesteszieken of van zwakzinnigen is opgenomen en het Uitvoeringsinstituut werknemersverzekeringen
      van de desbetreffende inrichting of van het college van burgemeester en wethouders van de gemeente die de
      opnamekosten betaalt, het verzoek ontvangt om de arbeidsongeschiktheidsuitkering aan die inrichting of die gemeente
      uit te betalen, kan het Uitvoeringsinstituut werknemersverzekeringen dat verzoek zonder het stellen van andere
      voorwaarden inwilligen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347
  - number: 3:47.4
    text: |-
      Indien het eerste of tweede lid toepassing vindt, heeft de in het derde lid bedoelde bevoegdheid betrekking op
      het gedeelte van de arbeidsongeschiktheidsuitkering dat niet aan de in het eerste of tweede lid genoemde instantie
      wordt uitbetaald.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347
  - number: 3:47.5
    text: |-
      Een herziening van de betaling van de uitkering op grond van het eerste of tweede lid als gevolg van een wijziging
      van de verschuldigde bijdrage vindt plaats zonder dat dit bij beschikking is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347
  - number: 3:47a.1
    text: |-
      Is van de aanvrager of ontvanger van een arbeidsongeschiktheidsuitkering bij het Uitvoeringsinstituut
      werknemersverzekeringen een adres in Nederland bekend, terwijl in de basisregistratie personen ambtshalve is
      opgenomen dat hij is vertrokken naar een onbekend land van verblijf, dan verzoekt het Uitvoeringsinstituut
      werknemersverzekeringen hem de afwijkende registratie in de basisregistratie personen binnen een redelijke termijn
      ongedaan te laten maken.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347a
  - number: 3:47a.2
    text: |-
      Wanneer na afloop van deze termijn, de afwijkende registratie niet is beëindigd of als uit de basisregistratie
      personen niet blijkt dat het college van burgemeester en wethouders van de desbetreffende gemeente de gegevens over
      het adres in onderzoek heeft genomen, schort het Uitvoeringsinstituut werknemersverzekeringen de betaling van de
      arbeidsongeschiktheidsuitkering aan de persoon, aan wie de arbeidsongeschiktheidsuitkering is toegekend, op.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347a
  - number: 3:47a.3
    text: |-
      De opschorting wordt beëindigd zodra is vastgesteld dat de persoon, bedoeld in het tweede lid, in het buitenland
      woont of verblijft of dat een adres in Nederland in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347a
  - number: 3:47a.4
    text: |-
      Indien het onderzoek van het college van burgemeester en wethouders is afgerond en de persoon, bedoeld
      in het tweede lid, in de basisregistratie personen ambtshalve opgenomen blijft met gegevens over het
      vertrek uit Nederland, schort het Uitvoeringsinstituut werknemersverzekeringen de betaling van de
      arbeidsongeschiktheidsuitkering op tot verblijf in het buitenland kan worden vastgesteld of een adres in Nederland
      in de basisregistratie personen is opgenomen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel347a
  - number: 3:49.1
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot door het Uitvoeringsinstituut
      werknemersverzekeringen te verstrekken subsidie aan een rechtspersoon die in het kader van de uitoefening van
      beroep of bedrijf door scholing de inschakeling van jonggehandicapten met ernstige scholingsbelemmeringen in de
      arbeid bevordert.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel349
  - number: 3:49.2
    text: |-
      Bij de subsidieverlening, bedoeld in het eerste lid, kunnen aan de subsidie-ontvanger verplichtingen worden
      opgelegd omtrent het hanteren van een registratiesysteem waaruit blijkt of het doel van de subsidie is bereikt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel349
  - number: 3:52.1
    text: |-
      De betaling van de vakantie-uitkering vindt eenmaal per jaar plaats in de maand mei over de aan die maand
      voorafgaande 12 maanden, of, indien het recht op uitkering eerder dan in de maand mei eindigt, in de desbetreffende
      maand. Het Uitvoeringsinstituut werknemersverzekeringen kan de vakantie-uitkering op een ander tijdstip betalen,
      mits die betaling plaatsvindt over een of meer voorliggende maanden waarover reeds recht op vakantie-uitkering
      bestaat.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel352
  - number: 3:52.2
    text: |-
      De [artikelen 3:45][ref1], [3:47][ref2] en [3:54][ref3] zijn van overeenkomstige toepassing ten aanzien van de
      vakantie-uitkering, voor zover bij of krachtens deze wet niet anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel352
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '4'
  - number: 3:53
    text: |-
      De [artikelen 3:32][ref1], [3:45][ref2], [3:47][ref3], [3:56][ref4], [3:57][ref5] en [3:58][ref6] zijn van
      overeenkomstige toepassing ten aanzien van de betaling van de tegemoetkoming, bedoeld in [artikel 3:10][ref7], voor
      zover bij of krachtens deze wet niet anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref6]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref7]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel353
    references:

        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '1'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '1'
  - number: 1:1.1.e
    text: |-
      *vreemdeling:* hetgeen daaronder wordt verstaan in de [Vreemdelingenwet 2000][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0011823
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0011823
  - number: 1:1.1.f
    text: |-
      *rechtens zijn vrijheid is ontnomen:* rechtens zijn vrijheid is ontnomen, behoudens
      de situaties, bedoeld in de [Wet verplichte geestelijke gezondheidszorg][ref1], in de
      [Wet zorg en dwang psychogeriatrische en verstandelijk gehandicapte cliënten][ref2] en in
      [artikel 2.3 van de Wet forensische zorg][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0040635
      [ref2]: https://wetten.overheid.nl/BWBR0040632
      [ref3]: https://wetten.overheid.nl/BWBR0040634#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0040635
      - id: ref2
        bwb_id: BWBR0040632
      - id: ref3
        bwb_id: BWBR0040634
        artikel: '2'
  - number: 1:1.1.g
    text: |-
      *justitiële inrichting:* een penitentiaire inrichting, een instelling voor
      verpleging van ter beschikking gestelden, of een inrichting als bedoeld in
      [artikel 1, onderdeel b, van de Beginselenwet justitiële jeugdinrichtingen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0011756#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0011756
        artikel: '1'
  - number: 1:1.1.h
    text: |-
      *re-integratiebedrijf:* een natuurlijke persoon dan wel rechtspersoon die in het kader van de uitoefening van
      beroep of bedrijf de inschakeling van personen in de arbeid bevordert;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.1.i
    text: |-
      *resterende verdiencapaciteit:* het inkomen dat de jonggehandicapte die de leeftijd van achttien jaar nog niet
      heeft bereikt en de jonggehandicapte die recht heeft op een arbeidsongeschiktheidsuitkering of recht heeft op
      arbeidsondersteuning op grond van deze wet nog met arbeid kan verdienen en dat bij of krachtens [artikel 2:5][ref1]
      of [artikel 3:1][ref2] is vastgesteld;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '1'
  - number: 1:1.1.j
    text: |-
      *werknemer:* een werknemer in de zin van de [Wet werk en inkomen naar arbeidsvermogen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: 1:1.1.k
    text: |-
      *werkgever:* een werkgever in de zin van de [Wet werk en inkomen naar arbeidsvermogen][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0019057
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0019057
  - number: 1:1.1.l
    text: |-
      *inkomensvoorziening:* inkomensondersteuning als bedoeld in [artikel 2:40][ref1] of een uitkering als bedoeld
      in [artikel 2:45][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '1'
        afdeling: '7'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: '3'
        afdeling: '7'
  - number: 1:1.1.m
    text: |-
      *minimumloon:* het minimumloon, bedoeld in
      [artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag][ref1] of, indien het
      een persoon jonger dan 21 jaar betreft, het voor zijn leeftijd geldende minimumloon per maand, bedoeld in
      [artikel 7, derde lid][ref2], en [artikel 8, derde lid, van die wet][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0002638#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0002638#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0002638#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0002638
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0002638
        artikel: '7'
      - id: ref3
        bwb_id: BWBR0002638
        artikel: '8'
  - number: 1:1.1.n
    text: |-
      *participatieplan:* het participatieplan, bedoeld in [artikel 2:18][ref1], eerste lid;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '5'
  - number: 1:1.1.o
    text: |-
      *recht op arbeidsondersteuning:* het recht op arbeidsondersteuning op grond van [hoofdstuk 2][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        hoofdstuk: '2'
  - number: 1:1.1.p
    text: |-
      *arbeidsongeschiktheidsuitkering:* een arbeidsongeschiktheidsuitkering op grond van hoofdstuk 1a of [3][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0008657
        hoofdstuk: '3'
  - number: 1:1.1.q
    text: |-
      *zelfstandige:* de persoon die, anders dan in dienstbetrekking, arbeid in eigen bedrijf verricht of een beroep
      uitoefent, teneinde daarmee inkomen te verwerven;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.1.r
    text: |-
      *vrijheidsstraf of vrijheidsbenemende maatregel:* een bij onherroepelijk geworden vonnis opgelegde vrijheidsstraf
      of vrijheidsbenemende maatregel als bedoeld in het [Wetboek van Strafrecht][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0001854
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0001854
  - number: 1:1.1.s
    text: |-
      *uitreiziger:* jonggehandicapte ten aanzien van wie op grond van een melding van de opsporingsdiensten
      of inlichtingen- en veiligheidsdiensten, gericht aan het Uitvoeringsinstituut werknemersverzekeringen,
      is gebleken dat het gegronde vermoeden bestaat dat deze persoon zich buiten Nederland bevindt met het
      doel om zich aan te sluiten bij een organisatie die is geplaatst op de lijst van organisaties, bedoeld in
      [artikel 14, vierde lid, van de Rijkswet op het Nederlanderschap][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003738#Artikel14
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0003738
        artikel: '14'
  - number: 1:1.2
    text: 'In deze wet en de daarop berustende bepalingen wordt gelijkgesteld met:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.2.a
    text: 'echtgenoot: geregistreerde partner;'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.2.b
    text: 'echtgenoten: geregistreerde partners;'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.2.c
    text: 'gehuwd: als partner geregistreerd.'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.3
    text: 'In deze wet en de daarop berustende bepalingen wordt:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.3.a
    text: |-
      als gehuwd of als echtgenoot mede aangemerkt de ongehuwde meerderjarige die met een andere ongehuwde meerderjarige
      een gezamenlijke huishouding voert, tenzij het betreft een bloedverwant in de eerste graad;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.3.b
    text: als ongehuwd mede aangemerkt degene die duurzaam gescheiden leeft van de persoon met wie hij gehuwd is.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.4
    text: |-
      Van een gezamenlijke huishouding is sprake indien twee personen hun hoofdverblijf in dezelfde woning hebben en zij
      blijk geven zorg te dragen voor elkaar door middel van het leveren van een bijdrage in de kosten van de huishouding
      dan wel anderszins.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.5
    text: |-
      Een gezamenlijke huishouding wordt in ieder geval aanwezig geacht indien de betrokkenen hun hoofdverblijf hebben in
      dezelfde woning en:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.5.a
    text: zij met elkaar gehuwd zijn geweest of eerder voor de toepassing van deze wet daarmee gelijk zijn gesteld;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.5.b
    text: uit hun relatie een kind is geboren of erkenning heeft plaatsgevonden van een kind van de een door de ander;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.5.c
    text: |-
      zij zich wederzijds verplicht hebben tot een bijdrage aan de huishouding krachtens een geldend
      samenlevingscontract; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.5.d
    text: |-
      zij op grond van een registratie worden aangemerkt als een gezamenlijke huishouding die naar aard en strekking
      overeenkomt met de gezamenlijke huishouding, bedoeld in het vierde lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.6
    text: |-
      Bij algemene maatregel van bestuur wordt vastgesteld welke registraties, en gedurende welk tijdvak, in aanmerking
      worden genomen voor de toepassing van het vijfde lid, onderdeel d.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.7
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld ten aanzien van hetgeen wordt verstaan onder het
      blijk geven zorg te dragen voor een ander, zoals bedoeld in het vierde lid.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.8
    text: |-
      Onder bloedverwant in de eerste graad als bedoeld in het derde lid, onderdeel a, wordt mede verstaan een
      meerderjarig aangehuwd kind of een meerderjarig voormalig pleegkind van de ongehuwde meerderjarige.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
  - number: 1:1.9
    text: |-
      Onder voormalig pleegkind als bedoeld in het achtste lid wordt verstaan een pleegkind voor wie de ongehuwde
      meerderjarige een pleegvergoeding ontving of ontvangt op grond van de [Wet op de jeugdzorg][ref1] of de
      [Jeugdwet][ref2], of kinderbijslag ontving op grond van de [Algemene Kinderbijslagwet][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0016637
      [ref2]: https://wetten.overheid.nl/BWBR0034925
      [ref3]: https://wetten.overheid.nl/BWBR0002368
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel11
    references:
      - id: ref1
        bwb_id: BWBR0016637
      - id: ref2
        bwb_id: BWBR0034925
      - id: ref3
        bwb_id: BWBR0002368
  - number: 1:2.1
    text: |-
      Ingezetene in de zin van deze wet en de daarop berustende bepalingen is de natuurlijke persoon, die in Nederland
      woont.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel12
  - number: 1:2.2
    text: |-
      Bij of krachtens algemene maatregel van bestuur kan, in afwijking van het eerste lid, uitbreiding dan wel beperking
      worden gegeven aan het begrip «ingezetene».
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel12
  - number: 1:2.3
    text: |-
      Voor de persoon die op grond van het tweede lid als ingezetene wordt aangemerkt, doch buiten Nederland woont,
      gelden de bepalingen van deze wet, met inachtneming van de specifieke regels die in deze wet ten aanzien van deze
      persoon zijn gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel12
  - number: 1:3.1
    text: Waar een natuurlijk persoon woont wordt naar de omstandigheden beoordeeld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel13
  - number: 1:3.2
    text: |-
      De persoon die Nederland metterwoon heeft verlaten en binnen een jaar nadien metterwoon terugkeert zonder inmiddels
      in Aruba, Curaçao, Sint Maarten, in de openbare lichamen Bonaire, Sint Eustatius en Saba of op het grondgebied van
      een andere Mogendheid te hebben gewoond, wordt ook voor de duur van zijn afwezigheid geacht in Nederland te hebben
      gewoond.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel13
  - number: 1:4.1
    text: 'In deze wet en de daarop berustende bepalingen wordt als studerende aangemerkt de persoon:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
  - number: 1:4.1.a
    text: |-
      die studiefinanciering, niet zijnde het levenlanglerenkrediet, ontvangt op grond van de
      [Wet studiefinanciering 2000][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0011453
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0011453
  - number: 1:4.1.b
    text: |-
      die een financiële voorziening ontvangt als bedoeld in
      [artikel 7.51, eerste lid, van de Wet op het hoger onderwijs en wetenschappelijk onderzoek][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0005682#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0005682
        artikel: '7'
  - number: 1:4.1.c
    text: |-
      die een tegemoetkoming ontvangt op grond van
      [hoofdstuk 4 van de Wet tegemoetkoming onderwijsbijdrage en schoolkosten][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0012438#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0012438
        hoofdstuk: '4'
  - number: 1:4.1.d
    text: |-
      voor wie de verzekerde in de zin van de [Algemene Kinderbijslagwet][ref1] kinderbijslag ontvangt op grond van
      [artikel 7, tweede lid, onderdeel a of onderdeel b, van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0002368
      [ref2]: https://wetten.overheid.nl/BWBR0002368#Artikel7
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
    references:
      - id: ref1
        bwb_id: BWBR0002368
      - id: ref2
        bwb_id: BWBR0002368
        artikel: '7'
  - number: 1:4.1.e
    text: |-
      die, hoewel hij niet op grond van de onderdelen a tot en met d als studerende wordt aangemerkt, niettemin in
      verband met onderwijs of een beroepsopleiding lessen of stages volgt gedurende gemiddeld ten minste 213 klokuren
      per kwartaal, voor zolang hij de leeftijd van 30 jaar nog niet heeft bereikt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
  - number: 1:4.2
    text: |-
      Bij algemene maatregel van bestuur kunnen ook andere dan de in het eerste lid bedoelde personen als studerende
      worden aangemerkt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel14
  - number: 1a:1.1
    text: 'Jonggehandicapte in de zin van dit hoofdstuk en de daarop berustende bepalingen is de ingezetene die:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.1.a
    text: |-
      op de dag waarop hij achttien jaar wordt als rechtstreeks en objectief medisch vast te stellen gevolg van ziekte,
      gebrek, zwangerschap of bevalling duurzaam geen mogelijkheden tot arbeidsparticipatie heeft;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.1.b
    text: |-
      na de in onderdeel a bedoelde dag als rechtstreeks en objectief medisch vast te stellen gevolg van ziekte, gebrek,
      zwangerschap of bevalling duurzaam geen mogelijkheden tot arbeidsparticipatie heeft en in het jaar, onmiddellijk
      voorafgaand aan de dag waarop dit is ingetreden, gedurende ten minste zes maanden studerende was.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.2
    text: |-
      De ingezetene die op de dag, bedoeld in het eerste lid, onderdeel a of b, beperkingen ondervindt als gevolg
      van ziekte, gebrek, zwangerschap of bevalling, maar op grond van het eerste lid niet aangemerkt wordt als
      jonggehandicapte, wordt alsnog jonggehandicapte in de zin van dit hoofdstuk en de daarop berustende bepalingen,
      indien hij binnen vijf jaar na die dag duurzaam geen mogelijkheden tot arbeidsparticipatie heeft, indien dit
      voortkomt uit dezelfde oorzaak als die op grond waarvan hij beperkingen als gevolg van ziekte, gebrek, zwangerschap
      of bevalling ondervond, op de dag, bedoeld in onderdeel a of b.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.3
    text: |-
      De ingezetene die tijdelijk geen mogelijkheden tot arbeidsparticipatie heeft wordt alsnog jonggehandicapte,
      indien hij gedurende een tijdvak van tien jaar volgend op de dag waarop hij jonggehandicapte zou zijn geworden
      op grond van het eerste lid, onderdeel a of b, of het tweede lid, indien hij duurzaam geen mogelijkheden tot
      arbeidsparticipatie zou hebben gehad, geen mogelijkheden tot arbeidsparticipatie had.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.4
    text: |-
      Onder duurzaam geen mogelijkheden tot arbeidsparticipatie hebben wordt in dit hoofdstuk en de daarop berustende
      bepalingen de situatie verstaan waarin de mogelijkheden tot arbeidsparticipatie zich niet kunnen ontwikkelen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.5
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen regels worden gesteld met betrekking tot een periodieke
      herbeoordeling om vast te stellen of betrokkene duurzaam geen mogelijkheden tot arbeidsparticipatie heeft.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.6
    text: |-
      De beoordeling van de mogelijkheden tot arbeidsparticipatie wordt gebaseerd op een verzekeringsgeneeskundig en voor
      zover nodig een arbeidskundig onderzoek.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.7
    text: |-
      Bij de beoordeling, bedoeld in het zesde lid, maakt de verzekeringsarts zo veel mogelijk gebruik van
      wetenschappelijke inzichten die de beoordeling van de mogelijkheden tot arbeidsparticipatie kunnen ondersteunen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.8
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen met betrekking tot het eerste, vierde en zesde lid nadere
      regels worden gesteld.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:1.9
    text: |-
      De voordracht voor een krachtens het achtste lid vast te stellen algemene maatregel van bestuur, dan wel de
      vaststelling van een ministeriële regeling op basis van een dergelijke algemene maatregel van bestuur, wordt niet
      eerder gedaan dan vier weken nadat het ontwerp aan beide Kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a1
  - number: 1a:2.1
    text: |-
      De jonggehandicapte heeft recht op een arbeidsongeschiktheidsuitkering op grond van dit hoofdstuk, tenzij op hem
      een uitsluitingsgrond, als bedoeld in [artikel 1a:6, eerste lid][ref1], van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a2
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:2.2
    text: |-
      De persoon die recht op arbeidsondersteuning op grond van [hoofdstuk 2][ref1] of recht op
      arbeidsongeschiktheidsuitkering op grond van [hoofdstuk 3][ref2] heeft of heeft gehad, heeft geen recht op
      arbeidsongeschiktheidsuitkering op grond van dit hoofdstuk.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a2
    references:
      - id: ref1
        bwb_id: BWBR0008657
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0008657
        hoofdstuk: '3'
  - number: 1a:3.1
    text: |-
      Indien is vastgesteld dat de ingezetene geen jonggehandicapte is, heeft de ingezetene die alsnog wordt
      aangemerkt als jonggehandicapte op grond van [artikel 1a:1, tweede lid][ref1], niet eerder dan twaalf maanden
      na de dag waarop voor het laatst werd vastgesteld dat de ingezetene geen jonggehandicapte was recht op
      arbeidsongeschiktheidsuitkering.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a3
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '1'
  - number: 1a:3.2
    text: |-
      Indien geen recht op arbeidsongeschiktheidsuitkering ontstaat, omdat op de jonggehandicapte een of meer
      uitsluitingsgronden, als bedoeld in [artikel 1a:6, eerste lid][ref1], van toepassing zijn, heeft de
      jonggehandicapte alsnog recht op arbeidsongeschiktheidsuitkering vanaf de dag dat zich geen van deze
      uitsluitingsgronden meer voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a3
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:4.1
    text: |-
      De arbeidsongeschiktheidsuitkering wordt berekend naar de grondslag van het minimumloon per maand gedeeld door
      21,75.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a4
  - number: 1a:4.2
    text: De arbeidsongeschiktheidsuitkering bedraagt per dag 0,75 * (G – I).
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a4
  - number: 1a:4.3
    text: De G staat voor de grondslag en I voor het inkomen per dag.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a4
  - number: 1a:4.4
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald wat onder inkomen per dag in de zin van dit hoofdstuk wordt
      verstaan. Daarbij kan tevens worden bepaald dat nader te bepalen inkomen dat gedeeltelijk, niet, of niet langer
      wordt genoten als gevolg van gewijzigde omstandigheden of enig handelen of nalaten van betrokkene in aanmerking
      wordt genomen alsof het wel volledig wordt genoten.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a4
  - number: 1a:5
    text: |-
      Indien de jonggehandicapte verkeert in een blijvende of voorlopig blijvende toestand van hulpbehoevendheid
      die geregeld oppassing en verzorging nodig maakt, wordt de arbeidsongeschiktheidsuitkering voor de duur van
      die hulpbehoevendheid verhoogd tot ten hoogste de grondslag. De eerste zin vindt geen toepassing, indien de
      jonggehandicapte in een inrichting is opgenomen en de kosten van verblijf ten laste van een zorgverzekering of een
      verzekering inzake ziektekosten komen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a5
  - number: 1a:6.1
    text: |-
      Voor de toepassing van deze paragraaf en de daarop berustende bepalingen worden de volgende uitsluitingsgronden
      onderscheiden:
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
  - number: 1a:6.1.a
    text: het rechtens zijn vrijheid zijn ontnomen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
  - number: 1a:6.1.b
    text: het zich onttrekken aan de tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
  - number: 1a:6.1.c
    text: het niet in Nederland wonen;
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
  - number: 1a:6.1.d
    text: |-
      het als vreemdeling niet rechtmatig verblijf houden in de zin van
      [artikel 8, onderdelen a tot en met e en l, van de Vreemdelingenwet 2000][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 1a:6.1.e
    text: |-
      het bereiken of bereikt hebben van de pensioengerechtigde leeftijd, bedoeld in
      [artikel 7a, eerste lid, van de Algemene Ouderdomswet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002221#Artikel7a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
    references:
      - id: ref1
        bwb_id: BWBR0002221
        artikel: 7a
  - number: 1a:6.1.f
    text: een uitreiziger zijn.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
  - number: 1a:6.2
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat de uitsluitingsgrond, bedoeld in het eerste lid,
      onderdeel d, niet geldt ten aanzien van vreemdelingen die, na rechtmatig verblijf te hebben gehouden in de zin van
      [artikel 8, onderdeel a tot en met e en l, van de Vreemdelingenwet 2000][ref1], rechtmatig in Nederland verblijf
      hebben als bedoeld in artikel 8, onderdeel g of h, van de Vreemdelingenwet 2000.


      [ref1]: https://wetten.overheid.nl/BWBR0011823#Artikel8
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a6
    references:
      - id: ref1
        bwb_id: BWBR0011823
        artikel: '8'
  - number: 1a:7.1
    text: |-
      In afwijking van de [artikelen 1a:2, eerste lid][ref1], en [1a:9][ref2] is
      [artikel 1a:6, eerste lid, onderdeel a][ref3], eerst van toepassing met ingang van de dag dat de persoon één maand
      rechtens zijn vrijheid is ontnomen, tenzij op de dag voorafgaande aan de vrijheidsontneming geen recht bestaat op
      arbeidsongeschiktheidsuitkering op grond van artikel 1a:6, eerste lid, onderdeel b.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a7
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:7.2
    text: |-
      [Artikel 1a:6, eerste lid, onderdeel a][ref1], is niet van toepassing op bij algemene maatregel van bestuur aan
      te wijzen categorieën personen waarbij tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel
      plaatsvindt buiten een justitiële inrichting.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a7
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:7.3
    text: |-
      Voor de toepassing van het eerste lid, worden perioden van vrijheidsontneming samengeteld, indien zij elkaar met
      een onderbreking van minder dan vier weken opvolgen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a7
  - number: 1a:8.1
    text: |-
      In afwijking van de [artikelen 1a:2, eerste lid][ref1], en [1a:9][ref2] is
      [artikel 1a:6, eerste lid, onderdeel c][ref3], eerst van toepassing met ingang van de eerste dag van de maand
      volgend op die waarin de jonggehandicapte buiten Nederland is gaan wonen.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a8
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref3
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:8.2
    text: |-
      Het eerste lid is tevens van toepassing op de jonggehandicapte die buiten Nederland is gaan wonen en op wie
      [artikel 1:2, derde lid][ref1], van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a8
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: '1'
        hoofdstuk: '1'
  - number: 1a:8.3
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen kan [artikel 1a:6, eerste lid, onderdeel c][ref1], buiten
      toepassing laten of daarvan afwijken voor zover toepassing, gelet op het belang van het eindigen van het recht
      op arbeidsongeschiktheidsuitkering indien de jonggehandicapte buiten Nederland gaat wonen, zal leiden tot een
      onbillijkheid van overwegende aard.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a8
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:9
    text: 'Het recht op arbeidsongeschiktheidsuitkering eindigt:'
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a9
  - number: 1a:9.a
    text: |-
      wanneer de jonggehandicapte mogelijkheden tot arbeidsparticipatie als bedoeld in [artikel 1a:1][ref1]
      heeft, met ingang van de dag, aangegeven in de daartoe strekkende beschikking van het Uitvoeringsinstituut
      werknemersverzekeringen;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a9
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '1'
  - number: 1a:9.b
    text: |-
      op de dag dat er op de jonggehandicapte een uitsluitingsgrond als bedoeld in [artikel 1a:6, eerste lid][ref1], van
      toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a9
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:9.c
    text: indien het Uitvoeringsinstituut werknemersverzekeringen daartoe op verzoek van de jonggehandicapte besluit; of
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a9
  - number: 1a:9.d
    text: indien de jonggehandicapte overlijdt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a9
  - number: 1a:10.1
    text: |-
      Indien op grond van [artikel 1a:9, onderdeel a][ref1], het recht op arbeidsongeschiktheidsuitkering is geëindigd,
      herleeft het recht op arbeidsongeschiktheidsuitkering als de jonggehandicapte duurzaam geen mogelijkheden tot
      arbeidsparticipatie als bedoeld in [artikel 1a:1][ref2] heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a10
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '1'
  - number: 1a:10.2
    text: |-
      Indien op grond van [artikel 1a:9, onderdeel b][ref1], het recht op arbeidsongeschiktheidsuitkering is geëindigd,
      omdat op de persoon die recht had op arbeidsongeschiktheidsuitkering een of meer uitsluitingsgronden als bedoeld
      in [artikel 1a:6, eerste lid, onderdelen a tot en met d en onderdeel f][ref2], van toepassing waren, herleeft het
      recht op arbeidsongeschiktheidsuitkering wanneer zich geen van deze uitsluitingsgronden meer voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a10
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:10.3
    text: |-
      Indien op grond van [artikel 1a:9, onderdeel c][ref1], het recht op arbeidsongeschiktheidsuitkering is
      geëindigd, herleeft het recht op arbeidsongeschiktheidsuitkering op aanvraag van de jonggehandicapte,
      indien zich geen uitsluitingsgrond als bedoeld in [artikel 1a:6, eerste lid][ref2], voordoet. Het recht
      op arbeidsongeschiktheidsuitkering herleeft niet eerder dan een jaar na de dag waarop het recht op
      arbeidsongeschiktheidsuitkering is geëindigd.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel1a
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a10
    references:
      - id: ref1
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
      - id: ref2
        bwb_id: BWBR0008657
        artikel: 1a
        hoofdstuk: 1a
        paragraaf: '2'
  - number: 1a:11.1
    text: |-
      Het Uitvoeringsinstituut werknemersverzekeringen stelt op aanvraag vast of recht op arbeidsongeschiktheidsuitkering
      op grond van dit hoofdstuk bestaat.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a11
  - number: 1a:11.2
    text: |-
      Het recht op arbeidsongeschiktheidsuitkering op grond van dit hoofdstuk ontstaat op de dag waarop de aanvraag,
      bedoeld in dit artikel, werd ingediend, met dien verstande dat dit recht niet eerder kan ontstaan dan de dag waarop
      de betrokkene achttien jaar wordt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a11
  - number: 1a:11.3
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld met betrekking tot de gegevens die door de jonggehandicapte
      bij de aanvraag worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a11
  - number: 1a:11.4
    text: |-
      Indien de toepassing van het eerste lid zou leiden tot kennelijke hardheid, is het Uitvoeringsinstituut
      werknemersverzekeringen bevoegd het recht op arbeidsongeschiktheidsuitkering ambtshalve toe te kennen.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel1a11

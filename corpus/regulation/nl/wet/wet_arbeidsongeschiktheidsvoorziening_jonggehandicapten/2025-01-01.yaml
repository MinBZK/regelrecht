  - number: 8:9
    text: |-
      [Artikel 3:63][ref1], zoals dat luidde voor de datum van inwerkingtreding van de wet van 3 december 2009 tot
      wijziging van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten in verband met het bevorderen van de
      participatie van jonggehandicapten door werk en arbeidsondersteuning (Stb. 2009, 580), blijft van toepassing
      op de vermindering van de hoogte van de aanspraak op een geldelijke beloning die voor de dag waarop die wet in
      werking trad was verstrekt, met dien verstande dat de op grond van [artikel 3:63, eerste lid, onderdeel b][ref2],
      verstrekte vermindering geacht wordt te zijn gebaseerd op [artikel 2:20, eerste lid, onderdeel a][ref3],
      vanaf de dag waarop de werknemer die de leeftijd van achttien jaar heeft bereikt recht heeft op
      arbeidsondersteuning, als bedoeld in [hoofdstuk 2][ref4], tenzij de werknemer niet aan de overige voorwaarden van
      [artikel 2:20, eerste lid][ref5], voldoet.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel2

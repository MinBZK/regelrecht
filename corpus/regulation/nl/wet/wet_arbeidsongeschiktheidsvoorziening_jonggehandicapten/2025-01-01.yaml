      door de jonggehandicapte geen inkomen is genoten of uitkering als bedoeld in de [artikelen 3:50][ref1] of
      [3:51][ref2] van de Wet arbeidsongeschiktheidsvoorziening jonggehandicapten, zoals die luidden op de dag voor
      inwerkingtreding van [artikel XII, onderdeel Ja, van de Verzamelwet SZW 2021][ref3].



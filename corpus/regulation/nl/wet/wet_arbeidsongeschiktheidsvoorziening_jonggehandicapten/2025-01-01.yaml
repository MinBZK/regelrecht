  - number: 8:8.6
    text: |-
      De periode van een jaar, bedoeld in het vijfde lid, kan bij algemene maatregel van bestuur tijdelijk met ten
      hoogste een jaar worden verlengd voor zover dat nodig is in verband met de gevolgen van de crisis in verband met
      COVID-19.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
  - number: 8:8.7
    text: |-
      Met ingang van de dag waarop het minimumloon wijzigt, wordt het op grond van het tweede of derde lid vastgestelde
      garantiebedrag, gewijzigd met het percentage van deze wijziging.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88
  - number: 8:8.8
    text: |-
      In dit artikel en de daarop berustende bepalingen wordt onder inkomen verstaan het inkomen, bedoeld in
      [artikel 2:6][ref1] dan wel [artikel 3:48, achtste lid][ref2], zoals dat luidde op de dag voor inwerkingtreding
      van artikel I, onderdeel OO, van de in het eerste lid, onderdeel a, genoemde wet.


      [ref1]: https://wetten.overheid.nl/BWBR0008657#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel88

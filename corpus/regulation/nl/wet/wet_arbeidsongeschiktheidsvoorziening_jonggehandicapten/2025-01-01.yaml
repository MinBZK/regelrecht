        hoofdstuk: '4'
  - number: 8:2
    text: |-
      Arbeidsongeschiktheidsuitkeringen die zijn toegekend voor de inwerkingtreding van de Wet wijziging systematiek
      herbeoordelingen arbeidsongeschiktheidswetten worden geacht te zijn toegekend voor onbepaalde tijd.
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel82
  - number: 8:3.1
    text: |-
      Een beschikking tot vermindering van de aanspraak op een geldelijke beloning voor de verrichte
      arbeid op grond van [artikel 7 van de Wet op de (re)integratie arbeidsgehandicapten][ref1],
      aan de jonggehandicapte die op de dag voorafgaand aan de dag waarop dat artikel op grond van
      [artikel 2.10 van de Wet Invoering en financiering Wet werk en inkomen naar arbeidsvermogen][ref2], vervalt,
      de leeftijd van 18 jaar nog niet had bereikt dan wel recht had op een arbeidsongeschiktheidsuitkering op grond
      van deze wet wordt voor de duur van het tijdvak waarvoor die aanspraak op grond van de Wet op de (re)integratie
      arbeidsgehandicapten is verminderd aangemerkt als een beschikking tot vermindering van de aanspraak op een
      geldelijke beloning voor de verrichte arbeid als bedoeld in [artikel 3:63][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0009565#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0019058#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0008657#Artikel3
    url: https://wetten.overheid.nl/BWBR0008657/2025-01-01#Artikel83
    references:

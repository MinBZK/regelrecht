      [artikel 31, tweede lid, onderdeel b, van de Wet op de (re)integratie arbeidsgehandicapten][ref1],
      aan de jonggehandicapte die op de dag voorafgaand aan de dag waarop dat artikel op grond van
      [artikel 2.10 van de Wet Invoering en financiering Wet werk en inkomen naar arbeidsvermogen][ref2], vervalt,
      dag de leeftijd van 18 jaar nog niet had bereikt dan wel recht had op een arbeidsongeschiktheidsuitkering
      wordt voor de duur van het tijdvak waarvoor die voorziening op grond van de Wet op de (re)integratie
      arbeidsgehandicapten is toegekend aangemerkt als een beschikking tot toekenning van een voorziening als bedoeld in
      [artikel 35, eerste lid juncto tweede lid, onderdeel d, van de Wet werk en inkomen naar arbeidsvermogen][ref3].



---
# Scope manifest — consumed by regelrecht-mvp en (TODO) poc-machine-law.
#
# Het `id`-veld is de `law_id` / `$id` zoals die in beide corpora voorkomt.
# Per-systeem-paden worden NIET hier vastgelegd — elke consumer resolveert
# zelf: regelrecht-mvp scant `corpus/regulation/nl/<layer>/<id>/`,
# poc-machine-law scant `laws/<id>/`. Ontbrekende wetten worden door de
# loader overgeslagen met een waarschuwing.
#
# Schema (v1):
#   name        — korte titel van de casus
#   description — wat de casus beslaat
#   tags        — labels voor filtering in UI
#   laws        — lijst van { id, layer?, critical? }
#   scenarios   — BDD feature-bestanden (paden relatief aan repo root)

schema_version: '1'
name: HHNK Kwijtschelding
description: >-
  Kwijtscheldingsregeling waterschapsbelastingen Hoogheemraadschap Hollands
  Noorderkwartier met de volledige delegatieketen — van de landelijke
  Invorderingswet 1990 via de Uitvoeringsregeling en Regeling kwijtschelding
  belastingen medeoverheden tot de HHNK-verordening, leidraad en toelichting.
  De HHNK-leidraad is parallel geversioneerd: 2023-01-01 (t/m 2026-02-06) en
  2026-02-07 (WSB-2026-2845, inhoudelijke wijzigingen in 26.1.1/26.2.x/26.3.8/26.4.2
  zonder impact op machine_readable kern-orchestrator).
tags:
  - waterschap
  - kwijtschelding
  - hhnk
owner: hhnk

laws:
  - id: kwijtscheldingsregeling_waterschapsbelastingen_hhnk
    layer: waterschaps_verordening
    critical: true
  - id: leidraad_invordering_waterschapsbelastingen_hhnk
    layer: waterschaps_verordening
    notes: >-
      Orchestrator voor kwijtschelding (art 26). Parallel geversioneerd:
      2023-01-01.yaml (t/m 2026-02-06) en 2026-02-07.yaml (WSB-2026-2845,
      CVDR756485). Machine_readable 1-op-1 geport — tekst-wijzigingen in
      26.1.1/26.2.x/26.3.8/26.4.2 raken de MR niet. Engine dispatcht op
      calculation_date.
  - id: toelichting_kwijtschelding_waterschapsbelasting_hhnk
    layer: uitvoeringsbeleid
  - id: regeling_kwijtschelding_belastingen_medeoverheden
    layer: ministeriele_regeling
    critical: true
  - id: uitvoeringsregeling_invorderingswet_1990
    layer: ministeriele_regeling
    critical: true
  - id: leidraad_invordering_2008
    layer: beleidsregel
  - id: invorderingswet_1990
    layer: wet
    critical: true
  - id: participatiewet
    layer: wet
    notes: >-
      Bron voor bijstandsnorm (art 21-24) en echtgenoot-definitie (art 3).
  - id: zorgverzekeringswet
    layer: wet
    notes: >-
      Art 41 is machine_readable met output inkomensafhankelijke_bijdrage_maand
      (tarieven hoog 6.51%, laag 5.26%, max bijdrage-inkomen EUR 75.864/jaar,
      waarden 2025). Gebruikt via source door Regeling medeoverheden art 3 voor
      netto-AOW berekening.
  - id: wet_inkomstenbelasting_2001
    layer: wet
    notes: >-
      Voorlopige teruggaaf en kinderkorting-uitzonderingen (URI art 14 lid 2-3).
  - id: wet_basisregistratie_personen
    layer: wet
    notes: >-
      BSN-lookup, leeftijd (art 2.7), heeft_partner (art 2.8). Aanvullend artikel
      afgeleid-kwijtschelding combineert deze tot is_pensioengerechtigd en
      huishoudtype conform AOW art 7a en Pw art 3. Output-doelen voor een
      toekomstige source-refactor in URI art 12/13/16 en HHNK-verordening.

scenarios:
  - features/kwijtschelding_hhnk.feature
  - features/hhnk_kwijtschelding_machinereadable_units.feature

server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Security headers. NOTE: nginx's `add_header` does NOT inherit into a
    # `location` block that has its own `add_header`. Anywhere we set headers
    # below at location-scope, the full set must be repeated. We use a
    # `map`-free `include`-snippet pattern to keep that DRY.
    #
    # CSP allows blob: for scripts and workers because the WASM-engine glue is
    # loaded via a Blob URL (see frontend-demo/src/composables/useEngine.js),
    # and connect-src includes the demoapi subdomain for the LLM uitleg-call.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.regelrecht.rijks.app; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/yaml;

    # WASM must be served with the right mime type for streaming instantiation.
    types { application/wasm wasm; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        expires 1y;
        # Repeat all security headers — see comment at top: this `add_header`
        # block fully shadows the server-level one in nginx's inheritance rules.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.regelrecht.rijks.app; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Cache-Control "public, immutable" always;
    }

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }
}

    text: Artikel 1.6 Bij algemene maatregel van bestuur wordt bepaald welke van de algemene gegevens, bedoeld in de artikelen 2.7 en 2.69 , worden aangemerkt als authentieke gegevens.
- number: '1.7'
  chunks:
  - index: 0

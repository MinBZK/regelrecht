    sha256: 4d8dbbc141dc422ec55ecbd8d65ac2f87083651da1ff858a33ca0572c019f281
    verified_against: pending
    captured_at: '2026-06-01'
    text: b. de zorgverzekeraar waarbij de verzekerde verzekerd is;
  - index: 3

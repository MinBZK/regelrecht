    label: aanhef
    sha256: 7fc1221cddf0496f06773f3dbbe8d227ae7664a8f17d78e408edbe207c98d21d
    verified_against: pending
    captured_at: '2026-06-01'
    text: 'Artikel 28 1 De statuten van een zorgverzekeraar:'
  - index: 1
    label: onderdeel a
